박은 다음 각 호를 표시하여야 한다.\n(i) 가장 잘 보이는 곳, 수직선상에 전주를 비추는 홍등 2개;\n(ii) 가장 잘 보이는 곳, 수직선상에 구 또는 이와 유사한 형상물 2개;\n(iii) 대수속력이 있는 경우에는 이 항에 규정된 등화 이외에 현등 및 선미등", "id": 1070}, {"category": "COLREG!", "question": "54. 조종불능선의 정의를 영어로 설명하시오.", "answer": "Vessel not under command; a vessel which through some exceptional circumstance is unable to manoeuver and is therefore unable to keep out of the way of another vessel.", "id": 1071}, {"category": "COLREG!", "question": "2. 조종불능선에 대해 설명 및 예시", "answer": "선박의 조종성능을 제한하는 고장, 기타와 같은 예외적인 상황 때문에 침로와 속력의 변경이 불가능하게되어\n다른 선박의 진로를 피할 수 없는 선박을 말한다. 기관 고장 혹은 조타기 고장상태에 있는 선박 등이 여기에\n해당한다. 묘를 해저에 내렸으나 완전히 놓이지 아니한 상태와, 바람이 없는 상태의 범선도 운전부자유 상태로 간주된다. 그러나 단순히 입항시간을 기다리기 위하여 기관을 준비한 상태로 정선하고 있는 선박은\n운전부자유선이 아니다. 레이더만 고장난 선박은 침로와 속력의 변경에 지장이 없으므로 역시 운전부자유선이\n아니다. 이들 선박은 국제규칙 제18조상 일반동력선이나 범선 그리고 어로작업중인 선박에 대하여 항법상 우선권을 갖는다. 조종부자유선이라고도 하나, 해사안전법에서는 조종불능선이라고 한다.", "id": 1072}, {"category": "COLREG!", "question": "조종불능선의 예시 3가지를 말하시오.", "answer": "* 조종불능선\n선박의 조종성능을 제한하는 고장 기타와 같은 예외적인 상황 때문에 침로와 속력의 변경이 불가능하게되어\n다른 선박의 진로를 피할 수 없는 선박을 말한다. 기관 고장 혹은 조타기 고장상태에 있는 선박 등이 여기에\n해당한다. 묘를 해저에 내렸으나 완전히 놓이지 아니한 상태와, 바람이 없는 상태의 범선도 운전부자유 상태로 간주된다. 그러나 단순히 입항시간을 기다리기 위하여 기관을 준비한 상태로 정선하고 있는 선박은 운전부자유선이 아니다. 레이더만 고장난 선박은 침로와 속력의 변경에 지장이 없으므로 역시 운전부자유선이 아니다.\n이들 선박은 국제규칙 제18조상 일반동력선이나 범선 그리고 어로작업중인 선박에 대하여 항법상 우선권을 갖는다. 조종부자유선이라고도 하나, 해사안전법에서는 조종불능선이라고 한다.", "id": 1073}, {"category": "COLREG!", "question": "1. 어로종사선: Vessel Engaged in Fishing", "answer": "2. 조종성능제한선: Vessel Restricted in her ability to manoeuvre", "id": 1074}, {"category": "COLREG!", "question": "5. COLREG Rule3 상의 용어로 답변할 것", "answer": "1) 동력선: (b) The term 'power-driven vessel' means any vessel propelled by machinery.\n[동력선]이라 함은, 기계를 사용하여 추진하는 모든 선박을 말한다.\n2) 흘수제약선: (h) The term 'vessel constrained by her draught' means a power-driven vessel which because of her draught in relation to the available depth and width of navigable water, is severely restricted in her ability to deviate from the course she is following.\n[흘수에 의하여 제약을 받는 선박]이라 함은 흘수로 인하여 가항수역의 수심과 폭에 여유가적어서 현재 취하고 있는 침로를 이탈할 능력이 극히 제한된 동력선을 말한다.\n3) 조종불능선: (f) The term 'vessel not under command' means a vessel which through some exceptional circumstance is unable to manoeuvre as required by these Rules and is therefore unable to keep out of the way of another vessel.\n[운전부자유선]이라 함은 어떤 예외적인 사정으로 인하여 이 규칙이 요구하는 대로 조종될수 없고, 따라서 타선의 진로를 피할 수 없는 선박을 말한다.\n4) 조종제한선: (g) The term 'vessel restricted in her ability to manoeuvre' means a vessel which from the nature of her work is restricted in her ability to manoeuvre as required by these Rules and therefore is unable to keep out of the way of another vessel. The term 'vessels restricted in their ability to manoeuvre' shall include but not be limited to;\n[조종성능이 제한된 선박]이라 함은 종사하고 있는 작업의 성질상 이 규칙이 요구하는 대로조종될 수 없고, 따라서 타선의 진로를 피할 수 없는 선박을 말한다. 다음은 `조종 성능이 제한되어 있는 선 박'에 포함되나 이에 한정되지 아니한다.\n(i) a vessel engaged in laying, servicing or picking up a navigation mark, submarine cable or pipeline;\n(ⅰ) 항로표지, 수저전선, 또는 도관의 부설보수, 또는 인양에 종사하고 있는 선박 ;\n(ii) a vessel engaged in dredging, surveying or underwater operations;\n(ⅱ) 준설, 측량, 또는 수중작업에 종사하고 있는 선박 ;\n(iii) a vessel engaged in replenishment or transferring persons, provisions or cargo while underway;\n(ⅲ) 항해하면서 해상보급 또는 인원, 식량 또는 화물의 이송에 종사중인 선박 ;\n(iv) a vessel engaged in the launching or recovery of aircraft;\n(ⅳ) 비행기의 발착에 종사하고 있는 선박 ;\n(v) a vessel engaged in mineclearance operations;\n(ⅴ) 기뢰제거 작업에 종사하고 있는 선박 ;\n(vi) a vessel engaged in a towing operation such as severely restricts the towing vessel and her tow in their ability to deviate from their course.\n(ⅵ) 예선이나 피예선이 자기의 침로에서 벗어날 수 없도록 심히 행동을 제약하는 성질의예인작업에 종사하고 있는 선박.", "id": 1075}, {"category": "COLREG!", "question": "6. 콜레그18조에서 예외인 조항 및 제외되는 의무", "answer": "제9조, 제10조 및 제13조에서 달리 규정하는 경우를 제외하고:\n(a) 항행중인 동력선은 다음 선박의 진로를 피하여야 한다:\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박;\n(ⅲ) 어로에 종사하고 있는 선박;\n(ⅳ) 범선.\n(b) 항행 중인 범선은 다음 선박의 진로를 피하여야 한다:\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박;\n(ⅲ) 어로에 종사하고 있는 선박;\n(c) 어로에 종사하고 있는 선박이 항행중에 있을 때에는 가능한 한 다음 선박의 진로를 피하여야 한다. :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박.\n(d)\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 또는 조종성능에 제한을 받고 있는 선박 이외의 선박은 상황이 허락하는 한 흘수에 제약을 받아 제28조의 신호를 표시하고 있는 선박의 안전한 통행을 방해하지 아니하도록 하여야 한다.\n(ⅱ) 흘수의 제약을 받는 선박은 자선의 특수한 조건에 충분히 유의하고 특별히 조심하여 운항하여야 한다.\n(e) 수면상에 떠있는 수상항공기는 원칙적으로 모든 선박으로부터 충분히 떨어져서 그들의 항행을 방해하지 아니하도록 하여야 한다. 다만, 충돌의 위험이 있는 경우에는 이 장의 항법규정에 따라야 한다.\n(f)\n(i) 이륙, 착륙 및 표면에 근접하여 비행시에, WIG선은 다른 모든 선박과 확실한 간격을 유지하여야 하며 그들의 항해를 방해하지 않도록 하여야 한다;\n(ii) 수면 위를 운항하는 WIG선은 동력구동 선박과 같이 이 편의 규칙을 준수하여야 한다.", "id": 1076}, {"category": "COLREG!", "question": "5. 충돌방지규칙 4조에서 19조까지의 내용을 간략하게 설명하시오", "answer": "(모든시계에 관한 조문은 몇조에서 몇조까지인지, 상호시계에 관한 조문은 몇조에서 몇조까지인지)\n제2장 항법규정 (제4조~제19조)\n제1절 모든 상태의 시계내에서의 선박의 운항 (제4조~제10조)\n제4조 적용\n제5조 견시(Look-out)\n제6조 안전속력(Safe Speed)\n제7조 충돌의 위험(Risk of Collison)\n제8조 충돌을 피하기 위한 동작(Action to avoid collison)\n제9조 협수도(Narrow Channels)\n제10조 통항분리방식(Traffic Separation Schemes)\n제2절 상호시계내에 있는 선박의 운항 (제11조~제18조)\n제11조 적용\n제12조 범선\n제13조 추월 (Overtaking)", "id": 1077}, {"category": "COLREG!", "question": "58. 섬광등, 전주등에 관하여 설명하시오.", "answer": "-충방규칙 제3장 (등화 및 형상물), 제21조 (정의)에 기술되어 있다.\n-해사안전법 제4절 (등화 와 형상물), 제79조 (등화의 종류)에 기술되어 있다.\n제79조(등화의 종류) 선박의 등화는 다음 각 호와 같다.\n5. 전주등(全周燈): 360도에 걸치는 수평의 호를 비추는 등화. 다만, 섬광등(閃光燈)은 제외한다.\n6. 섬광등: 360도에 걸치는 수평의 호를 비추는 등화로서 일정한 간격으로 1분에 120회 이상 섬광을 발하는 등\nRule 21 Definitions (e) \"All round light\" means a light showing an unbroken light over an arc of the horizon of 360 degrees.\n(f) \"Flashing light\" means a light flashing at regular intervals at a frequency of 120 flashes or more per minute.", "id": 1078}, {"category": "COLREG!", "question": "59. 전주등, 선미등, 현등의 정의를 설명하시오.", "answer": "1. 전주등: 360도의 호를 고르게 비추는 등화. 다만, 섬광등(閃光燈)은 제외한다.\n2. 선미등: 선미에 가깝게 놓인 백등. 135도의 수평의 호를 비추고 정선미로부터 각 현에 67.5도를 비춘다.\n3. 현등: 우현의 녹등, 좌현의 홍등을 말하며 각 112.5도의 수평의 호를 고르게 비추고 각 현 정횡 후 22.5도\n까지 비추도록 설치된 등화. 20미터 미만의 선박은 양현등을 선체 종방향 중심선상에 있는 하나의 등각에 합칠 수 있다.", "id": 1079}, {"category": "COLREG!", "question": "30. 추월선과 피추월선의 항법관계", "answer": "* 추월선은 추월 당하고 있는 선박을 완전히 추월하거나, 그 선박에서 충분히 멀어질 때까지 그 선박의 진로를 피해야 한다.\n* 다른 선박의 정횡으로부터 22.5도를 넘는 후방의 위치(야간에는 현등이 안보이고 선미등만 보임)로부터 그\n선박을 앞지르는 선박은 추월선이다.\n* 추월여부가 분명하지 않을 때에는 추월선으로 보아 조치를 취한다.\n* 추월시에는 상호작용을 주의한다. (서로 끌어들이는 힘)\n31. 콜레그 상호시계내에 있는 횡단상태에 관한 것 4줄의 장문을 콜레그에 써진 그대로 영작하라.\n제15조 횡단상태\n두 척의 동력선이 서로 진로를 횡단할 경우에 충돌의 위험이 있을 때에는 다른 선박을 우현측에 두고 있는\n선박이 다른 선박의 진로를 피하여야 하며, 사정이 허락하는 한, 다른 선박의 전방을 횡단하여서는 아니된다.\nRule15 Crossing Situation\nWhen two power-driven vessels are crossing so as to involve risk of collison, the vessel which has the other on her own starboard side shall keep out of the way and shall, if the circumstances of the case admit, avoid crossing ahead of the other vessel.", "id": 1080}, {"category": "COLREG!", "question": "32. 무중에서 추월을 하고 있고 전방에 마추치는 선박과 횡단하는 선박이 있다. 항법규정은?", "answer": "(본선이 제한된 시정의 협수로에서 추월 중이고 동시에 교차상태에 놓여 있을 때, 항법의 우선순위는?)\n콜레그 제13조의 추월, 제14조의 정면상태, 제15조의 횡단상태 그리고 제18조의 선박 사이의 책무에 대한 규정은 상호시계 안의 절에 포함되어 있는 항법이므로, 이 규정들은 제한시계에서는 적용이 없다. 무중이 되어 제한시계가 되면 이러한 피항선, 유지선 개념의 구별은 사라지고 양 선박 모두가 피항선이 된다. 시정이 양호한 상태에서 유지선이 무중이 되면 피항선의 지위에 있게 됨에도 여전히 자신이 유지선이라고 생각하게 되어 상대선이 피할 것을 고집하다가 충돌사고가 발생하는 경우가 많다.\n추월의 경우에 국제규칙 제3절 제19조에서의 무중항법을 적용한다면, 추월상태의 선박과 피추월상태의 선박\n모두가 피항의무를 부담하게 된다. 추월은 상호시계 안에서의 경우보다 제한시계의 경우가 더욱 위험하므로\n이러한 해석은 불합리하다는 생각이 든다. 추월상태의 선박이 더 큰 주의의무를 부담하는 것이 타당하므로,\n제한시계에서의 추월은 원칙적으로 금지된다고 해석하거나, 국제규칙 제2조가 적용되어 추월선이 더 큰 주의\n의무를 부담한다고 해석하여야 합리적이라고 생각한다. 추월규정만은 제한시계에서도 적용된다고 보는 견해도\n있다.\n협수로는 선박의 자유로운 통항이 방해받을 정도의 좁은 수로이므로 천수의 영향, 육안 효과 및 선박간섭작용을 받으므로 선박의 추월은 위험하다. 그러므로 피추월선의 동의가 있는 경우에만 추월이 허락된다. 추월에 동의한 선박은 가능하면 우측 끝단으로 이동하여 항행하고 감속하여 병행항행시간을 줄이는 것이 선원의 상무이다.\n협수로에서는 추월이 금지되므로 피추월선의 동의가 없음에도 불구하고 추월을 한다면 이는 무단추월이므로,\n추월선은 피추월선을 피하여야 할 절대적인 책임을 부담한다. 그리고 피추월선이 동의를 하게 되면 이때 비로소 제13조의 규정이 적용되어 추월선은 제13조의 추월선으로서의 주의의무를 부담하고, 피추월선은 제17조하의\n유지선의 주의의무를 부담한다고 본다.\n그런데 협수로에서의 추월규정이 상호시계 안에서만 적용되는지 아니면 제한시계내에서도 적용되는지가 의문이다. 협수로 등의 항법은 모든 시계상태의 항법이므로 원칙적으로 제한시계에서도 적용되어야 할 것이다. 그런데 제9조 e항에서 정한 음향신호는 제34조 c항 i호의 것이고, 이것은 상호시계 안에서만 적용되는 신호이므로\n추월은 상호시계 안에서만 허용된다. 가항폭이 좁은 협수로 등에서 시계가 제한된다면 추월은 더욱 위험하므로 추월이 금지되는 것으로 국제규칙은 정하고 있다고 생각된다.\n*본인이 선장이라면 감속하여 추월하는 것을 포기하고 마주치는 선박과는 좌현 대 좌현으로 통과하겠다.\n*항법 우선순위\n- 제1절 모든 상태의 시계내에서의 선박의 운항, 제9조 협수로\n- 제3절 제한시계내에서의 선박운항, 제19조 제한시계내에서의 선박운항\n- 제2절 상호시계내에 있는 선박의 운항, 제13조 추월 – 제한시계 상태이므로 이 조항은 적용이 아니 된다.", "id": 1081}, {"category": "COLREG!", "question": "33. 콜레그에서 충돌회피동작을 취하여야 하지만 부득이하게 어떠한 상황에서는 지키지 못할 수 있는데, 콜레그 몇 조에 의거하여 어떻게 하면 되는지 설명하시오.", "answer": "제2조 책임\n(a) 이 규칙의 어느 규정도 이 규칙의 이행을 태만히 한 결과 또는 선원의 통상적인 업무수행상이나 특수한\n사정에 의하여 필요로 하는 주의를 태만히 함으로써 생긴 결과에 대하여 어떠한 선박, 선박소유자, 선장 또는\n해원의 책임을 면제하여 주지 아니한다.\n(b) 이 규칙을 해석하고 실행에 옮기는데 있어서는 항해 및 충돌상의 모든 위험과 그리고 관계선박의 성능의\n한계에서 오는 사정도 포함하여 모든 특수한 사정에 대하여 합당한 주의를 하여야 하고, 그러한 위험이나 특수한 사정이 있을 때에는 절박한 위험을 피하기 위하여 이 규칙에 따르지 아니할 수도 있다.\n콜레그 18조 선박 상호간의 책임 조항에서 선박이 조종불능선이거나 조종제한선인 경우, 제27조에서 규정하는\n신호를 표시하고, 흘수 때문에 제한을 받고 있는 선박의 안전한 통행을 방해하지 않도록 하여야 한다.\n34. 제14조 정면으로 마주치는 상태 조문을 한글->영어 영작하라. (종이 제공, 종이에 상호 시계내에서란 추가 문장 있었음)\n*콜레그 제14조 마주치는 상태에서의 항법에 대하여 영어로 설명하시오.\n제14조 정면으로 마주치는 상태\n(a) 충돌의 위험이 내포되도록 2척의 동력선이 서로 반대되는 침로 또는 거의 반대되는 침로에서 마주치는\n경우에는 각 선박은 서로 다른 선박의 좌현측을 통과할 수 있도록 각기 우현측으로 변침하여야 한다.\n(b) 서로 다른 선박을 선수방향 또는 거의 선수방향에서 보는 경우 즉, 야간에는 다른 선박의 두 개의 마스트\n정부등을 일직선 또는 거의 일직선 상에서 보며 동시에 양현등을 볼 수 있는 경우, 그러한 마스트 정부등이나\n또는 양현등 만을 볼 수 있는 경우, 그리고 주간에 있어서는 다른 선박의 상응하는 면을 보는 경우에는 정면으로 마주치는 상태가 존재한다고 보아야 한다.\n(c) 그러한 상태가 존재하는가의 여부에 관하여 의문이 있는 선박은 정면으로 마주치는 상태에 있다고 생각하고 행동하여야 한다.\nRule 14 Head-on situation\n(a) When two power-driven vessles are meeting on reciprocal or nearly reciprocal courses so as to involve risk of collision each shall alter her course to starboard so that each shall pass on the port side of the other.\n(b) Such a situation shall be deemed to exist when a vessel sees the other ahead or nearly ahead and by night she could see the masthead lights of the other in a line or nearly in a line and/or both sidelights and by day she observes the corresponding aspect of the other vessel.\n(c) When a vessel is in any doubt as to whether such a situation exists she assume that it does exist and act accordingly.", "id": 1082}, {"category": "COLREG!", "question": "35. 콜레그 제14조 마주치는 상태에서의 항법에 대하여 설명하시오.", "answer": "제14조 정면으로 마주치는 상태\n(a) 충돌의 위험이 내포되도록 2척의 동력선이 서로 반대되는 침로 또는 거의 반대되는 침로에서 마주치는 경우에는 각 선박은 서로 다른 선박의 좌현측을 통과할 수 있도록 각기 우현측으로 변침하여야 한다.\n(b) 서로 다른 선박을 선수방향 또는 거의 선수방향에서 보는 경우 즉, 야간에는 다른 선박의 두 개의 마스트\n정부등을 일직선 또는 거의 일직선 상에서 보며 동시에 양현등을 볼 수 있는 경우, 그러한 마스트 정부등이나 또는 양현등 만을 볼 수 있는 경우, 그리고 주간에 있어서는 다른 선박의 상응하는 면을 보는 경우에는 정면으로 마주치는 상태가 존재한다고 보아야 한다.\n(c) 그러한 상태가 존재하는가의 여부에 관하여 의문이 있는 선박은 정면으로 마주치는 상태에 있다고 생각하고 행동하여야 한다.\n*참고: 정면으로 마주치는 경우라 함은 양선의 침로가 정반대이고 양현등이 동시에 보이거나 또는 양선의 침로가 6o 이내의 각도로 반대방향으로 교차하며 양현등이 동시에 보이는 경우이다. 물론 주간에는 위에 상응한 면을 보이는 경우를 말한다.", "id": 1083}, {"category": "COLREG!", "question": "36. 콜레그 중 제15조는 무슨 조항이며 간단히 설명하시오.", "answer": "횡단상태(Crossing situation)의 항법규정이고 내용은 두 척의 동력선이 서로 진로를 횡단할 경우에 충돌의 위험이\n있을 때에는 다른 선박을 우현측에 두고 있는 선박이 다른 선박의 진로를 피하여야 하며 사정이 허락하는 한\n다른 선박의 선수 전방을 횡단하여서는 아니된다.", "id": 1084}, {"category": "COLREG!", "question": "37. 콜레그 제15조 횡단상태에서의 항법에 대하여 영어로 설명하시오.", "answer": "제15조 횡단상태\n두 척의 동력선이 서로 진로를 횡단할 경우에 충돌의 위험이 있을 때에는 다른 선박을 우현측에 두고 있는 선박이 다른 선박의 진로를 피하여야 하며, 사정이 허락하는 한, 다른 선박의 전방을 횡단하여서는 아니된다.\nRule15 Crossing Situation\nWhen two power-driven vessels are crossing so as to involve risk of collison, the vessel which has the other on her own starboard side shall keep out of the way and shall, if the circumstances of the case admit, avoid crossing ahead of the other vessel.", "id": 1085}, {"category": "COLREG!", "question": "39. 콜레그 제16조 피항선의 동작에 대해서 설명하시오.", "answer": "제 16조 피항선의 동작\n이 규칙에 의하여 다른 선박의 진로를 피하여야 할 선박은 타선을 확실하게 피할 수 있도록 가능한 조기에 충분한 동작을 취하여야 한다.\n*참고", "id": 1086}, {"category": "COLREG!", "question": "1. 피항선이 취하여야 할 피항동작", "answer": "피항선이 피항을 목적으로 하는 동작에는 일반적으로 다음의 세가지가 있다.\n1) 방향을 바꾼다.\n2) 속력을 줄인다.\n3) 방향도 바꾸고 속력도 줄인다.\n속력을 높이는 방법도 있지만 이것은 대개의 경우 가장 나쁜 동작이 된다. 횡단의 경우에는 정면으로 마주치는 경우나 추월의 경우와 달라서 규칙에서는 구체적인 피항동작은 피항선의 조선자가 잘 알아서 최선의 피항동작을 취할 수 밖에 없다. 이것에 대하여는 전적으로 피항선의 조선자에게 일임하고 있다. 그러나 한 가지는 있다.\n사정이 허락하는 한 유지선의 진로를 횡단하는 것은 하지 말라는 것이다.", "id": 1087}, {"category": "COLREG!", "question": "2. 피항동작의 요건", "answer": "1) 조기에 행하라: 이것은 서로 오해가 있었을 때 그 오해에서 빠져 나올 수 있는 정도의 시간과 공간의 여유를 두고 하라는 것이다.\n2) 충분한 동작으로 행한다: 변침을 하든, 감속을 하든 또는 양자를 동시에 하든간에 충분하게 하여 자기의\n의도를 명백하게 표시 하라는 것이다.\n3) 합규칙적인 동작으로 행하라: 합규칙적인 선박운항은 good seamanship의 일차적인 요건이 되는 것이다.\n예를들면 피항선이 속력을 올려서 유지선의 진로 전방을 거의 확실하게 횡단 할 수 있지만 오히려 감속을 하여 유지선이 지나갈 때까지 기다렸다가 그 뒤를 항과하는 것, 또는 입항선이 빨리 입항하면 출항선이 출항하기 전에 충분히 입항이 되겠지만 출항선이 완전히 출항 할 때까지 항구 밖에서 기다린다던가 하는 것 등이다.\n4) good seamanship을 발휘하여 행하라: 상황이 확실하지 아니할 때에는 무엇보다도 속력을 줄이는 것이 good\nSeamanship의 첫째 요건이다.", "id": 1088}, {"category": "COLREG!", "question": "3. 횡단선의 정의", "answer": "추월의 경우와 정면으로 마주치는 경우를 제외한 경우에 충돌의 위험이 생기는 진행선간의 조우자세는 야간에는 한쪽 선박은 반드시 다른쪽 선박의 마스트정부등과 한쪽 현등을 서로 볼 수 있는 자세가 된다. 낮에는 반드시\n각기 서로 상이한 현측을 보면서 접근하게 된다. 상이한 현측을 보면서 접근한다 할지라도 충돌의 위험이 없는 경우에는 처음부터 항법규칙을 적용할 필요가 없는 경우이다.", "id": 1089}, {"category": "COLREG!", "question": "4. 본 항법의 적용한계", "answer": "본 조의 항법적용은 다음과 같은 경우는 그 적용에 제한이 있다.\n1) 사실적인 적용조건이 갖추어 있지 아니할 때; 의 예)\n가. 후진중인 선박 간 또는 후진중인 선박과 전진중인 선박간에는 적용이 곤란하다.\n나. 지금 막 양묘를 끝 마치거나 부두를 이안 중인 선박과 다른 항행선박간에는 규칙의 적용이 사실상 곤란하다.\n2) 지방의 특별법규에 의하여 적용이 배제될 때; 의 예)\n가. 선박의 입항 및 출항 등에 관한 법률에 의한 배제\nㄱ. 대형선과 소형잡종선이 항내를 항행할 때에는 본 조의 적용은 없고 소형잡종선이 대형선을 피하여야 한다.\nㄴ. 항로 내를 항행중인 선박과 항로를 들어 오거나 나가는 선박 사이에는 본 조의 적용은 없고 항로를 진입 또는 이탈하는 선박이 항로내를 항행하는 타 선박을 피하여야 한다;\nㄷ. 방파제 부근에서 출항선과 입항선이 만날 때에는 본 조의 적용은 없고 입항선이 출항선을 피하여야 한다.\n나. 기타 지방의 특별규칙이 있을 때에는 그 특별규칙에 따라야 한다.", "id": 1090}, {"category": "COLREG!", "question": "40. 피항선/유지선을 영어로? 대답 후 관련된 충방 규칙 질문함.", "answer": "1) 피항선: Give-way Vessel\n2) 유지선: Stand-on Vessel", "id": 1091}, {"category": "COLREG!", "question": "1. 피항선이 피해야 할 동작", "answer": "1) 사정이 허락하는 한 유지선의 진로를 횡단하는 것은 하지 말아야 한다.\n2) 피항동작을 조기에 시행하지 않는 것. 즉, 서로 오해가 있었을 때 그 오해에서 빠져 나올 수 있는 정도의\n시간과 공간의 여유를 두고 피항 동작을 하지 않는 행동을 하지 말 것\n3) 충분한 동작으로 시행하지 않는 것. 변침을 하든, 감속을 하든 또는 양자를 동시에 하든간에 충분하게 하여\n자기의 의도를 명백하게 표시 하라는 것이다.", "id": 1092}, {"category": "COLREG!", "question": "2. 유지선이 피해야 할 동작", "answer": "1) 피항선의 피항동작이 불충분하여 유지선이 자선만의 피항동작으로 충돌 위험을 피하려고 동작을 취할 때에는,\n사정이 허락하는 한, 좌현측에 있는 선박을 피하기 위하여 좌현으로 변침하여서는 아니 된다.", "id": 1093}, {"category": "COLREG!", "question": "42. 콜레그 제17조 유지선의 동작 내용을 설명하시오.", "answer": "*콜레그에서 유지선이 취해야 하는 적절한 조치에 대해 말하시오.\n제17조 유지선의 동작\n(a) (i) 두 선박중의 한 선박이 다른 선박의 진로를 피하여야 할 경우 다른 선박은 그 침로 및 속력을 유지하여야 한다.\n(a) (ii) 그러나 유지선은 진로를 피하여야 할 선박이 이 규칙에 따른 적절한 동작을 취하지 아니하고 있음이 분명하여지는 즉시로 자선의 조종만으로 충돌을 피하기 위한 동작을 취할 수 있다.\n(b) 이유는 불문하고 침로와 속력을 유지하여야 할 선박은, 양선이 아주 가까이 접근하였기 때문에, 피항선의\n동작만으로 충돌을 피할 수 없다고 판단할 때에는 충돌을 피하기 위한 최선의 협력동작을 취하여야 한다.\n(c) 횡단 상태에서 다른 동력선과 충돌을 피하기 위하여 이 조문 (a)항 (ii)의 규정에 따라 동작을 취하는 선박은 상황이 허락하는 한, 자선의 좌현측에 있는 선박을 피하기 위하여 좌현측으로 변침하여서는 아니된다.\n(d) 이 조문은 피항선에게 진로를 피하여야 할 의무를 면제하는 것은 아니다.\nRule 17 Action by Stand-on Vessel\n(a) (i) Where one of two vessels is to keep out of the way the other shall keep her course and speed\n(a) (ii) The latter vessel may however take action to avoid collison by her manoeuvre alone, as soon as it becomes apparent to her that the vessel required to keep out of the way is not taking appropriate action in compliance with these Rules.\n(b) When, from any cause, the vessel required to keep her course and speed finds herself so close that collision cannot be avoided by the action of the give-way vessel alone, she shall take such action as will best aid to avoid collision.\n(c) A power-driven vessel which takes action in a crossing situation in accordance with sub-paragraph (a) (ii) of the Rules to avoid collision with another power driven vessel shall, if the circumstances of the case admit, not alter course to port for a vessel on her own port side.\n(d) This Rule does not relieve the give-way vessel of her obligation to keep out of the way.", "id": 1094}, {"category": "COLREG!", "question": "1. 동일 수직 선상에 2개의 마스트 정부등 (백등)", "answer": "예선의 선미로부터 피예물의 후부단까지 측정한 예인의 길이가 200미터를 초과할 때에는 동일 수직 선상에\n3개의 마스트 정부등(백등)", "id": 1095}, {"category": "COLREG!", "question": "4. 선미등의 상부에 수직으로 하나의 예인등 (황색등)", "answer": "5. 예인의 길이가 200미터를 초과할 때에는 가장 잘 보이는 장소에 하나의 다이아몬드 형상물\n*피예선 또는 피예물은 다음 각호를 표시하여야 한다.", "id": 1096}, {"category": "COLREG!", "question": "2. 선미등", "answer": "3. 예인의 길이가 200미터를 초과할 때에는 가장 잘 보이는 장소에 하나의 다이아몬드 형상물", "id": 1097}, {"category": "COLREG!", "question": "63. 길이 30미터 도선선이 도선 업무 종사시 등화 표시를 말하시오.", "answer": "마스트 꼭대기 또는 그 부근에 수직선상으로 상(백색), 하(홍색)인 전주등 2개\n항행 중에는 1에 부가하여 양현등과 선미등\n정박 중에는 1에 부가하여 정박등 등화", "id": 1098}, {"category": "COLREG!", "question": "45. 콜레그 중 제한시계 내에서의 선박의 항법에 대해 설명하시오.", "answer": "1. 모든 선박은 시계가 제한된 그 당시의 상태에서 적합한 안전속력으로 항행해야 한다. 동력선은 즉시 조작할 수 있도록 기관의 준비태세를 갖춰야 한다.\n2. 모든 선박은 모든 시계내의 항법규정을 이행함에 있어서 시계가 제한된 당시의 상황과 상태에 충분히 유의하여야 한다.\n3. 레이더만으로 다른 선박이 존재함을 탐지한 선박은 근접상태의 형성과 충돌의 위험 또는 충돌의 위험이\n있는가의 여부를 결정하여야 한다. 그러한 위험이 있으면 충분한 시간을 두고 회피동작을 취하여야 한다.\n그러한 동작이 변침만으로 이루어질 경우에는 가능한 한 다음과 같은 동작은 피하여야 한다.\n1) 추월당하고 있는 선박에 대한 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여\n좌현측으로 변침하는 일\n2) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침하는 일\n4. 충돌의 위험이 없다고 인정되었을 경우를 제외하고 자선의 정횡의 전방으로 믿어지는 곳에서 다른 선박의\n무중신호를 듣거나 또는 그 정횡의 전방에 있는 다른 선박과 근접상태를 면할 수 없는 모든 선박은 자선의\n침로를 유지함에 필요한 최저한도의 속력으로 감속하여야 한다. 필요하다면 모든 타력을 없이 하여야 하고\n어떠한 경우에도 충돌의 위험이 사라질 때까지 극도로 조심하여 운항하여야 한다", "id": 1099}, {"category": "COLREG!", "question": "46. 콜레그 제한시계 항법중 하지 말아야 할 것 2가지를 말하시오.", "answer": "1. 추월 당하고 있는 선박에 대한 경우를 제외하고, 자선의 정횡의 전방에 있는 선박에 대하여 왼쪽으로 침로를 변경하는 일", "id": 1100}, {"category": "COLREG!", "question": "47. 제한시계에서 가장 먼저 해야 할 일이 무엇인가?", "answer": "안전속력으로 항해, 동력선은 기관을 즉시 조작할 수 있도록 준비, 레이더만으로 다른 선박이 존재함을 탐지한 선박은 충분히 여유있는 시기에 피항동작을 취해야 한다.", "id": 1101}, {"category": "COLREG!", "question": "48. 콜레그 제19조 제한된 시계에서의 선박의 항법에 대해서 설명하시오.", "answer": "제19조 제한시계내에서의 선박운항\n(a) 이 조문은 선박이 상호 시계내에 있지 아니하고 시계가 제한된 상태하에 놓여있는 수역 또는 그 부근에서\n운항하는 경우에 적용된다.\n(b) 모든 선박은 시계가 제한된 그 당시의 상황과 상태에 적합한 안전한 속력으로 항행하여야 한다. 동력선은\n즉시 조작할 수 있도록 기관의 준비태세를 갖추어야 한다.\n(c) 모든 선박은 이 장 제1절 항법규정을 이행함에 있어서 시계가 제한된 당시의 상황과 상태에 충분히 유의하여야 한다.\n(d) 레이다만으로 다른 선박이 존재함을 탐지한 선박은 근접상태의 형성이 조성되고, 충돌의 위험이 실재하고\n있는가의 여부를 결정하여야 한다. 그러한 위험이 있으면 충분한 시간을 두고 회피동작을 취하여야 한다. 다만, 그러한 동작이 변침만으로 이루어질 경우에는 가능한 한 다음과 같은 동작은 피하여야 한다.\n(i) 추월당하고 있는 선박에 대한 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여 좌현측\n으로 변침하는 일\n(ii) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침하는 일\n(e) 충돌의 위험이 없다고 인정되었을 경우를 제외하고, 자선의 정횡의 전방으로 믿어지는 곳에서 다른 선박의 무중신호를 듣거나 또는 그 정횡의 전방에 있는 다른 선박과 근접상태를 면할 수 없는 모든 선박은 자선의\n침로를 유지함에 필요한 최저한도의 속력으로 감속하여야 한다. 필요하다면 모든 타력을 없이 하여야 하고 어떠한 경우에도 충돌의 위험이 사라질 때까지 극도로 조심하여 운항하여야 한다.", "id": 1102}, {"category": "COLREG!", "question": "1. 선박이 서로 시계 내에 있지 않은 경우에 적용", "answer": "2. 시계 제한 상황에 적합한 안전한 속력으로 항행, 동력선은 기관을 즉시 사용할 수 있도록 준비", "id": 1103}, {"category": "COLREG!", "question": "3. 시계가 제한된 당시의 사정과 조건을 충분히 고려할 것", "answer": "4. 레이더만으로 타 선박을 탐지한 선박은 근접상태, 충돌의 위험성을 판단하여야 한다.\n1) 피항 동작은 충분히 여유 있는 시간에 행하여야 한다.\n2) 침로의 변경만으로 이루어 질 경우 피하여야 할 동작\n- 자선의 정횡 전방에 있는 선박에 대해 왼쪽으로 침로 변경\n- 정횡 또는 정횡 후방에 있는 선박의 방향으로 침로 변경\n5. 자선의 정횡 전방이라고 생각되는 곳에서 다른 선박의 안개신호를 듣는 선박 또는 자선의 정횡의 전방에 있는 다른 선박과의 근접상태를 피할 수 없는 모든 선박은 자선의 침로를 유지할 수 있는 최소의 속력으로 감속하여야 한다. 필요하다면 진행을 완전히 멈추어야 하고 충돌의 위험이 사라질 때까지 극히 조심하여 항행하여야 한다.\n* 제한된 시계내에서 오직 타만 사용하여 충돌을 피하는 방법 방법 2가지\n(d) 레이다만으로 다른 선박이 존재함을 탐지한 선박은 근접상태의 형성이 조성되고, 충돌의 위험이 실재하고\n있는가의 여부를 결정하여야 한다. 그러한 위험이 있으면 충분한 시간을 두고 회피동작을 취하여야 한다. 다만, 그러한 동작이 변침만으로 이루어질 경우에는 가능한 한 다음과 같은 동작은 피하여야 한다.\n(i) 추월당하고 있는 선박에 대한 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여 좌현측으로 변침하는 일\n(ii) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침하는 일", "id": 1104}, {"category": "COLREG!", "question": "64. 제한시계의 음향신호 중에서 조종불능선과 도선선의 음향신호를 말하시오.", "answer": "제35조 제한시계내에서의 음향신호\n제한시계내의 수역내 또는 그 부근에 있어서, 주야를 막론하고 이 조문에 규정된 신호는 다음과 같이 사용되어야\n한다.\na. 대수속력이 있는 동력선은 2분을 초과하지 아니하는 간격으로 장음 1회를 울리어야 한다.\nb. 항해중 정선하여 대수속력이 없는 동력선은 장음 간격을 약 2초로 하여 장음 2회를 2분을 초과하지 아니하는 간격으로 울리어야 한다.\nc. 운전부자유선, 조종성능이 제한된 선박, 자선의 흘수로 인하여 제한을 받는 선박, 범선, 어로에 종사하고 있는 선박 및 타선을 예인하거나 또는 밀고 있는 선박은 이 조문 (a)항 또는 (b)항에 규정된 신호대신에 2분간을\n초과하지 아니하는 간격으로 연속 3음, 즉 장음 1회에 이어 단음 2회를 울리어야 한다.\nd. 어로에 종사하면서 닻을 내리고 있는 선박과 작업을 수행하면서 닻을 내리고 있어서 기동성에 크게 제한을\n받는 선박은 이 조문의 (g)항에 규정된 신호대신에 이 조문 (c)항에 규정된 음향신호를 발하여야 한다.\ne. 피예인선박 또는 2척 이상의 선박이 피예인되는 경우에는 그 예인의 최후단 선박은, 승조원이 승선하고 있는 경우, 2분을 초과하지 아니하는 간격으로 4회의 연속음, 즉 장음 1회에 단음 3회를 울리어야 한다. 실행가능한\n경우 본 신호는 예인선이 신호를 한 직후 하여야 한다.\nf. 전방으로 밀고 있는 선박 및 밀리고 있는 선박이 견고하게 연결되어 복합체로 되어 있는 경우, 이들은 1척의 동력선으로 간주되며 이 조문 (a) 및 (b)항에 규정된 신호를 하여야 한다.\ng. 정박중인 선박은 1분을 초과하지 아니하는 간격으로 약 5초동안 급속히 호종을 울리어야 한다.\n길이 100미터 이상의 선박에 있어서 호종은 선박의 전부에서 울리어야 하며 이 호종을 울린 직후 선박의\n후부에서 징을 약 5초동안 울리어야 한다.\n정박중인 동력선은 이에 부가하여 접근하는 선박에 대하여 자선의 위치 및 충돌의 가능성을 경고하기 위하여 연속된 3음, 즉 단음, 장음, 단음을 울릴 수 있다.\nh. 좌초선은 호종신호 및 요구되는 경우 이 조문 (g)항에 규정된 동라신호를 하여야 하며, 이에 부가하여, 급속히 울린 호종음의 직전 및 직후에 각각 분리되어 명확하게 3회 타종하여야 한다. 좌초선은 이에 부가하여 적절한 기적신호를 할 수 있다.\ni. 길이 12미터 이상 20미터 미만의 선박은 이 조 (g) 및 (h)항에 규정된 호종신호를 하지 아니하여도 된다.\n그러나 호종신호를 하지 않을 때는 2분을 넘지 아니하는 간격으로 다른 유효한 신호를 하여야 한다.\nj. 길이 12미터 미만의 선박은 위의 신호를 의무적으로 할 필요는 없으나 이들 신호를 하지 아니하는 경우, 2분을 초과하지 아니하는 간격으로 기타 유효한 음향신호를 하여야 한다.\nk. 도선업무에 종사하고 있는 경우의 도선선은 이 조문 (a)항, (b)항 또는 (g)항에 규정된 신호에 부가하여, 단음\n4회로 된 식별신호를 할 수 있다.", "id": 1105}, {"category": "COLREG!", "question": "65. 콜레그 제34조 ‘조종 및 경고신호’에 대해 설명하시오.", "answer": "○2 추월신호: 좁은 수로 또는 안전항로 내에서 서로 시계내에 있을 때만\n-우현측 추월의사: 장, 장, 단\n-좌현측 추월의사: 장, 장, 단, 단\n-피추월선의 동의 신호: 장, 단, 장, 단\n○3 경고신호: 상호시계 내에서만, 접근선의 의도 또는 조치에 대해 이해할 수 없거나 의심스러운 경우 짧고\n급속한 단음 5회 이상, 추가로 섬광 5회 이상 보충 가능\n○4 굴곡부 신호: 수로, 항로에 있어 장애물 때문에 상대선박을 볼 수 없는 수역에 접근시\n- 굴곡부 신호: 장음 1회\n- 응답 신호: 장음 1회", "id": 1106}, {"category": "COLREG!", "question": "66. 추월신호, 추월동의 신호에 대하여 설명하시오.", "answer": "제34조 조종 및 경고신호\n(a) 선박이 상호시계내에 있는 경우 항해중인 동력선은 이 규칙에 의하여 인정되거나 또는 요구되는 조종을 할 때에는 기적으로 다음 신호를 하여 그 조종을 표시하여야 한다;\n- 단성 1발 ‘본선은 우현으로 변침 중임’을 뜻한다;\n- 단성 2발 ‘본선은 좌현으로 변침 중임’을 뜻한다;\n- 단성 3발 ‘본선은 후진 추진을 사용 중임’을 뜻한다;\n(b) 모든 선박은 조종을 하고 있는 동안 발광신호를 적절하게 반복하여 이 조문 (a)항에 규정된 기적신호를 보충 할 수 있다.\n(i) 이 발광신호는 다음의 의미를 갖는다;\n- 섬광 1회 ‘본선은 우현으로 변침 중임’을 뜻한다;\n- 섬광 2회 ‘본선은 좌현으로 변침 중임’을 뜻한다;\n- 섬광 3회 ‘본선은 후진 추진을 사용 중임’을 뜻한다;\n(ii) 각 섬광의 지속시간은 약 1초이고, 섬광간의 간격은 약 1초이며, 연속신호간의 간격은 10초 이상이어야\n한다.\n(iii) 이 신호로 사용되는 발광은 설비되는 경우, 전주를 비추는 백광이어야 하고, 최소의 시인거리가 5마일\n이어야 하며, 이 규칙 부속서 I의 규정과 일치하여야 한다.\n(c) 협수도 또는 항로내에서 상호시계내에 있는 경우;\n(i) 타선을 추월하고자 하는 선박은, 제9조 (e) (i)에 따라 기적으로 다음 신호를 하여 자선의 의사를 표시하여\n야 한다.\n- 장음 2발, 단음 1발 ‘본선은 귀선의 우현측으로 추월하고자 함’을 뜻한다.\n- 장음 2발, 단음 2발 ‘본선은 귀선의 좌현측으로 추월하고자 함’을 뜻한다.\n(ii) 피추월 선박은 제9조 (e) (i)에 따라 행동을 할 때에는 기족으로 다음 신호를 하여 자선의 동의를 표시하\n여야 한다;\n-장음, 단음, 장음, 단음\n(d) 시계내에 있는 선박이 서로 접근하고 있을 때, 어떠한 사유로 인하여 한 선박이 다른 선박의 의도 또는\n행동을 알지 못하는 경우 또는 충돌을 회피하기 위하여 다른 선박이 충분한 조치를 취하고 있는지의 여부가\n의심스러운 경우는, 의심을 하는 선박은 기적으로 적어도 5회의 짧고 급속한 음향을 취명하여 그와 같은 의문을 즉시 표시하여야 한다. 그와 같은 신호는 적어도 5회의 짧고 급속한 섬광의 발광신호로써 보충될 수 있다.\n(e) 중간에 개재하는 장애물로 인하여 다른 선박을 볼 수 없는 만곡부 또는, 협수도 또는 항로의 수역에\n접근하는 선박은 1회의 장음을 취명하여야 한다. 반대편 만곡부 또는 중간 장애물 뒤에서 접근하는 선박은\n그러한 신호를 들었을 때에는 동일한 장음 1회의 신호로 응답하여야 한다.\n(f) 100미터가 넘은 거리에 둘 이상의 기적을 설치하고 있는 선박은 조종 및 경고신호를 울릴 때에는 기적\n1개만을 사용하여야 한다.", "id": 1107}, {"category": "COLREG!", "question": "67. 정박선의 무중신호에 대해서 설명하시오.", "answer": "제35조 제한시계내에서의 음향신호\n(g) 정박중인 선박은 1분을 초과하지 아니하는 간격으로 약5초동안 급속히 호종을 울리어야 한다. 길이 100미터 이상의 선박에 있어서, 호종은 선박의 전부에서 울리어야 하며 이 호종을 울린 직후 선박의 후부에서 동라(징)을 약 5초동안 급속히 울리어야 한다. 정박중인 동력선은 이에 부가하여, 접근하는 선박에 대하여 자선의 위치 및 충돌의 가능성을 경고하기 위하여 연속된 3음, 즉, 단음, 장음, 단음을 울릴 수 있다.", "id": 1108}, {"category": "COLREG!", "question": "68. 콜레그 중 주의환기신호에 대해서 설명하시오.", "answer": "주의환기신호란 다른 선박의 주의를 환기할 필요가 있을 때에 상대선박에게 보내는 신호를 말한다. 발광 또는\n음향 신호를 하거나 다른 선박에 지장을 주지 않는 범위내에서 탐조등을 비출 수도 있다.\n경고신호는 의무적으로 하여야하나 주의환기신호는 임의 신호인 점이 특징이다.\n제36조 다른 선박의 주의를 환기할 필요가 있을 경우에는, 모든 선박은, 이 규칙의 다른 조항에서 정한 신호와 오인되지 아니하는 방법으로, 발광이나 음향신호를 내거나 위험이 있는 쪽으로 탐조등을 비출 수 있다. 타선박의 주의를 환기시키기 위한 어떤 등화도 항로표지 등으로 오인될 수 없는 것이어야 한다. 이 조문의 설치목적에\n비추어 볼때 스트로브등화와 같은 고광도의 간헐적인 등화 또는 회전등 등의 사용은 피하여야 한다.", "id": 1109}, {"category": "COLREG!", "question": "69. 콜레그 중 경고신호에 대해서 설명하시오.", "answer": "제34조 조종 및 경고신호\n(d) 시계내에 있는 선박이 서로 접근하고 있을 때, 어떠한 사유로 인하여 한 선박이 다른 선박의 의도 또는\n행동을 알지 못하는 경우 또는 충돌을 회피하기 위하여 다른 선박이 충분한 조치를 취하고 있는지의 여부가\n의심스러운 경우는, 의심을 하는 선박은 기적으로 적어도 5회의 짧고 급속한 음향을 취명하여 그와 같은 의문을 즉시 표시하여야 한다. 그와 같은 신호는 적어도 5회의 짧고 급속한 섬광의 발광신호로써 보충될 수 있다.\n*보충\n이것은 임의 규정이 아니기 때문에 반드시 그렇게 하여야 하고 그래도 상대선이 계속하여 피항동작을 취하지\n아니하면 계속하여 의문신호를 울리는 것이 실제의 관행이다. 피항선, 유지선 여부와 관계없이 의문이 있는\n선박이면 모두 의문신호를 할 수 있다.", "id": 1110}, {"category": "COLREG!", "question": "1. 단음 5회", "answer": "콜레그 제34조 조종 및 경고신호\n(d) 시계내에 있는 선박이 서로 접근하고 있을 때, 어떠한 사유로 인하여 한 선박이 다른 선박의 의도 또는 행동을 알지 못하는 경우 또는 충돌을 회피하기 위하여 다른 선박이 충분한 조치를 취하고 있는지의 여부가 의심스러운 경우는, 의심을 하는 선박은 기적으로 적어도 5회의 짧고 급속한 음향을 취명하여 그와 같은 의문을 즉시 표시하여야 한다. 그와 같은 신호는 적어도 5회의 짧고 급속한 섬광의 발광신호로써 보충될 수 있다.", "id": 1111}, {"category": "COLREG!", "question": "2. 장음 5회", "answer": "개항의 항계내에서 선박에 화재가 발생시 장음 5회를 울립니다.", "id": 1112}, {"category": "COLREG!", "question": "73. 상호시계 내에서 경고신호를 말하시오.", "answer": "접근선의 의도 또는 조치에 대해 이해할 수 없거나 의심스러운 경우 짧고 급속한 단음 5회 이상, 추가로 섬광\n5회 이상 보충 가능하다.", "id": 1113}, {"category": "COLREG!", "question": "75. 콜레그 중 2분을 넘지 않는 간격으로 장음 1회 단음 2회의 음향신호를 내면 무엇을 의미하는가?", "answer": "제한된 시계에서 조종성능제한선과 흘수제약선의 음향신호이다.", "id": 1114}, {"category": "COLREG!", "question": "76. 콜레그에 나와있는 조난 신호를 보내는 방법 5가지 이상 말하라", "answer": "제 4 장 음향 및 발광신호\n제37조(조난신호) 선박이 조난을 당하여 구조를 요청할 때에는 이 규칙 부속서 Ⅳ에 규정된 신호를 사용하거나 표시하여야 한다.\n부속서 Ⅳ\n조난신호\n1. 다음 각 호의 신호는 함께 또는 단독으로 사용되어서 조난 및 구원의 필요를 알리는 신호이다:\n(a) 약 1분간의 간격으로 행하는 1회의 발포 기타 폭발에 의한 신호;\n(b) 무중신호장치에 의한 연속음향신호;\n(c) 짧은 시간 간격으로 1회에 1개씩 발사되어 별 모양의 붉은 불꽃을 발하는 로켓트 또는 유탄에 의한 신호;\n(d) 기타의 신호 방법에 의한 모올스부호 …---…(SOS)의 신호;\n(e) 무선전화에 의한 '메이데이'라는 말의 신호;\n(f) 국제기류신호에 의한 NC의 조난신호;\n(g) 상방 또는 하방에 구 또는 이와 유사한 것 1개를 붙인 4각형 기로 된 신호;\n(h) 선상에서의 발연(타르통, 기름통 등의 연소로 생기는) 신호;\n(i) 낙하산이 달린 적색의 염화 로켓트 또는 적색의 수동 염화에 의한 신호;\n(j) 오렌지색의 연기를 발하는 발연신호;\n(k) 좌우로 벌린 팔을 천천히 반복하여 올렸다. 내렸다 하는 신호;\n(l) DSC를 이용한 조난신호(VHF CH 70 또는 MF/HF);\n(m) Inm을 통한 선박 육상간 조난신호 또는 다른 위성 전화 서비스를 통한 조난신호;\n(n) 비상위치지시를 하는 레디오비이콘에서 발사하는 신호;\n(o) 구명정의 레이더 자동응답장치를 포함하여 무선통신장치에 의하여 송신된 인정된 신호;", "id": 1115}, {"category": "COLREG!", "question": "3. 국제신호서, 상선탐색 및 구조편람의 해당절 및 다음 신호에 유의하라:", "answer": "(a) 흑색 4각형과 동시에 원을 그린 것 또는 기타 적절한 표시를 한 오랜지색의 범포신호\n(항공기에서의 식별을 위한 것);\n(b) 착색도구에 의한 물의 착색신호;", "id": 1116}, {"category": "COLREG!", "question": "1. 적용요건", "answer": "1) 시계가 제한된 수역에서 서로 볼 수 없을 것\n2) 선박이 항행중에 있을 것\n3) 선박의 종류에 구애받지 않을 것", "id": 1117}, {"category": "COLREG!", "question": "2. 항법의 기본원칙", "answer": "1) 안전한 속력으로 항행할 것\n2) 기관을 즉시 사용할 수 있도록 준비할 것\n3) '모든 시계상태에 있어서의 항법' 의 주의규정을 지킬 것\n4) 레이더 항법을 실행할 것\n5) 주야에 관계없이 무중신호를 발할 것", "id": 1118}, {"category": "COLREG!", "question": "3. 침로만의 피항 동작 시 제한 규정", "answer": "1) 정횡 전방에 있는 다른 선박에 대해 - 왼쪽으로 침로 변경 금지\n2) 정횡 또는 정횡 후방에 있는 선박에 대해 - 선박의 방향으로 침로 변경 금지", "id": 1119}, {"category": "COLREG!", "question": "78. 항해중의 의미", "answer": "*충방규칙\n(i) The word \"underway\" means that a vessel is not at anchor, or made fast to the shore, or aground.\n*해사안전법", "id": 1120}, {"category": "COLREG!", "question": "22. \"항행 중\"이란 선박이 다음 각 목의 어느 하나에 해당하지 아니하는 상태를 말한다.", "answer": "가. 정박(碇泊)\n나. 항만의 안벽(岸壁) 등 계류시설에 매어 놓은 상태[계선부표(繫船浮標)나 정박하고 있는 선박에 매어 놓은 경우를 포함한다\n다. 얹혀 있는 상태", "id": 1121}, {"category": "COLREG!", "question": "79. 해사안전법상 국제규칙에 없는 정의 항목", "answer": "①\"항로지정제도\"라 함은 선박이 통항하는 항로, 속력, 기타 선박 운항에 관한 사항을 지정하는 제도를 말한다. 특히 교통안전특정해역 외의 해역으로서 그 해역의 지형, 조류, 기타 자연적인 조건 등으로 해양사고가 발생할 우려가 있다고 인정되는 경우에 그 해역의 범위, 선박의 항로 및 속력 등 선박의 항행안전에 필요한 사항을 정하고 있다.\n②\"거대선\"이라 함은 길이 200m 이상의 선박을 말한다. 국제규칙에서는 거대선의 개념을 규정하지 않고 대신 흘수가 깊어서 선박의 조종성에 제약을 받는 흘수제약선을 규정하고 있다.\n③\"위험화물운반선\"이란 선체의 한 부분인 화물창(貨物倉)이나 선체에 고정된 탱크 등에 해양수산부령으로 정하는 위험물을 싣고 운반하는 선박을 말한다.\n④\"고속여객선\"이라 함은 시속 15노트 이상의 속력으로 항행하는 여객선을 말한다.\n⑤\"선박교통관제\"란 선박교통의 안전 및 효율성을 증진하고 해양환경과 해양시설을 보호하기 위하여 선박의 위치를 탐지하고 선박과 통신할 수 있는 설비를 설치·운영함으로써 선박의 동정을 관찰하며 선박에 대하여 안전에 관한 정보를 제공하는 것을 말한다.\n⑥\"항행장애물\"(航行障碍物)이란 선박으로부터 떨어진 물건, 침몰·좌초된 선박 또는 이로부터 유실(遺失)된 물건 등 해양수산부령으로 정하는 것으로서 선박항행에 장애가 되는 물건을 말한다.", "id": 1122}, {"category": "COLREG!", "question": "80. COLREG와 선박입출항법의 차이를 설명하시오.", "answer": "(선박입출항법, 해사안전법, 콜레그의 적용 수역을 말하시오)\n1. 선박입출항법: 무역항의 수상구역, 무역항의 수상구역 밖의 수역시설 (정박지, 채널 등)\n2. 해사안전법: 대한민국의 영해, 내수 (해상 항행선박이 항행을 계속할 수 있는 수역)\n3. 콜레그: 외양항행선이 항행할 수 있는 해양과 이와 접속한 모든 수역이나 각국 정부가 제정한 특별규칙이\n우선된다.", "id": 1123}, {"category": "COLREG!", "question": "81. 콜레그 적용수역과 적용선박을 말하시오.", "answer": "1) 적용수역: 선박이 항행할 수 있는 해양 및 이것과 접속하는 모든 수역에 대하여 적용된다. 따라서 해양은 물론, 항만, 하천, 호수일지라도 해양에 접속하고 선박이 항해할 수 있는 수역인 이상 이 규칙이 적용된다.\n2) 적용선박: 외양항행선이 항행할 수 있는 해양과 이와 접속한 모든 수역의 수상에 있는 모든 선박에 적용한다.\n[추가 질문] 선박입출항법과 해사안전법의 적용 수역을 말하시오.\n1) 선박입출항법: 무역항의 수상구역, 무역항의 수상구역 밖의 수역시설(정박지, 채널 등)\n2) 해사안전법: 대한민국의 영해, 내수 (해상 항행선박이 항행을 계속할 수 있는 수역)", "id": 1124}, {"category": "COLREG!", "question": "82. When calling the master의 상황을 영어로 말하시오.", "answer": "1) If restricted visibility is encounted or expected\n2) If trafiic conditions, density or the movement of other ships are causing concern\n3) When a distress alert has been received or a distress signal has been sighted\n4) If difficulties are experienced in maintaining course\n5) When there is a significant difference between the latest observed position and the expected position of the ship\n6) On failure to sight land, a navigation mark or obtain soundings by the expected time\n7) If, unexpectedly, land or a navigation mark is sighted or an unexptected change in soundings occur\n8) If amendments to the passage plan require immediate approval\n9) If there is a breakdown of the engines, propulsion machinery remote control, steering gear or any essential navigational equipment, alarm or indicator\n10) If the communications or GMDSS radio equipment malfuntions\n11) In heavy weather, if any doubt the possibility of weather damage\n12) If the ship meets any hazard to navigation, such as ice or a derelict\n13) If any vessel security concerns arise(i.e. Piracy)\n14) In any emergency situation", "id": 1125}, {"category": "COLREG!", "question": "83. COLREG에서 규칙의 이탈을 허용하는 조항과 그 예시를 말하시오.", "answer": "PART E / Rules 38 – Exeptions (예외)\n정리 및 요약: 1960년의 콜레그의 요구조건에 일치된다는 조건하에 이 조약이 실시되기 이전에 용골이 놓였거나, 또는 건조단계에 있는 선박 (또는 유형의 선박)은 다음과 같이 규칙의 적용에서 유보될 수 있다.\n*그 중 유효한 조항은,\n(c) 인치 단위에서 미터 단위로 바꾸고 남는 끝 수치 때문에 생기는 등화의 재배치는 영구히 유보\n(d) (i)이 규칙 부속서 I의 3절(a)항에 규정한 결과에 의하여, 길이 150미터 미만의 선박의 마스트 정부 등을\n재배치 하는 것은 영구히 면제\n(h) 이 규칙 부속서 I의 9절(b)항의 규정에 의한 전주 등의 재배치는 영구히 면제한다.\n규칙에 준한 선박과 콜레그 1972가 발효될 때 이미 건조되었거나 건조 중이었던 선박은 일정 기간 동안 음향 및 등신호에 대한 몇몇 규칙을 면제 받는다.", "id": 1126}, {"category": "COLREG!", "question": "57. 등화의 표시", "answer": "제81조(항행 중인 동력선)\n① 항행 중인 동력선은 다음 각 호의 등화를 표시하여야 한다.\n1. 앞쪽에 마스트등 1개와 그 마스트등보다 뒤쪽의 높은 위치에 마스트등 1개. 다만, 길이 50미터 미만의 동력선은 뒤쪽의 마스트등을 표시하지 아니할 수 있다.\n2. 현등 1쌍(길이 20미터 미만의 선박은 이를 대신하여 양색등을 표시할 수 있다. 이하 이 절에서 같다)", "id": 1127}, {"category": "COLREG!", "question": "3. 선미등 1개", "answer": "② 수면에 떠있는 상태로 항행 중인 해양수산부령으로 정하는 선박은 제1항에 따른 등화에 덧붙여 사방을 비출 수 있는 황색의 섬광등 1개를 표시하여야 한다. <개정 2013.3.23.>\n③ 수면비행선박이 비행하는 경우에는 제1항에 따른 등화에 덧붙여 사방을 비출 수 있는 고광도 홍색 섬광등 1개를 표시하여야 한다.\n④ 길이 12미터 미만의 동력선은 제1항에 따른 등화를 대신하여 흰색 전주등 1개와 현등 1쌍을 표시할 수 있다.\n⑤ 길이 7미터 미만이고 최대속력이 7노트 미만인 동력선은 제1항이나 제4항에 따른 등화를 대신하여 흰색 전주등 1개만을 표시할 수 있으며, 가능한 경우 현등 1쌍도 표시할 수 있다.\n⑥ 길이 12미터 미만인 동력선에서 마스트등이나 흰색 전주등을 선수와 선미의 중심선상에 표시하는 것이 불가능할 경우에는 그 중심선 위에서 벗어난 위치에 표시할 수 있다. 이 경우 현등 1쌍은 이를 1개의 등화(燈火)로 결합하여 선수와 선미의 중심선상 또는 그에 가까운 위치에 표시하되, 그 표시를 할 수 없을 경우에는 될 수 있으면 마스트등이나 흰색 전주등이 표시된 선으로부터 가까운 위치에 표시하여야 한다.\n제82조(항행 중인 예인선)\n① 동력선이 다른 선박이나 물체를 끌고 있는 경우에는 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 제81조 제1항 제1호에 따라 앞쪽에 표시하는 마스트등을 대신하여 같은 수직선 위에 마스트등 2개. 다만, 예인선의 선미로부터 끌려가고 있는 선박이나 물체의 뒤쪽 끝까지 측정한 예인선열의 길이가 200미터를 초과하면 같은 수직선 위에 마스트등 3개를 표시하여야 한다.", "id": 1128}, {"category": "COLREG!", "question": "4. 선미등의 위쪽에 수직선 위로 예선등 1개", "answer": "5. 예인선열의 길이가 200미터를 초과하면 가장 잘 보이는 곳에 마름모꼴의 형상물 1개\n② 다른 선박을 밀거나 옆에 붙여서 끌고 있는 동력선은 다음 각 호의 등화를 표시하여야 한다.\n1. 제81조 제1항 제1호에 따라 앞쪽에 표시하는 마스트등을 대신하여 같은 수직선 위로 마스트등 2개", "id": 1129}, {"category": "COLREG!", "question": "3. 선미등 1개", "answer": "③ 끌려가고 있는 선박이나 물체는 다음 각 호의 등화나 형상물을 표시하여야 한다.", "id": 1130}, {"category": "COLREG!", "question": "2. 선미등 1개", "answer": "3. 예인선열의 길이가 200미터를 초과하면 가장 잘 보이는 곳에 마름모꼴의 형상물 1개\n④ 2척 이상의 선박이 한 무리가 되어 밀려가거나 옆에 붙어서 끌려갈 경우에는 이를 1척의 선박으로 보고 다음 각 호의 등화를 표시하여야 한다.", "id": 1131}, {"category": "COLREG!", "question": "2. 옆에 붙어서 끌려가고 있는 선박은 선미등 1개와 그의 앞쪽 끝에 현등 1쌍", "answer": "⑤ 일부가 물에 잠겨 잘 보이지 아니하는 상태에서 끌려가고 있는 선박이나 물체 또는 끌려가고 있는 선박이나 물체의 혼합체는 제3항에도 불구하고 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 폭 25미터 미만이면 앞쪽 끝과 뒤쪽 끝 또는 그 부근에 흰색 전주등 각 1개\n2. 폭 25미터 이상이면 제1호에 따른 등화에 덧붙여 그 폭의 양쪽 끝이나 그 부근에 흰색 전주등 각 1개\n3. 길이가 100미터를 초과하면 제1호와 제2호에 따른 등화 사이의 거리가 100미터를 넘지 아니하도록 하는 흰색 전주등을 함께 표시\n4. 끌려가고 있는 맨 뒤쪽의 선박이나 물체의 뒤쪽 끝 또는 그 부근에 마름모꼴의 형상물 1개. 이\n경우 예인선열의 길이가 200미터를 초과할 때에는 가장 잘 볼 수 있는 앞쪽 끝 부분에 마름모꼴의 형상물 1개를 함께 표시한다.\n⑥ 끌려가고 있는 선박이나 물체에 제3항 또는 제5항에 따른 등화나 형상물을 표시할 수 없는 경우에는 끌려가고 있는 선박이나 물체를 조명하거나 그 존재를 나타낼 수 있는 가능한 모든 조치를 취하여야 한다.\n⑦ 통상적으로 예인작업에 종사하지 아니한 선박이 조난당한 선박이나 구조가 필요한 다른 선박을 끌고 있는 경우로서 제1항이나 제2항에 따른 등화를 표시할 수 없을 때에는 그 등화들을 표시하지 아니할 수 있다. 이 경우 끌고 있는 선박과 끌려가고 있는 선박 사이의 관계를 표시하기 위하여 끄는 데에 사용되는 줄을 탐조등으로 비추는 등 제94조에 따른 가능한 모든 조치를 취하여야 한다.\n⑧ 밀고 있는 선박과 밀려가고 있는 선박이 단단하게 연결되어 하나의 복합체를 이룬 경우에는 이를 1척의 동력선으로 보고 제81조를 적용한다.\n제83조(항행 중인 범선 등)\n① 항행 중인 범선은 다음 각 호의 등화를 표시하여야 한다.", "id": 1132}, {"category": "COLREG!", "question": "2. 선미등 1개", "answer": "② 항행 중인 길이 20미터 미만의 범선은 제1항에 따른 등화를 대신하여 마스트의 꼭대기나 그 부근의 가장 잘 보이는 곳에 삼색등 1개를 표시할 수 있다.\n③ 항행 중인 범선은 제1항에 따른 등화에 덧붙여 마스트의 꼭대기나 그 부근의 가장 잘 보이는 곳에 전주등\n2개를 수직선의 위아래에 표시할 수 있다. 이 경우 위쪽의 등화는 붉은색, 아래쪽의 등화는 녹색이어야 하며, 이 등화들은 제2항에 따른 삼색등과 함께 표시하여서는 아니 된다.\n④ 길이 7미터 미만의 범선은 될 수 있으면 제1항이나 제2항에 따른 등화를 표시하여야 한다. 다만, 이를 표시하지 아니할 경우에는 흰색 휴대용 전등이나 점화된 등을 즉시 사용할 수 있도록 준비하여 충돌을 방지할 수 있도록 충분한 기간 동안 이를 표시하여야 한다.\n⑤ 노도선(櫓櫂船)은 이 조에 따른 범선의 등화를 표시할 수 있다. 다만, 이를 표시하지 아니하는 경우에는 제4항 단서에 따라야 한다.\n⑥ 범선이 기관을 동시에 사용하여 진행하고 있는 경우에는 앞쪽의 가장 잘 보이는 곳에 원뿔꼴로 된 형상물 1개를 그 꼭대기가 아래로 향하도록 표시하여야 한다.\n제84조(어선)\n① 항망(桁網)이나 그 밖의 어구를 수중에서 끄는 트롤망어로에 종사하는 선박은 항행에 관계없이 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 수직선 위쪽에는 녹색, 그 아래쪽에는 흰색 전주등 각 1개 또는 수직선 위에 2개의 원뿔을 그 꼭대기에서 위아래로 결합한 형상물 1개\n2. 제1호의 녹색 전주등보다 뒤쪽의 높은 위치에 마스트등 1개. 다만, 어로에 종사하는 길이 50미터 미만의 선박은 이를 표시하지 아니할 수 있다.\n3. 대수속력이 있는 경우에는 제1호와 제2호에 따른 등화에 덧붙여 현등 1쌍과 선미등 1개\n② 제1항에 따른 어로에 종사하는 선박 외에 어로에 종사하는 선박은 항행 여부에 관계없이 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 수직선 위쪽에는 붉은색, 아래쪽에는 흰색 전주등 각 1개 또는 수직선 위에 두 개의 원뿔을 그 꼭대기에서 위아래로 결합한 형상물 1개\n2. 수평거리로 150미터가 넘는 어구를 선박 밖으로 내고 있는 경우에는 어구를 내고 있는 방향으로 흰색 전주등 1개 또는 꼭대기를 위로 한 원뿔꼴의 형상물 1개\n3. 대수속력이 있는 경우에는 제1호와 제2호에 따른 등화에 덧붙여 현등 1쌍과 선미등 1개\n③ 트롤망어로와 선망어로(旋網漁撈)에 종사하고 있는 선박에는 제1항과 제2항에 따른 등화 외에 해양수산부령으로 정하는 추가신호를 표시하여야 한다. <개정 2013.3.23.>\n④ 어로에 종사하고 있지 아니하는 선박은 이 조에 따른 등화나 형상물을 표시하여서는 아니 되며, 그 선박과 같은 길이의 선박이 표시하여야 할 등화나 형상물만을 표시하여야 한다\n제85조(조종불능선과 조종제한선)\n① 조종불능선은 다음 각 호의 등화나 형상물을 표시하여야 한다.", "id": 1133}, {"category": "COLREG!", "question": "2. 가장 잘 보이는 곳에 수직으로 둥근꼴이나 그와 비슷한 형상물 2개", "answer": "3. 대수속력이 있는 경우에는 제1호와 제2호에 따른 등화에 덧붙여 현등 1쌍과 선미등 1개\n② 조종제한선은 기뢰제거작업에 종사하고 있는 경우 외에는 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 가장 잘 보이는 곳에 수직으로 위쪽과 아래쪽에는 붉은색 전주등, 가운데에는 흰색 전주등 각 1개\n2. 가장 잘 보이는 곳에 수직으로 위쪽과 아래쪽에는 둥근꼴, 가운데에는 마름모꼴의 형상물 각 1개\n3. 대수속력이 있는 경우에는 제1호에 따른 등화에 덧붙여 마스트등 1개, 현등 1쌍 및 선미등 1개\n4. 정박 중에는 제1호와 제2호에 따른 등화나 형상물에 덧붙여 제88조에 따른 등화나 형상물\n③ 동력선이 진로로부터 이탈능력을 매우 제한받는 예인작업에 종사하고 있는 경우에는 제82조 제1항에 따른 등화나 형상물에 덧붙여 제2항 제1호와 제2호에 따른 등화나 형상물을 표시하여야 한다.\n④ 준설(浚渫)이나 수중작업에 종사하고 있는 선박이 조종능력을 제한받고 있는 경우에는 제2항에 따른 등화나 형상물을 표시하여야 하며, 장애물이 있는 경우에는 이에 덧붙여 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 장애물이 있는 쪽을 가리키는 뱃전에 수직으로 붉은색 전주등 2개나 둥근꼴의 형상물 2개\n2. 다른 선박이 통과할 수 있는 쪽을 가리키는 뱃전에 수직으로 녹색 전주등 2개나 마름모꼴의 형상물 2개\n3. 정박 중인 때에는 제88조에 따른 등화나 형상물을 대신하여 제1호와 제2호에 따른 등화나 형상물\n⑤ 잠수작업에 종사하고 있는 선박이 그 크기로 인하여 제4항에 따른 등화와 형상물을 표시할 수 없으면 다음 각 호의 표시를 하여야 한다.\n1. 가장 잘 보이는 곳에 수직으로 위쪽과 아래쪽에는 붉은색 전주등, 가운데에는 흰색 전주등 각 1개\n2. 국제해사기구가 정한 국제신호서(國際信號書) 에이(A) 기(旗)의 모사판(模寫版)을 1미터 이상의 높이로 하여 사방에서 볼 수 있도록 표시\n⑥ 기뢰제거작업에 종사하고 있는 선박은 해당 선박에서 1천미터 이내로 접근하면 위험하다는 경고로서 제81조에 따른 동력선에 관한 등화, 제88조에 따른 정박하고 있는 선박의 등화나 형상물에 덧붙여 녹색의 전주등 3개 또는 둥근꼴의 형상물 3개를 표시하여야 한다. 이 경우 이들 등화나 형상물 중에서 하나는 앞쪽 마스트의 꼭대기 부근에 표시하고, 다른 2개는 앞쪽 마스트의 가름대의 양쪽 끝에 1개씩 표시하여야 한다.\n⑦ 길이 12미터 미만의 선박은 잠수작업에 종사하고 있는 경우 외에는 이 조에 따른 등화와 형상물을 표시하지 아니할 수 있다.\n제86조(흘수제약선)\n흘수제약선은 제81조에 따른 동력선의 등화에 덧붙여 가장 잘 보이는 곳에 붉은색 전주등 3개를 수직으로 표시하거나 원통형의 형상물 1개를 표시할 수 있다.\n제87조(도선선)\n① 도선업무에 종사하고 있는 선박은 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 마스트의 꼭대기나 그 부근에 수직선 위쪽에는 흰색 전주등, 아래쪽에는 붉은색 전주등 각 1개", "id": 1134}, {"category": "COLREG!", "question": "2. 항행 중에는 제1호에 따른 등화에 덧붙여 현등 1쌍과 선미등 1개", "answer": "3. 정박 중에는 제1호에 따른 등화에 덧붙여 제88조에 따른 정박하고 있는 선박의 등화나 형상물\n② 도선선이 도선업무에 종사하지 아니할 때에는 그 선박과 같은 길이의 선박이 표시하여야 할 등화나 형상물을 표시하여야 한다.\n제88조(정박선과 얹혀 있는 선박)\n① 정박 중인 선박은 가장 잘 보이는 곳에 다음 각 호의 등화나 형상물을 표시하여야 한다.", "id": 1135}, {"category": "COLREG!", "question": "2. 선미나 그 부근에 제1호에 따른 등화보다 낮은 위치에 흰색 전주등 1개", "answer": "② 길이 50미터 미만인 선박은 제1항에 따른 등화를 대신하여 가장 잘 보이는 곳에 흰색 전주등 1개를 표시할 수 있다.\n③ 정박 중인 선박은 갑판을 조명하기 위하여 작업등 또는 이와 비슷한 등화를 사용하여야 한다. 다만, 길이 100미터 미만의 선박은 이 등화들을 사용하지 아니할 수 있다.\n④ 얹혀 있는 선박은 제1항이나 제2항에 따른 등화를 표시하여야 하며, 이에 덧붙여 가장 잘 보이는 곳에 다음 각 호의 등화나 형상물을 표시하여야 한다.", "id": 1136}, {"category": "COLREG!", "question": "2. 수직으로 둥근꼴의 형상물 3개", "answer": "⑤ 길이 7미터 미만의 선박이 좁은 수로 등 정박지 안 또는 그 부근과 다른 선박이 통상적으로 항행하는 수역이 아닌 장소에 정박하거나 얹혀 있는 경우에는 제1항과 제2항에 따른 등화나 형상물을 표시하지 아니할 수 있다.\n⑥ 길이 12미터 미만의 선박이 얹혀 있는 경우에는 제4항에 따른 등화나 형상물을 표시하지 아니할 수 있다.\n제89조(수상항공기 및 수면비행선박)\n수상항공기 및 수면비행선박은 이 절에서 규정하는 특성을 가진 등화와 형상물을 표시할 수 없거나 규정된 위치에 표시할 수 없는 경우 그 특성과 위치에 관하여 될 수 있으면 이 절에서 규정하는 것과 비슷한 등화나 형상물을 표시하여야 한다\n10.GMDSS/EPIRB/SOPEP ...FULL NAME으로...이상 전부입니다.\nshipboard oil pollution and emergency response plan\nglobal marine distress and safety system\nsearch and rescue radar transponder\nemergency position indicating radio beacon", "id": 1137}, {"category": "기타(선체정비)", "question": "81. 리더쉽과 헤드쉽은 무엇이고 그 차이는 무엇인가.", "answer": "1) 리더쉽은 조직을 자발적으로 따르게 하고 움직이게 하는 힘이 있다.\n2) 헤드쉽은 직권만으로 조직을 움직이려는 것이다.\n3) 헤드쉽과 리더쉽은 다 같이 권위를 바탕으로 하고 있다. 그러나 그 권위가 어디에 근거한 것이냐에 따라\n차이가 있다. 헤드쉽은 한 조직의 고위관리자라는 공식적인 직위와 권한에 근거한 권위에 의하여 발취되는\n것이나, 리더쉽은 그러한 직권과는 관계없이 사람 자체에 근거한 권위에 의하여 발휘될 수 있다는 점에서 차이가\n있다.", "id": 1138}, {"category": "기타(선체정비)", "question": "1. SNAP BACK ZONE의 개념과 선박에서 어떻게 조치를 하는가?", "answer": "1) 개념\n장력이 걸려있는 Rope가 파단되면서 Swing하는 Zone을 뜻한다. 선박에서는 통상 정박 중인 선박의 Mooring Hawser Rope가 파단되면서 인명피해를 입힐 수 있는 Swing Zone을 의미한다.\n2) 조치\n선수, 선미 Station에 Snap Back Zone을 Marking 한다.\n또한 System을 통한 Rope의 주기적인 점검 및 교체 등 Rope 상태를 지속 관리한다.\n2. 도선사용 사다리 관련 최대허용각 및 컴비네이션라다 설치 시 로프라다의 스텝의 간격\n* 컴비네이션라다 설치 기준 및 최대 허용각\n건현이 9m 이상일 때 accommodation ladder를 Combination으로 설치하여야 한다.\naccommodation ladder의 설치각은 최대 45도를 넘지 않아야 한다.\n* 로프라다의 스텝 기준\nSpreader는 일정한 간격으로 설치되어 파일럿 라다가 꼬이는 것을 막아주는 역할을 합니다.\nSpreader는 그 폭이 최소 1.8m이상이어야 하고, 제일 아래의 Spreader는 맨 아래 스텝으로부터 5번째에 설치 되어야 하고 Spreader간의 최대 간격은 9step 이하라고 규정되어 있습니다.\nIMO Resolution A.1045(27)\nAdopted on 30 November 2011 (Agenda item 9)\nPILOT TRANSFER ARRANGEMENTS\nAnnex RECOMMENDATION ON PILOT TRANSFER ARRANGEMENTS\n2.1.4 Pilot ladders with more than five steps should have spreader steps not less than 1.8 m long provided at such intervals as will prevent the pilot ladder from twisting.\nThe lowest spre+ader step should be the fifth step from the bottom of the ladder and the interval between any spreader step and the next should not exceed nine steps.\n*참고자료\nPilot boarding arrangements generally consists of a pilot ladder and in case of excessive freeboard (greater than 9m), combination ladder (a combination of the pilot ladder and accommodation ladder). The pilot normally boards on the lee side of the ship. Therefore pilot ladder and accommodation ladder should be ready for use on either side of the ship.\n도선사 승하선 수단은 Pilot Rope Ladder와 건현이 9M이상일 경우에는 Combination Ladder로 구성 됩니다.\n도선사는 일반적으로 풍하측으로 승선하므로 Pilot Rope Ladder와 Combination Ladder는 양현 어느 쪽에서도\n사용할 수 있어야 합니다.\nFollowing are the specifications required for boarding arrangements for pilots in accordance with SOLAS:\n다음은 SOLAS에 따른 도선사 탑승 준비에 필요한 사양입니다.\n1. Rigging of pilot ladders for freeboards of 9 meters or less\n건현이 9M이하일 때 Pilot Rope Ladder 설치\n1) The steps of pilot ladder are generally made of hardwood and should be made in one piece, free of knots or any irregularities. It should be free of any sharp edges\n1) Pilot Rope Ladder의 Step은 일반적으로 딱딱한 나무이며 매듭이나 요철이 없는 한 조각으로 만들어져야\n합니다. 날카로운 모서리가 없어야 합니다.\n2) The steps should be horizontal and should rest firmly against the ship’s side\n2) Step은 수평이어야 하며 선박 측면에 단단히 고정되어야 합니다.\n3) The last four steps of the pilot ladder should be made of rubber as they are vulnerable to failure on being squeezed between the ship’s side and the pilot boat. The 5th step from bottom must be a spreader. The spreader prevents the pilot ladder from twisting. It should be minimum 180 cm. long. Maximum 9 steps are allowed between 2 spreaders. The spreaders should not be lashed between the steps\n3) Pilot Rope Ladder의 마지막 4개의 Step은 선박과 Pilot boat 사이에서 압착될 수 있기 때문에 고무로 만들어져 있어야 합니다. 마지막에서 5번째 Step은 Spreader여야 합니다. Spreader는 Pilot Rope Ladder가 비틀리지 않도록 해줍니다. 이 Spreader는 최소 180cm 이어야 합니다. Spreader의 간격은 최대 9개 Step 입니다.\n4) The surface of the steps must provide a safe and slip resistant foothold. Use of ordinary paints resulting in slippery surfaces should be prohibited\n4) Step의 표면은 안전하고 미끄러지지 않아야 합니다. 표면을 미끄럽게 하는 일반 페인트의 사용은 금합니다.\n5) 2 continuous side ropes of minimum 18 mm in diameter should run on either side of the ladder. These are Manila ropes. The gap between the side ropes should not be less than 40 cm. The steps should be 115 mm wide and 25 mm in depth. The steps are equally spaced and the distance between each step should not be more than 35 cm or less than 31 cm.\n5) 최소 18mm 직경의 연속 측면 로프 2 개가 사다리의 양쪽에 연결되어야 합니다. 이 로프의 재질은 마닐라\n로프입니다. 측면 로프 사이의 간격은 40cm 이상이어야 합니다. Step의 세로는 115mm, 높이는 25mm 이어야\n합니다. Step은 간격이 동일하며 각 Step 사이의 간격은 35cm 이하, 31cm 이상 이어야 합니다.\n6) The pilot ladder should be permanently marked at regular intervals so that it can be rigged to the required height without any difficulty\n6) Pilot Rope Ladder는 일정한 간격으로 영구적으로 제작되어 필요한 높이에 따라 어려움 없이 설치될 수 있어야 합니다.\n7) 2 man ropes should be kept at hand ready for immediate use. The diameter of man-ropes should not be less than 28mm. It is used at the request of the pilots\n7) 맨 로프 2 개를 즉시 사용할 수 있도록 준비해야 합니다. 맨 로프 직경은 28mm 이상 이어야 합니다.\n도선사의 요구가 있을 때 사용됩니다.\n8) The distance between the sea level and the lower end of the pilot ladder depends on the size of the pilot boat being used. This is decided by the pilot. The officer in charge should confirm beforehand rigging the pilot ladder. In no case shall the lower end of the pilot ladder become awash in the water\n8) 해수면과 Pilot Rope Ladder 하단 사이의 거리는 Pilot Boat의 크기에 따라 달라지게 됩니다. 이것은 Pilot에\n의해 결정됩니다. 담당자는 Ladder를 내리기 전에 미리 확인해야 합니다. 어떤 경우에도 Pilot Rope Ladder의 하단이 물에 닿아서는 안됩니다.\n9) The head of the pilot ladder should be rigidly secured to the deck. Adequate handholds should be provided to ensure safe and convenient passage from the head of the pilot ladder and the ship’s deck. These handholds should be minimum 70 cm and maximum 80 cm apart\n9) Pilot Rope Ladder의 상단 부분은 Deck상에 단단히 고정되어야 합니다. Deck에서 안전하고 편리한 통로를\n확보 할 수 있도록 적절한 손잡이를 제공해야 합니다. 이 손잡이는 최소 70cm, 최대 80cm 떨어져 있어야\n합니다.\n2. Combination arrangement for ships with a freeboard of more than 9 meters\n건현이 9M이상일 때 Combination Ladder 추가 설치\n1) The accommodation ladder should be sited leading aft so that the pilot boat does not get in below the accommodation ladder when the ship is proceeding forward\n1) 선박이 전진 중일 때 Pilot Boat가 Combination Ladder 아래로 들어 가지 않도록 Combination Ladder는\n선미를 향하도록 배치해야 합니다.\n2) The accommodation ladder should be secured to the ship’s side\n2) Combination Ladder는 선박의 측면에 고정되어야 합니다.\n3) The angle of slope of the accommodation ladder used in conjunction with the pilot ladder shall never exceed 45 degrees.\n3) Combination Ladder의 경사각은 45도를 초과해서는 안됨.\n4) The lower platform of the accommodation ladder shall be so adjusted that it is in a horizontal position. It should be at a minimum of 5 m above the sea level\n4) Combination Ladder의 하부 플랫폼은 수평이 되도록 조정해야 하며 이는 해수면으로부터 5m 이상이어야\n합니다.\n5) The platform and the ladder should be equipped with stanchions and should be fitted with suitable fencing preferably rigid handrails or hand rope for safe access\n5) 하부플랫폼과 Combination Ladder에는 stanchion이 장착되어 있어야 하며 안전을 위해 단단한 난간 또는\n핸드 로프가 장착되어야 합니다.\n6) The pilot ladder should be rigged adjacent to the lower platform of the accommodation ladder and should extend at least 2 meters above the lower platform\n6) Pilot Rope Ladder는 Combination Ladder의 하부 플랫폼에 인접하여 rigging되어야 하며 하부 플랫폼보다\n2m 이상 연장되어야 합니다.\n7) The pilot ladder must be firmly attached to the ship’s side 1.5 meters above the accommodation platform\n7) Pilot Rope Ladder는 Combination Ladder 플랫폼의 1.5m 위에 선박 측에 단단히 고정되어야 합니다.\n8) It is recommended that a 9 meter mark be indicated so that the pilot can readily find whether the distance from the sea level to the point of access exceeds 9 meter or not\n8) 해수면에서 접근 지점까지의 거리가 9 미터를 초과하는지 여부를 도선사가 쉽게 알 수 있도록 9 미터 표시를 권장합니다.", "id": 1139}, {"category": "기타(선체정비)", "question": "3. Use Of Winch Reels", "answer": "윈치 릴 사용\n1) When winch reels are used for lowering pilot ladder the construction should be at such a position so that it will not obstruct the safe access to and from the ship.\n1) Pilot Rope Ladder를 내리기 위해 윈치 릴을 사용하는 경우, 선박과의 안전한 접근을 방해하지 않는 구조로\n되어있어야 합니다.\n2) Even if pilot ladder is stowed on a winch reel, pilot ladder should always be secured to a strong point which is independent of the pilot ladder winch reel.\n2) Pilot Rope Ladder가 윈치 릴에 적재되어 있더라도 Pilot Rope Ladder는 항상 Pilot Rope Ladder Winch Reel과 무관한 지점에 단단히 고정되어야 합니다.\n3) Pilot ladder winch reels can be operated either manually or by electric, hydraulic or pneumatic means.\n3) Pilot Ladder Winch Reel은 수동 또는 전기, 유압 또는 공기압으로 작동 할 수 있습니다.\n4) All pilot ladder winch reels should have a means of prevention from being accidentally operated.\n4) 모든 Pilot Ladder Winch Reel에는 실수로 작동되는 것을 방지 할 수 있는 수단이 있어야 합니다.", "id": 1140}, {"category": "기타(선체정비)", "question": "5. Pilot Transfer By Helicopter", "answer": "1) In some places today pilots may use a helicopter for boarding and disembarking. However such a transfer should be carried out only when it can be conducted safely. It is important that the pilots are trained in helicopter flight procedures, embarkation and disembarkation including winching and safety and emergency drills before undertaking helicopter transfers.\n1) 오늘날 일부 지역에서는 도선사 승하선을 위해 헬리콥터를 사용합니다. 그러나 이러한 수단은 안전이 확보된 때에만 수행해야 합니다. 도선사는 헬리콥터 승하선 전에 윈치 및 안전 및 비상 훈련을 포함하여 헬리콥터 비행 절차, 승선 및 하선 훈련을 받는 것이 중요합니다.\n2) A pilot should wear proper personal protective equipment especially life jacket and ear protection when in the helicopter. It is also important to train and brief the deck crew before a helicopter transfer is conducted. All duties should be assigned prior to the arrival of the helicopter. The deck crew should take every measure to ensure the safe landing of the helicopter. Any loose object in the operation area should be secured.\n2) 도선사는 헬리콥터에 있을 때 적절한 개인 보호 장비, 특히 구명 조끼와 귀 보호 장치를 착용해야 합니다.\n헬리콥터 승하선 전에 갑판 승무원을 훈련시키고 브리핑하는 것도 중요합니다. 모든 임무는 헬리콥터 도착 전에 배정되어야 합니다. 갑판 승무원은 헬리콥터가 안전하게 착륙 할 수 있도록 모든 조치를 취해야 합니다. 작업\n영역에 움직일만한 물체가 있으면 고정시켜야 합니다.\n3) Deck crew should keep in mind the dangers of static discharges from the winch cable. It is therefore important to ground the cable line before the cable is captured and offered to the pilot to avoid any injury. The officer of the watch should be in continuous contact with the helicopter pilot. Instructions should be clear and understood.\n3) 갑판 승무원은 윈치 케이블의 정전기 위험을 염두에 두어야 합니다. 따라서 부상을 피하기 위해 도선사에게 제공하기 전에 케이블 라인을 접지하는 것이 중요합니다. 당직사관은 헬리콥터 조종사와 지속적으로 연락해야\n합니다. 지침은 명확하고 이해되어야 합니다.\n4) A proper risk assessment should be carried out before a helicopter transfer takes place so that any threats to the activity can be identified and mitigated and control measures can be taken.\n4) 헬리콥터 운송이 시작되기 전에 적절한 위험 평가를 수행하여 활동에 대한 위협을 식별하고 완화하고 통제 조치를 취할 수 있도록 해야 합니다.\n5. Precautions to be taken during embarkation and disembarkation of pilots\n조종사 승선 및 하선시 주의 사항\n1) The access area shall be kept free and clear at all times and can also be marked with permanent signs\n1) 접근 구역은 항상 자유롭고 깨끗해야 하며 영구적으로 표시 되어 있어야 합니다.\n2) The pilot ladder should be checked after it is rigged preliminary to ensure it is properly secured to the ship by a crew member by descending few steps. While doing so safety should not be jeopardised. The crew member should always take care of their own safety wearing a life jacket and a life line if appropriate\n2) 본선 선원은 파일럿 사다리가 본선에 올바르게 고정되었는지 확인해야 합니다. 그렇게 하는 동안 안전에\n이상이 없어야 합니다. 승무원은 항상 구명 조끼와 구명줄을 착용하고 자신의 안전을 관리해야 합니다.\n3) The duty officer should closely monitor continuously and observe the pilot all the time while he is on the ladder. He should always remain in contact with the bridge via walkie talkie, report every event and inform the bridge at once on the safe arrival of pilot onboard\n3) 당직사관은 지속적으로 면밀히 모니터링하고 도선사 사다리에 있는 동안 계속해서 관찰해야 합니다.\n워키토키를 통해 선교와 연락을 유지하고, 모든 관련 사항을 보고하고, 본선에 도선사가 안전하게 도착할 때까지 선교에 보고해야 합니다.\n4) A canvas bag or net and a rope should be kept ready at the embarkation position to hoist aboard any baggage the pilot might have with him\n4) 도선사가 가지고 있을 수 있는 모든 수하물을 받을 수 있도록 캔버스 가방 또는 그물과 밧줄을 준비해야\n합니다.\n5) A pilot dedicated lifebuoy with water actuated automatic light and lifeline should be readily available\n5) 자기점화등이 있는 구명환, 구명줄을 즉시 이용할 수 있어야 합니다.\n6) If a retrieval line is being used, care should be taken that it does not hinder the pilot nor obstruct the safe approach of the pilot boat.\n6) 회수 라인을 사용하는 경우, 파일럿을 방해하거나 파일럿 보트의 안전한 접근을 방해하지 않도록 주의해야\n합니다.\n7) At night the access area should be well illuminated to facilitate safe boarding and deboarding\n7) 밤에는 접근 구역을 밝게 비추어 안전한 탑승 및 탑승을 용이하게 합니다.\n8) A spare ladder should always be available onboard\n8) 여분의 사다리는 항상 선상에 있어야 합니다.\n9) Pilot ladders remain the most efficient way for pilots to board vessels. The transfer of a pilot between pilot boat and ship is a significant risk that needs to be carefully managed\n9) 파일럿 사다리는 도선사가 선박에 탑승하는 가장 효율적인 방법입니다. 파일럿 보트와 선박 사이의 파일럿\n이동은 신중하게 관리해야 하는 중대한 위험작업 입니다.\n10) Periodic inspection of the boarding arrangement, especially the pilot ladder should be an ongoing process and should be inculcated into the planned maintenance system onboard ships\n10) 탑승 준비, 특히 Pilot Ladder의 정기 점검이 이루어져야 하며 PMS 시스템에 포함되어야 합니다.\n11) Each pilot ladder, accommodation ladder and its associated equipments should be properly checked and stowed after every use.\n11) 모든 Pilot Rope Ladder, Combination Ladder 및 관련 장비는 매번 사용 후 올바르게 점검하고 보관해야\n합니다.\n12) Ropes should also be checked for any kind of deterioration.\n12) 로프의 열화 여부도 점검해야 합니다.\n13) It is important that seafarers are appropriately trained in the correct rigging of pilot transfer arrangements to avoid any accidents.\n13) 선원들은 사고를 피하기 위해 도선사 승하선 장치의 올바른 설치에 대해 적절하게 훈련을 받는 것이\n중요합니다.\n3. Pilot Ladder의 기준 중 Combination Ladder를 설치하는 기준 (+ accommodation ladder를 설치할 때 최대 설치각)\n건현이 9m 이상일 때 accommodation ladder를 Combination으로 설치하여야 한다.\naccommodation ladder의 설치각은 최대 45도를 넘지 않아야 한다.", "id": 1141}, {"category": "기타(선체정비)", "question": "4. Pilot Ladder의 Spreader,Spreader는 일정한 간격으로 설치되어 파일럿 라다가 꼬이는 것을 막아주는 역할을 합니다. Spreader는 그 폭이 최소 1.8m이상이어야 하고, 제일 아래의 Spreader는 맨 아래 스텝으로부터 5번째에 설치 되어야 하고 Spreader간의 최대 간격은 9step 이하라고 규정되어 있습니다.", "answer": "IMO Resolution A.1045(27)\nAdopted on 30 November 2011 (Agenda item 9)\nPILOT TRANSFER ARRANGEMENTS\nAnnex RECOMMENDATION ON PILOT TRANSFER ARRANGEMENTS\n2.1.4 Pilot ladders with more than five steps should have spreader steps not less than 1.8 m long provided at such intervals as will prevent the pilot ladder from twisting.\nThe lowest spreader step should be the fifth step from the bottom of the ladder and the interval between any spreader step and the next should not exceed nine steps.", "id": 1142}, {"category": "기타(선체정비)", "question": "5. 볼라드에 8자로 잡는 이유?", "answer": "8자매듭 장점", "id": 1143}, {"category": "기타(선체정비)", "question": "3. 비트에 로프가 걸려 있는 중에도 더 조일 수 있다.", "answer": "4. 즉, 텐션 조절(슬랙과 홀딩작업)이 용이하고 캡스턴과 스토퍼를 같이 사용할때 홀딩작업이 신속하고 편리함.", "id": 1144}, {"category": "기타(선체정비)", "question": "8. 현행 SOLAS 협약에 의한 충돌격벽(Collison Bulkhead)의 위치에 관하여 설명하시오.", "answer": "충돌격벽은 선수부 손상에 의한 침수량을 제한시키기 위하여 충돌격벽 위치를 선수부로부터 선박길이의 5% 또는 10m 중에서 작은 값 이내로 하도록 한정하고 있다. 그러나 수면하에 선수 수선으로부터 전방으로 돌출된 구조물이 있는 경우에는 그 시작 위치를 선수 수선으로 하지 않고 다음 점으로 하여 그 중 제일 작은 것으로 한다.", "id": 1145}, {"category": "기타(선체정비)", "question": "9. 방화구역에 대해 설명과 종류를 말하시오.", "answer": "1. 방화구역: 선박안전법 제26조의 규정에 의해 선박의 구조를 선박 화재 발생과 그 확대를 방지하기 위하여\n나눈 구역. 방화구역에 따라 구조, 설비 및 방화조치에 필요한 사항 적용 필요.", "id": 1146}, {"category": "기타(선체정비)", "question": "2. 방화구역 종류", "answer": "1) A급 구획\nA. 강 또는 이와 동등한 재료를 사용(방열을 시공한 알루미늄합금 등)\nB. 적절히 보강된 것일 것\nC. 60분의 표준화재시험이 끝날 때까지 연기와 화염의 통과를 막을 수 있는 것일 것\n2) B급 구획\nA. 불연성재료로 방열 시공\nB. 30분의 표준화재시험이 끝날 때까지 화염의 통과를 막을 수 있는 것일 것\n3) C급 구획\nA. 불연성재료를 사용한 구획\nB. 연기 및 화염통과, 온도상승 제한 요건의 적용 제외\n*불연성재료: 섭씨 750도로 가열되어도 연소하지 않고 자기발화에 충분한 양의 인화성증기를 발생하지 않는\n재료로 불연성재료시험에 합격한 것을 말한다.", "id": 1147}, {"category": "기타(선체정비)", "question": "10. 소방구획 A60, A30이 무엇인지 설명하시오.", "answer": "화염에 노출되지 아니한 쪽 평균 온도가 최초의 온도보다 섭씨 139도씨를 초과 상승하지 아니하도록 승인되고, 또 이음매를 포함한 어느 한 점에서의 온도도 최초의 온도보다 섭씨 180도를 초과 상승하지 아니하도록 승인된 불연성 재료로 방열 시공된 구획을 말한다.\n*A-60: 60분, A-30: 30분, A-15: 15분, A-0: 0분", "id": 1148}, {"category": "기타(선체정비)", "question": "11. 선박에서 A급 구획의 정의와 무엇이 요구되는지 설명하시오.", "answer": "A급구획이라 함은 다음 각 목의 요건에 적합한 격벽 및 갑판으로 형성되는 구획을 말한다.\n가. 강 또는 이와 동등한 재료를 사용한 것일 것\n나. 적절히 보강된 것일 것\n다. 표준화재시험이 끝날 때까지 연기와 화염의 통과를 막을 수 있는 것일 것\n라. 불연성재료로 방열시공을 한 것일 것", "id": 1149}, {"category": "선박방화구조기준 내용 중", "question": "12. 건현의 정의와 종류를 말하시오.", "answer": "1) 정의: 건현은 선체 중앙부 상갑판의 선측 상면에서 만재흘수선까지의 수직거리를 말한다. 선박이 완성되면 선박 만재 흘수선 규정에 의하여 선형, 구조 등에 따라 건현과 만재 흘수선이 결정된다. 건현이 클수록 선박의 예비부력이 크다는 것이므로, 결국 선박의 안전성이 높다는 것을 의미한다. 건현의 지정은 만재흘수선을 지정하는 것과 같은 의미이므로, 화물 등의 적재에 의해 배가 잠기는 깊이를 법적으로 제한한다는 뜻이 된다. 만재흘수선 규정은 충분한 복원성을 확보하도록 고려되어 있다는 가정하에, 그 배에 필요한 최소 건현을 지정하여 거친 바다 위에서의 내항성을 확보하기에 충분한 예비 부력을 보유하도록 하는데 그 목적이 있다.\n2) 최소 건현: 선박의 안전에 필요한 예비부력을 확보하기 위하여 최소 건현을 규정하고 있으며 선박에 지정될 수 있는 최소 건현은 그 선박의 치수와 특징에 따라 만재흘수선 규칙으로부터 결정.\n3) 만재흘수(건현)의 종류\nLTF 열대 담수 목재 만재흘수선 / TF 열대 담수 만재흘수선\nLF 하기 담수 목재 만재흘수선 / F 하기 담수 만재흘수선\nLT 열대 목재 만재흘수선 / T 열대 만재흘수선\nLS 하기 목재 만재흘수선 / S 하기 만재흘수선\nLW 동기 목재 만재흘수선 / W 동기 만재흘수선\nLWNA 동기 북대서양 목재 만재흘수선 / WNA 동기 북대서양 만재흘수선\n[추가 질문] 건현에 대한 규정이 어떻게 되는지 말하시오.\n선박의 감항성을 위해 최대 적재량을 제한하는 상기의 최소 건현 규정\n*참고\n선박안전법상 만재흘수선\n제27조(만재흘수선의 표시 등)\n①다음 각 호의 어느 하나에 해당하는 선박소유자는 해양수산부장관이 정하여 고시하는 기준에 따라 만재흘수선의 표시를 하여야 한다. 다만, 잠수선 및 그 밖에 해양수산부령이 정하는 선박에 대하여는 만재흘수선의 표시를 생략할 수 있다.", "id": 1150}, {"category": "선박방화구조기준 내용 중", "question": "2. 해양수산부령으로 정하는 방법에 따른 선박의 길이(이하 \"선박길이\"라 한다)가 12미터 이상인 선박", "answer": "3. 선박길이가 12미터 미만인 선박으로서 다음 각 목의 어느 하나에 해당하는 선박\n가. 여객선\n나. 제41조의 규정에 따른 위험물을 산적하여 운송하는 선박\n②누구든지 제1항의 규정에 따라 표시된 만재흘수선을 초과하여 여객 또는 화물을 운송하여서는 아니 된다.\n선박안전법 시행규칙\n제69조(만재흘수선의 표시 등) 법 제27제1항 각 호 외의 부분 단서에서 \"해양수산부령이 정하는 선박\"이란 다음 각 호의 어느 하나에 해당하는 선박을 말한다. <개정 2008.3.14, 2012.6.26, 2013.3.24>\n1. 수중익선, 공기부양선, 수면비행선박 및 부유식 해상구조물(제3조제1호 및 제2호는 제외한다)", "id": 1151}, {"category": "선박방화구조기준 내용 중", "question": "2. 운송업에 종사하지 아니하는 유람 범선(帆船)", "answer": "3. 국제항해에 종사하지 아니하는 선박으로서 선박길이가 24미터 미만인 예인·해양사고구조·준설 또는 측량에\n사용되는 선박", "id": 1152}, {"category": "선박방화구조기준 내용 중", "question": "5. 시운전을 위하여 항해하는 선박", "answer": "6. 만재흘수선을 표시하는 것이 구조상 곤란하거나 적당하지 아니한 선박으로서 해양수산부장관이 인정하는 선박\n[추가 질문] 만재흘수선의 기준이 되는 draft는?\n하기만재흘수선이다.\n[추가 질문] 선종별 건현이 다르게 규정되어 있는데 그것을 설명하시오.\n최소 건현의 기준이 되는 만재흘수선이 선종별로 다르기 때문에 건현 또한 다르다.\n만재흘수선의 경우 선박의 형상과 강도를 기준으로 산정하여 표시되기 때문에 선종에 다라 다르고, 같은 선종\n이더라도 최대 만재흘수는 개별적으로 지정되어 있기에 다 다르다.\n*만재흘수선 협약의 선박 타입 A,B\nLoad Lines, 1966 에서는 아래와 같이 선박을 2 종류로 구분하여 건현을 계산하며, Type A 선박에는 상대적으로 작은 건현이 지정된다.\n1) Type A Ship : ¹포장되지 않은 액체화물을 운송토록 설계된, ²폭로 갑판 상에 가스켓이 있는 강제 덥개가 달린\n작은 화물창 통행구만 있으며, ³적재된 화물구역의 침수율이 낮은 선박(즉, 유조선 같은)\n2) Type B Ship : Type A에 속하지 않는 선박", "id": 1153}, {"category": "선박방화구조기준 내용 중", "question": "만재흘수선의 결정요소가 무엇인지 설명하시오.", "answer": "건현갑판을 기준으로 하여 하기건현 또는 목재하기건현을 산정한 후에 이를 수정하여 동기, 열대 및 담수 건현 등을 결정하게 된다.", "id": 1154}, {"category": "선박방화구조기준 내용 중", "question": "만재흘수선 초과시 문제점 및 보험적용 여부를 설명하시오.", "answer": "만재흘수선은 예비부력을 가질 수 있는 최소한의 건현을 정한 것으로써 이를 초과 시 예비부력을 잃는다는 말이 되며 감항성 담보의 의무를 져버리는 행위이기 때문에 보험의 적용 또한 받지 못한다. 그러나 불가항력으로 인한 만재 흘수선 초과시에는 관련된 관서나 보험회사는 타당성을 고려하도록 규정하고 있다.", "id": 1155}, {"category": "선박방화구조기준 내용 중", "question": "만재흘수선은 흘수를 제약하기 위한 것인지 건현을 제약하기 위한 것인지 말하시오.", "answer": "건현", "id": 1156}, {"category": "선박방화구조기준 내용 중", "question": "2. 만재흘수선의 대역, 구간 계절기간이 바뀌는 경우", "answer": "예) 선적항이 summer zone이고, 예정항로 도중에 winter zone을 거치는 경우 선적항에서 winter zone에 도착할 때까지 연료, 청수 등의 소모량을 더 선적할 수 있다.", "id": 1157}, {"category": "선박방화구조기준 내용 중", "question": "여객선의 경우 추가 표시사항을 말하시오.", "answer": "여객선에는 만재흘수선 이외에 구획만재흘수선을 표시하여야 한다.\n구획만재흘수선: 선박의 어느 부분에 손상을 받아 침수할 때 그 부분의 수밀구획에 의하여 침수의 정도를 한정하여 수선이 일정한 한계선을 넘지 않도록 흘수를 제한한 수선이다.", "id": 1158}, {"category": "선박방화구조기준 내용 중", "question": "선박에 만재흘수선이 그려져 있는 순서를 나열하시오.", "answer": "Tropical fresh water > Fresh water > Tropical > Summer > Winter > Winter north atlan", "id": 1159}, {"category": "선박방화구조기준 내용 중", "question": "18. 만재흘수선의 정의와 왜 만재흘수선을 초과하면 안되는지 법과 관련하여 설명하시오.", "answer": "1. 만재흘수선: 선박이 안전하게 항해할 수 있는 적재한도의 흘수선으로 여객이나 화물을 싣고 안전하게 항해할 수 있는 최대한도를 나타내는 선이다.", "id": 1160}, {"category": "선박방화구조기준 내용 중", "question": "2. 선박안전법상 만재흘수선의 표시 요건", "answer": "1) 다음 선박의 소유자는 만재흘수선의 표시를 해야 한다.\n가. 국제항해 취항 선박\n나. 길이가 12미터 이상인 선박\n다. 길이가 12미터 미만인 선박 중 여객선, 위험물산적운송선\n2) 누구든지 만재흘수선을 초과하여 여객이나 화물을 운송하면 안된다.\n3) 만재흘수선 표시의 생략: 잠수선 및 다음 선박은 만재흘수선 표시를 생략할 수 있다.\n가. 수중익선, 공기부양선, 수면비행선박 및 부유식 해상구조물\n나. 운송업을 하지 않는 유람범선\n다. 국제항해하지 않는 길이 24미터 미만의 예인, 해양사고구조, 준설, 측량용 선박\n라. 임시항해검사증서를 발급받은 선박\n마. 시운전선박\n바. 만재흘수선 표시가 구조상 곤란하거나 적당치 않다고 해양수산부장관이 인정한 선박\n19-1. 만재흘수선 협약에서 개수부의 위치 3가지\n\"제1위치\"란 다음 각 목의 갑판상의 노출부(폭로부)를 말한다.\n가. 건현갑판\n나. 저선미루 갑판\n다. 전부수선으로부터 건현용 길이의 4분의 1의 점보다 전방에 있는 선루갑판\n\"제2위치\"란 다음 각 목의 장소를 말한다.\n가. 전부수선으로부터 건현용 길이의 4분의 1의 점보다 후방에 위치하고 건현갑판상의 표준 선루높이 이상의 높이에 있는 선루갑판상의 폭로부분\n나. 전부수선으로부터 건현용 길이의 4분의 1의 점보다 전방에 위치하고 건현갑판상의 표준 선루높이의 2배에 해당하는 높이에 있는 선루갑판상의 폭로부분", "id": 1161}, {"category": "선박방화구조기준 내용 중", "question": "13. 구명설비 점검 주기가 5년인 것을 말하시오.", "answer": "장치\n점검 항목\n점검 주기 : 5년\nLife Boat Davit", "id": 1162}, {"category": "선박방화구조기준 내용 중", "question": "4. Overhaul Gear box", "answer": "Rescue Boat Davit", "id": 1163}, {"category": "선박방화구조기준 내용 중", "question": "14. 원심펌프를 기동 시 토출 압력이 헌팅할 경우 조치방법을 설명하시오.", "answer": "초기 기동 시 토출 압력이 헌팅을 하는 이유는 펌프측에 설치된 vacuum pump가 정상적으로 작동되지 않아 펌프 내부에 있는 공기가 배출되지 않아 pumping이 제대로 되지 않아 헌팅한다. 이 경우 vacuum pump를 정비한다.\n[추가정비] 대답 중에 vacuum pump를 말하였는데 vacuum pump가 무엇인지 설명하시오.\n원심 펌프의 토출 압력이 설정한 압력을 형성하지 못하면 자체 진공 펌프(self priming pump = vacuum pump)가 원심 펌프의 커플링에 자동으로 연결되어서 흡입측의 공기를 배출하고, 원심펌프가 토출 압력을 형성하게 되면 vacuum pump는 커플링에서 분리된다.\n[추가정비] Pump 두 대 병렬운전 시 주의 할 사항이 무엇인지 서술하시오.\n- 병렬운전을 하는 이유는 토출량을 늘리기 위해 병렬 운전을 한다.\n- 주의사항으로 펌프로 인해 빠져나가는 유량 때문에 파이프 라인의 압력이 오버되는지 확인하여야 한다.\n- 육상에서 받을 수 있는 Max. Rate를 초과하진 않는지 확인하여야 한다(탱커)", "id": 1164}, {"category": "선박방화구조기준 내용 중", "question": "1. 원심펌프의 직렬운전", "answer": "송출실양정이 커져 송출관로의 특성이 변하고 송출유량이 한대의 펌프를 운전할 때와 같다면 송출양정은\n단독 운전할 때 보다 두 배가 커진다.", "id": 1165}, {"category": "선박방화구조기준 내용 중", "question": "2. 원심펌프의 병렬운전", "answer": "송출관의 직경을 키워 송출관로의 특성을 바꾸고 송출실양정이 한 대의 펌프를 운전할 때와 같다면 송출유량은 단독 운전 때보다 두배로 커진다.", "id": 1166}, {"category": "선박방화구조기준 내용 중", "question": "1. 공동현상 정의", "answer": "펌프와 Impeller의 회전이 빨라지면 날개 배면이 진공상태가 된다. 그러면 그 부분을 지나가는 물이 빠른 속도로 운동할 때 액체의 압력이 증기압 이하로 낮아져서 액체 내에 기포가 발생하는 현상을 공동현상이라 한다.\n또 수증기포가 사라질 때 기포 주위의 물이 서로 부딪혀 국부적으로 현저한 고압이 생겨 그 기계적 충격으로 스크류를 침식시키는 원인이된다.", "id": 1167}, {"category": "선박방화구조기준 내용 중", "question": "2. 공동현상 발생에 따르는 현상", "answer": "1) 소음, 진동\n2) 양정 저하, 펌프 효율 감소\n3) 깃의 부식, 침식\n4) 심한 충격을 수반한다.", "id": 1168}, {"category": "선박방화구조기준 내용 중", "question": "3. 방지법", "answer": "1) 펌프의 설치 높이를 낮추어 흡입양정을 짧게 한다.\n2) 배관을 완만하고 짧게 한다.\n3) 임펠러를 수중에 완전히 잠기게 한다.\n4) 펌프의 회전수를 낮춘다.\n5) 마찰저항이 적은 흡입관 사용한다.\n6) 양흡입펌프를 사용한다.", "id": 1169}, {"category": "선박방화구조기준 내용 중", "question": "17. Ballast Pump (원심펌프) 유량조절 방법 및 주의사항은 무엇인가?", "answer": "송출유량의 조절은 펌프의 회전수를 조절하거나 흡입측 또는 송출측의 밸브 개도를 조절함으로써 행할 수 있으나 일반적으로 회전수를 조절하는 방법은 추가 경비가 필요함으로 별로 사용하지 않는다. 흡입측 밸브의 개도를 조절할 경우에는 펌프의 효율이 저하할 뿐만 아니라 공동현상의 발생에 의해 침식이 생기므로 원칙적으로 사용해서는 안된다. 원심펌프의 경우 송출유량의 조절은 반드시 송출밸브를 이용하여 조절해야 한다.\n18. 펌프 입구와 출구 중 어느쪽이 압력이 더 높은지 말하고 펌프 설치시 흡입부와 배출부 압력이 어떻게 되는지 표시하시오.\n펌프의 출구측이 압력이 더 높고 펌프 설치시 흡입부의 압력은 진공(-)이고 배출부의 압력은 (+) 압력이 있어야 한다.", "id": 1170}, {"category": "선박방화구조기준 내용 중", "question": "1.개요:", "answer": "빠른 속도로 액체가 운동할 때 액체의 압력이 증기압 이하로 낮아져서 액체 내에 기포가 발생하는 현상. 공동이 발생하면 스크류나 수력적 성능이 악화된다. 또 수증기포가 사라질 때 기포 주위의 물이 서로 부딪혀 국부적으로 현저한 고압이 생겨 그 기계적 충격으로 스크류를 침식시키는 원인이된다.", "id": 1171}, {"category": "선박방화구조기준 내용 중", "question": "2.예방법:", "answer": "프로펠러의 잠김율을 크게 한다. 프로펠러의 지름을 최적으로 한다. 프로펠러의 날개단면의 형상을 최적으로 한다. 선박의 선미형상의 모양을 최적으로 한다.", "id": 1172}, {"category": "선박방화구조기준 내용 중", "question": "1. 개요", "answer": "유체물을 Pipe Line을 통해서 적,양하시 Valve 조작에 의하여 Pipe Line내에 유속변화가 생길 경우에 일어나는 급격한 압력변화를 말한다.", "id": 1173}, {"category": "선박방화구조기준 내용 중", "question": "2. 원인", "answer": "1) Flow가 있는 상태에서 갑자기 Valve를 닫을 경우 순간적으로 관내에 압력이 상승하여 Piping 끝단에 충격을 주게 된다.\n2) 진공상태에의 관내에서 Valve개방하여 Flow를 발생시킬 경우 유속이 음속에 가깝게 형성되어 마찬가지로 Piping 끝단에 충격을 주게 된다.", "id": 1174}, {"category": "선박방화구조기준 내용 중", "question": "3. 대응책", "answer": "1) 펌프가 돌아가고 있는 상태에서 갑자기 Valve 조작을 하지 않는다.\n2) 관내가 진공상태로 펌프를 운전하지 않는다.", "id": 1175}, {"category": "선박방화구조기준 내용 중", "question": "21. 5대 중대 위험작업이 무엇이 있는지 말하시오. 그리고 그 위험작업에 필요한 서류를 말하시오.", "answer": "작업내용\n장소\n필요한 서류", "id": 1176}, {"category": "선박방화구조기준 내용 중", "question": "1. 밀폐구역에서의 작업", "answer": "밀폐구역의 정의\n-IMO Resolution A.1050(27)\n-진입 및 탈출이 제한된 개폐구를 갖는 공간\n-충분한 통풍이 이루어지지 않는 공간(air pipe, manhole은 자연통풍에서 제외)\n-작업자가 계속 상주하여 작업하도록 설계되어 있지 않은 공간\nEnclosed space entry permit", "id": 1177}, {"category": "선박방화구조기준 내용 중", "question": "2. 열을 이용한 금속의 용접, 절단 또는 가열 작업", "answer": "선내 모든 구역에서의 열작업\nhot work permit", "id": 1178}, {"category": "선박방화구조기준 내용 중", "question": "3. 감전의 우려가 있는 440V 이상의 전기공사작업", "answer": "440V 이상의 항해, 통신기기, 기타 기기의 수리 또는 점검작업 등\nElectrical work permit\n4. 고소 혹은 몸의 중심을 선체 밖으로 내놓고 하는 작업, 단 흘수측정작업은 제외\n매달리거나 혹은 족장 설치를 요하는 고소 작업과 현외측 작업\nFree Fall 또는 Davit type life boat release gear system의 release hook 개방 점검/정비 작업(단, boat가 수면과 접촉하고 있는 경우는 제외)\nAflot and overside work permit\n5. 기타 비일상적 위험작업으로 선장 또는 안전담당자가 사전에 지정한 작업(비일상적 위험작업임으로 상황에 따라 작업허가서 내용이 다르다)\n-asbestos removal work permit\n-critical equipment/system work permit\n[추가정비] 작업허가서의 효력이 상실이 되는 요건을 말하시오.", "id": 1179}, {"category": "선박방화구조기준 내용 중", "question": "2. 작업 중 안전에 위해되는 요소가 식별될 경우", "answer": "작업허가서는 그 효력을 상실하며 재 작업이 필요한 경우 작업 허가서를 재작성하고 해당 체크리스트 내의 안전 조치 사항을 재점검 해야 한다.\n[추가정비] 작업허가제도의 유의 사항을 말하시오.", "id": 1180}, {"category": "선박방화구조기준 내용 중", "question": "6. 작업 책임 사관은 해당 작업이 종료될 때까지 책임을 진다.", "answer": "7. 작업 책임 사관은 작업 시작과 종료를 당직 사관에게 통보하여야 하며, 당직사관은 작업 상황을 차기 당직자와 서면으로 인수/인계하여야 한다.\n8. 작업 중 안전에 위해되는 요소가 식별되면, 누구든지 그 작업을 중단 시킬 수 있다. 식별된 위해 요소가 복구될 때까지 해당 작업은 실행될 수 없다.\n9. 작업 종료 시, 작업 책임자는 작업 책임 사관에게 동 사실을 통보하고 작업 허가를 종료한다.", "id": 1181}, {"category": "선박방화구조기준 내용 중", "question": "22. 밀폐구역 작업하기 위해 진입 시 사고 방지 대책을 설명하시오.", "answer": "1. 독성가스의 존재 확인 및 산소 농도 측정(황화수소: 10ppm이하, 일산화탄소: 50ppm이하, 산소: 21%이상)", "id": 1182}, {"category": "선박방화구조기준 내용 중", "question": "4. 안전예방조치가 취해졌는지 확인한 책임사관의 허가 없이는 진입 금지", "answer": "5. 책임사관은 작업 구역 내 사람이 들어가 있는 동안에는 작업장 입구에 감시원 배치", "id": 1183}, {"category": "선박방화구조기준 내용 중", "question": "23. Risk Assessment 의 정의와 정량적 평가를 어떻게 하는지 구체적으로 말하시오.", "answer": "1. 목적: 선박 운항 및 제반 활동 / 공정과 관련된 안전보건, 위험요인 파악, 위험성의 심각도를 평가하여 해당 위험 요인을 제거 또는 최소화를 도모", "id": 1184}, {"category": "선박방화구조기준 내용 중", "question": "24. 위험성 관리란", "answer": "- 위험성관리란 사고를 유발할 수 있는 잠재적인 위험성(불안전 행동 또는 기계/물리적 결함에 의한)을 식별하여, 평가후, 위험성을 통제하는 방법을 갖춤으로써 사고를 예방하는 활동입니다.\n- 위험성 관리(Risk Managing)의 절차", "id": 1185}, {"category": "선박방화구조기준 내용 중", "question": "1. 위험성 분석(Risk Analysis)", "answer": "가. 위험성 식별(Risk Identification) : 위험성을 식별하는 단계로, 최대한 많은 정보를 수집해야 하고, Brain Storming, Check List 등을 활용할 수 있습니다.\n나. 위험성 평가(Risk Assessment) : 식별된 위험성을 그 강도와 빈도를 고려하여, 통제하기 위한 우선순위를 정하는 것입니다.", "id": 1186}, {"category": "선박방화구조기준 내용 중", "question": "2. 위험성 통제(Risk Control)", "answer": "분석된 위험성을 통제하는 방법을 정하는 것으로, 위험성의 제거, 분산, 감소, 회피 등의 방법이 있습니다.", "id": 1187}, {"category": "선박방화구조기준 내용 중", "question": "3. 위험성 재무관리(Risk Financing)", "answer": "각 위험성들로부터의 피해를 최소화 하기 위한 재무관리 방식입니다. 적하보험, 선박보험, P&I 보험 등을 말합니다.", "id": 1188}, {"category": "선박방화구조기준 내용 중", "question": "왜 컨테이너만 co2를 나누어서 작동하는지?", "answer": "컨테이너선의 경우에는 3회에 걸쳐 co2를 나누어 분출하도록 한다. 이는 화물창의 공간 크기와 화물창내 컨테이너가 실려있는 비율에 따라 달라지며, 컨테이너 화물창의 경우 계속해서 산소가 유입될 수 있기 때문에\n추가로 co2가스를 보충하여 화재를 진압하도록 한다. 이는 꼭 정해진 사항은 아니며, 선장의 상황 판단에 따라\n개수를 추가하여 소화할 수 있다.", "id": 1189}, {"category": "선박방화구조기준 내용 중", "question": "26. 선박 의장수란 무엇인지 말하시오.", "answer": "선박에 비치되는 앵커, 앵커체인 케이블, 무어링 로프 및 토우 라인(tow line)등의 수량, 중량, 길이 및 직경 등은\n모두 선박설비 규정에 정하여 있는 의장수에 따라서 결정되는 것으로 그들 값은 선형, 선종, 또는 선급에 따라서 좌우되는 것이 아니다.\n이것은 국제적으로 적용되는 국제통일규칙(IACS: international association of classification)에 의하여 통일되어 있다.", "id": 1190}, {"category": "선박방화구조기준 내용 중", "question": "27. 수선간장이 무엇인지 말하시오.", "answer": "수선간장(LBP: Length Between Perpendiculars)이란 선수 수선(Fore Perpendicular)과 선미 수선(After Perpendicular)간의 수평거리이며 선박과 관련된 각종 계산에 많이 사용한다.", "id": 1191}, {"category": "선박방화구조기준 내용 중", "question": "28. 유해방오도료에 대해 설명하시오.", "answer": "유해방오도료라 함은 생물체의 부착을 제한, 방지하기 위하여 선박 또는 해양시설 등에 사용하는 도료 중 유기주석 성분 등 생물체의 파괴 작용을 하는 성분이 포함된 것으로서 국토해양부령이 정하는 것을 말한다.", "id": 1192}, {"category": "선박방화구조기준 내용 중", "question": "AFS 조약이 만들어진 배경을 말하시오.", "answer": "AFS 조약은 선박에 대한 유해한 방오 방법의 관리에 관한 국제 조약으로 유해방오도료 등에 의해서 주변 비표적 생물까지 영향을 미쳐 생태계에 인위적 변형을 초래하여 AFS 조약이 만들어진 배경이다.", "id": 1193}, {"category": "선박방화구조기준 내용 중", "question": "29. PMS에 대해 설명하시오.", "answer": "기관예비정비제도(PMS: Planned Maintenance System for Machinery)는 기관의 자동화 설비를 갖춘 선박에 대하여 정비계획에 따라 본선에서 자체정비를 시행하여 기기의 수명 연장과 노후로 인해 발생할 수 있는 사고를 미연에 방지하고 기관의 안전을 도모하기 위하여 시행하는 제도 이다.", "id": 1194}, {"category": "선박방화구조기준 내용 중", "question": "30. CMS에 대해 설명하시오.", "answer": "기관계속검사는 (CMS: Continuous Machinery Survey) 검사 대상 기기에 대하여 5년 동안에 매년 20%씩 검사를 수행하여 정기검사 시 한번에 모든 장비를 검사 받을 때 발생하는 운항 손실을 줄이기 위하여 선주의 신청이 있는 경우 시행하는 임의적인 검사이다.", "id": 1195}, {"category": "선박방화구조기준 내용 중", "question": "2. 틈 부식, 침식부식 등", "answer": "전해질 속에서 서로 다른 전위를 가진 금속이 존재할 때 두 물질의 전위차에 의해 양극에서 음극으로 전자이동이 발생하고 그로 인해 양극(금속)에서 부식이 발생한다.", "id": 1196}, {"category": "선박방화구조기준 내용 중", "question": "32. SOLAS 규정에서 소화기 SPARE 규정에 대해 설명하시오.", "answer": "예비소화제는 처음 10개의 소화기에 대해서는 100%의 SPARE를 구비해야 하고 나머지 소화기에 대해서는 50%의 SPARE를 보유하고 있어야 하며 총 60개를 넘을 필요는 없다. 재충전을 위한 지침서가 선내에 있어야 한다.\n선내에서 재충전할 수 없는 소화기에 대하여는 위에서 결정된 것과 같은 양, 형식, 용량 및 수의 추가의 휴대식 소화기가 예비소화제를 대신하여 비치되어야 한다.\n예를 들어 선박의 소화기가 60개일 경우 10(10개의 100%) + 25(나머지 50개의 50%), 총 35개의 예비 소화기가 선내에 구비되어 있어야 한다.", "id": 1197}, {"category": "선박방화구조기준 내용 중", "question": "1. 비상소화펌프가 있는 이유", "answer": "기관실에 화재 발생으로 fire & g/S pump를 사용하지 못할 경우에 비상소화펌프를 사용한다. 비상소화펌프는 비상전원이 연결되어 있어 비상발전기가 운전되면 black out이 되어도 사용 가능하다.", "id": 1198}, {"category": "선박방화구조기준 내용 중", "question": "2. 어떤 경우 사용가능하는가", "answer": "1) 기관실 화재 발생시\n2) 화재로 black out이 발생하여 비상발전기가 운전 되었을 때\n3) fire & g/s pump가 고장이 났을 경우", "id": 1199}, {"category": "선박방화구조기준 내용 중", "question": "3. 어디에 설치되어 있는가?", "answer": "보통 선수 bow thruster room안에 설치되어 있다.", "id": 1200}, {"category": "선박방화구조기준 내용 중", "question": "1. 충돌로 인하여 타선박에 손해를 입힌 경우에는 선박의 보험 가입조건에 따라 P&I CLUB이나 선체보험자가", "answer": "담보할 수도 있으며 양쪽 모두에서 담보할 수도 있다.\n만일 본선의 충돌로 유류오염사고, 선원부상사고, 화물 또는 다른 재산에 손해를 입힌 경우에는 P&I에서 담보\n하고있다. (통상 P&I Club은 부두시설이나 다른 고정물에 입힌 손해에 대해 담보하고 계약에 따라 선체보험자\n이를 보하는 경우도 있다)", "id": 1201}, {"category": "선박방화구조기준 내용 중", "question": "2. 본선 조치사항", "answer": "1) 사고 즉시 본사 및 유관단체 그리고 P&I 연락사무소에 사고사실을 통보. 이때 상대 선박의 선명, 선적항,\n피해상황, 사고시간, 사고장소, 인명손상여부, 오염사고여부도 함께 통보\n2) 브릿지와 기관실 그리고 다른 곳의 시계가 일치하는지 확인\n3) 사고관련 자료 확보\n가. 사고 당시 브릿지 또는 기관실에서 당직중이던 사관 및 증인들에게 각각 자기가 보고 들은 것에 대해 수첩 등에 메모(단, 개인의 의견이 아닌 사실 그 자체만 기록)\n나. 사고시간 최소 6분전부터 본선의 위치 및 코스 등을 알 수 있는 해도 원본과 기타 관련 기록들을 수집\n다. GPS나 Total Navigator에 연속된 위치나 항적이 나오면 이를 출력하거나 사진을 촬영하여 보관\n라. 충돌직후 사고위치를 내도록하고 위치별 당시의 선수방위 및 위치낸 시간을 기록 유지하되 어떻게 나온 위치인지 누가 낸 위치인지 어느 시계에 의한 시간인지를 같이 기록\n마. Engine Telegraph Log는 실제 Engine Order 상태와 기록내용이 맞는지 기록지상의 시간과 브릿지시간이\n일치하는지 Check하고 이를 기록 후 보관\n바. 사고후 VHF 등 전화를 사용할 때에는 누가 누구와 어떤 내용을 통화했는지 그 시각과 함께 상세히 기록\n사. Course Recoder 를 떼어낼 때에는 선수방위가 Gyro 방위와 일치하는지 시간이 일치하는지를 Check 하고\n그 내용을 Course Recoder 상에 기록 및 보관\n아. 본선 및 상대선, 그리고 기타 부두시설의 피해상황을 사진 촬영. 가능하다면 충돌각도를 추정해보고\n본선과 상대선의 속도도 추정해 기록하며 충돌 때까지의 양선의 궤적을 추정해서 기록한다.\n자. 만약 타선에 의한 파도가 손상의 원인인 경우 근처를 지나는 모든 선박의 List 확보", "id": 1202}, {"category": "선박방화구조기준 내용 중", "question": "3. 사고 조사중 주의 사항", "answer": "1) 의문의 여지가 있을 때는 절대로 책임을 인정해서는 아니되며 본사 Club의 허가를 받지않은 변호사나 Surveyor의 승선을 허용해서는 안된다.\n2) 선원들에게 사고에 대해서 누구에게도 얘기하지 못하도록 지시하도록 한다.\n3) 회사에 사고사실을 있는 그대로 가급적 신속히 통보하여 당사의 이익보호를 위한 사전조치를 적절히 취할 수 있도록 한다.\n4) 당사측에 유리한 것으로만 사고사실이 잘못 전달된 경우 향후 클레임 처리시 불필요한 시간, 인력과 비용손실을 발생시켜 제2의 사손을 초래케 하는 경우가 있으므로 사고 사실을 있는 그대로 통보해 주는 것이 대단히 중요하다.", "id": 1203}, {"category": "선박방화구조기준 내용 중", "question": "4. 기록유지", "answer": "1) Log book에는 사고가 발생했다는 사실만 간단히 기록하도록 한다.\n2) 항해일지와 기관일지는 일치시켜 요점만 기재하되 본선에 유리한 점은 상세히 기록하며 시간 및 장소는 몇시\n몇분경 및 어느 부근으로 기록하여 결정적인 시간 및 장소는 기입치 않는다.\n3) 특히 대형 충돌사고의 경우 본선에서 경황이 없는 가운데 항해일지의 기사란과 해난보고서 등에 사고상황을 너무 상세하게 기록하면 스스로 그 기록에 구속되는 우를 범할 수 있다.\n4) 대형 충돌사고인 경우에는 다음 기항지에서 당사측 변호사가 승선하기 때문에 항해일지의 기사란 기입과 해난보고서 작성은 변호사의 자문을 받아 작성하는 것이 바람직하다.\n5) 변호사가 개입하지 아니한 소형 충돌사고의 경우에는 회사와 사전 협의를 하되 부득이 관련서류를 작성해야 되는 경우는 항해일지 기사란 및 해난보고의 Statement of Fact에는 사고 사실만을 간략히 기술하는 것이 바람직하다.\n6) 통상적으로 충돌사고 후 다음 기항지에서 변호사, P&I Local representative 혹은 선박보험자의 Surveyor가 관련 선원들을 상대로 인터뷰를 실시하여 증거서류로써 Full Statement 를 작성하기 때문에, 특히 사고원인 및 시간별 본선 작동 등에 대해서는 항해일지나 해난보고서 등의 서류에 기술치 않는 것이 바람직하다.", "id": 1204}, {"category": "선박방화구조기준 내용 중", "question": "36. Safety Plan은 어디에 비치되어 있고 어떻게 보관되어 있는가?", "answer": "1. 비치장소: 브릿지, ecr, fire control room, 거주구역 각 층, 양현 fire control plan함에 보관되어 있다.", "id": 1205}, {"category": "선박방화구조기준 내용 중", "question": "38. Hand Lead에 대해서 말하시오.", "answer": "납으로 만든 추에 줄을 매어 해저까지 던진 다음 줄에 표시한 표식으로 바다의 깊이를 알아내는 도구로 수심을 측정함과 동시에 추 하부의 구멍에 기름을 넣어 해저에 닿을 때 묻어있는 물질에 의해 저질을 파악 가능하다.", "id": 1206}, {"category": "선박방화구조기준 내용 중", "question": "39. Strike Plate란 무엇인가", "answer": "Sounding Pipe의 하부에 설치된 Bilge well 내에 있는 조그마한 Plate를 말한다.", "id": 1207}, {"category": "선박방화구조기준 내용 중", "question": "40. Isolation Valve란", "answer": "Isolation Valve란, 송수관을 소화펌프가 있는 기관구역내의 구역과 그 외의 구역으로 분리하는 차단밸브를 말하며, 이는 기관구역 밖에서 쉽게 접근할 수 있고 보호된 장소에 비치하여야 한다.\n이 밸브는 송수관이 데미지를 입어서 수압이 떨어졌을 때나, 불필요한 구역으로의 송수를 막아 필요한 구역에 적절한 수압을 유지하기 위해 설치,사용된다.", "id": 1208}, {"category": "선박방화구조기준 내용 중", "question": "41. 대릭장치 하중시험 하는 방법", "answer": "① 하역장치는 다음 표에 의한 하중시험을 행하여 이상이 없는 것이어야 한다.\n② 제1항의 규정에 의한 하중시험은 시험하중에 상당하는 중량물을 달아올린 후 사용하는 최대의\n아웃리치까지의 사이 및 주행예정거리에서 선회 또는 이동시키는 방법에 의하여 행한다. 다만, 수리 또는 변경이 가하여진 하역장치에 대하여는 스프링 저울 또는 하이드로릭바란스를 사용하여 선회 또는 이동의 양단에서 5분간 연속하여 시험하중에 상당하는 하중을 부하하는 방법에 의할 수 있다.\n③ 데릭장치에 대한 제2항의 하중시험은 데릭붐의 수평면에 대한 각도를 제한하중이 10톤이하인 것에는 15도, 제한하중이 10톤을 넘는 것에 있어서는 25도로 하여 행한다. 다만, 제한하중에 상당하는 하중을 부하하여 사용하는 범위에 있어서의 최소의 각도가 이들 각도를 넘는 경우에는 그 최소의 각도로 할 수 있다.", "id": 1209}, {"category": "선박방화구조기준 내용 중", "question": "1. 과정", "answer": "1) Miss-ignition →\n2) Repeated START (auto restart 시행) →\n3) 2차 STARTING 및 Scav. Air limit cancel →\n4) 3차 STARTING (Scav. Air limit cancel은 2차부터 계속 유지됨) →\n5) STARTING Failure 알람 발생", "id": 1210}, {"category": "선박방화구조기준 내용 중", "question": "2. Auto Restart 기능: 메인엔진 Miss-ignition이 되면 자동 재기동이 된다. 2차 시동 시에는 연료제한치가", "answer": "증가하고, 3차 시동 시에는 연료 설정치를 더 높여 보통 3회 되풀이 된다. 2~3차 시동 시에는 연료량을\n증가시키기 때문에 불완전 연소로 인한 검은 연기가 발생한다. 만약, 2차 또는 3차 Starting에서 Starting이 되면 ‘Starting Failure’ 알람이 발생하지 않으며 ‘Starting Failure’ 알람이 발생하면 reset을 하기 위해서 telegraph를 stop position에 위치 시켜야 한다.", "id": 1211}, {"category": "선박방화구조기준 내용 중", "question": "1. IHP (Indicated Horse Power): 지시마력", "answer": "실린더 내의 연소압력이 피스톤에 작용하는 힘", "id": 1212}, {"category": "선박방화구조기준 내용 중", "question": "2. BHP (Break Horse Power): 제동마력", "answer": "동력전달 축에서 얻어지는 힘. (도시마력-마찰손실) 내연기관의 출력", "id": 1213}, {"category": "선박방화구조기준 내용 중", "question": "3. SHP (Shaft Horse Power): 축마력", "answer": "쓰러스트 베어링의 마찰력을 고려한 마력", "id": 1214}, {"category": "선박방화구조기준 내용 중", "question": "4. DHP (Delivered Horse Power): 전달마력", "answer": "프로펠러에 실제로 공급되는 마력으로 축마력에서 축받침 및 선미관 등의 마찰에 의한 손실마력을 뺀 것이다.", "id": 1215}, {"category": "선박방화구조기준 내용 중", "question": "5. THP (Thrust Horse Power): 추력마력", "answer": "프로펠러가 전달마력을 공급받아서 작동하여 선박을 추진시키는 마력이다.", "id": 1216}, {"category": "선박방화구조기준 내용 중", "question": "6. EHP (Effective Horse Power): 유효마력", "answer": "선박이 실제로 전진하는데 필요한 마력이다.", "id": 1217}, {"category": "선박방화구조기준 내용 중", "question": "디젤 주기관에서 동력이 동력전달장치를 거쳐 선체에 전하여지는 순서를 말하시오.", "answer": "IHP (지시마력) → BHP (제동마력) → SHP (축마력) → DHP (전달마력) → THP (추력마력) → EHP (유효마력)", "id": 1218}, {"category": "선박방화구조기준 내용 중", "question": "3. Critical RPM(위험 회전수)에 대해 설명하시오.", "answer": "디젤기관의 기동시 또는 증속, 감속시에는 기관 각부의 과대한 열응력과 급격한 부하의 증가로 인하여 축의\n비틀림 진동이 생기며 이 외력에 의해 생기는 진동수와 축의 자연 진동수와 일치할 때의 회전수를 위험회전수\n라고 한다. 이때는 진동수가 일치하여 큰 진폭으로 되어 기계 및 선체에 종진동을 일으키고 심하면 축계에 큰\n응력이 생겨서 절손하게 된다.", "id": 1219}, {"category": "선박방화구조기준 내용 중", "question": "4. Engine Racing이란 무엇인지 설명하시오.", "answer": "선박이 악천후 중을 항해할 때 강한 파의 충격을 받고 Engine RPM이 Hunting하는 것을 말한다. Hunting을\n덜하기 위해서 Engine을 Heavy sea mode로 바꾸는 방법이 있다.", "id": 1220}, {"category": "선박방화구조기준 내용 중", "question": "5. Turbo Charger에 대하여 설명하시오.", "answer": "Turbo Charger는 실린더에 대기압 이상의 급기를 공급해 주는 장치이다. 주로 실린더에서 연소하고 나오는 배기가스의 힘으로 turbine을 회전하여 공기를 압축하여 실린더로 공급해주는 장치이다. 과급(supercharger)은 대기압 이상의 급기를 실린더에 공급하는 것을 말한다. 과급의 목적은 실린더 내에서 연소가 일어나기 위해서는 산소가 필요하고, 산소가 풍부할수록 연소효율은 좋아지는데, 연소효율 향상 및 고출력을 위해 압축된 공기를 실린더 내에 주입한다.", "id": 1221}, {"category": "선박방화구조기준 내용 중", "question": "6. 경제속력이 무엇인지 말하시오.", "answer": "1) 선박의 경제속력 (economic speed of ship)\n대양에서 통상적으로 항해하는 속력으로, 정상속력, 최적속력이라고도 한다. 기관의 효율유지와 보수유지라는 면에서 본 경제속력이다. 통상 주기관의 80~90% 출력에서 나타나는 속력이다. 선박의 속력을 높여 배를 빨리 돌리면 선박소유자에게 매우 이득이 될 것이다. 그러나 연료소모량은 선속의 세제곱에 비례하기 때문에 무조건 선속을 높이는 것은 연료비의 영향으로 오히려 손해가 될 수도 있다. 또 주기관을 무리하게 사용하면 부품 자체의 수명이 줄어들기 때문에 교체를 하기 위한 비용도 고려해야 한다. 그러므로 가장 적은 연료로 최대의 이득을 낼 수 있는 속력을 경제속력 즉, 최적속력이라 할 수 있다.\n2) 경제속력 (economic speed)\n연료의 소비와 속력에 있어 그 연료 소비를 될 수 있는 한 절약하고 속력을 크게 하는 경우의 속력을 말한다. 선박은 신조할 때 그 취항항로나 용도에 맞추어 가장 알맞은 속력이 계획되고 그 속력으로 항해하여야 가장 효율이 좋고 또한 경제적이도록 설계되며 선박이 완성되면 주로 이 속력으로 취항하게 되는데 일반적으로 “몇 노트의 선박”이라고 하면 그와 같은 계획 또는 경제항해속력(經濟航海速力)을 뜻하는 것이라 할 수 있다. 정상속력(normal speed)은 기관의 효율유지와 보수유지라는 면에서 본 경제속력으로, 대양에서 만재흘수 때 통상적으로 항해하는 속력이다. 따라서 정상속력과 경제속력은 같다고 볼 수 있으며, 이는 주기관 상용출력(연속최대출력의 80~90%) 시 나타나는 속력이다.", "id": 1222}, {"category": "선박방화구조기준 내용 중", "question": "승선한 선박의 경제속력이 얼마인지 말하시오.", "answer": "66 rpm(선박마다 다름)", "id": 1223}, {"category": "선박방화구조기준 내용 중", "question": "선박마다 경제 속력이 다 다른데 승선한 선박의 경제속력이 얼마인지 어떻게 알 수 있는가?", "answer": "주기부하성능곡선이라는 도표에서 연료소모율이 가장 낮은 부분을 찾아 그때의 rpm을 확인한다.", "id": 1224}, {"category": "선박방화구조기준 내용 중", "question": "주기부하성능곡선이 무엇인지 말하고 어디에서 확인할 수 있는가?", "answer": "기관을 시운전에서 운전 시험한 결과의 자료를 표로 정리하여 그 성능이 좋고 나쁨을 검토하기 위한 곡선이다.\nsea trial book 또는 main engine instruction book에서 확인할 수 있다.", "id": 1225}, {"category": "선박방화구조기준 내용 중", "question": "7. Economizer(배기 보일러)에 대해 설명하시오.", "answer": "선박이 정상 항해 중 주기에서 발생되는 exhaust gas를 funnel로 배출하는 도중에 그 폐열을 이용해서 보일러\n물을 가열하는 장치이며, 수관형과 연관형이 있다.", "id": 1226}, {"category": "선박방화구조기준 내용 중", "question": "수관형과 연관형의 차이점을 말하시오.", "answer": "수관형은 관 안에 보일러의 물이 흐르는 것이고 연관형은 관 안에 배기 가스가 관통하는 차이점이 있다.", "id": 1227}, {"category": "선박방화구조기준 내용 중", "question": "8. ECA가 무엇이고 황 함유량 제한 기준을 설명하고 향후 추세 및 선박의 운용은 어떻게 할것인가?", "answer": "1. ECA (Emission Control Area) 배출제한구역으로 SOx 배출을 제한하는 구역은 SECA이며 NOx 배출을 제한하는 구역은 NECA로 나누어 진다.", "id": 1228}, {"category": "선박방화구조기준 내용 중", "question": "2. 황 함유량 제한 기준", "answer": "1) 특별해역: 0.1%이하\n2) 보통항해구역: 2020.01.01부터 0.5%이하 (그전 3.5%이하)\n3) 홍콩: 0.5%이하 (2015.07.01부)\n4) 중국: 0.5%이하, 중국 ECA 지역 내 운항, 정박 중인 모든 선박 적용(2019.01.01부)\n5) 파나마 통항: 0.5%이하\n* 중국, 홍콩, 파나마 통항은 그 지역의 로컬룰이다.", "id": 1229}, {"category": "선박방화구조기준 내용 중", "question": "3. 운용방안", "answer": "2020.01.01부터 보통항해 구역에서 황 함유량이 0.5% 미만인 연료 사용 또는 스크러버(황저감장치)를 설치하여 운항하여야 한다.", "id": 1230}, {"category": "선박방화구조기준 내용 중", "question": "우리나라 선주사에서 어떤 방식으로 운용하려고 하는지 말하시오.", "answer": "1. 황 함유량이 0.5% 미만인 연료를 사용 (특별해역은 0.1%이하의 연료 사용)", "id": 1231}, {"category": "선박방화구조기준 내용 중", "question": "3. LNG 연료 사용", "answer": "하지만 현존하는 선박을 LNG 연료로 사용할 수 있게 개조하는 것이 어려움으로 스크러버를 설치하거나 황 함유량이 0.5%미만인 연료를 사용하여 운용하려 한다. 또한 신조선의 경우 스크러버를 설치 또는 LNG로 운항하는 엔진을 장착할 수 있다. 스크러버를 설치하게 되면 설치비용 및 화물 적재 공간이 줄어 드는 단점 및 추가된 장치에 대한 수리비도 단점이 되나 황 함유량이 0.5%미만인 연료보다 값싼 연료를 사용할 수 있다.", "id": 1232}, {"category": "선박방화구조기준 내용 중", "question": "9. Full Speed에서 Navigation Full Speed로 RPM을 올릴 경우 그리고 반대로 Navigation Full Speed에서 Full Speed로 RPM을 낮출 경우 선교에서 바로 RPM을 올리거나 낮추지 못하는 이유에 대해 말하시오.", "answer": "M/E의 Load Program이 작동하여 바로 RPM을 올리거나 낮추지 못한다.\n1. Full Speed에서 Navigation Full Speed로 RPM을 올릴 경우\nLoad Up Program이 작동하여 일정시간을 가지고 회전수를 점차적으로 올린다.\n2. Navigation Full Speed에서 Full Speed로 RPM을 내릴 경우\nLoad Down Program이 작동하여 일정시간을 가지고 회전수를 점차적으로 낮춘다.\n보통 RPM을 낮추는 시간은 RPM을 올리는 시간의 절반으로 세팅되어 있다.", "id": 1233}, {"category": "선박방화구조기준 내용 중", "question": "그럼 Half Speed에서 Full Speed로 RPM을 올릴 때 원래는 바로 RPM이 올라가야 하나 그렇지 못한 이유를 말하시오.", "answer": "Scav. Air Limit와 Torque Limit가 발생하면 바로 RPM이 올라가지 않는다.", "id": 1234}, {"category": "선박방화구조기준 내용 중", "question": "Scav. Air Limit와 Torque Limit에 대해 설명하시오.", "answer": "1) Scav. Air Limit\n조종 핸들을 갑자기 올릴 때 핸들 위치에 따라 소기압력이 확보된 만큼 연료가 공급이 되도록 한다.(완전연소를 하기 위한 기능)\n2) Torque Limit\n축계에 과도한 비틀림 토크가 생기면 연료의 공급을 줄이고 토크가 감소하면 연료를 증가시킨다. (축계를 보호하기 위한 기능)", "id": 1235}, {"category": "선박방화구조기준 내용 중", "question": "10. SCR과 SCRUBBER를 설명하시오.", "answer": "1) SCR (Selective Catalytic Reduction: 선택적 촉매 환원)\n화석연료의 사용에 따라 발생하는 질소산화물을 대기 중으로 배출시키기 전에(배출후단에서) N2와 O2등 유해하지 않은 물질로 전환시키는 환경설비이다.\n2) 스크러버는 흡수제의 디자인에 따라 상당한 차이가 있을 수 있으나, 모든 습식 스크러버는 기본적인 화학\n반응을 통해 배기가스를 처리한다. 습식 스크러버에서 해수나 화학 세정수는 산성의 황산화물을 중화시키기 위해 사용된다. 황산화물이 용해되면 해수의 천연 알칼리성 물질 또는 화학 세정수에 포함된 알칼리성 물질과 반응하여 용해성 황산염을 형성한다. 일반적으로 노즐에서 흡수제를 분사시키면 흡수제와 배기가스가 접촉되면서 배기가스에 포함된 수용성 가스를 용해시킨다.", "id": 1236}, {"category": "모르는 것!", "question": "3. 선박폐기물의종류를설명하시오.", "answer": "3.기압경도, 구름양에의한천기구분(B,BC,C,O), 파랑기상도/고층기상도(AUAS200-500HPA),", "id": 1237}, {"category": "모르는 것!", "question": "4. Cb값을구하는공식 (이것역시개념설명이아닌공식자체를물어봄)", "answer": "* 3.4 항의경우본선에서계산을통하여직접구해야할경우이므로 Hydro Static Table 이나 Load Com을이용하여값을구한다는식의대답은 NO!!", "id": 1238}, {"category": "모르는 것!", "question": "2. 사이팅순서를 6단계로나눠설명", "answer": "4)DGPS의오차수정방식은?", "id": 1239}, {"category": "모르는 것!", "question": "1. 수심 100m 이상의심해지역에서심해투묘시무엇을근거로", "answer": "투묘결정을고려해야하는지?", "id": 1240}, {"category": "모르는 것!", "question": "1.자차수정용구", "answer": "3.파나마 쵸크란 => 초크(chock)는 선박의 선수 혹은 선미 측에 설치되어 선박의 접안, 정박, 견인에 사용되는 계선줄(이하 계선 로프 라고 함)을 안내하거나 고정하는 부재이다. 초크는 보통 파나마형(Panama Type)으로 불리는 형태를 취하고 있으며, 대부분이 주물로 제작된다.\n파나막스(Panamax bulk carrier; 5 ~ 8만 DWT), 이중 파나막스(Panamax)라는 단어의 유래는 영어로 풀어쓰면 Panama Canal Transit Maximum Size Vessel로서 이배는 북중미의 파나마 운하를 통과할 수 있는 최대급 선박을 말하는 것입니다.\n파나마 운하를 통과할 수 있는 최대 급의 배는 재화중량 톤수가 65,000-73,000 DWT정도(평균 70,000 DWT 내외)로, 배의 폭(Beam) 최대허용치는 32.3m이며 흘수(Draft: 배가 물에 잠기는 깊이) 허용치는 최대 12.04m의 배이며 파나막스 급의 배 밑바닥은 파나마 운하 밑바닥처럼 평평하게 만드는 배입니다.(요즘 선박들은 일반적으로 생각하는 밑이 뾰족하지 않고 다 평평하지만...)\n상기의 조건에 하나라도 맞지 않으면 파나마 운하를 통과 할수 없습니다.\n그리고 통과하지도 못하는 배에 panama chock를 왜 만드느냐?\n원래는 그 이름이 chock입니다.\n그런데 다른곳에서는 잘 사용하지 않고 panama에서 많이 사용하기에 panama chock가 된 것이지요..", "id": 1241}, {"category": "모르는 것!", "question": "29. 무선검역을 받기 위한 결정적인 근거 3가지", "answer": "1) 승무원 명부\n2) 검역 질문서\n3) 보건상태 신고서", "id": 1242}, {"category": "모르는 것!", "question": "1. 승무원 명부 (Crew List)", "answer": "역할: 해당 운송수단에 탑승한 인원의 신원을 확인합니다.\n근거: 검역 감염병 발생 시 접촉자를 추적하거나 관리해야 할 대상자의 규모를 파악하는 기초 자료가 됩니다.", "id": 1243}, {"category": "모르는 것!", "question": "2. 검역 질문서 (Quarantine Declaration)", "answer": "역할: 선박이나 항공기의 출발지, 경유지, 그리고 해당 지역에서의 체류 기간 등을 상세히 기록합니다.\n근거: 오염 인근 지역을 거쳐 왔는지 여부를 확인하여 유입 가능한 감염병 리스크를 선제적으로 판단합니다.\n3. 보건상태 신고서 (Maritime Declaration of Health / Health Part of the Aircraft General Declaration)\n역할: 현재 탑승객 및 승무원 중 환자(발열, 설사 등) 유무나 사망자 발생 여부를 보고합니다.\n근거: 무선검역 통과 여부를 결정짓는 가장 결정적인 서류입니다. 모든 인원의 보건 상태가 양호하다는 것이 이 서류를 통해 확인되어야만 비대면 검역이 승인됩니다.", "id": 1244}, {"category": "모르는 것!", "question": "92. 4가지로 나눌수 있다.", "answer": "1) 검역조사에 필요한 서류 등\n2) 선박에 대한 조사\n3) 승무원에 대한 검역조사\n4) 승객에 대한 검역조사", "id": 1245}, {"category": "
