하지 못한다. 다만, 그 가족만 승무하는 선박의 경우에는 그러하지 아니하다.\n② 선박소유자는 18세 미만인 사람을 선원으로 사용하려면 해양수산부령으로 정하는 바에 따라 해양항만관청의 승인을 받아야 한다. <개정 2013. 3. 23.>\n③ 선박소유자는 18세 미만의 선원을 해양수산부령으로 정하는 위험한 선내 작업과 위생상 해로운 작업에 종사시켜서는 아니 된다. <개정 2013. 3. 23.>\n④ 선박소유자는 여성선원을 해양수산부령으로 정하는 임신ㆍ출산에 해롭거나 위험한 작업에 종사시켜서는 아니 된다. <개정 2013. 3. 23.>\n⑤ 선박소유자는 임신 중인 여성선원을 선내 작업에 종사시켜서는 아니 된다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다. <개정 2013. 3. 23.>\n1. 해양수산부령으로 정하는 범위의 항해에 대하여 임신 중인 여성선원이 선내 작업을 신청하고, 임신이나 출산에 해롭거나 위험하지 아니하다고 의사가 인정한 경우\n2. 임신 중인 사실을 항해 중 알게 된 경우로서 해당 선박의 안전을 위하여 필요한 작업에 종사하는 경우\n⑥ 선박소유자는 산후 1년이 지나지 아니한 여성선원을 해양수산부령으로 정하는 위험한 선내 작업과 위생상 해로운 작업에 종사시켜서는 아니 된다. <개정 2013. 3. 23.>\n⑦ 가족만 승무하는 선박의 경우에는 제4항부터 제6항까지의 규정을 적용하지 아니한다.\n제92조(야간작업의 금지) ① 선박소유자는 18세 미만의 선원을 자정부터 오전 5시까지를 포함하는 최소 9시간 동안은 작업에 종사시키지 못한다. 다만, 가벼운 일로서 그 선원의 동의와 해양수산부장관의 승인을 받은 경우에는 그러하지 아니하다. <개정 2013. 3. 23.>\n② 제60조제6항에 따른 작업에 종사시키는 경우나 가족만 승무하는 선박에 대하여는 제1항 본문을 적용하지 아니한다.", "id": 793}, {"category": "개정 2013.3.23.", "question": "41.psc 검사시 적용되는 협약들", "answer": "1)SOLAS 2)MAROPL 3) ILL 4)STCW 5) COLREG 6) 기타각국 정부의 관계법령 및 규정.\nPSC의 근거 협약 5가지 말하시오.\n예를 들어 헤이그 룰이 기출로 나왔다면 헤이그만 보지 마시고 헤이그 룰과 함께 헤이그 비스비, 함부르크 룰까지 함께 보시고, GM을 공부하신다면 실무에서 쓰는 KM-KG로 구하는 법만 공부하시지 마시고, 초기 복원력 구하는 법,횡요 주기 구하는법, 경사시험 시, 정적 복원력, 동적 복원력, 해당 그래프들 보는 방법, 배수량등곡선도에서 얻을 수 있는 수치들 등을 함께 보시는 것이 좋더라고요. MARPOL도 기름 배출 요건이 기출로 나왔다고 그것만 외우지 마시고, 일반 빌지배출요건, 유해액제 요건, 포장위험화물 요건, 오수, 폐기물, 대기 오염까지 다 확실히 보셔야할 듯합니다.\n기출에 편서풍이 나왔다면 또 편서풍만 보지 마시고, 무역풍, 제트스트림, 아열대 무풍대, 적도 무풍대 등도 같이 보셔야겠지요.처음 떨어졌을 때는 기출문제만 달랑 외워서 가서 교수님이 좀만 다른 각도로 물어보면 몰라서 떨어졌던 기억이 있습니다.\n-SOLAS 풀네임과 각 장의 주제들(특히 위험물은 몇장이고 무슨 코드 적용되는지는 단골 문제구요)\n-MARPOL 해당 되는 모든 물질 배출 요건 수치까지 완전 외우기\n-STCW 각 장의 주제들과 특히 이번에 개정된 ILO의 선원 휴식 규정 수치 등\n-ILL 만재흘수 순서와, A와 B로 나뉘는 기준과 이유 등.\n-COLREG는 내용을 완전 숙지가 필요하다고 생각합니다. (6에서 재거론 하겠습니다.)\n(최근에는 충방 내용을 영작하라는 질문이 빈번하게 나오고 있습니다)\n-ISM 목적과 주요 내용, 해당 증서인 SMC, DOC 풀네임과 뜻\n-ISPS 목적과 풀네임, 보안 등급에 따른 선박 조치, 보안 등급은 누가 올리나 등", "id": 794}, {"category": "개정 2013.3.23.", "question": "75. PSC의 근거 협약 5가지 이상 말하시오.", "answer": "1) 1966 국제만재흘수선협약 (ILL)\n2) 1974 해상인명안전협약 (SOLAS)\n3) 1974 해상인명안전협약에 대한 1978 의정서\n4) 1973/78 해양오염방지협약 (MARPOL)\n5) 1978 선원훈련, 자격증명 및 당직기준에 관한 국제협약 (STCW)\n6) 1972 국제해상충돌예방규칙 (COLREG)\n7) 1976 상선 최저기준협약 (ILO 협약 147호)\n8) MLC", "id": 795}, {"category": "개정 2013.3.23.", "question": "73. PSC Code 30은 무엇을 의미하고 PSC Code30에 해당하는 사유 3가지를 말하시오.", "answer": "1) PSC Code 30의 의미\n출항정지: Detention\n감항성에 영향을 미치는 중대한 결함이 있거나, 선원/여객의 안전을 저해하고 해양오염을 발생시킬 수 있는\n위험이 있는 결함사항이 발견되는 경우에는 code30을 사용하여 결함사항의 시정조치가 완료되기 전까지는\n출항을 금지시킨다. 임시수리 등으로 긴급한 위험요소가 제거되었을 때는 code99로 완화 할 수 있다.\n2) PSC Code30의 사유", "id": 796}, {"category": "개정 2013.3.23.", "question": "74. 집중점검기간이라고 말하는 CIC의 Full name을 쓰시오.", "answer": "Concentrated Inspection Campaign, 중점검사이다. 하나의 항목에 대하여 중점검사를 한다. 예로 이번달에는\n소화기기 중점검사면 비상소화펌프, 소화기, 고정식 소화기 등을 중점검사 하는 것이다.", "id": 797}, {"category": "개정 2013.3.23.", "question": "70. 대한민국 국적 선박이 외국항에서 PSC 수검 후 출항정지를 받은 경우 어떤 법을 근거로 하여 향후 어떤 조치가 되는가?", "answer": "선박안전법의 근거로 해양수산부장관은 외국 항만당국의 PSC에 의하여 출항정지 처분을 받은 대한민국 국적\n선박이 국내에 입항할 경우 해양수산부령이 정하는 바에 따라 관련되는 선박의 구조•설비 등에 대하여 특별점검을 할 수 있다. 다만, 외국정부에서 확인을 요청하는 경우 등 필요한 경우에는 외국에서 특별점검을 할 수 있다.\n또한 해양수산부장관은 외국 항만당국의 항만국통제로 인하여 출항정지명령을 받은 대한민국 국적 선박에\n대하여는 대통령령이 정하는 바에 따라 당해 선박의 선박명, 총톤수, 출항정지 사실 등을 공표할 수 있다.", "id": 798}, {"category": "개정 2013.3.23.", "question": "72. 항만국 검사, 기국 검사, 정부 검사에 대해서 설명하라.", "answer": "1) PSC검사\n항만국 검사는 항만국이 자국의 항구에 기항한 선박에 대해 안전검사를 시행하는 것이다. 선박의 안전기준과\n선원의 자격, 근로조건 등의 기준이 국제협약의 규정에 미달하지 않는지 검사하여 해상의 안전을 도모하기 위한 검사이다.\n2) FSC(Flag State Control) 검사\n기국 검사는 기국이 기국선박에 대해 안전검사를 시행하는 것이다.\n3) 선급검사\n선박의 최초 설계부터 건조 완료시까지 선체구조 및 각종 설비에 대한 도면승인과 건조의 모든 과정 중에\n제조검사와 완성검사를 시행하고 운항중인 선박에 대한 정기적 검사로서 해상에서 선박의 안전을 확보하는\n검사를 시행한다. 선박은 선급 유지를 위해 선급검사를 받아야 하며 선급에 등록된 선박에 대해서는 보험료 할인혜택을 주고 있어 선급 유지를 하는 이유도 있다.\n4) 정부검사\n선박안전법의 검사규정에 따라 정부에서 시행하는 검사를 말하며 한국선급에서 검사업무를 대행한다", "id": 799}, {"category": "개정 2013.3.23.", "question": "35. bc 코드 란?", "answer": "곡물을 제외한 고체 산적 화물의 안전한 적부 및 운송에 적용하는 기준에 관한 최소한의 지침", "id": 800}, {"category": "개정 2013.3.23.", "question": "32.해양사고관련자", "answer": "직무상 고의 또는 과실에 의하여 특정해양사고의 원인을 발생케 하였을 가능성이 있는 해기사, 도선사 및 그외에 해양사고의 원인에 관계가 있는자.", "id": 801}, {"category": "개정 2013.3.23.", "question": "30.위험화물 구분", "answer": "1)1급 – 화약류\n2)2급 – 가스류\n3)3급 – 인화성 액체\n4)4급 – 인화성 고체\n5)5급 – 산화성 물질 및 유기과산화물\n6)6급 – 독성 물질 및 전연성 물질\n7)7급 – 방사선 물질\n8)8급 – 부식성 물질\n9)9급 – 기타 위험 화물 및 제품\nIMDG 9가지 위험물 등급\n위험물의 9가지 등급은 다음과 같습니다.\nClass 1: Explosives (폭발물)\n-화학 반응을 통해 다량의 가스를 발생시켜 주변에 피해를 줄 수 있는 물질입니다.\n-예: 화약, 폭탄, 탄약.\nClass 2: Gases (가스)\n-상온 및 정상기압에서 기체 상태인 물질로, 인화성, 비인화성, 독성, 비독성으로 세분화됩니다.\n-예: LPG, 산소, 아세틸렌.\nClass 3: Flammable Liquids (인화성 액체)\n-인화점이 60℃ 이하인 액체로, 화재 위험이 높습니다.\n-예: 휘발유, 에탄올, 페인트.\nClass 4: Flammable Solids (인화성 고체)\n-마찰, 흡습, 자체 반응 등으로 쉽게 발화하는 고체 물질입니다.\n-Class 4.1: 가연성 고체 (성냥, 유황)\n-Class 4.2: 자연 발화성 물질 (백린)\n-Class 4.3: 물과 접촉 시 인화성 가스를 방출하는 물질 (탄화칼슘)\nClass 5: Oxidizing Substances & Organic Peroxides (산화성 물질 및 유기 과산화물)\n-Class 5.1: 산화성 물질 (과산화수소, 질산암모늄)\n-Class 5.2: 유기 과산화물 (벤조일퍼옥사이드)\n-다른 물질의 연소를 돕거나 폭발을 유발할 수 있습니다.\nClass 6: Toxic & Infectious Substances (독성 및 감염성 물질)\n-Class 6.1: 독성 물질 (청산가리)\n-Class 6.2: 감염성 물질 (병원성 폐기물)\n-인체에 치명적인 독성을 가지고 있거나 질병을 유발할 수 있습니다.\nClass 7: Radioactive Material (방사성 물질)\n-자연적으로 방사선을 방출하는 물질입니다.\n-예: 우라늄, 플루토늄.\nClass 8: Corrosives (부식성 물질)\n-다른 물질과 접촉 시 표면을 부식시키거나 손상시키는 물질입니다.\n-예: 황산, 염산, 수산화나트륨.\nClass 9: Miscellaneous Dangerous Substances (기타 위험물)\n-앞선 8가지 등급에 속하지 않지만, 해상 운송 시 위험을 초래할 수 있는 모든 물질을 포함합니다.\n-예: 드라이아이스, 리튬 배터리, 에어백.\n🚢 1. 위험물 운송 법규 체계 (시험 정답)\n-위험물 해상운송에는 다음 6가지 국제 규정이 핵심입니다:\n1) IMDG Code\n(International Maritime Dangerous Goods Code)\n-해상 위험물 운송의 국제 표준 규칙\n-UN Recommendations 기반\n-모든 위험물을 9개 Class로 분류\n-포장·마킹·라벨·적재·분리 규정 포함\n-SOLAS 제 VII장에 의해 강제규정으로 적용됨\n2) SOLAS Chapter II-2 Part G Regulation 19\n-위험물 운송선에 대한 추가 방화 안전요건\n-“Fire protection of ships carrying dangerous goods”\n3) MARPOL Annex III\n-포장된 형태의 유해물질(Packaged harmful substances)\n-바다 오염 방지법규\n-해양 오염성 위험물에 대해 별도 규정\n4) UN Recommendations on the Transport of Dangerous Goods\n-UN ECOSOC 산하 위원회에서 제정\n-MDG Code의 근간\n-Class 분류, 시험 기준, 포장에 대한 가장 상위 규정\n5) IAEA Regulations for Safe Transport of Radioactive Material\n-방사성 물질(Class 7)의 국제 표준\n-MDG, ICAO, ADR 등에 공통 적용됨\n6) CSC Convention (International Convention for Safe Containers)\n-ISO 컨테이너의 구조·검사·안전 기준\n-위험물 운송 시 컨테이너 자체의 안전을 보증\n🚢 2. IMDG Code — 위험물 Class 분류 (정확한 공식 분류)\n-IMDG는 위험물(Dangerous Goods)을 9가지 Class로 분류하며,각 Class는 다음과 같습니다:\nClass 1 — Explosives (화약류)\n폭발 위험\nDivisions 1.1~1.6으로 세분화\nClass 2 — Gases (가스류)\n압축·액화·고압용해기가스\nDivisions: 2.1(가연성), 2.2(비가연성), 2.3(독성)\nClass 3 — Flammable Liquids (인화성 액체)\n👉 시험 문제에서 자주 나옴 — 아래에서 자세히 설명\nClass 4 — Flammable Solids, Substances Liable to Spontaneous Combustion, Substances Which Emit Flammable Gas with Water", "id": 802}, {"category": "개정 2013.3.23.", "question": "4.3 물과 반응하여 인화성 가스 발생", "answer": "Class 5 — Oxidizing Substances & Organic Peroxides", "id": 803}, {"category": "개정 2013.3.23.", "question": "5.2 유기과산화물", "answer": "Class 6 — Toxic & Infectious Substances", "id": 804}, {"category": "개정 2013.3.23.", "question": "6.2 전염성 물질", "answer": "Class 7 — Radioactive Material (방사성)\nClass 8 — Corrosive Substances (부식성 물질)\nClass 9 — Miscellaneous Dangerous Goods (기타 위험 화물)\n리튬 배터리\n드라이아이스\n환경유해성 물질 등 포함\n🔥 3. Class 3 — 인화성 액체 (Flammable Liquids) (시험 필수)\nClass 3는 IMDG에서 가장 큰 비중을 차지하며,기름·용제·알코올 등 항해 중 가장 자주 접하는 위험물입니다.\n📌 Class 3 정의 (공식 정의 — 매우 중요)\n인화성 액체(Flammable Liquid)란?\nFlash Point(인화점) 60°C 이하인 액체\n이 온도 이하에서 증기가 발생하며\n공기와 섞여 점화원 존재 시 폭발적 연소가 가능\n📌 일반적인 Class 3 화물 예시\n가솔린 (Gasoline)\n나프타 (Naphtha)\n벤젠 (Benzene)\n톨루엔 (Toluene)\n알코올류 (Ethanol, Methanol)\n아세톤 (Acetone)\n페인트·신나 (Thinner)\n📌 Class 3 특징", "id": 805}, {"category": "개정 2013.3.23.", "question": "4. 적재 시 다른 Class와 분리(Segregation Table 적용)", "answer": "📌 Class 3의 위험성 요소\n인화성(Flammable)\n폭발성(Explosive vapors)\n독성(Toxic vapors)\n정전기 발생\n증기 확산성(heavy vapor cloud)\n🚢 4. 정리 — 시험용 핵심답안\nIMDG Code는 위험물 해상운송을 위한 국제통일 규칙으로, 위험물을 9개 Class로 분류한다.각각은 화약류, 가스류, 인화성 액체류, 인화성 고체류, 자연발화성, 물과 반응하는물질, 산화성/유기과산화물, 독물/전염성 물질, 방사성, 부식성, 기타 위험물로 구성된다.Class 3는 인화점 60℃ 이하의 인화성 액체류를 의미한다", "id": 806}, {"category": "개정 2013.3.23.", "question": "27. 유조선 통항금지해역", "answer": "- 서해안 태안반도 옹도에서 동해항 앞 해안을 잇는 선안의 해역(472마일)\n- 서ㆍ남해안은 연안에서 약 10～25마일, 동해안은 3마일이내해역", "id": 807}, {"category": "개정 2013.3.23.", "question": "20.임금, 통상임금, 승선평균임금의차이는?", "answer": "통상임금 : 정기적, 고정적,일률적으로 지급되는 임금 –시간외 수당\n- 생활보상목적 또는 실비변산금은 포함되지 않는다\n승선평균임금 : 승선시간(평균3개월) 선원에게 지급된임금총액을 그 승선기간의 총 일수로 나눈 금액 퇴직금, 장해보상, 일시보상, 장재비, 행방불명보상등을 계산할 때 사용", "id": 808}, {"category": "개정 2013.3.23.", "question": "50. 선원법상 임금, 통상임금에 대하여 설명하시오.", "answer": "①\"임금\"이란 선박소유자가 근로의 대가로 선원에게 임금, 봉급, 그 밖에 어떠한 명칭으로든 지급하는 모든\n금전을 말한다.\n②\"통상임금\"이란 선원에게 정기적·일률적으로 / 일정한 근로 또는 총 근로에 대하여 / 지급하기로 정하여진 /\n시간급금액, 일급금액, 주급금액, 월급금액 또는 도급금액(都給金額)을 말한다.\n즉 통상임금에는 기본급 외에 직무수당과 직책수당, 기술수당, 면허수당, 위험수당 등 선박소유자가 일률적으로\n지급하는 임금은 모두 포함되지만 상여금, 연월차수당, 연장근로수당 등과 같이 근로실적에 따라 변동 지급되는 임금은 포함되지 않는다.\n③\"승선평균임금\"이란 산정하여야 할 사유가 발생한 날 이전 승선기간(3개월을 초과하는 경우에는 최근 3개월로 한다)에 그 선원에게 지급된 임금 총액을 그 승선기간의 총 일수로 나눈 금액을 말한다. 다만, 이 금액이\n통상임금보다 적은 경우에는 통상임금을 승선평균임금으로 본다", "id": 809}, {"category": "개정 2013.3.23.", "question": "57. SOPEP을 비치하고 있어야 하는 선박(해양오염방지법 제2조)를 말하시오.", "answer": "1) 총톤수 400톤 이상의 유조선 이외의 선박(군함, 경찰용 선박 및 국내항해만 사용하는 부선은 제외한다)\n2) 총톤수 150톤 이상의 유조선\n3) 시추선 및 플랫폼", "id": 810}, {"category": "개정 2013.3.23.", "question": "5.SOPEP의 내용", "answer": "1)기름오염사고에 대하여 선장 또는 다른 본선책임자가 취할 절차.\n2)기름오염사고시 연락할 당국 또는 사람의 목록\n3)사고후 기름의 유출을 감소시키거나 통제하기 위하여 본선 요원이 신속하게 취하여야 할 조치\n4)기름오염 방제시 국가 및 지역관청과 본선의 조치에 대해 협의하기 위한 본선의 절차 및 연락 담당", "id": 811}, {"category": "개정 2013.3.23.", "question": "6. Sopep이란? 연안국연락처몇개월마다 바꾸는가", "answer": "shipboard oill pollution emergency response plan\n선주 및 해양시설 소유자가 기름이 해양에 배출될 경우 취하여야할 사항을 규정한 계획서\n연안국 연락처는 3개월마다 갱신", "id": 812}, {"category": "개정 2013.3.23.", "question": "4. 'SOPEP'의 영문 Full Name과 'SOPEP'이 어떤 것인지 설명하세요.", "answer": "1) SOPEP: SHIPBOARD OIL POLLUTION EMERGENCY PLAN\n선주 및 해양시설 소유자가 기름이 해양에 배출될 경우에 취하여야 할 사항을 규정한 사전 계획서를 말한다. 사전 계획에 따라 평상시 훈련을 함으로서 오염사고가 발생했을 때 보다 신속하고 효과적인 방제조치로 오염피해를 최소화하기 위한 것으로, 선급의 검인을 받아 당해 선박 또는 해양시설 등에 비치하여야 한다.\n2) Regulation 37 of Annex I of MARPOL, as amended, requires that oil tankers of 150 gross tonnage or more and all ships of 400 gross tonnage or more carry an approved Shipboard Oil Pollution Emergency Plan (SOPEP).\n150톤 이상의 유조선과 400톤 이상의 모든 선박은 승인된 SOPEP을 보유하여야 한다.\n3) 내용\nPart 1\nSECTION 1: PREAMBLE 서두\nSECTION 2: REPORTING REQUIREMENTS 보고 시 요구사항\nSECTION 3: STEPS TO CONTROL DISCHARGE 유출 통제 절차\nSECTION 4: NATIONAL AND LOCAL CO-ORDINATION 연안국과의 협조\nSECTION 5 NON-MANDATORY INFORMATION (VOLUNTARY PART) 추가 정보\nPart 2\n연안국 리스트 (분기별로 업데이트 됨)", "id": 813}, {"category": "개정 2013.3.23.", "question": "연안국리스트 갱신주기와 방제자제수량 확인 주기를 말하시오.", "answer": "1) 연안국리스트 갱신주기: 분기별로 최신화 하여야 한다.(3개월)\n연안국 연락처 목록은 MARPOL 협약에 서명한 모든 당사국을 대신하여 IMO에서 발간한 연락처의 최신 목록은 IMO 홈페이지로부터 구할 수 있으며 변동사항이 있을 경우 항상 최신화를 유지하여야 한다.\n2) 방제자제 수량 확인주기: 매달", "id": 814}, {"category": "개정 2013.3.23.", "question": "SOPEP에 들어있는 내용이 무엇이 있는지 말하시오.", "answer": "1) 선박 또는 해양시설의 방제조직에 관한 사항\n2) 기름 유출사고 발생시 선박의 선장이 취하여야 할 보고절차에 관한 사항\n3) 기름 유출을 줄이기 위하여 선박의 선원이 취하여야 할 방제 조치에 관한 사항\n4) 선박의 주요제원과 선체 구조도면 및 주요 배관장치의 배치도면\n5) 선박의 선원에 관한 방제교육 및 훈련에 관한 사항\n6) 기름유출사고 시 그 사실을 통보할 연안 당사국의 기관명칭, 연락처 및 방제에 필요한 사항\n7) 기름유출사고 발생 시 육상에서 제공하는 전산화된 손상복원성 및 잔존강도에 대한 계산 프로그램을 이용할 수 있는 방법에 관한 사항(재화중량톤수 5천톤 이상의 유조선에 해당)\n8) 기름오염 방제자재 List", "id": 815}, {"category": "개정 2013.3.23.", "question": "1. 본선의 해양오염 방제 활동", "answer": "선장은 사고의 규모에 관계없이 본선으로부터 오염이 발생하거나 발생될 것으로 추측된다면 본선의 책임 여부와 관계없이 오염방제를 위한 최선의 조치를 취하여야 한다.", "id": 816}, {"category": "개정 2013.3.23.", "question": "2. 조치 사항", "answer": "1) 모든 Pumping 작업을 중지하고, 빌지, 발라스트, Bunker, Cargo system 등의 모든 밸브 폐쇄\n2) 항만당국, 회사(공무팀 및 지역본부 운항담당자), P&I 연락사무소에 보고\n3) 회사 및 P&I와 협의하여 Survey를 지정, 조사토록 하고 만약 항만 당국에서 사고조사를 하면 즉시 P&I로 통보\n4) 가능한 한 사고의 원인 명시하여 통보\n5) 오염의 범위를 측정할 수 있도록 사진 촬영하고 가능한 한 오염물질의 샘플을 채취, 봉인 후 날짜 기록\n6) Tank Overflow로 인한 경우 하기사항을 관련자로부터 수집, 기록\nA. 오염사고까지의 시간별 진행결과\nB. Pump 작동 개시시각, 중지시각\nC. 합의된 Pumping Rate 및 Tank 용량\nD. Topping off 계획 및 Procedure (Pumping Rate 조절 등)\nE. Sounding 기록\n7) 본선장비의 결함으로 인한 오염 사고시에는 최근의 시험기록, 보수유지기록 및 Test Cert. 등을 수집 보관\n8) 수시로 회사 및 P&I 연락사무소와 협의, 각 상황에 맞는 조치를 취할 수 있도록 조치", "id": 817}, {"category": "개정 2013.3.23.", "question": "기름유출 사고 발생시 관련 당국에 보고해야하는 사항은?", "answer": "- 기름유출 사고 발생시 관련 당국에 보고해야하는 사항은 IMO Resolution A. 851 (20)에 나와있다.\nIMO Resolution A. 851 (20) \"General Principles for Ship Reporting Systems and Ship Reporting Requirements, including Guidelines for Reporting Incidents involving Dangerous Goods, Harmful Substances and/ or Marine Pollutants\".\n- Initial Report(초기보고)와 Follow-up Report(추가보고)로 나눌 수 있다.\n- Initial Report에는 다음 사항이 들어가야 한다.\n1) Ship\n2) Date and time (UTC) of event\n3) Position (경위도)\n4) Position (물표로부터의 거리,방위)\n5) True course\n6) Speed at time of incident\n7) Route information\n8) Radio communications\n9) Time (UTC) of next report\n10) Cargo on board: can be included in „RR„ as relevant\n11) Defects or damage or deficiencies or other limitations\n12) Description of pollution or possible overboard discharge\n13) Weather conditions\n14) Ship’s representative and/ or owner\n15) Ship’s size and type\n16) Miscellaneous and additional information\n- Follow-up Report는 선박의 상태, 기름유출 및 확산 속도, 기상 및 해면 상태, 정화작업 상태 등에 대한 변경 사실을 보고한다.", "id": 818}, {"category": "개정 2013.3.23.", "question": "10. Seemp 란?", "answer": "ship energe efficiency management plan\n선박 에너이 효율 관리계획서\n선박에서 co2절감을 위해 목표를 작성하고 실행 및 모니터링하는 계획서로 2013년1월부터 시행됨\nMarpol 부속서중 6에 나오는 대기오염에서 나오는 대기오염 가스 3종류 그리고 영어명칭.\n- 질소 산화물 NOx (Nitrogen oxides)\n- 황산화물 SOx (Sulphur oxides)\n- 휘발성 유기화합물 VOCs (Volatile organic compounds)\nMARPOL 부속서 6장에서 규제하는 주요 대기오염 물질은 다음과 같습니다.\n•황산화물 (SOx): 선박 연료에 포함된 황 성분이 연소되면서 발생합니다. 산성비의 주요 원인이며, 인체 호흡기 질환을 유발합니다. 부속서 6장은 선박 연료의 황 함량에 대한 엄격한 규제를 적용하고 있으며, 특히 **배출규제해역(ECA)**에서는 더 강화된 기준을 요구합니다.\n•질소산화물 (NOx): 선박 디젤 엔진의 고온 고압 연소 과정에서 발생합니다. 스모그와 산성비의 원인이 되며, 인체에 유해한 영향을 미칩니다. 부속서 6장은 엔진의 출력과 건조 시점에 따라 Tier I, II, III와 같은 단계별 배출 허용 기준을 설정하고 있습니다.\n•오존층 파괴물질 (ODS): 냉매나 소화 약제 등으로 사용되는 물질입니다. 의도적인 배출을 금지하며, 해당 물질을 포함하는 새로운 설비의 설치를 금지합니다.\n•휘발성 유기화합물 (VOCs): 유조선이 화물을 적재하거나 이송하는 과정에서 발생하는 유증기입니다. 부속서 6장은 유조선에서 이 물질의 배출을 최소화하기 위한 규정을 포함합니다.\n•선박 소각 물질: 선박 내에서 쓰레기 등을 소각하는 과정에서 발생하는 유해 물질입니다. 선박용 소각기의 형식 승인과 사용 절차에 대한 규정을 명시하고 있습니다.", "id": 819}, {"category": "개정 2013.3.23.", "question": "11. MARPOL부속서 6장에서 소각이 금지된 물질을 기술하시오.", "answer": "1) 화물 잔유물\n2) 오염된 포장물질\n3) 중금속이 포함된 쓰레기\n4) 할론을 함유한 석유제품\n5) 폴리염화 비닐", "id": 820}, {"category": "개정 2013.3.23.", "question": "17. MARPOL 발효기준은?", "answer": "1. 이 의정서는 동 의정서의 제5조에 따라서 15개국 이상의 당사국이 수락하고, 수락한 국가의 선복량의 합계가 총톤수로 세계상선 선복량의 50퍼센트 이상이 되는 날로부터 12개월 후에 발효된다.\n2. 이 의정서 발효일 이후에 비준, 수락, 승인 또는 가입문서를 기탁하면 기탁일 3개월 후부터 발효된다.\n3. 이 의정서에 대한 개정이 협약의 제16규칙에 따라 수락된 것으로 간주되는 날 후에는, 기탁된 비준, 수락,\n승인 또는 가입의 문서는 개정된 의정서에 적용된다.", "id": 821}, {"category": "개정 2013.3.23.", "question": "66. MARPOL 부속서 Annex 1에서 6까지 간략하게 설명하라.", "answer": "1) MARPOL의 정의\n: 선박으로부터 오염 방지를 위한 국제협약(International Convention for the Prevention of Marine Pollution from Ships). MARPOL 73/78이라고도 부르며, 1973년 국제해사기구(IMO : International Maritime Organization)에서 채택한 선박에 의한 오염 방지를 위한 국제조약 및 이에 관련된 1978년의 의정서를 말함.\n- 부속서 I 기름에 의한 오염방지를 위한 규칙(발효1983.10.2)\n- 부속서 II 산적된 유해액체물질에 의한 오염규제를 위한 규칙(발효1987.4.6)\n- 부속서 III 포장된 형태로 선박에 의하여 운송되는 유해물질에 의한 오염방지를 위한 규칙(발효1992.7.1)\n: IMDG(International Maritime Dangerous Goods) CODE\n- 부속서 IV 선박으로부터의 하수에 의한 오염방지를 위한 규칙\n- 부속서 V 선박으로부터의 폐기물에 의한 오염방지를 위한 규칙(발효 1988.12.31)\n- 부속서 VI 선박으로부터의 대기오염방지를 위한 규칙(발효 2005.5.19)\n▣ 부속서 Ⅰ : 기름에 의한 오염방지를 위한 규칙\n: 73/78 MARPOL에서 가장 중요한 부분이 선박으로부터 기름의 배출을 규제하고 있는 부속서 Ⅰ이다. 규제대상은 모든 형태의 석유류인데 원유, 중유, 슬러지(sludge), 폐유 및 정제유이다.\n그러나 부속서 Ⅱ에 의한 석유화학물질(Petrochemicals)은 제외된다.\n이 부속서에 따라 해양에 대한 기름의 배출은 다음의 조건을 충족시키지 아니하는 한 금지된다.\n즉 탱커의 경우에는\n(ⅰ) 특별해역내에 있지 아니하며 항행중일 것\n(ⅱ) 가장 가까운 육지로부터 탱커까지의 거리가 50해리를 넘을 것\n(ⅲ) 유분의 순간배출율이 1해리당 30리터 이하일 것\n(ⅳ) 해역에 배출되는 기름의 총량이 현존 탱커에 대하여는 최종적으로 운송한 화물량의\n15,000분의 1 이하이고 신조 탱커에 대하여는 30,000분의 1 이하일 것\n(ⅴ) 탱커가 배출제어감시장치 및 슬롭탱크장치를 작동시키고 있어야 한다.\n한편, 탱커 이외의 총톤수 400톤 이상인 선박의 경우에는,\n(ⅰ) 특별해역 내에 있지 아니하며 항행중일 것\n(ⅱ) 유출액 중의 유분이 희석되지 아니하고 15PPM 이하일 것\n(ⅲ) 기름배출감시제어시스템, 유수분리장치, 기름필터시스템 또는 기타의 장치를 작동시키고\n있어야 한다.\n특별해역으로서는 지중해해역, 발틱해해역, 흑해해역, 홍해해역, 걸프해역, 아덴만해역 및 남극해역이 지정되어 있으며, 탱커와 총톤수 400톤 이상의 선박은 특별해역 내에서는 일체의 기름 또는 유성혼합물을 배출할 수 없다.\n한편, 각 당사국 정부는 선박의 유성잔류물 및 유성혼합물을 수용하기 위한 수용시설 (Reception facilities)을 확보하여야 한다. 수용시설은 이를 이용하는 선박이 부당하게 지연되는 일이 없도록 적절한 용량의 것이어야 하며 부속서 제 12 규칙에서는 수용시설이 필요한 항구의 유형과 용량이 규정되어 있다.\n또 유수혼합에 의한 유성밸러스트의 문제를 해결하기 위하여 탱커에는 분리밸러스트 탱크의 설치, 양하 중 원유에 의한 탱크청소를 위한 원유세정(Crude Oil Washig) 장치를 설치토록 하였으며, 유성 밸러스트위에 원유를 적재하는 방식, 즉 Load-on-Top System을 도입하였다\n또한 선박의 구조, 설비, 장치가 이 부속서에 적합한지 여부를 확인하기 위하여 총톤수 150톤 이상의 모든 탱커와 총톤수 400톤 이상의 모든 선박은 주관청의 초기검사 및 정기검사를 받고 국제기름오염방지증서(IOPP Certficate)를 교부받아야 한다. 기름배출감시제어장치, 유수분리장치, 이와 관련된 펌프와 파이프의 시스템에 대하여는 중간검사를 받은 뒤 IOPP 증서에 배서를 받아야 한다. 정기검사는 5년, 중간검사는 30개월을 넘지 않는 간격으로 시행한다.\n▣ 부속서 Ⅱ : 산적된 유해액체물질에 의한 오염규제를 위한 규칙\n: 유해액체물질을 산적으로(in bulk) 운송하는 선박에 대하여 적용된다. 유해액체물질이라 함은 해양생물 혹은 인간의 건강에 미치는 위해 또는 해독에 따라 X류(category)로부터 OS류로 분류되어 있다. 해양에 배출된 경우 X류는 해양자원이나 인체에 막대한 위해를 미치는 유해액체물질이며 OS류는 인식이 가능한 경미한 위해를 미치는 유해액체물질을 말한다.\nX류의 물질 또는 X류 물질을 함유하는 밸러스트수, 탱크세정수, 기타의 잔류물 혹은 혼합물은 해양에의 배출이 금지되며, Y류 내지 OS류에 속하는 물질 혹은 이들의 함유물은 선박이 7놋트 이상으로 항행 중이며 육지에서 12해리 이상 떨어진 곳에서 배출하는 등 일정한 요건을 충족시키는 경우에만 해양에 배출할 수 있다.\nANNEX II CARGO는 세부사항 즉 환경에 미치는 영향에 따라 X, Y, Z, OS류로 나뉘는데 X(Major Hazard), Y(Hazard), Z (Minor Hazard) OS(기타)로 분류 된다. 배출요건은 (Base Line) 으로부터 12마일 이상 떨어져야 하고, 수심 25M이상, 선속 7노트 이상 , 특별구역은 남극해.\n이 부속서는 그 밖에도 운송물질의 종류에 따라 탱크와 파이프의 세정, 세정수의 수용시설에의 배출, 화물기록부에의 기재에 관하여 규정하고 있다. 또한 유해액체물질은 산적 운송하는 선박은 정기검사 또는 중간검사를 받고 부속서 Ⅰ과 유사한 「유해액체물질의 산적운송을 위한 국제오염방지증서」(NLS 증서)가 발급되어야 한다.\n▣ 부속서 Ⅲ : 포장된 형태로 선박에 의하여 운송되는 유해물질에 의한 오염방지를 위한 규칙\n: 이 부속서는 포장된 형태로 또는 화물컨테이너, 포터블탱크 또는 도로용 또는 철도용 탱크차에 넣어서 해상으로 운송되는 유해물질에 의한 오염을 방지하기 위한 규칙이다. 여기에서는 유해물질의 포장, 표시 및 표찰, 서류작성, 적부방법, 적재수량의 제한에 관한 일반적 요건을 규정하고 있다.\n▣ 부속서 Ⅳ : 선박으로부터의 하수에 의한 오염방지를 위한 규칙\n: 이 부속서에 따라 선박이 항해중이며 일정한 배출율에 따르는 등의 요건을 지키지 아니하면 선박으로부터의 하수배출은 금지된다. 분쇄하고 소독한 하수를 배출하기 위해서는 선박이 가장 가까운 육지로부터 4해리 이상 떨어져 있어야 하며, 분쇄하지 아니하거나 소독하지 아니한 하수를 배출하기 위해서는 12해리 이상 떨어져 있어야 한다. 규제대상 선박은 설비, 비품 등에 대하여 초기검사와 정기검사를 받아야 하며 국제하수오염방지증서(ISPP 증서)가 교부되어야 한다.\n▣ 부속서 Ⅴ : 선박으로부터의 폐기물에 의한 오염방지를 위한 규칙\n: 이 부속서는 합성로우프, 플라스틱, 음식찌꺼기 등의 각종 쓰레기에 의한 오염을 방지하기 위한 규칙이다. 지중해, 발틱해, 흑해, 홍해 등의 특별해역에서는 음식찌꺼기만 배출이 허용되며, 던네지(Dunnage) 및 포장재료는 육지로부터 25해리 이상, 음식찌꺼기는 12해리 이상 떨어진 곳에서 버려야 한다. 한편, 협약 당사국 정부는 항구 및 터미널에 쓰레기 처리를 위한 수용시설을 갖추어야 한다.", "id": 822}, {"category": "개정 2013.3.23.", "question": "1. 플라스틱 및 던네지(Dunnage)·포장재료 배출 규정 (가장 큰 변화)", "answer": "과거 규정 (질문 내용): 던네지(화물 고정용 목재) 및 포장재료를 일반 해역에서 25해리 이상 떨어진 곳에서 배출할 수 있었습니다.\n현재 규정: 플라스틱은 물론이고, 던네지, 포장재료, 종이, 제품, 걸레, 금속, 유리를 포함한 모든 일반 쓰레기의 해상 배출이 전면 금지되었습니다. 즉, 영해 기선으로부터 몇 해리가 떨어졌든 상관없이 바다에는 절대 버릴 수 없으며, 모두 육상 수용시설로 양륙해야 합니다.", "id": 823}, {"category": "개정 2013.3.23.", "question": "2. 음식찌꺼기(Food Wastes) 배출 규정", "answer": "음식찌꺼기는 현재도 제한적으로 배출이 허용되지만, 해역에 따라 조건이 훨씬 까다로워졌습니다.\n일반 해역:\n분쇄기(25mm 이하 망 통과)를 통과한 경우: 영해 기선으로부터 3해리 이상 떨어진 곳에서 배출 가능\n분쇄하지 않은 경우: 영해 기선으로부터 12해리 이상 떨어진 곳에서 배출 가능\n특별해역 (지중해, 발틱해, 흑해, 홍해, 걸프해역 등):\n특별해역 내에서는 오직 분쇄된 음식찌꺼기만 배출할 수 있으며, 이마저도 영해 기선으로부터 12해리 이상 떨어진 곳이어야 합니다. 분쇄되지 않은 음식찌꺼기는 배출이 절대 불가능합니다.\n▣ 부속서 Ⅵ : 선박으로부터의 대기오염방지를 위한 규칙\n: 이 부속서의 규정은 제3조, 제5조 및 제12조에서 명시적으로 달리 규정하는 경우를 제외하고 모든 선박에 적용한다. 총톤수 400톤 이상 또는 총 설치동력이 1,500KW 이상인 선박은 최초검사, 정기검사(5년), 중간검사 및 불시검사를 받고 국제대기오염방지증서(International Air Pollution Prevention Certificate)를 교부받아야 한다.\n검사 후 임의로 설비에 대한 변경은 금지된다. 할론의 고의적인 방출이 금지되고 2020년 1월 1일 이후 할론을 함유하는 소화장치의 설치가 금지되며, 선박에서 제거된 할론 및 할론함유설비는 수용시설에 인도해야 한다. 냉매(CFCs) 및 기타 오존층 파괴물질의 고의적인 방출이 금지되고 2020년 1월 1일 이후 이 물질을 함유한 장치의 설치가 금지되며, 선박에서 제거된 이 물질 함유 장치는 수용시설에 인도해야 한다. 질소산화물(NOx),\n황산화물(SOx) 및 휘발성 유기합성물(VOCs)은 배출 한계치와 탱커의 Vapour emission control에 대하여 규정한다.", "id": 824}, {"category": "개정 2013.3.23.", "question": "1. MARPOL", "answer": "* MARPOL 부속서에 대해 설명하시오\n* MARPOL 부속서별 배출규칙을 설명하시오\n선박으로부터 오염 방지를 위한 국제협약(International Convention for the Prevention of Marine Pollution from Ships). MARPOL 73/78이라고도 부르며, 1973년 국제해사기구(IMO:International Maritime Organization)에서 채택한 선박에 의한 오염 방지를 위한 국제조약 및 이에 관련된 1978년의 의정서를 말함.\nMARPOL (International Convention for Prevention of Marine Pollution from Ships)\nMARPOL은 통상적인 운항상태의 선박으로부터의 오염 및 사고에 의한 오염을 방지하거나 최소화하기 위한 규정들을 아래와 같은 6개의 부속서에 담고 있다.\n부속서 I 기름에 의한 오염방지를 위한 규칙\n부속서 II 산적된 유해액체물질에 의한 오염규제를 위한 규칙\n부속서 III 포장된 형태로 선박에 의하여 운송되는 유해물질에 의한 오염방지를 위한 규칙\n부속서 IV 선박으로부터의 하수에 의한 오염방지를 위한 규칙\n부속서 V 선박으로부터의 폐기물에 의한 오염방지를 위한 규칙\n부속서 VI 선박으로부터의 대기오염방지를 위한 규칙\n▣ 부속서 Ⅰ: 기름에 의한 오염방지를 위한 규칙\n73/78 MARPOL에서 가장 중요한 부분이 선박으로부터 기름의 배출을 규제하고 있는 부속서 Ⅰ이다. 규제대상은 모든 형태의 석유류인데 원유, 중유, 슬러지(sludge), 폐유 및 정제유이다. 그러나 부속서 Ⅱ에 의한 석유화학물질(Petrochemicals)은 제외된다.\n이 부속서에 따라 해양에 대한 기름의 배출은 다음의 조건을 충족시키지 아니하는 한 금지된다.\n즉 탱커의 경우에는\n(ⅰ) 특별해역내에 있지 아니하며 항행중일 것\n(ⅱ) 가장 가까운 육지로부터 탱커까지의 거리가 50해리를 넘을 것\n(ⅲ) 유분의 순간배출율이 1해리당 30리터 이하일 것\n(ⅳ) 해역에 배출되는 기름의 총량이 현존 탱커( (1979년 12월 31일 또는 그 이전에 인도 됨)에 대하여는 최종적으로 운송한 화물량의 15,000분의 1 이하이고 신조 탱커에 대하여는 30,000분의 1 이하일 것\n(ⅴ) 탱커가 배출제어감시장치 및 슬롭탱크장치를 작동시키고 있어야 한다.\n한편, 탱커 이외의 총톤수 400톤 이상인 선박의 경우에는,\n(ⅰ) 특별해역 내에 있지 아니하며 항행중일 것\n(ⅱ) 유출액 중의 유분이 희석되지 아니하고 15PPM 이하일 것\n(ⅲ) 기름배출제어감시장치, 유수분리장치, 기름필터시스템 또는 기타의 장치를 작동시키고 있어야 한다.\n특별해역으로서는 1지중해해역, 2발틱해해역, 3흑해해역, 4홍해해역, 5걸프해역, 6아덴만해역 및 7남극해역이 지정되어 있으며, 탱커와 총톤수 400톤 이상의 선박은 특별해역 내에서는 일체의 기름 또는 유성혼합물을 배출할 수 없다.\n한편, 각 당사국 정부는 선박의 유성잔류물 및 유성혼합물을 수용하기 위한 수용시설 (Reception facilities)을 확보하여야 한다. 수용시설은 이를 이용하는 선박이 부당하게 지연되는 일이 없도록 적절한 용량의 것이어야 하며 부속서 제 12 규칙에서는 수용시설이 필요한 항구의 유형과 용량이 규정되어 있다.\n또 유수혼합에 의한 유성밸러스트의 문제를 해결하기 위하여 탱커에는 분리밸러스트 탱크의 설치, 양하중 원유에 의한 탱크청소를 위한 원유세정(Crude Oil Washig) 장치를 설치토록 하였으며, 유성 밸러스트 위에 원유를 적재하는 방식, 즉 Load-on-Top System을 도입하였다.\n또한 선박의 구조, 설비, 장치가 이 부속서에 적합한지 여부를 확인하기 위하여 총톤수 150톤 이상의 모든 탱커와 총톤수 400톤 이상의 모든 선박은 주관청의 초기검사 및 정기검사를 받고 국제기름오염방지증서(IOPP Certficate)를 교부받아야 한다. 기름배출감시제어장치, 유수분리장치, 이와 관련된 펌프와 파이프의 시스템에 대하여는 중간검사를 받은 뒤 IOPP 증서에 배서를 받아야 한다. 정기검사는 5년, 중간검사는 30개월을 넘지 않는 간격으로 시행한다.\n▣ 부속서 Ⅱ: 산적된 유해액체물질에 의한 오염규제를 위한 규칙\n유해액체물질을 산적으로(in bulk) 운송하는 선박에 대하여 적용된다. 유해액체물질이라 함은 해양생물 혹은 인간의 건강에 미치는 위해 또는 해독에 따라 x,y,z류로 분류되어 있다.\nx류의 물질 또는 x물질을 함유하는 밸러스트수, 탱크세정수, 기타의 잔류물 혹은 혼합물은 해양에의 배출이 금지되며, y류 내지 z류에 속하는 물질 혹은 이들의 함유물은 선박이 7놋트 이상으로 항행중이며 육지에서 12해리 이상 떨어진 곳에서 배출하는 등 일정한 요건을 충족시키는 경우에만 해양에 배출할 수 있다.\n이 부속서는 그밖에도 운송물질의 종류에 따라 탱크와 파이프의 세정, 세정수의 수용시설에의 배출, 화물기록부에의 기재에 관하여 규정하고 있다. 또한 유해액체물질을 산적운송하는 선박은 정기검사 또는 중간검사를 받고 부속서Ⅰ과 유사한 「유해액체물질의 산적운송을 위한 국제오염방지증서」(NLS 증서)가 발급되어야 한다.\n▣ 부속서 Ⅲ: 포장된 형태로 선박에 의하여 운송되는 유해물질에 의한 오염방지를 위한 규칙\n이 부속서는 포장된 형태로 또는 화물컨테이너, 포터블탱크 또는 도로용 또는 철도용 탱크차에 넣어서 해상으로 운송되는 유해물질에 의한 오염을 방지하기 위한 규칙이다. 여기에서는 유해물질의 포장, 표시 및 표찰, 서류작성, 적부방법, 적재수량의 제한에 관한 일반적 요건을 규정하고 있다.\n▣ 부속서 Ⅳ: 선박으로부터의 하수에 의한 오염방지를 위한 규칙\n이 부속서에 따라 선박이 항해중이며 일정한 배출율에 따르는 등의 요건을 지키지 아니하면 선박으로부터의 하수배출은 금지된다. 분쇄하고 소독한 하수를 배출하기 위해서는 선박이 가장 가까운 육지로부터 4해리 이상 떨어져 있어야 하며, 분쇄하지 아니하거나 소독하지 아니한 하수를 배출하기 위해서는 12해리 이상 떨어져 있어야 한다. 규제대상 선박은 설비, 비품 등에 대하여 초기검사와 정기검사를 받아야 하며 국제하수오염방지증서(ISPP 증서)가 교부되어야 한다.\n▣ 부속서 Ⅴ: 선박으로부터의 폐기물에 의한 오염방지를 위한 규칙\n이 부속서는 합성로우프, 플라스틱, 음식찌꺼기 등의 각종 쓰레기에 의한 오염을 방지하기 위한 규칙이다. 협약 당사국 정부는 항구 및 터미널에 쓰레기 처리를 위한 수용시설을 갖추어야 한다. 자세한 내용은 아래 표 참조.\n한편, 각 당사국 정부는 선박의 유성잔류물 및 유성혼합물을 수용하기 위한 수용시설 (Reception facilities)을 확보하여야 한다. 수용시설은 이를 이용하는 선박이 부당하게 지연되는 일이 없도록 적절한 용량의 것이어야 하며 부속서 제 12 규칙에서는 수용시설이 필요한 항구의 유형과 용량이 규정되어 있다.\n또 유수혼합에 의한 유성밸러스트의 문제를 해결하기 위하여 탱커에는 분리밸러스트 탱크의 설치, 양하중 원유에 의한 탱크청소를 위한 원유세정(Crude Oil Washig) 장치를 설치토록 하였으며, 유성 밸러스트 위에 원유를 적재하는 방식, 즉 Load-on-Top System을 도입하였다.\n또한 선박의 구조, 설비, 장치가 이 부속서에 적합한지 여부를 확인하기 위하여 총톤수 150톤 이상의 모든 탱커와 총톤수 400톤 이상의 모든 선박은 주관청의 초기검사 및 정기검사를 받고 국제기름오염방지증서(IOPP Certficate)를 교부받아야 한다. 기름배출감시제어장치, 유수분리장치, 이와 관련된 펌프와 파이프의 시스템에 대하여는 중간검사를 받은 뒤 IOPP 증서에 배서를 받아야 한다. 정기검사는 5년, 중간검사는 30개월을 넘지 않는 간격으로 시행한다.\n▣ 부속서 Ⅱ: 산적된 유해액체물질에 의한 오염규제를 위한 규칙\n유해액체물질을 산적으로(in bulk) 운송하는 선박에 대하여 적용된다. 유해액체물질이라 함은 해양생물 혹은 인간의 건강에 미치는 위해 또는 해독에 따라 x,y,z류로 분류되어 있다.\nx류의 물질 또는 x물질을 함유하는 밸러스트수, 탱크세정수, 기타의 잔류물 혹은 혼합물은 해양에의 배출이 금지되며, y류 내지 z류에 속하는 물질 혹은 이들의 함유물은 선박이 7놋트 이상으로 항행중이며 육지에서 12해리 이상 떨어진 곳에서 배출하는 등 일정한 요건을 충족시키는 경우에만 해양에 배출할 수 있다.\n이 부속서는 그밖에도 운송물질의 종류에 따라 탱크와 파이프의 세정, 세정수의 수용시설에의 배출, 화물기록부에의 기재에 관하여 규정하고 있다. 또한 유해액체물질을 산적운송하는 선박은 정기검사 또는 중간검사를 받고 부속서Ⅰ과 유사한 「유해액체물질의 산적운송을 위한 국제오염방지증서」(NLS 증서)가 발급되어야 한다.\n▣ 부속서 Ⅵ: 선박으로부터의 대기오염방지를 위한 규칙\n이 부속서의 규정은 제3조, 제5조 및 제12조에서 명시적으로 달리 규정하는 경우를 제외하고 모든 선박에 적용한다. 총톤수 400톤 이상 또는 총 설치동력이 1,500KW 이상인 선박은 최초검사, 정기검사(5년), 중간검사 및 불시검사를 받고 국제대기오염방지증서(International Air Pollution Prevention Certificate)를 교부받아야 한다. 검사 후 임의로 설비에 대한 변경은 금지된다. 할론의 고의적인 방출이 금지되고 2020년 1월 1일 이후 할론을 함유하는 소화장치의 설치가 금지되며, 선박에서 제거된 할론 및 할론함유설비는 수용시설에 인도해야 한다. 냉매(CFCs) 및 기타 오존층 파괴물질의 고의적인 방출이 금지되고 2020년 1월 1일 이후 이 물질을 함유한 장치의 설치가 금지되며, 선박에서 제거된 이 물질 함유 장치는 수용시설에 인도해야 한다. 질소산화물(NOx), 황산화물(SOx) 및 휘발성 유기합성물(VOCs)은 배출 한계치와 탱커의 Vapour emission control에 대하여 규정한다.", "id": 825}, {"category": "개정 2013.3.23.", "question": "케미컬 선박의 배출 규정을 설명하시오.", "answer": "1) 특별해역이 아닐 것\n2) 자항 7노트, 끌려갈 때는 4노트 이상일 것\n3) 수면하 배출\n4) 가까운 육지로부터 12마일 이상일 것\n5) 수심 25미터 이상일 것", "id": 826}, {"category": "개정 2013.3.23.", "question": "MARPOL 부속서 제2장 유해물질의 배출기준에서 비자항선과 자항선의 차이를", "answer": "말하시오.\n자항선은 7노트 이상, 비자항선은 4노트 이상의 속력으로 항해 중일 것", "id": 827}, {"category": "개정 2013.3.23.", "question": "1. X류 물질", "answer": "1) 스트리핑장치\n2) 예비세정장치\n3) 유해액체·선박평형수 등의 배출관장치\n4) 수면하 배출장치 (단, 제16조 1항에 따라 유해액체물질을 배출하는 선박은 제외)\n5) 통풍세정장치 (제12조 1항에 따른 정화방법으로 화물창을 정화하는 선박에 한정)", "id": 828}, {"category": "개정 2013.3.23.", "question": "2. Y류 물질", "answer": "1) 스트리핑장치\n2) 예비세정장치 (응고성물질 또는 고점성물질을 운송하는 선박에 한정)\n3) 유해액체·선박평형수 등의 배출관장치\n4) 수면하 배출장치\n5) 통풍세정장치", "id": 829}, {"category": "개정 2013.3.23.", "question": "3. Z류 물질", "answer": "1) 스트리핑장치\n2) 유해액체·선박평형수 등의 배출관장치\n3) 수면하 배출장치\n4) 통풍세정장치", "id": 830}, {"category": "개정 2013.3.23.", "question": "18. 위험•유해물질(HNS: Hazardous and Noxious Substances)의 정의를 말하시오.", "answer": "1) 기름을 제외한 물질로서 인간의 건강과 해양생명체 또는 생물체에 해로운 물질과 쾌적성을 손상시키거나\n다른 합법적인 바다의 이용을 방해하는 물질\n2) IMO가 제정•관리하고 있는 모든 협약•규칙 등에서 위험하거나 해로운 물질로 규정하는 물질을 모두 포함하는 물질", "id": 831}, {"category": "개정 2013.3.23.", "question": "위험물질과 유해물질을 나누어 말하시오.", "answer": "1) 위험물질(Dangerous Goods): LNG, LPG, 폭죽, 유연탄 등\n2) 유해물질(Harmful Substances): 황산, 자일렌, 톨루엔, 벤젠, 액화암모니아, 나프타 등", "id": 832}, {"category": "개정 2013.3.23.", "question": "HNS의 사고 대응절차에 대해 말하시오.", "answer": "1초기응급대응 → 2인명구조(구조자가 있을 경우) → 3사고/위험성평가 → 4통제구역 조정 및 주민 보호조치(필요시) → 5추가 유출 차단 조치(가능한 경우) → 6유출물질 확산방지 → 7제독 → 8사후 조사 및 평가", "id": 833}, {"category": "개정 2013.3.23.", "question": "71. 위험물질 유출시 본선 책임자 및 조치/보고 사항을 말하시오.", "answer": "MARPOL 73 Article, 제8조 (유해물질에 관련된 사고에 대한 보고)\n1. 사고에 대한 보고는 이 협약의 의정서 1의 규정에 따라 지체없이 가능한 충분히 행하여야 한다.", "id": 834}, {"category": "개정 2013.3.23.", "question": "2. 이 협약의 당사국은,", "answer": "1) 담당관 또는 당해 기관이 사고에 대한 모든 보고를 수령하고 처리하기 위하여 필요한 모든 조치를 강구하고,\n2) 타 당사국 및 기국의 회원국에 회람되도록 하기 위하여 그러한 조치의 상세를 기구에 통고하여야 한다.", "id": 835}, {"category": "개정 2013.3.23.", "question": "3. 이 조의 규정에 따라 보고를 받은 당사국은,", "answer": "1) 당해 선박의 주관청 및\n2) 영향을 받을 가능성이 있는 타 국가에 대하여도 동 보고를 지체없이 중계하여야 한다.\n4. 이 협약의 당사국은 해양감시용의 선박 및 항공기와 기타 해당 기관에 대하여 이 협약의 의정서1에 언급된\n사고를 관계 당국에 보고하도록 지시한다. 동 당사국은 적절하다고 생각하는 경우에는 기구 및 타 관계당사국에 적의 통보하여야 한다.", "id": 836}, {"category": "개정 2013.3.23.", "question": "13. MARPOL에서 유해액체물질이 유출되었을 경우 보고하는 절차 및 조치 사항을 말하시오.", "answer": "*의정서 1 유해액체물질로 인한 사고의 통보에 관한 규칙 Protocol I (Incident report)\n제3조 통보의 내용\n(a) 사고가 발생한 선박의 식별기호\n(b) 사고의 발생시각, 종류 및 위치\n(c) 사고에 관계된 유해물질의 양 및 종류\n(d) 원조 및 구조의 방법\n제4조 보충\n통보의정서에 따라 통보의무가 있는 자는 가능한 경우에는 다음 사항을 이행하여야 한다.\n(a) 필요에 따라서 최초의 통보를 보충하고 또 사태의 진전에 관한 정보를 제공할 것\n(b) 영향을 받는 국가로부터의 추가정보의 요청에 가능한 한 응할 것\n제5조 통보의 절차\n통보는 가장 가까운 연안국에 대하여 이용가능한 가장 빠른 전자통신을 이용하여 가능한 한 다른 통신에 우선해서 이루어져야 한다.\nMARPOL 73 Article, Protocol I (incident report), 제3조 (통보의 내용)", "id": 837}, {"category": "개정 2013.3.23.", "question": "1. 어떠한 경우에도 다음 사항을 통보하여야 한다.", "answer": "1) 사고가 발생한 선박의 식별기호\n2) 사고의 발생시각, 종류 및 위치\n3) 사고에 관계된 유해물질 양 및 종류\n4) 원조 및 구조의 방법\nMARPOL 73 Article, Protocol I (incident report), 제5조 (통보의 절차)\n1. 통보는 가장 가까운 연안국에 대하여 이용가능한 가장 빠른 전자통신을 이용하여 가능한 한 다른 통신에 우선해서 이루어져야 한다.\n2. 이 의정서의 규칙을 실시하기 위하여, 당사국은 기구가 작성한 지침에 따라서 유해물질의 사고의 통보시에\n따라야 할 절차에 관한 규칙 또는 지시를 발행하거나 발행되도록 하여야 한다.\n고쳐야 할 점 및 최신 규정\n1) 폐기물기록부(Garbage Record Book)\n•과거에는 총톤수 400톤 이상 또는 승선인원 15인 이상인 선박만 의무였지만, 최근 개정된 규정에 따르면 100GT 이상 선박으로 확대되었습니다. lr.org+2Virtue Marine+2\no예컨대 2024년 5월 1일부로 개정된 MEPC.360(79) 에 따르면 100GT 이상 및 승선인원 15명 이상인 선박은 Garbage Record Book를 비치해야 합니다. lr.org+1\n•따라서 “400톤 이상”만이라는 과거 기준은 지금은 변경된 상태입니다.\n2) 기름기록부(Oil Record Book)\n•MARPOL Annex I에 따르면 총톤수 400톤 이상 선박 또는 150톤 이상 유조선이 해당됩니다. 위키백과+1\n•국내 법규(한국 해양오염방지법)에서는 총톤수 100톤 이상 선박 또는 유조선 모두라는 별도 기준을 둘 수도 있으나, 국제 규정과 모두 동일한 것은 아닙니다.\n•따라서 “총톤수 100톤 이상 선박”이라는 국내 기준은 국제 기준과 정확히 일치하지 않을 수 있습니다.\n3) 유해액체물질기록부(Cargo Record Book for NLS)\n•MARPOL Annex II 규정은 총톤수 150톤 이상 또는 유해액체물질운반선에 적용됩니다.\n•국내 법규에 따르면 “모든 유해액체물질운반선”이라고 되어 있는 것은 맞을 수 있으나, 국제기준과 정확히 동일하게 ‘모든 선박이 아닌 150톤 이상’ 기준으로만 적용되는 것은 아닙니다.\n•따라서 국내-국제 혼용 서술 시 “국제기준은 ~, 국내 기준은 ~”로 구분하는 것이 안전합니다.\n4) 전자기록부 허용\n•MARPOL은 2020년 10월 1일부터 전자 기록부(e-ORB) 사용을 허용하고 있습니다. DNV\n•따라서 지금은 종이 장부뿐 아니라 전자형태의 기록부도 승인을 받아 사용할 수 있다는 점을 추가로 보충해야 합니다", "id": 838}, {"category": "개정 2013.3.23.", "question": "77. BWMS (Ballast Water Management System)", "answer": "선박들이 한 바다에서 담은 바닷물을 다른 바다에 쏟아내면서 밸러스트수에 포함된 해양생물이 타국가의 해양생물과 뒤섞이며 토착 해양 생태계를 교란하거나 파괴할 수 있고, 실제 그 피해가 커지고 있다. 따라서\n국제 사회는 지난 2004년 2월 국제해사기구(IMO) 주도로 BWMC를 채택했다. 이 협약은 전 세계를 운항하는 선박들이 평형수를 버리기 전 해양생물을 말끔히 제거할 수 있도록 선박의 평형수 처리장치 탑재를 의무화하는 내용이다. 전 세계 선복량의 총 35%에 해당하는 국가에서 비준을 마치면 그 후 1년이 지난 시점에 자동 발효하도록 돼 있었다. 2017년 9월 8일 강제화되어 IMO와 주관청이 승인한 BWTS(밸러스트수 처리 시스템) 설치가 의무화 되 전 세계 운항되는 선박에 밸러스트수 처리 설비를 설치해야 한다.", "id": 839}, {"category": "개정 2013.3.23.", "question": "76. Ballast Water Management에 대하여 설명하시오.", "answer": "선박의 ballast water 안에 있는 유해한 해양 유기체 및 세균이 타 해역의 환경에 피해를 일으킬 위험을 제거하고 ballast water 운반 및 배출에 대한 일련의 규제들을 정하기 위하여 BWM convention을 체결\n*The International Convention for the Control and Management of Ship’s Ballast Water and Sediments)", "id": 840}, {"category": "개정 2013.3.23.", "question": "78. Garbage Management Plan(폐기물 관리 계획서)이란 무엇인가?", "answer": "MARPOL Annex V의 Regulation 10.2에 의거, 총톤수 100톤 이상의 모든 선박과 승선인원 15인 이상의 정원을\n가진 모든 선박과 고정식 또는 부유식 플랫폼은 선원이 실행할 수 있는 폐기물 관리계획을 비치하여야 한다.\n이 계획은 선상 장비의 사용 방법을 포함하여 쓰레기의 최소화, 수집, 저장, 처리 및 처분을 위한 문서화된 절차를 제공하여야 한다.\n또한 이 계획을 수행할 수 있는 책임자를 임명하여야 한다. 이러한 계획은 기구에서 개발한 지침에 근거하여야 하며 선원이 사용하는 언어로 기록되어야 한다.", "id": 841}, {"category": "개정 2013.3.23.", "question": "MARPOL 부속서 4장에 관련된 증서는 무엇이 있는가?", "answer": "ISPP(International Sewage Pollution Prevention)", "id": 842}, {"category": "개정 2013.3.23.", "question": "8. MARPOL 부속서 4장 선박의 오수에 대해 설명하고 배출요건을 설명하시오.", "answer": "MARPOL 부속서 4장은 선박에서 발생하는 **오수(Sewage)**에 의한 해양오염을 방지하기 위한 규정을 담고 있습니다. 이 규정은 주로 선박의 화장실, 의무실 등에서 발생하는 배수를 대상으로 하며, 오수가 해양 환경에 미치는 악영향(산소 고갈, 건강 문제 등)을 줄이는 데 목적이 있습니다.\n적용 대상 및 오수의 정의\n•적용 대상: 400톤 이상의 모든 선박, 또는 15명 이상의 승무원 및 승객을 수용하도록 인증된 400톤 미만의 선박에 적용됩니다.\n•오수의 정의: 화장실, 소변기, 의무실 등에서 나오는 배수, 그리고 가축을 사육하는 공간에서 나오는 배수가 포함됩니다.\n오수 배출 요건\nMARPOL 부속서 4장은 오수 배출을 원칙적으로 금지하며, 특정 요건을 충족하는 경우에만 예외적으로 허용합니다. 배출 요건은 오수의 처리 상태와 선박이 해안으로부터 떨어진 거리에 따라 달라집니다.\n1.처리되지 않은 오수: * 처리되지 않은 오수는 해안으로부터 12해리(약 22.2km) 이상 떨어진 곳에서만 배출할 수 있습니다.\no선박은 최소 4노트(약 7.4km/h) 이상의 속도로 항해 중이어야 하며, 저장 탱크에 보관된 오수는 한 번에 모두 방출하지 않고 일정하고 적당한 속도로 배출해야 합니다.\n2.분쇄 및 소독된 오수: * 분쇄 및 소독된 오수는 해안으로부터 3해리(약 5.5km) 이상 떨어진 곳에서 배출할 수 있습니다.\no이 경우, 선박은 오수를 분쇄 및 소독하는 장치를 갖추고 있어야 합니다.\n3.오수처리 장치를 이용한 오수: * 오수처리 장치를 통해 처리된 오수는 해안으로부터 3해리 이상 떨어진 곳에서 배출할 수 있으며, 이 경우 부유물이 없어야 하고 주변 바닷물의 변색을 유발하지 않아야 합니다.\n추가 사항:\n•특수 해역(Special Areas): 일부 해역(예: 발트해)은 해양 보호를 위해 오수 배출에 대한 더욱 엄격한 규정을 적용합니다. 이러한 지역에서는 처리되지 않은 오수의 배출이 전면 금지되거나, 질소와 인을 제거하는 고도의 오수처리 장치를 통해서만 배출이 허용됩니다.\n•수거 설비: 부속서 4장은 항만국에게 선박의 오수를 처리할 수 있는 수거 설비를 제공하도록 요구합니다.\n☞ 선박 폐기물의 종류를 설명하시오.\nMARPOL 부속서 V 선박으로부터의 폐기물에 의한 오염방지를 위한 규칙\n-.합성로우프, 플라스틱, 음식찌꺼기 등의 각종 쓰레기에 의한 오염을 방지하기 위한 규칙.\n-.지중해, 발틱해, 흑해, 홍해 등의 특별해역에서는 음식찌꺼기만 배출이 허용되며,\n-.던네지(Dunnage) 및 포장재료는 육지로부터 25해리 이상,\n-.음식찌꺼기는 12해리 이상 떨어진 곳에서 버려야 한다.\n-.한편, 협약 당사국 정부는 항구 및 터미널에 쓰레기 처리를 위한 수용시설을 갖추어야 한다.\n☞ STCW ; 1978년 선원의 훈련, 자격증명 및 당직근무의 기준에 관한 국제협약\nInternational Convention on Standards of Training, Certification and Watchkeeping for Seafarers, 1978 (STCW, 1978)\n□ 선원의 훈련, 자격증명 및 당직근무의 기준을 국제적으로 통일함으로써 해상에서의 인명, 재산의 안전과 해양환경의 보전\n① 협약본문 : 전문과 17개 조로 구성, 협약의 목적과 적용범위, 면허증서, 항만국통제 등에 대하여 규정\n② 부속서 Ⅰ : 일반규정\n③ 부속서 Ⅱ : 선장 및 갑판부\n④ 부속서 Ⅲ : 기관부\n⑤ 부속서 Ⅳ : 통신부\n⑥ 부속서 Ⅴ : 탱커에 관한 특별요건\n⑦ 결의서 : 해기사의 항해, 정박당직 수행 원칙과 운용지침, 각종 훈련에 관한 권고", "id": 843}, {"category": "개정 2013.3.23.", "question": "47. STCW의 풀네임과 아는 대로 설명하시오.", "answer": "The International Convention on Standards of Trainning, Certification and Watch Keeping For Seafares\n선원의 훈련, 자격증명 및 당직근무의 기준을 국제적으로 통일함으로써 해상에서의 인명, 재산의 안전과\n해양환경을 보전하기 위하여 재정된 협약이다.", "id": 844}, {"category": "개정 2013.3.23.", "question": "45. STCW에 선교 1인 당직 (Sole lookout)을 위한 4 가지 요건이 명시되어 있고 이에 더하여 선장이 추가로 고려하여야 하는 요건이 있는데 이는 무엇인가?", "answer": "- 항해당직을 수행하는 항해사는,", "id": 845}, {"category": "개정 2013.3.23.", "question": "3. 아래의 모든 관련 요소가 충족할 때,", "answer": "- 날씨 상황, 시정, 교통량, 근접한 위험한 항해, 항로 또는 통항분리수역에서 주의의 필요", "id": 846}, {"category": "개정 2013.3.23.", "question": "4. 상황이 변하여 필요시에는 선교로의 복귀가 즉시 가능하여야 한다.", "answer": "- 이에 더하여 선장은 아래의 사항을 추가로 고려하여야 한다.\n브릿지 워치를 구성 할 때 고려해야 할 요소;\n1) 피로\n2) 항해 보조기구의 사용 및 작동 상태\n3) 선박에 자동 조타 장치가 장착되어 있는지 여부\n4) 수행해야 할 radio duties있는지 여부\n5) UMS, 등 각종 알람 및 제한 사항\n46. STCW 제8장 당직중에 정박 당직 중 당직자가 해야 할 사항 10가지를 쓰시오.\nSTCW 제8장 Part 5 – Watchkeeping in Port 참조 바람", "id": 847}, {"category": "개정 2013.3.23.", "question": "3. 빌지와 발라스트 탱크의 레벨 확인", "answer": "4. the signals or light being exhibited or sounded", "id": 848}, {"category": "개정 2013.3.23.", "question": "19. 분쇄되거나 연마된 음식물 쓰레기 입자 크기는 얼마인지 설명하시오.", "answer": "25mm이하가 되어야 한다. 분쇄되거나 연마된 음식물 쓰레기는 반드시 25mm 이하의 구멍 뚫린 망을 통과할 수 있어야 한다.", "id": 849}, {"category": "개정 2013.3.23.", "question": "4. 누구든지 선박으로부터 오염물질을 해양에 배출하여서는 아니된다. 그 예외 규정은?", "answer": "1) 배출기준 및 방법에 따라 배출할 것\n2) 선박 또는 해양시설 등의 안전확보나 인명구조를 위하여 부득이하게 오염물질을 배출하는 경우\n3) 선박 또는 해양시설 등의 손상 등으로 인하여 부득이하게 오염물질이 배출되는 경우\n4) 선박 또는 해양시설 등의 오염사고에 있어 해양수산부령이 정하는 방법에 따라 오염피해를 최소화하는 과정에서 부득이하게 오염물질이 배출되는 경우", "id": 850}, {"category": "개정 2013.3.23.", "question": "5. 위험물에 대하여 설명하시오.", "answer": "1) 일반적 정의: 물질 자체의 물리적, 화학적 또는 생물학적 개별특성이나 복합적 특성에 의해 인체, 타 생명체 또는 자연환경에 위해를 미치거나 미칠 수 있는 물질\n2) 실무적 정의: IMO, CFR 또는 Local Regulation에 명시된 폭발성, 인화성, 가연성, 독성, 부식성, 산화성 및 기타 위험 물질\n☞ 해상인명안전협약 [ International Convention for the Safety of Life At Sea(SOLAS) , 海上人名安全協約 ]\n국제해사기구(I MO)가 국제적 통일 원칙과 규칙을 정함으로써 해상에서의 인명 안전을 증진하고, 선박의 구조, 설비 및 운항에 관한 최저기준을 정함으로써 선박의 안전 확보를 목적으로 1974년 11월 1일에 채택, 1980년 5월 25일에 발효시켰음. SOLAS 협약은 협약본문과 12개 장의 부속서로 이루어져 있으며, 지금까지 계속하여 현실에 맞게 개정되고 있음.\n▣ 부속서 제Ⅰ장(일반규정-조화제도)\n일반규정을 다루고 있으며 협약상 가장 중요한 각종 선박의 검사 및 선박이 협약요건에 적합하다는 것을 증명하는 증서의 발급에 관한 규정 등이 수록되어 있다. 또 항만국 통제(Port States Control) 및 해난사고시 당사국 정부의 조사 및 IMO에의 통보에 관한 사항도 포함되어 있다.\n▣ 부속서 제Ⅱ-1장(건조-구조, 구획 및 복원성, 기관 및 전기설비)\n구획, 복원성, 기관 및 전기설비에 관한 사항으로서 여객선의 선체손상을 예상하여 손상시에도 안전성이 확보되도록 수밀구획으로 구분하고 있으며 수밀 보전성 및 빌지 배출장치 그리고 화물선 및 여객선에 대한 복원성의 요건이 총족되어 있다. 2개의 수밀격벽간의 허용거리는 선박의 길이 및 종류에 따라 달라지며 여객선에 대한 것이 가장 엄격하다. 기관 및 전기에 관한 규정은 비상시에 이러한 기관 및 전기설비 등이 선박 및 여객과 선원의 안전을 위하여 필수적인 기능이 유지될 수 있도록 하는 것이며 특히 중요한 점은 조타장치에 관한 요건이다.\n▣ 부속서 제Ⅱ-2장(구조-방화, 화재탐지 및 소화)\n방화, 화재탐지 및 소화에 관한 사항으로서 화재의 예방과 화재시 안전을 위하여 여객선, 화물선, 유조선 등 선박의 종류별로 각각의 구조, 설비 등에 대한 전반적인 규정을 하고있다. 유조선의 화재안전조치로서 고정식 갑판포말장치, 이너트가스장치 등에 관한 규정이 포함되어 있다.\n▣ 부속서 제Ⅲ장(구명설비 및 장치)\n제Ⅲ장은 구명설비에 관한 것으로서 A편, B편 및 C편으로 구분되어 있다. A편에는 일반규정으로서 여객선 및 화물선 공통으로 적용되는 사항을, B편에는 여객선에 대한 추가요건으로서 구명정, 구명뗏목의 비치수량, 선박내 탑재기준, 구명정수의 수 등이 수록되어 있다. C편에는 화물선에 대한 추가요건으로서 구명설비의 비치기준이 여객선에 비하여 다소 완화되어 규정되어 있다.\n▣ 부속서 제Ⅳ장(무선통신)\n무선전신 및 무선전화에 관한 사항으로서 선박에 탑재하여야 할 무선설비의 종류, 기술요건 및 통신사의 당직업무, 무선일지의 기록에 관한 규정이 포함되어 있다.\n▣ 부속서 제Ⅴ장(항해의 안전)\n항해안전에 관한 사항으로서 당사국 정부가 준비해야 할 항해안전업무와 모든 선박에 전반적으로 적용되는 운항측면의 규정이 수록되어 있다. 즉 당사국 정부는 빙산의 발견, 기상경보의 발령 등 항행정보를 해당 해역에 있는 선박에 신속히 통보하여야 하며, 교통폭주해역에서는 항로지정을 할 수 있다. 또 항해장비의 설치, 수로도지 및 국제신호서의 선내 비치에 관하여 규정하고 있다.\n▣ 부속서 제Ⅵ장(화물의 운송)\n곡물운송시 안전에 관한 것으로 곡류화물의 적부, 트리밍(Trimming) 및 고박(Securing)에 관한 규정이 수록되어 있다. 선창 내에 적재된 곡물은 운송중 선박의 동요에 따라 마치 액체와 같이 이동하는 바, 선박의 안전을 확보하기 위한 경사모멘트(Heeling Moment)의 계산방법, 곡물수송용 선박에 필요한 설비 등이 규정되어 있다.\n▣ 부속서 제Ⅶ장(위험물의 운송)\n위험물의 운송에 관한 것으로서 포장된 형태 또는 산적고체 형태인 위험물 및 액체화학물과 액화가스의 분류, 포장, 표시, 서류 및 적부에 관하여 규정하고 있다.\n▣ 부속서 제Ⅷ장(원자력선)\n원자력선에 관한 것으로서 원자력선의 안전에 관한 기본적인 요건 및 특히 방사능 위험에 관한 규정이 포괄적으로 수록되어 있다.\n▣ 부속서 Ⅸ(선박의 안전운항을 위한 관리)\n1993년 11월에 총회결의 A.741(18)로 채택된 바 있는 ISM Code를 강제화 시키기 위하여 이를 SOLAS 협약 제9장으로 신설·수용하였다. 제9장은 묵시적 수락절차에 의하여 발효되는데, 여객선을 포함하여 유조선, 케미컬탱커, 가스운반선 및 산적화물선은 1998년 7월 1일부터, 기타 화물선은 2002년 6월 1일부터 적용한다. 본장은 협약의 적용범위와 같이 기본적으로 500톤 이상의 선박에만 적용하지만, 그 미만의 선박에 대하여도 실행가능한 한 적용하도록 부속결의서 3에 의하여 권고되고 있다.\n▣ 부속서 Ⅹ(고속정의 안전조치)\nMSC 제63차 회의에서 채택한 International Code of Safety for High-speed Craft를 수용한 것으로, 이들 선박의 구조와 설비에 관한 총 19장에 걸친 방대한 규정들과 10의 부속서로 구성되어 있다. 본장은 1996년 1월 1일에 발효하였고, 그날 이후에 건조되는 선박에 적용한다.\n▣ 부속서 XI(해상안전강화를 위한 특별조치)\n본장은 4개의 조문으로 구성되어 있고, 1996년 1월 1일 발효되었다.\n제1규칙 - 주관청의 승인하에 검사를 대행하는 기관은 1993년 11월에 채택한 결의 A.739(18)의 지침서에 따라야 한다.\n제2규칙 - 선령 5년 이상의 탱커와 살적화물선에 대해 특별검사를 실시하고, 이 강화된 검사는 정기, 연차 및 중간검사 때 실시한다.\n제3규칙 - 100톤 이상의 여객선과 300톤 이상의 모든 화물선은 IMO 식별번호를 부여받아야 한다.(총회결의 A.600)\n제4규칙 - 항만국통제관은 선박의 \"운항요건\"을 검사할 수 있으며, 이 때 그 조건은 \"선장 또는 선원이 선박의 안전과 관련한 핵심적 절차를 숙지하고 있지 못하다는 명백한 근거가 있는 경우\"로 한정된다. 또 항만국통제관은 승조원의 실제 능력을 평가할 수도 있다.\n▣ 부속서 XII(벌크캐리어에 대한 추가안전조치)\n지난 1997년 11월 벌크캐리어 안전에 관한 SOLAS 회의가 IMO 본부에서 개최되었으며, 그 후 벌크캐리어 안전에 관한 추가규정을 SOLAS 제12장을 신설하여 채택하기로 하였다. 제12장에는 정의, 적용, 시행계획, 벌크캐리어에 적용하는 손상복원성 요건, 벌크캐리어의 구조강도, 벌크캐리어의 구조 및 기타 요건, 벌크캐리어의 화물창 구조 검사, 벌크캐리어의 요건에 적합한 정보, 벌크캐리어 화물창의 설계배치로 인하여 제4.2규칙의 요건에 적합하지 못하는 벌크캐리어에 대한 요건, 고체산적화물밀도의 신고, 적하지침기기의 총 11규칙을 수록하고 있다", "id": 851}, {"category": "개정 2013.3.23.", "question": "4. SOLAS 위험물에 대해 설명", "answer": "Class-1 - 화약류\nClass-2 - 가스류: 압축, 액화 또는 고압용해가스\nClass-3 - 인화성 액체류\nClass-4.1 - 인화성 고체류\nClass-4.2 - 자연발화성 물질\nClass-4.3 - 물과 작용하여 인화성 가스를 발생시키는 물질\nClass-5.1 - 산화성 물질\nClass-5.2 - 유기과산화물\nClass-6.1 - 독물\nClass-6.2 - 전염성 물질\nClass-7- 방사성 물질\nClass-8 - 부식성 물질\nClass-9 - 기타 위험화물", "id": 852}, {"category": "개정 2013.3.23.", "question": "6. 위험물 운송 관련 법규(IMDG)에 대해 설명하고 Class는 어떻게 구분되고, Class 3는 무엇인가)", "answer": "1) 국제해상 위험물 규칙(IMDG Code): IMDG Code는 위험물의 해상운송에 관한 국제통일규칙이며, 현재 이 Code를 무시하고 위험물의 국제운송을 행하는 것은 곤란하다.\nClass-1 - 화약류\nClass-2 - 가스류: 압축, 액화 또는 고압용해가스\nClass-3 - 인화성 액체류\nClass-4.1 - 인화성 고체류\nClass-4.2 - 자연발화성 물질\nClass-4.3 - 물과 작용하여 인화성 가스를 발생시키는 물질\nClass-5.1 - 산화성 물질\nClass-5.2 - 유기과산화물\nClass-6.1 - 독물\nClass-6.2 - 전염성 물질\nClass-7- 방사성 물질\nClass-8 - 부식성 물질\nClass-9 - 기타 위험화물\n2) SOLAS협약 부속서 Ⅱ-2, G편-특별요건/규칙 19: 이 규칙의 목적은 위험물을 운송하는 선박에 대한 화재, 안전 목적을 다루기 위하여 추가의 안전 수단을 제공하기 위한 것이다.\n3) MARPOL 73/78 부속서Ⅲ: 유해한 물질을 포장한 형태로 수송하는 모든 선박에 적용되며, 이 부속서의 규정에 따르지 않으면 유해한 물질의 수송은 금지된다.\n4) 위험물 운송에 관한 UN권고: UN경제사회이사회(ECOSOC) 산하 위험물운송전문가위원회에서 작성한 것으로, 위험물의 분류, 용기 및 포장에 관한 시험요건, 표지 등에 관한 권고이다.\n5) IAEA 방사성물질 안전운송규칙: 국제원자력기구가 방사성물질의 운송에 관한 안전기준을 정한 것이다.\n6) International Convention of Safe Containers (CSC): 항공용으로 특별히 제조된 컨테이너를 제외하고 국제운송에 사용되는 신조, 현존 컨테이너에 적용되며 컨테이너는 이 규칙에 따라 검사, 점검, 승인 및 정비되어야 한다.\n7) IMO/ILO Guidelines for Packing Cargo in Freight Containers or Vehicles: 화물 컨테이너나 수송차내의 화물을 포장하고 고박하는 책임자에 대하여 필수적인 안전보장지침을 제공하기 위하여 제정하였다.\n8) Code of Safe Practice for Solid Bulk Cargoes: 근래에 곡물이나 석탄 등과 같은 화물 운송의 양과 종류가 급증함에 따라 화물운송 사고가 증가하고 사고 시에는 막대한 손실을 야기시키면서 곡물운송에 관한 규정을 제정하였다.\n9) STCW 협약 STCW Code B. Section B-V/5: 포장된 형태의 위험물 및 유해물을 운송하는 선박에서 하역을 책임지는 해기사와 부원의 훈련에 관한 지침", "id": 853}, {"category": "개정 2013.3.23.", "question": "4.EEOI는 무엇인가?", "answer": "EEOI(energe efficiency operational indicator에너지효율지표)운항중인 선박에서 실제로 발생하는 co2배출량을 계산하기 위한 목적\n솔라스 COMBINATION LADDER 기준. 9미터. 45도 초과해서는 안됨. 스프레더 8스텝에 한 개씩 설치\n해도상 위치를 구하는 방법", "id": 854}, {"category": "개정 2013.3.23.", "question": "3.UNCLOS 란", "answer": ": UN CONVENTION ON THE LAW OF THE SEA\n유엔해양법 협약, 배타적경제수역,영해제도, 대륙붕관련하여 규정", "id": 855}, {"category": "개정 2013.3.23.", "question": "4.BMP4란 : BEST PRACTICE VERSION", "answer": "해적관련 대처방법등이 기재", "id": 856}, {"category": "개정 2013.3.23.", "question": "83. IMDG CODE에 대해 아는대로 설명하시오.", "answer": "IMDG : International Maritime Dangerous goods\n국제 해상 위험물 운송을 관리하는 국제기구에서 지정하는 위험물 code", "id": 857}, {"category": "개정 2013.3.23.", "question": "8.IMDG CLASS", "answer": "-CLASS 1 .화학류 2. 가스류, 3. 인화성액체, 4. 가연성고체 5. 산화성 및 유기과산화물, 6. 독성 및 전염성 물질 7. 방사성물질 8. 부식성물질 9. 기타 다발성물질", "id": 858}, {"category": "개정 2013.3.23.", "question": "15. SOLAS에 언급된 위험물에 대하여 각각 적용되는 법을 구술하시오.", "answer": "1) MARPOL\n2) 국제 액화가스 운송선의 구조 및 설비 기준 (IGC CODE)\n3) 국제산적위험화학품운송선의 구조 및 설비 기준 (IMDG CODE)\n4) 산적 고체화물 안전실무 기준 (BC CODE)", "id": 859}, {"category": "개정 2013.3.23.", "question": "7. SOLAS 내용 중 7장의 위험물의 종류에 대해 말해보아라.", "answer": "1) MARPOL 부속서에 따른 기름\n2) 국제액화가스 운송선의 구조 및 설비기준에 규정된 가스류\n3) 국제산선위험 화약품 운송선의 구조 및 설비에 규정된 페기물을 포함한 유애 액체 물질/화약품\n4) 산적고체화물안전실무기준 부록 B에 규정된 페기물을 포함한 화학적 위험을 수반하는 산적 고체 화물 및 고체 물질.", "id": 860}, {"category": "개정 2013.3.23.", "question": "SOLAS 내용 중 제7장의 위험물의 운송에 대한 협약과 내용을 말하시오.", "answer": "SOLAS 부속서 제7장 위험물의 운송에 따르면, 위험물은 아래와 같이 분류되며 각각의 운송요건, 서류, 위험물의 적부 및 격리요건, 위험물과 관련된 사고의 보고에 대한 내용을 다루고 있다.\nClass-1 - 화약류\nClass-2 - 가스류: 압축, 액화 또는 고압용해가스\nClass-3 - 인화성 액체류\nClass-4.1 - 인화성 고체류\nClass-4.2 - 자연발화성 물질\nClass-4.3 - 물과 작용하여 인화성 가스를 발생시키는 물질\nClass-5.1 - 산화성 물질\nClass-5.2 - 유기과산화물\nClass-6.1 - 독물\nClass-6.2 - 전염성 물질\nClass-7- 방사성 물질\nClass-8 - 부식성 물질\nClass-9 - 기타 위험화물\nSOLAS 제7장은 크게 세 부분으로 나뉩니다.\n파트 A: 포장된 위험물의 운송\n이 파트는 **IMDG Code(국제해상위험물규칙)**를 의무적으로 적용하도록 규정합니다. IMDG Code는 위험물의 포장, 표기, 라벨링, 문서화 및 선적 방법에 대한 세부 사항을 다루는 보완 규칙집이며, 위험물의 안전한 해상 운송을 위한 핵심적인 역할을 수행합니다.\n•위험물 분류: IMDG CLASS에서 설명된 9가지 위험물 등급에 따라 위험물을 분류합니다.\n•포장 및 용기: 위험물이 운송 중 내용물이 유출되거나 손상되지 않도록 적절한 포장재와 용기를 사용해야 합니다.\n•표기 및 라벨링: 위험물의 정확한 기술명, UN 번호, 위험물 등급 라벨 등을 용기 외부에 명확하게 표시해야 합니다.\n•문서화: 선적 서류에는 위험물의 상세 정보(분류, UN 번호, 총 중량 등)가 기재되어야 하며, 선박에는 해당 위험물 목록 또는 적재 계획표가 비치되어야 합니다.\n•격리 및 적재: 서로 반응하여 위험을 일으킬 수 있는 물질은 분리하여 적재해야 합니다.\n파트 A-1: 고체 산적 위험물의 운송\n이 파트는 포장되지 않은 고체 형태의 위험물(예: 석탄, 광물) 운송에 대한 규정을 다룹니다.\n•문서화: 운송되는 고체 위험물에 대한 문서를 갖추어야 합니다.\n•적재 및 격리: 고체 위험물을 안전하고 적절하게 적재하고, 서로 호환되지 않는 물질은 분리하여 보관해야 합니다.\n•사고 보고: 운송 중 위험물 유출 등 사고가 발생할 경우, 선장은 인근 해안 국가에 이를 즉시 보고해야 합니다.\n파트 B: 액체 산적 화학물의 운송 (IBC Code)\n화학운반선(Chemical Tanker)에 액체 형태로 운송되는 위험물에 대한 규정을 다룹니다. **IBC Code(국제벌크화학물규칙)**가 이 파트의 필수 보완 규칙으로, 선박의 설계, 구조, 장비에 대한 세부적인 기술 기준을 포함합니다.\n파트 C: 액화 가스 산적 운송 (IGC Code)\n액화 가스 운반선(Gas Carrier)에 가스 형태로 운송되는 위험물에 대한 규정을 다룹니다. **IGC Code(국제벌크가스운반선규칙)**가 이 파트의 필수 보완 규칙이며, 가스의 위험 특성에 맞는 선박의 구조 및 설비에 대한 기준을 제공합니다.", "id": 861}, {"category": "개정 2013.3.23.", "question": "1. SOPEP 사고 발생시 대처 보고법.", "answer": ": 비상연락망, 연악국 목록, 방재자제 3가지는 업데이트해야함.", "id": 862}, {"category": "개정 2013.3.23.", "question": "31. 선박관련 국내 법규 2가지를 설명하시오.", "answer": "1) 선박입출항법\n무역항의 수상구역 등에서 선박의 입,출항에 대한 지원과 선박운항의 안전 및 질서 유지에 필요한 사항을\n규정함을 목적으로 한다.\n2) 해상교통안전법\n선박의 안전운항을 위한 안전관리체제를 확립하고 해상에서 일어나는 선박항행과 관련된 모든 위험과 장해를\n제거하여 해상에서의 안전과 원활한 교통을 확보하는 것을 목적으로 한다.", "id": 863}, {"category": "개정 2013.3.23.", "question": "32. 오른쪽, 왼쪽에 돌출된 위험물이 있을 때에 고려해야 될 사항을 말하시오.", "answer": "연안항법 중 협수로 통항인 경우에 한하여, 갑, 곶을 우회하는 경우 돌출된 부분을 우현에서 볼 때 가까이\n선회하며, 좌현에서 보는 경우는 멀리 떨어져서 선회하여야 한다. 특히 강한 조류가 있는 돌출부의 하류에는\n반류나 와류가 있기 때문에 주의한다.", "id": 864}, {"category": "개정 2013.3.23.", "question": "33. 유조선 통항금지구역과 유조선이 어떤 상황일 때 통항금지구역을 항해할 수 있는가?", "answer": "- 통항제한 선박 2가지는 무엇인가?\n해사안전법 제14조, 유조선의 통항제한 - 통항제한 선박 2가지 (법규)\n제3절 유조선 통항금지 해역 등의 설정 및 관리 <개정 2018. 4. 17.>\n제14조(유조선의 통항제한)\n① 다음 각 호의 어느 하나에 해당하는 석유 또는 유해액체물질을 운송하는 선박(이하 \"유조선\"이라 한다)의\n선장이나 항해당직을 수행하는 항해사는 유조선의 안전운항을 확보하고 해양사고로 인한 해양오염을 방지하기 위하여 유조선의 통항을 금지한 해역(이하 \"유조선 통항 금지해역\"이라 한다)에서 항행하여서는 아니 된다.\n1. 원유, 중유, 경유 또는 이에 준하는 「석유 및 석유대체연료 사업법」 제2조 제2호 가목에 따른 탄화수소유,\n같은 조 제10호에 따른 가짜석유제품, 같은 조 제11호에 따른 석유대체연료 중 원유ㆍ중유ㆍ경유에 준하는\n것으로 해양수산부령으로 정하는 기름 1천500킬로리터 이상을 화물로 싣고 운반하는 선박\n2. 「해양환경관리법」 제2조제7호에 따른 유해액체물질을 1천500톤 이상 싣고 운반하는 선박\n② 유조선 통항금지 해역의 범위는 대통령령으로 정한다.\n③ 유조선은 다음 각 호의 어느 하나에 해당하면 제1항에도 불구하고 유조선 통항금지 해역에서 항행할 수 있다.", "id": 865}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 응급환자가 생긴 경우", "answer": "4. 항만을 입항ㆍ출항하는 경우. 이 경우 유조선은 출입해역의 기상 및 수심, 그 밖의 해상상황 등 항행여건을\n충분히 헤아려 유조선 통항금지 해역의 바깥쪽 해역에서부터 항구까지의 거리가 가장 가까운 항로를 이용하여\n입항ㆍ출항하여야 한다.\n1) 유조선 통항금지구역\nA. 서해안 태안반도, 옹도에서 동해항 앞 해안을 잇는 선안의 해역(472마일)\nB. 서,남해안은 연안에서 약 10~25마일, 동해안은 3마일 이내 해역", "id": 866}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "34. 유조선의 경우 Hold Cleaning 후 세정수 처리하는 방법에 대해 설명하시오.", "answer": "유조선에서 화물유가 섞인 선박평형수, 화물창의 세정수, 선저폐수의 배출기준 및 방법은 선박에서의 오염방지에 관한 규칙에 따라 아래의 조건에서 배출을 해야 한다.\n1) 특별해역에 있지 아니하며 항해 중에 배출할 것\n2) 기름의 순간배출률이 1해리당 30리터 이하일 것\n3) 1회의 항해 중(선박평형수를 실은 후 그 배출을 완료할 때까지를 말함)의 배출총량이 그 전에 실은 화물\n총량의 3만분의 1 이하일 것 (1979년 12월 31일 이전에 인도된 선박으로서 유조선의 경우에는 1만5천분의 1)\n4) 영해 및 접속수역법에 따른 기선으로부터 50해리 이상 떨어진 곳에서 배출할 것\n5) 규정에 따른 기름오염방지설비의 작동 중에 배출할 것", "id": 867}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "35. 위험구역 및 경계구역에 대하여 설명하시오.", "answer": "1) 위험구역\n협수로 항로로 통항량이 많은 구간이며 추천항로 및 통항분리제도가 설정 운용되고 있고 항로 주변에\n여유수역이 제한되는 구간\n2) 위험, 경계구역\n위험구역과 경계구역이 복합적으로 이루어진 구간 및 위험구역과 경계구역간의 거리가 짧아 특별히 주의가\n요구되는 구간\n3) 경계구역\n위험구역 진입 전,후구간 및 통항 분리제도가 설정되지는 않았으나 선박의 통항이 빈번한 구간", "id": 868}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "36. 교통안전 특정해역 설명하시오. (목적, 위치, 적용범위, 처벌수위)", "answer": "교통안전특정해역이란 해상 교통량이 많은 해역이나 거대선, 위험화물운반선, 고속여객선 등의 통항이 잦은 해역 등 대형해양사고가 발생할 우려가 있는 해역으로 해양수산부장관이 관리하는 해역을 말한다.\n교통안전 특정해역 내에서는 선박 통항에 지장을 주는 어로행위, 공사, 작업 등이 제한된다. 우리나라의 1인천구역, 2부산구역, 3울산구역, 4포항구역, 5여수구역이 지정되어 있다. 교통안전특정해역을 항해할 시에는 운항에 관한 사항을 관할 VTS에 통보하고 VTS의 관제에 따라 항행하여야 한다. 이 경우 선박의 항행 안전을 확보하기 위해 필요한 경우 선장 또는 선주에게 통항 시각 및 항로의 변경, 속력 및 항행 제한, 안내선 사용 등을 명령할 수 있다.\n*처벌 (과태료): 300만원 미만의 과태료 부과\n-통항로 진행방향 위반: 1회 25만원 / 2회 50만원 / 3회 100만원\n-그 밖의 사항 위반: 1회 15만원 / 2회 30만원 / 3회 50만원\n선박의 입항 및 출항 등에 관한 법률\n제2조 정의", "id": 869}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. \"우선피항선\"(優先避航船)이란 주로 무역항의 수상구역에서 운항하는 선박으로서 다른 선박의 진로를 피하여야 하는 다음 각 목의 선박을 말한다.", "answer": "가. 「선박법」 제1조의2 제1항 제3호에 따른 부선(艀船)[예인선이 부선을 끌거나 밀고 있는 경우의 예인선 및\n부선을 포함하되, 예인선에 결합되어 운항하는 압항부선(押航艀船)은 제외한다]\n나. 주로 노와 삿대로 운전하는 선박\n다. 예선\n라. 「항만운송사업법」 제26조의3 제1항에 따라 항만운송관련사업을 등록한 자가 소유한 선박\n마. 「해양환경관리법」 제70조 제1항에 따라 해양환경관리업을 등록한 자가 소유한 선박(폐기물해양배출업으로\n등록한 선박은 제외한다)\n바. 가목부터 마목까지의 규정에 해당하지 아니하는 총톤수 20톤 미만의 선박\n제11조(항로에서의 정박 등 금지) ① 선장은 항로에 선박을 정박 또는 정류시키거나 예인되는 선박 또는 부유물을 내버려두어서는 아니 된다. 다만, 제6조제2항 각 호의 어느 하나에 해당하는 경우는 그러하지 아니하다. <개정 2020. 1. 29.>\n② 제6조제2항제1호부터 제3호까지의 사유로 선박을 항로에 정박시키거나 정류시키려는 자는 그 사실을 관리청에 신고하여야 한다. 이 경우 제2호에 해당하는 선박의 선장은 「해상교통안전법」 제92조제1항에 따른 조종불능선 표시를 하여야 한다. <개정 2020. 2. 18., 2023. 7. 25.>\n선박의 입항 및 출항 등에 관한 법률 ( 약칭: 선박입출항법 )\n[시행 2024. 10. 22.] [법률 제20524호, 2024. 10. 22., 일부개정] 전체조문보기\n제6조(정박의 제한 및 방법 등) ② 제1항에도 불구하고 다음 각 호의 경우에는 제1항 각 호의 장소에 정박하거나 정류할 수 있다.\n1. 「해양사고의 조사 및 심판에 관한 법률」 제2조제1호에 따른 해양사고를 피하기 위한 경우", "id": 870}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 제41조에 따른 허가를 받은 공사 또는 작업에 사용하는 경우", "answer": "제12조(항로에서의 항법)\n① 모든 선박은 항로에서 다음 각 호의 항법에 따라 항행하여야 한다. <개정 2023. 7. 25.>\n1. 항로 밖에서 항로에 들어오거나 항로에서 항로 밖으로 나가는 선박은 항로를 항행하는 다른 선박의 진로를 피하여 항행할 것", "id": 871}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 항로에서 다른 선박을 추월하지 아니할 것. 다만, 추월하려는 선박을 눈으로 볼 수 있고 안전하게 추월할 수 있다고 판단되는 경우에는 「해상교통안전법」 제74조제5항 및 78조에 따른 방법으로 추월할 것", "answer": "5. 항로를 항행하는 제37조제1항제1호에 따른 위험물운송선박(제2조제5호라목에 따른 선박 중 급유선은 제외한다) 또는 「해상교통안전법」 제2조제12호에 따른 흘수제약선(吃水制約船)의 진로를 방해하지 아니할 것\n6. 「선박법」 제1조의2제1항제2호에 따른 범선은 항로에서 지그재그(zigzag)로 항행하지 아니할 것\n② 관리청은 선박교통의 안전을 위하여 특히 필요하다고 인정하는 경우에는 제1항에서 규정한 사항 외에 따로 항로에서의 항법 등에 관한 사항을 정하여 고시할 수 있다. 이 경우 선박은 이에 따라 항행하여야 한다. <개정 2020. 2. 18.>\n제74조(좁은 수로 등) ① 좁은 수로나 항로(이하 “좁은 수로등”이라 한다)를 따라 항행하는 선박은 항행의 안전을 고려하여 될 수 있으면 좁은 수로등의 오른편 끝 쪽에서 항행하여야 한다. 다만, 제30조제1항에 따라 지정된 수역 또는 제75조제1항에 따른 통항분리수역에서는 그 수역에서 정해진 항법이 있다면 이에 따라야 한다.\n② 길이 20미터 미만의 선박이나 범선은 좁은 수로등의 안쪽에서만 안전하게 항행할 수 있는 다른 선박의 통행을 방해하여서는 아니 된다.\n③ 어로에 종사하고 있는 선박은 좁은 수로등의 안쪽에서 항행하고 있는 다른 선박의 통항을 방해하여서는 아니 된다.\n④ 선박이 좁은 수로등의 안쪽에서만 안전하게 항행할 수 있는 다른 선박의 통항을 방해하게 되는 경우에는 좁은 수로등을 횡단하여서는 아니 된다. 이 경우 통항을 방해받게 되는 선박은 횡단하고 있는 선박의 의도에 대하여 의심이 있는 경우에는 제99조제5항에 따른 음향신호를 울릴 수 있다.\n⑤ 제78조제2항 및 제3항에 따른 앞지르기 하는 배는 좁은 수로등에서 앞지르기당하는 선박이 앞지르기 하는 배를 안전하게 통과시키기 위한 동작을 취하지 아니하면 앞지르기 할 수 없는 경우에는 기적신호를 하여 앞지르기 하겠다는 의사를 나타내야 한다. 이 경우 앞지르기당하는 선박은 그 의도에 동의하면 기적신호를 하여 그 의사를 표현하고, 앞지르기 하는 배를 안전하게 통과시키기 위한 동작을 취하여야 한다.\n⑥ 선박이 좁은 수로등의 굽은 부분이나 항로에 있는 장애물 때문에 다른 선박을 볼 수 없는 수역에 접근하는 경우에는 특히 주의하여 항행하여야 한다.\n⑦ 선박은 좁은 수로등에서 정박(정박 중인 선박에 매어 있는 것을 포함한다)을 하여서는 아니 된다. 다만, 해양사고를 피하거나 인명이나 그 밖의 선박을 구조하기 위하여 부득이하다고 인정되는 경우에는 그러하지 아니하다.\n제99조(조종신호와 경고신호) ⑤ 서로 상대의 시계 안에 있는 선박이 접근하고 있을 경우에는 하나의 선박이 다른 선박의 의도 또는 동작을 이해할 수 없거나 다른 선박이 충돌을 피하기 위하여 충분한 동작을 취하고 있는지 분명하지 아니한 경우에는 그 사실을 안 선박이 즉시 기적으로 단음을 5회 이상 재빨리 울려 그 사실을 표시하여야 한다. 이 경우 의문신호(疑問信號)는 5회 이상의 짧고 빠르게 섬광을 발하는 발광신호로써 보충할 수 있다", "id": 872}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "21. 선박의 입항 및 출항 등에 관한 법률의 부두 및 방파제 부근에서의 항법을 설명하시오.", "answer": "제13조(방파제 부근에서의 항법) 무역항의 수상구역 등에 입항하는 선박이 방파제 입구 등에서 출항하는 선박과 마주칠 우려가 있는 경우에는 방파제 밖에서 출항하는 선박의 진로를 피하여야 한다.\n제14조(부두 등 부근에서의 항법) 선박이 무역항의 수상구역 등에서 해안으로 길게 뻗어 나온 육지 부분, 부두,\n방파제 등 인공시설물의 튀어나온 부분 또는 정박 중인 선박(이하 이 조에서 \"부두 등\"이라 한다)을 오른쪽 뱃전에 두고 항행할 때에는 부두 등에 접근하여 항행하고, 부두 등을 왼쪽 뱃전에 두고 항행할 때에는 멀리 떨어져서 항행하여야 한다.", "id": 873}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "22. 선박의 입항 및 출항 등에 관한 법률의 제15조를 설명하시오.", "answer": "제15조(예인선 등의 항법)\n① 예인선이 무역항의 수상구역 등에서 다른 선박을 끌고 항행할 때에는 해양수산부령으로 정하는 방법에 따라야 한다.\n② 범선이 무역항의 수상구역 등에서 항행할 때에는 돛을 줄이거나 예인선이 범선을 끌고 가게 하여야 한다.\n선박의 입항 및 출항 등에 관한 법률 시행규칙\n제9조(예인선의 항법 등)\n① 법 제15조 제1항에 따라 예인선이 무역항의 수상구역 등에서 다른 선박을 끌고 항행하는 경우에는 다음\n각 호에서 정하는 바에 따라야 한다.\n1. 예인선의 선수(船首)로부터 피(被)예인선의 선미(船尾)까지의 길이는 200미터를 초과하지 아니할 것. 다만,\n다른 선박의 출입을 보조하는 경우에는 그러하지 아니하다.", "id": 874}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 예인선은 한꺼번에 3척 이상의 피예인선을 끌지 아니할 것", "answer": "② 제1항에도 불구하고 지방해양수산청장 또는 시ㆍ도지사는 해당 무역항의 특수성 등을 고려하여 특히 필요한 경우에는 제1항에 따른 항법을 조정할 수 있다. 이 경우 지방해양수산청장 또는 시ㆍ도지사는 그 사실을 고시하여야 한다.\n*선박의 입항 및 출항 등에 관한 법률\n제3장 항로 및 항법\n제10조(항로 지정 및 준수)\n① 해양수산부장관은 무역항의 수상구역 등에서 선박교통의 안전을 위하여 필요한 경우에는 무역항과 무역항의 수상구역 밖의 수로를 항로로 지정ㆍ고시할 수 있다.\n② 우선피항선 외의 선박은 무역항의 수상구역 등에 출입하는 경우 또는 무역항의 수상구역 등을 통과하는\n경우에는 제1항에 따라 지정ㆍ고시된 항로를 따라 항행하여야 한다. 다만, 해양사고를 피하기 위한 경우 등\n해양수산부령으로 정하는 사유가 있는 경우에는 그러하지 아니하다.\n제11조(항로에서의 정박 등 금지)\n① 선장은 항로에 선박을 정박 또는 정류시키거나 예인되는 선박 또는 부유물을 방치하여서는 아니 된다. 다만, 제6조 제2항 각 호의 어느 하나에 해당하는 경우는 그러하지 아니하다.\n② 제6조 제2항 제1호부터 제3호까지의 사유로 선박을 항로에 정박시키거나 정류시키려는 자는 그 사실을\n해양수산부장관에게 신고하여야 한다. 이 경우 제2호에 해당하는 선박의 선장은 「해사안전법」 제85조 제1항에\n따른 조종불능선 표시를 하여야 한다.\n제6조(정박지의 지정 신청)\n① 영 제6조제1항에 따른 정박지의 지정 신청서는 「항만법 시행령」 제44조제1항에 따른 항만시설 사용허가신청서에 따른다. <개정 2020.7.30>\n② 법 제5조제2항 단서에서 \"해양수산부령으로 정하는 사유\"란 다음 각 호의 경우를 말한다.\n1. 「해양사고의 조사 및 심판에 관한 법률」 제2조 제1호에 따른 해양사고를 피하기 위한 경우", "id": 875}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 해양오염 등의 발생 또는 확산을 방지하기 위한 경우", "answer": "5. 그 밖에 선박의 안전운항을 위하여 지방해양수산청장 또는 시ㆍ도지사가 필요하다고 인정하는 경우\n제12조(항로에서의 항법)\n① 모든 선박은 항로에서 다음 각 호의 항법에 따라 항행하여야 한다.\n1. 항로 밖에서 항로에 들어오거나 항로에서 항로 밖으로 나가는 선박은 항로를 항행하는 다른 선박의 진로를\n피하여 항행할 것", "id": 876}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 항로에서 다른 선박을 추월하지 아니할 것. 다만, 추월하려는 선박을 눈으로 볼 수 있고 안전하게 추월할 수 있다고 판단되는 경우에는 「해사안전법」 제67조 제5항 및 제71조에 따른 방법으로 추월할 것", "answer": "5. 항로를 항행하는 제37조 제1항 제1호에 따른 위험물운송선박(제2조 제5호 라목에 따른 선박 중 급유선은\n제외한다) 또는 「해사안전법」 제2조 제14호에 따른 흘수제약선(吃水制約船)의 진로를 방해하지 아니할 것\n6. 「선박법」 제1조의2 제1항 제2호에 따른 범선은 항로에서 지그재그(zigzag)로 항행하지 아니할 것\n② 해양수산부장관은 선박교통의 안전을 위하여 특히 필요하다고 인정하는 경우에는 제1항에서 규정한 사항\n외에 따로 항로에서의 항법 등에 관한 사항을 정하여 고시할 수 있다. 이 경우 선박은 이에 따라 항행하여야\n한다.\n제13조(방파제 부근에서의 항법)\n무역항의 수상구역 등에 입항하는 선박이 방파제 입구 등에서 출항하는 선박과 마주칠 우려가 있는 경우에는 방파제 밖에서 출항하는 선박의 진로를 피하여야 한다.\n제14조(부두 등 부근에서의 항법)\n선박이 무역항의 수상구역 등에서 해안으로 길게 뻗어 나온 육지 부분, 부두, 방파제 등 인공시설물의 튀어나온 부분 또는 정박 중인 선박(이하 이 조에서 \"부두 등\"이라 한다)을 오른쪽 뱃전에 두고 항행할 때에는 부두 등에 접근하여 항행하고, 부두 등을 왼쪽 뱃전에 두고 항행할 때에는 멀리 떨어져서 항행하여야 한다.\n제15조(예인선 등의 항법)\n① 예인선이 무역항의 수상구역 등에서 다른 선박을 끌고 항행할 때에는 해양수산부령으로 정하는 방법에\n따라야 한다.\n② 범선이 무역항의 수상구역 등에서 항행할 때에는 돛을 줄이거나 예인선이 범선을 끌고 가게 하여야 한다.\n제16조(진로방해의 금지)\n① 우선피항선은 무역항의 수상구역 등이나 무역항의 수상구역 부근에서 다른 선박의 진로를 방해하여서는 아니 된다.\n② 제41조 제1항에 따라 공사 등의 허가를 받은 선박과 제42조 제1항에 따라 선박경기 등의 행사를 허가받은\n선박은 무역항의 수상구역 등에서 다른 선박의 진로를 방해하여서는 아니 된다.\n제17조(속력 등의 제한)\n① 선박이 무역항의 수상구역 등이나 무역항의 수상구역 부근을 항행할 때에는 다른 선박에 위험을 주지 아니할 정도의 속력으로 항행하여야 한다.\n② 해양경찰청장은 선박이 빠른 속도로 항행하여 다른 선박의 안전 운항에 지장을 초래할 우려가 있다고\n인정하는 무역항의 수상구역 등에 대하여는 해양수산부장관에게 무역항의 수상구역 등에서의 선박 항행\n최고속력을 지정할 것을 요청할 수 있다. <개정 2017. 7. 26.>\n③ 해양수산부장관은 제2항에 따른 요청을 받은 경우 특별한 사유가 없으면 무역항의 수상구역등에서 선박 항행 최고속력을 지정ㆍ고시하여야 한다. 이 경우 선박은 고시된 항행 최고속력의 범위에서 항행하여야 한다.\n제18조(항행 선박 간의 거리)\n무역항의 수상구역 등에서 2척 이상의 선박이 항행할 때에는 서로 충돌을 예방할 수 있는 상당한 거리를 유지하여야 한다.", "id": 877}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "23. 선박의 입항 및 출항 등에 관한 법률에서 속력 등의 제한을 말하시오.", "answer": "제17조(속력 등의 제한)\n① 선박이 무역항의 수상구역 등이나 무역항의 수상구역 부근을 항행할 때에는 다른 선박에 위험을 주지 아니할 정도의 속력으로 항행하여야 한다.\n② 해양경찰청장은 선박이 빠른 속도로 항행하여 다른 선박의 안전 운항에 지장을 초래할 우려가 있다고 인정\n하는 무역항의 수상구역 등에 대하여는 해양수산부장관에게 무역항의 수상구역 등에서의 선박 항행 최고속력을 지정할 것을 요청할 수 있다. <개정 2017. 7. 26.>\n③ 해양수산부장관은 제2항에 따른 요청을 받은 경우 특별한 사유가 없으면 무역항의 수상구역 등에서 선박\n항행 최고속력을 지정ㆍ고시하여야 한다. 이 경우 선박은 고시된 항행 최고속력의 범위에서 항행하여야 한다.", "id": 878}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "24. 개항질서법에서 피항선의 종류?", "answer": "개항질서법-> 선박의 입항 및 출항 등에 관한 법률로 바뀜\n선박의 입항 및 출항 등에 관한 법률\n제2조 정의", "id": 879}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. \"우선피항선\"(優先避航船)이란 주로 무역항의 수상구역에서 운항하는 선박으로서 다른 선박의 진로를 피하여야 하는 다음 각 목의 선박을 말한다.", "answer": "가. 「선박법」 제1조의2 제1항 제3호에 따른 부선(艀船)[예인선이 부선을 끌거나 밀고 있는 경우의 예인선 및 부선을 포함하되, 예인선에 결합되어 운항하는 압항부선(押航艀船)은 제외한다]\n나. 주로 노와 삿대로 운전하는 선박\n다. 예선\n라. 「항만운송사업법」 제26조의3 제1항에 따라 항만운송관련사업을 등록한 자가 소유한 선박\n마. 「해양환경관리법」 제70조 제1항에 따라 해양환경관리업을 등록한 자가 소유한 선박(폐기물해양배출업으로\n등록한 선박은 제외한다)\n바. 가목부터 마목까지의 규정에 해당하지 아니하는 총톤수 20톤 미만의 선박", "id": 880}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "우선피항선끼리는 입출항시 어떻게 항해를 하여야 하는지 말하시오.", "answer": "???", "id": 881}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "25. 개항질서법에서 무역항이란?", "answer": "개항질서법-> 선박의 입항 및 출항 등에 관한 법률로 바뀜\n선박의 입항 및 출항 등에 관한 법률\n제2조 정의", "id": 882}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. \"무역항\"이란 「항만법」 제2조 제2호에 따른 항만을 말한다.", "answer": "항만법\n제2조 정의", "id": 883}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. \"무역항\"이란 국민경제와 공공의 이해(利害)에 밀접한 관계가 있고 주로 외항선이 입항ㆍ출항하는 항만으로서 제3조 제1항에 따라 지정된 항만을 말한다.", "answer": "제3조(항만의 구분 및 지정)\n① 해양수산부장관은 항만을 다음 각 호의 항(港)으로 구분하여 지정하되, 그 명칭ㆍ위치 및 구역은 대통령령으로 정한다. <개정 2013. 3. 23.>", "id": 884}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 연안항", "answer": "② 해양수산부장관은 무역항을 체계적이고 효율적으로 관리ㆍ운영하기 위하여 수출입 화물량, 개발계획 및 지역균형발전 등을 고려하여 다음 각 호에 따라 대통령령으로 세분할 수 있다. <개정 2012. 2. 22., 2013. 3. 23.>\n1. 국가관리무역항: 국내외 육ㆍ해상운송망의 거점으로서 광역권의 배후화물을 처리하거나 주요 기간산업 지원 등으로 국가의 이해에 중대한 관계를 가지는 항만\n2. 지방관리무역항: 지역별 육ㆍ해상운송망의 거점으로서 지역산업에 필요한 화물처리를 주목적으로 하는 항만\n③ 해양수산부장관은 연안항을 체계적이고 효율적으로 관리ㆍ운영하기 위하여 지역의 여건 및 특성, 항만기능 등을 고려하여 다음 각 호에 따라 대통령령으로 세분할 수 있다. <신설 2012. 2. 22., 2013. 3. 23.>\n1. 국가관리연안항: 국가안보 또는 영해관리에 중요하거나 기상악화 등 유사시 선박의 대피를 주목적으로 하는 항만\n2. 지방관리연안항: 지역산업에 필요한 화물의 처리, 여객의 수송 등 편익 도모, 관광 활성화 지원을 주목적으로 하는 항만\n④ 국가는 국가관리연안항의 개발을 우선적으로 지원하여야 한다. <신설 2012. 2. 22.>\n*무역항\n1) 경인항 2) 인천항 3)서울항 4)평택,당진항 5)대산항 6)태안항 7)보령항 8)장항항 9)군산항 10)목포항\n11)완도항 12)여수항 13)광양항 14)하동항 15)삼천포항 16)통영항 17)장승포항 18)옥포항 19)고현항 20)마산항\n21)진해항 22)부산항 23)울산항 24)포항항 25)호산항 26)삼척항 27)동해,묵호항 28)옥계항 29)속초항 30)제주항\n31)서귀포항", "id": 885}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "26. 선박의 입항 및 출항의 관한 법률상 안전속력", "answer": "* 선박의 입항 및 출항의 관한 법률\n제17조(속력 등의 제한)\n① 선박이 무역항의 수상구역 등이나 무역항의 수상구역 부근을 항행할 때에는 다른 선박에 위험을 주지 아니할 정도의 속력으로 항행하여야 한다.\n② 해양경찰청장은 선박이 빠른 속도로 항행하여 다른 선박의 안전 운항에 지장을 초래할 우려가 있다고\n인정하는 무역항의 수상구역 등에 대하여는 해양수산부장관에게 무역항의 수상구역 등에서의 선박 항행\n최고속력을 지정할 것을 요청할 수 있다. <개정 2017. 7. 26.>\n③ 해양수산부장관은 제2항에 따른 요청을 받은 경우 특별한 사유가 없으면 무역항의 수상구역 등에서 선박\n항행 최고속력을 지정ㆍ고시하여야 한다. 이 경우 선박은 고시된 항행 최고속력의 범위에서 항행하여야 한다.\n* 해사안전법\n제64조(안전한 속력)\n① 선박은 다른 선박과의 충돌을 피하기 위하여 적절하고 효과적인 동작을 취하거나 당시의 상황에 알맞은\n거리에서 선박을 멈출 수 있도록 항상 안전한 속력으로 항행하여야 한다.\n② 제1항에 따른 안전한 속력을 결정할 때에는 다음 각 호(레이더를 사용하고 있지 아니한 선박의 경우에는\n제1호부터 제6호까지)의 사항을 고려하여야 한다.", "id": 886}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "9. 레이더로 탐지한 선박의 수ㆍ위치 및 동향", "answer": "27. 협수로에서 선박을 추월할 경우, 추월할 선박과 추월당할 선박의 입장이 되어 진행해보라.\n협수로는 선박의 자유로운 통항이 방해받을 정도의 좁은 수로이므로 천수의 영향, 육안 효과 및 선박간섭작용을 받으므로 선박의 추월은 위험하다. 그러므로 피추월선의 동의가 있는 경우에만 추월이 허락된다. 추월에 동의한 선박은 가능하면 우측 끝단으로 이동하여 항행하고 감속하여 병행항행시간을 줄이는 것이 선원의 상무이다.\n협수로에서는 추월이 금지되므로 피추월선의 동의가 없음에도 불구하고 추월을 한다면 이는 무단추월이므로, 추월선은 피추월선을 피하여야 할 절대적인 책임을 부담한다. 그리고 피추월선이 동의를 하게 되면 이때 비로소\n제13조의 규정이 적용되어 추월선은 제13조의 추월선으로서의 주의의무를 부담하고, 피추월선은 제17조 하의\n유지선의 주의의무를 부담한다고 본다.", "id": 887}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "28. 선박 입항 및 출항 등에 관한 법률에서 각 항구 제한 SPD를 말하라.", "answer": "*선박의 입항 및 출항 등에 관한 법률상 안전속력이란\n제17조(속력 등의 제한)\n① 선박이 무역항의 수상구역 등이나 무역항의 수상구역 부근을 항행할 때에는 다른 선박에 위험을 주지 아니할 정도의 속력으로 항행하여야 한다.\n② 해양경찰청장은 선박이 빠른 속도로 항행하여 다른 선박의 안전 운항에 지장을 초래할 우려가 있다고\n인정하는 무역항의 수상구역 등에 대하여는 해양수산부장관에게 무역항의 수상구역 등에서의 선박 항행\n최고속력을 지정할 것을 요청할 수 있다. <개정 2017. 7. 26.>\n.\n③ 해양수산부장관은 제2항에 따른 요청을 받은 경우 특별한 사유가 없으면 무역항의 수상구역 등에서 선박\n항행 최고속력을 지정·고시하여야 한다. 이 경우 선박은 고시된 항행 최고속력의 범위에서 항행하여야 한다.\n*나중에 주요 항만 최고속력 찾아볼 것", "id": 888}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "29. 선박입출항법에 대해 설명하시오.", "answer": "선박입출항법은 최근 2015년 구 개항질서법을 전면 개정하여 개항질서법과 항만법에 분산되어 있는 선박의 입항 및 출항 등에 관한 규정을 통합하여 제정한 것이다. 이 법의 목적은 무역항의 수상구역 등에서 선박의 입항,\n출항에 대한 지원과 선박운항의 안전 및 질서 유지에 필요한 사항을 규정함을 목적으로 한다. 적용수역에\n대해서는 ‘무역항의 수상구역 등’으로 규정하며 통상적으로 항만법에서 정의하고 있는 항만과 무역항의 수상구역 및 항만법의 수역 시설 중 수상구역 밖의 수역시설로서 해양수산부장관이 지정 고시한 해역에 대해 적용하도록 규정한다.", "id": 889}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 항해 관련사항", "answer": "1) 항로에서 나가거나 들어오는 선박은 항로상에서 항해하는 선박의 진로를 방해하면 안된다.\n2) 나란히 항해하면 안된다.\n3) 추월금지 단, 눈으로 명확히 확인할 수 있는 상태로 적합한 추월 항법 적용시 가능하다.\n4) 선박이 마주칠 시 수로의 우측통항이 원칙이다.\n5) 흘수제약선 및 위험물 운반선을 방해해서는 안된다.", "id": 890}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 우선피항선의 종류", "answer": "1) 선박법 제1조의2 제1항 제3호에 따른 부선\n2) 주로 노와 삿대로 운전하는 선박\n3) 예선\n4) 항만운송사업법 제26조의3 제1항에 따라 항만운송관련사업을 등록한자가 소유한 선박\n5) 해양환경관리법 제70조 제1항에 따라 해양관리업을 등록한 자가 소유한 선박\n6) 상기 규정에 해당하지 아니하는 총톤수 20톤 미만의 선박", "id": 891}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "60. 선박안전법의 적용에서 제외되는 선박을 설명하시오.", "answer": "제3조(적용범위) ①이 법은 대한민국 국민 또는 대한민국 정부가 소유하는 선박에 대하여 적용한다. 다만, 다음 각 호의 어느 하나에 해당하는 선박에 대하여는 그러하지 아니하다. <개정 2010. 4. 15., 2017. 10. 31., 2020. 2. 18.>", "id": 892}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 노, 상앗대, 페달 등을 이용하여 인력만으로 운전하는 선박", "answer": "2의2. 「어선법」 제2조제1호에 따른 어선", "id": 893}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 제1호, 제2호 및 제2호의2 외의 선박으로서 대통령령으로 정하는 선박", "answer": "②외국선박으로서 다음 각 호의 선박에 대하여는 대통령령으로 정하는 바에 따라 이 법의 전부 또는 일부를 적용한다. 다만, 제68조는 모든 외국선박에 대하여 이를 적용한다. <개정 2007. 4. 11., 2009. 12. 29., 2017. 10. 31.>\n1. 「해운법」 제3조제1호 및 제2호의 규정에 따른 내항정기여객운송사업 또는 내항부정기여객운송사업에 사용되는 선박", "id": 894}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 국적취득조건부 선체용선을 한 선박", "answer": "③제1항 및 제2항에도 불구하고 다음 각 호의 선박에 대하여는 대통령령으로 정하는 바에 따라 이 법의 전부 또는 일부를 적용하지 아니하거나 이를 완화하여 적용할 수 있다. <개정 2008. 2. 29., 2013. 3. 23., 2020. 2. 18.>\n1. 대한민국 정부와 외국 정부가 이 법의 적용범위에 관하여 협정을 체결한 경우의 해당선박\n2. 조난자의 구조 등 해양수산부령으로 정하는 긴급한 사정이 발생하는 경우의 해당선박\n3. 새로운 특징 또는 형태의 선박을 개발할 목적으로 건조한 선박을 임시로 항해에 사용하고자 하는 경우의 해당선박", "id": 895}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 외국에 선박매각 등을 위하여 예외적으로 단 한번의 국제항해를 하는 선박", "answer": "제2조(적용제외 선박) ① 「선박안전법」(이하 “법”이라 한다) 제3조제1항제3호에서 “대통령령으로 정하는 선박”이란 다음 각 호의 선박을 말한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 7. 6., 2018. 9. 4., 2020. 7. 28., 2021. 1. 5., 2023. 4. 11., 2023. 6. 7.>\n1. 법 제8조제2항에 따른 선박검사증서(이하 “선박검사증서”라 한다)를 발급받은 자가 일정 기간 동안 운항하지 아니할 목적으로 그 증서를 해양수산부장관에게 반납한 후 해당 선박을 계류(이하 “계선”이라 한다)한 경우 그 선박\n2. 「수상레저기구의 등록 및 검사에 관한 법률」 제15조에 따른 안전검사를 받은 수상레저기구\n3. 2007년 11월 4일 전에 건조된 선박 중 다음 각 목의 어느 하나에 해당하는 선박. 이 경우 외국에서 수입된 선박은 2007년 11월 4일 전에 「선박법」 제8조제2항에 따라 등록된 선박으로 한다.\n가. 추진기관 또는 돛대가 설치되지 않은 선박으로서 평수(平水)구역[호소(湖沼: 호수와 늪)ㆍ하천 및 항내의 수역(「항만법」에 따른 항만구역이 지정된 항만의 경우 항만구역과 「어촌ㆍ어항법」에 따른 어항구역이 지정된 어항의 경우 어항구역을 말한다)과 해양수산부령으로 정하는 수역을 말한다. 이하 같다]안에서만 운항하는 선박. 다만, 다음의 어느 하나에 해당하는 선박은 제외한다.\n1) 「항만법」 제39조제1항에 따른 항만건설작업선(이하 “항만건설작업선”이라 한다)\n2) 압항부선(押航艀船: 추진기관이 설치되어 있는 선박에 결합되어 운항하는 부선을 말한다. 이하 같다)\n3) 여객운송에 사용되는 선박 등 해양수산부령으로 정하는 선박\n4) 잠수선 등 특수한 구조로 되어 있는 선박으로서 해양수산부장관이 정하여 고시하는 선박\n나. 추진기관 또는 돛대가 설치되지 않은 선박으로서 연해구역(영해기점으로부터 20해리 이내의 수역과 해양수산부령으로 정하는 수역을 말한다. 이하 같다)을 운항하는 선박. 다만, 다음의 어느 하나에 해당하는 선박은 제외한다.\n1) 항만건설작업선\n2) 압항부선\n3) 여객이나 화물의 운송에 사용되는 선박\n4) 잠수선 등 특수한 구조로 되어 있는 선박으로서 해양수산부장관이 정하여 고시하는 선박\n다. 삭제 <2015. 7. 6.>\n② 제1항제1호에 따른 선박의 소유자 또는 관리인(이하 이 조에서 “선박소유자등”이라 한다)은 해양수산부령으로 정하는 바에 따라 해당 선박의 계선기간 및 계선사유 등을 기재한 서류를 해양수산부장관에게 제출하여야 한다. <개정 2008. 2. 29., 2013. 3. 23.>\n③ 제1항제3호가목1)부터 4)까지 외의 부분 본문 또는 같은 호 나목1)부터 4)까지 외의 부분 본문에 해당하는 선박으로서 이 법의 적용을 받으려는 선박의 선박소유자등은 해당 선박에 대하여 법 제7조제4항에 따른 별도건조검사를 받아야 한다. <개정 2015. 7. 6., 2018. 9. 4., 2023. 4. 11.>", "id": 896}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "58. 선박안전법의 목적과 선박안전법을 설명하시오.", "answer": "제1조(목적) 이 법은 선박의 감항성(堪航性) 유지 및 안전운항에 필요한 사항을 규정함으로써 국민의 생명과 재산을 보호함을 목적으로 한다.\n선박 소유자는 안전 항해를 위하여 선박의 감항능력을 유지시킬 의무가 있다. 이 감항능력의 기초가 되는 것은\n선박의 물적 구조로서 선체, 기관 및 각종 설비가 선박안전법에서 정한 법정기준에 적합하여야 한다. 그리고\n선박소유자는 자기 선박의 감항능력과 항해의 적합성을 확인하기 위하여 선박안전법에 정한 바에 따라서 일정한\n기간마다 정부 또는 선급의 선박 검사를 받아야 한다. 이 검사에 합격하지 못하면 그 선박은 항해에 사용할 수\n없다.", "id": 897}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "59. 선박안전법상 검사의 종류 및 시행 시기", "answer": "* 6가지\n제7조(건조검사)\n제8조(정기검사)\n제9조(중간검사)\n제10조(임시검사)\n제11조(임시항해검사)\n제12조(국제협약검사)\n제2장 선박의 검사\n제7조(건조검사)\n①선박을 건조하고자 하는 자는 선박에 설치되는 선박시설에 대하여 해양수산부령이 정하는 바에 따라\n해양수산부장관의 검사(이하 \"건조검사\"라 한다)를 받아야 한다. <개정 2008. 2. 29., 2013. 3. 23.>\n②해양수산부장관은 건조검사에 합격한 선박에 대하여 해양수산부령으로 정하는 사항과 검사기록을 기재한\n건조검사증서를 교부하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n③제1항의 규정에 따른 건조검사에 합격한 선박시설에 대하여는 제8조 제1항의 규정에 따른 정기검사 중 선박을 최초로 항해에 사용하는 때 실시하는 검사는 이를 합격한 것으로 본다.\n④해양수산부장관은 외국에서 수입되는 선박 등 제1항의 규정에 따른 건조검사를 받지 아니하는 선박에 대하여 건조검사에 준하는 검사로서 해양수산부령이 정하는 검사(이하 \"별도건조검사\"라 한다)를 받게 할 수 있다. 이\n경우 제2항 및 제3항의 규정은 별도건조검사에 합격한 선박에 대하여 이를 준용한다. <개정 2008. 2. 29., 2013. 3. 23.>\n*유효기간: 없음\n제8조(정기검사)\n①선박소유자는 선박을 최초로 항해에 사용하는 때 또는 제16조의 규정에 따른 선박검사증서의 유효기간이 만료된 때에는 선박시설과 만재흘수선에 대하여 해양수산부령이 정하는 바에 따라 해양수산부장관의 검사(이하 \"정기검사\"라 한다)를 받아야 한다. 다만, 제29조의 규정에 따른 무선설비 및 제30조의 규정에 따른 선박위치발신장치에 대하여는 「전파법」의 규정에 따라 검사를 받았는지 여부를 확인하는 것으로 갈음한다. <개정 2008. 2. 29., 2013. 3. 23.>\n②해양수산부장관은 제1항의 규정에 따른 정기검사에 합격한 선박에 대하여 항해구역ㆍ최대승선인원 및 만재흘수선의 위치를 각각 지정하여 해양수산부령으로 정하는 사항과 검사기록을 기재한 선박검사증서를 교부하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n③제2항의 규정에 따른 항해구역의 종류와 예외적으로 허용되거나 제한되는 항해구역, 최대승선인원의 산정기준 등에 관하여 필요한 사항은 해양수산부령으로 정한다. <개정 2008. 2. 29., 2013. 3. 23.>\n*유효기간: 5년\n제9조(중간검사)\n①선박소유자는 정기검사와 정기검사의 사이에 해양수산부령이 정하는 바에 따라 해양수산부장관의 검사(이하 \"중간검사\"라 한다)를 받아야 한다. <개정 2008. 2. 29., 2013. 3. 23.>\n②중간검사의 종류는 제1종과 제2종으로 구분하며, 그 시기와 검사사항은 해양수산부령으로 정한다. <개정 2008. 2. 29., 2013. 3. 23.>\n③해양수산부장관은 제1항의 규정에 따른 중간검사에 합격한 선박에 대하여 제8조 제2항에 따른 선박검사증서의 검사기록에 그 검사결과를 기재하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n④해외수역(대한민국의 수역 외의 수역을 말한다. 이하 같다)에서의 장기간 항해ㆍ조업 등 부득이 한 사유로 인하여 중간검사를 받을 수 없는 자는 해양수산부령이 정하는 바에 따라 중간검사의 시기를 연기할 수 있다. <개정 2008. 2. 29., 2013. 3. 23.>\n*제1종 중간검사 -정기검사 중간\n*제2종 중간검사 -제1종 중간검사의 중간\n제10조(임시검사)\n①선박소유자는 다음 각 호의 어느 하나에 해당하는 경우에는 해양수산부령으로 정하는 바에 따라 해양수산부장관의 검사(이하 \"임시검사\"라 한다)를 받아야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2017. 10. 31., 2019. 8. 20.>", "id": 898}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 선박시설에 대하여 해양수산부령이 정하는 개조 또는 수리를 행하고자 하는 경우", "answer": "2. 제8조 제2항의 규정에 따른 선박검사증서에 기재된 내용을 변경하고자 하는 경우. 다만, 선박소유자의 성명과 주소, 선박명 및 선적항의 변경 등 선박시설의 변경이 수반되지 아니하는 경미한 사항의 변경인 경우에는 그러하지 아니하다.", "id": 899}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 제15조 제3항의 규정에 따라 선박의 용도를 변경하고자 하는 경우", "answer": "4. 제29조의 규정에 따라 선박의 무선설비를 새로이 설치하거나 이를 변경하고자 하는 경우", "id": 900}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. 「해양사고의 조사 및 심판에 관한 법률」 제2조 제1호에 따른 해양사고(이하 \"해양사고\"라 한다) 등으로 선박의 감항성 또는 인명안전의 유지에 영향을 미칠 우려가 있는 선박시설의 변경이 발생한 경우", "answer": "6. 해양수산부장관이 선박시설의 보완 또는 수리가 필요하다고 인정하여 임시검사의 내용 및 시기를 지정한 경우", "id": 901}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "7. 만재흘수선의 변경 등 해양수산부령이 정하는 경우", "answer": "②해양수산부장관은 제1항의 규정에 따른 임시검사에 합격한 선박에 대하여 제8조 제2항에 따른 선박검사증서의 검사기록에 그 검사결과를 기재하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n③ 제2항에도 불구하고 해양수산부장관은 제8조 제2항에 따른 선박검사증서에 적혀 있는 내용을 일시적으로\n변경하기 위하여 제1항 제2호 본문에 따른 임시검사에 합격한 선박에 대해서는 해양수산부령으로 정하는 임시\n변경증을 발급할 수 있다. <개정 2017. 10. 31.>\n*유효기간: 없음\n제11조(임시항해검사)\n①정기검사를 받기 전에 임시로 선박을 항해에 사용하고자 하는 때 또는 국내의 조선소에서 건조된 외국선박(국내의 조선소에서 건조된 후 외국에서 등록되었거나 외국에서 등록될 예정인 선박을 말한다. 이하 이 조에서 같다)의 시운전을 하고자 하는 경우에는 선박소유자 또는 선박의 건조자는 해당선박에 요구되는 항해능력이 있는지에 대하여 해양수산부령이 정하는 바에 따라 해양수산부장관의 검사(이하 \"임시항해검사\"라 한다)를 받아야 한다. <개정 2008. 2. 29., 2013. 3. 23.>\n②해양수산부장관은 제1항의 규정에 따른 임시항해검사에 합격한 선박에 대하여 해양수산부령으로 정하는 사항과 검사기록을 기재한 임시항해검사증서를 교부하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n*유효기간: 없음\n제12조(국제협약검사)\n①국제항해에 취항하는 선박의 소유자는 선박의 감항성 및 인명안전과 관련하여 국제적으로 발효된 국제협약에 따른 해양수산부장관의 검사(이하 \"국제협약검사\"라 한다)를 받아야 한다. <개정 2008. 2. 29., 2013. 3. 23.>\n②해양수산부장관은 국제협약검사에 합격한 선박에 대하여 해양수산부령으로 정하는 사항과 검사기록을 기재한 국제협약검사증서를 교부하여야 한다. <개정 2008. 2. 29., 2013. 3. 23., 2015. 1. 6.>\n③해양수산부장관은 제2항의 규정에 따라 교부한 국제협약검사증서의 소유자가 제1항에서 규정된 국제협약을\n위반한 경우에는 해당증서를 회수하거나 효력정지 또는 취소할 수 있다. <개정 2008. 2. 29., 2013. 3. 23.>\n④해양수산부장관은 외국정부로부터 국제협약검사증서의 교부요청이 있는 때에는 해당외국선박에 대하여 제1항의 규정에 따른 국제협약검사를 한 후 국제협약검사증서를 교부할 수 있다. <개정 2008. 2. 29., 2013. 3. 23.>\n⑤제1항 내지 제3항의 규정에 따른 국제협약검사의 종류, 국제협약검사증서의 교부ㆍ회수ㆍ효력정지ㆍ취소 및\n국제협약 위반에 대한 조사방법 등에 관하여 필요한 사항은 해양수산부령으로 정한다. <개정 2008. 2. 29., 2013. 3. 23.>\n*유효기간: 없음", "id": 902}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "61. 선박안전법 / 해사안전법의 목적", "answer": "1) 선박안전법\n제1조(목적) 이 법은 선박의 감항성(堪航性) 유지 및 안전운항에 필요한 사항을 규정함으로써 국민의 생명과 재산을 보호함을 목적으로 한다.\n2) 해사안전법\n제1조(목적) 이 법은 선박의 안전운항을 위한 안전관리체계를 확립하여 선박항행과 관련된 모든 위험과 장해를 제거함으로써 해사안전(海事安全) 증진과 선박의 원활한 교통에 이바지함을 목적으로 한다", "id": 903}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "62. 선박안전법상 항해가능 구역 이외의 구역을 갈 수 있는 경우가 있는데 그 경우를 말하시오.", "answer": "*선박안전법 시행규칙\n제17조 항해구역 외의 예외적 항해\n법 제8조 제3항에 따라 다음 각 호의 어느 하나에 해당하는 경우에는 지정된 항해구역 외의 구역을 항해할 수 있다.", "id": 904}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 외국에 선박매각 등을 하기 위하여 예외적으로 단 한번의 국제항해를 하는 경우", "answer": "2. 선박을 수리하거나 검사를 받기 위하여 수리할 장소 또는 검사를 받을 장소까지 항해하는 경우", "id": 905}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 항해구역의 변경을 위하여 변경하려는 항해구역으로 선박을 항해시키는 경우", "answer": "5. 접적지역(대연평도, 소연평도, 대청도, 소청도 및 백령도 부근 해역을 말한다)을 항해하는 선박으로서 해당\n선박의 항해구역 중 일부가 군사목적상 항해금지구역으로 설정되어 있어 그 구역을 우회하기 위하여 일시적으로 항해구역 외의 구역을 항해하는 경우\n6. 그 밖에 제1호부터 제4호까지와 비슷한 사유로서 선박이 임시로 항해할 필요가 있다고 인정되는 경우", "id": 906}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "항해구역을 구분 짓고 있는 우리나라 법규는 무엇이며 구분 지어진 항해구역의 이름과 구분 지어지는 기준은 무엇인가?", "answer": "선박안전법,\n가항수역(navigable water, navigation area)이란 하천을 포함하여 선박이 항해할 수 있는 모든 수역을 말한다.\n그러나 이같은 가항수역은 선박의 안전 항해를 도모하기 위해 선박안전법 시행규칙에 선박에 따라 항해할 수\n있는 구역을 지정해 두고 있다. 이러한 수역을 특히 항해구역이라고 한다. 이같은 항해구역은 평수구역, 연해구역, 근해구역 및 원양구역 등으로 구분되어 있다.", "id": 907}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 평수구역:", "answer": "호수, 하천 및 항내의 수역(항만법에 의하여 항만구역이 지정된 항만)에 있어서는 그 구역과 해양수산부령이\n정하는 18개 구역으로 가장 좁은 범위의 항해구역", "id": 908}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 연해구역:", "answer": "한반도와 제주도의 해안으로부터 20마일 이내의 수역과 해양수산부령이 정하는 5개 구역", "id": 909}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 근해구역:", "answer": "동경 175도/남위 11도, 동경94도/북위 63도 선안의 수역(동남아)", "id": 910}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 원양구역:", "answer": "세계 모든 수역", "id": 911}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "65. 만재흘수선 표시에 관하여 설명하시오.", "answer": "Load Lines 1966에서 선체 중앙부 양측에 표시하도록 규정한 이 표시는 처음 고안한 사람의 이름을 따서 Plomsoll Mark라고도 불린다. 마크는 영구적인 방법으로 부착해야 하며, 밝은 바탕에는 검은색, 어두운 바탕에는 흰색이나 노란색으로 페인트 칠한다. 모든 선의 두께는 25mm이고, 원 모양 양측에 표시된 글자는 건현을 지정한 기관의 약자이다. 만재흘수선의 기본적인 개념은 배가 물에 잠기는 정도가 떠있는 물의 비중에 따라 다르고,물의 비중은 해수와 담수간에 차이가 있으며 온도에 따라 변하기 때문에 그 상태를 몇 가지로 분류하여 기준을 정한 것이다.\n따라서 물의 비중 상태와 관계없이 항상 동일한 적재중량을 유지케 하기 위함이라고 할 수 있다. 건현갑판이나 선루갑판 위 차폐되지 않은 곳에 싣은 목재 화물은 배에 추가 부력과 바다로부터의 보호구 역할을 한다고 인정되어, 이러한 용도의 배는 건현을 감소시킨 목재 만재흘수선(Timber Load Line)을 추가로 지정 받을 수 있으며, 일반적인 만재흘수선 표시에 더하여 표시한다.", "id": 912}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "67. 만재흘수선 협약의 Type A와 B를 설명하시오.", "answer": "1. 선박이 선적할 수 있는 최대중량을 넘지 않는다는 것을 나타내기 위해 선박의 양현 중앙부에 표시된 기호이다.\n2. 선박이 적재할 수 있는 최대 용량은 물의 비중에 따라 다르다. 물의 밀도는 물의 염도와 온도에 따라 변한다.\n1) Type A: 포장하지 않은 액체화물을 운송하도록 설계된 적재된 화물구역의 침수율이 낮은 선박(유조선)\n2) Type B: Type A 이외의 선박", "id": 913}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "68. 만재흘수선 이상으로 짐을 싣고 항해를 할 수 있는 경우에 대하여 설명하시오.", "answer": "1) 평수에서 평수구역 항해\n2) 하천이나 수로에서 해양에 이르기까지 소모량만큼\n3) 불가항력으로 인하여 예정된 항해가 지연되어~\n4) 만재흘수선의 대역, 구간 계절기간이 바뀌는 경우, 예) 선적항이 summer zone이고, 예정항로 도중에 winter zone을 거치는 경우 선적항에서 winter zone에 도착할 때까지 연료, 청수 등의 소모량을 더 선적할 수 있다\n해상교통안전법\n[시행 2024. 7. 26.] [법률 제19573호, 2023. 7. 25., 제정]\n해양수산부(해사안전정책과), 044-200-5821\n제1장 총칙\n제1조(목적) 이 법은 수역 안전관리, 해상교통 안전관리, 선박ㆍ사업장의 안전관리 및 선박의 항법 등 선박의 안전운항을 위한 안전관리체계에 관한 사항을 규정함으로써 선박항행과 관련된 모든 위험과 장해를 제거하고 해사안전 증진과 선박의 원활한 교통에 이바지함을 목적으로 한다.\n선박안전법\n제27조(만재흘수선의 표시 등) ①다음 각 호의 어느 하나에 해당하는 선박소유자는 해양수산부장관이 정하여 고시하는 기준에 따라 만재흘수선의 표시를 하여야 한다. 다만, 잠수선 및 그 밖에 해양수산부령으로 정하는 선박에 대하여는 만재흘수선의 표시를 생략할 수 있다. <개정 2008. 2. 29., 2013. 3. 23., 2020. 2. 18.>", "id": 914}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 해양수산부령으로 정하는 방법에 따른 선박의 길이(이하 “선박길이”라 한다)가 12미터 이상인 선박", "answer": "3. 선박길이가 12미터 미만인 선박으로서 다음 각 목의 어느 하나에 해당하는 선박\n가. 여객선\n나. 제41조의 규정에 따른 위험물을 산적하여 운송하는 선박\n②누구든지 제1항의 규정에 따라 표시된 만재흘수선을 초과하여 여객 또는 화물을 운송하여서는 아니 된다.\n제69조(만재흘수선의 표시 등) 법 제27제1항 각 호 외의 부분 단서에서 “해양수산부령이 정하는 선박”이란 다음 각 호의 어느 하나에 해당하는 선박을 말한다. <개정 2008. 3. 14., 2012. 6. 26., 2013. 3. 24.>\n1. 수중익선, 공기부양선, 수면비행선박 및 부유식 해상구조물(제3조제1호 및 제2호는 제외한다)", "id": 915}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 운송업에 종사하지 아니하는 유람 범선(帆船)", "answer": "3. 국제항해에 종사하지 아니하는 선박으로서 선박길이가 24미터 미만인 예인ㆍ해양사고구조ㆍ준설 또는 측량에 사용되는 선박", "id": 916}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. 시운전을 위하여 항해하는 선박", "answer": "6. 만재흘수선을 표시하는 것이 구조상 곤란하거나 적당하지 아니한 선박으로서 해양수산부장관이 인정하는 선박\n해상안전기본법\n제 1장 총칙\n제1조(목적) 이 법은 해사안전 정책과 제도에 관한 기본적 사항을 규정함으로써 해양사고의 방지 및 원활한 교통을 확보하고 국민의 생명ㆍ신체 및 재산의 보호에 이바지함을 목적으로 한다.\n*해사안전법\n제2절 교통안전특정해역 등의 설정과 관리\n제10조(교통안전특정해역의 설정 등)\n① 해양수산부장관은 다음 각 호의 어느 하나에 해당하는 해역으로서 대형 해양사고가 발생할 우려가 있는 해역(이하 \"교통안전특정해역\"이라 한다)을 설정할 수 있다. <개정 2013. 3. 23.>", "id": 917}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 거대선, 위험화물운반선, 고속여객선 등의 통항이 잦은 해역", "answer": "② 해양수산부장관은 관계 행정기관의 장의 의견을 들어 해양수산부령으로 정하는 바에 따라 교통안전특정해역 안에서의 항로지정제도를 시행할 수 있다. <개정 2013. 3. 23.>\n③ 교통안전특정해역의 범위는 대통령령으로 정한다.\n제11조(거대선 등의 항행안전확보 조치)\n해양경찰서장은 거대선, 위험화물운반선, 고속여객선, 그 밖에 해양수산부령으로 정하는 선박이 교통안전특정해역을 항행하려는 경우 항행안전을 확보하기 위하여 필요하다고 인정하면 선장이나 선박소유자에게 다음 각 호의 사항을 명할 수 있다. <개정 2013. 3. 23., 2014. 11. 19., 2015. 6. 22., 2017. 7. 26.>", "id": 918}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "6. 그 밖에 해양수산부령으로 정하는 사항", "answer": "[제목개정 2014. 1. 7.]\n제12조(어업의 제한 등)\n① 교통안전특정해역에서 어로 작업에 종사하는 선박은 항로지정제도에 따라 그 교통안전특정해역을 항행하는 다른 선박의 통항에 지장을 주어서는 아니 된다.\n② 교통안전특정해역에서는 어망 또는 그 밖에 선박의 통항에 영향을 주는 어구 등을 설치하거나 양식업을\n하여서는 아니 된다. <개정 2019. 8. 27.>\n③ 교통안전특정해역으로 정하여지기 전에 그 해역에서 면허를 받은 어업권ㆍ양식업권을 행사하는 경우에는해당 어업면허 또는 양식업 면허의 유효기간이 끝나는 날까지 제2항을 적용하지 아니한다. <개정 2019. 8. 27.>\n④ 특별자치도지사ㆍ시장ㆍ군수ㆍ구청장(자치구의 구청장을 말한다)이 교통안전특정해역에서 어업면허, 양식업\n면허, 어업허가 또는 양식업 허가(면허 또는 허가의 유효기간 연장을 포함한다)를 하려는 경우에는 미리 해양경찰청장과 협의하여야 한다. <개정 2014. 11. 19., 2017. 7. 26., 2019. 8. 27.>\n[시행일: 2020. 8. 28.] 제12조\n제13조(공사 또는 작업)\n① 교통안전특정해역에서 해저전선이나 해저파이프라인의 부설, 준설, 측량, 침몰선 인양작업 또는 그 밖에\n선박의 항행에 지장을 줄 우려가 있는 공사나 작업을 하려는 자는 해양경찰청장의 허가를 받아야 한다. 다만,\n관계 법령에 따라 국가가 시행하는 항로표지 설치, 수로 측량 등 해사안전에 관한 업무의 경우에는 그러하지\n아니하다. <개정 2014. 11. 19., 2017. 7. 26.>\n② 해양경찰청장은 제1항에 따른 허가를 하면 그 사실을 해양수산부장관에게 보고하여야 하며, 해양수산부장관은 이를 고시하여야 한다. <개정 2013. 3. 23., 2014. 11. 19., 2017. 7. 26.>\n③ 해양경찰청장은 제1항에 따라 공사 또는 작업의 허가를 받은 자가 다음 각 호의 어느 하나에 해당하면 그\n허가를 취소하거나 6개월의 범위에서 공사나 작업의 전부 또는 일부의 정지를 명할 수 있다. 다만, 제1호 또는 제4호에 해당하는 경우에는 그 허가를 취소하여야 한다. <개정 2014. 11. 19., 2017. 7. 26.>", "id": 919}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 정지명령을 위반하여 정지기간 중에 공사 또는 작업을 계속한 경우", "answer": "④ 제1항에 따라 허가를 받은 자는 해당 허가기간이 끝나거나 허가가 취소되었을 때에는 해당 구조물을 제거하고 원래 상태로 복구하여야 한다.\n⑤ 제1항에 따른 공사나 작업의 허가, 제3항에 따른 행정처분의 세부기준과 절차, 그 밖에 필요한 사항은 해양수산부령으로 정한다. <개정 2013. 3. 23., 2014. 11. 19., 2017. 7. 26.>", "id": 920}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "37. 협수로를 판단하는 기준은?", "answer": "국제규칙과 해사안전법에는 좁은 수로에서 적용되는 항법을 규정하고 있지만, 좁은 수로에 대한 법적 개념을 구체적으로 해석하거나 정의한 규정은 없다. 일반적으로 해협, 강 또는 섬과 섬 사이를 수도로 이름지어 해도상에 표기하고 있지만, 이러한 곳은 해상교통법상의 좁은 수로로서 인정될 수는 없다. 즉, 좁은 수로는 해도상의 명칭이 아니라 해상교통법의 적용과 관련하여 법률 상의 문제와 사실적인 문제가 혼합되어 결정된다 (Lee, 2016). 이처럼 좁은 수로의 개념은 쉽게 정의할 수 없는 사안이며, 모든 경우에 적용되는 명확한 정의를 내리는 것은 불가능하다고 판단된다. 이는 국제규칙의 초안을 작성하는 회의에서 그 증거를 찾아볼 수 있는데, 당시 여러 국가들이 좁은 수로의 정의를 포함하는 제안서를 제출 하였지만 합의를 이루지는 못하였다(Craig H. Allen, 2010).\n좁은 수로의 개념은 해상교통의 발달과 선박의 대형화, 고속화 및 해상교통의 밀집현상 등으로 많이 변화되었으며, 학설상으로도 여러 견해가 있다. 예컨대, 선박이 서로 상반되는 방향으로 또는 같은 방향으로 침로를 설정하고 항행하지 아니하면 곧 또는 잠시 후에 항해상의 위험이나 충돌상의 위험에 직면하게 되는 수로를 좁은수로 라고 정의하고 있다(Youn, 2013). 또한 선박이 자유롭게 충분한 수역을 가지고 통과할 수 없는 수로나 항로를 의미하며, 부표(Buoy)로 표시되어 일정한 항로를 갖는 경우 고유의 의미의 좁은 수로 또는 항로로 해석하는 견해도 있다(Kim, 2013). 그리고 좁은 수로 항법의 입법취지를 고려할 때 두 척의 선박이 통상의 항법규정에 따라 항행하는 것은 충돌 발생의 위험률이 크기 때문에 각 선박은 서로 진행방향의 우측을 항행하는 것이 그 위험을 현저하게 완화하는 정도의 좁은 수로를 의미하는 것으로 해석하는 것이 타당하다는 견해도 있다(Ji, 2010).\n중앙해심은 “좁은 수로는 통항하는 선박이 자유롭게 충분한 수역을 가지고 통과할 수 없는 수로로, 해사안전법 등 관련 법령에서 그 수로의 길이와 폭 등에 관하여 구체적으로 명시해 놓고 있지 않지만, 기본적으로 충분한\n수역에서 적용되는 선박의 항법, 즉 ‘마주치는 상태’, ‘선박사이의 책무’ 등 일반적인 항법만으로 그 수역에서\n선박간의 충돌을 방지하는 것이 불충분하다고 판단할 경우에 좁은 수로로 간주하고 있다”고 하였다. 또한 “그동안 해양안전심판원에서는 지리적 조건, 통항선박의 크기, 해상교통량, 조석의 차 등을 종합적으로 검토하여 좁은 수로 여부를 결정하였고, 이중 가장 기본이 되는 좁은 수로의 지리적 조건은 통상적으로 가항수역에서의 수로의 폭이 통항하는 선박 길이(L)의 16L이내일 때 충족된다”고 판시하였다.\n특히 좁은 수로의 지리적 조건은 통상 선박이 전타하여 원래 침로에서 180도까지 변침하였을 때 횡 이동거리가 3~4L의 거리에서 이루어지므로 어떤 선박이 항해하던 중, 장애물과 조우하여 좌현이나 우현으로 전타하여 회두하기 위해서는 약 8L의 공간이 필요하며, 마주치는 선박이 있는 경우에 같은 공간이 필요하므로 좁은 수로에서 양 선박이 자유롭게 조선하는데 필요한 최소 공간은 16L이 된다는 것을 근거로 제시하였다. 결론적으로 우리 법원의 판례나 해양안전심판 원의 재결에서는 선박의 크기, 해상교통량 등에 따라 지리적으로 형성된 좁은 수로를 사실적으로 판단하여 좁은 수로의 해당 여부를 결정하고 있다.", "id": 921}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "38. 해사안전법상 최초검사와 갱신검사가 무엇이며 이것으로 받을 수 있는 증서는 무엇인가?", "answer": "해사안전법상 선박검사는 안전관리체제인증심사로서 최초검사는 안전관리체제의 수립, 시행에 관한 사항을 확인하기 위한 검사이다. 이 검사로 선박안전관리증서, 안전관리적합증서를 받을 수 있으며 이 증서들이 만료될 때 갱신 검사를 한다.\n선박법\n[시행 2023. 6. 11.] [법률 제18957호, 2022. 6. 10., 타법개정]\n해양수산부(해사안전정책과), 044-200-5815\n제1조(목적) 이 법은 선박의 국적에 관한 사항과 선박톤수의 측정 및 등록에 관한 사항을 규정함으로써 해사(海事)에 관한 제도를 적정하게 운영하고 해상(海上) 질서를 유지하여, 국가의 권익을 보호하고 국민경제의 향상에 이바지함을 목적으로 한다.\n통상기선 (Normal Baseline): 해안선이 단조로운 지역에 적용되며, **썰물 때의 해안선(저조선)**을 기준으로 합니다.\n직선기선 (Straight Baseline): 해안선이 복잡하거나 섬이 많은 다도해 지역에 적용되며, 해안에 있는 최외곽의 기점들을 직선으로 연결한 선을 기준으로 합니다.", "id": 922}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "6.제이슨협약?", "answer": "선원법", "id": 923}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "41. 선원법상 훈련에 대해 설명하시오.", "answer": "선원법 제7조 선내비상훈련은 1화재, 2폭발훈련, 3퇴선훈련, 4침수훈련, 5기름유출사고훈련이 있으며 총톤수 500톤\n이상의 선박을 대상으로 한다. 다만, 평수구역을 항해구역으로 하는 선박은 제외한다. 매월 1회 선장이 지정하는\n일시에 실시하되, 여객선의 경우에는 10일(국내항과 외국항을 운항하는 여객선은 7일)마다 실시하여야 한다.\n여객선의 선장은 여객이 비상시에 대비할 수 있도록 비상신호의 위치, 구명기구의 비치 장소를 선내에 명시하고 피난 요령 등을 선내의 보기 쉬운 곳에 걸어두며 구명기구의 사용법 그 밖에 비상시에 대비하기 위하여 여객이 알고 있어야할 필요한 사항에 대하여 출항 후 1시간(국제 항해에 있어서는 4시간)이내에 여객에게 주지시켜야\n한다.\n*선원법 시행규칙 제7조 (선내비상훈련)", "id": 924}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 삭제", "answer": "2. 소방훈련, 구명정훈련 등 비상시에 대비한 훈련은 매월 1회 선장이 지정하는 일시에 실시하되, 여객선의\n경우에는 10일(국내항과 외국항을 운항하는 여객선은 7일)마다 실시하여야 한다.", "id": 925}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 삭제", "answer": "4. 선장은 당해선박의 해원 4분의 1 이상이 교체된 때에는 출항 후 24시간이내에 선내비상훈련을 실시하여야\n한다.\n5. 선장은 구명정 훈련시에 구명정을 순차적으로 사용하여야 하며, 가능한 24시간이내에 선내비상훈련을\n실시하여야 한다.", "id": 926}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "6. 법 제15조 제2항에 따른 비상신호의 방법은 기적 또는 싸이렌에 의한 연속 7회의 단음과 계속 1회의", "answer": "장음으로 한다.", "id": 927}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "7. 법 제15조 제2항에 따라 여객선의 선장은 다음 각 호의 사항을 안내방송 또는 동영상 등의 방법으로 선박의 출항 후 1시간(국제항해에 종사하는 여객선의 경우에는 4시간) 이내에 여객에게 안내하여야 한다.", "answer": "1) 승,하선 질서의 유지 등 여객안전을 위하여 필요한 사항\n2) 여객선의 구명설비, 소화기 등의 사용법\n3) 비상시 여객 행동요령\n4) 항해시간, 기상정보 및 입출항 예정시간\n5) 그 밖에 여객이 비상시에 대비하여 알아야 할 사항", "id": 928}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "53. 선원법과 선박직원법에 대하여 설명하시오.", "answer": "1) 선원법\n선원의 직무, 복무, 근로조건의 기준, 직업안정 및 교육, 훈련에 관한 사항을 정함으로써 선내 질서를 유지하고, 선원의 기본적 생활을 보장, 향상시키며 선원의 자질 향상을 도모함을 목적으로 한다.\n2) 선박직원법\n선박직원으로서 선박에 승무할 자의 자격을 정함으로써 선박항행의 안전을 도모함을 목적으로 한다.", "id": 929}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "선박직원법의 목적과 선박직원은 무엇인가?", "answer": "선박직원법 제1장 제1조 이 법은 선박직원으로서 선박에 승무(乘務)할 사람의 자격을 정함으로써 선박 항행의\n안전을 도모함을 목적으로 한다. 라고 명시되어 있다. \"선박직원\"이란 해기사(제10조의2에 따라 승무자격인정을 받은 외국의 해기사를 포함한다)로서 선박에서 선장·항해사·기관장·기관사·전자기관사·통신장·통신사·운항장 및\n운항사의 직무를 수행하는 사람을 말한다. \"해기사\"(海技士)란 제4조에 따른 면허를 받은 사람을 말한다.", "id": 930}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 선장의 직접지휘", "answer": "제9조(선장의 직접 지휘)\n①선장은 다음 각 호의 어느 하나에 해당하는 때에는 선박의 조종을 직접 지휘하여야 한다. <개정 2015. 1. 6.>", "id": 931}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 그 밖에 선박에 위험이 발생할 우려가 있는 때로서 해양수산부령으로 정하는 때", "answer": "② 선장은 제1항에 해당하는 때를 제외하고는 제60조 제3항에 따라 휴식을 취하는 시간에 1등항해사 등\n대통령령으로 정하는 직원에게 선박의 조종을 지휘하게 할 수 있다. <신설 2015. 1. 6.>\n계약서에 적힌 구체적인 숫자나 문구가 궁금하신가요? 해당 문장을 그대로 적어주시면 정확히 해석해 드릴 수 있습니다.", "id": 932}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "54. 선장이 입출항 시 항만 당국에 보고해야 할 사항", "answer": "1) 입항 시\n-1 선용품 또는 기용품의 목록,\n-2 여객명부,\n-3 승무원명부,\n-4 승무원 휴대품목록\n-5 적하목록\n-6 선박국적증서\n-7 출항면장\n2) 출항 시\n-1 출항 전 세관장에게 출항허가를 받아야 한다.\n-2 그 출항허가를 받으려면 그 개항에서 적재한 물품의 목록을 제출하여야 한다.", "id": 933}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "42. 선원법상 매달하는 훈련 종류를 설명하시오.", "answer": "1) 화재, 폭발훈련\n2) 퇴선훈련\n3) 침수훈련\n4) 기름유출사고훈련", "id": 934}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "55. 선장이 해운관청에 보고해야 하는 사항을 말하시오.", "answer": "*선원법 제21조(선박 운항에 관한 보고)\n선장은 다음 각 호의 어느 하나에 해당하는 경우에는 해양수산부령으로 정하는 바에 따라 지체 없이 그 사실을 해양항만관청에 보고하여야 한다. <개정2013.03.23>\n1. 선박의 충돌, 침몰, 멸실, 화재, 좌초, 기관의 손상 및 그 밖의 해양사고가 발생한 경우", "id": 935}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "7. 그 밖에 선박에서 중대한 사고가 일어난 경우", "answer": "*참고 - 선원법 제7조(출항 전의 검사,보고 의무 등)\n1. 선장은 해양수산부령으로 정하는 바에 따라 출항 전에 다음 각 호의 사항에 대하여 검사 또는 점검(이하 “\n검사 등”이라 한다)을 하여야 한다.\n1) 선박이 항해에 견딜 수 있는지 여부\n2) 선박에 화물이 실려 있는 상태\n3) 항해에 적합한 장비, 인원, 식료품, 연료 등의 구비 및 상태\n4) 그 밖에 선박의 안전운항을 위하여 해양수산부령으로 정하는 사항", "id": 936}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "56. 선원법 9조에 대해 설명하시오.", "answer": "*선원법 제9조 (선장의 직접 지휘)\n선장은 선박이 항구를 출입할 때나 좁은 수로를 지나갈 때 또는 그 밖에 선박에 위험이 생길 우려가 있을\n때에는 선박의 조종을 직접 지휘하여야 한다. 다만, 제60조 제3항에 따라 휴식을 취하는 시간에\n1등항해사 등 대통령령으로 정하는 직원에게 선박의 조종을 지휘하게 한 경우에는 그러하지 아니하다.\n선원법상 비상대응 훈련 종목 정리 훈련 주기에 따라 분류하면 관리하기 훨씬 수월합니다.", "id": 937}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 매월 실시 (가장 빈번한 필수 훈련)", "answer": "화재 및 폭발: 소화부서 배치\n퇴선: 퇴선부서 배치\n침수: 방수부서 배치\n기름유출 사고: 기름유출 방제부서 배치\n보안: 보안 관련 부서\n구조정 진수: 구조정 부서 배치", "id": 938}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 분기별 및 정기 실시 (2~6개월 주기)", "answer": "2개월 주기:\n밀폐구역 진입 및 구조 (밀폐구역 진입 및 구조 부서)\n3개월 주기:\n타기 고장 (비상조타부서)\n화물 누설 및 유독가스\n비상 예인 절차 (비상 예인 작업 부서)\n구명정 진수 (퇴선부서)\n4개월 주기:\n구명뗏목 Davit 진수 (퇴선부서)\n6개월 주기:\n구명정 Simulation 진수 (퇴선부서)\n발전기 Blackout (주기관 및 발전기 고장 시 부서)", "id": 939}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 매년 실시 (연간 1회 이상)", "answer": "익수자 발생/수색/구조: 수색 및 인명구조 부서\n환자 및 사망자 발생: 별도 부서 배치표 불요\n헬리콥터 운용: 헬기 운용 시 부서\n주기관 고장: 주기 및 발전기 고장 시 부서\n충돌 및 구조 손상: 충돌 시 부서\n좌초 및 과한 횡경사: 좌초 시 부서\n피격: 피격 결과에 따른 부서 배치", "id": 940}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 장기 주기", "answer": "18개월 주기: 육해상 합동 훈련", "id": 941}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "39. 선원법상 선장의 권한과 의무를 설명하시오.", "answe
