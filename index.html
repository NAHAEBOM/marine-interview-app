r": "* 권한 6가지\n1) 지휘명령권\n2) 수장권\n3) 해원의 징계권\n4) 위험물 등에 대한 조치권\n5) 행정기관에 대한 원조요청권\n6) 쟁위행위의 제한권\n* 직무 13가지\n1) 출항전의 검사,보고 의무\n2) 항로에 의한 항해\n3) 선장의 직접 지휘\n4) 재선의무\n5) 선박 충돌시의 조치\n6) 조난 선박의 구조\n7) 기상 이상 등의 통보\n8) 비상배치표 및 훈련\n9) 항해의 안전 확보\n10) 유류품의 처리\n11) 재외국민의 송환\n12) 서류의 비치\n13) 선박운항에 관한 보고", "id": 942}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "선원법상 선장의 권한 중 직접지휘권을 발휘하는 시점을 말하시오.", "answer": "1) 항구를 출입할 때\n2) 좁은 수로를 지나갈 때\n3) 선박의 충돌, 침몰 등 해양사고가 빈발하는 해역을 통과할 때\n4) 그 밖에 선박에 위험이 발생할 우려가 있는 때로서 해양수산부령으로 정하는 때", "id": 943}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "40. 선원법이 적용되지 아니한 선박을 설명하시오.", "answer": "1) 총톤수 5톤 미만의 선박\n2) 호수, 강 또는 항내만을 항해하는 선박\n3) 평수구역, 연해구역, 근해구역에서 어로 작업에 종사하는 총톤수 25톤 미만의 어선(운반선 포함)", "id": 944}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "41. 선원법상 훈련에 대해 설명하시오.", "answer": "선원법 제7조 선내비상훈련은 1화재, 2폭발훈련, 3퇴선훈련, 4침수훈련, 5기름유출사고훈련이 있으며 총톤수 500톤\n이상의 선박을 대상으로 한다. 다만, 평수구역을 항해구역으로 하는 선박은 제외한다. 매월 1회 선장이 지정하는\n일시에 실시하되, 여객선의 경우에는 10일(국내항과 외국항을 운항하는 여객선은 7일)마다 실시하여야 한다.\n여객선의 선장은 여객이 비상시에 대비할 수 있도록 비상신호의 위치, 구명기구의 비치 장소를 선내에 명시하고 피난 요령 등을 선내의 보기 쉬운 곳에 걸어두며 구명기구의 사용법 그 밖에 비상시에 대비하기 위하여 여객이 알고 있어야할 필요한 사항에 대하여 출항 후 1시간(국제 항해에 있어서는 4시간)이내에 여객에게 주지시켜야\n한다.\n*선원법 시행규칙 제7조 (선내비상훈련)", "id": 945}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 삭제", "answer": "2. 소방훈련, 구명정훈련 등 비상시에 대비한 훈련은 매월 1회 선장이 지정하는 일시에 실시하되, 여객선의\n경우에는 10일(국내항과 외국항을 운항하는 여객선은 7일)마다 실시하여야 한다.", "id": 946}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 삭제", "answer": "4. 선장은 당해선박의 해원 4분의 1 이상이 교체된 때에는 출항 후 24시간이내에 선내비상훈련을 실시하여야\n한다.\n5. 선장은 구명정 훈련시에 구명정을 순차적으로 사용하여야 하며, 가능한 24시간이내에 선내비상훈련을\n실시하여야 한다.", "id": 947}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "6. 법 제15조 제2항에 따른 비상신호의 방법은 기적 또는 싸이렌에 의한 연속 7회의 단음과 계속 1회의", "answer": "장음으로 한다.", "id": 948}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "7. 법 제15조 제2항에 따라 여객선의 선장은 다음 각 호의 사항을 안내방송 또는 동영상 등의 방법으로 선박의 출항 후 1시간(국제항해에 종사하는 여객선의 경우에는 4시간) 이내에 여객에게 안내하여야 한다.", "answer": "1) 승,하선 질서의 유지 등 여객안전을 위하여 필요한 사항\n2) 여객선의 구명설비, 소화기 등의 사용법\n3) 비상시 여객 행동요령\n4) 항해시간, 기상정보 및 입출항 예정시간\n5) 그 밖에 여객이 비상시에 대비하여 알아야 할 사항\n5-2. 해난심판원 구성요건?\n해양안전심판원은 서울에 중앙심판원을, 부산 인천 목포 동해 등 4개 주요 항구에 지방심판원을 두고 있다. 각 심판원의 조직은 조사관실, 심판관실 등 2실로 구성됐다. 조사관실은 해양사고의 조사 및 원인 규명, 해양사고 현장검증, 해양사고 통계 종합 및 분석, 해양사고 법규자료의 수집 및 해양사고 방지 업무 등을 담당한다. 심판관실은 제2심 사건의 심판과 대법원 소송 관련 업무, 증거물의 영치 및 재결서등본의 교부 등을 맡는다.\n주요 업무는 준사법적 절차에 따른 조사ㆍ심판을 통해 해양사고의 원인을 규명하는 한편, 해양사고 방지를 위한 제도개선이 필요하거나 과실행위가 인정되는 경우 시정개선 요청 또는 행정처분을 내릴 수 있다. 지방심판원이\n1심, 중앙심판원이 2심을 담당하며, 2심에 불복하면 대법원에 소를 제기할 수 있다. 해양사고 심판의 대상은 선박의 구조ㆍ설비 또는 운용과 관련해 사람이 사망ㆍ실종되거나 부상을 입은 사고, 선박이나 육상ㆍ해상시설에 손상이 생긴 사고, 선박이 멸실ㆍ유기되거나 행방불명된 사고, 선박의 충돌ㆍ좌초ㆍ침몰이 있거나 조종이 불가능하게 된 사고 등이다.\n선박평형수 관리(BWM) 핵심 요약본을 정리해 드립니다. 면접이나 업무 참고용으로 활용하시기 바랍니다.", "id": 949}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 선박평형수 관리계획서 (BWMP)", "answer": "모든 선박은 승인된 **BWMP(Ballast Water Management Plan)**를 비치하고 이행해야 합니다.\n주요 포함 내용:\n안전 절차: 평형수 관리 시 선박 및 선원의 안전 확보 방안.\n실행 지침: 협약 요건 이행을 위한 상세 행동 요령.\n침전물 관리: 항해 중 또는 육상 처분 시의 상세 절차.\n협의 절차: 연안국 수역 배출 시 해당 당사국과의 협의 방법.\n담당 사관 지정: 이행 보장을 위한 책임자(Ballast Water Management Officer) 지정.\n보고 요건: 당사국 및 기구에 대한 보고 의무 사항.\n언어: 본선 통용 언어로 작성 (영어, 프랑스어, 스페인어가 아닐 경우 번역본 비치).", "id": 950}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 평형수 기록부 (BWRB)", "answer": "평형수의 모든 이동과 작업 내용을 기록하는 법적 서류입니다.\n보관 기간: 본선에 최소 2년 보관, 이후 회사에서 최소 3년 추가 관리 (총 5년).\n기록 항목: 주입, 배출, 교환, 처리, 사고에 의한 비정상 배출 등.\n서명 주체: 각 항목은 담당 사관이 서명하고, 각 페이지 완료 시 **선장(Master)**이 서명.\n검사: 항만국 통제(PSC) 시 검사관은 기록부를 점검하고 복사본의 진본 확인을 요구할 수 있음\n선설치 시기: 2017년 9월 8일 이후 신조선은 즉시 D-2 준수.\n현성선은 정기검사(IOPP 갱신) 일정에 따라 순차적으로 BWTS 설치 완료.", "id": 951}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 평형수 교환(Exchange) 요건 및 방법", "answer": "D-1 기준에 따라 평형수를 교환할 때 준수해야 할 지리적 요건과 방법입니다.\n[지리적 요건]\n원칙: 육지로부터 200해리 이상, 수심 200미터 이상 수역.\n예외: 위 조건이 불가능할 경우, 최소 육지로부터 50해리 이상, 수심 200미터 이상 수역.\n[교환 방법 3가지]\nSequential (순차 방식): 탱크를 완전히 비우고 다시 채움.\n장점: 교환 효율(95% 이상)이 가장 확실함.\n단점: 복원성(GM), 선체 강도(BM/SF), 슬로싱(Sloshing) 등 안전상 위험 발생 가능.\nFlow-through (넘침 방식): 탱크 상부(벤트 등)로 물이 넘치게 계속 주입.\n요건: 탱크 용적의 3배 이상을 펌핑해야 함 (95% 교환 효율 달성 목적).\n장점: 수위 변화가 없어 복원성 영향이 적음.\nDilution (희석 방식): 상부로 주입하면서 동시에 하부로 같은 양을 배출.\n특징: 일정한 수위를 유지하며 3배 이상 주입. 수위 조절이 까다로움.", "id": 952}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. 평형수 관리 시 고려해야 할 안전 요소", "answer": "평형수 작업(교환 및 처리) 시 선장은 반드시 다음 사항을 확인해야 합니다.\n복원성 및 강도: 안정적인 GM 유지 및 허용치 이내의 BM/SF 관리.\n기상 상황: 악천후 시 선장의 판단하에 교환을 중지할 수 있으며, 이 경우 사유를 BWRB에 기록해야 함.\n선체 진동: 대용량 펌프 사용 시 진동 유의.\n수심 및 흘수: 프로펠러 잠김(Immersion) 및 선수 슬래밍 방지를 위한 적절한 트림 유지.\n2024년 9월 8일을 기점으로 국제 항해를 하는 거의 모든 기존 선박들은 D-1(평형수 교환) 단독 방식은 더 이상 사용할 수 없게 되었습니다.\n현재 상황을 단계별로 명확히 정리해 드릴게요.", "id": 953}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. D-1 방식의 종료 (D-2로의 전면 전환)", "answer": "선박평형수 관리 협약(BWM Convention)에 따라, 모든 선박은 정기검사(IOPP 갱신 검사) 시점과 연계하여 D-2(평형수 처리장치 설치) 기준을 충족해야 했습니다.\n신조선: 2017년 9월 8일 이후 건조된 배는 처음부터 D-2를 준수(장치 설치)해야 했습니다.\n현성선(기존선): 2024년 9월 8일까지 모든 선박이 BWTS 설치를 완료해야 했으므로, 지금 시점(2026년)에서는 사실상 모든 국제 항해 선박이 D-2 기준을 적용받고 있습니다.", "id": 954}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. D-1(교환)은 완전히 사라진 것인가요?", "answer": "아닙니다. 법적으로 '단독' 사용은 불가하지만, 다음과 같은 상황에서는 여전히 D-1과 관련된 절차가 필요하거나 병행됩니다.\nBWTS 고장 시 비상 조치: 처리장치(BWTS)가 고장 났을 경우, 항만국(PSC)의 승인하에 예외적으로 D-1(교환)을 실시한 후 입항을 허가받는 경우가 있습니다.\n추가적인 지역 규정: 특정 국가(예: 미국 일부 주 또는 호주 등)는 생태계 보호를 위해 D-2(처리)를 거친 물이라도 외해에서 D-1(교환)을 병행할 것을 요구하기도 합니다.\nBWMP(관리계획서) 비치: 장치를 쓰더라도 비상시를 대비해 BWMP에는 여전히 D-1 방식과 교환 구역에 대한 내용이 포함되어 있어야 합니다.", "id": 955}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 요약: 현재의 기준", "answer": "이제 선박은 평형수를 배출할 때 반드시 승인된 BWTS를 거쳐 미생물 개체 수를 기준치 이하로 떨어뜨려야 합니다.\n과거: \"깨끗한 먼 바다 물로 갈아 끼우자\" (D-1)\n현재: \"장치로 살균해서 배출하자\" (D-2)", "id": 956}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. 발라스트 익스체인지 3가지", "answer": "1) flow-through\nA. 방식: 맨홀이나 에어벤트를 통하여 평형수가 넘쳐흐르도록 하는 overflow 방식을 이용하여 평형수를 교체하는 방식이다. BWTK내로 B.W를 주입하여 기존의 물이 탱크 밖으로 넘쳐 흘러나가게 하는 방법이다. 평형수를 교체한 탱크 용적의 3배 이상의 평형수가 주입되어 교체되었다는 사실을 확인할 수 있도록 기록으로 남겨야 한다.\n(ex. 발전기 용량 기록, 발라스트 펌프 용량, Log book에 위치와 시간 기록 등)\nB. 장점: 1탱크 용적의 3배되는 물의 용량을 계산하고, 해당 시간만큼 펌프를 기동 시키기만 하면 된다. 또한\nEmpty refill 방식과 비교하였을 때, 2선박의 SF, BM 등 복원력 등에도 크게 영향을 미치지 않는다.\nC. 단점: 1Empty refill 방식보다 비교적 시간이 오래 걸리고, 2주입량에 비해 배출량이 적을 경우 탱크내의 수압이 크게 작용할 수 있으므로 선외로 배출되는 양이 충분할 수 있도록 맨홀과 벤트를 충분히 개방하여야 한다.\n2) Sequential Method (Empty Refil)\nA. 방식: BWTK의 물을 비운 다음, 최소 95% 체적 교환을 달성 할 수 있도록 평형수를 다시 채우는 방법이다.\nB. 장점: 1가장 확실하게 평형수를 교체할 수 있는 방법이다.\nC. 단점: 탱크를 온전히 비워야 하므로 1선박의 복원력, SF, BM에 굉장히 큰 부담을 준다. 또한 2프로펠러 잠김,\n트림 변화 등 운항과 관련된 사항에 대한 확인 및 계획이 필요하다.\n3) Dilution Method\nA. 방식: 발라스트수 적재를 목적으로 사용되는 발라스트 탱크의 상부의 주입관을 통하여 평형수를 채우면서\n동시에 선저에 배출구를 통하여 같은 유량을 펌프를 이용하여 선외로 배출하는 것으로 평형수 교환을 실행하는 동안 일정한 수위를 유지하면서 탱크 용적의 3배 이상의 평형수를 주입하여 평형수를 교환하는 방식\nB. 장점: Empty refill 방식과 비교하였을 때, 선박의 SF, BM 등 복원력 등에도 크게 영향을 미치지 않는다.\nC. 단점: Empty refill 방식보다 비교적 시간이 오래 걸리고, 주입량과 배출량을 정확하게 유지하기가 다소 까다롭다.\n💡 선박평형수 관리 시스템(BWTS) 요약\n1. 관련 규정 및 운영 원칙규정 준수: 제B-3규칙에 적합한 시스템은 제D-3규칙에 따라 승인(Type Approval)을 받아야 합니다.운영 기준: 제조사의 운전 및 정비 지침서에 따라 작동해야 하며, **선박평형수 관리계획서(BWMP)**에 상세 내용이 수록되어야 합니다.기록 유지: 모든 오작동 및 고장 사례는 **평형수 기록부(BWRB)**에 엄격히 기록되어야 합니다.", "id": 957}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 주요 처리 방식별 특징 (인증된 방법)BWTS는 크게 기계적, 화학적, 물리적 세 가지 방식으로 나뉩니다.", "answer": "[1] 기계적 처리 방식 (Mechanical System)\n물리적인 힘이나 필터를 사용하여 입자가 큰 유기물이나 퇴적물을 먼저 걸러내는 방식입니다.\n-여과식 (Filtration): 디스크나 스크린 필터를 이용해 20~100 $\\mu m$ 크기의 입자를 제거합니다.\n-사이클론 -분리식 (Cyclonic Separation): 원심력을 이용하여 물보다 무거운 고체 입자를 분리합니다.\n-전기-기계 분리식 (Electro-mechanical): 응집제를 투여해 미생물을 덩어리로 만든 후, 자기 분리나 여과를 통해 제거합니다.\n[2] 화학적 처리 방식 (Chemical Treatment)\n화학 물질의 산화력을 이용하여 미생물을 살균하는 방식입니다.\n-살균제 주입 (Disinfecting Biocides): 소독 작용이 있는 화학 약품을 직접 투여하며, 대용량 처리에 유리합니다.\n-전해 염소화 (Electrolytic Chlorination): 평형수를 전기 분해하여 발생하는 염소(Cl2) 성분으로 미생물을 살균합니다. 가장 대중적인 방식 중 하나입니다.\n[3] 물리적 소독 방식 (Physical Disinfection)\n약품 없이 물리적인 에너지를 가해 미생물을 불활성화(Inactivation)하는 방식입니다.\n-UV 라이트 (UV Light): 자외선을 조사하여 미생물의 세포막을 파괴하고 DNA 구조를 변형시켜 증식을 막습니다.\n-캐비테이션/초음파 (Cavitation/Ultrasound): 초음파나 벤추리 관으로 기포를 생성·파열시킬 때 발생하는 높은 에너지로 미생물을 파괴합니다.\n-탈산소화 (Deoxygenation): 평형수 내의 용존 산소를 질소 등 비활성 가스로 교체하여 호기성 생물을 사멸시킵니다. (부식 방지 효과 겸비)", "id": 958}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 평형수 처리장치 그리고 자기가 탄 배에서 어떻게처리했는지", "answer": "선박평형수처리장치, Ballast Water Treatment System\n선박의 평형수 이동에 따른 해양생태계 파괴와 교란을 방지하기 위해 선박 평형수에 포함된 유해 수상생물과\n병원균을 제거, 무해화 또는 그 유입이나 배출을 방지하기 위한 장치나 설비를 말한다.\n국제해사기구에서는 유해 수생 생물과 병원균의 이동으로 발생하는 환경, 인간건강, 재산 및 자원에 대한\n위험 방지 및 최소화의 필요성을 위해 2004년 선박평형수관리협약을 채택하여 BWTS의 장착을 의무화 하였다.\n*승선 선박: 전기분해 방식\n1) ECU\n바닷물을 끌어올릴 때 바닷물에 전기를 가해서 하이포아염소산(HCIO)을 만든다. 이 염소 산은 미생물을 죽이는 역할을 한다. 기계가 작동할 때 TRO수치와 연동해서 작동하며 만약 TRO 수치가 낮다면 더 많은 전기를 주어지게 된다, 즉 더 많은 부하가 걸리기 때문에 약품이 불량이거나 유통기한이 지났을 경우 ECU에 무리가 갈 수 있다.\n2) TSU\n하이포아염소산의 수치를 읽어준다.\nBALLAST: 5 ppm < X < 11 ppm\nDE-BALLAST: X < 0.1 ppm\na 약품(CLX) 유효기간이 지나면 TRO 값을 제대로 읽지 못하게 된다. 즉, BALLAST MODE 로 미생물 처리 작업을 할 때 (ECU), 차아염소산(TRO)를 확인을 해야 한다. 이 수치는 약품을 통해서 알 수 있다. 하지만 약품이 성능이 떨어지면 TRO 값을 제대로 읽지 못하게 되고 기준 수치값(TRO=6~7(국제적으로 정해진 값)까지 올라가지 않게 되어 이 값을 만족 시켜주기 위해 ECU에 부하가 많이 걸리게 된다. 이 문제점으로 인해 CURRENT 값이 올라가게 될 것이며 결국 ALARM 이 발생할 수 있다. 보통은 SHUT DOWN이 되어 ECU에 무리가 가는 것을 방지해준다. (ALARM: TRO VALUE) (차아염소산: 산성을 띄며 미생물을 죽이는 화학성분이다.)\nb 약품 유효기간은 사용 순간부터 2.3개월. (하지만 계속 사용해도 됨. 수리엔지니어 전언)\nc 약품 유효기간이 지날 경우 색깔이 변색이 일어난다. (진한 갈색)\n3) ANU\n전기적 작용을 통해 BALLAST된 평형수 안에는 염소산이 그대로 유지하고 있다. 따라서 이 평형수를 바로 바다로 배출 시, 그 지역에 사는 미생물도 죽을 수 있기 때문에 이를 방지하기 위해 ANU는 평형수를 중성으로 만드는 역할을 한다.\nHCIO, CIO- + Na2S2O3 = 4H2O + Etc (Na2S2O3: SODIUM TRIOSULFATE)\nCAUTION\n① ANU의 TANK 사용은 Left Tank 먼저 사용 후 Right Tank 를 사용된다.\nLeft Tank 거의 소모 -> 자동적으로 Right Tank가 사용 -> 자동적으로 Left Tank 에 물이 보충 -> Left Tank Full Alarm 발생 -> ESC 버튼 누른다 -> Left Tank에 중화제 (2 pack) 넣어준다. -> F1 버튼을 누른다. -> 자동으로 Mixing 기가 돌아간다. (35분) -> 35분 후에 Left Tank 준비완료가 된다.\nRight Tank 소모가 다 되면 위와 같이 똑같이 흘러간다.\n② ANU에서 Left, Right Tank 선택 사용이 불가하다.\n③ 중화제를 넣고 Mixing 기기가 돌아가는 시간을 줄 일 수는 있지만, 그 과정을 거치지 않고서 Ready 상태를 만들 수는 없다.", "id": 959}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. BWTS 작동원리, 직접식/간접식 차이", "answer": "(치아염소산 농도 국제기준/본선 장비 기준치)\n선박평형수처리장치, Ballast Water Treatment System\n선박의 평형수 이동에 따른 해양생태계 파괴와 교란을 방지하기 위해 선박 평형수에 포함된 유해 수상생물과\n병원균을 제거, 무해화 또는 그 유입이나 배출을 방지하기 위한 장치나 설비를 말한다.\n국제해사기구에서는 유해 수생 생물과 병원균의 이동으로 발생하는 환경, 인간건강, 재산 및 자원에 대한\n위험 방지 및 최소화의 필요성을 위해 2004년 선박평형수관리협약을 채택하여 BWTS의 장착을 의무화 하였다.\n1) Mechanical System, 기계 처리식\n○1Filtration, 여과식\n- Sediment and particles removal by disc and screen filters\n디스크 및 스크린 필터에 의한 침전물 및 입자 제거\n- Parallel assembly of many filter units\n많은 필터 장치의 병렬 조립\n- Filtration grade down to 100/50/20 Qm\n100/50/20 Qm까지 여과 등급\n○2Cyclonic Separation, 사이클론 분리식\n- Separation of solid particles due to centrifugal forces\n원심력으로 인한 고체 입자 분리\n- Acceleration of the water by internal flow direction inside the facility\n시설 내부의 내부 흐름 방향으로 물의 가속\n○3Electro-mechanical separation, 전기-기계 분리식\n- A flocculent is injected that attaches to organisms and sediment.\n유기물과 퇴적물에 부착되는 응집제가 주입됨\n- Magnetic separation and filtration is used to remove the solid particles\n자기 분리 및 여과는 고체 입자를 제거하는 데 사용 됨\n2) Chemical Treatment, 화학 처리식\n○1Disinfecting Biocides, 살균제 살균\n- Direct adding of chemical additives to the BW having disinfecting actions\n소독 작용이 있는 화학 첨가제를 BW에 첨가\n- Applicable for large volumes\n대용량에 적용 가능\n○2Electrolytic Chlorination, 전해 염소화\n- Electronically ionization by means of electrical current\n전류에 의한 전자 이온화\n- Generation of Chlorine/Chlorine Dioxide as disinfection\n소독제로 염소/이산화 염소 생성\n3) Physical Disinfection, 물리적 소독식\n○1UV Light, UV 라이트식\n432\n- Inactivation of organisms and pathogens by breaking the cell membrane\n세포막을 파괴하여 유기체 및 병원체의 불활성화\n- Low pressure drop in water system\n수계의 저압 강하\n○2Cavitation/Ultrasound, 캐비테이션/초음파식\n- Silt plates or venture pipes generate cavitation bubbles\nSilt plates 또는 venture pipes 로 버블을 생성\n- High local energy due to implosion of bubbles inactivate organisms\n기포 파열로 인한 높은 국부적 에너지가 유기체를 불활성화 시킴\n○3Deoxygenation, 탈 산소화식\n- Removal of dissoloved oxygen in Ballast Water and replacement by inactive gases\nBW에서 용해되지 않는 산소 제거 및 비활성 가스로 대체\n4) 치아염소산 농도 국제기준 및 본선장비\n가) BALLAST시: 5 ppm < X < 11 ppm (Average 6~10mg/L, Target TRO 7.5mg/L)\n나) DE-BALLAST시: (IMO) TRO less than 0.2mg/L after neutralization before discharging\n(USCG) TRO less than 0.1mg/L after neutralization before discharging", "id": 960}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 선원의 징계", "answer": "제22조(해원의 징계)\n① 선장은 해원이 다음 각 호의 어느 하나에 해당할 경우에는 해원을 징계할 수 있다.", "id": 961}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 선장의 허가 없이 선박을 떠났을 경우", "answer": "3. 선장의 허가 없이 흉기나 「마약류 불법거래 방지에 관한 특례법」 제2조 제1항에 따른 마약류를 선박에\n들여왔을 경우\n4. 선내에서 싸움, 폭행, 음주, 소란행위를 하거나 고의로 시설물을 파손하였을 경우", "id": 962}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "6. 정당한 사유 없이 선장이 지정한 시간까지 선박에 승선하지 아니하였을 경우", "answer": "7. 그 밖에 선내 질서를 어지럽히는 행위로서 단체협약, 취업규칙 또는 선원근로계약에서 금지하는 행위를\n하였을 경우\n② 징계는 훈계, 상륙금지 및 하선으로 하며, 상륙금지는 정박 중에 10일 이내로 한다.\n③ 제2항에 따른 하선의 징계는 해원이 폭력행위 등으로 선내 질서를 어지럽히거나 고의로 선박 운항에 현저한 지장을 준 행위가 명백한 경우에만 하여야 한다. 이 경우 선장은 지체 없이 선박소유자에게 하선의 징계를 한\n사실을 알려야 한다.\n④ 선장은 해원을 징계할 경우에는 미리 5명(해원 수가 10명 이내인 경우에는 3명) 이상의 해원으로 구성되는\n징계위원회의 의결을 거쳐야 한다.\n⑤ 제4항에 따른 징계위원회의 구성 및 운영 등에 필요한 사항은 해양수산부령으로 정한다. <개정 2013. 3. 23.>", "id": 963}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 선박 입출항 항법을 따르지 않아도 되는 선박", "answer": "*선박의 입항 및 출항 등에 관한 법률\n제3장 항로 및 항법\n제10조(항로 지정 및 준수)\n① 관리청은 무역항의 수상구역등에서 선박교통의 안전을 위하여 필요한 경우에는 무역항과 무역항의 수상구역 밖의 수로를 항로로 지정ㆍ고시할 수 있다. <개정 2020. 2. 18.>\n② 우선피항선 외의 선박은 무역항의 수상구역등에 출입하는 경우 또는 무역항의 수상구역등을 통과하는 경우에는 제1항에 따라 지정ㆍ고시된 항로를 따라 항행하여야 한다. 다만, 해양사고를 피하기 위한 경우 등 해양수산부령으로 정하는 사유가 있는 경우에는 그러하지 아니하다.\n제1장 총칙\n제2조(정의)", "id": 964}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. “우선피항선”(優先避航船)이란 주로 무역항의 수상구역에서 운항하는 선박으로서 다른 선박의 진로를 피하여야 하는 다음 각 목의 선박을 말한다.", "answer": "가. 「선박법」 제1조의2제1항제3호에 따른 부선(艀船)[예인선이 부선을 끌거나 밀고 있는 경우의 예인선 및 부선을 포함하되, 예인선에 결합되어 운항하는 압항부선(押航艀船)은 제외한다]\n나. 주로 노와 삿대로 운전하는 선박\n다. 예선\n라. 「항만운송사업법」 제26조의3제1항에 따라 항만운송관련사업을 등록한 자가 소유한 선박\n마. 「해양환경관리법」 제70조제1항에 따라 해양환경관리업을 등록한 자가 소유한 선박 또는 「해양폐기물 및 해양오염퇴적물 관리법」 제19조제1항에 따라 해양폐기물관리업을 등록한 자가 소유한 선박(폐기물해양배출업으로 등록한 선박은 제외한다)\n바. 가목부터 마목까지의 규정에 해당하지 아니하는 총톤수 20톤 미만의 선박\n선박의 입항 및 출항 등에 관한 법률 시행규칙\n제6조(정박지의 지정 신청)\n① 영 제6조제1항에 따른 정박지의 지정 신청서는 「항만법 시행령」 제44조제1항에 따른 항만시설 사용허가신청서에 따른다. <개정 2020.7.30>\n② 법 제5조제2항 단서에서 \"해양수산부령으로 정하는 사유\"란 다음 각 호의 경우를 말한다.\n1. 「해양사고의 조사 및 심판에 관한 법률」 제2조제1호에 따른 해양사고를 피하기 위한 경우", "id": 965}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 해양오염 등의 발생 또는 확산을 방지하기 위한 경우", "answer": "5. 그 밖에 선박의 안전운항을 위하여 지방해양수산청장 또는 시ㆍ도지사가 필요하다고 인정하는 경우", "id": 966}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 우선피항선 정의 및 종류", "answer": "*선박의 입항 및 출항 등에 관한 법률\n제2조 정의", "id": 967}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "5. \"우선피항선\"(優先避航船)이란 주로 무역항의 수상구역에서 운항하는 선박으로서 다른 선박의 진로를 피하여야 하는 다음 각 목의 선박을 말한다.", "answer": "가. 「선박법」 제1조의2 제1항 제3호에 따른 부선(艀船)[예인선이 부선을 끌거나 밀고 있는 경우의 예인선 및\n부선을 포함하되, 예인선에 결합되어 운항하는 압항부선(押航艀船)은 제외한다]\n나. 주로 노와 삿대로 운전하는 선박\n다. 예선\n라. 「항만운송사업법」 제26조의3 제1항에 따라 항만운송관련사업을 등록한 자가 소유한 선박\n마. 「해양환경관리법」 제70조 제1항에 따라 해양환경관리업을 등록한 자가 소유한 선박(폐기물해양배출업으로\n등록한 선박은 제외한다)\n바. 가목부터 마목까지의 규정에 해당하지 아니하는 총톤수 20톤 미만의 선박\n77. 해양법에 관한 국제연합협약(UNCLOS, United Nations Convention on the Law of the sea 1982)\n해양에 관련된 분쟁, 환경오염, 영해에 대한 것들을 지정하고 있는 UN에서 관여하고 있는 법률이다. 영해, 접속수역, 대륙붕, 공해 및 심해저 등 해양의 모든 영역을 포함하고 해양환경, 해양환경조사, 해양기술이전 등을 내용으로 전부 17장 320조 및 9개 부속서로 구성되어 1982년 4월 30일에 체결되고, 1994년 11월 16일에 발효된\n인류 역사상 가장 방대한 협약이다. 이 협약을 근거로 12해리 영해제도 및 배타적경제수역 제도를 확립하였으며, 공해 심해저자원의 무분별한 개발을 방지하기 위한 국제해저기구 및 해양분쟁의 해결을 위한 국제해양법재판소 등도 설립되었다. 해양에서의 기득권을 고수하려는 선진국과 해양이 인류공동유산임을 주장하는 개도국간의\n논의를 배경으로 탄생되었다. 우리나라를 포함하여 102개국이 비준을 마쳤다. 미국의 경우 협약에 가입하지 않고 1977년 제정된 이른바 200해리 법, 즉 어업보존관리법에서 영해 등과 관련하여 협약과 유사한 사항을 규정하고 있다.", "id": 968}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 영해, territorial sea", "answer": "영해기선으로부터 일정한 범위에 이르는 해역으로 국제법에 정해진 조건에 따라 연안국이 영토 관할권에 준하는\n권한을 행사하고 외국선박에 대하여는 무해통항권이 인정되는 수역이다. 모든 국가는 결정된 기선으로부터 12해\n리를 초과하지 아니하는 범위 안에서 기선 위의 가장 가까운 점으로부터 거리가 동일한 모든 점을 연결한 외측\n한계까지 영해의 폭을 설정할 권리를 갖는다.", "id": 969}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 영해선", "answer": "영해의 한계선. 영해를 규정짓는 선이다.", "id": 970}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 영해기선, ,baseline of the territorial sea (해안선의 기준을 설명하시오)", "answer": "영해기준선이라고도 하며, 국가의 주권이 미치는 범위를 결정하기 때문에 매우 중요하나 해안선의 모습이\n일정하지 않고 매우 다양하기 때문에 일률적으로 제기하기 어렵다. 원칙적으로는 해안의 저조선을 기준으로 하는 통상기선이 적용되나, 예외적으로 해안선의 굴곡이 현저하거나 해안에 근접하여 일련의 도서가 있는 지역 등의 경우 적절한 지점을 연결한 직선을 기준으로 사용하는 직선기선이 적용된다. 우리나라는 동해안에 4점, 남해안에 9점, 황해안에 10점이 있다.", "id": 971}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "79. 접속수역은 어디이며 몇 해리까지인가?", "answer": "기선(해안의 저조선)으로부터 측정하여 그 바깥쪽 24해리의 선까지에 이르는 수역에서 대한민국의 영해를 제외한\n수역이다.", "id": 972}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "81. 해상법상의 물적 손해의 책임제한 사항들을 설명하시오.", "answer": "1. 선장, 해원, 도선사, 기타의 선박사용인의 고의 또는 과실로 인하여 제3자에게 가한 손해배상\n2. 운송하기 위하여 선장에게 인도된 운송물 또는 그 선박에 있는 모든 물건에 대한 손해배상", "id": 973}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "4. 운송계약이행 중의 항해과실로 인한 채무", "answer": "55", "id": 974}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "7. 공동해손에 관한 선박소유자의 분담채무", "answer": "8. 선장이 선적항 위에서 선박보존 또는 항해계속의 현실적 필요로 그 법정권한에 의하여 체결한 계약 또는 처분 행위로 인하여 생긴 채무", "id": 975}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "76. 검역조사(법 제12조, 시행규칙 제6조) (무선검역시 필요한 3가지는?)", "answer": "세가지로 나눌수 있다.\n1) 검역조사에 필요한 서류 등\n2) 선박에 대한 조사\n3) 승무원·승객에 대한 검역조사\n가. 검역조사에 필요한 서류 등\n1) 선장 또는 그 승객 및 승무원은 검역조사에 필요한 다음의 제출서류를 도착한 후 즉시 검역소장에게 제출하여야 한다.\n가) [별지 제5호 서식]에 따른 ｢선박 보건상태신고서｣(선장이 제출)\n나) [별지 제8호 서식]에 따른 ｢승무원 및 승객 명부｣(선장이 제출)\n다) 다음의 어느 하나에 해당하는 선박의 승객 및 승무원의 [별지 제9호 서식]에따른 ｢건강상태질문서｣(선장 또는 승객 및 승무원이 제출). 다만, 선의(船醫)가있는 경우는 생략할 수 있다.\n2) 선장 또는 그 승객 및 승무원은 검역조사에 필요한 다음의 제시서류를 도착한 후 즉시 검역소장에게 제시하여야 한다.\n가) 항해일지(선장이 제시)\n나) 선박위생관리(면제)증명서(선장이 제시)\n다) 그 밖에 검역소장이 검역조사를 위하여 요구하는 서류\n3) 검역소장은 선장 또는 그 승객 및 승무원에게 검역조사에 필요한 서류를 제출하거나 제시하도록 요구할 수 있으며, 검역조사에 필요한 사항을 질문할 수 있다\n4) 검역소장은 다음의 사항에 대하여 [별지 제5호 서식]에 따른 ｢선박 보건상태신고서｣의 검역조사서에 기재한다.\n가) 보건·위생상태 신고 현황\n나) 선박의 위생상태 점검 사항\n① 감염병 매개체 서식 여부\n② 식품 보관 및 조리실 청결상태\n③ 감염병 병원체에 오염(의심)된 적재화물\n다) 발열감시 및 건강상태 질문서 제출 사항\n① 발열감시 결과 이상 유무\n② 건강상태 질문서 제출\n라) 검체 채취\n마) 검역조사 결과\n바) 검역조사 일시\n5) 검역조사 준비물\n가) 검체채취 및 위생검사용 물품： 수송배지, 카메라, 손전등, 샘플컵 등\n나) 승무원·승객조사용 물품： 체온계, 면봉, 의료용 장갑 등\n다) 검역관련 서류： 선박 보건상태 신고서(검역조사서), 건강상태질문서,소독시행명령서 등\n나. 선박에 대한 조사\n[별지 제5호 서식]에 따른 ｢선박 보건상태신고서｣에 의한 분야별 점검 및 조사\n1) 감염병 매개체 서식 여부 등에 대한 점검\n가) 대상 : 검역감염병이 국내에 오염될 우려가 있다고 인정되어 검역 장소에서 법 제12조에 따른 검역조사를 받아야 하는 선박\n나) 점검내용 : 감염병 매개체의 서식 유무와 번식 상태에 대한 점검은 관능검사 위주로 실시\n2) 선박의 식품 보관 상태 및 조리실 청결 상태 등에 대한 점검\n가) 대상 : 검역감염병이 국내에 오염될 우려가 있다고 인정되어 검역 장소에서 법 제12조에 따른 검역조사를 받아야 하는 선박\n나) 점검내용\n① 식품은 청결도, 보관 온도, 유효 기간 등 오염 여부를 조사하고 식품보관 상태 점검은 관능검사 위주로 실시\n② 조리실 및 화장실 등 청결 상태에 대한 점검은 관능검사 위주로 실시\n③ 음식물은 위생적으로 취급하고 관리하도록 조리원의 위생개념 등을 지도\n3) 적재화물 감염병 병원체에 오염(의심) 상태 등에 대한 점검\n가) 대상 : 검역감염병이 국내에 오염될 우려가 있다고 인정되어 검역 장소에서 법 제12조에 따른 검역조사를 받아야 하는 선박\n나) 점검내용 : 적재 화물의 실린 상태 등에 대한 점검은 관능검사 위주로 실시\n4) 선박의 검체채취 및 검사\n가) 기간 : 연중\n* 우리나라 및 콜레라 오염지역의 계절을 고려하여 하절기(6∼8월)에 해당하는 시기에는 검체 채취 강화\n나) 검체 채취 대상 선박\n다음의 기준을 참고하여 검역소장이 분기별 1회 이상 채취 대상 선박을 1차적으로 선정한 후 검역관이 현장에서 선박 내 위생 상태 등을 종합적으로 고려하여 검체 채취 여부 결정\n① 콜레라 오염지역에서 최종 출항한 선박으로서 콜레라 감시기간 이내에 입항하는 선박\n② 최근 3개월 이내 입항 선박 내 감염병원균 검출현황\n③ 최근 3개월 이내 입항 선박 내 수인성 감염병 환자 등 발생현황\n④ 선박의 종류(화물선, 여객선 등) 및 선박 내 전반적인 위생상태\n⑤ 해외 수인성 감염병 발생 동향\n⑥ 기타 검역소장이 필요하다고 인정하는 기준\n다) 채취 건수 : 화장실 개수 등을 고려하여 1∼3건 채취\n라) 채취 장소 : 검역관이 위생상태 확인 후 검체채취가 필요한 곳(예 : 변기오수, 주방오수 등)\n마) 검사항목 등\n① 콜레라균(O1 또는 O139), 장티푸스균, 파라티푸스균, 세균성이질균, 장출혈성대장균, 장염비브리오균, 비브리오패혈증균 등\n② 해당 검역소에서는 검체에 대한 검사를 즉시 실시하고, 세균확인 동정을 위해 냉장(또는 실온) 보관하여 지역거점 검사센터에 검사 의뢰\n③ 검사 의뢰를 받은 지역거점 검사센터는 검사 결과를 의뢰한 검역소에 통보\n* 검체채취 및 검사기준에 대한 구체적인 내용은「장내세균 진단 실무 지침」을 참고\n다. 승무원·승객에 대한 검역조사\n1) 발열감시\n가) 대상 : 검역감염병 등의 국내유입을 방지하기 위하여 검역소장이 발열감시가 필요하다고 인정하는 승무원 및 승객\n나) 방법\n① 열감지카메라 등을 이용한 체온 측정으로 발열자(38℃이상) 색출\n② 건강상태질문서 증상표시자 중 필요한 경우 귓속체온계를 이용한 체온 측정\n2) 검체 채취 및 검사\n가) 검체 채취 대상\n① 건강상태질문서에 설사 등의 증상 표시를 한 승객·승무원 중 필요한 경우\n② 설사 등의 증상을 신고한 승객·승무원 중 필요한 경우\n③ 38℃ 이상의 발열자 중 필요한 경우\n※ 발열자 판단의 기준온도는 각 감염병의 대응지침에 따른다.\n④ 검역소에서 검체 채취가 가능한 경우로써 검역감염병의 발생이 의심되는 사람에 대한 검역감염병의 감염 여부 확인이 필요한 경우\n나) 검체 채취 및 방법\n① 검체 채취\n⋅설사 증상자 : 직장도말 또는 채변\n⋅38℃ 발열자 : 인후(상기도)도말 또는 객담\n* [붙임 제4호 서식]에 따른 ｢유증상자 조사표｣에 따라 조사, 검체 체취 시 [붙임 제5호 서식]에 따른 개인정보 처리 및 제공 동의서 징구\n② 검체는 즉시 검사를 실시하고 38℃ 발열자의 인후도말 또는 객담 검체는 냉장(또는 실온) 보관하여 지역거점 검사센터에 검사 의뢰\n③ 검사를 의뢰받은 지역거점 검사센터는 검사 결과를 의뢰한 검역소에 통보\n다) 검사항목 등\n① 세균검사 : 콜레라균(O1 또는 O139), 장티푸스균, 파라티푸스균, 세균성이질균, 장출혈성대장균, 장염비브리오균, 비브리오패혈증균 등\n② 바이러스 검사 : 조류인플루엔자 바이러스, 사스코로나바이러스, 신종인플루엔자바이러스, 급성호흡기바이러스 등(지역거점검사센터에 국한)\n결원 발생 시에 승무기준의 특례 및 선박소유자/해양수산부가 결원에 대해여 취할 수 있는 조치", "id": 976}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "1. 승무기준의 특례 (자동 유예 또는 한시적 인정)", "answer": "원칙적으로 승무기준을 채우지 못한 선박은 항해할 수 없지만, 예상치 못한 정당한 사유로 결원이 생겼을 때는 예외적으로 다음 항구까지 항해를 허용합니다.\n항해 중 결원 발생: 선박이 항해하는 도중에 선원이 사망하거나 부상을 당해 하선하는 등 불가피한 사유로 결원이 생긴 경우, 다음 목적항(첫 번째 기항지)에 도착할 때까지는 승무기준을 충족한 것으로 인정합니다.\n외국 항구에서의 결원 발생: 국내가 아닌 외국 항구에서 결원이 생겨 즉시 충족하기가 현실적으로 불가능한 경우에도, 해당 선박의 안전 운항에 지장이 없다고 판단되면 다음 기항지 또는 선원을 충원할 수 있는 항구까지 법적 승무기준의 예외(특례)를 인정받아 항해할 수 있습니다.", "id": 977}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "2. 선박소유자가 취할 수 있는 조치", "answer": "선박소유자는 결원이 발생한 상태로 계속 운항해서는 안 되며, 안전 확보를 위해 즉시 보충하거나 행정적 승인을 받아야 합니다.\n즉시 충원 및 예비원 투입: 가장 기본적이고 최우선적인 조치입니다. 국내외 기항지에서 대기 중인 예비 선원이나 교대 요원을 급파하여 결원을 채워야 합니다.\n승무 자격 특례 인정 신청 (면허 대무): 만약 특정 전문 직책(예: 1등항해사, 기관장 등)에 결원이 생겼는데 당장 동일 면허 소지자를 구하기 어렵다면, 하위 자격 소지자가 상위 직책을 임시로 대행할 수 있도록 지방해양수산청에 ‘승무 자격 특례(직무대행)’를 신청하여 승인을 받아야 합니다.\n감항성(안전 운항 능력) 재평가 요청: 선박의 운항 스케줄과 안전을 고려해 최소 인원으로도 안전 항해가 가능한지 선박검사기관이나 해수부에 확인을 요청하고 지침을 받습니다.", "id": 978}, {"category": "개정 2013. 3. 23., 2014. 5. 14.", "question": "3. 해양수산부(지방해양수산청)가 취할 수 있는 조치", "answer": "해양수산부(관할 지방해양수산청)는 선박의 안전을 감독하는 기관으로서, 결원 상황에 따라 규제 완화 또는 운항 통제 등의 조치를 취합니다.\n승무 자격 특례(대무) 승인: 선박소유자의 신청을 받아, 선박의 안전 운항에 지장이 없다고 판단되는 경우 일정 기간 또는 특정 항로에 한해 하위 면허 소지자가 상위 직책을 대행할 수 있도록 승인해 줍니다.\n선박 항만국통제(PSC) 및 출항 정지 처분: 결원이 발생했음에도 정당한 사유 없이 선원을 충원하지 않거나, 특례 승인을 받지 않고 무단으로 항해를 강행하려는 선박에 대해 출항 통제(항만국통제 처분 등)를 내려 안전이 확보될 때까지 묶어둘 수 있습니다.\n행정지도 및 과태료 부과: 승무기준을 위반하여 선박을 운항한 선박소유자에게는 법적 절차에 따라 과태료 처분을 내리거나 개선 명령을 발합니다.\n💡 핵심 요약: 결원이 생기면 첫 기항지까지는 특례로 항해할 수 있으나, 선박소유자는 신속히 선원을 충원하거나 해수부의 승무 자격 특례 승인을 받아야 합니다. 이를 이행하지 않고 무리하게 운항할 경우 해수부는 출항 정지 등의 강력한 제재를 취하게 됩니다.", "id": 979}, {"category": "해사법규", "question": "10. 개항 질서법의 적용 범위", "answer": "해당 국가의 개항(내/외국 국적의 선박이 상시 출입할 수 있는 항)의 항계 안\n▶ 개항 질서법 상 항계 내 항법\n1) 항로 밖에서 항로에 들어오거나 항로에서 항로 밖으로 나가는 선박은 항로를 항행하는\n다른 선박의 진로를 피하여 항행하여야 한다.\n2) 선박은 항로에서 나란히 항행하지 못한다.\n3) 선박이 항로에서 다른 선박과 마주칠 우려가 있는 경우에는 오른쪽으로 항행하여야 한다.\n4) 선박은 항로에서 다른 선박을 추월하여서는 아니된다.\n5) 선박은 항로를 항행하는 위험물운송선박이나 흘수제약선의 진로를 방해하여서는 안된다.\n6. 법규는 충방(국내는 해사안전법)과 선박 입출항에 관한 법률은 완전 마스터 하셔야 할 듯 합니다.\n-충방은 통상 우리가 잘아는 부분 뿐만 아니라 책임이라던가 기타 사소한 부분까지 전부 완벽 숙지하시면 좋을 듯 합니다. (조종불능, 조종성능제한, 흘수제약선 등의 정확한 의미)\n-선박 입출항 법률도 굉장히 빈도가 높습니다. 3번 면접 중 2번 물어 보더라고요. 목적, 교통안전특정해역, 위험물 운반선 기준, 항행 방법(나란히 항행X, 마주치면 우측 항해 등) (포털사이트에서 선박 입출항에 관한 법률 치시면 전문이 뜹니다. 통째로 보시면 좋아요)\n☞ 개항질서법 상의 항법\n1) 항로 밖에서 항로에 들어오거나 항로에서 항로 밖으로 나가는 선박은 항로를 항행하는 다른 선박의 진로를 피하여 항행하여야 한다.\n2) 선박은 항로에서 나란히 항행하지 못한다.\n3) 선박이 항로에서 다른 선박과 마주칠 우려가 있는 경우에는 오른쪽으로 항행하여야 한다.\n4) 선박은 항로에서 다른 선박을 추월하여서는 아니된다.\n5) 선박은 항로를 항행하는 위험물운송선박이나 흘수제약선의 진로를 방해하여서는 안된다\n[추가 질문] 해사안전법상 국제규칙에 없는 정의 항목\n①\"항로지정제도\"라 함은 선박이 통항하는 항로, 속력, 기타 선박 운항에 관한 사항을 지정하는 제도를 말한다. 특히 교통안전특정해역 외의 해역으로서 그 해역의 지형, 조류, 기타 자연적인 조건 등으로 해양사고가 발생할 우려가 있다고 인정되는 경우에 그 해역의 범위, 선박의 항로 및 속력 등 선박의 항행안전에 필요한 사항을 정하고 있다.\n②\"거대선\"이라 함은 길이 200m 이상의 선박을 말한다. 국제규칙에서는 거대선의 개념을 규정하지 않고 대신 흘수가 깊어서 선박의 조종성에 제약을 받는 흘수제약선을 규정하고 있다.\n③\"위험화물운반선\"이란 선체의 한 부분인 화물창(貨物倉)이나 선체에 고정된 탱크 등에 해양수산부령으로 정하는 위험물을 싣고 운반하는 선박을 말한다.\n④\"고속여객선\"이라 함은 시속 15노트 이상의 속력으로 항행하는 여객선을 말한다.\n⑤\"선박교통관제\"란 선박교통의 안전 및 효율성을 증진하고 해양환경과 해양시설을 보호하기 위하여 선박의 위치를 탐지하고 선박과 통신할 수 있는 설비를 설치·운영함으로써 선박의 동정을 관찰하며 선박에 대하여 안전에 관한 정보를 제공하는 것을 말한다.\n⑥\"항행장애물\"(航行障碍物)이란 선박으로부터 떨어진 물건, 침몰·좌초된 선박 또는 이로부터 유실(遺失)된 물건 등 해양수산부령으로 정하는 것으로서 선박항행에 장애가 되는 물건을 말한다.", "id": 980}, {"category": "해사법규", "question": "4. Good Seamanship이란 무엇인지?", "answer": "(COLREGs Reg.5부터 시작해서 연계된 설명을 원하셨던 듯)", "id": 981}, {"category": "해사법규", "question": "3. CLP?( 전부다 첨 들어봤다고 함)", "answer": "종이 주면서 번역(흘수제약선은 잘 보이는 수직선에 원통형 형상물 1개를 설치하여야 한다): 다들 원통형 형상물 영문 대답 못함", "id": 982}, {"category": "해사법규", "question": "4. 콜레그 한글로 적어주면서 영어로 번역해보라고도 합니다", "answer": "유조선통항금지구역의 의의와 유조선 통항금지구역에 진입이 불가능한 선박은?\nCOLREG 10장에서 분리대에 들어 갈 수 있는 경우에 대해 설명하시오.\n3. COLREG 영작 문제 - 예인작업에 종사하는 동력선은 수직선상에 마스트등 2개 또는 3개를 게시하여야 한다.\n위의 여섯 문제가 10월 20일 오전 면접에서 받은 질문입니다. 연수원 교수의 3번 문제의 경우 면접자 5명 전원이 \"A power driven vessel when towing shall exhibit 2 or 3 mastheadlight in a vertical line.\" 이라고 답변했는데 주어가 예인작업에 종사하는 동력선이라시며 주어를 바꾸어 대답을 하라고 하시더군요. 순간 다들 당황해서 답변을 못했는데, 콜레그 Rule 3의 일반적 정의에 A vessel engaged in a towing operation~으로 시작하는 예인작업선의 정의가 나오더군요. 그러니 주어는 A power driven vessel engaged in a towing operation으로 하면 될 것 같네요.", "id": 983}, {"category": "해사법규", "question": "6. SMCP", "answer": "- 해석을 할건지 작문을 할건지 선택하라 해서 해석 문제 선택했습니다.\n(면접관이 구두로 영어로 말하면 제가 해석)PILOT 관련해서 해석할수있는 문제였고\n- 흘수제약선 및 통항분리방식 영어로 요구하셨습니다\n. COLREG의 16항 한글 문구 다섯줄정도를 COLREG에 나온 영어로 영작\nAction by give-way vessel\nEvery vessel which is directed to keep out of the way of another vessel shall, so far as possible, take early and substantial action to keep well clear.", "id": 984}, {"category": "해사법규", "question": "3. 제한수로에 대해 설명하시오", "answer": "-> 협수로에 대해 설명하였고, 제한수로가 협수로 뿐인가? 저수심은 아닌가? 재차 질문하셔서 Shallow water 에선 수심이 낮아 변침 등 조종에 제한을 받는다고 하며, 천수영향을 설명드렸는데 선저 유속 증가, 압력 감소, 마찰저항 증가, 선속 감소, 보침성 악화, 타효 악화 및 Squat 현상이 발생. 이라 답하였고, Squat가 뭔지 물어보셔서 선체침하현상으로 흘수가 증대하여, No go area등 설정시 더 주의깊게 해야한다고 답했습니다.", "id": 985}, {"category": "해사법규", "question": "4. COLREG에서 임의신호 2가지를 말하시오", "answer": "-> 답이 \"발광신호, 주의환기신호\" 라고 생각되나, 발광신호가 생각나지 않아\n주의환기신호만 답변후 정박선의 음향신호중, 소형선의 동라, 징에 의한 신호라 답하였습니다.\n(충방 책 보고 답변 드리고 싶으나, 지금 책이 없습니다. 오답인듯 합니다..)", "id": 986}, {"category": "해사법규", "question": "54. 다른 선박의 진로를 피해야할 선박은?", "answer": "횡단 상태에 피항선\n협수도 항법 / 길이 20미터 미만의 선박 , 범선 어선\nTSS 항법 / 길이 20미터 미만의 선박, 범선 , 어선\n추월선은 피 추월선", "id": 987}, {"category": "해사법규", "question": "59. 안전속력이란?", "answer": "그 상황하에서 적절하고 유효한 동작을 취할 수 있으면 그 조건하에서 알맞은 거리에서 정선할 수 있는 속력", "id": 988}, {"category": "해사법규", "question": "4. 항내속력을 결정할때의 고려할 사항은", "answer": "1) 자선의 투묘로써 타력을 감소시킬 수 있는 정도\n2) 자선의 반전타력여하\n3) 외력의 영향여하\n4) 선적상태(흘수)\n5) 항역내의 넓이. 수심. 장애물의 여부\n6) 정박중인 선박의 교통량\n7) 시계정도", "id": 989}, {"category": "해사법규", "question": "64. 충방에서 음향신호는 강제사항과 권고사항이 있음 권고사항인 2가지는?", "answer": "발광신호 와 주의 환기 신호.", "id": 990}, {"category": "해사법규", "question": "65. 해사안전법에서 어로에 종사하고 있는 선박의 기준은?", "answer": "그물 , 낚시줄,트롤망 그 밖에 조종성능을 제한하는 어구를 사용하여 어로 작업을 하고 있는 선박", "id": 991}, {"category": "해사법규", "question": "48. 충방에서 선박 피항선의 우선 순위 관련", "answer": "수상항공기 / 동력선 / 범선 / 어로에 작업에 종사하는 선박 / 흘수 제약선 / 조종성능 제한선 = 조종성능 불능선\n8. COLEG 영문 : 예인 작업 중인 동력선에 수직선상의 마스트등 2개 또는 3개를 표시하라.\nA Power – Driven vessel when towing shall exhibit two or three masterhead light in a vertical line", "id": 992}, {"category": "해사법규", "question": "58. 강제신호와 임의신호 차이점 및 임의신호 종류", "answer": "강제 신호 : 조종,추월 만곡부 경고 신호 (Shall)\n임의 신호 : 주의 환기 신호 및 Lihgt( 음향 신호를 보충할수 있는 ) // May.", "id": 993}, {"category": "해사법규", "question": "56. 제한된 시계에서 횡단선과 추월선 조우시 선장이 해야 할 최우선의 조치 사항", "answer": "안전 속력을 설정한다.\n무중에서 충방 추월을하고 있고 전방에 마추치는 선박과 횡단하는 선박이 있다. 항법규정은?\n추월을 멈추고 무중항해를 따른다.", "id": 994}, {"category": "해사법규", "question": "34.제한시계일때 황천황해시 어떻게 해야하는가 ?", "answer": "제한 시계\n1) 항해 규칙 안전속력 설정, 기관준비,상호시계내에서 항법 준수, 레이더 항법\n2) 피항시 :\nA. 추월하는 경우를 제외하고, 자선의 정횡 전방에 있는 선박에 대하여 좌현 변침을 금한다.\nB. 정횡 또는 정횡 후방의 선박쪽으로 변침 금지\n3) 타선의 음향 신호를 들었을 경우\nA. 침로를 유지 가능한 최소의 속력을 낮춘다\nB. 전진 타력을 완전히 없앤다\nC. 극도로 주위하며 항해한다", "id": 995}, {"category": "해사법규", "question": "31.평수 수역 원양 수역 등 수역구분하는거", "answer": "1) 평수(平水)구역: 호수․하천 및 항내의 수역(항만법에 의하여 항만구역이 지정된항만에 있어서는 그 구역)과 해양수산부령이 정하는18개 구역\n2)연해(沿海)구역 : 한반도와 제주도의 해안으로부터 20마일(1마일 : 1,852미터)이내의 수역과 해양수산부령이 정하는 5개 구역\n3)근해(近海)구역: 동경 175동, 남위 11도, 동경 94도,북위 63도 선(線)안의 수역(동남아)\n4)원양(遠洋)구역: 세계 모든 수역.", "id": 996}, {"category": "해사법규", "question": "36.해사안전법상 특정해역 구분?", "answer": "A.해상 교통량이 아주 많은 해역\nB.거대선,위험 화물 운반선,고속 여객선 등의 통항이 잦은 해역.\n해사안전법에 우리나라 특별안전수역의 위치와 적용범위, 목적, 위반시 사항등 전체 설명 요구", "id": 997}, {"category": "해사법규", "question": "21.본선이 제한된 시정의 협수로에서 추월 중이고 동시에 교차상태에 놓여 있을 때", "answer": "항법의 우선순 추월을 멈추고, 제한 시계의 항법에 따라 본선 정횡 전방에 있는 선박쪽으로 변침을 하지 않는다. ??\n1) 어로에 종사중인 선박\n: 어로에 종사중인 선박은 통로를 따라 진행하는 모든 선박의 통행을 방해하여서는 아니된다.\nA vessel engaged in fishing shall not impede the passage of any vessel following a traffic lane.\n2) 길이 20m 미만의 선박이나 범선\n: 길이 20m 미만의 선박이나 범선은 통로를 따라 진행하는 동력선의 안전한 통행을 방해하여서는 아니된다.\nA vessel of less than 20 meters in length or a sailing vessel shall not impede the safe passage\nof a power-driven vessel following a traffic lane.", "id": 998}, {"category": "해사법규", "question": "32. 72 COLREG(국제충돌예방규칙)의 구성은?", "answer": ": 5장 38개 조문과 부속서 4조로 구성되어 있음.", "id": 999}, {"category": "해사법규", "question": "34. 72 COLREG(국제충돌예방규칙)의 6조 안전속력(Safe speed)이란?", "answer": "COLREG 제2장 항법규정 제1절 모든 상태의 시계 내에서의 선박의 운항 편 중 제6조에 해당하는 규정\n▶ SAFE SPEED : 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과\n상태에 알맞은 거리에서 정선할 수 있는 선박의 속력을 말한다.\n1) 안전속력 결정에 고려하여야 할 요소들\n① 시계상태\n② 어선 혹은 기타의 선박들의 집결을 포함한 교통량의 밀도\n③ 그 당시의 상태 하에서, 특히 정지거리와 선회능력을 참작한 선박의 조정성능\n④ 야간에 육상의 등화 또는 자선의 항해등의 반사광으로부터 생기는 배경광선의 존재 여부\n⑤ 바람, 해면 및 해조류의 상태, 그리고 항해장애물의 근접상태\n⑥ 항해 가능한 수심과 흘수\n2) RADAR 사용 가능 선박이 추가하여 고려할 요소\n① RADAR 장비의 특성, 능력 및 한계\n② 활용되는 거리눈금에서 오는 제약\n③ 해면상태, 기상 및 기타 장애요인이 RADAR에 미치는 영향\n④ 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서도 RADAR에 의하여 탐지 되지 아니할 수도 있다는 것\n⑤ RADAR에 의하여 탐지된 선박의 척수, 위치 및 이동\n⑥ 부근의 선박이나 기타의 목표물의 거리를 측정하기 위하여 RADAR를 사용할 때 할 수\n있는 보다 정확한 시정의 추정", "id": 1000}, {"category": "해사법규", "question": "35. 조종 성능 제한선의 종류 및 주간 형상물과 야간등화는?", "answer": "1) 기뢰 제거 작업에 종사하고 있는 선박을 제외하고, 조종성능에 제한을 받는 선박\n야간 : 수직선상에 홍등, 백등, 홍등\n(대수속력이 있는 경우 – 하나 또는 그 이상의 마스트 정부등, 현등 및 선미등 추가 /\n묘박 중일 경우 – 묘박등 추가)\n주간 : 수직선상에 형상물 구형, 마름모형, 구형\n2) 예선과 피예선\n3) 준설선 또는 수중작업에 종사하고 있는 선박\n4) 잠수작업에 종사하는 선박\n5) 기뢰제거작업에 종사하고 있는 선박\n: 전주를 비추는 세 개의 녹등 또는 세 개의 구상 형상물을 표시하여야 한다. 이들 등화나 형상물 중 1개는 전부 마스트 정부 부근에 표시되어야 하고 나머지 2개는 전부 야드(YARD)의 양단에 표시하여야 한다. 이들 등화나 형상물은 타선박이 기뢰제거작업중인 선박의 1000 미터 범위 이내로 접근하는 것은 위험하다는 것을 표시한다.", "id": 1001}, {"category": "해사법규", "question": "36. 흘수 제약선의 의미와 주간 형상물과 야간등화는?", "answer": ": 흘수 제약선이란 깊은 흘수 때문에 천수 구간에서 행동의 제한을 받는 선박을 일컫는다.\n(거대형선)\n- 주간 형상물 : 가장 잘 보이는 곳에 흑색 원통형 형상물 하나를 게시\n- 야간 등화 : 가장 잘 보이는 장소의 수직선상에 전주를 비추는 3 개의 홍등을 수직으로 게시\n1) 수심/흘수 > 2.5 이상이면 : 조종성은 거의 영향을 받지 아니한다.\n2) 2.5 > 수심/흘수 > 1.25 : 조선상 여러 가지 곤란이 생긴다.\n3) 수심/흘수 ≤ 1.25 : 조종성이 심히 약화된다.", "id": 1002}, {"category": "해사법규", "question": "37. 항해 중/ 어로작업 중 이란 의미는?", "answer": "1) 어로 작업 중의 의미\n: 어로 중인 선박인가 아닌가는 그것이 사용하고 있는 어구에 의하여 당해 어선이 원래 가진\n조종성능에 제한을 받느냐, 아니 받느냐에 따라 결정된다. 어로에 종사하고 있는 선박이라\n함은, 어망, 밧줄, 트롤망 또는 기타 기동성을 제한하는 어구를 사용하여 어로하고 있는\n선박을 말하며, 기동성을 제한하지 아니하는 인승 기타 어구를 사용하여 어로하고 있는\n선박은 포함하지 아니한다.\n2) 항해 중의 의미\n: 선박의 상태가 정박 및 좌초의 어느 경우도 아닌 상태를 말한다.\n이것은 근본적으로 선박이 곧 바로 조선자의 뜻대로 움직일 수 있는 상태에 있을 때 항해\n중이라고 할 수 있다.", "id": 1003}, {"category": "해사법규", "question": "38. COLREG(국제해상충동예방규칙) 제10조 TSS 항법의 내용은?", "answer": "1) 통항분리방식을 이용하는 선박의 항행상의 의무\n- 적합한 통로 내에서 그 통로의 일반적인 교통방향을 따라서 항행하여야 한다.\n- 일반적인 교통방향을 따르라 함은 통로의 방향에 완전히 일치하지 아니하여도 되나 거의\n일치하여 항행하라는 말이다.\n- 통항분리선 또는 대에서 가능한 한 멀리 떨어진다. 이것은 이 선 또는 대에 접근되면 충돌을\n유발할 염려가 있기 때문이다.\n- 통로에의 진입 및 이탈 방법 : 통로에 진입 또는 이탈할 때에는 통로의 시발점 및 종점에서\n그렇게 하여야 하고 측면에서 합류 또는 이탈할 때에는 가능한 한 소각도로 행하여야 한다.\n이것은 원칙적으로 횡단관계가 생기는 것을 바라지 않기 때문이다.\n2) 통로의 횡단방법\n: 가능한 한 통로의 횡단은 하지 말아야 하나 부득이 한 경우에는 일반적인 교통방향에 직각이\n되게 횡단하여야 한다. 이것은 횡단의 자세를 명백히 하고 횡단시간 및 거리를 단축함으로써\n충돌확률을 최소로 하려고 의도된 것이다. 여기서 주의할 것은 가능한 한 횡단을 하지\n말라는 것이고 금한다는 것은 아니다. 따라서 통로를 횡단하는 선박과 통로방향으로\n진행하는 선박 사이에 충돌위험이 생겼을 때에는 횡단관계를 규율하는 일반항법규칙\n(제 15조)이 적용됨에 유의하여야 한다.\n3) 연안 통항대 (INSHORE TRAFFIC ZONE)의 이용금지\n4) 분리대 내로의 진입 또는 분리선의 월선 금지\n5) 통항분리방식의 종점 부근에서의 항행상의 주의\n6) 통항분리방식 내 또는 이의 종점 부근에서의 묘박의 금지\n7) 통항분리방식을 이용하지 아니하는 선박이 주의할 사항\n: 통항분리방식을 이용하지 아니하는 선박은 가능한 한 이것에서 멀리 떨어져야 한다.\n8) 통항분리방식 내에서 어로에 종사중인 선박의 피항의무\n: 어로에 종사 중인 선박은 통로를 따라 진행하는 모든 선박의 통행을 방해하여서는 아니된다.\n이것은 협수도 또는 항로 내에서의 어선의 피항의무와 같다.\n9) 길이 20M 미만의 동력선 또는 범선의 피항의무\n: 길이 20M 미만의 동력선 또는 범선은 통로를 따라 진행하는 동력선의 안전한 통행을 방해하여서는 아니된다. 이것도 협수도 또는 항로 내에서의 소형선 및 범선의 피항 의무와 같다.\n10) 공적인 작업의 성질 때문에 규칙의 엄격한 준수를 요구할 수 없다.", "id": 1004}, {"category": "해사법규", "question": "39. 운전 부자유선의 등화는?", "answer": "1) 야간 등화 : 가장 잘 보이는 곳, 수직선상에 전주를 비추는 홍등 2개를 표시\n대수속력이 있으면 현등과 선미등을 함께 표시한다.\n2) 주간 형상물 : 가장 잘 보이는 곳, 수직선상에 구 또는 이와 유사한 형상물 2 개를 표시.", "id": 1005}, {"category": "해사법규", "question": "43. 선박의 크기 별로 기적신호에 대한 가청거리", "answer": "1) 200 Mtr 이상 : 2 Mile\n2) 200~75Mtr : 1.5Mile\n3) 75~20Mtr : 1 Mile\n4) 20Mtr 미만 : 0.5Mile\n49. COLREG(국제해상충돌예방규칙) 18조(선박 상호간의 책임한계 : Responsibilities between Vessels)\n에 대하여 설명하여라.\n▶ 국제해상충돌예방규칙 18조는 무엇에 근거해서 그렇게 순서가 정해졌는가?\n: 운전성능이 우수한 선박이 진로를 피하도록 의무를 부여함\n◈ 제18조(선박상호간의 책임한계)\n제9조(협수도 : Narrow Channels), 제10조(통항분리방식 : Traffic Separation Schemes) 및\n제13조(추월 : Overtaking )에서 달리 규정하는 경우를 제외하고 :\n(a) 항행중인 동력선은 다음 선박의 진로를 피하여야 한다 :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 ;\n(ⅱ) 조종성능에 제한을 받고 있는 선박 ;\n(ⅲ) 어로에 종사하고 있는 선박 ;\n(ⅳ) 범선.\n(b) 항행 중인 범선은 다음 선박의 진로를 피하여야 한다. :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 ;\n(ⅱ) 조종성능에 제한을 받고 있는 선박 ;\n(ⅲ) 어로에 종사하고 있는 선박.\n(c) 어로에 종사하고 있는 선박이 항행 중에 있을 때에는 가능한 한 다음 선박의 진로를 피하여야\n한다. :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 ;\n(ⅱ) 조종성능에 제한을 받고 있는 선박.\n(d) (ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 또는 조종성능에 제한을 받고 있는 선박 이외의\n선박은 상황이 허락하는 한 흘수에 제약을 받아 제28조의 신호를 표시하고 있는 선박의\n안전한 통행을 방해하지 아니하도록 하여야 한다.\n(ⅱ) 흘수의 제약을 받는 선박은 자선의 특수한 조건에 충분히 유의하고 특별히 조심하여\n운항하여야 한다.\n(e) 수면상에 떠있는 수상항공기는 원칙적으로 모든 선박으로부터 충분히 떨어져서 그들의 항행을\n방해하지 아니하도록 하여야 한다. 다만, 충돌의 위험이 있는 경우에는 이 장의 항법규정에\n따라야 한다.\n(f) (i) 이륙, 착륙 및 표면에 근접하여 비행시에, WIG선은 다른 모든 선박과 확실한 간격을\n유지하여야 하며 그들의 항해를 방해하지 않도록 하여야 한다;\n(ii) 수면 위를 운항하는 WIG선은 동력구동 선박과 같이 이 편의 규칙을 준수하여야 한다.", "id": 1006}, {"category": "해사법규", "question": "콜레그 제18조에 적용되지 않는 조항을 말하시오.", "answer": "1) 제9조 협수로에서의 항법\n2) 제10조 통항분리방식\n3) 제13조 추월\n제18조에는 \"제9조, 제10조 및 제13조에서 달리 규정하는 경우를 제외하고\"라는 단서 조항이 있다.", "id": 1007}, {"category": "해사법규", "question": "20. 항 내에서 선회하기 전 조치는?", "answer": "조종 및 경고신호를 발하여 조종에 대한 표시를 하여야 함.\n- 단성 1발/섬광 1회 : 본선은 우현으로 변침중임.\n- 단성 2발/섬광 2회 : 본선은 좌현으로 변침중임.\n- 단성 3발/섬광 3회 : 본선은 후진추진을 사용중임.\n◈ 협수도 내에서의 음향신호\n- 장음 2발 단음 1발 : 본선은 귀선의 우현측으로 추월하고자 함.\n- 장음 2발 단음 2발 : 본선은 귀선의 좌현측으로 추월하고자 함.\n- 피추월 선박의 동의 표시 : 장음, 단음, 장음, 단음", "id": 1008}, {"category": "해사법규", "question": "57. COLREG : 제13조 추월(Overtaking)의 조건", "answer": "1) 추월\n(a) 추월선은 제2장 제1절 및 제2절에 있는 규칙의 여하한 규정에도 불구하고 추월 당하는 선박의 진로를 피하여야 한다.\n(b) 다른 선박의 정횡 후 22.5도를 넘는 후방 즉, 추월 당하는 선박과의 관계에 있어서 야간에는 그 선박의 선미등만을 볼 수 있고 현등을 볼 수 없는 선박은 추월선으로 보아야한다.\n(c) 다른 선박을 추월하고 있는지의 여부에 관하여 의문이 있는 선박은 자선이 추월하고 있는 경우로 생각하고 이에 합당한 동작을 취하여야 한다.\n(d) 두 선박 간의 방위가 그 후에 여하히 변경되더라도 추월선이 본 규칙상의 의미에 있어서의 횡단선으로 되는 것은 아니며 또한 추월선은 완전히 앞질러 멀어질 때까지 추월 당하는 선박의 진로를 피하여야 할 의무를 벗어나지 못한다.\n2) 추월선의 정의\n▶ 앞서 가는 선박의 선미등만을 보면서 타선에 접근하는 선박은 추월선이다.\n▶ 다른 선박의 정횡 후 22.5도(현등의 후방 사광범위) 후방에서 타선에 접근하는 선박은\n추월선이다.\n▶ 그 이외의 선박은 횡단관계 또는 마주치는 관계에 있다.\n58. COLREG : 제9조 협수도(Narrow channel)에서의 항법에 대해 말해 보세요.\n1) 협수도의 정의\n: 선박이 서로 상반되는 방향으로 또는 같은 방향으로 침로를 잡고 항행하지 아니하면 곧 또는 잠시 후에 항해상의 위험이나 충돌상의 위험에 직면하게 되는 수도를 협수도라고 말할 수 있다.\n2) 협수도에서의 항법\n(a) 협수도나 항로를 따라 진행하고 있는 선박은 안전하고 실행 가능하면 그 선박의 우현측에 위치한 수도 혹의 항로의 외연 가까이를 항행하여야 한다.\n(b) 길이 20미터 미만인 선박이나 범선은 협수도나 항로 내에서만 안전하게 항행할 수 있는 선박의 진로를 방해하여서는 아니된다.\n(c) 어로에 종사하고 있는 선박은 협수도나 항로 내에서는 항행하는 타선의 통항을 방해하여서는 아니된다.\n(d) 만일 자선의 횡단이 수도나 항로 내에서만 안전하게 항행할 수 있는 선박의 통항을 방해한다면 그 선박은 협수도나 항로를 횡단하여서는 아니된다. 후자는, 만약 횡단선의 의도가 의심스러울 때에는 34조(d)에 규정된 음향 신호를 사용할 수 있다.\n◈ 34조(d)항 : 의문신호 또는 경고신호(Wakening-up signal)\n급속한 단성 5발 이상으로 구성되는 의문신호\n(e) (i) 협수도나 항로에서, 피추월선이 안전한 통과를 허락하는 동작을 취하여야만 추월이 가능할 때는 추월하는 선박은 제34조(c)(i)에 규정한 적합한 음향신호에 의하여 자선의 의사를 표시하여야 한다. 동의하면, 피추월선은 제34조(c)(ii)에 규정된 적합한 음향신호를 하고 안전한 통과를 할 수 있도록 조치를 취하여야 한다. 만일 의문이 있으면 피추월선은 제34조(d)에 규정된 음향신호를 할 수 있다.\n(ii) 이조는 제13조에 규정된 추월선의 의무를 면제하지 아니한다.\n◈ 34조(c)항 : 추월제의 및 응답신호\n(i) 추월제의 신호\n장성, 장성, 단성 (ㅡ ㅡ ㆍ) ; 본선은 귀선의 우현측을 추월하고자 한다.\n장성, 장성, 단성, 단성 (ㅡ ㅡ ㆍㆍ) ; 본선은 귀선의 좌현측을 추월하고자\n한다.\n(ii) 응답신호\n장성, 단성, 장성, 단성 (ㅡㆍㅡㆍ) ; 알았다, 추월을 하라.\n(f) 중간에 개재하는 장애물 때문에 타선을 볼 수 없는 협수도나 항로의 만곡부 또는 구역에\n접근하는 선박은 특별한 경계와 주의를 하여 항행하여야 하며 제34조(e)에 규정된 적합한\n음향신호를 하여야 한다.\n◈ 34조(e)항 : 만곡부 신호\n만곡부 또는 기타 장애물로 인하여 차폐되어 상대선을 볼 수 없는 해역에\n접근하는 선박은 1회의 장음을 취명하여야 하고 반대편에서 오는 선박이\n그러한 신호를 들었을 때에는 반드시 같은 신호로 응답하여야 한다.\n(g) 사정이 허락하는 한 모든 선박은 협수도내에서 묘박을 피하여야 한다.", "id": 1009}, {"category": "해사법규", "question": "68. 조타 명령의 “Steady” 와 “Steady as she goes” 의 차이점은?", "answer": "1) Steady : 회두를 줄이라고 명령할 때 쓰인다. 회두를 줄인다는 의미는 선박의 선회를 가능한\n빨리 줄이라는 뜻이다.\n2) Steady as she goes\n: 현 침로 유지하라는 명령으로, 변침 이후에도 종종 좀더 타각을 주어 변침해야 할 경우가\n생기지만 그렇지 않을 경우에 사용하는 조타 명령이다.\n3) Report if she does not answer the wheel\n: 타효가 없을 경우 보고하라는 조타명령\n4) Finished with wheel, no more steering\n: 조타를 더 이상 하지 않는다는 뜻으로 항구에 정박 또는 묘박을 했을 때\n3) 제2절 상호 시계내에서의 항법에는 무엇이있는가?", "id": 1010}, {"category": "해사법규", "question": "2. 서로 시계 내에 있는 선박의 행동(Rules 11~18)", "answer": "11) Application\n12) Sailing Vessels\n13) Overtaking\n14) Head-on Situation\n15) Crossing Situation\n16) Action by Give-way Vessel\n17) Action by Stand-on Vessel\n18) Responsibilities between Vessels\n안전속력의 의미(충방 6조)\n모든 선박은, 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과 상태에 알맞는 거리에서 정선 할 수 있도록 항상 안전한 속력으로 항해하여야 한다\n항내 안에서 안전 속력이란 (본인에게 질문)\n6조 내용 얘기하면서 본선 길이의 최소 3-4배 거리유지 (요건 어디서 본것 같은데 한번 찾아 보십시요)\n(1) 타선에 위험을 미치지 않는 속력이라야 한다.\n개항질서법 제 17조(속력등의 제한) 1을 보면 “ 선박은 개항의 항계내와 항계부근에서는다른 선박에 위험을 미치지 아니할 정도의 속력으로 항행하여야 한다” 라고 규정되어있다. 항내를 고속력으로 항행하여 타선 또는 안벽에 계류중이거나, 항행중이거나, 또는 작업중인 부투 기타 소형주정에 위해를 주어서는 안될 것이다.\n(2) 타효를 가질 수 있는 속력이라야 한다.\n항계내로 들어가고 방파제를 통과하더라도 berth까지는 거리가 멀고 선박의 왕래가 한산하면 별로 문제가 되지 않지만 일반적으로 그렇지 않다. 항외로부터 항내로 들어오면 항내 정박선의 상황, 기타 상황이 항외에서 들어오면서 보던 것과는 좀 달라진다. 이런 것을 관찰하고 거기에 대비할 시간적인 여유를 얻으려면 자연히 최저속력이 될 수 밖에 없다. 또 저속에서 고속으로 하는 것은 간단하지만 고속에서 갑자기 저속으로 하려면 진입자세를 흐트리지 않고서는 불가능하다.", "id": 1011}, {"category": "해사법규", "question": "1. 선박에서 조난이 발생하였을 때 발하는 신호에 대하여", "answer": "제37조(조난신호) 선박이 조난을 당하여 구조를 요청할 때에는 이 규칙 부속서 Ⅳ에 규정된 신호를 사용하거나 표시하여야 한다.\n부속서 Ⅳ\n조난신호\n1. 다음 각 호의 신호는 함께 또는 단독으로 사용되어서 조난 및 구원의 필요를 알리는 신호이다;\n(a) 약 1분간의 간격으로 행하는 1회의 발포 기타 폭발에 의한 신호;\n(b) 무중신호장치에 의한 연속음향신호;\n(c) 짧은 시간 간격으로 1회에 1개씩 발사되어 별 모양의 붉은 불꽃을 발하는 로켓트 또는 유탄에 의한 신호;\n(d) 기타의 신호 방법에 의한 모올스부호 …---…(SOS)의 신호;\n(e) 무선전화에 의한 '메이데이'라는 말의 신호;\n(f) 국제기류신호에 의한 NC의 조난신호;\n(g) 상방 또는 하방에 구 또는 이와 유사한 것 1개를 붙인 4각형 기로 된 신호;\n(h) 선상에서의 발연(타르통, 기름통 등의 연소로 생기는) 신호;\n(i) 낙하산이 달린 적색의 염화 로켓트 또는 적색의 수동 염화에 의한 신호;\n(j) 오렌지색의 연기를 발하는 발연신호;\n(k) 좌우로 벌린 팔을 천천히 반복하여 올렸다. 내렸다 하는 신호;\n(l) DSC를 이용한 조난신호(VHF CH 70 또는 MF/HF);\n(m) Inm을 통한 선박 육상간 조난신호 또는 다른 위성 전화 서비스를 통한 조난신호;\n(n) 비상위치지시를 하는 레디오비이콘에서 발사하는 신호;\n(o) 구명정의 레이더 자동응답장치를 포함하여 무선통신장치에 의하여 송신된 인정된 신호;", "id": 1012}, {"category": "해사법규", "question": "3. 국제신호서, 상선탐색 및 구조편람의 해당절 및 다음 신호에 유의하라;", "answer": "(a) 흑색\n1)무중신호장치에 의한 연속음향 신호\n2)불꽃을 내는 유탄 및 로켓 신호\n3)무선 전신 SOS 신호\n4)무선 전화 “MAY DAY MAY DAY” 신호\n5)선상 발영신호\n6)낙하산이 달린 로켓 또는 수동 염화\n[추가 질문] 선박 항해기기로 조난신호를 발하는 방법 및 절차에 대하여\n1) 무선전신 또는 기타의 신호 방법에 의한 모스부호(SOS)\n2) 무선전화에 의한 '메이데이'라는 말의 신호\n3) 무선전신 경보 신호\n4) 무선전화 경보 신호\n5) 비상위치지시를 하는 RADAR BEACON에서 발사하는 신호\n[추가 질문] VHF 조난 채널, DSC 채널\n1) VHF 조난 채널: 16\n2) DSC 채널: 70", "id": 1013}, {"category": "충방에서 조난신호의 종류와 방법", "question": "8.선장이 선교 1인 당직을 허용할 수 있는 조건은?", "answer": "1)상황을 주의깊게 검토하여 그렇게 하여도 안전하다는 것이 의심없이 확인 된 경우\n2)시정, 교통의 밀집도, 기상상태, 항해상 위험물의 근접도, TSS 및 그 부근을 항해중일 때 필요한 주의가 고려되었을 경우\n3)상황의 변화에 의하여 필요시 보조자가 즉시 선교에 호출 될수 있을 때.", "id": 1014}, {"category": "충방에서 조난신호의 종류와 방법", "question": "46. 규정상 충돌의 위험이 있을시 VHF 사용은 해야 한다 하지 말아야 한다.?", "answer": "하지 말아야 한다. 식별 오해 실기로 이어 질 수 있다.", "id": 1015}, {"category": "충방에서 조난신호의 종류와 방법", "question": "77. COLREG 중 주의환기 신호란? (-> 쓰면 안되는 등화는? 답: strobe lights -> 스트로브 라이트는 어떻게 점화되나?)", "answer": "쓰면 안돼는 등화 // 스트로브 라이트 및 회전등.", "id": 1016}, {"category": "충방에서 조난신호의 종류와 방법", "question": "79. 충방에서 강제신호와 비 강제신호를 나누어 설명하시오", "answer": "강제 신호 : 무중 항해 / 만곡부 / 조종 신호 / 경고 신호\n비 강제 신호 : 주의 환기 신호", "id": 1017}, {"category": "충방에서 조난신호의 종류와 방법", "question": "96. 항해 음향신호를 5개 종류로 구분 짓고 설명하라.", "answer": "조정 신호\n경고 신호\n만곡부 신호\n무중 신호\n주의 환기 신호", "id": 1018}, {"category": "COLREG!", "question": "1. 국제해상충돌방지규칙", "answer": "제1장 총칙 (PART A - GENERAL)\n-제1조 적용범위 (Application)\n-제2조 책임 (Responsibility)\n-제3조 일반정의 (General definitions)\n제2장 항법규칙 航法規則 (PART B - STEERING AND SAILING RULES)\n1절 모든 상태의 시계 내(視界內)에서의 선박의 운항 (Section I. Conduct of Vessels in Any Condition of Visibility)\n-제4조 적용 (Application) -제5조 견시 見視 (Look-out)\n-제6조 안전속력(Safe Speed)\n-제7조 충돌의 위험 (Risk of Collision)\n-제8조 충돌을 피하기위한 동작 (Action to avoid collision)\n-제9조 협수도 (Narrow Channels)\n-제10조 통항분리방식 (Traffic Separation Schemes)\n제2절 상호시계내에 있는 선박의 운항(Section II. Conduct of Vessels in Sight of One Another)\n-제11조 적용 (Application)\n-제12조 범선 (Sailing Vessels)\n-제13조 추월 追越 (Overtaking)\n-제14조 정면(正面)으로 마주치는 상태 (Head-on Situation)\n-제15조 횡단상태 橫斷狀態 (Crossing Situation)\n-제16조 피항선(避航船)의 동작 (Action by Give-way Vessel)\n-제17조 유지선(維持船)의 동작 (Action by Stand-on Vessel) -\n-제18조 선박상호간(船舶相互間)의 책임한계 (Responsibilities Between Vessels)\n제3절 제한시계내에서의 선박운항 (Section III. Conduct of Vessels in Restricted Visibility)\n-제19조 제한시계내(制限視界內)에서의 선박운항 (Conduct of Vessels in Restricted Visibility)\n제3장 등화(燈火) 및 형상물(形象物) (PART C - Lights and Shapes)\n-제20조 적용 (Application)\n-제21조 정의 (Definitions)\n-제22조 등화의 시인거리(視認距離) (Visibility of Light)\n-제23조 항해중인 동력선 (Power-driven Vessels underway)\n-제24조 끌고가는 선박 및 밀고가는 선박 (Towing and Pushing)\n-제25조 항해중인 범선 및 노도선 (Sailing Vessels underway and Vessels under Oars)\n-제26조 어선 漁船 (Fishing Vessels)\n-제27조 운전(運轉)이 자유롭지 못한 선박 또는 조종성능(操縱性能)이 제한을 받는 선박(Vessels not under Command or Restricted in their Ability to Manoeuvre)\n-제28조 흘수(吃水)로 인하여 제한을 받는 선박 (Vessels constrained by their Draught)\n-제29조 도선선 導船船 (Pilot Vessels) -제30조 정박선(碇泊船) 및 좌초선(坐礁船) (Anchored Vessels and Vessels Aground)\n-제31조 수상항공기 水上航空機 (Sea planes)\n제4장 음향(音響) 및 발광신호(發光信號) (PART-D Sound and Light signals)\n-제32조 정의 定義 (Definitions)\n-제33조 음향신호장치 音響信號裝備 (Equipment for Sound Signals)\n-제34조 조종(操縱) 및 경고신호(警告信號) (Maneouvering and Warning Signals)\n-제35조 제한시계내에서의 음향신호 (Sound Signals in Restricted Visibility)\n-제36조 주의환기신호 注意喚起 信號 (Signals to Attract Attention)\n-제37조 조난신호 遭難信號 (Distress Signals)\n제5장 적용제외규정 (PART E - Exemptions)\n-제38조 적용유보규정 (Exemptions)\n부속서 I - 등화 및 형상물의 배치와 기술상의 명세(13개절로 구성)\n(ANNEX I - Positioning and Technical details of Lights and Shapes)\n부속서 II - 근접하여 어로작업을 하는 어선들에 대한 부가적 신호\n[1. 일반원칙, 2. 트로올 어선의 부가신호, 3. 건착 어선의 부가신호]\n(ANNEX II - Additional Signals for Fishing Vessels Fishing in Close Proximity)\n부속서 III - 음향신호장치의 기술적인 명세\n[1. 기적, 2. 호종 또는 징, 3. 승인] (ANNEX III - Technical details of Sound Signal Appliances)\n부속서 IV - 조난신호 (ANNEX IV - DISTRESS SIGNALS)", "id": 1019}, {"category": "COLREG!", "question": "1. 제4조: 모든 시계상태에 있어서의 항법의 적용", "answer": "2. 제6조: 안전한 속력 – 모든 선박은 충돌을 피하기 위하여 적절하고, 유효한 동작을 취할 수 있고 또 당시의\n사정과 조건에 적합한 거리에서 정선할 수 있도록 언제나 안전한 속력으로 항행하여야 한다.", "id": 1020}, {"category": "COLREG!", "question": "12. 콜레그에서 책임이 들어가는 조항은 몇 조인가? 제2조 책임(Responsibility)과", "answer": "제18조 선박상호간의 책임한계(Resposibilities Between Vessels)", "id": 1021}, {"category": "COLREG!", "question": "콜레그 제2조 내용을 설명하시오.", "answer": "제2조 책임\n(a) 이 규칙의 어느 규정도 이 규칙의 이행을 태만히 한 결과 또는 선원의 통상적인 업무수행상이나 특수한\n사정에 의하여 필요로 하는 주의를 태만히 함으로써 생긴 결과에 대하여 어떠한 선박, 선박소유자, 선장 또는\n해원의 책임을 면제하여 주지 아니한다.\n(b) 이 규칙을 해석하고 실행에 옮기는데 있어서는 항해 및 충돌상의 모든 위험과 그리고 관계선박의 성능의\n한계에서 오는 사정도 포함하여 모든 특수한 사정에 대하여 합당한 주의를 하여야 하고, 그러한 위험이나 특수한 사정이 있을 때에는 절박한 위험을 피하기 위하여 이 규칙에 따르지 아니할 수도 있다.", "id": 1022}, {"category": "COLREG!", "question": "콜레그 제2조의 선원의 상무에 대해 설명하시오.", "answer": "선원의 상무로서 요구되는 주의의무는 규칙에서 명시한 것 이외의 것을 말한다. 이는 \"통상 선원이라면 당연히 알고 있어야할 지식, 경험, 관행으로서 해상에서 선원이 행하도록 기대되는 일반적인 행동원칙, 즉 조리(條理)의 일종이라고 할 수 있다\"\n오늘날 우리 문명된 사회에서는 인간에 대한 처벌은 명문으로 규정된 법률에 의하지 아니하면 아니된다.\n법 규범에 명시된 의무위반 이외의 행위에 대하여는 벌하기 곤란하다. 그러나 실제로 해상에서는 경험을 가진 선원이기 때문에 알 수 있고 또한 선원이기 때문에 하지 아니하면 아니되는 일이 너무나 많다. 여기서 말하는 선원의 상무란 그러한 뜻으로 해석할 수 밖에 없다. 왜냐하면 어느 누구를 막론하고 누구나 법규상 명백히 알 수 있는 일상의 직무로서의 상무는 구태여 명문으로 표시할 필요조차 없기 때문이다. 선상에서는 그러한 상무가 요구하는 주의를 태만히 함으로써 대단히 큰 사고가 일어날 수 있다. 그러나 그러한 상무는 법으로 일일이 규정할 수 없는 성질의 것이 대부분이다. 따라서 여기서 말하는 선원의 상무로서 요구되는 주의 의무란 규칙에서 명시한 것 이외의 내용을 말한다. 선원의 상무로서 요구되는 주의의무를 대략 예를 들어 적어보면 다음과 같다.\nA. 항해중\n1) 선장은 반드시 항해 당직사관에게 충돌방지를 위한 행동준칙을 명시한다.\n2) 의문이 있는 사항에 대하여는 반드시 선장에게 보고한다.\n3) 항해등을 수시로 점검하고, 각 선실에서 나오는 불빛을 차단하고 유색커텐을 사용함으로서 거기서 나오는 불빛이 규칙에서 요구하는 선등과 혼동되지 아니 하는가 유의한다.\n4) 협수로 통과시는 반드시 all stand by를 명한다.\n5) 황천 시는 소형선 기타 저성능 선박은 기동성능에 제한을 받을 수 있음에 유의한다.\n6) 협수도 등 선박교통이 복잡한 해역이 가까워 오면 반드시 선장에게 보고한다.\nB. 정박중\n1) 타선박의 위치확인\n2) 악천후 시 수묘 당직을 배치한다.\n3) 타선이 접근되면 묘쇄와 기관을 사용하여 충돌회피 조치를 한다.\n4) 태풍 등의 내습시는 황천에 대비하여 준비한다.", "id": 1023}, {"category": "COLREG!", "question": "1. 선원의 상무", "answer": "\"통상 선원이라면 당연히 알고 있어야할 지식, 경험, 관행으로서 해상에서 선원이 행하도록 기대되는 일반적인 행동원칙, 즉 조리(條理)의 일종이라고 할 수 있다\"", "id": 1024}, {"category": "COLREG!", "question": "2. 선원의 의무", "answer": "1) 상사 명령을 따를 것\n2) 직무를 게을리하거나 다른 선원 방해 금지\n3) 선장이 지정하는 시간까지 승선할 것\n4) 선장 허락 없이 선박을 떠나지 말 것\n5) 선장 허가 없이 구명정 또는 그 밖의 중요 속구 사용 금지\n6) 배 안의 식료품 및 물을 함부로 사용 금지\n7) 선장의 허가 없이 전기나 불 사용 혹은 흡연 금지구역에서 흡연 금지\n8) 선장 허가 없이 일용품 외의 물건을 선내 반입, 반출 하지 말 것\n9) 배 안에서 싸움, 폭행, 음주, 난동 그 밖의 선내질서를 어지럽게 하는 행위를 하지 말 것", "id": 1025}, {"category": "COLREG!", "question": "선박이 접안시 선원의 의무를 말하시오.", "answer": "1) 상사 명령을 따를 것\n2) 직무를 게을리하거나 다른 선원 방해 금지\n3) 선장이 지정하는 시간까지 승선할 것\n4) 선장 허락 없이 선박을 떠나지 말 것\n5) 선장 허가 없이 구명정 또는 그 밖의 중요 속구 사용 금지\n6) 배 안의 식료품 및 물을 함부로 사용 금지\n7) 선장의 허가 없이 전기나 불 사용 혹은 흡연 금지구역에서 흡연 금지\n8) 선장 허가 없이 일용품 외의 물건을 선내 반입,반출 하지 말 것\n9) 배 안에서 싸움, 폭행, 음주, 난동 그 밖의 선내질서를 어지럽게 하는 행위를 하지 말 것", "id": 1026}, {"category": "COLREG!", "question": "사전주의의무란? (precaution)", "answer": "선원의 상무로서 요구되는 주의의무를 대략 예를 들어 적어보면 다음과 같다.\n-항해중\n1) 선장은 반드시 항해 당직사관에게 충돌방지를 위한 행동준칙을 명시한다.\n2) 의문이 있는 사항에 대하여는 반드시 선장에게 보고한다.\n3) 항해등을 수시로 점검하고, 각 선실에서 나오는 불빛을 차단하고 유색커텐을 사용함으로서 거기서 나오는 불빛이 규칙에서 요구하는 선등과 혼동되지 아니 하는가 유의한다.\n4) 협수로 통과시는 반드시 all stand by를 명한다.\n5) 황천 시는 소형선 기타 저성능 선박은 기동성능에 제한을 받을 수 있음에 유의한다.\n6) 협수도 등 선박교통이 복잡한 해역이 가까워 오면 반드시 선장에게 보고한다.\n1) 타선박의 위치확인\n2) 악천후 시 수묘 당직을 배치한다.\n3) 타선이 접근되면 묘쇄와 기관을 사용하여 충돌회피 조치를 한다.\n4) 태풍 등의 내습시는 황천에 대비하여 준비한다.\n* 참고: 형사법에서는 주의의무위반행위 즉 과실을 예견의무와 결과회피의무로 나누어서 보고 있다. 예를들어 좁은 해역에 통항로가 설정되어 있는 경우라면 우측 통항로를 따라 항행하는 선박은 좌측의 통항로를 항행하던 선박이 갑자기 좌전타하여 진입하면 기적을 울리고 속력을 줄인다고 하더라도 우측의 여유수역이 협소하므로 우현전타한다면 오히려 좌초사고가 발생하므로 대각도 변침을 못하게 된다. 여기에서, 상대선이 갑자기 좌현전타하여 진입할 것을 예견할 수 없는 정도의 좁은 수로라면, 그 선박은 예견 가능성이 없으므로 주의의무 위반이 없다고 할 것이다. 또한 좌초 사고의 우려 때문에 대각도 변침을 못할 상황이라면 회피 가능성이 없으므로 역시 주의의무 위반이 없다고 할 것이다.", "id": 1027}, {"category": "COLREG!", "question": "절박한 위험이란? immediate danger(절박한 위험)", "answer": "지근거리에 기뢰, 부상하는 잠수함 또는 미확인된 암초를 발견한다고 하면, 누구가 조선자가 되었더라도 이\n절박한 위험을 피하기 위하여 변침할 것이다. 이때 양선이 충돌하였다 하더라도 B선이 합당한 신호와 더불어서 여타의 최선의 동작을 취하였으면 B선의 유지의무위반은 그 위법성이 저각되고 B선을 문책할 수 없는 것이다.", "id": 1028}, {"category": "COLREG!", "question": "콜레그 제2조 조문의 대표적인 영단어를 말해보시오.", "answer": "1) 책임 (responsibility)\n2) 태만 (neglect)\n3) 사전주의의무 (precaution)\n4) 선원의 상무 (the ordinary practice of seamen)\n5) 절박한 위험 (immediate danger)\n[추가 질문] COLREG와 선박입출항법의 차이를 설명하시오.\n(선박입출항법, 해사안전법, 콜레그의 적용 수역을 말하시오)\n1. 선박입출항법: 무역항의 수상구역, 무역항의 수상구역 밖의 수역시설 (정박지, 채널 등)\n2. 해사안전법: 대한민국의 영해, 내수 (해상 항행선박이 항행을 계속할 수 있는 수역)\n3. 콜레그: 외양항행선이 항행할 수 있는 해양과 이와 접속한 모든 수역이나 각국 정부가 제정한 특별규칙이\n우선된다.", "id": 1029}, {"category": "COLREG!", "question": "1. INSHORE TRAFFIC ZONE구역을 항해 할 수 있는 선박", "answer": "통항분리수역의 육지쪽 경계선과 해안 사이의 수역을 ITZ라고 한다.", "id": 1030}, {"category": "COLREG!", "question": "1. ITZ 통항가능선박", "answer": "*통항분리수역의 육지쪽 경계선과 해안 사이의 수역을 ITZ라고 한다.\n1) 길이 20미터 미만의 선박\n2) 범선\n3) 어로에 종사하고 있는 선박\n4) 인접한 항구로 입,출항하는 선박\n5) 연안통항대 안에 있는 해양시설 또는 도선사의 승하선 장소에 출입하는 선박\n6) 급박한 위험을 피하기 위한 선박", "id": 1031}, {"category": "COLREG!", "question": "2. 추월과정에서의 경고신호는 어떻게 내야하는가.", "answer": "서로 시계내에 있을시 상대방의 의도를 알 수 없을시 단음 5회를 내야합니다.\n[추가 질문] 그러면 피추월 또는 추월 중 누가 그 신호를 발하여야 하나요.\n두 선박 모두 상대방의 의도가 의심스러울시 발하여야 합니다.\n3. 예인선의 등화 관련하여 길이 70M의 예인선이 끌고가는 물체의 길이를 합쳐 170M일때 예인선의 등화\n① 동력선이 다른 선박이나 물체를 끌고 있는 경우에는 다음 각 호의 등화나 형상물을 표시하여야 한다.\n1. 제81조 제1항 제1호에 따라 앞쪽에 표시하는 마스트등을 대신하여 같은 수직선 위에 마스트등 2개. 다만, 예인선의 선미로부터 끌려가고 있는 선박이나 물체의 뒤쪽 끝까지 측정한 예인선열의 길이가 200미터를 초과하면 같은 수직선 위에 마스트등 3개를 표시하여야 한다.", "id": 1032}, {"category": "COLREG!", "question": "4. 선미등의 위쪽에 수직선 위로 예선등 1개", "answer": "5. 예인선열의 길이가 200미터를 초과하면 가장 잘 보이는 곳에 마름모꼴의 형상물 1개\n제2장 항법규정\n제1절 모든 상태의 시계 내에서의 선박의 운항\n제4조(적 용)\n이 절의 규칙은 모든 상태의 시계에 대하여 적용한다.\nRules in this section apply in any condition of visibility.", "id": 1033}, {"category": "COLREG!", "question": "4. 콜레그에서 타선박과의 조우 상황이 아닌 본선의 항해를 위한 준비 사항에 대한 내용이 담긴 조문은 무엇인가?", "answer": "제2조 책임\n(a) 이 규칙의 어느 규정도 이 규칙의 이행을 태만히 한 결과 또는 선원의 통상적인 업무수행상이나 특수한\n사정에 의하여 필요로 하는 주의를 태만히 함으로써 생긴 결과에 대하여 어떠한 선박, 선박소유자, 선장 또는\n해원의 책임을 면제하여 주지 아니한다.\n(b) 이 규칙을 해석하고 실행에 옮기는데 있어서는 항해 및 충돌상의 모든 위험과 그리고 관계선박의 성능의\n한계에서 오는 사정도 포함하여 모든 특수한 사정에 대하여 합당한 주의를 하여야 하고, 그러한 위험이나 특수한 사정이 있을 때에는 절박한 위험을 피하기 위하여 이 규칙에 따르지 아니할 수도 있다.\n제5조(견시)\n모든 선박은 시각 및 청각은 물론 그 당시의 사정과 상태에 적절한 모든 유효한 수단을 동원하여, 처하여 있는 상황 및 충돌의 위험을 충분히 평가할 수 있도록 항상 적절한 견시를 유지하여야 한다.\nEvery vessel shall at all times maintain a proper look-out by sight and hearing as well as by all available means appropriate in the prevailing circumstances and conditions so as to make a full appraisal of the situation and of the risk of collision.", "id": 1034}, {"category": "COLREG!", "question": "1. 모든 선박", "answer": "국제규칙은 안전한 속력을 결정하는 요소로서 모든 선박에 대하여 다음을 예시하고 있다.\n1) 시계의 상태\n제한시계 상태에서 고속으로 항행하면 근거리에서 상대선박을 발견한 경우에 적절하게 유효한 동작을 취할 수 없게 된다. 그러므로 제한시계에서는 감속하여야 한다. 시계상태가 안전속력 판단의 가장 중요한 요소로 생각된다. 국제규칙 제19조에서는 시계가 제한되어 선수에서 기적신호를 들을 경우에는 타효유지 최소속력으로 항해하기를 요구하고 있다.\n2) 어선 혹은 기타 선박들의 밀집을 포함한 교통폭주의 정도\n주위에 통항하는 선박이나 어로작업중인 어선이 많은 경우에는 충돌의 위험성이 높아지므로 그렇지 않는 경우에 비하여 저속항해를 하여야 할 것이다.\n3) 정지거리와 선회성능을 고려한 선박의 조종성능\n대형선박은 소형선박보다 정지거리가 크다. 그러므로 충돌을 피하기 위하여는 대형선박은 소형선박에 비하여\n미리 감속하여야 한다. 선박의 조종성능은 공선시와 만재시에 따라 다르고, 여유수심이 작을 때는 선회경이\n커진다. 이러한 요소들을 고려하여 안전속력을 정하여야 한다. 일반적으로 공선시에 비하여 만재시에, 수심이\n깊을 때보다 얕을 때에 상대적으로 더 감속하여야 한다.\n4) 야간에 육상 등화 또는 자선의 등화의 반사등에 의한 배경광선의 존재 여부\n항구에 접근하면 항구의 네온사인 등이 배경에 깔려있으므로 상대선박의 등화가 잘 보이지 않게 된다. 이\n경우에는 충분한 시간적 여유를 가지고 다른 선박의 존재를 식별할 수 있도록 감속하여야 한다.\n5) 바람, 해면 및 조류의 상태 그리고 항해장애물의 근접상태\n바람이 강하고 해면이 거칠면 선박조종에 지장이 있으므로 그렇지 않은 경우에 비하여 감속하는 편이 좋다.\n장애물이 근접하여 있으면 속력을 낮추는 것이 피항동작시 선회경이 줄어들므로 유리하다.\n6) 이용할 수 있는 수심과 흘수의 관계\n수심이 얕으면 천수의 영향을 받고, 수로에서는 육안영향을 받으므로 속력을 낮추어 이들의 영향을 줄이는 것이 좋다.", "id": 1035}, {"category": "COLREG!", "question": "2. 레이더 사용 가능 선박", "answer": "레이더 사용이 가능한 선박은 위의 6가지를 포함하여 아래 사항을 안전속력을 결정함에 고려하여야 한다.\n1) 레이더 장비의 특성, 성능 및 한계\n레이더에 ARPA가 탑재된 선박이 있다. 알파는 상대선박에 대한 정보를 플로팅의 필요 없이 바로 얻을 수 있는 반면, 재래식 레이더는 상대선박에 대한 정보를 얻기 위하여는 플로팅 시간이 필요하므로 재래식 레이더만을\n장착하고 있는 선박은 알파탑재 선박에 비하여 저속으로 항행하여야 할 필요가 있다.\n2) 사용되고 있는 레이더 레인지에 의한 제약\n장거리 레인지(예컨대 12마일)를 사용하고 있으면 물표의 발견시간은 빠르나 작은 물표는 화면에 나타나지 않을 것이고, 단거리 레인지(예컨대 3마일)를 사용하고 있으면 작은 물표라도 잘 나타나지만 물표발견시간이 너무\n늦게 된다. 단거리 레인지만을 사용할 수 있는 경우에는 장거리 레인지를 사용할 수 있는 경우보다 감속하여야 할 것이다.\n3) 해면상태, 기상 및 기타의 장애요인이 레이더 탐지에 미치는 영향\n비가 강하게 내릴 때나 파도가 높을 때에는 레이더에 반사파가 많이 잡히어 큰 물표라도 식별이 어렵게 된다.\n이 때에는 STC(해면반사 억제기능)와 FTC(우설반사 억제기능)를 사용하여야 하지만, 물표가 가까이 있을 가능성이 있으므로 감속하는 것이 좋다.\n4) 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서도 레이더에 의하여 탐지가 아니될 수도 있다는 사실\n소형선으로서 목선이나 FRP선박은 근거리에서도 레이더 탐지가 되지 않는 경향이 있으므로 이를 발견하여도\n효과적인 피항동작을 취할 시간적인 여유가 충분하지 않은 경우가 많다. 그러므로 목선이나 FRP선박이 나타날 우려가 있는 지역에서의 안전속력은 그렇지 않은 경우보다 낮아야 할 것이다. 유빙도 레이더파에 대한 반사가\n잘 되지 않는 물체이므로 위와 같다.\n5) 레이더에 의하여 탐지된 선박의 척수, 위치 및 동향\n탐지되는 선박의 척수가 많으면 충돌의 위험이 높아지므로 감속할 필요성이 있다. 선미보다 선수에 선박이 많이 있으면 더 위험하다.\n6) 부근에 있는 선박이나 기타 물건과의 거리를 레이더로 측정하면 정확한 시정의 판단이 가능하다는 사실\n현재의 시정이 얼마인지를 알기 어려운 경우가 많다. 이때 부근의 선박이나 물체와의 거리를 측정하면 시정이\n얼마인지 알 수 있다. 예컨대, 레이더상으로 2마일에 나타난 선박이 육안으로 겨우 보이는 상태라면 시정은 최대 2마일이 된다.", "id": 1036}, {"category": "COLREG!", "question": "14. Bare Steerage Way 가 무엇인가?", "answer": "안전속력에는 다음과 같은 조건이 붙어있다. “충돌을 피할 수 있도록 적절하고 유효한 동작을 취하고 그 당시의 사정과 상태에 알맞는 거리에서 정선할 수 있도록 항상 안전한 속력으로 항행하여야 한다”\n1) 모든 경우에 적절하고 유효한 피항동작을 취할 수 있는 속력의 기본 요건은 타효가 전제로 되지 아니하면\n의미가 없다. 따라서 어떠한 경우라도 절박한 충돌위험이 있는 때를 제외하고는 타효를 내는 속력은 필요하다.\n2) ‘그때의 상황에 알맞는 거리에서 정선한다’ 함은 시정의 반이 되는 거리가 당시의 속력에 대한 최단정지거리가 되도록 알맞는 속력을 선택하여야 할 것이다.\n위의 1), 2)의 조건은 가장 나쁜 여건하에서의 규칙상의 요건이다. 그러므로 날씨가 청명하고 주위에 왕래하는\n선박이 별로 없는 대양상에서는 낼 수 있는 최대의 속력이 곧 안전속력의 요건을 구비하지만 선박 교통이 폭주하는 좁은 수도나 항 부근에서는 타효가능최저속력(Bare steerage way)이 안전 속력이 된다.", "id": 1037}, {"category": "COLREG!", "question": "15. 콜레그 제6조 안전속력을 한글과 영어로 말하시오.", "answer": "모든 선박은, 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과 상태에 알맞은\n거리에서 정선할 수 있도록 항상 안전한 속력으로 항행하여야 한다.\nEvery vessel shall at all times proceed at a safe speed so that she can take proper and effective action to avoid\ncollision and be stopped within a distance appropriate to the prevailing circumstances and conditions.\n[추가 질문] 만약 선장이라 생각하고 안전속력을 몇 kts로 운전할 것인가?\n상황에 따라서 달라질 수 있다. 수심이 깊고 교통량이 없는 대양에서는 20kts 이상으로도 운항이 가능하지만,\n싱가폴 St. 같은 교통량이 많고 수심이 낮은 지역에서는 조종이 가능한 최저의 속도까지 낮출 수도 있기 때문에 안전속력을 몇 kts라고 정의하기는 힘들다.\n[추가 질문] 대답 중, ‘안전속력 결정 요소’ 라고 하였는데 그것에 대해 설명하시오.\n* 안전속력을 결정하는 조건 (안전속력 결정 시 고려사항)\n안전한 속력을 결정함에 있어서 다음의 요소를 고려하여야 한다.\n(a) 모든 선박에 대하여:\n(ⅰ) 시정의 상태;\n(ⅱ) 어선 혹은 기타 선박들의 집결을 포함한 교통량의 밀도;\n(ⅲ) 그 당시의 상태하에서, 특히 정지거리와 선회능력을 참작한 선박의 조종성능;\n(ⅳ) 야간에 육상 등화 또는 자선의 등화의 역산광으로부터 오는 것과 같은 배경 광선의 존재 여부;\n(ⅴ) 바람, 해면 및 조류의 상태, 그리고 항해 장애물의 근접상태;\n(ⅵ) 항행 가능한 수심과 흘수;\n(b) Radar 사용가능선박이 추가하여 고려할 사항:\n(ⅰ) Radar 장비의 특성, 능력 및 한계;\n(ⅱ) 활용되는 Radar 거리 눈금에서 오는 제약;\n(ⅲ) 해면상태, 기상 및 기타의 장애요인이 Radar 탐색에 미치는 영향;\n(ⅳ) 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서 Radar에 의하여 탐지되지 아니할 수도 있다는 사실;\n(ⅴ) Radar에 의하여 탐지된 선박의 척수, 위치 및 이동상태;\n(ⅵ) 부근의 선박이나 기타의 목표물의 거리를 측정하기 위하여 Radar을 사용할 때 할 수 있는 보다 정확한 시정의 추정;", "id": 1038}, {"category": "COLREG!", "question": "16. 안전 속력에 관하여 설명하시오.", "answer": "*충방, 선박의 입항 및 출항 등에 관한 법률상, 해사안전법상\n1) 충방 제6조, 안전속력의 의미\n모든 선박은, 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과 상태에 알맞은 거리에서 정선할 수 있도록 항상 안전한 속력으로 항행하여야 한다. 안전한 속력을 결정함에 있어서 다음의 요소를 고려하여야 한다.\n(a) 모든 선박에 대하여:\n(ⅰ) 시정의 상태;\n(ⅱ) 어선 혹은 기타 선박들의 집결을 포함한 교통량의 밀도;\n(ⅲ) 그 당시의 상태하에서, 특히 정지거리와 선회능력을 참작한 선박의 조종성능;\n(ⅳ) 야간에 육상 등화 또는 자선의 등화의 역산광으로부터 오는 것과 같은 배경 광선의 존재 여부;\n(ⅴ) 바람, 해면 및 조류의 상태, 그리고 항해 장애물의 근접상태;\n(ⅵ) 항행 가능한 수심과 흘수;\n(b) Radar 사용가능선박이 추가하여 고려할 사항:\n(ⅰ) Radar 장비의 특성, 능력 및 한계;\n(ⅱ) 활용되는 Radar 거리 눈금에서 오는 제약;\n(ⅲ) 해면상태, 기상 및 기타의 장애요인이 Radar 탐색에 미치는 영향;\n(ⅳ) 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서 Radar에 의하여 탐지되지 아니할 수 도 있다는 사실;\n(ⅴ) Radar에 의하여 탐지된 선박의 척수, 위치 및 이동상태;\n(ⅵ) 부근의 선박이나 기타의 목표물의 거리를 측정하기 위하여 Radar을 사용할 때 할 수 있는 보다 정확한\n시정의 추정;\n2) 선박의 입항 및 출항 등에 관한 법률상 안전속력이란\n제17조(속력 등의 제한)\n① 선박이 무역항의 수상구역 등이나 무역항의 수상구역 부근을 항행할 때에는 다른 선박에 위험을 주지 아니할 정도의 속력으로 항행하여야 한다.\n② 국민안전처장관은 선박이 빠른 속도로 항행하여 다른 선박의 안전 운항에 지장을 초래할 우려가 있다고\n인정하는 무역항의 수상구역 등에 대하여는 해양수산부장관에게 무역항의 수상구역 등에서의 선박 항행\n최고속력을 지정할 것을 요청할 수 있다.\n③ 해양수산부장관은 제2항에 따른 요청을 받은 경우 특별한 사유가 없으면 무역항의 수상구역 등에서 선박\n항행 최고속력을 지정·고시하여야 한다. 이 경우 선박은 고시된 항행 최고속력의 범위에서 항행하여야 한다.\n3) 해사안전법상 안전속력이란\n제64조(안전한 속력)\n① 선박은 다른 선박과의 충돌을 피하기 위하여 적절하고 효과적인 동작을 취하거나 당시의 상황에 알맞은 거리에서 선박을 멈출 수 있도록 항상 안전한 속력으로 항행하여야 한다.\n② 제1항에 따른 안전한 속력을 결정할 때에는 다음 각 호(레이더를 사용하고 있지 아니한 선박의 경우에는 제1호부터 제6호까지)의 사항을 고려하여야 한다.", "id": 1039}, {"category": "COLREG!", "question": "17. 콜레그 제5조, 6조, 7조, 8조에 대해 말해보라.", "answer": "* 제5조 견시\n모든 선박은 시각 및 청각은 물론 그 당시의 사정과 상태에 적절한 모든 유효한 수단을 동원하여,\n처하여있는 상황 및 충돌의 위험을 충분히 평가할 수 있도록 항상 적절한 견시를 유지하여야 한다.\n* 참고: 견시 요원의 증강, 주의깊게 레이더 관찰, 무중신호와 혼동을 방지하기 위한 갑판상 청락작업 중지 등\n가능한 모든 수단을 동원하여야 함.\n* 제6조 안전한 속력\n모든 선박은, 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과 상태에 알맞은\n거리에서 정선할 수 있도록 항상 안전한 속력으로 항행하여야 한다. 안전한 속력을 결정함에 있어서 다음의 요소를 고려하여야 한다.\n(a) 모든 선박에 대하여:\n(ⅰ) 시정의 상태;\n(ⅱ) 어선 혹은 기타 선박들의 집결을 포함한 교통량의 밀도;\n(ⅲ) 그 당시의 상태하에서, 특히 정지거리와 선회능력을 참작한 선박의 조종성능;\n(ⅳ) 야간에 육상 등화 또는 자선의 등화의 역산광으로부터 오는 것과 같은 배경 광선의 존재 여부;\n(ⅴ) 바람, 해면 및 조류의 상태, 그리고 항해 장애물의 근접상태;\n(ⅵ) 항행 가능한 수심과 흘수;\n(b) Radar 사용가능선박이 추가하여 고려할 사항:\n(ⅰ) Radar 장비의 특성, 능력 및 한계;\n(ⅱ) 활용되는 Radar 거리 눈금에서 오는 제약;\n(ⅲ) 해면상태, 기상 및 기타의 장애요인이 Radar 탐색에 미치는 영향;\n(ⅳ) 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서 Radar에 의하여 탐지되지 아니할 수 도 있다는 사실;\n(ⅴ) Radar에 의하여 탐지된 선박의 척수, 위치 및 이동상태;\n(ⅵ) 부근의 선박이나 기타의 목표물의 거리를 측정하기 위하여 Radar을 사용할 때 할 수 있는 보다 정확한\n시정의 추정;\n*참고: 안전한 속력은 명시적으로 정해지지 않았다. 왜냐하면 그 당시 상황이나 선박의 상태 등에 따라서\n안전한 속력은 18노트가 될 수도 있고 10노트가 될 수도 있기 때문이다. 따라서 안전한 속력을 결정함에\n있어서는 다음의 요소를 고려하여야 한다.\n(a) 모든 선박에 대하여;\n① 시정의 상태: 당시 시정은 몇 마일(혹은 야드)인가\n② 선박의 교통량 밀도: 가고자 하는 항로에 얼마나 많은 선박들이 있는가\n③ 그 당시 상태 하에서 자선의 정지거리와 선회능력을 포함한 조종성능\n④ 야간에 육상 등화, 자선의 등화의 역산광과 같은 배경광의 존재 여부: 야간 항해시 등화 식별에\n혼란을 주는가\n⑤ 바람, 해면, 조류상태와 항해 장애물의 근접상태\n⑥ 수심과 흘수\n이에 추가하여 레이더 사용이 가능한 선박이 추가로 고려해야할 사항은;\n① 레이더의 특성, 성능, 한계: 레이더 연식, 사용 주파수, 거리대 등\n② 레이더 거리 눈금에서 오는 제약\n③ 해면상태, 기상 및 기타 장애요인이 레이더 탐색에 미치는 영향: 폭우, 거친 해상상태 등은\n레이더 탐지에 영향을 준다\n④ 소형선, 유빙, 기타 부유물은 일정 거리에서 레이더 탐지가 되지 않을 수도 있다\n⑤ 탐지된 선박의 척수, 위치, 이동상태\n⑥ 거리를 측정하기 위하여 레이더를 사용: 1마일 우현 정횡에 레이더로 물체가 탐지되었고,\n우현 정횡에 육안으로 선박이 지나가고 있는 것이 희미하게 관측된다면 당시 시정은 1마일이다.\n(물론, 주변에 그 선박외에 다른 물체나 부유물이 없다고 가정한다면) 일반적으로 안전한 속력은\n그 당시 사정과 상태에 알맞는 거리에서 정선할 수 있는 속력을 말한다.\n* 제7조 충돌의 위험\n(a) 모든 선박은 충돌 위험의 유무를 판단하기 위하여 당시의 사정과 상태에 적절한 모든 유용한 수단을\n이용하여야 한다. 만일 의심스러우면 그와 같은 위험이 존재한다고 보아야 한다.\n(b) Radar를 장비하고 작동 가능하면, 충돌의 위험에 대한 조기경보를 얻기 위한 장거리주사, Radar작도, 또는\n같은 효과를 얻을 수 있는 탐지된 물체의 체계적인 관측 등을 포함하여 Radar 장비를 올바르게 사용하여야 한다;\n(c) 불확실한 정보, 특히 Radar에 의한 불확실한 정보에 근거를 두고 억측을 하여서는 안된다.\n(d) 충돌의 위험 유무를 결정함에 있어서는 다음의 사항을 고려하여야 한다.\n(i) 만일 접근중인 선박의 나침의방위가 현저히 변화하지 않을 때에는 충돌의 위험이 존재한다고 보아야 한다.\n(ii) 그와 같은 위험은 때에 따라서는 방위의 변화가 충분한 경우에도 있을 수 있으며, 특히 거대형선이나\n예인선열에 접근하거나 근거리에서 다른 선박에 접근하는 경우는 그러하다.\n* 참고: 모든 선박은 충돌 위험의 유무를 판단하기 위하여 당시의 사정과 상태에 적절한 모든 수단을\n이용하여야 하며 의심스러우면 충돌위험이 존재한다고 봐야 함. 레이더 장비를 올바르게 사용할 것, 불확실한\n정보, 특히 레이더에 의한 불확실한 정보에 근거를 두고 억측하여서는 아니됨. 만일 접근중인 선박의 방위가\n현저히 변화하지 않을때에는 충돌의 위험이 존재하며 방위의 변화가 충분한 경우에도 거대형선이나 예인선열에 접근하거나 근거리에서 타 선박에 접근할 경우 충돌의 위험이 존재함.\n* 제8조 충돌을 피하기 위한 동작\n(a) 충돌을 피하기 위한 모든 동작은 이 장의 항법 규칙에 따라서 취하여져야 되고, 사정이 허락하는 한,\n적극적으로 또 충분한 시간을 두고 적절한 선박운용술에 따라 행하여야 한다.\n(b) 충돌을 피하기 위한 침로와 속력의 동시변경, 침로 또는 속력 만의 변경은, 사정이 허락하는 한, 육안이나\n또는 Radar에 의하여 관찰하고 있는 타선에게 즉시 명백하도록 충분히 하여야 한다. 연속적인 작은 침로와\n속력의 변경, 침로 또는 속력만의 변경은 피하여야 한다.\n(c) 만일 충분한 해면이 있고 적시에 충분하게 행하고 다른 또 하나의 근접상태가 형성되지 아니한다면, 침로만의 변경도 근접 상황을 피하는 가장 유효한 동작이 될 수 있다.\n(d) 타선과의 충돌을 피하기 위하여 취하는 동작은 안전한 거리를 두고 항과하도록 하여야 한다. 취한 동작의\n효과는 타선이 완전히 항과할 때까지 주의깊게 확인하여야 한다.\n(e) 충돌을 피하기 위하여 또는 상황을 판단하는데 더 많은 시간을 얻기 위하여, 필요하다면 선박은 감속을 하거나 또는 모든 타력을 없애기 위하여 기관을 정지하거나 역전하여야 한다.\n(f) (i) 이 규칙의 어느 규정에 의하여 다른 선박의 통항 또는 안전 통항을 방해하지 아니하도록 요구된 선박은, 그 당시의 사정이 요구할 때는, 다른 선박의 안전통항을 위한 충분한 수역이 부여될 수 있도록 조기에 동작을\n취하여야 한다.\n(f) (ii) 다른 선박의 통항 또는 안전통항을 방해하지 아니하도록 요구된 선박이 충돌의 위험이 내포되도록 다른 선박에 접근하면 그 책임을 면할 수 없다. 따라서, 동작을 취할 때는, 이 장의 규정이 요구하는 동작에 대하여\n충분한 고려를 하여야 한다.\n(f) (iii) 통항의 방해를 받지 아니하도록 되어 있는 선박은, 두 선박이 충돌의 위험을 안고 접근할 때는 이 장의 규정을 충실하게 이행할 의무가 있다.\n*참고: 충돌을 피하기 위한 동작 → 적극적으로, 충분한 시간을 두고, 적절한 선박 운용술에 따라 침로와 속력의 동시 변경, 침로 또는 속력만의 변경은 사정이 허락하는 한 육안이나 레이더에 의해 관찰하고 있는 타선에게\n명확할 수 있도록 충분히 하여야 한다. 충분한 해역에서는 침로의 변경만으로 회피동작을 취할 수 있으며 안전한 거리를 두고 타선을 피해야 한다. 그리고 충돌을 피하기 위해, 또는 상황을 판단하기 위해 더 많은 시간을\n얻고자 한다면 기관을 정지하거나 역전을 하여야 한다. 다른 선박의 통항 또는 안전통항을 방해하지 아니하도록 요구된 선박(즉 피항선)은,\n① 조기에 동작을 취할 것\n② 충돌의 위험이 내포되도록 타 선박에 접근하면 책임을 면할 수 없음\n③ 이 장의 규정을 충실히 이행할 의무가 있음", "id": 1040}, {"category": "COLREG!", "question": "18. 충방 제7조는 충돌의 위험인데 어떠한 상황이 충돌의 위험이 있는 상황인가?", "answer": "(a) 모든 선박은 충돌 위험의 유무를 판단하기 위하여 당시의 사정과 상태에 적절한 모든 유용한 수단을\n이용하여야 한다. 만일 의심스러우면 그와 같은 위험이 존재한다고 보아야 한다.\n(b) Radar를 장비하고 작동 가능하면, 충돌의 위험에 대한 조기경보를 얻기 위한 장거리주사, Radar 작동, 또는\n같은 효과를 얻을 수 있는 탐지된 물체의 체계적인 관측 등을 포함하여 Radar 장비를 올바르게 사용하여야 한다.\n(c) 불확실한 정보, 특히 Radar에 의한 불확실한 정보에 근거를 두고 억측을 하여서는 아니된다.\n(d) 충돌의 위험 유무를 결정함에 있어서는 다음의 상항을 고려하여야 한다.\n(ⅰ) 만일 접근 중인 선박의 나침의방위가 현저히 변화하지 않을 때에는 충돌의 위험이 존재한다고 보아야 한다.\n(ⅱ) 그와 같은 위험은 때에 따라서는 방위의 변화가 충분한 경우에도 있을 수 있으며, 특히 거대형선이나\n예인선열에 접근하거나 근거리에서 다른 선박에 접근하는 경우는 그러하다.", "id": 1041}, {"category": "COLREG!", "question": "19. 콜레그 제8조 충돌을 피하기 위한 동작에 대해서 설명하시오.", "answer": "1. 충돌을 피하기 위한 모든 동작은 명확하고, 충분히 여유 있는 시간에 적당한 선박운용술에 따르도록 상당한\n주의를 다해서 행한다.\n2. 충돌을 피하기 위한 침로, 속력의 변경은 다른 선박이 용이하게 알아 볼 수 있도록 충분히 크게 한다.\n3. 조종수역이 충분히 넓어 침로의 변경만으로 근접상태를 피하는 경우 대각도 변침한다.\n4. 충돌을 피하기 위한 동작은 안전한 거리를 두고 통과할 수 있어야 한다. 그 동작의 효과는 다른 선박이\n완전히 지나가 버릴 때까지 주의깊게 확인한다.\n5. 충돌을 피하기 위하여 또는 상황을 판단하기 위한 시간적 여유를 얻기 위하여 필요하다면 자선의 속력을\n늦추거나 또는 추진수단을 정지 혹은 역전하여 선박의 전진력을 완전히 멈추어야 한다.", "id": 1042}, {"category": "COLREG!", "question": "20. 충방 제8조 중 3가지 중요한 것을 말하고 영어로도 기술하시오.", "answer": "적극적으로, 충분한 시간, 적절한 선박 운용술\nBe Positive, Made in ample time and with due regard to the observance of good seamanship", "id": 1043}, {"category": "COLREG!", "question": "19. 콜레그 제8조 충돌을 피하기 위한 동작에 대해서 설명하시오.", "answer": "1. 충돌을 피하기 위한 모든 동작은 명확하고, 충분히 여유 있는 시간에 적당한 선박운용술에 따르도록 상당한\n주의를 다해서 행한다.\n2. 충돌을 피하기 위한 침로, 속력의 변경은 다른 선박이 용이하게 알아 볼 수 있도록 충분히 크게 한다.\n3. 조종수역이 충분히 넓어 침로의 변경만으로 근접상태를 피하는 경우 대각도 변침한다.\n4. 충돌을 피하기 위한 동작은 안전한 거리를 두고 통과할 수 있어야 한다. 그 동작의 효과는 다른 선박이\n완전히 지나가 버릴 때까지 주의깊게 확인한다.\n5. 충돌을 피하기 위하여 또는 상황을 판단하기 위한 시간적 여유를 얻기 위하여 필요하다면 자선의 속력을\n늦추거나 또는 추진수단을 정지 혹은 역전하여 선박의 전진력을 완전히 멈추어야 한다.", "id": 1044}, {"category": "COLREG!", "question": "4. 콜레그 협수도와 다른 국내 법이 무엇인지, 내용 5가지", "answer": "협수도는 9조 (모든시계) 내용으로 대답했고 개항질서법에 따른 항로 통항방식 5개 말해보라고 하셔서 5개 말씀드렸습니다.\n1) 콜레그\n제9조(협 수 도)\n(a) 협수도나 항로를 따라 진행하고 있는 선박은 안전하고 실행가능하면 그 선박의 우현측에 위치한 수도 혹은\n항로의 외연 가까이를 항행하여야 한다.\n(b) 길이 20미터 미만인 선박이나 범선은 협수도나 항로내에서만 안전하게 항행할 수 있는 선박의 진로를\n방해하여서는 아니된다.\n(c) 어로에 종사하고 있는 선박은 협수도나 항로내에서 항행하는 타선의 통항을 방해하여서는 아니된다.\n(d) 만일 자선의 횡단이 수도나 항로내에서만 안전하게 항행할 수 있는 선박의 통항을 방해한다면 그 선박은\n협수도나 항로를 횡단하여서는 아니된다. 후자는, 만약 횡단선의 의도가 의심스러울 때에는 34조 (d)에 규정된\n음향신호를 사용할 수 있다.\n(e)\n(ⅰ) 협수도나 항로에서, 피추월선이 안전한 통과를 허락하는 동작을 취하여야만 추월이가능할 때는 추월하는\n선박은 제34조 (e)(ⅰ)에 규정한 적합한 음향신호에 의하여 자선의 의사를 표시하여야 한다. 동의하면, 피추월선은 제34조 (c)(ⅱ)에 규정된 적합한 음향신호를 하고 안전한 통과를 할 수 있도록 조치를 취하여야 한다. 만일\n의문이 있으면 피추월선은 제34조 (d)에 규정된 음향신호를 할 수 있다.\n(ⅱ) 이 조는 제13조에 규정된 추월선의 의무를 면제하지 아니한다.\n(f) 중간에 개재하는 장애물 때문에 타선을 볼 수 없는 협수도나 항로의 만곡부 또는 구역에 접근하는 선박은\n특별한 경계와 주의를 하여 항행하여야 하며 제34조 (e)에 규정된 적합한 음향신호를 하여야 한다.\n(g) 사정이 허락하는 한 모든 선박은 협수도내에서 묘박을 피하여야 한다.\n24. 콜레그 제9조 협수도, 10조 통항분리방식에서 항해 시 통항분리대에서 떨어져 우측외연\n으로 항행해야 하는 이유는? 통항분리대에 들어갈수 있는 선박은?\n이것은 이 선 또는 대에 접근되면 충돌을 유발할 염려가 있기 때문이다. 절박한 위험을 피하기 위한 긴급한 경우,\n분리대 내에서 어로에 종사하고자 하는 경우에는 통항분리대에 들어갈 수 있다라고 규정되어 있기 때문에\n가능한 한 우측 외연으로 항행하여 사고를 미연에 방지하여야 한다.", "id": 1045}, {"category": "COLREG!", "question": "5. COLEGS RULE 15 에 대해 설명하시오", "answer": "제15조 횡단상태\n두 척의 동력선이 서로 진로를 횡단할 경우에 충돌의 위험이 있을 때에는 다른 선박을 우현측에 두고 있는 선박이 다른 선박의 진로를 피하여야 하며, 사정이 허락하는 한, 다른 선박의 전방을 횡단하여서는 아니된다.\nRule15 Crossing Situation\nWhen two power-driven vessels are crossing so as to involve risk of collison, the vessel which has the other on her own starboard side shall keep out of the way and shall, if the circumstances of the case admit, avoid crossing ahead of the other vessel.", "id": 1046}, {"category": "COLREG!", "question": "2. 충방 19조 제한된 시계 내 변침만으로 충돌 피하지 않아야 하는 경우 2가지", "answer": "(d) 레이다만으로 다른 선박이 존재함을 탐지한 선박은 근접상태의 형성과 충돌의 위험 또는 충돌의 위험이 있는가의 여부를 결정하여야 한다. 그러한 위험이 있으면 충분한 시간을 두고 회피동작을 취하여야 한다. 다만, 그러한 동작이 변침만으로 이루어질 경우에는 가능한 한 다음과 같은 동작은 피하여야 한다:\n(ⅰ) 추월당하고 있는 선박에 대한 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여 좌현측(左舷側)으로 변침하는 일;\n(ⅱ) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침하는 일.\n제4조(적 용)\n이 절의 규칙은 모든 상태의 시계에 대하여 적용한다.\n제5조(견시)\n모든 선박은 시각 및 청각은 물론 그 당시의 사정과 상태에 적절한 모든 유효한 수단을 동원하여, 처하여 있는 상황 및 충돌의 위험을 충분히 평가할 수 있도록 항상 적절한 견시를 유지하여야 한다.\n제6조(안전속력)\n모든 선박은, 충돌을 피하기 위하여 적절하고 유효한 동작을 취할 수 있고 그 당시의 사정과 상태에 알맞은 거리에서 정선할 수 있도록 항상 안전한 속력으로 항행하여야 한다. 안전한 속력을 결정함에 있어서 다음의 요소를 고려하여야 한다.\n(a) 모든 선박에 대하여;\n(ⅰ) 시정의 상태;\n(ⅱ) 어선 혹은 기타 선박들의 집결을 포함한 교통량의 밀도;\n(ⅲ) 그 당시의 상태하에서, 특히 정지거리와 선회능력을 참작한 선박의 조종성능;\n(ⅳ) 야간에 육상 등화 또는 자선의 등화의 역산광으로부터 오는 것과 같은 배경 광선의 존재 여부;\n(ⅴ) 바람, 해면 및 조류의 상태, 그리고 항해 장애물의 근접상태;\n(ⅵ) 항행 가능한 수심과 흘수;\n(b) Radar 사용가능선박이 추가하여 고려할 사항;\n제18조에는 \"제9조, 제10조 및 제13조에서 달리 규정하는 경우를 제외하고\"라는 단서 조항이 있다.\n제9조(협 수 도)\n(a) 협수도나 항로를 따라 진행하고 있는 선박은 안전하고 실행가능하면 그 선박의 우현측에 위치한 수도 혹은 항로의 외연 가까이를 항행하여야 한다.\n(b) 길이 20미터 미만인 선박이나 범선은 협수도나 항로내에서만 안전하게 항행할 수 있는 선박의 진로를\n방해하여서는 아니된다.\n(c) 어로에 종사하고 있는 선박은 협수도나 항로내에서 항행하는 타선의 통항을 방해하여서는 아니된다.\n(d) 만일 자선의 횡단이 수도나 항로내에서만 안전하게 항행할 수 있는 선박의 통항을 방해한다면 그 선박은\n협수도나 항로를 횡단하여서는 아니된다. 후자는, 만약 횡단선의 의도가 의심스러울 때에는 34조 (d)에 규정된\n음향신호를 사용할 수 있다.\n(e)\n(ⅰ) 협수도나 항로에서, 피추월선이 안전한 통과를 허락하는 동작을 취하여야만 추월이가능할 때는 추월하는\n선박은 제34조 (e)(ⅰ)에 규정한 적합한 음향신호에 의하여 자선의 의사를 표시하여야 한다. 동의하면, 피추월선은 제34조 (c)(ⅱ)에 규정된 적합한 음향신호를 하고 안전한 통과를 할 수 있도록 조치를 취하여야 한다. 만일\n의문이 있으면 피추월선은 제34조 (d)에 규정된 음향신호를 할 수 있다.\n(ⅱ) 이 조는 제13조에 규정된 추월선의 의무를 면제하지 아니한다.\n(f) 중간에 개재하는 장애물 때문에 타선을 볼 수 없는 협수도나 항로의 만곡부 또는 구역에접근하는 선박은\n특별한 경계와 주의를 하여 항행하여야 하며 제34조 (e)에 규정된 적합한 음향신호를 하여야 한다.\n(g) 사정이 허락하는 한 모든 선박은 협수도내에서 묘박을 피하여야 한다.", "id": 1047}, {"category": "COLREG!", "question": "22. 콜레그 좁은 수로에 관한 조문을 설명하시오. (콜레그 제9조 순서대로 설명하시오)", "answer": "*제9조 협수도\na. 협수도나 항로를 따라 진행하고 있는 선박은 안전하고 실행가능하면 그 선박의 우현측에 위치한 수도 혹은\n항로의 외연 가까이를 항행하여야 한다.\nb. 길이 20미터 미만인 선박이나 범선은 협수도나 항로내에서만 안전하게 항행할 수 있는 선박의 진로를\n방해하여서는 아니된다.\nc. 어로에 종사하고 있는 선박은 협수도나 항로내에서 항행하는 타선의 통항을 방해하여서는 아니된다.\nd. 만일 자선의 횡단이 수도나 항로내에서만 안전하게 항행할 수 있는 선박의 통항을 방해한다면 그 선박은\n협수도나 항로를 횡단하여서는 아니된다. 후자는, 만약 횡단선의 의도가 의심스러울 때에는 34조(d)에 규정된\n음향 신호를 사용할 수 있다.\ne.\ni) 협수도나 항로에서, 피추월선이 안전한 통과를 허락하는 동작을 취하여야만 추월이 가능할 때는 추월하는\n선박은 제34조 (c)(i)에 규정한 적합한 음향신호에 의하여 자선의 의사를 표시하여야 한다. 동의하면, 피추월선\n제34조(c)(ii)에 규정된 적합한 음향신호를 하고 안전한 통과를 할 수 있도록 조치를 취하여야 한다. 만일 의문\n있으면 피추월선은 제34조(d)에 규정된 음향신호를 할 수 있다.\nii) 이 조는 제13조에 규정된 추월선의 의무를 면제하지 아니한다.\nf) 중간에 개재하는 장애물 때문에 타선을 볼 수 없는 협수도나 항로의 만곡부 또는 구역에 접근하는 선박은\n특별한 경계와 주의를하여 항행하여야 하며 제34조(e)에 규정된 적합한 음향신호를 하여야 한다.\ng) 사정이 허락하는 한 모든 선박은 협수도내에서 묘박을 피하여야 한다.\n*협수도란?\n선박이 서로 상반되는 방향으로 또는 같은 방향으로 침로를 잡고 항행하지 아니하면 곧 또는 잠시후에 항해상의 위험이나 충돌상의 위험에 직면하게 되는 수도를 협수도라고 말할 수 있다.", "id": 1048}, {"category": "COLREG!", "question": "23. COLREG 제9조 협수로에서의 항해에 대하여 설명하시오.", "answer": "1. 협수도나 항로를 따라 진행하고 있는 선박은 안전하고 실행가능하면 그 선박의 우현측에 위치한 수도 혹은\n항로의 외연 가까이를 항행하여야 한다.\n2. 길이 20미터 미만인 선박이나 범선은 협수도나 항로내에서만 안전하게 항행할 수 있는 선박의 진로를\n방해하여서는 아니된다.\n3. 어로에 종사하고 있는 선박은 협수도나 항로내에서 항행하는 타선의 통항을 방해하여서는 아니된다.\n4. 만일 자선의 횡단이 수도나 항로내에서만 안전하게 항행할 수 있는 선박의 통항을 방해한다면 그 선박은\n협수도나 항로를 횡단하여서는 아니된다. 후자는, 만약 횡단선의 의도가 의심스러울 때에는 34조(d)에 규정된\n음향 신호를 사용할 수 있다.\n5. (i) 협수도나 항로에서, 피추월선이 안전한 통과를 허락하는 동작을 취하여야만 추월이 가능할 때는 추월하는\n선박은 제34조(c) (i)에 규정한 적합한 음향신호에 의하여 자선의 의사를 표시하여야 한다.\n동의하면, 피추월선은 제34조(c) (ii)에 규정된 적합한 음향신호를 하고 안전한 통과를 할 수 있도록 조치를\n취하여야 한다. 만일 의문이 있으면 피추월선은 제34조(d)에 규정된 음향신호를 할 수 있다.\n(ii) 이 조는 제13조에 규정된 추월선의 의무를 면제하지 아니한다.\n6. 중간에 개재하는 장애물 때문에 타선을 볼 수 없는 협수도나 항로의 만곡부 또는 구역에 접근하는 선박은\n특별한 경계와 주의를하여 항행하여야 하며 제34조(e)에 규정된 적합한 음향신호를 하여야 한다.", "id": 1049}, {"category": "COLREG!", "question": "COLREG 제9조 협수로 A항 한글로 주고 영어 해석하시오.", "answer": "(a) 좁은 수로 또는 안전 항로대를 따라 진행하고 있는 선박은, 안전하고 또 실행 가능한 한, 자선의 우현쪽에\n있는 수로 또는 안전항로대 바깥쪽 한계에 접근하여 항행하여야 한다.\nA vessel proceeding along the course of a narrow channel or fairway shall keep as near to the outer limit of the\nchannel or fairway which lies on her starboard side as is safe practicable.", "id": 1050}, {"category": "COLREG!", "question": "24. 콜레그 제9조 협수도, 10조 통항분리방식에서 항해 시 통항분리대에서 떨어져 우측외연으로 항행해야 하는 이유는? 통항분리대에 들어갈수 있는 선박은?", "answer": "이것은 이 선 또는 대에 접근되면 충돌을 유발할 염려가 있기 때문이다. 절박한 위험을 피하기 위한 긴급한 경우,\n분리대 내에서 어로에 종사하고자 하는 경우에는 통항분리대에 들어갈 수 있다라고 규정되어 있기 때문에\n가능한 한 우측 외연으로 항행하여 사고를 미연에 방지하여야 한다.\n제10조(통항분리방식)\n(a) 이 조문은 본 기구가 채택한 통항분리방식에 적용하며 어떤 선박에게도 다른 규정에 의한 의무를 면제하는\n것은 아니다.\n(b) 통항분리방식을 사용하는 선박은 :\n(ⅰ) 적합한 통로내에서 그 통로의 일반적인 교통방향을 따라서 진행하여야 한다;\n(ⅱ) 가능한 한 통항분리선 또는 분리대에서 멀리 떨어져야 한다;\n(ⅲ) 통상적으로 지정통로에 합류하거나 이탈할 때에는 통로의 시발점이나 종점에서 그렇게 하여야 한 다. 그러나 한 측면에서 합류하거나 이탈할 때는 일반적인 교통방향에 대하여 가능한 한 소각도로 그렇게 하여야 한다.\n(c) 선박은 가능한 한, 지정통로를 횡단하는 것을 피하여야 하지만 부득이 그렇게 하지 아니하면 아니되는\n경우에는 일반적인 교통방향에 대하여, 자선의 선수방향이 가능한 한 직각에 가깝게 횡단하여야 한다.\n(d )\n(i) 가까이 있는 통항분리방식내에 있는 적합한 통로를 안전하게 사용할 수 있는 선박은 연안 통항대를 사용하여서는 아니된다. 그러나 길이 20미터 미만의 선박, 범선 및 어로에 종사중인 선박은 연안 통항대를 사용할 수\n있다.\n(ⅱ) (d )항 (ⅰ)의 규정에도 불구하고 인접한 항구로 출입항 하는 선박, 연안 통항대내에 위치하여 있는 기지,\n구조물 또는 도선사 승하선 장소에 출입하는 선박이나 급박한 위험을 피하기 위한 선박은 연안 통항대를 사용할 수 있다.\n(e) 통로를 횡단하는 선박 또는 통로에 진입하거나 통로를 떠나는 선박 이외의 선박은 아래의 경우를 제외하고는 통상적으로, 분리대내에 들어가거나 분리선을 넘어서는 아니된다.\n(ⅰ) 절박한 위험을 피하기 위한 긴급한 경우\n(ⅱ) 분리대내에서 어로에 종사하고자 하는 경우\n(f) 통항분리방식의 종점부근을 항해하는 선박은 특별한 주의를 하며 항행하여야 한다.\n(g) 선박은 통항분리방식내 혹은 그 종점부근의 해역에서 가능한 한 묘박을 피하여야 한다.\n(h) 통항분리방식을 이용하지 아니하는 선박은 가능한 한 넓은 여지를 두고 그것을 피하여야한다.\n(i) 어로에 종사중인 선박은 통로를 따라 진행하는 모든 선박의 통행을 방해하여서는 아니된다.\n(j) 길이 20미터 미만의 선박이나 범선은 통로를 따라 진행하는 동력선의 안전한 통행을 방해하여서는 아니된다.\n(k) 통항분리대 내에서 항해의 안전을 유지하기 위한 작업에 종사중이기 때문에 기동성이 제한되어 있는 선박은 그 작업을 수행하는데 필요한 범위내에서 이 규칙의 준수가 면제된다.\n(l) 통항분리대 내에서 해저전선의 부설, 보수 또는 인양작업에 종사중이기 때문에 기동성이 제한되어 있는\n선박은 작업을 수행하는데 필요한 범위내에서 이 규칙의 준수가 면제된다", "id": 1051}, {"category": "COLREG!", "question": "TSS에서 통항분리대 안에 들어갈 수 있는 경우를 말하시오.", "answer": "(e) 통로를 횡단하는 선박 또는 통로에 진입하거나 통로를 떠나는 선박 이외의 선박은 아래의 경우를 제외하고는 통상적으로, 분리대 내에 들어가거나 분리선을 넘어서는 아니 된다.\n(i) 절박한 위험을 피하기 위한 긴급한 경우\n(ii) 분리대 내에서 어로에 종사하고자 하는 경우", "id": 1052}, {"category": "COLREG!", "question": "TSS를 가로질러 가는 선박은 통항분리대 안에 들어갈 수 있는지 말하시오.", "answer": "(c) 선박은 가능한 한, 지정통로를 횡단하는 것을 피하여야 하지만 부득이 그렇게 하지 아니하면 아니되는\n경우에는 일반적인 교통방향에 대하여, 자선의 선수방향이 가능한 한 직각에 가깝게 횡단하여야 한다.", "id": 1053}, {"category": "COLREG!", "question": "TSS를 가로질러 가는 선박과 항로를 따라가는 선박이 만나 충돌의 위험이 있을", "answer": "경우 피항하는 방법을 말하시오.\n가로질러 가는 선박과 항로를 따라가는 선박 상호간의 충돌의 위험이 있을 경우, 피항선/유지선의 조항에 따르며,\n8조 충돌을 피하기 위한 동작에 따라서 피항하여야 한다.", "id": 1054}, {"category": "COLREG!", "question": "26. 통항분리대를 사용할 수 있는 경우", "answer": "해사안전법\n제6장 선박의 항법 등\n제1절 모든 시계상태에서의 항법\n제68조(통항분리제도)\n⑤ 통항로를 횡단하거나 통항로에 출입하는 선박 외의 선박은 급박한 위험을 피하기 위한 경우나 분리대 안에서 어로에 종사하고 있는 경우 외에는 분리대에 들어가거나 분리선을 횡단하여서는 아니 된다.\n⑥ 통항분리수역에서 어로에 종사하고 있는 선박은 통항로를 따라 항행하는 다른 선박의 항행을 방해하여서는 아니 된다.\n⑧ 선박은 통항분리수역과 그 출입구 부근에 정박(정박하고 있는 선박에 매어 있는 것을 포함한다)하여서는 아니 된다. 다만, 해양사고를 피하거나 인명이나 선박을 구조하기 위하여 부득이하다고 인정되는 사유가 있는 경우에는 그러하지 아니하다.\n⑪ 통항분리수역 안에서 해저전선을 부설·보수 및 인양하는 작업을 하거나 항행안전을 유지하기 위한 작업을 하는 중이어서 조종능력이 제한되고 있는 선박은 그 작업을 하는 데에 필요한 범위에서 제1항부터 제10항까지의 규정을 적용하지 아니한다.", "id": 1055}, {"category": "COLREG!", "question": "25. 연안통항대에 대해서,", "answer": "해사안전법\n제2조(정의)\n26. \"분리선\"(分離線) 또는 \"분리대\"(分離帶)란 서로 다른 방향으로 진행하는 통항로를 나누는 선 또는 일정한 폭의 수역을 말한다.\n27. \"연안통항대\"(沿岸通航帶)란 통항분리수역의 육지 쪽 경계선과 해안 사이의 수역을 말한다.", "id": 1056}, {"category": "COLREG!", "question": "27. ITZ(Inshore Trafiic Zone)가 무엇인지 설명하시오.", "answer": "통항분리수역의 육지쪽 경계선과 해안 사이의 수역을 ITZ라고 한다.", "id": 1057}, {"category": "COLREG!", "question": "28. ITZ를 이용 가능한 선박을 말하시오.", "answer": "1) 길이 20미터 미만의 선박\n2) 범선\n3) 어로에 종사하고 있는 선박\n4) 인접한 항구로 입,출항하는 선박\n5) 연안통항대 안에 있는 해양시설 또는 도선사의 승하선 장소에 출입하는 선박\n6) 급박한 위험을 피하기 위한 선박", "id": 1058}, {"category": "COLREG!", "question": "29. 통항분리방식에서 중요한 항법 3가지는 무엇인지?", "answer": "*중요한 항법 3가지는?\n(i) 적합한 통로내에서 그 통로의 일반적인 교통방향을 따라서 진행하여야 한다;\n(ii) 가능한 한 통항분리선 또는 분리대에서 멀리 떨어져야 한다;\n(iii) 통상적으로 지정통로에 합류하거나 이탈할 때에는 통로의 시발점이나 종점에서 그렇게 하여야 한다.\n그러나 한 측면에서 합류하거나 이탈할 때는 일반적인 교통방향에 대하여 가능한 한 소각도로 그렇게\n하여야 한다.\n제 2 절 상호시계내에 있는 선박의 운항\n제11조(적 용)\n이 절의 규정은 상호 시계내에 있는 선박에 적용한다.\nRules in this section apply to vessels in sight of one another.\n제12조(범 선)\n(a) 2척의 범선이 서로 접근하여 충돌의 위험이 있을 경우에는 그 중 한쪽의 범선이 다른 범선을 다음과 같이 피하여야 한다:\n(ⅰ) 각 선박이 서로 다른 현측에서 바람을 받고 있는 경우에는 좌현측에서 바람을 받고 있는 선박이 다른 선박의 진로를 피하여야 한다;\n(ⅱ) 두 선박이 같은 현측에서 바람을 받고 있는 경우에는 풍상측의 선박이 풍하측의 선박의 진로를 피하여야 한다;\n(ⅲ) 좌현측에 바람을 받고 있는 선박이 다른 선박을 풍상측에 보며 다른 선박이 바람을 좌현측에서 받고 있는지 우현측에서 받고 있는지 확실히 알 수 없는 경우에는 다른 선박의 진로를 피하여야 한다.\n(b) 이 조문 규정의 적용에 있어서 풍상측이라 함은 주범을 펴고 있는 측의 반대측 또는 횡범선에 있어서는 최대의 종범을 펴고 있는 측의 반대측을 말한다.\n제13조(추 월)\n(a) 추월선은 제2장 제1절에 있는 규칙의 여하한 규정에도 불구하고 추월당하는 선박의 진로를 피하여야 한다.\n(b) 다른 선박의 정횡후 22.5도를 넘는 후방 즉, 추월당하는 선박과의 관계에 있어서 야간에는 그 선박의 선미등만을 볼 수 있고 현등을 볼 수 없는 선박은 추월선으로 보아야 한다.\n(c) 다른 선박을 추월하고 있는지의 여부에 관하여 의문이 있는 선박은 자선이 추월하고 있는 경우로 생각하고 이에 합당한 동작을 취하여야 한다.\n(d) 두 선박간의 방위가 그 후에 여하히 변경되더라도 추월선이 본 규칙상의 의미에 있어서의 횡단선으로 되는\n것은 아니며 또한 추월선은 완전히 앞질러 멀어질 때까지 추월당하는 선박의 진로를 피하여야 할 의무를\n벗어나지 못한다.\n*추월선의 정의를 설명하시오.\n다른 선박을 추월하고 있는 모든 선박은 추월당하고 있는 선박의 진로를 피하여야 한다.", "id": 1059}, {"category": "COLREG!", "question": "5. 콜레그 해석 (상호시계내에 마주치는 동력선 본문 해석)", "answer": "제14조(정면으로 마주치는 상태)\n(a) 충돌의 위험이 내포되도록 2척의 동력선이 반대되는 방향 또는 거의 반대되는 방향으로 마주치는 경우에는 각 선박은 서로 다른 선박의 좌현측을 통과할 수 있도록 각기 우현측으로 변침하여야 한다.\n(b) 서로 다른 선박을 선수방향 또는 거의 선수방향에서 보는 경우 즉, 야간에는 다른 선박의 두개의 마스트 정부등을 일직선 또는 거의 일직선상에서 보며 동시에 양현등을 볼 수 있는 경우, 그러한 마스트 정부등이나 또는 양현등만을 볼 수 있는 경우, 그리고 주간에 있어서는 다른 선박의 상응하는 면을 보는 경우에는 정면으로 마주치는 상태가 존재한다고 보아야 한다.\n(c) 그러한 상태가 존재하는가의 여부에 관하여 의문이 있는 선박은 정면으로 마주치는 상태에 있다고 생각하고 행동하여야 한다.\nSuch a situation shall be deemed to exist when a vessel sees the other ahead or nearly ahead and by night she could see the masthead lights of the other in a line or nearly in a line and/or both sidelights and by day she observes the corresponding aspect of the other vessel.\n(c) 그러한 상태가 존재하는가의 여부에 관하여 의문이 있는 선박은 정면으로 마주치는 상태에 있다고 생각하고 행동하여야 한다.\nWhen a vessel is in any doubt as to whether such a situation exists she shall assume that it does exist and act accordingly.\n제15조(횡단상태)\n두 척의 동력선이 서로 진로를 횡단할 경우에 충돌의 위험이 있을 때에는 다른 선박을 우현측에 두고있는 선박이 다른 선박의 진로를 피하여야 하며, 사정이 허락하는 한, 다른 선박의 전방을 횡단하여서는 아니된다.\nWhen two power-driven vessels are crossing so as to involve risk of collision, the vessel which has the other on her own starboard side shall keep out of the way and shall, if the circumstances of the case admit, avoid crossing ahead of the other vessel.\n제16조(피항선의 동작)\n이 규칙에 의하여 다른 선박의 진로를 피하여야 할 선박은 타선을 확실하게 피할 수 있도록 가능한한 조기에 충분한 동작을 취하여야 한다.\nEvery vessel which is directed to keep out of the way of another vessel shall, so far as possible, take early and substantial action to keep well clear.\n제17조(유지선의 동작)\n(a) (ⅰ) 두 선박중의 한 선박이 다른 선박의 진로를 피하여야 할 경우 다른 선박은 그 침로 및 속력을 유지하여야 한다.\nWhere one of two vessels is to keep out of the way the other shall keep her course and speed.\n(ⅱ) 그러나 유지선은 진로를 피하여야 할 선박이 이 규칙에 따른 적절한 동작을 취하지 아니하고 있음이 분명하여지는 즉시로 자선의 조종만으로서 충돌을 피하기 위한 동작을 취할 수 있다.\nThe latter vessel may however take action to avoid collision by her manoeuvre alone, as soon as it becomes apparent to her that the vessel required to keep out of the way is not taking appropriate action in compliance with these Rules.\n(b) 이유는 불문하고 침로와 속력을 유지하여야 할 선박은, 양선이 아주 가까이 접근하였기 때문에, 피항선의 동작만으로 충돌을 피할 수 없다고 판단할 때에는 충돌을 피하기 위한 최선의 협력동작을 취하여야 한다.\n(c) 횡단 상태에서 다른 동력선과 충돌을 피하기 위하여 이 조문 (a)항 (ⅱ)의 규정에 따라 동작을 취하는 선박은 상황이 허락하는 한, 자선의 좌현측에 있는 선박을 피하기 위하여 좌현측으로 변침하여서는 아니된다.\n(d) 이 조문은 피항선에게 진로를 피하여야 할 의무를 면제하는 것은 아니다.\n제18조(선박상호간의 책임한계)\n제9조, 제10조 및 제13조에서 달리 규정하는 경우를 제외하고:\n(a) 항행중인 동력선은 다음 선박의 진로를 피하여야 한다.:\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박;\n(ⅲ) 어로에 종사하고 있는 선박;\n(ⅳ) 범선.\n(b) 항행 중인 범선은 다음 선박의 진로를 피하여야 한다. :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박;\n(ⅲ) 어로에 종사하고 있는 선박.\n(c) 어로에 종사하고 있는 선박이 항행중에 있을 때에는 가능한 한 다음 선박의 진로를 피하여야 한다. :\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박;\n(ⅱ) 조종성능에 제한을 받고 있는 선박.\n(d)\n(ⅰ) 운전이 자유롭지 못한 상태에 있는 선박 또는 조종성능에 제한을 받고 있는 선박 이외의 선박은 상황이 허락하는 한 흘수에 제약을 받아 제28조의 신호를 표시하고 있는 선박의 안전한 통행을 방해하지 아니하도록 하여야 한다.\n(ⅱ) 흘수의 제약을 받는 선박은 자선의 특수한 조건에 충분히 유의하고 특별히 조심하여 운항하여야 한다.\n(e) 수면상에 떠있는 수상항공기는 원칙적으로 모든 선박으로부터 충분히 떨어져서 그들의 항행을 방해하지 아니하도록 하여야 한다. 다만, 충돌의 위험이 있는 경우에는 이 장의 항법규정에 따라야 한다.\n(f)\n(i) 이륙, 착륙 및 표면에 근접하여 비행시에, WIG선은 다른 모든 선박과 확실한 간격을 유지하여야 하며 그들의 항해를 방해하지 않도록 하여야 한다;\n(ii) 수면 위를 운항하는 WIG선은 동력구동 선박과 같이 이 편의 규칙을 준수하여야 한다.\n제 3 절 제한시계내에서의 선박운항\n제19조(제한시계내에서의 선박운항)\n(a) 이 조문은 선박이 상호 시계내에 있지 아니하고 시계가 제한된 상태하에 놓여있는 수역 또는 그 부근에서 운항하는 경우에 적용된다.\n(b) 모든 선박은 시계가 제한된 그 당시의 상태에 적합한 안전한 속력으로 항행하여야 한다. 동력선은 즉시 조작할 수 있도록 기관의 준비태세를 갖추어야 한다.\nEvery vessel shall proceed at a safe speed adapted to the prevailing circumstances and conditions of restricted visibility. A power-driven vessel shall have her engines ready for immediate manoeuvre.\n(c) 모든 선박은 이 장 제1절 항법규정을 이행함에 있어서 시계가 제한된 당시의 상황과 상태에 충분히 유의하여야 한다.\n(d) 레이다만으로 다른 선박이 존재함을 탐지한 선박은 근접상태의 형성과 충돌의 위험 또는 충돌의 위험이 있는가의 여부를 결정하여야 한다. 그러한 위험이 있으면 충분한 시간을 두고 회피동작을 취하여야 한다. 다만, 그러한 동작이 변침만으로 이루어질 경우에는 가능한 한 다음과 같은 동작은 피하여야 한다:\n(ⅰ) 추월당하고 있는 선박에 대한 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여 좌현측(左舷側)으로 변침하는 일;\n(ⅱ) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침하는 일.\n(e) 충돌의 위험이 없다고 인정되었을 경우를 제외하고, 자선의 정횡의 전방으로 믿어지는 곳에서 다른 선박의 무중신호를 듣거나 또는 그 정횡의 전방에 있는 다른 선박과 근접상태를 면할 수 없는 모든 선박은 자선의 침로를 유지함에 필요한 최저한도의 속력으로 감속하여야 한다. 필요하다면 모든 타력을 없이 하여야 하고 어떠한 경우에도 충돌의 위험이 사라질 때까지 극도로 조심하여 운항하여야 한다.\n*해사안전법\n제2조(정의) 이 법에서 사용하는 용어의 뜻은 다음과 같다.", "id": 1060}, {"category": "COLREG!", "question": "13. \"조종제한선\"(操縱制限船)이란 다음 각 목의 작업과 그 밖에 선박의 조종성능을 제한하는 작업에 종사하고 있어 다른 선박의 진로를 피할 수 없는 선박을 말한다.", "answer": "가. 항로표지, 해저전선 또는 해저파이프라인의 부설·보수·인양 작업\n나. 준설(浚渫)·측량 또는 수중 작업\n다. 항행 중 보급, 사람 또는 화물의 이송 작업\n라. 항공기의 발착(發着)작업\n마. 기뢰(機雷)제거작업\n바. 진로에서 벗어날 수 있는 능력에 제한을 많이 받는 예인(曳引)작업", "id": 1061}, {"category": "COLREG!", "question": "운전부자유선, 조종불능선, 조종제한선에 대한 콜레그 상의 의미를 말하시오.", "answer": "1. 운전부자유선 = 조종불능선, 예외적인 사정으로 인하여 조종될 수 없고 따라서 타선의 진로를 피할 수 없는 선박을 말한다.\n*조타기기의 고장, 주기나 추진기 계통의 고장 등\n2. 조종제한선: 항로표지, 해저 전선 또는 해저 파이프라인의 부설, 보수 및 인양 작업, 준설작업, 항행 중 보급, 사람의 이송 또는 화물의 이적으로 인한 조종에 제한을 받는 상태의 선박을 말한다.", "id": 1062}, {"category": "COLREG!", "question": "조종제한선과 흘수제약선의 무중신호는 어떻게 울려야 하는가?", "answer": "2분간을 초과하지 않는 간격으로 연속 3음(장음1, 단음2)을 울려야 한다.", "id": 1063}, {"category": "COLREG!", "question": "50. 조종성능 제한선박으로 분류되는 조업중인 어선은?", "answer": "(어구를 끌면 다 조종성능제한선이냐라고 되물으셨습니다. 그래서 조종성능제한선에 해당안되는 어선의 특징에 대해 얘기했더니 아니 그러니까 어구만 끌면 다 조종성능제한선이냐고 다시.. ᄒᄒ ..)\n어로중인 선박의 정의에 대하여는 규칙 제3조 (d)항에 명시 되어 있다.\n콜레그 제3조 일반정의\n(d) [어로에 종사하고 있는 선박]이라 함은, 어망, 밧줄, 트로올망 또는 기타 조종성능을 제한하는 어구를 사용하여 어로하고 있는 선박을 말하며, 조종성능을 제한하지 아니하는 인승 기타 어구를 사용하여 어로하고 있는 선박을 포함하지 아니한다.", "id": 1064}, {"category": "COLREG!", "question": "1. 조종성능제한선박", "answer": "선박의 조종성능을 제한하는 작업에 종사하고 있어 다른 선박의 진로를 피할 수 없는 선박을 말한다. 그 예로는;\n①항로표지, 해저전선 또는 해저파이프라인의 부설·보수·인양 작업\n②준설(浚渫)·측량 또는 수중 작업\n③항행 중 보급, 사람 또는 화물의 이송 작업\n④항공기의 발착(發着)작업\n⑤기뢰(機雷)제거작업\n⑥진로에서 벗어날 수 있는 능력에 제한을 많이 받는 예인(曳引)작업\n우리나라 해양안전심판원에 의하면 해묘를 내리고 있는 오징어 채낚이 어선도 여기에 속한다.", "id": 1065}, {"category": "COLREG!", "question": "2. 조종불능선", "answer": "선박의 조종성능을 제한하는 고장 기타와 같은 예외적인 상황 때문에 침로와 속력의 변경이 불가능하게되어\n다른 선박의 진로를 피할 수 없는 선박을 말한다. 기관 고장 혹은 조타기 고장상태에 있는 선박 등이 여기에\n해당한다. 묘를 해저에 내렸으나 완전히 놓이지 아니한 상태와, 바람이 없는 상태의 범선도 운전부자유 상태로 간주된다. 그러나 단순히 입항시간을 기다리기 위하여 기관을 준비한 상태로 정선하고 있는 선박은 운전부자유선이 아니다. 레이더만 고장난 선박은 침로와 속력의 변경에 지장이 없으므로 역시 운전부자유선이\n아니다.\n이들 선박은 국제규칙 제18조상 일반동력선이나 범선 그리고 어로작업중인 선박에 대하여 항법상 우선권을\n갖는다. 조종부자유선이라고도 하나, 해사안전법에서는 조종불능선이라고 한다.\n(d) [어로에 종사하고 있는 선박]이라 함은, 어망, 밧줄, 트로올망 또는 기타 조종성능을 제한하는 어구를 사용하여 어로하고 있는 선박을 말하며, 조종성능을 제한하지 아니하는 인승 기타 어구를 사용하여 어로하고 있는 선박을 포함하지 아니한다.", "id": 1066}, {"category": "COLREG!", "question": "2. 조종불능선", "answer": "선박의 조종성능을 제한하는 고장 기타와 같은 예외적인 상황 때문에 침로와 속력의 변경이 불가능하게되어\n다른 선박의 진로를 피할 수 없는 선박을 말한다. 기관 고장 혹은 조타기 고장상태에 있는 선박 등이 여기에\n해당한다. 묘를 해저에 내렸으나 완전히 놓이지 아니한 상태와, 바람이 없는 상태의 범선도 운전부자유 상태로 간주된다. 그러나 단순히 입항시간을 기다리기 위하여 기관을 준비한 상태로 정선하고 있는 선박은\n운전부자유선이 아니다. 레이더만 고장난 선박은 침로와 속력의 변경에 지장이 없으므로 역시 운전부자유선이\n아니다.\n이들 선박은 국제규칙 제18조상 일반동력선이나 범선 그리고 어로작업중인 선박에 대하여 항법상 우선권을\n갖는다. 조종부자유선이라고도 하나, 해사안전법에서는 조종불능선이라고 한다.\n*충방규칙\n(f) The term \"vessel not under command\" means a vessel which through some exceptional circumstance is unable to manoeuvre as required by these rules and is therefore unable to keep out of the way of another vessel.\n(g) The term \"vessel restricted in her ability to manoeuvre\" means a vessel which from the nature of her work is restricted in her ability to manoeuvre as required by these rules and is therefore unable to keep out of the way of another vessel.\nThe term \"vessels restricted in their ability to manoeuvre\" shall include but not be limited to:\n(i) a vessel engaged in laying, servicing or picking up a navigation mark, submarine cable or pipeline;\n(ii) a vessel engaged in dredging, surveying or underwater operations;\n(iii) a vessel engaged in replenishment or transferring persons, provisions or cargo while underway;\n(iv) a vessel engaged in launching or recovery of aircraft;\n(v) a vessel engaged in mine clearance operations;\n(vi) a vessel engaged in a towing operation such as severely restricts the towing vessel and her tow in their ability to deviate from their course.", "id": 1067}, {"category": "COLREG!", "question": "51. 어로에 종사하고 있는 선박의 정의를 말하시오.", "answer": "어로에 종사하고 있는 선박이라 함은 어망, 밧줄, 트롤망 또는 기타 조종성능을 제한하는 어구를 사용하여 어로하고 있는 선박을 말한다. 조종성능을 제한하지 아니하는 인승 또는 기타어구를 사용하여 어로하고 있는 선박은 포함하지 아니한다.", "id": 1068}, {"category": "COLREG!", "question": "52. 이에 추가로, 충방에 제시된 조종성능제한선의 종류 6가지는?", "answer": "1) 어로에 종사하고 있는 선박\n2) 예선\n3) 준설선\n4) 잠수작업에 종사하는 선박\n5) 기뢰제거작업에 종사하는 선박\n6) 수중작업에 종사하고 있는 선박", "id": 1069}, {"category": "COLREG!", "question": "53. 조종불능선박의 등화 및 형상물에 대하여 설명하시오.", "answer": "제27조 운전이 자유롭지 못한 선박 또는 조종성능이 제한을 받는 선박\n(a) 운전이 자유롭지 못한 선
