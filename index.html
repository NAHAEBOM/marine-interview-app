!", "question": "88. Meet her steady steady as she goes?", "answer": "steady : 회 두를 줄이라고 명령할 때 쓰인다. (선박의 선회를 가능한 빨리 줄이라는 의미) 가능한 빨리 회두를 줄여 선박을 정침하라.\nmeet her : 회두중 선수의 선회를 억제하시오.\nROT를 줄이라. 정침해야 할 코스가 가까워 지고 있다. 회두가 너무 빨라 다음 코스로의 관계 또는 타 선박과의 통항관계등 다양한 이유에서 선회를 줄이고자 할 때 사용.\nSteady as she goes : 현 침로를 유지 하라.", "id": 136}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "11.타력의 종류", "answer": "-발동타력: 정지중인 선박에 주기관을 전진전속을 발동하여 출력에 해당하는 일정한 속력이 될때까지의 타력\n-정지타력: 일정한 속력으로 전진 중인 선박이 기관을 정지하여 선체가 정지할 때까지의 타력\n-회두타력:\n-변침회두타력: 선박이 일정한 소력으로 항주하다가 타각을 주면 회두하는데, 일정각도를 회두하는데 요하는 시간, 진출거리, 각변위량등\n-정침회두타력: 일정한 각도로 회두한 후 어떤침로로 정짐하기 위하여 타를 중앙으로 하였을 때, 선박이 회두를 멈추고 일정침로의 직선상에 정짐하게 될 때 타력", "id": 137}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "12.프린트물을 나눠주셨는데 그림에 방파제 북쪽 항내 묘박지에서 묘박선 세척이 뭉쳐있는 그림을 주시고 양묘후 출항하기위한 본선의 조선방법을 물어보셨음.", "answer": "변침점 설정시 피험선 설정 방법과, 기억이 잘 안나지만 무슨 공식이 어떻게 되는지 질문", "id": 138}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. critical rpm이란", "answer": "임계회전속도축의 회전속도가 축계의 고유진동수와 같아지며, 축이 이상한 진동을 일으킬 때의 축의 회전속도", "id": 139}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5.tubo charger 무엇인가?", "answer": "엔진의 배기가스를 이용하여 엔진에 더 많은 공기를 불어넣어 효율성을 높이는 기계", "id": 140}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 선박에서 파공이 발생했을 경우 대처할 수 있는 방법을 설명하세요.", "answer": "1) 방수방법", "id": 141}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 방수판 또는 방수 Mat의 취부", "answer": "2) 적용방법\n1. 항행 중이라면, 사정이 허락하면 기관을 정지하든지 혹은 미속 정도로 항행하여 파공부를 풍하측에 두고 조선한다.", "id": 142}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 승조원을 곧바로 방수부서에 붙여 침수개소의 탐지와 원인을 확인한다.", "answer": "3. 누수 부분에 균열이 일어날 때는 나무쐐기 등을 치고, 그 위에 타월 또는 기름을 친다.\n4. 파공이 작을 때는 내부로부터 모포 또는 오래된 범포를 대고 나무쐐기를 치든지하고 그 위에 시멘트로 때운다.", "id": 143}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "6. 이상의 방수조치를 계속하고, 배수펌프로 침수구획으로부터 침수한 물을 퍼낸다. 침수량이 배수량보다 많은 경우에도 배수는 계속해야 한다.", "answer": "7. 방수작업의 가능 한도는 파공부의 직경 20cm, 파공부의 깊이 1.5m 정도이다.\n7. 침수의 기준 손상복원력 관련 criteria (SOLAS 2006 Amend / Chapter II-1 / 제 7-3 규칙)", "id": 144}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 일반구역의 침수율", "answer": "이 규칙의 구획 및 손상복원성 계산상 각 일반구역 또는 구획의 부분에 대한 침수율은 다음과 같다.", "id": 145}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 화물구역의 침수율", "answer": "이 규칙의 구획 및 손상 복원성 계산상 각 화물구역 또는 구획의 부분에 대한 침수율은 다음과 같다.", "id": 146}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "8. 선체 파공이 생겼을 시 침수량 구하는 공식", "answer": "W: 침수량\nC: 침수계수\nA: 파공면적\ng: 중력가속도\nh: 파공 중심에서 수면까지의 높이", "id": 147}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. 불워크란?", "answer": "선박의 상갑판 및 선루 갑판의 폭로된 부분의 선측에 파도가 갑판 위로 직접 올라오는 것을 방지하고, 선창 입구 등의 갑판구를 보호하며, 갑판 위의 안전한 통행을 위하여 설치하는 구조물을 말한다. 보통의 선박에서는 상갑판에는 불워크(Bulwark)를 설치하지만 선루갑판이나 그 상층의 갑판에서는 파랑의 영향이 작으므로, Bulwark 대신 Guard rail을 설치하는 것이 보통이다.", "id": 148}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "6. 선박을 beaching 시킬때의 적합한 장소?", "answer": "암반이 없고, 경사가 완만한 곳 지반이 딱딱하여 해저면의 suction작용이 없고 강조류나 swell이 없는 외해에 노출되지 않은 해안 조수 간만의 차가 상당히 있는 곳", "id": 149}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "68. 터닝서클의 요소들 및 WOP 구하는 법을 말하시오.", "answer": "- Wheel Over Position으로 전타점이라 말하며 전타점 선정 기준은 본선 속력, 타각, 변침각, Max ROT\n- WOP = Reach(심거) + 각거\n- WOP = Reach + Rra * θ / (2*60)= Reach + Rra * Tan(θ/2)\n- Reach = 사용타각에서 선수 Heading 이 10도 변할 때까지 시간을 진행 선속과 곱함\n- Rra(선회반경) = Speed / ROT\n- θ = 변침각", "id": 150}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "68. 터닝서클의 요소들 및 WOP 구하는 법을 말하시오.", "answer": "1. 심거 (Reach): 타를 전타한 시점부터 실제로 선박이 선회를 시작하기 전까지 직진하는 거리입니다.\n공식: t1 x V (지연 시간 x 속력)", "id": 151}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 각거 (Kick/Gak-geo): 변침각에 따라 발생하는 전진 거리입니다.", "answer": "3. 신침로거리 (WOP - Wheel Over Point): 새로운 침로에 정착하기 위해 타를 꺾어야 하는 지점까지의 전체 거리입니다. (심거 + 각거)", "id": 152}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 선미 Kick 현상: 선회 초기, 타의 반작용과 원심력 때문에 선미가 원래 항로의 바깥쪽으로 밀려나는 현상입니다. 보통 배 길이의 1/4~1/7 정도 발생하므로 좁은 수로에서 주의해야 합니다.", "answer": "Rra : 반경\n1단계: 심거 (Reach)\"지금 꺾어!\"라고 명령(Wheel Over)을 내려도 기계가 작동하고 배가 반응하는 데 시간이 걸립니다. 그동안 배가 그대로 직진해버리는 거리입니다.\n2단계: 각거 (Kick)배가 실제로 회전하기 시작하면서 옆으로 비스듬히 나아가는 거리입니다. 이미지 2번의 곡선 구간(b에서 c까지)이라고 보시면 됩니다.\n3단계: 신침로거리 (WOP - Wheel Over Point)결국 내가 원하는 새로운 항로에 딱 올라타기 위해, 미리 타를 꺾어야 하는 전체 거리입니다. (심거 + 각거)", "id": 153}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "36. 반타변침법", "answer": "1) 주로 심수심에서 선수부가 변침점으로부터 약 신침로거리 정도 전방에 접근하면 변침각도의 약 반의 타각을 사용하여 변침 시작한다.\n2) 선체가 적절히 신침로로 정침을 하기 위해 midships 또는 반대타를 발령하는 시점은 선회중인 선수 방위에서부터 신침로까지 잔류각도가 현 사용타각의 반 정도되는 시점에서 발령함과 동시에 선회억제용을 반대타각도 사용타각의 반 정도를 사용하여 조타하는 것을 말한다.", "id": 154}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "37. Ease – to – ten 변침", "answer": "1) 반타변침법의 변형으로 거대형선이나 고속에서 적용\n2) Panamax 60,000DWT급 벌크화물선의 조선자가 현재침로 000o에서 우현타각 Starboard 20o를 발령하여 대각도 40o를 변침하면서 신침로 040o에 정침할 경우, 선수침로(heading)가 신침로까지 잔류각도가 변침시작 발령타각(S20o) 정도로 접근하여 020o를 통과할때 “이서텐 (Starboard 10o)”을 발령한다. 그리고 회두속도가 감속되면서 선수침로가 신침로로부터 약 10o전방 030o를 통과하면 midships을 발령하고 회두속도율(rate of turn)을 고려하면서 반대현 타각 port 10o를 발령하여 서서히 정침하면 된다.", "id": 155}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "38. Slip", "answer": "슬립이라 함은 엔진마일과 실제항해마일의 차를 퍼센티지로 나타낸 값을 말합니다.\n양(+)의 값일 경우 기상, 해면상태, 선저상태 등의 저항에 의해 항해에 방해를 받은 것을 의미하고\n음(-)의 경우, following sea나 바람에 의해 영향을 받을 때 나타납니다.\nPercentage of Slip = (Engine distance – Observed distance) / Engine distance * 100\nEngine distance in nautical mile = (Pitch x revolutions per day)", "id": 156}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "39. 항해 중 선수트림이 되는 이유를 쓰시오.", "answer": "선박이 항해할 때 선박은 앞쪽으로 물을 밀어낸다. 수중의 공백을 만들지 않기 위하여 밀어난 물의 부피만큼 선측과 선저로부터 물이 유입되어야 한다. 흡입류의 유선은 선저에서 가속되면 이 현상이 수압의 감소를 가져오고 수직으로 침하되는 결과로 나타난다. 또한 이때 CB (방형비척계수에 의한 조건으로) 0.7이상이면 선수 트림, 0.7이하이면 선미 트림이다.\n항해 중 트림 변화(Squat)의 원인 보충", "id": 157}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 베르누이 정리와 수압의 변화", "answer": "선박이 전진하면 선체 주변의 물 흐름(유선)이 빨라집니다. 특히 선저(배 밑바닥)와 수로 바닥 사이의 좁은 공간을 지날 때 유속이 급격히 가속되는데, 베르누이의 정리에 의해 유속이 빨라지면 수압은 낮아집니다. 이로 인해 배를 위로 떠받치는 힘이 줄어들어 배가 아래로 가라앉게(Sinkage) 됩니다.", "id": 158}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. CB(방형비척계수)에 따른 트림 결정", "answer": "단순히 가라앉는 것뿐만 아니라 앞뒤 중 어느 쪽이 더 많이 가라앉느냐는 배의 모양(뚱뚱한 정도)에 결정됩니다.\n선수 트림 (CB 0.7 이상, 비대한 선박):\n벌크선이나 유조선처럼 몸집이 큰 배들은 선수(이물) 부분이 뭉툭합니다.\n항해 시 선수 쪽에서 물을 밀어내는 저항이 크고, 이로 인해 선수 근처의 유속 변화와 압력 감소가 더 크게 일어납니다. 따라서 앞쪽이 더 깊게 가라앉는 선수 트림이 발생합니다.\n선미 트림 (CB 0.7 이하, 날렵한 선박):\n컨테이너선이나 여객선처럼 날렵한 배들은 상대적으로 선미(고물) 쪽에 추진기(Propeller)와 복잡한 유동이 집중됩니다. 이 경우 압력 강하가 선미 쪽에서 더 두드러지게 나타나 뒤쪽이 더 가라앉는 선미 트림이 생깁니다.", "id": 159}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "40. 선박 조타용어 대해 설명하세요 (Steady, Steady as she goes, Meet her)", "answer": "①Steady: Reduce swing as rapidly as possible. 가능한 빨리 정침하라.\n②Steady as she goes: Steer a steady course on the compass heading indicated at the time of the order. The helmsman is to repeat the order and call out the compass heading on receiving the order. When the vessel is steady on that heading, the helmsman is to call out: \"Steady on ...\"\n조타 명령 시의 콤파스 헤딩이 지시하는 코스로 정침하라.\n③Meet her: Check the swing of the vessel ́s head in a turn.(\"Meet her.\" To check, but not stop, the swing by putting the rudder in the opposite direction. Usually this order is used when it is desired to keep the ship from swinging past her new course.) 원하는 코스에 가까워지고 있으니 반대타를 써서 선회각속도를 줄이되 멈추지는 말아라\n* 네번째 문제는 너무도 잘 아는 steady라는 타각 지시 용어에 대한 질문입니다. 당연히 steady와 steady as she goes의 차이를 묻는 문제였습니다. 그런데 면접관님이 추가로 문의하신 것 중에, 210도를 잡으라는 내용의 영작이었습니다. 4명의 피면접관 모두 \"steady 210\" 라고 얘기했는데, 면접관님이 steady 뒤에는 숫자가 바로 오지 못한다고 하시면서 \"steady on\" 이라고 전치사 on을 사용해야 한다고 친절하게 알려주셨습니다. 그럼에도 steady on 210는 틀렸다고 하셨습니다. 정답은 \"steer 210 이며, 이에 대해 타가 210을 다 잡고 나면 타수가 보고를 할때, \"steady on 210 sir\" 이라고 해야 한다고 합니다. 즉 타각 지시는 steady 가 아닌 steer 을 사용하는 것이 옳은 표현이라고 합니다. 항해사들이 통상적으로 steady를 사용하지만 옳은 표현은 그렇다고 합니다. 저도 몰랐네요... ^^", "id": 160}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 개요", "answer": "선박에는 나선형 프로펠러가 주로 쓰이며, 종류에는 고정피치프로펠러와 가변피치프로펠러가 있다. 피치(Pitch)는 프로펠러가 1회전 하면서 선박이 이동하는 거리를 뜻하며, FPP는 프로펠러가 고정되어 있기 때문에 Pitch가 일정하고 CPP는 프로펠러 각도가 바뀌기 때문에 Pitch control이 가능하다.", "id": 161}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 고정피치프로펠러 (FPP ; Fixed Pitch Propeller)", "answer": "pitch가 고정되어 있어 선박 후진 시에 엔진 가동 자체를 역전해야 한다. 축계 회전수가 실속 이하로 저하된 후에 역전 되어야 하므로 선박 전, 후진시에 시간이 많이 소요된다. 또한 선박 전,후진 시마다 시동 공기를 소모해야 하고, 연료비도 많아진다. 기관의 수명이 짧아지는 단점이 있다.\n3. 가변피치프로펠러 (CPP ; Controllable Pitch Propeller)\n조종실에서 단순한 조작 만으로 전진, 후진, 저속, 정지 등 자유롭게 선박을 운항할 수 있다. 원격 조정이 가능하고 역전 장치가 필요없어 연료 절감은 물론 단시간에 속도를 올릴 수 있는 장점이 있지만, FPP에 비해 가격이 비싸다. 엔진에서 프로펠러로 연결되는 추진축 중간에 Oil Distributer Box가 설치되고, 여기서 생성된 유압이 추진축계의 중간으로 관통되는 Control Shaft를 작동하기 위한 Servo Cylinder 라는 장치가 별도로 설치 된다.\n그리고 일체형으로 제작되는 FPP와는 달리 프로펠러 허브 내의 중공축의 움직임에 따라 propeller blade의 각도를 변화시키는 control block이 내장되어 있다. CPP는 투영 면적이 작기 때문에 FPP에 비해 추진 효율이 낮고, 별도의 장치를 더 설치해야해서 제작 단가, 유지보수 비용이 많이 든다. LNG, 여객선, RO-RO선, CNTR 등에 쓰인다.", "id": 162}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 싱글 스크루(Single Screw) 선박의 후진 시 거동", "answer": "이 그림은 프로펠러가 하나인 일반적인 선박(우선우회, Right-handed FPP)이 **후진(Astern)**할 때의 움직임을 보여줍니다. 중앙(Midship): 후진을 걸면 프로펠러의 회전 특성(횡압작용) 때문에 선미가 좌현(Left)으로 밀립니다. 과적으로 선수(앞부분)는 우현으로 돌아가게 됩니다.\n타(Rudder) 조작: * Hard Port(좌현 전타): 후진 중 타를 왼쪽으로 꺾으면 타에 부딪히는 수류(RudderForce)가 선미를 왼쪽으로 더 강하게 밀어 선수가 오른쪽으로 급격히 돌아갑니다.\nHard Starboard(우현 전타): 타를 오른쪽으로 꺾으면 타에 의한 힘이 추진기의 횡강력을 상쇄하려 하지만, 저속 후진 시에는 추진기의 힘이 더 강해 여전히 선미가 왼쪽으로 밀리는 경향이 있습니다.", "id": 163}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 쌍추진기(Twin FPP) 선박의 비교", "answer": "고정 피치 프로펠러(FPP)가 두 개 달린 배의 회전 방식을 비교합니다.\n외선식(Outward Turning, A): 왼쪽 프로펠러는 반시계, 오른쪽은 시계 방향으로 돕니다. 한쪽은 전진, 한쪽은 후진을 걸었을 때 발생하는 횡강력이 **배의 선회를 돕는 방향(Assisting Turn)**으로 작용하여 제자리 선회 성능이 좋습니다.\n내선식(Inward Turning, B): 프로펠러가 안쪽으로 돕니다. 이때는 횡강력이 **선회를 방해하는 방향(Opposing Turn)**으로 작용합니다. 다만, 항해 중 전진 추력 효율은 외선식보다 나을 수 있다는 특징이 있습니다.", "id": 164}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 가변피치 쌍추진기(Two CPP) 선박의 비교", "answer": "날개의 각도를 조절하는 가변 피치 프로펠러(CPP)의 경우입니다. CPP는 엔진 회전 방향은 고정된 채 날개 각도만 바뀌므로 FPP와는 횡강력의 방향이 반대로 나타날 수 있습니다.\n외선식(1): CPP에서는 외선식이 오히려 선회를 방해하는 횡강력을 만듭니다 (Opposing Turn).\n내선식(2): 반대로 내선식이 선회를 돕는 횡강력을 만들어 (Assisting Turn) 조종성이 향상됩니다", "id": 165}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 정지 상태에서 전진할 때 (Forward)", "answer": "주로 횡압력과 배출류의 힘이 선체 방향을 결정합니다.\n키 중앙 (Midship):\n초기: 강한 횡압력으로 인해 선수가 좌측으로 돌아갑니다.\n가속 시: 배출류가 강해지면서 선수가 우측으로 돌아가는 경향이 생깁니다.\n우 타각 (Hard Starboard):\n배출류로 인한 키 압력이 횡압력보다 커서 **선수는 우현(우측)**으로 회두합니다. (속력이 빠를수록 현상 강화)\n좌 타각 (Hard Port):\n횡압력과 배출류가 힘을 합쳐 선미를 우측으로 밀어냅니다. 결과적으로 선수는 강력하게 좌측으로 회두합니다.", "id": 166}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 정지 상태에서 후진할 때 (Astern)", "answer": "후진 시에는 흡입류라는 변수가 추가됩니다.\n키 중앙 (Midship):\n횡압력과 배출류의 측압 작용이 선미를 좌현으로 밉니다. 따라서 선수는 우측으로 돌아갑니다.\n우 타각 (Hard Starboard):\n초기에는 힘의 평형을 이루다가, 후진 속력이 붙으면 결국 선수는 좌측으로 회두합니다.\n좌 타각 (Hard Port):\n모든 힘(횡압력, 배출류, 흡입류)이 선미를 좌현으로 밀어냅니다. 따라서 선수는 강하게 우측으로 회두합니다.", "id": 167}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 배출류의 영향", "answer": "1) 전진시: 프로펠러 우회전에 의한 방출류는 프로펠러 측으로부터 상부타면에는 좌에서 우방향으로 부타면은 우에서 좌로 흐름\n– 수류의 타면입사각이 하부가 우세하므로 하부타압력이 우세하게 됨 선미는 좌로, 선수는 우로 회두하게 됨\n– 특히, 타상부가 수면에서 노출된 경우 선수는 수류에 대한 우회두의 경향이 크게 됨\n2) 후진시: 선미로부터 선수로 프로펠러류가 방출됨\n– 선미우현의 선측외판에 깊은 입사각으로 광범위하게 방사되므로 선미를 좌측으로 강하게 누름(방출류의 측압작용)\n– 현저하게 우회두를 가져옴", "id": 168}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 횡압력의 영향", "answer": "– 회전하는 프로펠러 추진력이 수면하에서 상하의 위치차이를 발생시키고, 상부날개보다 하부날개의 력이 우세하기 때문에 발생하는 회두작용임\n– 상부날개의 추진력은 공기의 흡입과 거품(기포)때문에 하부추진력보다 약해짐. 따라서 선미는 하부개에 작용하는 우세한 추진력의 방향으로 움직임. 상부프로펠러의 노출시 이 현상은 더욱 뚜렷함.", "id": 169}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 조선에 미치는 프로펠러의 작용", "answer": "1) 정지에서 전진\n- 키 중앙\n회전초기에 횡압력이 큼 -> 선수 좌회두\n전진속력 증가시 배출류 강해짐-> 선수 우회두\n– 우타각\n배출류로 인하여 키압력 발생, 횡압력보다 큼 ->선미는 좌현 쪽, 선수는 우회두\n– 좌타각\n횡압력과 배출류가 함께 선미를 우현으로 밀어냄 ->선수 좌회두가 강함\n2) 정지에서 후진\n– 키 중앙\n후진시 횡압력과 배출류의 측압작용이 선미를 좌현으로 밀어냄 -> 선수는 우회두\n– 우타각\n횡압력과 배출류가 선미를 좌현으로 밀어내고, 흡입류에 의한 직압력은 선미를 우현으로 밀어서 평형상태를 유지\n– 좌타각\n횡압력, 배출류, 흡입류가 전부 선미를 좌현쪽으로 밀어냄 ->선수는 강하게 우회두\n상황 A] 정지 상태에서 후진 (가장 중요 ⭐)\n후진 시에는 모든 힘이 선수를 우현으로 돌리려는 경향이 강합니다.\n키 중앙: 횡압력(선미 좌향) + 배출류(우현 선미 타격) → 선수 우회두\n우타 (Hard Starboard): 배출류/횡압력(우회두) vs 흡입류(좌회두)가 서로 상쇄되어 평형 유지\n좌타 (Hard Port): 모든 힘(배출류, 횡압력, 흡입류)이 합쳐져 강력한 선수 우회두 발생\n[상황 B] 정지 상태에서 전진\n회전 초기: 전진 속력이 없을 때는 횡압력이 지배적 → 선수 좌회두\n속력 증가 시: 배출류가 타(Rudder)에 작용하는 힘이 강해짐 → 선수 우회두\n좌/우타 사용 시: 배출류에 의한 타 압력이 발생하여 조타 방향으로 회두함 (단, 좌타 시 횡압력과 배출류가 합쳐져 좌회두가 더 강력함)", "id": 170}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 프로펠러 종류에 따른 차이 (후진 시)", "answer": "이 부분은 시험이나 실무에서 자주 혼동하는 포인트입니다.\n고정피치(FPP): 후진하려면 엔진 자체가 역전(반시계 방향)해야 합니다. 배출류가 우현 선미를 때려 선수가 우회두합니다.\n가변피치(CPP): 엔진은 계속 시계 방향으로 돕니다. 날개 각도만 바뀌어 물을 앞으로 보냅니다. 이때 배출류는 좌현 선미를 때려 선수가 좌회두합니다.\n요약 포인트\n\"우선회 고정피치 선박은 후진 시 무조건 선수가 우측으로 돌아가려는 성질이 있다.\" (이를 이용해 접·이안 시 활용합니다.)", "id": 171}, {"category": "해양기상학!", "question": "94. 기상학 아열대 무풍대 그리고 엘리뇨가 일어 나는 이유 및 엘리뇨가 미치는 영향?", "answer": "생기는 원인 : 적도 무역풍의 약화\n미치는 영향 : 필리핀, 인도 네이사, 호주 동북부등지에서는 강수량이 평년보다 적으며 반대로 아열대 지방에서는 많은 강수량을 보인다.", "id": 172}, {"category": "해양기상학!", "question": "95. 3. ASAS, AUAS 700 어떤 약어 인지 물어 보셨고 고층 기상도가 어떤식으로 기상도에 표현 되는지 물어 보셨습니다.", "answer": "AS : Surface analysis\nAU : Upper air analysis\nAw : Wave analysis\nAUAS 700 : 아시아 고층 기상도 700 Hpa\n고층 기상도 : 천기변화나 고,저기압 특히 태풍의 진행을 예상하는데 중요한 자료임.", "id": 173}, {"category": "해양기상학!", "question": "5. 기상 및 해상", "answer": "ASAS KMA 과 AUAS50 JMA\n-. ASAS : 아시아 지상해석도\n-. AUAS : 아시아 고층해석도 예)AUAS50 JMH - 500Hpa 아시아 고층해석도\n-. WTAS : 아시아 TD 및 태풍경보\n-. KMA (Korea Meteorological Agency) ; 한국 기상청 / JMA (Japan Meteorological Agency) ; 일본 기상청\n*고층기상도로 알 수 있는 것? : 천기변화나 고,저기압 특히 태풍의 진행을 예상하는데 중요한 자료임.\n*일기도상에서 우리나라 동해부근에 [W]란 표시가 있는데 무엇을 의미?\n- W : warm(온기), - C : cold(한기)\n☞ 삼각파 ; 진행방향이 서로 다른 풍파나 너울이 서로 부딪쳐서 서로 간섭하여 대단히 높고 뾰죽한 파를 만드는 것이며 한랭전선이 통과할 때 풍향이 급변하므로 일어나고 태풍이 빠른 속도로 진행시, 풍향이 바뀔 때 일어난다.\n☞ 태풍의 진로가 바뀌는 이유? 북위30도 부근에는 중위도 고기압이 머물러 있게 되어 이 고기압 북쪽에는 항상 편서풍이 불고 있다. 중위도 고기압 때문에 일정한 풍향이 없어 태풍은 주로 북상하다가 편서풍지대로 북상하게 되면 북동진하면서 진로가 굽어진다.\n☞ 오호츠크해 기단이 발생하면 어떤 현상 동반? 한랭습윤한 것이 특징. 이 기단은 늦봄부터 발생하기 시작하고 초여름이 되면 우리나라에까지 그 세력을 확장 남쪽의 북태평양 기단과의 사이에 정체전선을 형성 장마전선을 만든다.", "id": 174}, {"category": "해양기상학!", "question": "15. 기상도의 종류 중 WTAS, ASAS는 무엇의 약자인가", "answer": "기상도의 종류관련 약어 설명( TTAAii YYGGgg)\n○1TT\n- A: 해석도(Analysis)\n- F: 예상도(Forecast)\n- W: 경보(Warning)\n- U: 고층 자료(Upper-air Data)\n- C: 평균도(climatic data)\n○2AA\n- AS: 아시아(Asia)\n- FE: 극동(Far East)\n- AE: 동남 아시아(SE Asia)\n- AF: 아프리카(Africa)\n- EU: 유럽(Europe)\n- EW: ,NT: , IO:,PA: , PN: , PS: .\n○3ii\n- 85: 850hPa, 70, 50, 30,\n- 02: 24시간 예상\n- 03: 36시간 예상\n- 04: 48시간 예상\n- 07: 72시간 예상\n- 09: 96시간 예상\n- 12: 120시간 예상\n- 14: 144시간 예상\n- 16: 168시간 예상\n- 19: 192시간 예상.\n○4A (Analysis)\n- AS: Surface Analysis, 지상 분석\n- AU: Upper-air Analysis, 고층분석\n- AW: Wave Analysis, 파고분석\n○5F(Forecast)\n- FS: Surface prognosis, 지상 예상\n- FU: Upper-air prognosis, 고층예상\n- FW: Wave prognosis, 파랑 예상\n*AS: Surface Analysis\n*AU: Upper air Analysis\n*AW: Wave Analysis\n*ASAS: 아시아 지상해석도\n*AUAS 70: 아시아고층해석도 700hpa\n*WTAS: 아시아 기상 및 태풍경보", "id": 175}, {"category": "해양기상학!", "question": "78. 잠열에 대해 설명하시오", "answer": "어떤 물질의 온도를 변하시기키 않고, 물질의 상태만을 변화시키는 열", "id": 176}, {"category": "해양기상학!", "question": "72. 대기 대순환 중 horse latitude의 뜻?", "answer": "아열대무풍대이며, Doldrums(적도무풍대) 및 발생 원인 등도 질문할 분위기 였음", "id": 177}, {"category": "해양기상학!", "question": "32. 기압경도의 의미는?", "answer": "등압선에 직각 방향의 단위거리에 대한 기압의 변화율(기압의 기울기)로 방향과 크기를 갖는 vector량이다.", "id": 178}, {"category": "해양기상학!", "question": "1.기압경도력이란?", "answer": "기압경도력 (Pressure Gradient Force, PGF)", "id": 179}, {"category": "해양기상학!", "question": "1. 정의", "answer": "서로 다른 두 지점 사이의 기압 차이로 인해 발생하는 힘입니다. 공기가 고기압에서 저기압으로 이동하게 만드는 근본적인 원인이며, 바람을 발생시키는 일차적인 힘입니다.", "id": 180}, {"category": "해양기상학!", "question": "2. 주요 특징", "answer": "방향: 등압선에 수직이며, 고기압에서 저기압 방향으로 작용합니다.\n크기: 두 지점 사이의 기압 차가 클수록, 그리고 등압선 사이의 거리가 좁을수록 힘의 세기가 강해집니다.\n기상 변화: 등압선 간격이 촘촘한 곳은 기압경도력이 커서 강한 바람이 붑니다. (예: 태풍의 중심부 인근)", "id": 181}, {"category": "해양기상학!", "question": "4. 다른 힘과의 관계", "answer": "지균풍: 상층 대기에서는 기압경도력과 전향력(코리올리 힘)이 평형을 이루어 등압선에 평행하게 바람이 붑니다.\n지상풍: 지표면 근처에서는 마찰력이 추가되어 바람이 등압선을 가로질러 저기압 쪽으로 약간 불어 들어갑니다.\n1) 열대 저압부 / 열대성 저기압(TD: Tropical depression) : 중심최대풍속이 17m/sec 미만\n2) 열대폭풍(TS: Tropical storm) : 최대풍속이 17~24m/sec\n3) 강한 열대폭풍(STS: Severe tropical storm) : 최대풍속이 25~32m/sec 미만\n4) 태풍(T: Typhoon) : 중심최대풍속이 32m/sec 이상\n: 열대 저기압의 특징은 등압선이 원형이고, 전선을 동반하지 않으며, 에너지가 주로 수증기의 숨은 열이기 때문에 열대의 해양에서 발생, 발달하고 중심에는 태풍의 눈이 있고, 중심 부근에는 특히 바람이 세다.", "id": 182}, {"category": "해양기상학!", "question": "44. 고기압과 저기압의 특성을 설명하시오.", "answer": "1) 고기압 [高氣壓, anticyclone]\n: 주위보다 상대적으로 기압이 높은 곳이며 고기압권 안에서는 하강기류가 있어서 날씨가 맑다. 고기압은 하강기류로 인해 날씨가 맑다. 구름이 있어도 소멸되며 전선이 형성되기 어렵다. 그러나 쇠약단계의 고기압 또는 고기압 후면에서 하층이 가열되면 대기가 불안정하여 대류성 구름이 발생하고 심하면 소나기, 뇌우를 동반한다. 기압이 높은 중심쪽에서 낮은 바깥쪽으로 바람이 분다. 이때 북반구에서는 시계방향으로, 남반구에서는 시계반대방향으로 불어나간다. 풍속은 중심에 가까워질수록 약하다.\n2) 저기압 [低氣壓, depression]\n: 저기압은 주위보다 기압이 상대적으로 낮은 곳으로 기압이 가장 낮은 부분이 저기압의 중심이다.\n저기압 내에서는 주위보다 기압이 낮으므로 바깥쪽부터 안쪽으로 바람이 불어 들어온다.\n지구의 자전으로 지상에서의 바람은 북반구에서는 저기압 중심을 향하여 반시계 방향으로, 남반구에서는 시계방향으로 분다. 저기압 중심 부근의 상승기류에서 단열냉각에 의해 구름이 만들어지고 비가 내리므로, 일반적으로 저기압 내에서는 날씨가 나쁘고 비바람이 강하다. 전선성 저기압과 비전선성 저기압이 있다.", "id": 183}, {"category": "해양기상학!", "question": "56. 태풍의 지역별 명칭을 설명하시오.", "answer": "열대 저기압은 세계 8곳의 열대 해역에서 발생한다.\n발생해역은 북태평양, 북인도양 및 남인도양에 각각 두 곳씩 그리고 북대서양, 남태평양에 각각\n한 곳씩이다.\n각 해역에 있어서의 열대 저기압의 발생 원인이나 구조 등은 모두가 거의 같지만 다음과 같이\n각각 다른 명칭으로 불려지고 있다.\n1) 태풍(Typhoon) : 마리아나(Mariana), 캐롤라인(Caroline), 마샬(Marshall) 군도를 포함하는 북태평양 남서부(경도 180도 이서)의 광대한 해역에서 주로 발생하고 남지나해에서도 약간 발생한다. 대부분이 중ㆍ고위도 지방으로 북상해 오므로 극동지역에 큰 피해를 입힌다.\n2) 허리케인(Hurricane) : 북대서양의 카리브(Carib)해, 서인도제도, 멕시코만과 북태평양의 경도 180도 이동의 멕시코 서쪽 해상, 남인도양(마다가스카르 동쪽 해상), 남태평양에서 발생한다.\n3) 사이클론(Cyclone) : 북인도양 벵골(Bengal)만, 아라비아(Arabia) 해에서 발생한다. 사이클론은\n원래 온대저기압과 열대저기압을 총칭하는 말이지만 북인도양에서는 열대저기압만 발생하므로 이를 사이클론이라고 불러도 혼돈될 염려는 없다.\n4) 윌리윌리(Willy-Willy) : 호주 북서쪽의 티모르(Timor) 해, 북동쪽의 남태평양에서 발생하는 열대저기압으로 호주에서는 윌리윌리(Willy-Willy 또는 Willi-Willi) 라고 부른다.\n기단과 기단 사이의 전선 상에서 발생되는 전형적인 중위도 저기압의 발생과정이다.\nA : 정체전선을 사이에 두고 양쪽 기단의 바람 방향이 반대이거나, 같은 방향이라도 속도의 차이가 클 때에 전선 상에서 파동이 형성된다.\nB : 이 파의 마루 부분에서 저기압 중심이 형성된다.\nC : 저기압은 더욱 발달하여 결국 한랭전선이 온난전선을 추월하는 폐색전선을 이루고 찬 공기 내에서는 비가 내린다.\nD : 폐색 전선이 충분히 만들어지면 저기압 내의 따뜻한 공기가 모두 상승하므로 저기압은 찬 공기만으로 된 소용돌이가 되어 소멸한다.\n비전선성 저기압은 전선을 동반하지 않는 저기압이다.\n- 열대 저기압 : 열대 해상에서 발생하는 것으로 태풍이 대표적이다.\n- 지형 저기압 : 산맥에 강한 바람이 부딪치면 공기 흐름이 산에 막혀서 압축되므로 바람이 불어나가는 방향의 기압이 낮아져 저기압이 된다.\n- 열 저기압 : 지표면이 국지적으로 강한 열을 받아 기온이 상승하여 생긴다. 주로 내륙의 분지나 사막에서 좁은 범위로 낮에 발생했다가 밤에 소멸된다.", "id": 184}, {"category": "온대 저기압의 발생", "question": "6. 해무가 생기는 원인", "answer": "기상학 적으로 따듯한 해면의 공기가 찬 해면으로 이동할 때 부근의 공기가 냉각되어 생기는 안개", "id": 185}, {"category": "온대 저기압의 발생", "question": "10.우리나라 기단에 영향을 주는 것", "answer": "-시베리아기단 : 겨울, 차고 건조.\n-오호츠크해기단 : 늦봄, 초여름, 차고 습함. 높새바람. 장마전선\n-북태평양기단 : 여름, 덥고 습함, 장마전선\n-양쯔강기단 : 봄, 가을, 따뜻하고 건조, 황사현상.\n# 안개가 생기는 이유\n* 공통점\n- 기온이 낮아지면서 공기 중의 수증기가 응결하여 나타나는 현상임.\n- 맑은 날 이른 아침에 볼 수 있음.\n* 차이점\n- 이슬 : 공기 중의 수증기가 기온이 낮아지면 응결하여 나뭇가지나 풀잎 등에 닿아 물방울로 맺히는 것임.\n- 안개 : 공기 중의 수증기가 응결하여 지표면 가까이에 떠 있는 것임.\n- 해무: 안개 중에 특별히 해상에 끼는 안개를 해무라고 한다. 우리나라 근해에 발생하는 안개는 주로 4월부터 10월까지의 난후기에 현저하며 11월부터 3월까지의 한후기에도 발생한다. 난후기에 발생하는 안개는 주로 이류무(移流霧)의 일종인 연안무 그리고 전선무 등이다. 이류무는 대규모의 습윤한 기류가 온난한 해면상으로부터 한류해역 위로 이류할 때 냉각되어 발생하는데 황해에서는 봄부터 초여름에 걸쳐 발생한다.\n특히 목포근해의 다도해역에서 하층냉수의 상승 때문에 심하게 발생한다. 해상 안개의 대부분은 이류무이므로 해무(sea fog)라 부르기도 한다. 육무(land fog)보다 층이 두껍고 발생하는 범위가 극히 넓으며 지속성이 커 수일 또는 십 수 일 동안 소산하지 않을 때도 있다.\n연안무는 특히 초여름에 한반도연안에서 온난 다습한 육상의 공기가 비교적 한랭한 해면 위로 불어올 때 발생한다. 또 상승류역에서도 해면이 차갑기 때문에 연안무가 발생한다. 우리나라에서는 초여름에 이동성 고기압의 중심이 우리나라를 지배할 때 연안무의 발생을 볼 수 있다. 전선무는 우리나라에 장마전선이 놓여 있을 때 매우 지속적이며 광범위하게 분포한다.", "id": 186}, {"category": "온대 저기압의 발생", "question": "25.대륙풍, 해풍이 부는 이유", "answer": ": 흙이 물보다 비열이 작아, 빨리 데워지고 빨리 식는다.\n낮에는 바다에서 육지로, 밤에는 육지에서 바다로 바람이 분다.", "id": 187}, {"category": "온대 저기압의 발생", "question": "26.편서풍이란", "answer": ": 서에서 동으로 부는 바람. 우리나라 중위도 지방에서 불고, 황사를 동반\n위도 30~60사이에서 발생, 북반구 남서풍 / 남반구 북서풍", "id": 188}, {"category": "온대 저기압의 발생", "question": "29.태풍의 이름, 발달, 소멸과정", "answer": ": 북서태평양 상에서 발생하는 열대 저기압이 발달하여 나타나는 거대한 공기의 소용돌이를 말한다. 태풍은 북태평양 서쪽 북위 5∼25°, 동경 120∼160°의 광범위한 열대 해상에서 수온이 26°C 이상인 경우에 발생한다. 이 지역 해상은 북동무역풍과 남동무역풍이 수렴하는 곳이다.\n이 수렴대는 계절에 따라 변동하기 때문에 태풍 발생 위치가 바뀌게 된다. 열대 저기압이 태풍으로 발달하기 위한 조건은 높은 해수면 온도와 풍부한 수증기양이며 또한 상층에 강한 발산이다. 북서태평양에서는 태풍(Typhoon), 북중미에서는 허리케인(Hurricane), 인도양에서는 사이클론(Cyclone)이라고 한다. 약한열대저기압 -> 열대폭풍 -> 강한열대폭풍 -> 태풍 -> 에너지고갈 -> 온대저기압", "id": 189}, {"category": "온대 저기압의 발생", "question": "1. 열대성저기압의 종류 (TD TS STS TY)", "answer": "1) TD: TROPICAL DEPRESSION – BS7 이하\n2) TS: TROPICAL STORM – BS 8,9\n3) STS: SEVERE TROPICAL STROM – BS 10,11\n4) T: TYPHOON - BS 12이상", "id": 190}, {"category": "온대 저기압의 발생", "question": "1. W: 일반경보(warning)으로 24시간내에 최대풍속이 풍력계급 7이하이지만 특히 주의를 요하는 경우 또는", "answer": "안개에 대해서 경고를 필요로 하는 경우\n2. GW: 강풍경보(gale warning)으로 24시간 내에 최대 풍속이 풍령계급 8-9에 달할 것이 예상되는 경우\n3. SW: 폭풍경보(storm warning)으로 24시간 내에 풍력계급 10-11에 달할 것이 예상되는 경우\n4. TW: 태풍경보(typhoon warning)으로 중심 부근의 최대 풍속이 부포트 풍력 계급 12이상으로 예상 되는 경우\n5. TD: 열대저기압(tropical depression)으로 중심 부근의 최대 풍속이 풍력 계급 7이하\n6. TS: Tropical Strom으로 중심 부근의 최대 풍속이 풍력 계급 8-9\n7. STS: severe tropical storm으로 중심 부근의 최대 풍속이 풍력 계급 10-11", "id": 191}, {"category": "온대 저기압의 발생", "question": "18. 일기도의 해석 W, GW, SW, TW 에 대하여 설명하시오.", "answer": "①[W]: 일반경보, 24시간내 보퍼트풍력계급 7이하이지만 특히 주의를 요하는 경우\n②[GW]: Gale Warning, 24시간내 보퍼트풍력계급 8-9 예상\n③[SW]: Storm Warning, 24시간내 보퍼트풍력계급 10-11 예상\n④[TW]: Typhoon Warning, 24시간내 보퍼트풍력계급 12이상 예상\n⑤TD: Tropical Depression. 열대저기압 풍속 33kt\n⑥TS: Tropical Storm. 풍속 34~47kt\n⑦STS: Severe Tropical Storm. 풍속 48~63kt\n⑧T: Typhoon. 풍속 64kt이상", "id": 192}, {"category": "온대 저기압의 발생", "question": "1. 고층기상도 종류", "answer": "1) 850hPa선 (고도 약 1.5km의 기상)\n2) 700hPa선 (고도 약 3.0km의 기상)\n3) 500hPa선 (고도 약 5.5km의 기상)\n4) 300hPa선 (고도 약 9.0km의 기상)\n5) 100hPa선 (고도 약 16.0km의 기상)", "id": 193}, {"category": "온대 저기압의 발생", "question": "2. 고층 기상도", "answer": "고층기상도는 상공을 흐르는 대기의 구조를 나타낸다. 상층대기와 하층대기의 관련성을 알게 됨에 따라 고층기상도의 중요성은 커진다. 예로 고기압, 저기압, 전선, 태풍, 호우 등은 상층대기 흐름의 변화와 깊은 관련이 있다.\n그리고 기압골이나 기압마루, 제트기류의 추적에는 상층기류의 상태를 알 필요가 있다. 상층대기의 움직임을\n예상하고 그것을 지표의 일기예보에 활욜할 수 있다. 중장기 예보에 널리 이용된다.", "id": 194}, {"category": "온대 저기압의 발생", "question": "3. 지상 기상도", "answer": "지상기상도는 해면기압의 분포, 지상기온, 풍향 및 풍속, 날씨, 구름의 종류와 높이 등의 기상상태를 분석하는\n일기도를 말한다. 지상의 기상상태는 지형이나 밤낮의 변화에 따라 복잡하게 변화하며, 매우 작은 규모의 일기\n현상은 갑자기 발생하거나 소멸하기도 하는 특성을 가진다. 그러나 날씨 변화에 영향을 주는 고기압, 저기압,\n전선 등은 각각 특이한 일기현상을 동반하며 규칙적인 변화와 이동을 하므로 기압계의 발생, 발달과 쇠약에\n대한 예상이 가능하다. 이러한 원리에 의해 지상일기도는 날씨분석을 위한 기본 일기도로 사용되고 있으며\n일정한 시간간격으로 작성하여 날씨의 분포를 파악하고 앞으로의 변화를 예측하는데 사용하고 있다.", "id": 195}, {"category": "온대 저기압의 발생", "question": "1. 개요, 특성", "answer": "500hpa 면은 대류권 중층인 5~6km 높이에 해당한다. 이 면의 일기도는 대기운동의 평균적인 상태를 나타내므로 상층일기도 중에서 대표적인 일기도가 된다. 상층대기와 하층대기의 관련성을 알게 됨에 따라 고층기상도의\n중요성은 커진다. 예로 고기압, 저기압, 전선, 태풍, 호우 등은 상층대기 흐름의 변화와 깊은 관련이 있다. 그리고 기압골이나 기압마루, 제트기류의 추적에는 상층기류의 상태를 알 필요가 있다. 상층대기의 움직임을 예상하고 그것을 지표의 일기예보에 활용할 수 있다. 중장기 예보에 널리 이용된다.", "id": 196}, {"category": "온대 저기압의 발생", "question": "2. 500hpa 일기도의 이용", "answer": "1) 500hpa 일기도의 기압골 전방에 있는 지상 저기압은 발달하며, 후방에 있는 지상 저기압은 쇠약한다.\n2) 500hpa 면까지 기압골의 축이 수직일 때가 지상 저기압은 최성기이다.\n3) 한랭저기압이 통과할 때는 보통 국지적인 호우, 대설, 돌풍 등이 있다.\n4) 지상의 고기압은 500hpa 풍향을 따라 풍속의 약 40% 속도로 이동한다.\n5) 태풍은 해당 태풍 자체의 소용돌이를 제외한 주위의 500hpa 기류에 편승하여 이동하는 것이 많다.", "id": 197}, {"category": "온대 저기압의 발생", "question": "22. 해무가 생기는 원인. (안개 및 안개의 종류에 대하여 설명하시오.)", "answer": "○1안개란 공기 중에 미세한 물방울이 부유하여 시정을 감소시키는 것을 말한다. 안개가 지속적으로 발생할 수\n있는 일반적인 조건은,", "id": 198}, {"category": "온대 저기압의 발생", "question": "2. 지평면 부분의 공기가 안정되어야 한다.", "answer": "○2복사무(Radiation Fog): 내륙의 지표면에서 야간에 복사 냉각에 의하여 노점이하로 내려갈 때 생기는 안개\n○3이류무(Advection Fog): 온난다습한 공기가 한랭한 지면상을 이류할 때 하부에서 냉각되어 생기는 안개로서\n보통 해상에서 발생한 안개의 80% 이상을 차지하여 해무 라고도 한다.", "id": 199}, {"category": "온대 저기압의 발생", "question": "23. 노점이란", "answer": "습한 공기를 냉각해 가면 어느 온도에서 응축이 시작한다. 이것은 공기 중의 수증기 분압이 그 온도에 있어서의 물의 포화 증기압과 같게 되었기 때문이며, 이 때의 온도를 말한다. 즉 수증기를 포함하는 기체의 온도를 그대로 떨어뜨려 갔을 때, 상대 습도가 100%로 되어 이슬이 맺히기 시작할 때의 온도를 말한다.", "id": 200}, {"category": "온대 저기압의 발생", "question": "25. 고기압의 정의와 그에 따른 날씨 변화를 설명하시오.", "answer": "같은 해면고도에서 주위보다 기압이 높은 곳(상태)를 말한다. 고기압은 하강기류에 의해 이루어지고 하강에 의해 쌓인 공기는 시계 방향으로 돌면서 불어나간다. 또한 공기가 하강하여 압축되면 온도가 상승하고 따라서\n상대습도가 낮아져 공기가 건조해져 날씨가 좋아진다. 고기압은 발생지와 물리적 성질에 따라 대륙성고기압과\n해양성고기압, 이동유무에 따라 이동성고기압과 정체성고기압, 고기압 높이에 따라 키 큰 고기압(온난 고기압)과 키 작은 고기압(한냉 고기압) 등으로 구분한다.", "id": 201}, {"category": "온대 저기압의 발생", "question": "1. 고기압의 발생", "answer": "전에 고기압이 없던 곳에 새로이 고기압이 출현하거나 원래 존재하는 고기압의 고기압성 순환이 강화되는 것을 고기압 발생이라고 한다. 고기압의 중심기압이 높아지는 것을 filling이라고 하고 고기압성 순환이 발달하는 것을\nanticyclogenesis 라 하고 이 두 과정은 일반적으로 동시에 일어난다.", "id": 202}, {"category": "온대 저기압의 발생", "question": "2. 고기압의 발생과정", "answer": "1) 대기대순환에 의한 역학적 원인 (역학적 고기압, 온난고기압)\n2) 지표면의 복사냉각에 의한 열적 원인 (열적 고기압, 한랭고기압)\n- 열적 고기압에는 다음과 같은 종류가 있다.\n가. 대륙성 한랭고기압 (동계)\n나. 극고기압 (연중)\n다. 지형성 고기압 (하계의 야간)\n3) 편서풍 파동의 발달에 의한 아열대 고기압으로부터의 분리 (절리고기압)\n4) 한랭기단의 범람 (이동성 고기압)", "id": 203}, {"category": "온대 저기압의 발생", "question": "3. 고기압 소멸", "answer": "일기도 상에 존재하던 고기압이 없어지거나 고기압성 순환이 약화되는 것을 고기압 소멸이라고 한다. 고기압의 중심기압이 낮아지는 것을 deeping 이라 하고 고기압성 순환이 쇠약해지는 것은 anticycloysis라 하지만 이 두\n과정은 일반적으로 동시에 일어난다.", "id": 204}, {"category": "온대 저기압의 발생", "question": "4. 고기압 소멸과정", "answer": "1) 아열대고기압은 동계에 쇠약하며 대양의 남동으로 후진하지만 연중 존재한다.\n2) 한랭고기압 (대륙성 한대고기압)은 대륙의 가열로 소멸한다. (하계)\n3) 지형성 고기압은 지표면의 가열로 인해 소멸한다.\n4) 이동성 고기압은 아열대고기압에 합쳐 없어진다.", "id": 205}, {"category": "온대 저기압의 발생", "question": "28. 북아메리카에서 한국까지의 항로에서 고려해야 할 해류에 대해 말하시오.", "answer": "태평양의 주된 해류로는 북반구에서 쿠로시오 해류가 있다. 쿠로시오 해류는 북적도 해류에서 연장되어 계속\n북쪽으로 올라오다가 동쪽으로 꺾인 후 북태평양 해류에 이어져 아메리카 서쪽 해안에 이른다.", "id": 206}, {"category": "온대 저기압의 발생", "question": "1. 취송류: 바람이 오래 지속되어 공기와 해면의 마찰에 의해 발생", "answer": "2. 경사류: 바람, 기압의 수평경도, 강수 등의 유입으로 해면의 경사가 생기면 발생\n3. 밀도류: 해수의 밀도가 불균일한 분포를 나타낼 때 그 사이에 수평적으로 압력경도가 생겨 해수의 유동이\n생김", "id": 207}, {"category": "온대 저기압의 발생", "question": "30. 전선(front)이란 무엇인지 서술하시오.", "answer": "성질이 다른 두 기단의 경계면을 전선면(frontal surface)이라 하고 이 전선면이 지표면(혹은 등압면, 타 전선면)과 교차하여 생긴 선을 전선이라 한다. 전선은 보통 전선을 형성하는 기단의 운동상태, 즉 전선의 진행방향에 따라 다음과 같이 분류한다.", "id": 208}, {"category": "온대 저기압의 발생", "question": "1. 한랭전선(Cold front)", "answer": "한기가 우세하여 난기 밑을 파고 들면서 진행하는 전선, 청색", "id": 209}, {"category": "온대 저기압의 발생", "question": "2. 온난전선(Warm front)", "answer": "난기가 우세하여 한기를 밀어내면서 진행하는 전선, 적색", "id": 210}, {"category": "온대 저기압의 발생", "question": "3. 정체전선(Stationary front)", "answer": "한난 양기단의 세력에 우열이 없는 경우로 정체하거나 이동이 극히 느린 전선, 적청색", "id": 211}, {"category": "온대 저기압의 발생", "question": "4. 폐색전선(Occluded front)", "answer": "한랭전선이 온난전선의 이동속도보다 빨라 한랭전선과 온난전선이 겹쳐진 전선을 말한다, 자색", "id": 212}, {"category": "온대 저기압의 발생", "question": "1. 저기압의 이동속도는 거의 온난전선의 속도와 같으며 한랭전선보다는 느리다.", "answer": "2. 원형저기압의 중심은 변압경도의 방향으로 진행하고 고기압의 중심은 역의 방향으로 진행한다. 이동속도는\n변압경도에 비례한다.", "id": 213}, {"category": "온대 저기압의 발생", "question": "3. 저기압은 기온경도에 수직인 방향으로 고온역을 우측으로 보며 진행한다.", "answer": "4. 북서에서 남동으로 진행해 오는 저기압은 진로를 북동으로 전향할 때 까지는 별로 발달하지 않는다.", "id": 214}, {"category": "온대 저기압의 발생", "question": "32. 4계절이 생기는 이유를 설명하시오.", "answer": "자기의 공전에 따른 결과이며 극을 중심으로 23.5도 기울어져 있어 태양에너지의 받는 영역이 지역마다\n달라지게 된다. (중위도 지방에서만 4계절이 생긴다)", "id": 215}, {"category": "온대 저기압의 발생", "question": "33. 엘니뇨에 대해서 설명하시오.", "answer": "○1개요: 엘리뇨란 열대 태평양 적도부근에서 남미해안으로부터 중태평양에 이르는 넓은 범위에서 해수면 온도가 지속적으로 높아지는 현상으로 2-7년마다 한번씩 불규칙하게 발생하는데 주로 9월에서 다음해 3월 사이에 일어나는 현상이다.\n○2원인: 엘니뇨의 발달은 무역풍이 약화되면 서태평양쪽에 쏠려있던 적도부근의 따뜻한 해수가 동쪽으로\n이동하여 동태평양에 따뜻한 해수층으로 형성하기 때문에 엘리뇨 현상이 생긴다고 알려져 있습니다.", "id": 216}, {"category": "온대 저기압의 발생", "question": "34. 기압마루, 기압골, 안장부에 대하여 설명하시오.", "answer": "○1고기압: 주위보다 상대적으로 기압이 높은 곳, 즉 내측으로 갈수록 기압이 높은 부분으로 중심부근에는\n하강기류가 있어 일반적으로 천기는 좋다.\n○2저기압: 주위보다 상대적으로 기압이 낮은 곳, 즉 내측으로 갈수록 기압이 낮아지는 부분으로 역내에는\n상승기류가 있어 천기가 나쁘다.\n○3기압마루(Ridge): 저기압과 저기압 사이의 기압이 높은 부분으로 마치 산등성이에 해당하는 고기압의 중심에서 두 저기압 사이로 길쭉히 뻗친 고압부\n○4기압골(trough): 고기압과 고기압 사이의 골짜기, 즉 저기압의 중심에서 등압선이 길쭉히 뻗친 저압부.\n기압마루와 반대\n○5안장부(saddle): 2개의 고기압과 2개의 저기압 사이의 기압배치로 지형에서의 고개에 상당, 기압경도가\n완만하여 바람이 약하고 풍향이 잘 변한다.", "id": 217}, {"category": "온대 저기압의 발생", "question": "35. 코리올리효과(Coriolis Effect)가 무엇인가요?", "answer": "- 운동하는 물체에는 지구의 중력이외에 다른 힘이 없음에도 불구하고 실제의 낙하지점은 본래의 방향에서 약간 오른쪽으로 편향되어 떨어지는데 이러한 현상을 설명하기 위하여 생각한 힘이 전향력(Coriolis Force)이며, 이\n효과를 코리올리효과라고 한다. 코리올리효과는 서에서 동으로 자전하는 자전효과에 기인하는데 남반구에서는\n북반구와 반대현상이 일어난다. 즉 지구표면에서의 운동을 북반구에서는 시계방향 남반구에서는 반시계방향으로 휘게 하는 것이다. 이 효과는 극지방에서 가장 크고 적도지방에서 가장 작게 나타난다.\n- 전향력효과(고위도>저위도)가 저위도가 작기 때문에 결과적으로 태풍은 북쪽으로 끌려가게 되는 모양을\n보여준다. 태풍의 북쪽에 동풍이 강화되면 전향력 효과에 의해 북상할 가능성이 높아지므로 바람 분포에 관심을 가져야 한다.", "id": 218}, {"category": "온대 저기압의 발생", "question": "36. 풍랑(wind wave)과 너울(swell)을 설명하시오.", "answer": "○1풍랑:\n1)파장이 짧고 2)파 꼭대기가 뾰족하며 3)불규칙한 모양을 이루고 있습니다. 바람이 불고 있는 해상에서 그\n현장의 바람에 의해 직접 발생하는 파를 말합니다.\n○2너울:\n1)파장이 길고 2)꼭대기가 둥글며 3)규칙성이 있습니다. 풍파가 생성된 폭풍권 밖으로 빠져나와 직접 바람의\n영향을 받지 않게 되었거나 또는 발생 지역에서 바람이 그친 뒤에 남아 있는 파를 너울 이라고 합니다. 너울은\n풍랑보다 주기가 훨씬 길어 속도와 파장도 크고 전파력이 커서 멀리 2000-3000해리까지 도달하기도 한다.\n1-4. 열대저기압과 태풍의 차이\n열대해상에서 발달하는 저기압을 열대성 저기압이라고 하며, 이중 특히 발달하여 BS12 이상이 되면 태풍\n1-5. 열대저기압의 종류\n1) TD: TROPICAL DEPRESSION – BS7 이하\n2) TS: TROPICAL STORM – BS 8,9\n3) STS: SEVERE TROPICAL STROM – BS 10,11\n4) T: TYPHOON - BS 12이상\n1-6. 태풍의 이름\n태풍위원회에 속한 14개국에서 각 10개씩 제출하여 28개씩 5개조로 순환하여 부여한다. 이 이름은 TS이상의\n열대성 저기압에 도쿄태풍센터에서 부여한다.\n1-7. 태풍 피항법\n열대성저기압을 피하는 제일 안전하고 확실한 방법은 그것을 멀리하는 것이다. 조기에 충분히 침로를 바꾸면\n간단히 멀어지는 것이다. 그리고 기상예보를 보면서 침로를 계속 바꾸어 나가는 것이다. 그러나 항해해역에\n따라서는 그렇게 단순하지가 않다.\n필자의 경험한바로는 미국에서 일본이나 한국을 향하여 항해할때에, 북태평양에서 태풍을 멀리 보면서 피하는\n것은 간단하다. 하지만 비률빈이나 보르네오에서 원목을 싣고 한국이나 일본을 향하여 북상할 때에는 피항은\n그리 쉽지 않다.\n일단 태풍권내에 들어가면 태풍중심에 대한 자선의 상대위치와 태풍의 진로에 따라서 적절한 피항조치를 취하게 된다. 태풍의 영향권은 태풍의 진로를 향하여 볼 때 우반원과 좌반원으로 나누고, 우반원을 위험반원, 좌반원을\n가항반원이라고 부른다. 그렇게 부르는 이유는 우반원에서는 바람이 강하고 선박을 태풍의 중심방향으로\n몰아부치기 때문이고, 좌반원에서는 풍력이 비교적 약하며 바람은 선박을 중심에서 멀어지도록 불어오기\n때문이다. 남반구에서는 좌반원이 위험반원이고 우반원이 가항반원이 된다.\n1) 태풍의 진로상에 있을 때\n풍향이 바뀌지 않고 계속 강해지며 기압계가 내려가고 있으면 자선은 태풍의 진로상에 있고 태풍이 접근하여\n오는 것이다. 풍향이 일정하더라도 풍력이 일정하고 기압계가 그대로 있으면 전선은 태풍과 같은 방향, 같은\n속력으로 달리고 있는 것이니까 태풍 중심방향의 판단은 풍향을 가지고 하여야 한다.\n자선이 태풍의 바로 전방 진로상에 있다고 판단되면 급히 가항반원으로 항주하는 침로를 잡아야 한다.\n2) 위험반원에 있을 때\n풍향이 시계방향으로 바뀌면 자선은 위험반원에 있으므로 풍향쪽으로 선수를 돌리고 바람을 약간 우현선수에서 받으면서 태풍중심이 점차 멀어지도록 침로를 취한다.\n3) 가항반원에 있을 때\n풍향이 반시계방향으로 바뀌고 있으면 자선은 좌반원이 있는 것이고, 바람을 우현 quarter에서 받으면서 태풍\n중심과 멀어지는 침로를 취한다.\n1-9. 태풍의 진행 방향이 바뀌는 것을 고기압과의 상관관계를 들어 설명하시오.\n태풍은 제1근사적으로는 지향류(steering current) 라고 불리어지는 태풍을 내포하는 대규모의 풍계에 따라 이동한다. 이 때문에 저위도에서는 편동풍을 타고 서쪽으로 진행하는 태풍이 많고, 북상하여 중위도의 편서풍대에\n들어가면 동쪽으로 이동하게 된다. 편동풍이나 편서풍 및 그 중간에 위치하는 아열대고기압의 강약이나 위치, 진출의 정도가 계절변화하기 때문에 태풍의 이동 경로도 계절에 따라 변화한다.\n북태평양고기압의 주변에는 지표면 부근을 제외하면 고층일기도의 등고도선에 거의 평행하게 고기압의 중심을 우측으로 보면서 바람이 불고 있고 태풍은 이 바람에 흘러 보내져 이동한다. 이는 지향(steering)의 개념으로 설명된다. 중위도에서는 상공에 편서풍이 불고 있고 전향 후의 태풍은 이 강한 바람을 타고 속도를 증가시켜 동 내지 북동으로 이동하는 경우가 많다. 그러나 이와 같은 바람은 항상 같은 것이 아니고 높이에 따라 또 장소에 따라 다르고 태풍 그 자신이 꽤 큰 규모를 가지고 있기 때문에 실제 바람의 관측으로부터 태풍 주변의 바람(일반류)을 구하는 것은 그렇게 단순하지는 않다. 경험적으로 태풍은 500hPa 높이의 바람에 의하여 흘러가고, 강하면서 키가 큰 태풍일수록 높은 레벨의, 약하면서 키가 작은 태풍일수록 낮은 레벨의 바람에 의하여 흘러간다는 성질이 알려져 있다.\n1-10. 월별 태풍의 진행 방향.\n태풍은 제1근사적으로는 지향류(steering current) 라고 불리어지는 태풍을 내포하는 대규모의 풍계에 따라\n이동한다. 이 때문에 저위도에서는 편동풍을 타고 서쪽으로 진행하는 태풍이 많고, 북상하여 중위도의 편서풍대에 들어가면 동쪽으로 이동하게 된다. 편동풍이나 편서풍 및 그 중간에 위치하는 아열대고기압의 강약이나 위치, 진출의 정도가 계절변화하기 때문에 태풍의 이동 경로도 계절에 따라 변화한다.\n1) 6월의 태풍은 북위 10-18도에서 주로 발생하여 북위 20도 약간 북쪽에서 전향하여 일본의 남쪽 해상을 북동진하는 것이 약 반이다. 나머지 반 정도는 북서진한다. 6월은 장마기에 해당하여 오호츠크해고기압과 북태평양고기압 사이에서 만들어지는 장마전선의 위치와 태풍의 이동경로는 관련성이 깊다.\n2) 7월이 되면 대부분의 태풍은 중국 동안으로부터 우리나라 서해, 한반도 방면으로 향한다. 적지 않은 태풍의\n수가 전향하지 않고 중국으로 향한다. 6월과 7월 공히 일본으로 상륙하는 태풍은 매우 적다.\n3) 8월의 경우, 북위 20도보다 북쪽에서 발생하는 태풍이 적지 않다. 또 전향하지 않고 곧바로 북상하는 태풍이 많은 것도 8월 태풍의 특징이다. 8월은 미주태풍이라고 불리는 것을 포함하여 이상진로를 취하는 태풍이 많아\n예보가 무척 어려운 달이다.\n4) 9월이 되면 일본의 남해안으로부터 동쪽 일본을 통과하는 태풍이 많다. 일본을 내습하는 태풍의 전향은 북위 25-30도에서 이루어지는 것이 많지만 전향하지 않고 중국으로 향하는 것과 일본 혼슈의 동쪽 해상을 통과하는\n3개의 그룹으로 나누어 볼 수 있다.\n5) 10월의 경우 일본에 상륙하는 태풍은 거의 없고 대부분은 일본 남동 해상을 북동진한다. 태풍의 발생도 북위 20도보다 남쪽으로 제한되는 경향이 있다.\n6) 11월이 되면 태풍의 수는 급격히 감소한다. 서진하는 태풍이 많고 전향도 북위 20도 부근의 낮은 위도에서 이루어진다.\n7) 12월부터 5월까지는 연평균 1개 또는 그 이하의 태풍이 존재한다. 태풍은 연중 발생하지만 1-5월에 발생한 태풍은 해수면온도가 낮기 때문에 수명이 짧고 육지에 가까이 가지 못하고 수 일만에 소멸하는 것이 많다.", "id": 219}, {"category": "온대 저기압의 발생", "question": "2. 아열대저기압 열대저기압 정의 및 차이점", "answer": "저기압 종류에만 다섯가지가 있다. 그 다섯가지는 1열대 저기압, 2온대 저기압, 3아열대 저기압, 4극 저기압,\n그리고 5열 저기압 입니다. 이 저기압들은 생성되는 저기압들이 형성되는 지리학적 지역을 의미합니다. 같은\n저기압이지만 조금씩 차이가 납니다.", "id": 220}, {"category": "온대 저기압의 발생", "question": "1. 열대 저기압", "answer": "- 열대 저기압은 열대 수렴대 부근 적도로부터 남위 북위 약 12도 정도 떨어진 따뜻한 바다와 육지 위에 형성\n됩니다. 표면에 있던 공기가 비교적 빠른 속도로 상승하면서 수렴하므로 강력한 뇌우가 발달하고 열대 지역\n밖으로 천천히 이동합니다. 열대 저기압은 나중에 흩어질 수도 있지만 매우 사나운 열대 폭풍으로 강화되어 결국 태풍으로 성장합니다. 발생초기에는 전선을 동반하지 않는다. 최성기 전후까지의 기압분포는 거의 원의 대칭을 하고 있다. 그러나 저기압의 이동에 따른 바람이 여기에 가해지기 때문에, 풍속의 분포는 반드시 중심에 대해서 대칭이 아니고 진행방향에 대해서 오른쪽 상한이 강하게 되어 있다.", "id": 221}, {"category": "온대 저기압의 발생", "question": "2. 온대 저기압", "answer": "- 중위도의 편서풍대에 따라 발생하고 발달하는 저기압을 말한다. 계절적으로는 가을부터 봄에 걸쳐 활발하고\n여름에는 약하다. 특히, 겨울에 크게 발달하여 선박의 안전과 경제적인 운항에 지대한 영향을 미친다. 상층의\n편서풍파동에 의하여 이동성 고기압과 함께 서쪽으로부터 동쪽으로 이동하고, 주기적으로 악천후를 가져온다.\n바람은 중심부근에서 필히 최대강도를 보인다고는 말할 수 없다. 중심에서 수 100km 떨어진 곳에서 오히려 가장 강할 때도 있고, 강풍역도 열대저기압보다 오히려 넓을 때도 있다. 풍속은 50kts 정도면 큰 편이고 태풍처럼 100kts 이상에 달하는 것은 거의 없다. 난역 내에서는 비교적 약한 남서풍이 불고, 온난전선 전방의 한기\n내에서는 비교적 강한 남동풍이 불지만, 한랭전선 후방에서는 강한 돌풍성의 북서풍이 분다.", "id": 222}, {"category": "온대 저기압의 발생", "question": "3. 아열대 저기압", "answer": "- 아열대 저기압은 온대성과 열대성의 성질이 각각 일부 혼합된 시스템이다. 보통의 열대성 시스템보다 강풍권역이 넓은 편이다. 다만, 일부 타입은 강풍권역이 작은 것도 있다. 또한, 중심부근보다 주변부의 바람이 더 강할 수도 있다. 온대저기압은 중심권에 전선이 걸치지만, 아열대 시스템은 중심권에 전선이 직접적으로 걸쳐 있지는\n않다. 다양한 위도에서 발생할수 있으며, 대표적인 아열대 저기압으로 하와이에 자주 나타나는 코나 저기압을 들수 있습니다. 또한 아열대 저기압은 5대 호수 위에서 형성되기도 합니다. 상층은 기온이 낮지만 하층은 기온이 상대적으로 높은 저기압 지역의 해수면 위에서 형성됩니다.", "id": 223}, {"category": "온대 저기압의 발생", "question": "4. 극 저기압", "answer": "- 강력한 극 저기압은 큰 바람 수준의 바람을 발생시킵니다. 상대적으로 규모가 작은 이 사이클론은 남극을 둘러싼 바다 외에도 고위도 지역, 래브라도 해 북부, 알래스카만과 같이 얼음이 없는 수역 위에서 형성됩니다.\n몹시 차가운 북극 공기와 상대적으로 따뜻한 공기와의 온도 차이는 종종 북극 허리케인이라 불리는 기상 시스템을 만들기도 합니다.", "id": 224}, {"category": "온대 저기압의 발생", "question": "5. 열 저기압", "answer": "- 열 저기압은 매우 뜨거운 지역에서 형성됩니다. 뜨거운 공기는 상승하면서 주변지역에 있는 차가운 공기를\n끌어들이고 회전을 시작합니다. 다른 저기압들과 비교했을때 수직적인 깊이가 얕은 열 저기압들은 밤에는 강도가 감소하고 낮에는 햇빛 아래에서 강화 됩니다. 열 저기압이 발달할수록 주변 지역의 기상에 영향을 미칩니다.\n예를 들면 고비사막 위에 형성된 거대한 열 저기압은 아시아의 몬순계절을 인도하는 편서풍을 발생시킨다.\n*열대성인지 아열대성인지 판별하는 것은 여러가지 자료(수증기 위성, 적외선 위성, 상&하층 일기도 등등)들이 동원된다. 일반적인 아열대성 시스템의 특징 및 발생은 아래와 같다.\n- 아열대 저기압은 '온대성'과 '열대성'의 성질이 각각 일부 혼합된 시스템이다. '버금 아(亞)' 한자를 사용해서, 열대 저기압에 버금간다는 뜻으로 생각한다.\n- (주로 북 대서양 기준으로) 보통의 열대성 시스템보다 강풍권역이 넓은 편이다. 다만, 일부 타입은 강풍권역이 작은 것도 있다. 또한, 중심부근보다 주변부의 바람이 더 강할 수도 있다.\n- 온대저기압은 중심권에 전선이 걸치지만, 아열대 시스템은 중심권에 전선이 직접적으로 걸쳐 있지는 않다. (외변부에 걸쳐 있을 수는 있다)\n- 중심권 상층에 얕은 온난핵 또는 한랭핵을 동반하며, 형태는 열대성 시스템에 비하면 비대칭적이긴 하지만 그래도 비교적 대칭적이고, 열대성 시스템처럼 강한 대류활동을 동반.\n- 아열대성 시스템의 발생에 필요한 평균 해수온도는 24℃ 이지만, 최소 20℃ 이상의 수온에서도 발생 가능하다.\n- 열대권 또는 아열대권 해상에 '약한 또는 어느 정도의' 대류 활동을 동반하는, 비교적 뚜렷한 소용돌이(Low & Middle-level Circulation)가 존재해야 한다. 소용돌이는 주로 고위도의 온대저기압이 아열대권 해상으로 남하했거나, 편서풍대 골에서 떨어져 나간 중층 절리저기압이 약한 하층 순환장을 동반한 채 남하한 경우이다.\n- 이 소용돌이는 중위도 혹은 고위도 고기압의 블로킹에 의해 열대권 또는 아열대권 해상에 계속 머물러 있어야 한다.\n- 지상(주로 해수면)과 500 hPa(= 약 5500 m 고도) 사이의 기온 차이가 20℃ 이상 커야 하며 환경곡선은 '건조 단열 감률'보다 더 낮아야 한다. (= 대기 불안정이 커야 한다.) 대기 불안정이 커야 하는 이유는 대류활동을 동반하기 위해서이다.\n- 이때, 하층 소용돌이의 상층(300 hPa{= 약 9000 m 고도} 이상의 상층)에 상층 한랭 저기압이 있다면, 전형적인 아열대성 시스템으로 본다.\n- 북쪽 인근에 기압골 또는 제트 스트리크(Jet Streak)가 있다면 상층 발산의 촉진으로 아열대 시스템의 발달에 기여한다.\n- 중심권에 대류활동이 지속적으로 강하게 유지하고 있고, 강풍권역의 외변부가 약해지고, 중심부근을 중심으로 구름 조직이 조밀해지고 있고, 주변에 건조역 대신 습윤역이 많아지고 있고, 온난핵이 뚜렷해지고 있다면\n열대성(Tropical System)으로 변환될 가능성이 있다.", "id": 225}, {"category": "온대 저기압의 발생", "question": "1. 열대저기압", "answer": "1) 수온이 평균 26~27도인 바다위에서 흔히 나타난다.\n2) 습한 바다위의 따뜻한 공기가 상승해서 구름속에 응집하여 잠열에 의해 강력한 상승기류를 만드는 현상이다.\n3) 따뜻한 바다위에서만 발생하기 때문에 찬 바다나 육지에서는 빠르게 힘을 잃거나 온대성 저기압으로 변질된\n다.\n4) 포물선 경로로 북상한다.", "id": 226}, {"category": "온대 저기압의 발생", "question": "2. 온대저기압", "answer": "1) 중위도나 고위도에서 발생하는 저기압으로 찬 기단과 따뜻한 기단의 접촉부(전선면)에서 발생한다.\n2) 북쪽 지역에서 내려오는 찬바람과 남쪽지방의 더운바람이 만나는 지역에서 발생하며 열대저기압에 비해\n비는 많이 내리지 않고 바람이 좀 분다.\n3) 비대칭적인 불규칙한 타원모양으로 한랭, 온난전선 동반하며 서에서 동으로 이동한다.", "id": 227}, {"category": "온대 저기압의 발생", "question": "4. Horse Latitude 란 무엇인가", "answer": "* 아열대무풍대\n남북위 30~40°의 아열대고기압대에 나타나며, 중위도 아열대회귀무풍대라고도 한다. 아열대무풍대에서는 적도\n쪽으로 무역풍, 극 쪽으로 편서풍이 분다. 이 지역은 적도무풍대와 마찬가지로 날씨가 좋고 바람이 약하기\n때문에 범선으로 항해하던 시기에는 항해에 많은 어려움을 주었다. 따라서 이 지역을 항해하던 배가 범선의\n무게를 줄이기 위해서 싣고 가던 말을 바다에 버린 곳이라 해서 ‘호스 레티튜드(horse latitude)’라는 명칭이\n유래되었다. 해상에서는 증발량이 최대인 해역이고, 육상도 건조지역에 해당된다.", "id": 228}, {"category": "온대 저기압의 발생", "question": "아열대 무역풍에 대해 설명하시오.", "answer": "위도 30도 부근의 아열대 고압대에서 적도를 향해 안정되게 부는 바람, 남북위 30-40도의 아열대고기압대에\n나타나며, 아열대무풍대에서는 적도 쪽으로 무역풍, 극 쪽으로 편서풍이 분다. 이 지역은 적도무풍대와 마찬가지로 날씨가 좋고 바람이 약하기 때문에 범선으로 항해하던 시기에는 항해에 많은 어려움을 주었다. 따라서 이\n지역을 항해하던 배가 범선의 무게를 줄이기 위해서 싣고 가던 말을 바다에 버린 곳이라 해서 호스 래티튜드\n라는 명칭이 유래되었다. 해상에서는 증발량이 최대인 해역이고, 육상도 건조지역에 해당된다.", "id": 229}, {"category": "온대 저기압의 발생", "question": "적란운을 영어로 말하시오.", "answer": "Cumulonimbus", "id": 230}, {"category": "온대 저기압의 발생", "question": "5. 에크만 나선: EKMAN SPIRIL", "answer": "해면 위로 풍속이 일정하게 계속 불게 되면 해수면에서 100~200m 정도의 깊이에서 에크만 수송이 일어나고\n이에 따른 유속의 벡터끝을 연결하여 만들어지는 나선이다.\n취송류는 북(남)반구의 해수면에서는 바람이 불어가는 쪽으로 우(좌) 45° 방향으로 흐른다. 해수면부터 수심 100~200m까지의 마찰층에서 에크만 수송에 의한 해류가 발생하는데, 깊이에 따라 마찰에 의해 해류는 그 방향을 바꾸면서 감쇠한다. 깊이에 따른 유속의 벡터를 연결하면 나선이 생기며 이를 에크만 나선이라 한다.\n대기에 있어서도 이와 같은 현상을 생각할 수 있다. 지상 약 1,000m 이하에서는 풍향이나 풍속이 높이에 따라 달라진다. 각 높이의 바람의 벡터 끝을 연결하면 풍성류와 마찬가지로 에크만나선이 생긴다. 에크만류(Ekman current)에서 수심에 따라 편향각은 증가하고 유속은 감소하는 속도벡터를 한 평면상에 투영할 때 나타나는 나선들을 에크만나선이라 한다.", "id": 231}, {"category": "온대 저기압의 발생", "question": "6. 바람 (대륙풍, 해풍)이 부는 이유는?", "answer": "바람이 부는 이유는 기압차와 기온차의 요인으로 나눠볼 수 있습니다.\n기압차에 의한 바람의 경우 지형이나 지물에 의해서 마찰의 영향으로 등압선과 약간 각도를 이루어 기압이 높은 곳에서 낮은 곳, 즉 고기압에서 저기압으로 바람이 붑니다. 여기에 북반구의 경우 고기압에서는 바람이 중심으로부터 시계방향으로 돌면서 불고 저기압에서는 반시계방향으로 돌면서 바람이 부는 형태를 가지게 됩니다.\n기온차에 의한 바람의 경우 태양에 의해서 지표면이 가열된 곳은 공기가 상승하고 그 자리를 메우기 위해서\n주변 공기가 들어오면서 자연스럽게 바람이 불게 되는데 이것을 국지풍이라고 한다.\n국지풍은 해륙풍과 산곡풍으로 나뉘는데,\n해륙풍은 낮에 열용량이 작은 육지가 바다보다 빨리 가열이 되서 상승기류가 생겨 이를 메우기 위해 바다에서 육지로 바람이 불고 밤이 되면 반대로 육지가 바다보다 빨리 열이 식어 바다쪽으로 바람이 부는 것을 말한다.\n산곡풍은 산악지대에서 낮에는 산정상이 먼저 가열되기 때문에 산 정상 공기가 상승하게 되고 이를 메우기\n위해서 온도가 낮은 골짜기 바람이 산정상으로 바람이 불게 된다. 반대로 밤이 되면 산정상 온도가 먼저 하강\n하면서 산 정상에서 골짜기를 따라 공기가 하강하면서 바람이 불게 된다.", "id": 232}, {"category": "온대 저기압의 발생", "question": "1. 편서풍", "answer": "남북 양반구에 존재하는 것으로, 서에서 동으로 부는 띠모양의 바람이다. 지구 자전의 영향으로 북반구에서는 남서풍, 남반구에서는 북서풍이 된다. 중위도 지방에는 대체로 정상적인 편서풍이 탁월하여 중위도 편서풍대라고 불리며 남북 양반구에서 존재한다. 이것은 고온의 저위도와 한랭한 고위도지방 사이에 남북의 기온경도가 커지기 때문이다. 위도 30° 지역에서 생성된 고기압이 지표면을 따라 위도 60° 부근까지 이동하는 바람이다. 지구의 자전 때문에 수직으로 불지 못하고 북반구에서는 시계 방향으로 휘어서 기울어진 서풍이 된다. 저기압, 고기압, 전선 등이 상층의 편서풍에 의해 이동하므로, 일기예보 분석에 중요하다.\n북반구에서는 광대한 대륙의 영향을 받고 또 이동성 고기압, 저기압 및 전선 등이 빈번히 동쪽으로 통과하므로 편서풍이 불규칙하다. 그러나 평균적으로는 편서의 바람이 탁월하다. 편서풍은 계절적으로 크게 변하여 동계에 강하고 하계에 약하다. 남반구에서는 비교적 규칙이 바르고 풍력도 강하다. 특히, 동계에 강하며 40-50도 위도대는 육지가 없으므로 연중 바람도 강하고 풍랑이 심하다.", "id": 233}, {"category": "온대 저기압의 발생", "question": "2. 무역풍", "answer": "열대편동풍이라고도 부른다. 무역풍은 아열대고압대에서 적도 저압대로 불며 지구 자전의 영향으로 북반구에서는 북동무역풍, 남반구에서는 남동무역풍이 된다. 무역풍은 대기대순환 중에서 규모가 가장 크고 지속성이 긴 순환이다. 무역풍대는 연중 풍향, 풍속이 거의 일정하고 일기가 좋아, 옛날 범선 시대에는 이 바람을 이용해 항해에 많이 이용하였다. 풍속은 4-6m/s 정도이다.", "id": 234}, {"category": "온대 저기압의 발생", "question": "8. 기압경도 (Pressure Gradient)란?", "answer": "어느 한 등압선과 다음 등압선 사이를 측정한 거리에 대하여 기압이 변화하는 비율을 말한다. 기압경도의\n방향은 고기압에서 저기압으로 향한 방향을 양의 방향으로 한다. 일기도상으로는 등압선이 밀집하여 있는\n기압경도가 큰 곳에서 바람이 강하게 분다.\n등압선에 직각 방향의 단위거리에 대한 기압의 변화율(기압의 기울기)로 방향과 크기를 갖는 vector량이다.\n단위거리는 편의상 100km를 기준으로 하나 실무에서는 위도 1도 길이에 해당하는 111km를 사용한다.", "id": 235}, {"category": "온대 저기압의 발생", "question": "9. 우리나라에 영향을 끼치는 기단의 종류와 설명하시오.", "answer": "우리나라에 영향을 주는 기단은\n시베리아 기단, 북태평양 기단, 오호츠크 해 기단, 양쯔 강 기단, 적도 기단,\n이렇게 다섯 개가 있다.\n시베리아 기단은 우리나라의 기후에 가장 오랫동안 영향을 미치는 기단으로, 시베리아 기단의 영향을 받는 12월에서 3월 초에는 겨울 계절풍인 북서풍이 부는 것이 특징이다.\n이 바람은 우리나라에 한파를 몰고 오는데, 이때 호남 서해안 및 섬 지역에 많은 눈을 내리게 한다.\n북태평양 기단은 주로 장마가 끝나고 늦장마가 시작되기 전의 한여름에 영향을 미친다.\n이 기단은 온도와 습도가 높아서 그 영향 아래 있을 때는 마치 열대 기후(일 년 내내 매우 덥고 비가 많이 오는 열대 지방의 기후)를 연상할 정도로 후덥지근하며, 밤에는 열대야 현상이 종종 나타나게 된다. 열대야 현상은 밤에도 대기 중에 많은 양의 열이 저장되어 있어서 생기는 현상이다.\n오호츠크 해 기단은 서늘하고 습기가 많으며 초여름에 영향을 미치는 기단으로 높새바람이나 장마 전선과 관련이 있다.\n양쯔 강 기단은 따뜻하고 건조하며 봄과 가을에 온화한 날씨를 형성하며,\n적도 기단은 뜨겁고 습기가 높아 여름철 태풍과 관련이 깊다.", "id": 236}, {"category": "온대 저기압의 발생", "question": "1. 겨울", "answer": "겨울철에는 아시아 대륙이 심히 냉각되므로 한랭 건조한 시베리아 고기압이 발달하고, 북태평양 상에는 알류샨 저압부가 발달하여 기압경도가 급해진다(서고동저형 기압 배치). 이로 인하여 우리나라 부근에서는 10월부터\n다음해 3월까지 시베리아 대륙으로부터 한랭 건조한 북서계절풍이 지속적으로 불어온다.\n우리나라 부근에서는 북서풍이지만 남하함에 따라 풍향이 바뀌어 동중국해 남부, 대만, 남중국해에서는 북동풍으로 된다. 남하함에 따라 바람도 약해지지만, 대만해협에 부는 바람은 매우 강하다. 이것은 해협이 좁기 때문으로 동중국해로부터 불어 들어오는 바람은 가속 되어지고, 해상의 취송거리가 길기 때문에 남중국해에는 파고가 높은 거친 바다가 된다.\n우리나라 부근에서의 북서계절풍이 일본을 거쳐 태평양으로 빠져나가면, 난류인 쿠로시오에 의한 하층으로부터 수증기의 보급을 받아 불안정해지고 국지적인 돌풍을 동반하면서 풍속이 증대된다. 또한, 해상에서의 취송거리가 길어져 높은 파고를 만든다. 그리고 일본 혼슈 동쪽의 태평양은 겨울철에 발달중인 온대저기압이 자주 통과하는 이동 경로에 해당하기 때문에 특히, 북위 30-40도, 동경 140-170도의 해역은 높은 삼각파가 발생하면서 대형\n해양사고가 빈번히 발생하는 해역으로 유명하다.\n풍력은 평균적으로 4-5일 때가 많고 때로는 8을 넘을 때도 있다. 시베리아 고기압의 강약에 따라 계절풍의\n세력도 변하여 삼한사온이라는 기온변화를 일으킨다.", "id": 237}, {"category": "온대 저기압의 발생", "question": "2. 여름", "answer": "여름철에는 북태평양 고기압이 발달하고 대륙에는 심한 가열로 인한 계절풍 저기압이 발생한다.(남고북저형 기압배치).\n이로 인하여 6월에서 9월까지 해양 상의 고온다습한 열대공기가 대륙을 향하여 남동-남서풍으로 되어 불어온다. 그러나 대륙과 해양간의 온도차가 겨울철에 비하여 작으므로 여름철의 계절풍은 일반적으로 약하여 풍력 3-4 정도이다.", "id": 238}, {"category": "온대 저기압의 발생", "question": "12. 한국에서 싱가폴로 항해시 대만해협을 통과하는 이유 (대만 동안을 통과하지 않고 서안을 통과하는 이유)를 설명하시오.", "answer": "- 기본적으로 대만 동쪽에서부터 강하게 북진하는 쿠로시오 해류를 타기위해 싱가폴-한국 구간은 대만 동쪽을\n이용하여 항해한다.\n- 한국-싱가폴 구간은 비교적 쿠로시오 해류 영향이 적은 대만해협을 항해하기 위해 대만 서쪽으로 항해한다.\n- 단, 두 경우 모두 대만 동부에 태풍이 자주 생성되는 여름철에는 태풍 피항을 위해 대만해협으로 항해할 수\n있다.\n- 또한 두 경우 모두 홍콩 지역 남지나해로부터 자주 발생하는 저기압을 피하기 위해 대만 동쪽으로 항해할 수도 있다.", "id": 239}, {"category": "온대 저기압의 발생", "question": "1. 여름", "answer": "여름철의 아시아 남부는 세계에서도 가장 기온이 높은 지역으로 되어 인도 내륙에 저기압(인도-파키스탄\n저기압)이 발달한다. 한편, 남반구는 겨울이므로 타 계절에 비하여 강화 된 남동무역풍은 적도를 넘어서\n북반구로 올라와 멀리 대륙 내의 저기압으로 불어간다.\n남반구의 호주는 겨울철에 고기압이 형성되어 중심으로부터 바깥쪽으로 대기가 발산하게 되고 이것이 남반구 저위도의 일반류인 남동무역풍을 강화시키는 역할을 하게 된다. 남동무역풍은 북반구로 넘어오면 남서풍으로\n되어 인도양, 벵골만, 아라비아해 등지로 불어간다.\n인도지역은 기본적으로 하계에 기압경도가 크기 때문에 인도양 상으로부터 인도 내륙으로 남서계절풍이 강하게 불고, 이에 더하여 일반류(general current)인 남서풍과 중첩되므로 남서계절풍은 크게 발달하여 풍력은 5-7에\n달하고 또 지속성이 큰 것이 특징이다. 아라비아해에서 가장 강하며, 벵골만은 비교적 약하다.\n6월에서 9월까지 현저히 발달하는 남서계절풍은 고온다습하므로 히말라야 산계의 경사면을 강제 상승할 때에 많은 강수량은 보여 이른바 우기를 가져온다.", "id": 240}, {"category": "온대 저기압의 발생", "question": "2. 겨울", "answer": "1월부터 4월 사이에 티베트 지방의 고압대에서 인도양 상의 저압대로 부는 북동풍으로 한랭건조하다. 인도는\n북방에 히말라야 산계가 가로 놓여 있으므로 시베리아 고기압에서 불어오는 겨울철의 계절풍은 이에 방해되어 약하다. 그러나 인도양 상으로 나오면 약간 발달하여 풍력 4 내외로 된다. 겨울철의 계절풍은 여름철의 남서계절풍보다 훨씬 약하다. 이것은 극동지역의 계절풍이 여름철보다 겨울철에 훨씬 강한 것과는 정반대의 현상이다.", "id": 241}, {"category": "온대 저기압의 발생", "question": "14. 남지나해에서의 여름철 기압배치와 조류상태", "answer": "여름철에는 북태평양 고기압이 발달하고 대륙에는 심한 가열로 인한 계절풍 저기압이 발생한다.(남고북저형 기압배치). 이로 인하여 6월에서 9월까지 해양 상의 고온다습한 열대공기가 대륙을 향하여 남동-남서풍으로 되어 불어온다. 그러나 대륙과 해양간의 온도차가 겨울철에 비하여 작으므로 여름철의 계절풍은 일반적으로 약하여\n풍력 3-4 정도이다. 조류도 이와 비슷한 경향을 보이며 남지나해 전반에 걸쳐서 남서쪽에서 북동쪽 방향으로\n뚜렷한 조류가 형성된다. 특히 루존섬 동쪽부근, 대만 동,서 부근에서 아주 강한 조류의 영향을 받는다.", "id": 242}, {"category": "ISPS & ISM", "question": "6. ISM에 RISK ASSEESMENT(위험성 평가서) 라는 문서가 있는데 그게 아닌가 싶네요. 선박이 위험이 예상되는 작업을 할 때에 각 위험 작업마다 위험 지수 등급이 있어서 그 작업에 예상되는 위험 종류에 대한 점수를 매겨 합산한 후에 어느 정도 위험한 작업인지 평가하는거요. 합산 후 회사에 보고합니다.", "answer": "예를 들어 녹제거 및 페인트 작업을 할 시 깡깡이질 할 때 눈이 다칠 수 있다. 위험성 몇점 페인트로 인한 호흡 위험 몇점, 화재 위험 몇점 이런 식으로 작업을 함에 따라 야기 되는 위험성 리스트들이 있는데 그것을 찾아 점수를 매겨 합산하는거죠.\n통상 우리가 고소작업, 열작업, 밀폐작업은 체크 리스트가 있기 때문에 이런 기존의 통상 위험작업들은 굳이 위험성 평가를 하지 않아도 되지 않기 때문에 그 외에 위험성 작업에 대해서는 따로 평가를 하더라고요.(회사 ISM마다 다르겠죠) 그래서 딱히 평가를 하지 않아 잘 사용하지는 않아서 저도 몇번 밖에 안해봐서 가물합니다만 절차서에 방법이 잘 기록되어있더라고요. (PSC가 종종 위험성을 평가하는 리스트 SOURCE OF DANGER가 있는가 물어보곤 했어요)\n◈ 보안선언서는 다음 주체에 의해 완성되어져야 한다. :\n① 선장 또는 선박을 대신하는 선박보안책임자; 그리고 가능한 경우,\n② 항만시설 보안책임자 또는 당사국 정부가 달리 결정하는 경우 항만시설을 대표하여 육상측\n(SHORE-SIDE) 보안을 담당하는 다른 기관\n◈ 다음의 경우 선박은 보안선언서의 완성(제출)을 요청할 수 있다.\n1) 인터페이스를 하고 있는 항만시설 또는 다른 선박보다 상위의 보안등급으로 선박이 운항하고 있는 경우\n2) 국제항로 또는 이들 항로를 운항하는 특정 선박에게 적용하는 보안선언서에 관한 당사국 정부간 협정이 있는 경우\n3) 적용 가능한 선박 또는 항만시설에 영향을 미치는 보안위협 또는 보안사건이 있었던 경우\n4) 승인된 항만시설보안계획서의 소지 및 시행이 요구되지 아니하는 항만에 선박이 있는 경우, 또는\n5) 승인된 선박보안계획서의 소지 및 시행이 요구되지 아니하는 다른 선박과 선박 대 선박 활동을 수행하는 경우\n◈ 선박이나 육상, 선박이나 선박간의 보안등급이 둘 다 1등급일 경우 생략이 가능하지만 작성하는 것이 좋고, 서로 등급이 다르거나 둘 다 2등급 이상일 경우에는 반드시 작성하여야 한다. 일반적으로 상위의 등급을 가진 쪽이 작성한다.", "id": 243}, {"category": "ISPS & ISM", "question": "69. ISPS에 대하여 설명하시오.", "answer": "1) 제정배경", "id": 244}, {"category": "ISPS & ISM", "question": "9.11 미국 항공기 테러사건이후 국제해사기구(IMO)에서는 선박 및 항만시설에 대한 해상보안을 강화하기 위하여 기존의 해상인명안전협약(SOLAS)을 개정하여 제11장을 제11-1장(해상안전 강화를 위한 특별조치)으로, 해상보안 강화를 위한 특별조치를 규정하고 있는 제11-2장을 신설하였다. 국제 선박 및 항만시설 보안규칙(ISPS Code, International Ship and Port Facility Security Code)은 SOLAS 제11-2장을 근거로 채택되었으며, 2004.7.1 국제적으로 발효되었다.", "answer": "2) 주요내용\n- 선박은 자체보안계획(선박보안계획서, Ship Security Plan)을 수립하고, 기국정부의 보안심사를 받은 후 국제선박보안증서(International Ship Security Certificate / 유효기간 5년)를 비치, 운항하여야 한다.\n- 보안증서는 유효기간이 5년으로 2.5년마다 중간보안심사를 받아야 하며, 5년이 경과하기 전에 갱신보안심사를 받아 새로운 보안증서를 소지ㆍ운항하여야 한다.\n- 선박이력기록부(CSR, Continuous Synopsis Record) 선내 비치 의무화\n- 선박마다의 고유식별번호(IMO번호)를 선체에 영구 표시토록 강제화\n- 선종별 선박보안경보장치 탑재\n- 보안증서 미소지 선박은 입항거부 또는 출항정지 등 국제항해 불가\n- 항만시설은 항만시설보안책임자를 임명하고 항만보안평가를 실시한 후 보안계획을 수립하여 당해국 정부의 승인을 받아야 한다.\n- 보안계획 미 수립 항만에 기항한 선박 및 선적된 화물에 대하여는 외국항에서 별도 보안확인 절차 실시로 운항지체 등 피해 발생 우려\n- 명백한 근거(8가지) 발견시 입항거부, 출항정지 등 운항통제 가능", "id": 245}, {"category": "ISPS & ISM", "question": "70. ISPS 훈련 종류 및 주기", "answer": "*훈련종류", "id": 246}, {"category": "ISPS & ISM", "question": "9. 선박 자체를 무기의 수단으로 사용", "answer": "*훈련주기\n- 훈련은 최소한 매 3개월마다 1회 시행\n- 만약 선원의 4분의 1이 교체된 경우에는, 선원교체후 1주일 이내 시행\n- 가능하다면, 선박보안사관뿐만 아니라 회사보안사관, 항만시설보안사관, 당사국 정부의 관계자 등이 참여하는 다양한 형태의 훈련을 매년 최소한 1회, 그리고 훈련간격은 18개월을 초과하지 못함", "id": 247}, {"category": "ISPS & ISM", "question": "1. 증서:", "answer": "ISSC (International Ship Security Certificate)", "id": 248}, {"category": "ISPS & ISM", "question": "2. 서류", "answer": "1) SSP(선박보안계획서)\n2) SSR\n3) CSR(선박 이력기록부, continuous synopsis record)\n4) DOS(보안선언서)", "id": 249}, {"category": "ISPS & ISM", "question": "ISPS상 보안등급이 나누어져 있는데 나누어지는 기준을 말하시오.", "answer": "보안사건이 발생할 수 있는 위험의 정도에 따라 다음과 같이 등급이 나뉜다.", "id": 250}, {"category": "ISPS & ISM", "question": "72. 선박보안계획서를 설명하시오.", "answer": "선박보안계획서는 ISPS code에서 요구하는 18가지 항목을 포함하여 선박보안평가를 근거로 작성하며 작성\n책임은 회사보안책임자에게 있다. 보안등급 1, 2 및 3에 따른 각각의 보안 조치를 수립하여 주요 항목으로는\n1조직 및 2선박보안 임무, 3선박출입통제, 4선박 제한 구역, 5화물 및 선용품의 취급, 6미휴대 수화물의 취급,\n7선박보안 감시, 8내부 감시 절차 등이 있다.", "id": 251}, {"category": "ISPS & ISM", "question": "51.SSP 보안합의서", "answer": "SHIP SECURITY PLAN / 선박보안계획서는 ISPS code에서 요구하는 18가지 항목을 포함하여 선박보안평가를 근거로 작성하며, 작성 책임은 회사보안책임자에게 있다.\n보안등급 1,2 및 3에 따른 각각의 보안조치를 수립하여 하며, 주요항목으로는 조직 및 선박보안 임무, 선박출입통제, 선박 제한구역, 화물 및 선용품의 취급, 미휴대 수화물의 취급, 선박보안 감시, 내부 심사 절차 등이 있다. 선박보안계획서는 영어, 불어 또는 스페인어 중의 하나로 번역되어야 하며, 정기적으로 검토되어 환경변화를 수용하여야 한다. 회사보안책임자는 선박보안계획서를 각 지방해양수산청(외국항의 경우 기국 주관청 또는 주관청이 인정한 RSO, Recognized Security Organization)에 승인 요청하고 승인 받아야 한다.\n보안합의서: 항만과 선박의 보안등급이 상이할 경우, 작성한다.\n보안선언서.: 선장이나 선박보안책임자가 작성/ 3년 보관", "id": 252}, {"category": "ISPS & ISM", "question": "16. ISPS Code의 적용대상에 대해 설명하시오.", "answer": "◈ ISPS Code는 다음에 적용한다.\n1) 국제항해에 종사하는 다음의 선종\n① 고속여객선을 포함한 여객선\n② 총톤수 500톤 이상의 고속선을 포함한 화물선; 그리고\n③ 이동식 해상 구조물; 그리고\n2) 국제항해에 종사하는 상기의 선박이 사용하는 항만시설.\n◈ 본 보안규칙은 군함, 해군 보조함 또는 당사국 정부에 의해 운용 또는 소속되는 비상업용 선박에는 적용하지 아니한다.", "id": 253}, {"category": "ISPS & ISM", "question": "25 .ISPS 훈련 종류, 시행간격", "answer": "1)폭발장치에 의한 보안위협 및 수색\n2)선박또는 승조원의 납치,강탈,\n3)허가받지 아니한 자의 접근\n4)밀수품 운송 수단으로 선박 이요\n5)보안사고를 낼 목적으로 범인 및 그들의 개인 장비를 운송수단으로 사용\n6)선박 자체를 무기로 사용\n7)접안 묘박중 해상에서의 공격\n8)항해중 해상에서의 공겨", "id": 254}, {"category": "ISPS & ISM", "question": "41. ISM의 목적과 내용은?", "answer": "선박의 안전운항과 해상오염을 근원적으로 방지하기 위한 것.\n인명안전, 환경보호, 재산의 보호, 회사의 자산보호", "id": 255}, {"category": "ISPS & ISM", "question": "6. ISM 관리", "answer": "UN의 국제해사기구(IMO:International Maritime Organization)에서 선박의 안전운항과 환경보호를 목적으로 결의한 해운회사의 안전경영시스템(SMS: Safety Management System)에 관한 국제적 표준규격임\nISM CODE의 필요성\nISM CODE 적용의 강제화에 대응\n안전의식 정착으로 사고예방 및 해양환경보호\n각국 항만국통제(PSC) 강회에 대응\n국제규제 및 각종 법규 강화에 대한 대응\nISM CODE의 증서\n1)발급기관: - 주관청 - 주관청의 위임을 받은 다른 체약국 정부\n- 주관청이 위임한 단체(인증기관:선급)\n2) 증서의 종류 - DOC( DOCUMENT OF COMPLIANCE:적합증서): 해운회사를 인증한 증서\n- SMC( SAFETY MANAGEMENT CERTIFICATE: 안전관리증서): 선박을 인증한 증서", "id": 256}, {"category": "ISPS & ISM", "question": "2. ISM 에 대하여 말하시오?", "answer": "-1급 선장으로서 알아야 될 사항\n선박의 안전 확보를 위한 ISM Code에 의거한 안전관리시스템 구축과 시행을 형식적이 아닌 실제적으로 철저하게 수행하여 비상사태 시에 적절히 대응할 수 있는 능력을 확보해야 함을 알 수 있었다. 국제안전관리규약은 국제해사기구 총회 결의에서 채택한 선박의 안전 운항 및 오염예방을 위한 국제적 관리규약이다. 1974년 국제해상인명안전협약 제9장에서 새로이 채택된 규정을 포함한 이 협약의 1998년 7월 1일자의 발효와 함께 국제안전관리규약은 해당 선박에 강제되도록 하고 있다.", "id": 257}, {"category": "ISPS & ISM", "question": "1. 회사의 안전 및 환경보호방침의 이행", "answer": "Implementing the safety and environmental protection policy of the company", "id": 258}, {"category": "ISPS & ISM", "question": "2. 회사 방침을 준수하도록 선원에게 동기 부여", "answer": "Motivating the crew in the observation of that policy", "id": 259}, {"category": "ISPS & ISM", "question": "3. 간단명료한 방법으로 명령 및 지침의 하달", "answer": "Issuing appropriate orders and instruction in clear and simple manner.", "id": 260}, {"category": "ISPS & ISM", "question": "4. 규정된 요건이 준수되는지 검증", "answer": "Verifying that specified requirements are observed", "id": 261}, {"category": "ISPS & ISM", "question": "67. 선원법 상 선장의 직무와 권한", "answer": "1) 지휘명령권 : 선장은 해원을 지휘ㆍ감독 및 명령\n2) 출항전의 검사의무\n3) 항해의 성취\n4) 선장의 직접지휘 : 선장은 선박이 항구를 출입할 때 또는 선박이 좁은 수로를 지나갈 때 그 밖에 선박에 위험이 생길 염려가 있는 때\n5) 재선의무\n6) 선박위험시의 조치\n: 선장은 선박에 급박한 위험이 있는 경우에는 인명ㆍ선박 및 화물을 구조하는데 필요한 조치를 다하여야 한다.\n7) 선박충돌시의 조치\n: 선박이 서로 충돌한 경우에는 각 선박의 선장은 서로 인명과 선박을 구조하는데 필요한 조치를 다하여야 하며, 선박의 명칭ㆍ소유자ㆍ선적항ㆍ출항항 및 도착항을 상대방에게 통보하여야 한다.\n8) 조난선박의 구조\n: 선장은 다른 선박 또는 항공기의 조난을 안 경우에는 인명을 구조하는데 필요한 조치를 다하여야 한다.\n9) 이상 기상 등의 통보\n10) 비상배치표 및 훈련\n11) 항해의 안전확보\n12) 수장\n: 선장은 선박의 항행중 선박 안에 있는 자가 사망한 때에는 국토해양부령이 정하는 바에 의하여 수장할 수 있다.\n13) 유류품의 처리\n14) 재외국민의 송환\n① 선장은 외국에 주재하는 대한민국의 영사가 법령의 정하는 바에 의하여 대한민국 국민의 송환을 명한 때에는 정당한 사유없이 이를 거부하지 못한다.\n② 제1항의 규정에 의한 송환에 쓰인 비용의 부담과 그 상환에 관하여 필요한 사항은 대통령령으로 정한다.\n15) 서류의 비치\n: 선장은 다음의 서류를 선박 안에 비치하여야 한다.\n① 선박국적증서 / ② 승무원명부 / ③ 항해일지 / ④ 화물에 관한 서류\n16) 선박운항에 관한 보고\n① 선박의 충돌ㆍ침몰ㆍ멸실ㆍ화재ㆍ좌초, 기관의 손상 그 밖의 해양사고가 발생한 경우\n② 항행 중 다른 선박의 조난을 안 경우(무선통신에 의하여 알게 된 경우를 제외한다)\n③ 인명 또는 선박의 구조에 종사한 경우\n④ 선박 안에 있는 자가 사망하거나 행방불명이 된 경우\n⑤ 예정항로를 변경한 경우\n⑥ 선박이 억류되거나 포획된 경우\n⑦ 그 밖에 선박에 관하여 중대한 사고가 일어난 경우", "id": 262}, {"category": "ISPS & ISM", "question": "1. ISM이 만들어진 배경 밎 목적", "answer": "1) ISM이란\nIMO에서 제정한 Code로 해상안전 및 해양환경을 보전하기 위해 해운기업의 육,해상 모든 부서는 안전관리\n시스템을 수립하고 시행하는 국제 안전규약이다.\n2) 제정 배경\n국제해사기구는 해상안전 및 해양환경보전을 위해 선박자체의 구조 및 설비의 강화와 선원의 자질향상을 위한 국제협약을 채택하는 등 주로 선박자체의 물리적 측면만을 중시해왔습니다. 그러나 각종 기준을 지속적으로 강화했음에도 불구하고 1987년 Herald of Free Enteprise호”의 전복사고 등 국제적으로 대형 해난사고와 해양 오염사고가 잇달아 발생하였습니다. 그 원인을 분석한 결과 IMO는 전체 해난사고의 80%이상이 인적과실에 기인한 것으로 판명되었고 이러한 인식하에 인적과실을 방지하기 위한 대책을 마련하기로 하였습니다. 즉 IMO는 해상안전 및 해양환경을 보전하기 위해 선박의 물리적 안정성 및 선원의 자질향상뿐만 아니라 해운기업의 육해상 모든 부서를 망라한 안전관리시스템을 수립하여 시행하는 국제안전관리규약(ISM Code)을 제정하기로 한 것입니다.", "id": 263}, {"category": "ISPS & ISM", "question": "68. ISM Code 의 목적", "answer": "International Safety Management Code- 국제 안전 경영 코드", "id": 264}, {"category": "ISPS & ISM", "question": "1.2 목표", "answer": "1.2.1 이 코드의 목표는 해상안전, 인명손상 방지, 환경 특히 해양환경 및 재산 피해에 대한 예방을 보장하는 것이다.", "id": 265}, {"category": "ISPS & ISM", "question": "1.2.2 회사의 안전경영목표는 특히 다음과 같아야 한다.", "answer": ".1 선박의 안전운항 실무 및 안전한 작업환경의 제공;\n.2 선박, 인원 및 환경에 대하여 식별된 모든 위험성에 대한 평가 및 안전장치의 수립; 및\n.3 안전 및 환경보호에 관한 비생대책을 포함하여 육상 및 해상 직원의 지속적인 안전경영기술의 향상", "id": 266}, {"category": "ISPS & ISM", "question": "1.2.3 안전경영시스템은 다음 사항을 보장하여야 한다.", "answer": ".1 강제 법규 및 규칙의 준수; 및\n.2 국제해사기구, 주관청, 선급 및 해사단체에 의하여 권고된 적용 가능한 코드, 지침 및 기준에 대한 고려.", "id": 267}, {"category": "ISPS & ISM", "question": "3. 선박안전법", "answer": "☞ SMC (Safety Management Certificate)를 발급 받기 위해 받아야 하는 검사 종류에 대해 설명 하시오.\nSMC 증서를 발급 받으려면, DOC(Document Of Compliance 회사 적합증서)는 반드시 있어야 한다.\n기타 본선에서는 운항상의 모든 증서(선급증서, SC, SE, SR, IOPP, ISSC 등)는 기본적으로 가지고 있어야 함.\n☞ 보안선언서(DOS)의 작성주체 :선박이나 육상, 선박이나 선박간의 보안등급이 둘 다 1등급일 경우 생략이 가능하지만 작성하는 것이 좋고, 서로 등급이 다르거나 둘 다 2등급 이상일 경우에는 반드시 작성하여야 한다. 일반적으로 상위의 등급을 가진 쪽이 작성한다.", "id": 268}, {"category": "ISPS & ISM", "question": "5. 'DOS' 발급 주체와 발급하는 경우 ISPS CODE 내용 요구하셨습니다.", "answer": "Declaration of Security\n보안합의서란 선박보안책임자와 항만시설보안책임자가 작성하는 선박항만연계활동 또는 선박상호활동을 함에 있어서 상호간에 이행하여야 하는 구체적인 보안조치사항에 대한 합의서이다.\n[추가 질문] DOS를 작성하는 이유를 설명하시오.\n선박 대 선박 또는 선박 대 항만시설 등과의 보안등급이 다른 경우, 보안선언서를 작성하여 항만 시설 등에\n필요한 보안선언을 실시한다.\n[추가 질문] DOS를 작성할 때 몇 가지 상황을 말하시오.\n1) 인터페이스 하는 항만이나 선박보다 보안등급이 높은 경우\n2) 정부간 협정이 있는 경우\n3) 항만 또는 선박에 영향을 미치는 보안위협 또는 보안사건이 있었던 경우\n4) 보안체제가 요구되지 않는 항만에 입항하는 경우\n5) 보안체제가 요구되지 않는 선박과 선박 대 선박 활동을 하는 경우", "id": 269}, {"category": "ISPS & ISM", "question": "8. ISM 심사의 종류는 무었입니까?", "answer": "* ISM CODE(국제 안전경영 코드)\n국제해사기구(IMO) 가 Resolution A.741(18)로 채택하고, 필요에 따라 개정하는, 선박의 안전운항 및 환경보호를 위한 코드(code)를 의미한다.", "id": 270}, {"category": "ISPS & ISM", "question": "1. 초기심사(최초인증심사)", "answer": "회사와/또는 선박의 안전경영시스템이 인증규칙 2편(안전경영시템 요건)관련 요건과 일치하는가를 입증하기 위하여 모든 요건에 대하여 시행하는 심사를 말함.", "id": 271}, {"category": "ISPS & ISM", "question": "2. 연차심사", "answer": "회사의 안전경영시스템이 계속적으로 유효하게 운용되고 있는가를 확인하기 위하여 인정서의 유효개시일로부터 1년마다 시행하는 심사를 말하나. 단, 회사가 신청하는 경우 선박에도 적용할 수 있다.", "id": 272}, {"category": "ISPS & ISM", "question": "3. 중간심사(중간인증심사)", "answer": "선박의 안전경영시스템이 계속적으로 유효하게 운용되고 있는 가를 확인하기 위하여 인정서의 유효개시일로부터 2년6월에 시행하는 심사를 말한다.", "id": 273}, {"category": "ISPS & ISM", "question": "4. 갱신심사(갱신인증심사)", "answer": "새로운 인증서를 발급하기 위하여 초기심사와 동등한 방법으로 5년마다 시행하 심사를 말한다. 단, 별도의 문서심사는 시행하지 않는다.", "id": 274}, {"category": "ISPS & ISM", "question": "5. 수시(interim)심사(수시인증심사)", "answer": "새로운 회사를 설립하거나, 새로운 선종 또는 국적이 추가되는 경우 및 신조선박, 선박도입 등의 경우에 시행하는 심사를 말한다.", "id": 275}, {"category": "ISPS & ISM", "question": "6. 특별심사", "answer": "초기심사, 정기적심사(연차심사, 중간심사) 및 수시심사 이외에 안전경영시스템에 중대한 영향을 미치는 사항이 발생하여 안전경영시스템에 대한 유효성 검증을 위하여 시행되는 심사를 말한다.", "id": 276}, {"category": "ISPS & ISM", "question": "7. 수시(Additional)심사(수시인증심사)", "answer": "수시(Interim)심사후 시스템 이행실적이 확보된 경우, 인증기관이 이전되는 경우, 인증서가 취소되었다가 회복하기 위한 경우, 선명변경, 일정기간(3월 이상) 사용하지 않은 선박의 운항을 재개하는 경우 및 안전경영시스템의 중대한 변경이 발생한 경우 등에 시행하는 심사를 말한다.\n제조검사 시 행해지는 검사?\n선체, 기관, 의장 및 비품의 구조, 재료, 치수 및 공작 등에 관하여 검사를 함\n1) 도면승인\n2) 재료\n3) 기관장치 : 주기관, 축계, 보일러, 압력용기, 전기설비, 중요한 용도에 사용되는 보기 및 관장치\n4) 공작\n5) 제반시험 : 수압시험, 수밀시험 및 효력시험, 제어장치 및 계측장치\n6) 복원성시험\n- 여객선 및 여객선 이외의 길이가 24 미터 이상인 선박\n- 복원성 계산기능을 갖는 복원성 적하지침기가 설치시 계산결과 승인이 필요\n7) 시운전\n- 선박의 모든 설비, 기계 및 전기설비에 대해 시운전 실시\n- 해상 시운전 : 속력시험, 후진시험, 조타시험, 비상조타시험, 선회력 시험, 기관의 작동상태와 운전중 선박 상태\n* 적합증서(DOC/안전관리적합증서)\nISM Code의 요건에 적합한 회사에 발행되는 문서", "id": 277}, {"category": "ISPS & ISM", "question": "1. DOC (Document of Compliance)", "answer": "안전관리적합증서로서 ISM Code에서 선박경영자가 ISM Code의 요건에 적합한 선박안전경영시스템을 갖추고\n있는 경우 주관청이 승인한 증서를 말한다.\nDOC의 원본은 회사에 보관하며, 사본은 선박에 비치하도록 한다.\n* 안전경영증서(SMC/선박안전관리증서)\n인정된 SMS에 따라 회사와 선박이 운영되고 있다는 것을 나타내는 문서를 의미하며 선박에 발급된다.\n선박안전관리증서로 회사와 선박이 승인된 선박안전경영시스템에 따라서 운영되는가를 검증하여 주관청이 승인한 증서로 원본은 선박에 보관한다", "id": 278}, {"category": "ISPS & ISM", "question": "DOC와 SMC의 원본은 어디에 보관하여야 하는지 말하시오.", "answer": "DOC 원본은 회사에 보관을 하고 SMC의 원본은 선박에 보관한다.", "id": 279}, {"category": "ISPS & ISM", "question": "9. 외부 심사의 종류는 무엇입니까?", "answer": "회사의 안전/품질 업무가 ISM CODE, ISPS CODE, ISO 9002 및 제반 국,내외 법규에 적합하게 이행되고 있는지를 공인된 외부 인증기간으로부터 검증받아 증서를 적합하게 유지하고 회사의 안전/품질 업무를 개선시키는데 목적이 있다.", "id": 280}, {"category": "ISPS & ISM", "question": "31.ISM상 선장의 의무와 권리", "answer": "-회사의 안전 및 환경보호 방침의 이행\n-회사 방침 준수하도로고 승무원 독려\n-간단명료 적절하게 지시하고, 지침을 하달\n-규정준수여부 검증\n-SMS 검토, 결함사항 보고\n[추가 질문] 본선에서 출입제한구역을 확인하려면 어디 문서를 보아야 하는가?\nSSP(Ship Security Plan)을 보면 출입제한구역을 확인할 수 있다.\n[추가 질문] 무엇에 의거해서 security 내용들이 만들어지는지?\nISPS code\nISO란 무엇인가요??\nISO는 **국제표준화기구(International Organization for Standardization)**의 약칭으로, 전 세계 국가들의 표준 제정 단체들이 모여 만든 비정정부 기구입니다.\n쉽게 말해, **\"전 세계 어디서나 통용되는 공통의 약속(표준)\"**을 만드는 곳이라고 이해하시면 됩니다.\nISO의 존재 이유: \"왜 표준이 필요한가?\"\n만약 나라마다 나사의 규격이 다르거나, 신용카드의 크기가 제각각이라면 국제적인 거래와 물류는 마비될 것입니다. ISO는 이러한 혼란을 막기 위해 제품, 서비스, 시스템이 갖추어야 할 품질과 안전, 효율성에 대한 기준을 세웁니다.\nISO의 특징\n자발적 참여: ISO는 법적 강제력을 가진 기구는 아닙니다. 하지만 국제 입찰이나 거래 시 \"ISO 인증\"을 요구하는 경우가 많아 사실상의 강제력을 가집니다.\n이름의 유래: 그리스어로 '평등' 또는 '동일'을 뜻하는 **'isos'**에서 따왔습니다. 어떤 언어로 번역하든 약칭이 ISO로 통일되도록 하기 위함입니다.\n업데이트: 기술의 발전에 따라 표준은 주기적으로 개정됩니다. (예: ISO 9001:2015는 2015년에 개정된 버전임을 의미합니다.)\n선박 검사와의 연관성\n질문하신 선급 검사나 정부 검사 과정에서도 **ISO 9001(품질)**이나 ISO 14001(환경) 인증 유무는 매우 중요합니다. 선박을 관리하는 회사(관리사)가 국제적인 표준에 맞춰 안전하게 배를 운영하고 있다는 객관적인 증거가 되기 때문입니다.", "id": 281}, {"category": "ISPS & ISM", "question": "67. BMP4 FULL NAME?", "answer": "해적대응을 위한 실무지침\nBest Management Practice 4", "id": 282}, {"category": "ISPS & ISM", "question": "66. 시타델 요건 4가지", "answer": "1) 외부에서 식별, 내부 관찰이 어려운 장소에 설치할 것\n2) 총격, 폭파 등으로 개방이 어려운 견고한 외벽 및 출입문을 설치할 것\n3) 폭파 시 비산되는 파편을 막을 수 있는 중간벽을 설치할 것\n4) Citadel 피신은 반드시 사전에 해군함정과의 연락이 있을 것\n5) Citadel로 피신할 경우 낙오자 없이 전 선원이 함께 피신할 것\n6) 선박 통제장치, 공기조절장치, 비상통신 장비, 엔진차단 장치, 식음료, 응급약품, 비상전원, 화장실, 원격조정 CCTV 등이 구비될 것\n1) 시타델이란\n해적 공격 등 긴급상황 발생 시 몸을 숨길 수 있는 일종의 대피소다. 외부에서 부수고 들어올 수 없도록 두꺼운 강철로 만들어지며, 통신장비와 보통 3일분의 식음료 등을 갖추도록 되어 있다. 또한 외부에서는 문을 열 수\n없도록 내부 잠금장치가 설치되 있다.\n2) 선박대피처의 법적 요건을 말하시오.\n1) 테러 등으로 선원의 안전에 위험이 발생될 수 있는 해역(위험해역: 아덴만 및 서인도양)을 통항하는 선박에\n선원대피처를 설치토록함(제56조의2)\n2) 선원대피처의 구조 요건, 기본설비, 비품 및 위성통신설비 요건을 규정함(제56조의4부터 제56조의6)\n가. 선원대피처는 강재로 둘러싸인 구조로서, 제1출입문과 제2출입문의 판 두께의 합은 13밀리미터 이상일 것\n나. 양방향 초단파대 무선전화장치 1대, 휴대용 비상전등(정원 1인당 1개) 및 휴대용소화기 1개, 구난식량\n(정원 1인당 1만킬로줄), 음료수(정원 1인당 3리터), 응급의료구 1식, 간이 화장실 1식, 공기공급장치 1식,\n위성통신설비 및 비상배터리\n3) 현존선은 2011.03.16일 이후 처음으로 도래하는 정기적검사(정기검사, 제1종 중간검사, 제2종 중간검사)\n또는 2011.09.17일 중 먼저 도래하는 날까지 선원대피처를 설치하여야 한다.\n시타델(선원대피처)의 주요 요건 4가지질문하신 내용 중 6가지 리스트에서 핵심적인 기술적/운용적 요건을 4가지로 요약하면 다음과 같습니다.\n-은폐성 및 관찰 제한: 외부에서 대피처임을 쉽게 식별할 수 없어야 하며, 내부에서의 활동이 밖으로 노출되지 않는 장소에 설치해야 합니다.\n-견고한 방호 구조: 총격이나 폭발물에 견딜 수 있는 강철 외벽과 출입문을 갖추어야 하며, 특히 출입문 판 두께의 합은 13mm 이상이어야 합니다.\n-생존 및 통신 설비: 외부의 도움 없이 일정 기간(보통 3일 이상) 생존 가능한 식음료, 공기 조절 장치, 비상 전원, 그리고 해군 함정과 연락 가능한 위성 통신 장비가 필수입니다.\n-원격 제어 및 차단 기능: 해적이 선박을 운항하지 못하도록 선내에서 엔진을 차단하거나 선박을 통제할 수 있는 시스템이 구비되어야 합니다.\n선원대피처 법적 설치 상세 (정리)제시하신 법적 요건 중 수치와 품목은 정확한 암기가 필요합니다.\n구분주요 내용 및 규격구조 요건강재 구조, 제1·2출입문 판 두께 합계 13mm 이상통신 설비양방향 VHF(무선전화장치) 1대, 위성통신설비 및 비상배터리생존 비품구난식량(1인당 10,000kJ), 음료수(1인당 3L), 휴대용 비상전등(1인당 1개)위생/안전간이 화장실, 공기공급장치, 응급의료구, 휴대용 소화기💡 추가 팁: 운용상의 주의사항전원 피신: 시타델 피신 결정 시, 선장은 반드시 낙오자 없이 전 선원이 입실했음을 확인한 후 내부에서 잠금장치를 작동해야 합니다.\n사전 연락: 해적의 공격을 인지한 즉시 해군 함정 및 선사 보안책임자(CSO)에게 상황을 전파하고 시타델 진입을 알려야 합니다.", "id": 283}, {"category": "ISPS & ISM", "question": "66. 시타델 요건 4가지", "answer": "1) 외부에서 식별, 내부 관찰이 어려운 장소에 설치할 것\n2) 총격, 폭파 등으로 개방이 어려운 견고한 외벽 및 출입문을 설치할 것\n3) 폭파 시 비산되는 파편을 막을 수 있는 중간벽을 설치할 것\n4) Citadel 피신은 반드시 사전에 해군함정과의 연락이 있을 것\n5) Citadel로 피신할 경우 낙오자 없이 전 선원이 함께 피신할 것\n6) 선박 통제장치, 공기조절장치, 비상통신 장비, 엔진차단 장치, 식음료, 응급약품, 비상전원, 화장실, 원격조정 CCTV 등이 구비될 것\n1) 시타델이란\n해적 공격 등 긴급상황 발생 시 몸을 숨길 수 있는 일종의 대피소다. 외부에서 부수고 들어올 수 없도록 두꺼운 강철로 만들어지며, 통신장비와 보통 3일분의 식음료 등을 갖추도록 되어 있다. 또한 외부에서는 문을 열 수\n없도록 내부 잠금장치가 설치되 있다.\n2) 선박대피처의 법적 요건을 말하시오.\n1) 테러 등으로 선원의 안전에 위험이 발생될 수 있는 해역(위험해역: 아덴만 및 서인도양)을 통항하는 선박에\n선원대피처를 설치토록함(제56조의2)\n2) 선원대피처의 구조 요건, 기본설비, 비품 및 위성통신설비 요건을 규정함(제56조의4부터 제56조의6)\n가. 선원대피처는 강재로 둘러싸인 구조로서, 제1출입문과 제2출입문의 판 두께의 합은 13밀리미터 이상일 것\n나. 양방향 초단파대 무선전화장치 1대, 휴대용 비상전등(정원 1인당 1개) 및 휴대용소화기 1개, 구난식량\n(정원 1인당 1만킬로줄), 음료수(정원 1인당 3리터), 응급의료구 1식, 간이 화장실 1식, 공기공급장치 1식,\n위성통신설비 및 비상배터리\n3) 현존선은 2011.03.16일 이후 처음으로 도래하는 정기적검사(정기검사, 제1종 중간검사, 제2종 중간검사)\n또는 2011.09.17일 중 먼저 도래하는 날까지 선원대피처를 설치하여야 한다.", "id": 284}, {"category": "ISPS & ISM", "question": "64. 선박의 출입제한구역의 정의를 영어로 설명하시오.", "answer": "The restricted areas shall be clearly marked to indicate that access to the area is restricted. In principal, the access to ship is permitted only for the personnel connected to the work activities of crew on board and the passangers or outsiders authorized by the SSO for other prupose.\n[추가 질문] 출입제한구역의 종류을 말하시오.\n1) Navigation bridge, Engine room and Engine control room, Radio room\n2) Steering Gear room, Air conditioning room and Fan room\n3) Store with oxygen or hydrogen bottles for welding\n4) Paint store, Chemical store including dangerous goods\n5) Fire control station and Co2 room, crew accommodation\n6) Stores with provision and consumable, emcy generator room\n7) drinking water tank and its filling pipe, ballast control room\n8) battery room, bosun store, cargo area\n[추가 질문] 본선의 보안등급에 따라 제한구역을 어떻게 조치해야 하는가?\n[추가 질문] 본선에서 출입제한구역을 확인하려면 어디 문서를 보아야 하는가?\nSSP(Ship Security Plan)을 보면 출입제한구역을 확인할 수 있다.\n[추가 질문] 무엇에 의거해서 security 내용들이 만들어지는지?\nISPS code", "id": 285}, {"category": "ISPS & ISM", "question": "79. DP란?", "answer": "안전경영책임자, Designated Person", "id": 286}, {"category": "ISPS & ISM", "question": "4.1 ISM Code에 의해 식별된 안전경영책임자의 주요 역할은 안전경영시스템의 효과적인 이행이다. 회사의 안전문화의 도모 및 개발에 주요한 영향을 미치는 영향력과 책임을 가진 육상의 사람이다.", "answer": "4.2 안전경영책임자는 각 선박의 운항 중 모든 안전 및 오염방지활동에 대하여 검증 및 모니터를 해야 한다.\n모니터링은 적어도 다음의 내부 절차를 포함하여야 한다.\n.1 안전 및 환경보호 방침의 이행 및 전달;\n.2 안전경영시스템의 유효성을 검토하고 평가;\n.3 부적합, 사고 및 위험상황에 대한 보고 및 분석\n.4 내부심사의 감시 및 준비;\n.5 안전경영시스템의 적절한 개정; 그리고\n.6 적절한 인적자원 및 육상지원이 제공됨을 보장하여야 한다.", "id": 287}, {"category": "ISPS & ISM", "question": "4.3 안전경영책임자가 이 역할을 효과적으로 수행하기 위하여, 회사는 다음사항을 포함하여 적절한 자원 및 육상지원을 제공하여야 한다;", "answer": ".1 인적 자원;\n.2 물적 자원;\n.3 모든 훈련의 충족;\n.4 책임과 권한의 명확한 규정 및 문서화; 그리고\n.5 부적합 및 관찰사항을 최고 경영층에 보고하는 권한\n4.4 안전경영책임자(들)은 ISM Code에 적합한 안전경영시스템의 이행을 효과적으로 검증하고 모니터하기 위하여 MSC-MEPC.7Circ.6에 나타난 것처럼 자격, 훈련 및 경력을 갖추어야 한다.", "id": 288}, {"category": "ISPS & ISM", "question": "80. DP에 관하여 영어로 설명하시오", "answer": "안전경영책임자, Designated Person\n각 선박의 안전운항을 보장하고 회사와 선박의 연결고리를 제공하기 위해 최고 경영층과 직접 협의할 수 있는 육상직원을 말한다. 지정된 자의 책임과 권한은 각 선박의 운항상 안전 및 오염방지 측면을 감독하고 필요에\n따라 적절한 자원과 육상지원의 제공을 보장하여야 한다.\nThe person who has the overall responsibility for the establishment and operation of the safety management system for safe ship operation and prevention of pollution and is capable of reporting to the CEO and of\nEnsuring the communication between the Company and the vessels and is appointed from among the executives and staff.\n1) 해적이 본선을 공격하고 있다\nI am under attack by pirates.\n2) 본선에 화재가 발생했다\nI am(M/T STX ACE6) on fire.\n3) 미확인 선박과 충돌하였다\nI have collided with unknown vessel.\n4) 본선은 폭발의 위험이 없다\nNo danger of explosion on me.\n5) 어디에 화재가 났는가?\nWhere is the fire?\n6) 기관전진에서 후진으로 바꾸는 데 시간이 얼마나 걸립니까?\nHow long does it take to change engine from ahead to astern ?\n7) 닻이 끌리고 있다.\nI am dragging anchor.\n8) 도선사는 어느 위치에서 승선하는가?\nIn what position can I take pilot?\n9) 귀선이 풍하 측으로 오도록 우현으로 선회하겠다.\nI will turn to strawboard to make a lee for you.\n10) 나는 귀선을 구조하러 갈 것이고 도착시간은 15시 30분이다.\nI will proceed to your assistance and ETA at distress position at 1530 UTC.\n11) 윈드라스에 기어를 넣어 체인을 1샤클 내어주어 앵커투묘를 준비하시오.\nPut the windlass in gear and ready for drop anchor by pay out chain of 1 shackle.\n12) 파일럿 승선 위치 2마일 전에 다시 보고하시오.\nReport again B4 2 miles of pilot boarding position.\n13) 본선은 후진 중 이다.\nI am going astern.\n14) 본선의 앵커장력은 너무 강하다.\nMy anchor tension is too strong.\n15) 어느 쪽 현측에 pilot ladder를 준비해야 합니까?\nWhich side do I have to stand by the pilot ladder?\n16) 본선은 현재 속력을 감속한 상태로 우현 변침 중이다.\nI am altering course to starboard in reduced speed.\n17) 선수는 head line, 선미는 stern line으로, single up 하라.\nMake single up, forward by head lines and aft by stern lines.\n18) 현재 엔진은 선교에서 사용합니까? 기관실에서 사용합니까?\nIs the engine-room manned or is the engine on bridge control?\n19) 조타가 안되면 이야기하시오.\nReport if she does not answer the wheel.\n20) 귀선은 타선의 진로를 방해하고 있다.\nYou are obstructing the course of other vessel.\n21) 귀선의 전방/후방을 통과하겠다.\nI will pass ~nautical miles ahead/astern of you.\n22) 귀선의 재화중량톤수는 어떻게 되나요?\nWhat is your deadweight?\n23) 본선의 재화중량톤수는 23,000 TON입니다.\nMy deadweight is 23,000 Tons.\n24) 틈 사이에 DUNNAGE를 집어넣으시오.\nPlace dunnage between the tiers.\n25) 본선이 귀선보다 빠른 상황인데 본선이 귀선의 선수/선미를 지나려 한다.\nMy speed is more faster than yours, therefore I will pass ~ NMs forward/aft of you.\n26) 영어- 체인의 방향이 어디로 향하고 있습니까?\nWhere is the cable leading?\n27) 영어- 체인에 장력은 얼마나 걸립니까?\nIs there much weight on the cable?\n28) 귀선은 타선의 진로를 방해하고 있다.\nYour vessel is be disturbancing another vessel.\n29) 화재장소가 어딥니까?\nWhat is on fire?\n30) 타효가 없으면 이야기 하시오.\nReport if she does not answer the wheel.\n31) 귀선의 엔진은 선교에서 컨트롤 합니까? 기관실에서 컨트롤 합니까?\nIs engine-room manned or is engine on bridge control?\n32) Ahead에서 Astern까지 시간이 얼마나 걸립니까?\nHow long does it take to change engine from ahead to astern?\n33)앵커의 장력이 얼마나 걸려 있습니까?\nHow much weight on the Cable?\n34)체인의 방향은 어떻습니까?\nHow is the cable leading?\n35) 체인 방향은 수직입니다.\nThe cable is leading up and down\n36) 타효가 없을 시에 보고하시오.\nRepeat if she does not answer the wheel\n37) 마지막 항만국통제검사는\nWhat is your last PSC inspection?\n38) 도선사 어느현 승선\nIn what position can I take the pilot?\n39) 귀선을 본선의 레이더에서 확인햇다\nI have located you on my radar screen.\n40) smcp 해적에게 공격을 받고 있다 군사적 원조를 원한다\nI am under attack by pirates, I require military assistance\n41) smcp 원조를 위하여 항해중이다. eta는 세계시 1530분이다.\nI am proceeding for assisitance. ETA at 1530 UTC\n42) smcp 비상부서로 모여라.\nAll Crew members to assembly station.\n43) 충방 조항/ 영어로 말하기 \"예인작업을 하고 있는 조정제한 동력선은 등화표시를~~~해야한다\"\nTowing vessel restricted in her ability to maneuver shall exhibit 2 or 3 master headlight in a vertical line\n44) 영어말하기 VHF통화시, convoy 상황에서 \"귀선은 앞쪽에 있는 선박과 간격을 가까이(멀리) 하시오\"\nYou must clear from ahead of you.\n45) 영어말하기 VHF통화시, convoy 상황에서 \"귀선은 앞쪽에 있는 선박과 간격을 가까이(멀리) 하시오\"\nYou must clear from ahead of you.\n46) 영어 본선이 귀선을 풍하측이 되도록 하라\nMake a lee for my boat\n47) 영어 귀선이풍하측으로오도록우현측으로변침하겠다\nI will turn to starboard to make a lee for you.\n48) 영어 예인작업중인 동력선은 2개 또는 3개의 등을 마스트에 설치하여야 한다 .충방조문\nTowing vessel restricted in her ability to maneuver shall be 3 all round light(R.W.R)\n49) 선수쪽 처진 라인을 감아라.\nHeave up the slaked headline\n50) 귀선은 앞쪽 선박과 마주 보는 위치이다.\nYou are head on situation ahead of you.\n- 귀선은 타선의 진로를 방해하고 있다. Your vessel is be disturbancing another vessel.\n- 화재장소가 어딥니까? What is on fire?\n- 타효가 없으면 이야기 하시오. Report if she does not answer the wheel.\n- 귀선의 엔진은 선교에서 컨트롤 합니까? 기관실에서 컨트롤 합니까? Is engine-room manned or is engine on bridge control?\n- Ahead에서 Astern까지 시간이 얼마나 걸립니까? How long does it take to change engine from ahead to astern?\n- SMCP 약자 ; For Standard marine communication phrases.\n- IMDG 약자 ; International Maritime Dangerous Goods\n- IAMSAR 약자 ; (International Aeronautical and Marine Search and Rescue:국제 항공기와 해사 수색구조)\nvts 관제사 영어 작문\n7. (영어) 충방 원문 영작 (각 조항마다 다르게 물어봐서 중요한 조항을 영문도 파악하심이 좋을 듯 합니다.)", "id": 289}, {"category": "해사영어!", "question": "8. (영어) 어디에서 도선사가 승선합니까?/도선사는 2번 P/S에서 지방시 1230에 승선예정이다.", "answer": "귀선은 우현으로 변침하여 풍하측을 만들어라\n귀선 선수쪽 배에서 떨어져야한다\n도선사도착전 앵커를 감을준비해라\n1~7번까지 영어 문장을 놓고 각각 하나씩 읽고 해석하라는거.\n선수에 처진줄을 감아라\n도선사는 어디에서 승선하는가?\n선수선미 줄을당겨 접안 완료하여라.\n전선원은 비상부서로모여라\n전사관은 선교로 보고하라\nSMCP: 2척의 동력선은 상호 시계 내에서 피항선이 유지선과 근접 상태를 피해야 한다.(\nSMCP2: 접안 상황, 파일럿 상황 등 각 상황 1사람 당 5개 씩 물어보셨습니다.\n(넘 많아서 지금 기억 나는 건 처진 헤드라인 감하라, 선수 선미 계류삭을 감아라, 라인은 현재 상태 유지하라,\n도선사는 어디서 승선하는가 등등 / 일반적으로 선내에서도 쓰이는 SMCP를 전체적으로 봐야할듯 하네요.)\nSMCP는 기출 문제 포함 카페 내에 있던 SMCP 자료를 프린트하여 실무에 잘 쓰이지 않을 것 같은 부분 제외하고\n전부 공부하시는 것이 좋을 것 같습니다", "id": 290}, {"category": "해사영어!", "question": "6.SMCP : 기관을 전진에서 후진까지 시간이 얼마나 걸립니까?", "answer": "Anchor 장력은 어떠한가? Anchor 방향은 어떠한가? 기타 등등 선교와 선수간에 투묘/양묘 관련 SMCP", "id": 291}, {"category": "해사영어!", "question": "5.smcp 본선에좀더 접근하라 또 쳐진헤드라인을 감아들여라", "answer": "SMCP (귀선은 위험속도로 접근중입니다./ 하나더있었는데 기억이 안나네요...귀선 전방의 선박과 충분한 거리로 돌아가세요 이던가 그랬습니다.)", "id": 292}, {"category": "항해!", "question": "1. 항행계획 이란 무엇인가요?", "answer": "SOLAS amendment V/34 (Safe navigation and avoidance of dangerous situation)에 보면 항해 시작전에 선장은 적절한 해도와 수로서지를 이용한 통항계획을 수립할 것이라고 되어 있습니다. 즉, 항해 계획이란 안전한 항해를 위하여 Berth to Berth 전 구간에 대하여 최적의 통항로를 설정함을 목적으로 하는 절차를 말합니다\n*항해계획 수립절차: 검토(APPRAISAL) → 계획(PLANNING) → 실행(EXECUTION) → 확인(MONITORING)", "id": 293}, {"category": "항해!", "question": "1. 검토", "answer": "1) 예상항로 및 항구에 관한 모든 정보를 수집한다.\n2) 예정항로 및 항구에 필요한 해도의 준비 및 최근까지의 소개정 여부를 확인한다.\n3) 고려해야 할 필요정보는 다음과 같다.\nA. 조석/조류\nB. 항로 및 항구의 허용흘수\nC. Sailing Direction상에 나타난 조언/권고\nD. 등대(특징, 광달거리, arc of visibility), 항로표지, 통항분리대\nE. 항해계기를 이용할 수 있는지 여부\nF. 그 지역에 영향을 미치는 항행경보, 기후정보 및 기상 정보\nG. 본선의 조종성능 자료\nH. 선박의 상태, 감항성, 설비 및 장비\nI. 화물의 특성 (특히 위험화물) 및 적재상태\nJ. Ocean Passage of the world\nK. routing chart\nL. 기상서비스업체의 권고사항 (필요시)\nM. Ship Reporting System, VTS 및 해양환경보호 사항\nN. 해상교통량, 도선사 승하선 관련 정보, 본선보유 각종 증서 및 서류\n4) 예정항로 결정은 당해 항차 관련정보를 검토 후 선장이 결정한다.", "id": 294}, {"category": "항해!", "question": "2. 계획", "answer": "1) 예정항로에 관련된 모든 정보를 충분히 검토 후 선장의 지시에 따라 2항사가 세부 항해계획(berth to berth)을 양식에 의거 작성한다.\n2) 항해계획 확정을 위해 다음 사항을 완비하여야 한다.\nA. 적당한 축척의 해도에 작도, 위험지역 표시, 예정항로상의 허용오차에 대한 여유\nB. 해도상의 항로는 360도 표시법으로 기입\nC. 해도상에 위치를 구하기 위한 radar 목표물 표시(명확한 목표물, RACON등)\nD. 해도상 항로 목표물의 방위와 거리 표시\nE. 암초, 저수심 등 피험선 설정\nF. 조석표, 조류도, 수로지 및 항로지 등의 해조류에 관한 기사를 참조\nG. VTS 및 Ship Reporting 지침 표시\nH. 해양환경보호 특별해역 표시\n3) 항해계획의 주요 요소를 결정하기 위해 다음 사항을 포함하여야 한다.\nA. 안전속력 및 흘수제한선의 경우 선회시 선체경사로 인한 여유수심 감소 허용치\nB. 야간 통항이나 조류로 인한 제한지역에서 요구되는 ETA를 맞추기 위한 선속변경 필요성\nC. 기관을 사용하여야 할 지점\nD. 변침점에서의 변침시 본선 선회권 및 조류 등의 외력 영향 고려\nE. 제한지역에서 최저 용골하 여유수심\nF. 정확한 위치를 구하기 어려운 지점에서의 위치를 구하는 방법 및 주기\nG. 비상시 묘박지로의 진행 계획\n4) 도선사 승선지점 부근의 진입 금지구역 및 주의사항을 사전 표시하여야 한다.", "id": 295}, {"category": "항해!", "question": "3. 실행", "answer": "선장은 2항사가 작성한 항해계획을 검토, 승인한 후 계획을 실행하여야 한다.\n1) 계획실행 결정시 다음 요소를 고려하여야 한다.\nA. 본선 항해장비의 신뢰도 및 상태\nB. 조석 및 조류\nC. 지정학적 조건: 자주 시계제한을 받는 지역 등\nD. 위험지점 통과시간\nE. 통항이 집중되는 지점에서의 통항 상황\n2) 육안으로 위치확인을 해야 하는 지역에서 시계가 제한되는 경우 등 특수상황의 발생을 고려하여야 한다.\n3) 선장은 예상항로 중 추가 당직자가 필요한 지역을 고려하여야 한다.", "id": 296}, {"category": "항해!", "question": "4. 확인", "answer": "A. 확정된 항해계획은 선교에 비치하여 당직사관이 항상 활용할 수 있도록 하여야 한다.\nB. 사전 계획된 항로를 따라 선박이 진행하고 있는지를 계속적으로 확인한다.\nC. 출항전, 제한수역 또는 위험수역 진입전, 항해계기의 작동상태를 필히 점검하고 항해 중 규칙적으로 자주\n점검하여야 한다.\nD. 선위 확인을 위해서는 사용 가능한 모든 항해계기를 이용해야 하며 연안항해시는 상황이 허용하면 언제나 선위의 확인은 두가지 이상의 방법으로 이루어져야 한다.\nE. 선위는 적절한 간격으로 해도상에 표시를 하여야 하며, 특히 연안항해나 입출항시 또는 도선구역 진입시에는 빈번한 간격으로 선위를 확인하여야 한다.\nF. Radar의 평행방위선 기술(Parallel Indexing)이 어떤 목표물에 대하여 계속적으로 선위를 확인하는데 가장\n간편하고 효과적인 위치확인 방법임.\nG. 확정된 또는 실행중인 항해계획의 변경은 본 지침에 의거 수립되고 기록한다.\n선박에서 자차곡선을 그리는 방법. 자차측정방법 자차수정법도 기출 빈도가 높습니다.", "id": 297}, {"category": "항해!", "question": "66. 왜 자차계수 B를 수정할 때는 090도 침로를 택하는가? 왜 자차계수 C를 수정할 때는 180도 침로를 택하는가?", "answer": "- 자차계수 B는 선체영구자기의 선수미분력와 수직연철의 일시자기이기 때문에 090도로 정침하여 선수미 B자석으로 수정합니다.\n- 자차계수 C는 선체영구자기의 정횡방향 분력으로 인한 것이기 때문에 180도로 정침하여 정횡 C자석으로 수정합니다.", "id": 298}, {"category": "항해!", "question": "67. Gaussin Error", "answer": "일정한 침로로 장기간 항해하던 선박이 변침을 하면,\n1) 일시적인 반영구자기와\n2) 선체연철의 자기점성에 의하여\n선체자기가 정상상태로 될 때까지 약 5분동안 생기는 오차를 말하며 동서에서 남북침로로 대각도 변침했을 때 가장 현저하게 나타난다.\n*해결법: 가능한 대각도 변침을 피하여 소각도로 여러 번 나누어 변침한다.", "id": 299}, {"category": "항해!", "question": "68. 방위측정 기구를 아는대로 말해보시오.", "answer": "1) Shadow pin 방위간\n2) Azimuth mirror 방위경\n3) Pelorus 방위반\n4) Azimuth Circle 방위환", "id": 300}, {"category": "항해!", "question": "1. Catzoc 이란?", "answer": ": 해도의 수심이나 저질 해안선등의 정확성을 나타내는 것 정확도에 따라 *1개 ~*6개 나뉨. 6개일수록 측정이 정확한 것. 선장이 항해계획을 작성하고 확인 & 안전한 항해에 반드시 알아야한다고 강조하셨습니다.", "id": 301}, {"category": "항해!", "question": "1. 다음 그림을 보고 천소, 협수 로에서 RADAR에 의한 항해방법을 설명하시오.", "answer": "- 일단 해도상의 침소구역과 고정물표의 안전거리를 확인하고 그 거리를RADAR의 렌지와 커스를 사용하여 정횡 거리로 침로 를 유지하고 변침은 고정물표(섬)의 방위와 거리에 의하여 행한다.\n참조) 구형레이더에서는 Parallel Index Line으로 방위선을 구하 며, EBL(Electric Bearing Line)으로 방위를 구한다.", "id": 302}, {"category": "항해!", "question": "28. 항정선 항법이란?", "answer": "항정선 : 지구위의 모든 자오선과 같은 각도로 만나는 곡선을 항정선 이라고 한다.\n항정선 항법 (럼 라인)\n지구상에서 출발 지점과 도착지검의 두 점 사이를 선으로 맺고, 그 선상에서 직행할 수 있는 일정한 침로를 정하여 항해 하는 것을 항정선 항법이라고 한다.\n거등권 항법\n선박이 정동(090) 또는 정서(270)로 항해할 때 위도 변경, 항정의 요소를 구하는 항법", "id": 303}, {"category": "항해!", "question": "29. 중분위도 항법이란?", "answer": "출발 지점과 도착지점 사이의 항정이나 위도의 차가 크기 않고 위도의 부호가 같은때 평균중분위도와 진중분위도의 동서거는 거의 같다는 전제하에 이루어진 항법.\n점장 위도 항법 ?\n중분위도항법은 가정을 전제로한 항법이기 때문에 오차를 면할수 없으나, 점장도를 이용한 항법으로 장거리 계산에 정확한 결과를 얻을수 있는 항법", "id": 304}, {"category": "항해!", "question": "30. 집성 대권 항법 이란? – 무슨 항법과 무슨 항법의 조합인가?", "answer": "-대권 항법 : 지구상의 두 지점 간을 항행하는 경우 두 지점을 연결하는 대권상을 항주하는 항법\n-집성 대권 항법 : 지구상의 두 지점 간을 최단 거리고 항해하는 경우의 항법\n두지점을 지난 대권은 극쪽으로 볼록한 곡선이 되므로 대권을 따라 항해하게 되면 기상 상태가 조치 못하거나 섬, 육지등의 차단으로 인하여 항해 할수 없는 경우가 있다\n이러한 경우 대권항법과 함께 거등권 항법을 함께 이용하여 목적지로 항해하는데 이와 같은 항법을 집성 대권항법이라고 한다.", "id": 305}, {"category": "항해!", "question": "70. 대권항법에 대해 설명하시오.", "answer": "◈ 대권항법 : 지구상의 두 지점 간을 항행하는 경우 두 지점을 연결하는 대권상을 항주(航走)하는 항법으로 항정이 가장 짧은 항법으로, 통상 600마일 이상 장거리 항해할 때 적용한다.", "id": 306}, {"category": "항해!", "question": "71. 점장도법과 평면도법에 대하여 아는 대로 설명하시오.", "answer": "1) 평면도법 : 지구표면의 좁은 구역을 평면으로 간주하고 그린 축척이 큰 해도로 항박도는 평면도법 적용\n2) 점장도법 : 항정선을 직선으로 나타내기 위하여 고안된 도법", "id": 307}, {"category": "항해!", "question": "1. 개요", "answer": "항해거리를 단축하고 연료를 절약할 목적으로 지구표면의 2지점을 지나는 대권을 따라 항해하는 항법. 대권도를 이용하여 변침점을 결정. 변침점 사이를 항정선 항법이나 중분위도 항법을 이용하여 항해한다. 점장도 상에서는 극으로 불룩한 곡선으로 표시된다.", "id": 308}, {"category": "항해!", "question": "2. 장점", "answer": "① 항정이 짧아진다.\n② 고위도 일수록 좋다.\n③ 침로가 동서에 가까울 수록 좋다.\n④ 거리가 멀수록 좋다.(두 지점 사이의 거리가 멀수록 대권거리와 항정선거리의 차가 커진다)", "id": 309}, {"category": "항해!", "question": "3. 단점", "answer": "① 자주 변침해야하고, 비교적 항법자체가 복잡하다.\n② 고위도를 통과해야하므로 기상상태가 나쁠 확률이 높다.", "id": 310}, {"category": "항해!", "question": "4. 집성대권항법", "answer": "두 지점을 지나는 대권의 정점이 실제로 항해하기에 너무 높은 위도에 있거나 바람, 해류 등의 외력 또는 육지나 섬의 존재 등 다양한 이유로 대권 위를 항해할 수 없는 경우가 있다. 이 경우 제한위도를 설정하고 대권을 따라 항해하다 제한위도에 도달하면 090도 또는 270도로 변침하고 그 거등권을 따라 항해한다. 그러다 다시\n제한위도와 대권과의 교점이 나오면 다시 대권을 따라 도착하도록 가는 방법이다.", "id": 311}, {"category": "항해!", "question": "3. 한국에서 싱가폴 항해시 대만의 좌측과 우측중 어디로항해하는것이 좋은가? (추가질문) 반대로 싱가폴에서 한국올때는?", "answer": "대만의 동쪽은 쿠루시오의 영향을 받게 되어 좋지 않으나 대만의 서쪽은 동절기 동중국해의 계절풍인 북동풍을 이용할수 있어서 유리하다 라고 대답했는데 질문하신분은 큰 이견이 없으신듯 보이시나 옆에 계시는 다른분 (상기1.2번 물어보신)이 그게 맞냐고 쿠루시오가 뭔데 영향을 받냐고 물어보십니다.\n대답하길 쿠루시오란 북동무역풍의 영향으로 생겨난 북적도해류가 편서풍에 의해 전향되어 생겨난 것입니다 그랬더니 바람방향이 뭔지 모르냐고 하시길래 어떤 바람방향을 말씀하시는겁니까 하니 북동풍이라며 그게 왜 북쪽으로 가냐 하십니다. 그래서 편서풍의 영향을 받아서 전향된것이라고 말씀 드렸습니다 하니 다시 편서풍이 뭔지는 아냐고 하십니다.\n그래서 대답하기를 위도 30-60도사이 아열대고압대에서 고위도저압대로 부는 바람입니다 답하니 못마땅해 하시는것 같아보이십니다. 질문하신분께서는 어떻게 점수주셨는지 모르겠으나 옆에계시는 분 기준으로는 틀렸나봅니다.", "id": 312}, {"category": "항해!", "question": "24. 항해 삼각형이란?", "answer": "구면상의 대권의 호로 이루어진 3각형을 항해 삼각형이라고 부른다.\n항해 삼각형의 각 꼬지점을 지구중심과 연결하여 지구표면에도 항해 삼각형과 닯은 지문삼각형이 생기는데 이것도 항해 삼각형이라고 한다.\n각변은 관측자의 동명극,\n관측자의 가정위치(AP : Assumed position),\n천체의 직하에 있는 천체의 지위(Geographical pisiiton : GP)\n용도 : 1) 천측을 통한 위치선 산정 2) 미지의 천체 식별 3) 고도를 알고 방위선 산정", "id": 313}, {"category": "항해!", "question": "50.연안 항해시 자차 측정방법?", "answer": "A.원표 방위법 B.상호방위법 C. 중시선에 의한법\n자차수정공식 A + B SIN@ + C COS@ + SIN 90도 일 때 = 1, COS 90도일 때 = 0", "id": 314}, {"category": "항해!", "question": "37. 자차를 측정하기 위해 선박을 어떻게 돌려야 하는가?", "answer": "1. << 000/090/180/270 (4 점방위)방위부터 시작( 모두 자침방위) >>\n2. << 이어서 8 점방위 수정 즉 045/135/225/315 자침방위 수정한다. >>\n2) 물표의 자침방위에 의한 방법 (중시선, 안벽에 의한 방법)\n- 정박지나 연안항해중 해도에 의해 자침방위를 알고 있는 저명한 물표가 있을 때\n- 항해중으로서 선위가 확실하게 결정되는 경우는 협수로를 항해하는중 전방에 현저한 물표가 있을 때\n- 2 물표의 방위를 일직선으로 측정할 수 있을 때\n- 방파제의 입구를 통과시 그 방파제의 방위를 관측할 수 있을 때 이다.", "id": 315}, {"category": "항해!", "question": "64. 자차 계수 A는 무엇인가? 불변차 계수라면 그 수정 법은 무엇인가?", "answer": "- 불변차계수: 선수방향이 어느 쪽에 있더라도 항상 일정한 불변계수이지만 자차계수 A가 커지면 아래의 원인을 제거하여 자차계수 A 오차를 줄인다.\n1) 컴퍼스에 기차가 있을 때 (콤파스, 자이로, 방위반 정렬 상태 등의 불량) → 장비 점검\n2) 선수미선과 컴퍼스의 기선이 정확하게 일치하지 않거나 평행하지 않을 때(콤파스, 자이로, 방위반 정렬 상태 등의 불량) → 장비 점검\n3) 컴퍼스 부근의 비대칭적인 수평연철이 배치되어 있을 때 → 연철봉\n4) 기타 편차의 잘못이나 관측상의 오차가 있을 때 → 계산 방식 검토", "id": 316}, {"category": "항해!", "question": "63. 자차측정법의 종류", "answer": "1) 원표 방위법\n- 정박지 등에서 명료하게 원표를 볼수 있는 경우에 사용하는 방법이다.\n- 선박을 선회하여 컴퍼스침로에 대한 선수 8주요점마다 멀리에 있는 저명한 물표의 컴퍼스 방위를 측정한 후 그 8개의 나침방위를 평균내서 나오는 방위를 그 물표의 자침방위로 간주하는 자차의 측정방법이다.\n- 시차가 작아야 하기 때문에 선박의 선회권에 비해 물표가 충분히 멀리 있을 필요가 있다.\n2) 천체 방위법\n- 천체의 진방위를 계산에 의해 구하고 측정한 컴퍼스방위에 편차를 가감하여 자차를 구하는 방법이다.\n- 선회면에 의해 시차각이 없으므로 선박위치, 측정시각, 편차 등이 정확하면 극히 정확한 자차를 구할 수 있다.\n- 이 방법에는 태양출몰방위각법, 시진방위각법, 고도방위각법, 극성방위각법 등이 있다.\n- 주로 태양출몰방위각법과 시진방위각법이 많이 사용된다.\n3) 물표의 자침방위에 의한 방법\n- 정박지나 연안항해중 해도에 의해 자침방위를 알고 있는 저명한 물표가 있을 때\n- 항해중으로서 선위가 확실하게 결정되는 경우는 협수로를 항해하는 중 전방에 현저한 물표가 있을 때\n- 2 물표의 방위를 일직선으로 측정할 수 있을 때\n- 방파제의 입구를 통과시 그 방파제의 방위를 관측할 수 있을 때 이다\n4) 상호방위법\n- 천체의 방위측정을 할 수 없거나 또는 적당한 원표를 발견할 수 없을 때 이용하는 방법으로서 지방자기의\n영향을 받지 않은 육상의 컴퍼스와 선내의 컴퍼스의 상호방위에 의해 각 선수방향에 대한 자차를 구하는\n방법이다.\n5) 자이로컴퍼스에 의한 방법\n- 자이로컴퍼스를 장비한 선박에서 자이로컴퍼스와 비교하면 극히 간단한 방법으로 자차를 측정할 수 있다.\n- 자차를 측정하려는 컴퍼스의 선수나침방위를 차례로 향하게 하여 자이로컴퍼스가 가르키는 침로와 비교한다.\n- 이 자이로컴퍼스의 침로에서 편차를 가감하면 자침로가 되므로 손쉽게 자차를 구할수가 있다.", "id": 317}, {"category": "항해!", "question": "62. 항해중 선박에서 자차 수정 중 유의사항", "answer": "1) 4방위 자차 수정만으로도 선박내 일반적인 자차 수정이 가능하므로 다른 자석을 이용하여 추가 수정은 금지한다.\n2) B, C 자석으로 자차 수정 시 4방위에서 10도 이상 차이가 나는 방위에서는 또 다른 오차 발생 소지가 있으므로 수정을 금지한다\n(ex. 349도에서 C자석에 의한 자차수정 금지, 또는 080도에서 B자석에 의한 자차수정금지 등)\n3) 자차 수정시 장소에 따라 자력의 영향이 달라지므로 가능한 자력의 영향이 없는 곳에서 시행\n(특히 광석 원료부두에서는 자력의 영향이 크므로 수정 금지)\n4) 수정 작업시 몸에 자성체를 소지하지 않도록 주의한다.", "id": 318}, {"category": "항해!", "question": "61. 자차 수정의 목적", "answer": "자차를 수정한다는 것은 / 자차의 원인인 선내 각종자기의 영향을 / 수정장치로 상쇄하여 / 컴퍼스 자침에 하등 영향을 미치지 않게 하는 것으로서 / 선수 각점에서 컴퍼스자침의 자력을 동일하게 만드는 행위를 말한다. 그러나 이것은 이상적인 것이고 실제로는 철물로 구성된 선박에서는 자차가 절대로 없어질 수가 없으므로 각 선수방위에 대한 자차의 양을 최소화하는데 자차수정의 그 목적이 있다고 말할 수 있다. 자차곡선도는 마지막 자차곡선도 작성일 이후 최대 1년 이내에 작성되어야 하며, 자차 허용범위는 -5도(W）〜＋５도(E)로 규정하고 있다.", "id": 319}, {"category": "항해!", "question": "60. 마그네틱 컴퍼스 자차계수 수정법을 설명하시오.", "answer": "1) 자차계수 A\n: 불변차계수\n2) 자차계수 B\n: (선체갑판면에 평행인 선체영구자기의 선수미분력)과 (수직연철의 일시자기의 선수미방향)에 의한 것이다.\n선수미 분력은 선수미 B자석, 수직연철에 의한 자차는 플린더즈바를 놓아 수정침로를 90도 또는 270도로 유지하고 Compass의 North가 자북을 가리킬 때까지 자석을 선수미 방향으로 넣어 수정한다.\n3) 자차계수 C\n: 선체영구자기의 정횡방향분력으로 인한 것, 정횡 C자석으로 수정. 침로를 0도 또는 180도로 유지하고 Compass의 North가 자북을 가리킬 때까지 자석을 정횡방향으로 넣어 수정한다.\n4) 자차계수 D\n: 상한차 자차계수. 선수를 자침방위 4우점중의 한방위로(NE, NW, SE, SW)로 향하게 하고서 연철구를 가까이\n혹은 멀리 조정하여 수정한다.\n5) 자차계수 E\n: 경선차계수. 선체가 수평일 때와 경사졌을 때의 자차간의 차이다. 영구자석(경선차 수정자석: heeling magnet)을 볼 밑에 놓아 컴퍼스카드가 미세하게 진동할 때까지 조정. 경침의(dipping needle)로 조정\n6) A/E 자차계수\n: A/E 자차계수 수정은 마그네틱컴퍼스를 선체 중앙에 설치하면 자차량이 적기에 거의 수정할 일이 없다.\n* 자차계수 수정\n1) 자차계수 A: 보통 그 값이 작으므로 수정하지 않는다.\n2) 자차계수 B: 선수미 B자석과 플린더즈바로 수정\n3) 자차계수 C: 정횡 C자석으로 수정\n4) 자차계수 D: 연철구, 수평자석으로 수정(최근 여러개의 퍼머로이판으로 판수나 거리를 조절하여 수정한다)\n5) 자차계수 E: 보통 그 값이 작으므로 수정하지 않는다.\n* Magnetic Compass 자차 수정 과정\n1) 해당구역의 Variation을 메모하여 둔다.\n2) Compass Deck에 설치되어 있는 스탠드의 자차 수정 자석을 확인한다.\n3) B자석 삽입구가 Port, STBD양쪽에, C자석 삽입구는 스탠드의 뒤쪽에 자리하고 있다.\n4) 먼저 OQ기를 게양하고, 선체를 수평상태로 함.", "id": 320}, {"category": "항해!", "question": "6. 자침로 135도를 유지, 연철구로 자차 수정", "answer": "5) 선박의 선회 과정 중에 주의깊게 관찰하여 선박이 정침할 때에 자석을 움직여서 신속하게 수정을 행하고\n이때의 수정은 오차의 허용치 내로 한다.\n6) A오차는 수정이 불가하므로 8방위의 오차를 기록하여 Deviation Curve를 기록 작성하여 수정자석의 삽입구의 번호도 같이 기록하여 선교의 잘 보이는 곳에 측정날짜와 Variation과 함께 기록, 계제한다.", "id": 321}, {"category": "항해!", "question": "60. 마그네틱 컴퍼스 자차계수 수정법을 설명하시오.", "answer": "1) 자차계수 A\n: 불변차계수\n2) 자차계수 B\n: (선체갑판면에 평행인 선체영구자기의 선수미분력)과 (수직연철의 일시자기의 선수미방향)에 의한 것이다.\n선수미 분력은 선수미 B자석, 수직연철에 의한 자차는 플린더즈바를 놓아 수정침로를 90도 또는 270도로 유지하고 Compass의 North가 자북을 가리킬 때까지 자석을 선수미 방향으로 넣어 수정한다.\n3) 자차계수 C\n: 선체영구자기의 정횡방향분력으로 인한 것, 정횡 C자석으로 수정. 침로를 0도 또는 180도로 유지하고 Compass의 North가 자북을 가리킬 때까지 자석을 정횡방향으로 넣어 수정한다.\n4) 자차계수 D\n: 상한차 자차계수. 선수를 자침방위 4우점중의 한방위로(NE, NW, SE, SW)로 향하게 하고서 연철구를 가까이\n혹은 멀리 조정하여 수정한다.\n5) 자차계수 E\n: 경선차계수. 선체가 수평일 때와 경사졌을 때의 자차간의 차이다. 영구자석(경선차 수정자석: heeling magnet)을 볼 밑에 놓아 컴퍼스카드가 미세하게 진동할 때까지 조정. 경침의(dipping needle)로 조정\n6) A/E 자차계수\n: A/E 자차계수 수정은 마그네틱컴퍼스를 선체 중앙에 설치하면 자차량이 적기에 거의 수정할 일이 없다.\n* Magnetic Compass 자차 수정 과정\n1) 해당구역의 Variation을 메모하여 둔다.\n2) Compass Deck에 설치되어 있는 스탠드의 자차 수정 자석을 확인한다.\n3) B자석 삽입구가 Port, STBD양쪽에, C자석 삽입구는 스탠드의 뒤쪽에 자리하고 있다.\n4) 먼저 OQ기를 게양하고, 선체를 수평상태로 함.", "id": 322}, {"category": "항해!", "question": "6. 자침로 135도를 유지, 연철구로 자차 수정", "answer": "5) 선박의 선회 과정 중에 주의깊게 관찰하여 선박이 정침할 때에 자석을 움직여서 신속하게 수정을 행하고\n이때의 수정은 오차의 허용치 내로 한다.\n6) A오차는 수정이 불가하므로 8방위의 오차를 기록하여 Deviation Curve를 기록 작성하여 수정자석의 삽입구의 번호도 같이 기록하여 선교의 잘 보이는 곳에 측정날짜와 Variation과 함께 기록, 계제한다.", "id": 323}, {"category": "항해!", "question": "61. 자차 수정의 목적", "answer": "자차를 수정한다는 것은 / 자차의 원인인 선내 각종자기의 영향을 / 수정장치로 상쇄하여 / 컴퍼스 자침에 하등 영향을 미치지 않게 하는 것으로서 / 선수 각점에서 컴퍼스자침의 자력을 동일하게 만드는 행위를 말한다.\n그러나 이것은 이상적인 것이고 실제로는 철물로 구성된 선박에서는 자차가 절대로 없어질 수가 없으므로 각 선수방위에 대한 자차의 양을 최소화하는데 자차수정의 그 목적이 있다고 말할 수 있다. 자차곡선도는 마지막 자차곡선도 작성일 이후 최대 1년 이내에 작성되어야 하며, 자차 허용범위는 -5도(W）〜＋５도(E)로 규정하고 있다.", "id": 324}, {"category": "항해!", "question": "62. 항해중 선박에서 자차 수정 중 유의사항", "answer": "1) 4방위 자차 수정만으로도 선박내 일반적인 자차 수정이 가능하므로 다른 자석을 이용하여 추가 수정은 금지한다.\n2) B, C
