 각도에서 분리되어 탐지되어야 한다.\n3) 최소 탐지거리 성능 기준\n: 안테나 높이가 해수면으로부터 15m인 X&S Band 레이다는 전파 잡음없는 상태에서 아래 물표를 명시된\n거리에서 탐지해야 한다.\nA. 해수면으로부터 60m 해안선: X-band: 20nm, S-band: 20nm\nB. 해수면으로부터 6m 해안선: X-band: 8nm, S-band: 8nm\nC. 해수면으로부터 3m 해안선: X-band: 6nm, S-band: 6nm\nD. 총톤수 5000톤 이상이면서 air draft 10m인 선박: X-band: 11nm, S-band: 11nm\nE. 총톤수 500톤 이상이면서 air draft 5m인 선박: X-band: 8nm, S-band: 8nm\nF. Reflector가 있고 Air draft 4m인 선박: X-band: 5nm, S-band: 3.7nm\nG. Reflector가 있고 해수면으로부터 높이가 3.5m인 항행 부표: X-band: 4.9nm, S-band: 3.6nm\nH. 해수면으로부터 높이가 3.5m인 일반 항행 부표: X-band: 4.6nm, S-band: 3nm\nI. Reflector가 없고 전장 10m, Air draft 2m인 선박: X-band: 3.4nm, S-band: 3nm", "id": 485}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "26. 레이다 알파 사용시 발생하는 알람은 어떤 것들이 있는지 말하시오.", "answer": "1. 사용자가 설정한 CPA/TCPA에 도달 시 시청각 알람(타겟 색이 빨강으로 변경 및 깜박거림, 경보음)", "id": 486}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. 타겟 full", "answer": "*Audible and visual alarms against threatening targets coming into operator-selected CPA/TCPA limits,\nlost target\nguard ring\nvisual alram against system failure and\ntarget full situation", "id": 487}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "28. 레이다 간섭 현상에 대해 설명하시오.", "answer": "근거리에서 같은 주파수대의 레이더를 사용할 때에는 자선의 레이더에 타선의 레이더파가 수신되어 간섭효과가\n발생할 수 있다.", "id": 488}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 대지속력", "answer": "speed over ground이며 쉽게 말해 육상에서 배를 보는 속력이라 할 수 있다.", "id": 489}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 대수속력", "answer": "speed through the water 이며 물에 대한 속력이다. 계산요소는 선박 자체의 속도, 바람이 있다.", "id": 490}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "3. 레이더에서의 대수속력, 대지속력의 표시", "answer": "1) 대수속력: 벡터를 CTW, STW로 표시함(권고 설정사항)\n2) 대지속력: 벡터를 COG, SOG로 표시함\n3) 대지속력에서 대수속력으로 변경하였을 때\n- 본선의 벡터와 상대선의 벡터 모양이 달라진다.\n- COG -> CTW로 바뀐다. (Course Tracking Water, CTW=heading에 도플러로그상 식별된 오차가 포함된 값)\n- SOG -> STW로 바뀐다.\n- 상대선박의 CTW의 경우 상대선에서 수신한 COG에 본선의 도플러 로그상 오차가 반영하여 레이더에 투영된다.\n- 상대선의 STW의 경우 상대선 SOG에 본선 대수/대지 속력 차이 반영하여 레이더 벡터로 투영된다.", "id": 491}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "31. 레이더 헤드업, 코스업, 노스업 차이와 어떻게 디스플레이 되는지 설명하시오.", "answer": "1) Head Up 지시 방식\n- 선수지시선(Heading)을 지시기의 상방으로 나타내는 방식\n- Heading이 레이더 상 0도의 눈금을 가리킨다.\n2) North Up 지시 방식\n- 진북을 지시기의 상방으로 나타내는 방식\n- Gyro Compass의 0도가 레이더 상 0도의 눈금과 일치된다.\n3) Course Up 지시 방식\n- 선박의 침로를 지시기의 상방으로 나타내는 방식\n- 선박의 Course가 레이더 상 0도의 눈금을 가리킨다.", "id": 492}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "32. 2차 소인반사가 생기는 이유와 해결방법을 말하시오.", "answer": "도관현상이 있을 때 거짓상이 생길 수 있으며 멀리 떨어진 물체가 갑자기 나타나는 현상으로 거리는 다르지만 방위는 같다. 2차 소인(sweep)에 의한 거짓상을 방지하기 위해 펄스 반복주기를 길게 한다.", "id": 493}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 기계식 자이로와 광자이로 차이점. 광자이로의 장점4가지.", "answer": "1) 기계식 자이로스코프\n3축(자이로축-수평축-수직축)이 자유인 프리자이로스코프는 자이로축이 우주의 절대방향을 가리키나 지구의 자전으로 자이로축은 항상 진북을 가리키지 않는다. 그러므로 수평축의 자유를 억제시켜(세차운동) 지구가\n자전해도 그 영향으로 자이로축이 그곳의 자오선과 동일한 운동을 하게하여 gyro axix이 항상 진북을 가리키게\n한다. 절대방향을 지시하는 free gyroscope의 rotor 축에 지북토크와 제진토크를 가하여 지구의 지반운동을\n추종토록 한 것이다. 세차운동-자이로축에 토크를 가하면 힘이 가한 방향의 90도 다른 방향으로 로터축이 회전\n하는 현상이다.\n2) 광학식 자이로스코프\n광학식 자이로스코프는 빛(레이저)을 일정한 경로로 방사하여, 물체 회전에 따라 발생하는 빛의 경로차를 검출함으로서 동체의 자세를 산출하고 있다.\n*장점\n1) 기계적 구조가 간단하다\n2) 매우 정확하다\n3) 수명이 길다\n4) 기부속 교체가 적다", "id": 494}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 기계식 자이로스코프 (Mechanical Gyroscope)", "answer": "작성하신 대로 고속 회전하는 **로터(Rotor)**의 관성력을 이용합니다.\n지북/제진 토크: 프리 자이로에 중추(Weight)나 액체 연통관 등을\n이용해 토크를 가하면, **세차운동(Precession)**에 의해 자이로 축이 진북을 향하게 됩니다.\n이를 '자이로 컴퍼스' 원리라고 합니다.\n세차운동의 핵심: 회전체에 외력을 가했을 때 힘의 방향이 아닌, 회전 방향으로 90도 지난 지점에서 반응이 나타나는 현상을 정확히 짚으셨습니다.", "id": 495}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 광학식 자이로스코프 (Optical Gyroscope)", "answer": "빛의 **사냑 효과(Sagnac Effect)**를 이용합니다. 회전하는 경로를 따라 양방향으로 레이저를 쏘았을 때, 회전 속도에 따라 빛이 도달하는 시간(경로)에 차이가 발생하는 것을 검출합니다.\n광자이로의 4가지 주요 장점 (보완)\n작성하신 내용도 맞지만, 기술적으로 더 뚜렷한 장점은 다음과 같습니다.\n가동 부위 없음 (No Moving Parts): 고속 회전하는 로터가 없으므로 기계적 마찰이나 마모가 발생하지 않습니다. (작성하신 '구조 간단/부속 교체 적음'의 근거)\n즉각적인 작동 (Short Warm-up Time): 기계식은 로터가 고속 회전할 때까지 시간이 걸리지만, 광자이로는 전원을 켜자마자 바로 사용할 수 있습니다.\n높은 내구성과 신뢰성: 충격과 진동에 매우 강하며 수명이 반영구적입니다.\n넓은 동적 범위 (Wide Dynamic Range): 아주 미세한 회전부터 급격한 회전까지 정밀하게 측정 가능하며, 오차가 누적되는 '드리프트(Drift)' 현상이 기계식보다 훨씬 적습니다.", "id": 496}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "73. 자이로 컴퍼스 4시간 Warming 하는 이유는?", "answer": ": 세차운동을 하도록 하여 그 결과로써 자북을 추종하는 시간이 필요로 하기 때문\n자이로를 왜 두시간전에 작동을 시키는지? 세차운동을 하도록 하여 그 결과로써 자북을 추종하는 시간이 필요로 하기 때문\nGYRO를 작동하기 전 동쪽을 가리키고 있었는데, 전원을 키는 순간 어떤 현상이 발생하나?\n세차 운동을 시작하며, 만약 선수 방위가 진 방위인 북쪽을 가르치고 있으면, 세차 운동을 결과인 자북을 추종 하게 된다.\n자이로컴퍼스 켰을때 진북을 찾아가는 과정 상세히 설명.\n(동쪽을 항해하며 켜면 자이로가 어떤 작업을 하며 4시간이 걸리는가)\nPS. 1. 자이로컴퍼스 090도에서 껐다가 켰을 때 북을 가르키는 과정은 감쇠진동을 가지고 설명을 하시면 됩니다. 감쇠율 약33프로.", "id": 497}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. Gyro Compass가 고장나면 어떻게 항해하는가?", "answer": "자차표에서 구한 자차와 나침도에서 구한 편차를 진침로에 가감하여 나침로를 구하여서 자기나침의(Standard Compass)로 항해, 이 때 자차와 편차는 편동(E'ly)이면 빼고 편서(W'ly)이면 더하여 준다.", "id": 498}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. Gyro Compass의 세차운동에 대해서 설명하시오.", "answer": "3축(자이로축-수평축-수직축)이 자유인 프리자이로스코프는 자이로축이 우주의 절대방향을 가리키나 지구의\n자전으로 자이로축은 항상 진북을 가리키지 않는다. 그러므로 수평축의 자유를 억제시켜(세차운동) 지구가\n자전해도 그 영향으로 자이로축이 그곳의 자오선과 동일한 운동을 하게하여 gyro axix이 항상 진북을 가리키게\n한다. 절대방향을 지시하는 free gyroscope의 rotor 축에 지북토크와 제진토크를 가하여 지구의 지반운동을\n추종토록 한 것이다. 세차운동-자이로축에 토크를 가하면 힘이 가한 방향의 90도 다른 방향으로 로터축이 회전\n하는 현상이다.", "id": 499}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "3. Gyro Compass의 속도오차에 대해서 설명하시오.", "answer": "자이로컴퍼스는 한 지점에 고정되어 있을 경우에 지표면의 운동과 로터축의 세차 운동이 평형을 이루어 진북을\n지시하도록 설계되어 있다. 항해 중 지면에 대한 상대 운동이 변함으로써 평형을 잃게 되어 생긴 오차를\n속도오차라 한다. 선박 속도가 빠르고 그 침로가 남북 방향에 가까울수록, 또 위도가 높아질수록 오차가 크다.\n이 오차의 방향은 북쪽으로 항진하면 편서, 남쪽으로 항진하면 편동이다.", "id": 500}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "4. GYRO를 작동하기 전 동쪽을 가리키고 있었는데, 전원을 키는 순간 어떤 현상이 발생하나?", "answer": "세차운동을 시작한다. 만약 선수 방위가 진방위인 북쪽을 가라키고 있으면 세차 운동의 결과인 자북을 추종하게\n된다.", "id": 501}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. gyro compass의 카드를 조속히 안정시키는 방법을 설명하시오.", "answer": "정상으로 동작하는 경우에는 시동 후 3-5시간이 경과하여야 compass card N단이 북쪽을 수렴하여 안정하게\n되지만 주동부에 알맞은 torque를 가하거나 rotor가 일정한 시간동안 저속으로 돌게 함으로써 이 시간을 훨씬\n단축할 수가 있는데 sperry계 제품과 같이 rotor case가 노출되어 있는 경우에는 torque를 가하는 방법을 쓰고\nAnschutz계 제품과 같이 rotor case가 밀폐된 용기 속에 있는 경우에는 rapid settle라는 장치를 사용한다.\n선수 방위를 알고 있는 경우 SLEW 스위치로 컴퍼스카드를 진방위로 맞춘 후 작동시키면 자이로컴퍼스의 진방향\n을 찾는 시간이 단축된다.", "id": 502}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "6. Gyro를 3-4시간 먼저 기동하는 이유는?", "answer": "세차운동을 하도록 하여 그 결과로써 자북을 추종하는 시간이 필요로 하기 때문이다.\n자이로컴퍼스가 진방향을 찾는 과정에서 세차운동 때문에 시간이 걸린다. 꺼져있는 자이로의 전원을 켜게 되면 현재의 진방향을 가리키기 위해서 8분의 1만큼씩 오차를 줄여나가며 좌우로 왔다 갔다 회전을 하고 40분이 소요된다. 300도에서 켰다면 8씩 나눠보면 7.5도, 0.9도, 0.12, 0.015도. 이렇게 오차가 줄여지기 때문에 적어도 3시간 전에는 켜야 한다.\n*180을 8로 나누면 22.5도/2.8도/0.35도/0.04도", "id": 503}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "7. 자이로를 000도에서 전원을 Off한 후 선박을 090도로 돌려 다시 자이로 전원을 올렸을 때 자이로가 000도를 찾아가는 과정을 실무적인 관점에서 설명하시오.", "answer": "전원 ON 이후 초반에는 로터의 회전이 충분하지 않아 곧바로 진북을 가리킬 수 없다. 점차 로터의 회전수가\n증가하면서 090도에서 000도 쪽으로 이동하며 천천히 진북을 찾아가며 최종 안정화까지 약 4시간 가량\n소요된다.", "id": 504}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "8. Gyro Compass의 원리를 설명하시오.", "answer": "자이로스코프의 원리를 이용하여 회전축이 항상 지구의 북쪽을 기리키도록 한 것이 자이로컴퍼스로 나침반과는 달리 항상 진북을 가리키고 있다. 자이로컴퍼스는 자이로스코프와 같은 모양을 가지고 있으며, 다른 점은\n회전축에 적절한 무게의 추를 달고 있다는 것뿐이다.\n지구의 적도에서 처음 팽이의 회전축이 동쪽을 가리킨다고 가정한다면, 지구가 자전하더라도 회전축은 변화 없이 일정한 방향을 가리키므로 시간이 지나 지구의 자전때문에 N쪽이 상승하게 된다. 그러면 추에 중력이\n작용하므로 회전축에 변화가 발생한다. 그러면 이러한 회전축의 변화에 대응하여 직각 방향으로 힘이 작용하므로 회전축이 북쪽을 가리키게 된다. 회전축이 북쪽을 향하면 지구 자전에 의한 영향을 받지 않게 되어 세차운동을 일으키지 않기 때문에 자이로컴퍼스의 축은 계속 북쪽을 가리키게 된다.", "id": 505}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "9. 선박에서 사용하는 자이로컴퍼스와 프리자이로스코프의 차이를 말하시오. ???", "answer": "자이로컴퍼스는 3축의 자유도를 가진 자이로(로터)의 지북작용과 제진작용을 주어 지표면상에서 자이로 축을\n남북방향으로 계속 향하게 하는 장치이다. 자이로스코프의 원리를 응용한 것으로, 빠른 속도로 회전하는 팽이의\n축이 지구의 자전하는 힘에 의하여 항상 남북을 가리키도록 한 장치이다. 철의 영향을 받아 오차가 생기기 쉬운\n자기컴퍼스 대신에 선박, 항공기에서 사용한다.\n*자이로스코프의 회전과 관성에 의한 방향지시성으로 진북을 나타내는 자이로컴퍼스에 응용\n*자이로스코프는 일반적으로 회전의라고 부르기도 하며 팽이를 어느 방향으로든 회전할 수 있도록 장치한 것이\n다. 자이로스코프는 그 자체의 회전축인 로터축, 수평축, 수직축으로 총 3축으로 이루어져 있으며 그 축 주위를\n자유롭게 회전할 수 있도록 만들어 놓은 장치이다.\n*프리자이로스코프는 로터축이 나머지 축들의 마찰을 무시하게 자유롭게 어떤 방향이든 가리켜 평형상태를 유지\n하는 상태를 말한다.", "id": 506}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 레이다의 방위분해능이 나쁜데 이유를 말해보시오?", "answer": "동일 거리에 있는 2개의 물표가 어느정도 떨어질 때까지 분리 식별할 수 있는가의 한계능력을 말하며 이는 안테나의 수평BEAM폭에 의해 좌우된다. CRT SCOPE상에 어떠한 물표의 영상은, 반사된 전파의 수평BEAM폭의 전단이 접하는 순간부터 BEAM의 후단이 떨어질 때까지 계속되어 점으로 나타나게 된다.\n그래서 등거리에 잇는 두물표가 SCOPE상에 2개의 SPOT로 분리 표시되려면\n두 물표간의 각도가 수평BEAM폭 보다 커야 한다.두 물표가 분리되기 위한 거리는 공중선으로 부터의 거리에 따라 달라진다. BEAM폭 theta =70 lambda over D이므로 파장이 짧을수록 방위분해능이 좋다.\n33. AIS(Automatic Identification System, 선박자동식별장치)에 대하여 아는 대로 서술하시오.\n1) 기본개념\nAIS란 Automatic Identification System의 약자로서 선박과 선박간, 선박과 연안국 사이에 선박의 위치, 침로, 속력 및 항해안전관련 정보 등을 자동으로 송수신함으로써 해양사고의 방지 및 해난 수색구조 활동을 지원하기 위한 시스템으로서, 교통량이 많은 곳에서 상대 선박을 쉽게 식별 할 수 있습니다. 또한 GPS, Radar, ECDIS 등의\n장비와 연계시 정보공유 효과가 극대화 됨으로 매우 유용한 장비입니다. 특히 시정이 좋지 않을 경우 다른\n선박을 탐지하는데 매우 유용합니다.\n모든 1)300톤 이상 국제항해 선박, 2)모든 500톤 이상 국내항해 선박 및 3)모든 여객선은 AIS를 탑재하여야\n합니다.\n2) 설치목적\n선박과 선박, 선박과 해안기지국을 식별하고 해상교통관제시스템에서 통제하기 위함\n3) 구성요소 (답이 확실치 않음)\nA. 선박용 무선송수신기: 통신프로세서, 내부 GPS 수신기, VHF 송수신기로 구성\nB. 기지국제어기\nC. 해안기지국", "id": 507}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "34. AIS의 한계", "answer": "① AIS는 VHF주파수대를 사용하기 때문에 30마일을 넘어서는 잘 탐지가 되지 않습니다.\n② 선박 통항이 많은 곳에서는 채널 과부하가 발생하여 정보의 업데이트가 누락되거나 잘못된 정보가 표시\n될 수 있습니다.\n③ 항해사에 의하여 잘못된 정보가 입력되거나 AIS와 연동된 다른 항해기기들의 오류로 잘못된 정보가 표시\n될 수 있습니다.\n④ AIS의 고장이나 일부러 끄고 다니는 선박이 있을 수 있습니다.", "id": 508}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "35. RADAR에는 없고 AIS에는 있는것은?", "answer": "1) 선박명, 2) CALL SIGN, 3) MMSI 번호, 4) IMO번호, 5) 선폭과 길이,\n6) 흘수, 7) 화물타입, 8)목적항, 9) ETA 등\n[추가 질문] 항해사가 AIS 운용 시 주의해야 할 사항을 말하시오.\n정기적인 기기 테스트, 항해상태(항해중, 정박중 등), 목적지, ETA, 위험화물 선적 여부 등 정확한 정보 입력\nais 정보욉\n동적정보: 침로 , 방위 ,속력 정적정보:선박제원 항해정보:desti' draft\n- 스태틱 정보 : 6분 간격과 요구시\n- 다이나믹 정보 (아래 표)\n- 항해관련 정보 : 6분 간격, 데이터가 변경되었을 때와 요구시\n- 안전관련 메시지 : 요구시\n* 속력 및 변침에 따른 AIS 정보 업데이트\ngps 오차\n시계오차 , 다중경로 오차, 고의 오차\n한국해양수산연수원(KOREA INSTITUTE OF MARITIME AND FISHERIES TECHNOLOGY)\n시진방위각법(계산법)\n자이로 에러와, 선사이팅 태양 방위각 계산도 기출 빈도가 높습니다.", "id": 509}, {"category": "천문항해!", "question": "41.천측의 3 꼭지점 :동명극, 천정, 천체,", "answer": "3변 : 여위도, 정거(여고도), 극거(여적위)", "id": 510}, {"category": "천문항해!", "question": "21. 춘하추동 4계절이 생기는 이유?", "answer": "자기의 공전에 따른 결과이며, 극을 중심으로 23.5도 기울어져 있어 태양에너지의 받는 영역이 지역마다 달라지게 됩니다 ( 중위도 지방에서만 4계절이 생깁니다.)", "id": 511}, {"category": "천문항해!", "question": "17. GHA, DEC", "answer": "GHA : Greenwich 자오선에 대한 지방시각을 그리니치 시각 또는 본초 시각\nLHA = GHA + - λ( 단 경도가 E이면 +, W 이면 - )\nDEC : 천체를 지나는 천의 자오선상에서 천의 적도로부터 천체까지의 호를 그 천체의 적위라고 한다.\n1) 상용박명, 항해 박명, 천문 박명에 대하여 설명하라고함.\n태양이 수평선의 아래에 있어서 직접 햇빛을 쪼이지 않는 경우라도 일출 전 및 일몰 후 얼마 동안은 하늘이 밝다. 이것은 공기중의 작은 먼지나 수증기에 태양관선이 반사되어 빛의 산란을 일으키기 때문이며 이 현상을 박명(Twilight) 이라고 한다.\n1) 천문박명(天文薄明, Astronomical twilight)\n태양의 중심고도가 시 수평하 18° 에 있을 때와 상용 일출몰시와의 사이로써 일반적으로 박명황흔이란 이를 말하며 밤이 끝나거나(아침인 경우) 밤이 시작되는(저녁인 경우) 시기라고 할 수 있다.\n2) 항해박명(航海薄明, Nautical twilight)\n태양이 중심고도가 시수평하 12° 에 있을 때와 상용일출몰시와의 사이로써 천문박명시간의 약 2/3 이다. 항해중에 항성이나 혹성의 천측에 가장 적합한 시기이다.\n3) 상용박명(常用薄明, Civil twilight)\n태양의 중심고도가 시수평하 6° 에 있을 때와 상용일출몰시와의 사이로써 천문박명시간의 약 1/3 또는 항해박명시간의 1/2 이며, 이때는 저녁이면 1등성이 보이기 시작하거나 아침이면 사라지기 시작한다.", "id": 512}, {"category": "천문항해!", "question": "2. 대양에서 천체의 뜨고 질 때 방위로 컴파스 에러 구하는 것? 출몰방위각법", "answer": "- 방위 측정 밥법 : 수평선에 천체가 어떻게 놓였을 때 측정을 하는지\n- 수평선의 종류 : 시수평, 진수평\n- 즉 관측 시수평 상태이기 때문에 진수평을 기준으로 놓고 측정을 하려면 시수평의 어떤 위치에 천체가 놓일 때 측정을 하는가를 질문함.\n자이로에러를 구하는 방법 : 시진방위각, 출몰방위각", "id": 513}, {"category": "천문항해!", "question": "52.출몰 방위각법 및 사용 책자", "answer": "천체가 수평선에 있을 때 동점에서 천제, 서점에서 천제까지의 수평권의 호를 90도 이낸이낸각 표시한 것.\n사용 책자 : 229 table\n2) 출몰각 방위법에 관하여 설명하라고함.\n-> 위 참조\n☞ 시진방위각법 (Time Azimuth Method) ; wing bridge 에 있는 자이로 리피터기에 Azimuth circle을 설치하고 거울로 태양을 비춰서 반사되는 빛이 숫자를 가리키면 그 값을 읽는다. 태양 천측때와 마찬가지로 초시계를 가지고 나가 들어오면서 걸린 시간만큼 현재 시각 에서 빼준다. 시진방위각 법은 계산하여 구한방위(진방위) 와 Azimuth circle(이게 gyro의 방위) 과의 값을 비교해서 gyro error 를 구하는 것.\nwing bridge 에 있는 자이로 리피터 기에 Azimuth circle을 설치하시고 거울로 태양을 비춰서 반사되는 빛이 숫자를 가리키면 그 값을 읽습니다. 태양 천측때와 마찬가지로 초시계를 가지고 나가셔서 들어오면서 걸린 시간만큼 현재 시각 에서 빼주셔야 합니다.\n시진방위각 법은 계산하여 구한방위(진방위) 와 Azimuth circle(이게 gyro의 방위) 과의 값을 비교해서\nGyro error 를 구하는 것입니다.\n다음은 10/18 Gladstone Anchorge 에서 측정한 실 값을 예로 들겠습니다.\n방위환을 통해 태양의 방위는 281.5 로 나왔습니다. 이제 시간에 따른 진방위를 구합니다.\nGMT GHA Dec\n4h 243º43.1' 09º43.9's\n29m30s 07º22.5' 0.4'\nGHA 251º05.6' 09º44.3's\n경도 151º27.712 402 33. 312\nLHA 42º33.312'\nL 23º49.905's\n이제 229 table에서 값을 취한 후 방위각을 방위로 환산 281.741 이렇게 구한값과 281.5 값을 비교 여기서 0.24 E 냐 0.24 W냐는요 그림 그려 보시면 되요. 배를 두개 그리는 실수는 하지 마시기 바랍니다. 결론은 0.24 E 입니다\n☞ 출몰방위각법 [ Amplitude method , 出沒方位角法 ]\n천체의 중심이 진수평에 있을 때의 진방위를 구하는 방법을 출몰 방위각법(amplitude method)이라 한다. 천체의 진출몰시의 고도는 0°이므로, 위도와 적위만 알면 항해 삼각형에서 출몰 방위각을 구할 수 있는데, 계산이 간단하고 고도가 낮아 방위 측정이 쉽고, 오차가 적어 비교적 정확한 방법이다. 이 계산에 사용하는 표를 출몰 방위각표라 한다.\n진수평과 시수평의 위치는 같지 않으며, 진수평은 우리들의 눈으로는 식별할 수 없기 때문에, 진출몰시의 천체의 위치는 시수평을 기준하여 판단할 수밖에 없다. 그러므로 출몰 방위각으로 자차 및 자이로컴퍼스 오차를 구하는 데는 일반적으로 태양만이 이용된다. 수평선상의 태양을 관측할 때 태양의 하변이 시수평에서 약 20'쯤 떠올랐을 때가 진고도 0o인 때이다. 그러므로, 태양의 출몰 방위각은 시수평에서 태양의 하변 고도가 태양의 반지름과 같은 높이이거나 또는 그보다 약간 높은 시기에 관측하면 된다.\n☞ 자오선 각 ;\n천문학에서 쓰이는 자오선은 간단하게 설명하자면 관측하는 곳에서의 북쪽과 남쪽, 그리고 우리의 바로 머리 위의 하늘의 지점(천정(Zenith))을 이은 선이며, 하늘의 북극과 천정을 이어서 나가도 자오선이 나오게 되고, 하늘을 보통 반구형으로 생각한다면 하나의 원형에 해당하는 선이 자오선임.\n위 그림을 보면 어떤 한 지점에서 투영되는 천구의 모습을 표시한 것으로. 제1기준원은 지평선이나 수평선이고 천정과 하늘의 북극 그리고 북점과 남점을 이은 제2기준원이 바로 자오선이다.\n지구상에서는 그리니치 천문대에서 보는 자오선을 지구위에다가 투영한 것을 경도0으로 기점을 잡고 동반구와 서반구로 나눔\n자오선 [子午線, meridian] ; 천구상에서 지평의 남북점, 천정, 하늘의 양극을 연결하는 대원이다. 관측지점에 고정시켜서 생각할 수 있는 기준선으로 천체의 방위각, 시각을 측정하는 기준이 된다. 천체가 자오선을 통과할 때 남중이라 하며, 고도는 극대값이 된다. 이것은 지평선과 마찬가지로 관측지점에 고정시켜서 생각할 수 있는 기준선이며, 천체(天體)의 방위각(方位角)·시각(時角)을 측정하는 기준이 된다. 자오는 12지(支)의 자(子)의 방향 즉 북과, 오(午)의 방향 즉 남을 연결하는 선이라는 뜻이다. 천체가 일주운동(日周運動)을 하며 자오선을 통과할 때 '자오선 통과'라 하고, 이때 천체의 방위각은 진남(眞南) 또는 진북이며, 고도는 극대값에 이른다. 자오선 통과를 '남중(南中)'이라고도 한다. 보통의 출몰성(出沒星)의 경우에는 하루에 1회, 주극성(周極星)은 하늘의 양극의 위와 아래에서 합계 2회의 자오선 통과가 관측된다. 이때는 상방 자오선 통과, 하방 자오선 통과라고 하여 구별한다. 지구상의 자오선은 하늘의 자오선의 평면이 지구 표면을 자르는 선에 해당한다. 자오선상의 세 점, 즉 어떤 지점과 남북의 두 극점(極點)을 포함하는 평면을 자오면이라 한다.\n☞ 박명시 3종류(천문박명, 항해박명, 상용박명 )/천체관측 가능 박명시는? (항해박명)\n1. 상용박명 : 태양이 지평선(혹은 수평선)에서 나타나기 전이나 사라진 후부터 6° 아래에 위치할 때까지의 박명이다. 대한민국 서울에서는 약 30분가량 지속된다. 이 시기에는 육안으로도 사물을 구분할 있으며, 하늘에는 금성이 보인다. 조명 없이도 일상적인 야외활동이 가능하다.\n2. 항해박명 : 태양이 지평선(혹은 수평선)에서부터 6°~12° 아래에 위치할 때까지의 박명이다. 서울에서는 30분에서 40분가량 지속되며, 이것은 일몰후/일출전 기준으로 30분~1시간 10분 지점에 해당된다. 이 시기에는 잘 알려진 별들이 보이기 시작하고, 수평선도 구분할 수 있기 때문에 이를 이용하여 항해시 현재의 위치를 알아내는 데 사용하였다. 조명없이 사물의 윤곽은 알아볼 수 있으나 정상적인 야외활동은 불가능하다.\n3. 천문박명 : 태양이 지평선(혹은 수평선)에서부터 12°~18° 아래에 위치할 때까지의 박명이다. 서울에서는 30분에서 40분가량 지속된다. 거의 대부분의 별들을 관측할 수 있으나, 성운이나 은하수같은 것들은 볼 수 없다.\n일몰 후의 천문박명 이후나,일출 전 천문박명 이전에는 6등급의 별도 육안으로 관측이 가능하다.\n출몰방위각 구하는 법을 설명하시오\n천체가 수평권상에 있을 때 동점에서 천체까지 또는 서점에서 천체까지의 수평권의\n호를 90도 이내의 각으로 표시한 것을 출몰방위각(Amplitude : Amp. 또는 A)\n이라고 하나. 출몰방위각의 앞에는 출시에는 E 몰시에는 W 를 붙이고 뒤에는\n측정방향에 따라서 N,S를 붙인다.\n예) E 15°N, W 15°S\n관측시의 고도가 낮아(고도 0°) 방위 측정이 쉽고 오차가 작으며 또 방위가 게산이 간단하나 관측시기의 제한을 받음, 수평권의 부근에서는 각 천체의 고도 변화는 크지만 방위\n변화는 작기 때문에 실용상 정밀한 시간을 계산하지 않더라도 대략의 하변고도로 판단하여 그 측정시기를 결정할 수 있으며, 안고에 따라 다소의 차이는 있으나 시수평상 태양의 하변고도가 그 겉보기 반지름과 같은 높이이거나 또는 그 보다 약간 높은 시기에 관측하면 된다.\n태양의 하변고도 관측시의 고도 개정식\nHo = hs ± IC – D – R + SD + P\n인데 여기서 태양의 진출몰시 하변측고도를 구하기 위해 Ho = 0 으로 놓으면\nhs = -+IC + D + R – SD- P\nSD : 태양의 겉보기 반지름의 평균치(약 13’)\nP : 태양에 있어서는 최대값이 8”.8 임로 분 단위로 표시시 0.1’\nHs = D + 30’.5 – 13’ -0’.1 = D +17’.4 ( 지금 안고를 4.6m 라 하면 D는 3.8 이므로\n태양의 하변이 시수평에서 약 20’쯤 떠올라 있을 때가 진출몰시이며 따라서 방위 측정이 가능하다)\n일반적으로 수평권의 부근에서는 각 천체의 고도 변화는 크지만 방위 변화는 작기 때문에 실용상 정밀한 시간을 계산하지 않더라도 대략의 하변 고도로 판단하여 그 측정시기를 다음과 같이 결정할 수 있다. 즉 안고에 따라 다소 차이는 있으나 시수평상 태양의 하변고도가 그 겉보기 반지름과 같은 높이이거나 또는 그 보다 약간 높은 시기에 관측하면 된다.\n* 태양 방위각표(Red azimuth table)에 의한 출몰 방위각의 계산\n미국 해군 수로국 서지번호 260호(Pub. No.260)\n우리나라 국립해양조사원 서지번호 1303호(Pub. No.1303)\n제 1 부 : 위도 0°에 있어서 진반위를 구하는 표\n제 2 부 : 위도와 적위가 동명인 경우 위도 1° 에서 70° 까지 위도 1° 마다에 대해서 진방위를 구하는 표\n제 3 부 : 위도와 적위가 이명인 경우 위도 1° 에서 70° 까지 위도 1° 마다에 대해서 진방위를 구하는 표\n- 표의 사용법\n먼전 해당되는 위도를 각 페이지의 위쪽 란에서 찾고 오전이면 왼쪽란에서, 오후이면 오른쪽 란에서 시시(오전이면 12-t, 오후이면 t를 시간단위로 고친 것)을 찾아 관측시의 적위에 해당하는 “Dec.”란에서 표값을 구하면 된다. 이 때위도와 적위가 이명이면 제 2 부라고 쓰인 페이지에서 찾아야 하고(Same Name) 동명이면 제 3 부의 (Contrary Name)라고 쓰인 페이지 에서 찾아야 한다.\n각 페이지 적위(Dec.)란의 바로 밑에는 1년의 적위와 같은 값을 갖는 날짜가 적혀 있으므로 태양 관측시에는 천측력을 사용하지 않고 날짜만으로도 표값을 구할 수 있다. 이와 같이 하여 구한 표값 즉 진방위각에는 동명극의 부호 N 또는 S를 앞에 붙이고, 출시이거나 천체가 자오선의 동쪽에 있으면 E를, 몰시이거나 천체가 자오선의 서쪽에 있으면 W를 붙인다.\n1H = 15° / 4min = 1° / 1min = 15’ / 4sec = 1’ / 1sec = 15’’\n(1) Sextant 고도 개정\n1) SEXTANT 오차\na) 수정 가능한 오차\n- The error of perpendicularity\n: sextant의 기면과 동경(index mirror)이 수직이 아닐 때 생기는 오차\n- Side error\n: 수평경(Horizon glass)이 기면과 수직이 아닐 때 생기는 오차\n- Index error\n: 기준간(index bar)을 0에 맞추었을 때 동경과 수평경이 평행이 아닐 때\n생기는 오차, 주로 이 오차에 의해 측정고도가 높거나 낮게 나타나며,\n이 오차를 sextant 기차(Index error)이라 부르고 이에 대한 개정을\nSextant 기차개정(Index correction : IC)라 한다.\n- Collimation error\n: 망원경의 중심선이 기면과 평행이 아니기 때문에 생기는 오차\nb) 수정 불가능한 오차\n- Centering error\n: 시표간의 받침점이 본호의 중심에 있지 않으므로 생기는 오차\n- Prismatic error\n: Shade glass나 동경 또는 수평경의 양면이 평행이 아니기 때문에 생기는 오차\n- Graduation\n: 본호, Micrometer drum 및 Vernier에 새겨진 눈금이 부정확으로 인한\n오차\n* 제작자측에서 이들에 오차표를 작성하여 Sextant 뚜껑의 안쪽에 붙여 놓으므로 필요하면 개정을 하여야 하며, 이 오차에 대한 개정을\n기계차 개정(Instrument correction : I) 라고 하며, 보통 이것은 무시한다.\n2) 기차(Atmospheric refraction : R)\n굴절률이 점진적으로 변하는 매질을 빛이 통과할 때에도 이와 같은 이치로 조금씩 굴절하여 밀도가 큰 매질 쪽으로 굽은 곡선경로를 그리게 되는데 빛이 대기중을 통과할 때에도 그와 같은 현상이 일어난다. 이것을 대기차 도는 기차라 한다.\n우리들이 보는 천체의 겉보기 위치는 실제 위치보다 천문기차 만큼 높기 때문에SEXTANT에 개정해야 할 개정치의 부호는 모든 천체에 대하여 항상 “-“이다.\n3) 안고차(Dip of horizon : Dip 또는 D)\n시수평면과 거소수평면이 관측자의 눈에서 이루는 각 천체의 고도를 측정할 때 시수평을 이용하면 진수평(또는 거소수평)을 기준으로 한 고도보다 안고차만큼 높게 측정하는 결과가 되므로 안고차개정의 부호는 모든 천체에 대하여 항상 “-“ 이다.\n4) 시차(Parallax : P)\n지구중심과 천체 중심을 맺는 직선과 관측자와 천체중심을 맺는 직선이 천체중심에서 이루는 각으로 거리가 가까운 천체일수록 크며 천체의 경우라도 고도가 낮을수록 커진다. 진고도를 구하려면 겉보기 고도에 시차를 더해야 하기 때문에 시차개정치의 부호는 항상 “+”이다.\n5) 겉보기 반지름(Apparent semidiameter : SD)\n태양이나 달 측정시 하면이나 상변의 고도를 측정하고 하변고도를 관측하면 “+”, 상변고도를 관측하면 “-“하여 중심고도로 개정하는데 이 때 가감하여야 할 반지름은 그 천체의 실제 반지름이 관측자의 눈에서 이루는 각을 겉보기 반지름이라 함\n6) 광삼(Irradiation : J)\n밝은 물체의 배경이 어두운 때에는 그 물체가 실제보다 약간 크게 보이는 현상 수평선은 어둡고 하늘이 밝은 때에는 수평선이 실제보다 약간 낮게 보이며 밝은 태양은 실제보다 항상 다소 크게 보인다.\n7) 위상(Phase : P)\n달이나 혹성은 그들의 궤도상을 운항할 때 태양광선을 반사하여 빛을 내므로 태양과의 상대위치에 따라 지구상의 관측자가 보는 이들 천체모양이 달라지는 것\nHo = hs(하변) ± IC – D – R + SD + P\nHo = hs(상변) ± IC – D – R + SD + P – J\n그 개정요소들을 정확하게 설명하셔야 합니다.\n* 위치의 결정", "id": 514}, {"category": "천문항해!", "question": "6. 위치선의 기입.", "answer": "* 개정법\n가정위치를 사용하는 방법의 하나로써 추측 또는 추정위치의 위도에 가장 가까운\n정수도 위도를 가정위도(Assumed Latitude : aL) 로하고 지방시각(자오선각) 이\n정수도가 되며 또한 추정경도에 가장 가까운 경도를 가정경도로(ar) 로 하는\n방법이며 현재 이 방법을 가장 많이 사용하고 있다.\n1) 관측시의 GMT 에 대한 GHA 및 d 를 천측력에서 구한다.\n2) GHA 에 가정경도(ar) 를 가감하여 LHA 를 구하고 이를 자오선각으로 고친다.\n3) 가정위도 ( aL ) 와 관측시의 적위에 의하여 계산표의 해당 page 를 찾는다. 위도와 적위가 동명/이명 관계를 구분할것.\n4) 관측시의 적위에 가장 가까운 적위및 자오선각에 대한 표의 고도(Tabular\nAltitude:ht) 및 방위각(Az) 을 구하고 고도에는 적위의 변화에 따라 고도가\n증가하면 \"+\", 감소하면 \"-\" 의 부호를 붙인다.\n5) 관측시의 적위값과 표를 찾을때 사용한 적위 값과의 차(d diff) 및 값을 가지고\n곱셈표에서 고도 개정량을 구하여 의 부호에 따라 표에서 찾은(ht) 에 가감하면\n계산고도가 된다.\n6) 한편 SEXTANT 고도(hs) 에 고도개정을 실시하여 관측고도 (Ho) 를 구하고\n계산고도와 의 차이를 구하여 고도차(a) 로 한다.\n고도차 에는 Ho > Hc 이면 \"T\", Ho<Hc 이면 \"A\" 를 붙인다.\n7) 방위각을 방위(Zn) 으로 고친다.\n8) 위치기입도(PLOTTING SHT) 에 가정위치를 기입하고 이 위치에서 고도차의\n기호가 \"T\" 이면 방위쪽으로 \"A\" 이면 반방위 쪽으로 고도차의 길이를 취하여\n그끝점(수정점) 에서 방위선에 수선을 그으면 위치선이 된다.", "id": 515}, {"category": "천문항해!", "question": "51. 육분의로 측정한 천제 고도에서 개정해야 할 사항", "answer": "1) SEXTANT 오차 2) 기차 3)안고차 4) 시차 5)겉보기 반지름 6) 광삼 7) 위상", "id": 516}, {"category": "천문항해!", "question": "54.육분의의 기계오차", "answer": "-수정이 가능한 오차\n수직오차/ 제 1수정: 인덱스 그라스가 기면에 수직이 아닐 때 생기는 오차\n수평오차/ 제 2수정: 수평경이 기면에 수직이 아닐 때 생기는 오차\n기차/ 제 3수정: 인덱스바를 0도에 놓았을 때 수평경과 동경이 평행하지 않아서 생기는 오차\n조준오차/ 제4수정 : 망원경의 시축선이 기면에 평행이 아닐 때 생기는 오차\n-수정이 불가능한 오차: 중심차, 눈금오차, 분광오차.", "id": 517}, {"category": "천문항해!", "question": "45. 태양을 이용하여 위치선을 구할 때 개정요소,", "answer": "위치선 구하는 방법 및 고도개정\n가상위치를 정한다\n가상위도: 현재위치 부근의 Baseline을 사용\n가상경도: LHA의 값이 \"()()()\".00'.0\"의 형태로 나올수 있도록 조정하여 사용\n태양의 하변고도를 GMT와 함께 측정한다.\nHo(관측고도)구하기 : 관측한 태양의 하변고도(Hs)에서 하기의 개정을 가감함\nDIP(안고차) : 시수평면과 거소수 평면이 관측자의 눈에서 이루는 각. 고도개정표에서 구함)\n(하변고도의개정치) : 태양의 중심점을 측정하지 않고 하변고도(Hs)를 측정함으로 인한 개정치로서, 여기에는 기차, 시차, 겉보기 반지름에 대한 개정치가 포함되어 있음 (고도개정표에서구함)\n* 기차(R ; Atmospheric Refraction) : 광선의 대기굴절로 인한 오차(대기의 밀도로 인해 지구표면쪽으로 굴절)\n* 시차(P ; Parallax) : 지구중심 및 천체중심을 맺는 직선과, 관측자와 천체중심에서 맺는 직선이 천체 중심에서 이루는 각.\n* 겉보기 반지름에 대한 개정치(SD; Apparent Semidiameter): Hs를 천체의 중심고도(Ho)로수정하기 위한 개정치.\n(하변고도인 경우는\"+\", 상변고도인 경우는\"-\"가됨)\nIC (기차;sextant의 기계적 오차) : sextant자체의오차이며 sextant에 붙여져 있음.\nGMT로서,\"LHA\",\"적위(d)\" 를 구함\n① GHA, LHA 구함\n*GHA : Greenwich를 기준으로 천체까지 서쪽으로 잰 값\n* LHA : 관측자를 기준으로 천체까지 서쪽으로 잰 값\n가상경도가동경인 경우에는 \"LHA=GHA + 가상경도\"가성립되며,\n가상경도가서경인 경우에는 \"LHA=GHA - 가상경도\"가됨.\n- GHA은 GMT로서 천측력과 증분표로서 구함.\n- GHA에서가상경도를 가감하여 LHA를 구함. (LHA의 값이\"000\" .00'.0\"의 형태로 나오도록 가상경도 값을 조정하여 사용)\n②적위(d) 값을 구함.\n적위(Dec.Declination)란 천체를 지나는 천의 자오선 상에서 천의 적도로부터 천체까지의 호(지구상의위도에 대응하는 것임). 적도를 기준으로 남북으로 각각 90도 까지 재며, 천체가 적도의 북쪽에 있으면 N, 남쪽에 있으면 S 부호를 붙인다. 천측력 및 증분표에서 GMT의 d를 구함)", "id": 518}, {"category": "천문항해!", "question": "5.\"LHA\",\"적위(d)\",\"가상위도\"로 천측계산표에서 HC(계산고도)와 Zn(태양의방위)을 구함", "answer": "천측계산표는, d와 가상경도의부호가 같으면 SAME NAME을 다르면 CONTRARY NAME을사용. 정수의 \"LHA\" 및 \"가상위도\"로서해당 Page를 찾고 \"d\"의 값으로 Tab HC 및 Tab Z(태양의 방위각)를 증분하여 구함.\n① HC 구하기\n② 거리차(a) 구하기\n③ Tab Z 구하기", "id": 519}, {"category": "천문항해!", "question": "6. 위치선의 작도", "answer": "가상경도와 가상위도의 위치에서 계산에서 나온 Zn과 MILE을 이용, 선을긋고 선의 끝점에 수직인 선을 그으면 이 선이 바로 위치선이다. 이를 선박의 침로에 따라 평행이동시켜서 위치선들을 한 점으로 모은다. (속력과 시간은 생각한 거리도 이용)", "id": 520}, {"category": "천문항해!", "question": "1. vdr에 포함되는 항목 10가지", "answer": "VDR이란 선박의 항해와 관련된 자료를 기록하는 장치이다. 이 장치에는,\n0) 선박의 위치,\n1) 속도,\n2) 침로,\n3) 선교 근무자의 음성,\n4) 통신기 음성,\n5) 레이다 자료,\n6) 수심,\n7) 타 사용 내역,\n8) 엔진 사용 내역,\n9) 풍향, 풍속,\n10) AIS관련 자료\n등이 기록된다. SOLAS 규정에 의거하여 2002년 1월 1일 이전에 건조된 선박은 S-VDR를 설치하도록 의무화\n하고 있다.", "id": 521}, {"category": "천문항해!", "question": "57. VDR과 S-VDR의 차이점", "answer": "VDR은 신조선용, S-VDR은 기존선용으로 나누어진다. 2002년 1월 1일 이전이 기존선용이고 이후가 신조선용이다. 두개가 요구하는 인터페이스는 거의 비슷하나 S-VDR룰에는 If Possible 또는 If fitted가 붙어있다.\n기존선이라 함은 이미 지어진 배인데, 이런 배에는 케이블 설치도 쉽지않고 인터페이스 장비에 VDR용 포트가\n없는 경우가 많다. 따라서 즉 Full VDR기능을 간소화 시킨 것이 S-VDR이다.\n①필수: 1) Date and Time, 2) Ship's Position, 3) Speed, 4) Heading, 5) Bridge Audio, 6) Communications Audio,\n7) Radar Data, 8) AIS(Radar data를 얻을 수 없다면 AIS로 대체가능)\n②생략가능: 1) Echo Sounder, 2) Engine order and response, 3) Hull Opening Status, 4) Main Alarm,\n5) Rudder order and response, 6) wind speed and direction 등\n네, 작성하신 내용은 **항해기록장치(VDR) 및 간이항해기록장치(S-VDR)**의 정의와 차이점에 대해 매우 정확하게 정리되어 있습니다.\n내용을 검토한 결과, 핵심적인 기술 사양과 SOLAS(해상인명안전협약)의 적용 기준을 잘 파악하고 계십니다. 이해를 돕기 위해 몇 가지 세부 사항을 보완해 드릴게요.", "id": 522}, {"category": "천문항해!", "question": "1. VDR vs S-VDR 요약 검토", "answer": "1-1. 설치 대상 및 시점 (SOLAS 규정)\nVDR (Voyage Data Recorder): 2002년 7월 1일 이후 건조된 모든 여객선 및 3,000톤 이상의 화물선에 의무 설치됩니다. (말씀하신 2002년 1월 1일은 협약 발효 시점과 맞물려 있으며, 보통 건조일 기준 7월 1일로 구분합니다.)\nS-VDR (Simplified-VDR): 기존선(2002년 7월 1일 이전 건조선) 중 3,000톤 이상의 화물선에 대해 설치 부담을 줄여주기 위해 도입된 '간이형' 장치입니다.\n1-2. 기록 데이터의 차이 (핵심)\n작성하신 대로 S-VDR은 기존 선박의 구조적 한계(케이블 공사 불가, 구형 장비의 데이터 출력 포트 부재 등)를 인정하여 \"인터페이스가 가능한 경우에만(If fitted/available)\" 기록하도록 완화되어 있습니다.", "id": 523}, {"category": "천문항해!", "question": "2. 추가로 알면 좋은 점 (업데이트된 규정)", "answer": "기록 시간: 과거에는 최소 12시간 기록이 기준이었으나, 최신 규정(MSC.333(90))에 따라 2014년 7월 1일 이후 설치되는 VDR은 최소 48시간 동안의 데이터를 고정형 및 부유형 매체에 각각 기록해야 합니다.\n부유형 저장매체 (Float-free Capsule): 사고 시 배가 침몰하더라도 장치가 수면 위로 떠올라 위치 신호(EPIRB 기능 포함)를 보낼 수 있는 저장 장치가 추가로 요구됩니다.\nAIS의 역할: S-VDR에서 레이다 영상 추출이 기술적으로 너무 비용이 많이 들 경우, 레이다 대신 AIS 데이터를 기록하는 것이 허용됩니다.", "id": 524}, {"category": "천문항해!", "question": "53. 도플러로그 및 EM 로그에 대해서 설명하시오.", "answer": "(근래에는 도플러로그보다 EM로그를 많이 쓰는데 그 이유는? -> 도플러로그를 더 많이 쓰는 듯)\n1) 도플러 로그", "id": 525}, {"category": "천문항해!", "question": "1. 일반;", "answer": "해저로 발사한 음파와 반사되어 수신된 음파를 측정하여 대수 & 대지 속도를 측정하는 기기이다. 초음파가\n해저에서 반사하면 그것으로 대지속도를 구할 수 있으나, 약 200m 이상 깊이에서는 도플러 측정기에 쓰이는\n수백 kHz의 초음파는 감쇠가 증가하여 해저로부터의 반향음을 얻을 수 없게 된다. 이런 경우에는 해면 부근의 미소부유물(微小浮遊物) ·플랑크톤 또는 좀더 깊은 곳의 수괴(水塊)로부터의 반향음을 이용할 수 있다. 이렇게\n얻어지는 선속(船速)은 대수속도(對水速度)가 된다.", "id": 526}, {"category": "천문항해!", "question": "2. 장점;", "answer": "- 매우 정확하다.\n- 전진, 후진, 좌우로 움직일 때도 측정이 가능하다\n- 매우 낮은 속도도 측정가능하다.\n- 일반적으로 널리 쓰인다.\n- 대수 & 대지 속도 측정이 가능하다\n- Most accurate\n- Can measure ahead, astern & athwartship movements\n- Can measure very low speeds\n- This log is most prevalent in today’s marine world.", "id": 527}, {"category": "천문항해!", "question": "3. 단점;", "answer": "- sea state 6 이상의 악기상에서 정확도가 떨어진다.\n- 프로펠러, 쓰러스트 등에 너무 가까이 설치되면 정확도가 떨어진다.\n- UKC 3m이하에서 정확도가 떨어진다.\n- 접이안시 프로펠러의 공기방울에 의해서 정확도가 떨어진다.\nThe performance (accuracy) may be reduced or even lost under following conditions:\n- Rough weather (may be sea state 6 or severer)\n- Improper location of sensor, e.g., too close to the propeller, thrusters, drain tubes, echo, sounder transducer\n- Depth under the keel if less than 3 m.\n- Aeration in the proximity of propellers while coming along side.\n2) EM 로그", "id": 528}, {"category": "천문항해!", "question": "1. 일반;", "answer": "자장속에서 운동하는 도체에는 기전력이 유도된다는 패러데이의 전자유도법칙을 응용하여 자장속으로 통하는 해수에서 발생되는 미소한 출력전압을 측정하여 선속을 계측하는 방식", "id": 529}, {"category": "천문항해!", "question": "2. 장점;", "answer": "- 장치가 간단하다.\n- No moving parts", "id": 530}, {"category": "천문항해!", "question": "3. 단점;", "answer": "- 염도 및 온도가 보정에 영향을 준다.\n- 경계층의 영향을 받는다(유속이 선체 마찰로 인하여 저하 된다)\n- 대지속력은 알 수 없다.\n- Salinity and temperature of water affects calibration\n- Measurements affected by boundary layer, (water speed slowed down close to the hull by friction)\n- Provides boat/ship speed relative to water not ground. Current affects accuracy.", "id": 531}, {"category": "천문항해!", "question": "54. 도플러 로그에 대해 설명하시오.", "answer": "송신주파수와 반사된 수신주파수의 차이가 생기는 주파수를 도플러 주파수라고 하는데, 이 도플러 로그의 경우\n후진 시에도 속력의 측정이 가능하다. bottom mode와 water mode가 있다. bottom mode는 해저에 반사되는\n주파수에 의해 선속을 구하는 mode이며 water mode는 수심이 깊을 때 수괴(물덩어리)에 반사되어오는 주파수를\n이용하여 선속을 구하는 mode이다.", "id": 532}, {"category": "천문항해!", "question": "1. 트랜스듀서: 전기적신호<->음파신호", "answer": "트랜스듀서는 전기적신호가 입력되면 음파신호로 변해 발사한다.", "id": 533}, {"category": "천문항해!", "question": "3. 지시부: 속력 및 항정을 표시", "answer": "53-54. 도플러 로그(Doppler Log) vs EM 로그(Electromagnetic Log)", "id": 534}, {"category": "천문항해!", "question": "1. 도플러 로그 (Doppler Speed Log)", "answer": "원리: 도플러 효과(\n)를 이용합니다. 선체 바닥에서 발사한 초음파가 해저(Bottom)나 수중의 미소 부유물(Water Mass)에 반사되어 돌아올 때, 선박의 이동 속도에 따라 주파수가 변화하는 것을 측정합니다.\n측정 모드:\nBottom Track Mode (대지속력): 수심 약 200m 이내에서 해저 반사파를 이용.\nWater Track Mode (대수속력): 심해에서 수중 부유물(플랑크톤 등)의 반사파를 이용.\n장점:\n현존하는 로그 중 가장 높은 정확도를 자랑합니다.\n3축 측정 가능: 전/후진뿐만 아니라 좌/우(Athwartship) 이동 속도 측정이 가능하여 대형선의 이접안 시 필수적입니다.\n초저속(0.1knot 단위) 측정이 가능합니다.\n단점:\n기포(Aeration) 영향: 프로펠러나 스러스트에 의한 기포 발생 시 초음파 전달이 방해받아 오차가 발생합니다.\n수심 제한: UKC가 너무 낮거나(3m 이하), 반대로 너무 깊어지면 대지속력 측정이 불가능해집니다.", "id": 535}, {"category": "천문항해!", "question": "2. EM 로그 (Electromagnetic Log)", "answer": "원리: 패러데이의 전자유도 법칙을 이용합니다. 선체 바닥에 설치된 코일에 전류를 흘려 자기장을 형성하고, 전도체인 해수가 그 사이를 지나갈 때 발생하는 미세 전압(\n)을 측정하여 속력을 구합니다.\n특징: **오직 대수속력(Speed Through Water)**만 측정 가능합니다.\n장점: * 구동 부위(Moving parts)가 없어 내구성이 좋고 구조가 단순합니다.\n도플러 로그와 달리 기포나 수심의 영향을 덜 받습니다.\n단점:\n경계층(Boundary Layer) 영향: 선체 표면의 마찰로 인해 유속이 느려지는 구간에 센서가 위치하므로 보정이 필요합니다.\n해수의 전도도(염도, 온도) 변화에 따라 오차가 발생할 수 있습니다.\n※ 도플러 로그를 더 많이 쓰는 이유?\n질문하신 내용 중 \"EM 로그보다 도플러 로그를 더 많이 쓰는 듯하다\"는 의견이 맞습니다.\n과거에는 EM 로그가 저렴하고 관리가 쉬워 선호되었으나, 최근에는 **대형선 및 특수선의 안전한 이접안(Berthing)**을 위해 **전후좌우 속도(3-axis speed)**를 정밀하게 측정할 수 있는 도플러 로그가 표준으로 자리 잡았습니다. 또한 GPS(GNSS) 기술의 발달로 대지속력을 상호 보완할 수 있게 되면서 도플러 로그의 활용도가 더 높아졌습니다.", "id": 536}, {"category": "천문항해!", "question": "55. 도플러 로그의 3가지 구성 요소", "answer": "정리하신 내용이 맞으며, 용어를 조금 더 명확히 하면 다음과 같습니다.\n트랜스듀서 (Transducer): * 에너지 변환기입니다. 송신 시에는 전기 신호를 음파로, 수신 시에는 반사된 음파를 다시 전기 신호로 변환합니다.\n신호 처리부 (Transceiver/Processor Unit): * 정리하신 '증폭부'를 포함하는 개념입니다. 송신 주파수를 생성하고, 수신된 미세한 도플러 주파수를 증폭 및 연산하여 실제 속력 값으로 계산합니다.\n지시부 (Display Unit): * 계산된 선속(Speed), 항정(Distance Run), 측정 모드(Bottom/Water) 등을 화면에 표시하고 타 기기(RADAR, ECDIS 등)에 데이터를 전송합니다.\n추가 팁:\n시험이나 면접 대비용이라면, 도플러 로그의 오차를 줄이기 위해 앞뒤로 빔을 쏘는 Janus Configuration(야누스 배치) 방식을 사용한다는 점을 덧붙이면 아주 좋은 점수를 받을 수 있습니다.", "id": 537}, {"category": "선박적화!", "question": "2.Layday와 dispatch 의 관계", "answer": "LAYDAY 무엇이며 DISPATCH가 무엇을 의미하는가", "id": 538}, {"category": "선박적화!", "question": "7.정박일 개산방법, WWD SHEX상 정박일 계산법", "answer": "묵시담보(Implied warranty)는 어떤것들인가? General average 영어로 물어보신후 의미와 성립의 예를 세가지 이상 말하시오. 오프 하이어에 의의와 사례 (앞에 2분께서 하신 대답이 마음에 안드셨는지 저한테까지 왔습니다.)", "id": 539}, {"category": "선박적화!", "question": "97. 해난 사고가 일어났을 때 무엇을 보고해야 하는가?", "answer": "- Sea protest를 하여야 한다.\n- 선박이 항해중 황천 등을 조우하여 선체 및 화물에 피해가 예상될 때 선장은 입항 후 소정의 시간 보통\n24시간 이내에 최초 입항지의 선박 소속국 영사관 또는 공증인에 출두하여 선서를 하고 해난의 사실을 간단히 설명하여 실제 손해가 있는 경우 Extend 할 수 있는 권리를 가지기 위함이다.", "id": 540}, {"category": "선박적화!", "question": "40. Sea Protest란", "answer": "선박이 항해중 황천 기타 해상위험에 조우하여 본선 및 운송물에 피해가 예상될 때 선장은 입항 후 소정의 시간(보통 24시간) 이내에 최초 입항지의 선박소속국 영사관 또는 공증인(Notary public)에 출두하여 선서를 하고 해난의 사실을 간단히 설명하여 실제 손해가 있는 경우에 Extend할 수 있는 권리를 가지기 위하여 하는 것이다.", "id": 541}, {"category": "선박적화!", "question": "5. SALVAGE AGREEMENT를 위해 가장 많이 쓰는 LLOYD'S OPEN FORM이 있는데 이거에 대해 설명하시오", "answer": "-> 답변 못하였고 죄송하다 더 공부하겠다 했습니다", "id": 542}, {"category": "선박적화!", "question": "96. Salvage Agreement 에서 선장이 계약하는 6가지 항목은 무엇인지 말하시오.", "answer": "선박과 화물의 긴급한 위험에 처해있을 때 구조업체와 구조 관련 조건을 협의할 시간이 없을때 본선 선장은 LOF 작성하고 전문구조업체로 하여금 구조업무를 우선 수행. No Cure No Pay 원칙이며, 하기사항 고려하여 중재를\n통해 보상액을 결정한다.\n1. the degree of danger to human life and to the salved property", "id": 543}, {"category": "선박적화!", "question": "2. the value of the life or property saved", "answer": "3. the degree of skill demonstrated by the salvor\n4. the degree to which the salvors have invested in equipment, personnel and training", "id": 544}, {"category": "선박적화!", "question": "5. the risks faced by the salvor", "answer": "6. the cost to the salvor of performing the salvage services", "id": 545}, {"category": "선박적화!", "question": "6. LOI가 뭔가?", "answer": "-> LETTER OF INDEMNITY, 보상장 으로 선하증권이 아직 인도되지 않았을때, 해상운송인이 이 서류를 근거로 양하할 수 있다고 대답했습니다.\n1. LOF(Lloyd’s Open Form)의 개요LOF는 선박이 조난을 당했을 때 구조자와 체결하는 가장 대표적인 국제 표준 구조 계약 형식입니다.\n핵심 원칙은 **'No Cure, No Pay(불성공 무보수)'**로, 구조에 성공하지 못하면 원칙적으로 보수를 지급하지 않는 방식입니다.\n선장은 긴급 상황에서 LOF(Lloyd’s Open Form)에 서명함으로써 구조 작업을 즉시 시작하게 하며, 이후 이 6가지 원칙에 따라 구조자의 노고와 성과를 돈으로 환산하게 됩니다.\n구조 보수액 산정의 6가지 핵심 고려 요소\n구조 보수는 단순히 '수고비' 개념이 아니라, 구조자가 감수한 위험과 투입한 자산, 그리고 결과의 가치를 종합적으로 판단합니다.\n인명 및 구조 재산의 위험도 (The degree of danger to human life and to the salved property) 당시 선박과 화물, 그리고 승조원이 처했던 위험이 얼마나 급박하고 심각했는지를 측정합니다. 위험이 클수록 보수액도 높아집니다.\n구조된 인명 또는 재산의 가액 (The value of the life or property saved) 구조 성공 후 남겨진 선박, 화물, 연료 등의 총 시장 가치를 의미합니다. 보수액은 원칙적으로 이 재산 가액을 초과할 수 없습니다.\n구조자의 숙련도 및 기술 (The degree of skill demonstrated by the salvor) 구조 작업 중 구조자가 보여준 전문적인 기술력과 효율성을 평가합니다. 어려운 상황을 창의적이고 전문적인 방법으로 해결했을 때 높은 점수를 받습니다.\n장비, 인력 및 교육에 대한 투자 규모 (The degree to which the salvors have invested in equipment, personnel and training) 구조업자가 평소에 신속한 구조를 위해 얼마나 많은 전용선, 특수 장비, 전문 인력을 유지하고 투자해 왔는지를 고려합니다. 전문 구조업체를 보호하기 위한 항목입니다.\n구조자가 직면했던 위험 (The risks faced by the salvor) 구조 작업 중에 구조 요원이나 구조 장비가 노출되었던 물리적 위험, 손실 가능성 등을 의미합니다. 위험한 환경에서의 작업일수록 보상 가치가 큽니다.\n구조 서비스 수행 비용 (The cost to the salvor of performing the salvage services) 구조 작업을 위해 실제로 지출된 연료비, 용선료, 인건비 등 직접적인 비용을 의미합니다.\n💡 요약하자면\n이 6가지 항목은 **\"얼마나 위험했는가(1, 5)\", \"무엇을 살려냈는가(2)\", \"누가 얼마나 잘했는가(3, 4)\", \"얼마나 썼는가(6)\"**를 공정하게 따져보는 기준입니다. 선장은 LOF 계약을 통해 이 기준에 따른 사후 정산을 약속하는 것입니다. 과거의 구조 계약은 오직 '재산(배와 화물)을 구하는 것'에만 집중했습니다. 하지만 대형 유조선 사고 등으로 인한 해양 오염의 심각성이 커지면서, 환경을 보호한 노력도 구조 보수에 핵심적으로 반영되기 시작했습니다.\n🌊 환경 오염 방지 기여도와 보상 체계", "id": 546}, {"category": "선박적화!", "question": "1. 구조 보수액 산정의 추가 기준", "answer": "앞서 언급된 6가지 항목 외에, 현대의 구조 보수 결정 시 가장 중요하게 평가되는 요소 중 하나는 **\"환경 손해의 방지 또는 경감에 기울인 구조자의 노력과 성과\"**입니다. 구조자가 기름 유출을 막기 위해 하역 작업을 신속히 했거나, 오염 방지 펜스를 설치하는 등 환경 피해를 줄였다면 일반 구조 보수액이 증액될 수 있습니다.\n2. 'No Cure, No Pay'의 한계 극복: 특별보상(Special Compensation)\n전통적인 원칙에 따르면 배가 침몰하여 '구조 실패'가 되면 구조자는 한 푼도 받지 못합니다. 이 경우 구조자가 돈이 안 되는 환경 오염 방지 작업을 포기하고 철수할 위험이 있습니다. 이를 막기 위해 도입된 것이 특별보상입니다.\n대상: 해양 오염의 위험이 있는 선박(유조선 등)을 구조할 때.\n내용: 구조에 실패하더라도 구조자가 환경 오염을 막기 위해 노력했다면, 그 **투입 비용(Expenses)**만큼은 선주로부터 보전받을 수 있도록 보장합니다.\n3. 실무적 해결사: SCOPIC 조항 (Special Compensation P&I Club Clause)\n특별보상은 금액 산정이 복잡하여 분쟁이 많았습니다. 이를 해결하기 위해 LOF에 도입된 것이 바로 SCOPIC입니다. 사전 합의된 요율(Tariff): 장비와 인력 사용료를 미리 정해진 표(Tariff)에 따라 계산하므로 매우 투명하고 빠릅니다. 최소 수입 보장: 만약 '일반 구조 보수액'보다 'SCOPIC 기준 비용'이 더 높다면, 구조자는 그 차액을 추가로 청구할 수 있습니다. 지불 주체: 일반 구조 보수는 선박/화물 보험자가 내지만, SCOPIC 보수는 주로 선주의 책임보험인 P&I Club에서 지급합니다.\n💡 요약하자면\n현대의 Salvage Agreement는 단순히 \"배를 살려라\"를 넘어 **\"기름이 새지 않게 막아라\"**는 임무를 구조자에게 부여합니다. 구조자가 환경 보호에 힘쓰면: 성공 시: 더 많은 보수를 받고, 실패 시에도: SCOPIC을 통해 투입된 비용을 확실히 보전받을 수 있습니다. 이로써 선장은 긴급 상황에서 환경 오염에 대한 걱정을 덜고 구조 작업을 의뢰할 수 있게 됩니다.", "id": 547}, {"category": "선박적화!", "question": "2. 주요 구조계약의 종류 비교일반적으로 구조 계약은 보수 산정 방식에 따라 세 가지로 나뉩니다.구분특징Lump Sum 구조 보수액을 작업 전에 미리 확정하는 방식Daily Hire 구조선 사용료를 1일 단위로 결정하여 지급하는 방식No Cure, No Pay 구조 성공 후 기여도에 따라 보수를 협의하는 방식 (LOF의 기본 원칙)3. 구조 보수의 결정 요인LOF에 따른 구조 보수는 단순히 정해진 금액이 아니라, 다음과 같은 다양한 요소를 종합적으로 참작하여 결정됩니다.피구조재산의 가액 (선박 및 화물의 가치)구조 작업의 난이도 및 구조자의 기술·노력위험의 정도 (당시 기상 및 해상 상태)환경 손해 방지 및 경감에 대한 공헌도4. 특별보상제도와 SCOPIC 조항의 등장전통적인 'No Cure, No Pay' 원칙은 환경 보호 측면에서 한계가 있어 다음과 같이 발전해 왔습니다.① 특별보상 (Special Compensation)배경:", "answer": "구조에 실패하거나 잔존 가액이 낮아 보수를 충분히 받지 못할 경우, 구조자가 환경 오염 방지 노력을 기피할 수 있음.내용: LOF 1990 등을 통해 구조 성공 여부와 상관없이 환경 오염 방지 노력에 대해 선주가 일정 보상을 지급하도록 함.② SCOPIC 조항 (Special Compensation P&I Club Clause)등장 배경:\n기존 특별보상의 산정 방식이 너무 복잡하고 분쟁이 잦아 이를 보완하기 위해 LOF 2000부터 도입됨.작동 방식: 구조자가 SCOPIC 규정을 발동하면, 정해진 요율(Tariff)에 따라 비용을 산출합니다.지급 조건: 산출된 SCOPIC 보수액이 일반 구조 보수액을 초과할 경우, 선주는 그 초과분을 구조자에게 지급해야 합니다.요약하자면: LOF는 **'성공해야 돈을 받는다'**는 원칙을 기본으로 하되, 해양 오염 방지라는 공익적 목적을 위해 구조자가 입을 수 있는 손실을 SCOPIC 조항 등으로 보전해 주는 합리적인 계약 형태라고 이해하시면 됩니다", "id": 548}, {"category": "선박적화!", "question": "94. LLOYD’S Open Form (LOF)의 상세 설명", "answer": "Lloyd’s Standard Form of Salvage Agreement, 흔히 LOF라고 불리는 이 양식은 해상에서 선박이 조난을 당했을 때 구조자와 피구조자(선주) 사이에 체결되는 가장 보편적인 국제 표준 구조 계약서입니다.영국 로이즈(Lloyd’s)에서 제정한 이 양식은 긴급한 상황에서 복잡한 계약 조건을 협상할 시간적 여유가 없을 때, 신속하게 구조 작업을 시작할 수 있도록 고안되었습니다.", "id": 549}, {"category": "선박적화!", "question": "1. LOF의 핵심 원칙: \"No Cure, No Pay\"", "answer": "LOF의 가장 큰 특징은 '불성공 무보수(No Cure, No Pay)' 원칙입니다.\n구조 성공 시: 구조자는 구조된 재산(선박, 화물 등)의 가액 내에서 상당한 보수를 받을 권리가 생깁니다.\n구조 실패 시: 원칙적으로 구조자는 구조 작업을 위해 지출한 비용이나 노고에 대해 어떠한 보수도 청구할 수 없습니다.\n예외: 환경 오염 방지 노력을 장려하기 위해 도입된 SCOPIC 조항 등에 의해 구조 실패 시에도 예외적인 보상을 받을 수 있는 길이 열려 있습니다.", "id": 550}, {"category": "선박적화!", "question": "2. LOF의 주요 특징 및 장점", "answer": "신속성: 계약 체결 시 보수 금액을 미리 정하지 않습니다. 덕분에 금액 협상으로 금쪽같은 구조 시간을 허비하지 않고 즉시 작업에 착수할 수 있습니다.\n선장의 권한: 선박이 급박한 위험에 처했을 때, 본선 선장은 선주를 대리하여 이 계약에 서명할 법적 권한을 가집니다.\n사후 보수 산정: 구조 보수액은 작업이 완료된 후, 영국 런던에서 **로이즈 중재(Lloyd’s Arbitration)**를 통해 공정하게 결정됩니다. 이때 구조의 난이도, 위험도, 구조자의 기여도 등이 종합적으로 고려됩니다.\n환경 보호 강조: 단순한 재산 구조를 넘어 해양 오염을 방지하거나 경감시킨 공로를 보수 산정에 중요하게 반영합니다.", "id": 551}, {"category": "선박적화!", "question": "3. LOF가 체결되는 전형적인 과정", "answer": "조난 발생: 본선이 좌초, 충돌, 엔진 고장 등으로 자력 항해가 불가능하고 위험에 처함.\n구조 요청: 선장은 선주에게 보고하고 구조업체(Salvors)를 수배함.\n계약 서명: 시간이 촉박한 경우 선장과 구조업체 대표가 LOF 양식에 서명함. (최근에는 구두나 이메일 확인으로도 효력이 발생함)\n구조 작업 수행: 구조자는 가능한 모든 수단을 동원하여 선박과 화물을 안전한 곳으로 인도함.\n보수 산정 및 지급: 구조 완료 후 재산 가액을 산정하고, 중재를 통해 결정된 보수액을 선주 및 화주(보험자)가 지급함.", "id": 552}, {"category": "선박적화!", "question": "4. 실무적 의의", "answer": "LOF는 해상 구조 분야에서 **'신뢰의 상징'**과 같습니다. 구조자는 나중에 공정한 보상을 받을 것을 믿고 즉시 위험 속으로 뛰어들 수 있으며, 선주는 당장 현금이 없어도 배와 화물을 살릴 수 있기 때문입니다.", "id": 553}, {"category": "선박적화!", "question": "12. 선박무게종류", "answer": "총톤수 & 순톤수 : 선박의 공식 톤수로 정부에서 선박을 등록하거나 세금 및 각종 요금의 징수 기준이 도는 톤수로 법정 톤수 라고 한다.\n총톤수(Gross Tonnage) : 선박의 전체 용적을 100 큐빅피트로 나눈 톤수\n순톤수(Net Tonnage) : 선박의 전체 용적에서 선박 운항에 이용되는 부분(기관실,선원실,밸러스트 탱크 등)을 공제한 용적을 100큐빅피트로 나눈 톤수로서 직접 영업행위에 사용되는 톤수.\n재화 중량 톤수(Deadweight Tonnage) :선박이 적재할수 있는 화물의 중량으로 최대 적재량을 의미\n배수량 톤수(Displacement ) : 선박이 밀어내는 물의 중량 // 재화 배수톤수", "id": 554}, {"category": "선박적화!", "question": "80. BL상 면책조항 4가지", "answer": "1) 운송책임기간의 한정과 그 기간외에서 발생한 손해의 면책\n2) 부지 약관\n3) 컨테이너 내에 부적절한 적입으로 인한 손해 면책 약관\n4) 갑판적의 잠재적 위험에 대한 약관.", "id": 555}, {"category": "선박적화!", "question": "4. BL 면책사항 중 이로사항", "answer": ": 인명, 재산의 구조, 피난 등 상당한 이유가 있을 시 면책한다.", "id": 556}, {"category": "선박적화!", "question": "31. 선하증권의 면책약관 중 부지 약관이란?", "answer": "선박회사는 선적이 된 화물을 현장에서 인수할 때, 개별적으로 포장을 풀어 그 내용물을 검사할 수 없으므로, '외관상 양호한 상태'인지의 여부만을 확인하는 정도로 화물의 운송을 맡으므로 포장 안의 내용, 개수, 용량, 품질, 종류, 등급 등에 관한 것은 화물의 검수 과정에선 확인되지 않는 것이므로,\n이에 대하여는 책임을 지지 않는다는 의미이다.", "id": 557}, {"category": "선박적화!", "question": "27.layday 종류및 계산방법", "answer": "① C. Q. D.조건(Customary Quick Dispatch : 관습적 조속하역) : 당해 항구의 하역방법 및 하역능력에 따라 가급적 신속하게 하역한다는 조건이다. 물론 불가항력에 의한 하역불능일은 정박기간에서 제외되지만 일요일과 공휴일의 제외여부는 그 항구의 관습에 따른다.\n② Running Laydays(연속정박기간) : 하역불능일(우천, 불가항력 등에 의한)을 모두 정박기간에 산입하는 조건이다.일요일과 공휴일도 대개 포함된다.\n③ Weather Working Days(W. W. D. : 호천하역일) : 기후가 양호하고 하역이 가능한 작업일만으로 정박기간을 정하는 방법이므로 가장 많이 사용되고 있다. 하역불능일은 선장이 결정하거나 상호 협의에 의하여 결정된다.\n일요일과 공휴일은 작업일이 아니므로 제외하는 것이 보통인데 이 때에는 계약서에 SHEX(sundays and holidays are excepted)를 부기한다. 때로는 SHEX unless used로 표시하여 일요일과 공휴일에 작업하면 산입하고 작업하지 않으면 제외시키는 경우도 있고, 일요일과 공휴일을 포함시키는 W.W.D. SHINC(sundays and holidays are included)조건도 있다.", "id": 558}, {"category": "선박적화!", "question": "34. 개품운송계약이 무엇인지 말하시오.", "answer": "개품운송계약이란 정기선 항로에서 다수의 하주로부터 위탁 받은 개개의 화물에 대하여 개별적인 운송계약을\n체결함으로서 성립하는데 송하인 또는 그의 대리인이 선박회사 및 지점이나 대리점에 화물 운송을 신청하면\n운송인 선박회사가 이를 승인하여 선복원부에 등록하는 것으로 화물의 인수가 이루어진다", "id": 559}, {"category": "선박적화!", "question": "1. 정기용선 (Time Charter): \"배를 일정 기간 렌트\"", "answer": "정기용선은 배와 선원을 통째로 빌려 일정 기간 내 마음대로 부리는 방식입니다. 렌터카를 빌려 기름을 직접 넣고 가고 싶은 곳을 가는 것과 비슷합니다.\n비용: 선주에게 주는 '용선료' 외에, 운항에 필요한 연료비(Bunker), 항만 이용료 등은 빌린 사람(용선주)이 직접 냅니다.\n특징: 배가 항구에 묶여 있어도 시간은 가기 때문에, 작업이 늦어지면 빌린 사람이 손해를 봅니다.", "id": 560}, {"category": "선박적화!", "question": "2. 항해용선 (Voyage Charter): \"택시처럼 목적지까지 운송\"", "answer": "항해용선은 특정 화물을 어느 항구에서 어느 항구까지 실어다 달라고 계약하는 방식입니다. 택시를 타고 목적지까지 요금을 내는 것과 같습니다.\n비용: 화물 톤당 얼마, 혹은 한 항차당 얼마 식의 **'운임'**을 지불합니다. 연료비나 항만 비용은 모두 선주가 알아서 처리합니다.\n특징: 날씨가 안 좋아서 항해가 늦어지거나 연료를 많이 써도 선주가 책임을 집니다. 단, 화물을 싣고 내리는 시간이 계약보다 길어지면 '체선료(Demurrage)'라는 벌칙금을 낼 수 있습니다.\n💡 한눈에 보는 요약\n정기용선은 **\"시간\"**을 사는 것이고, 주도권이 용선주에게 있습니다.\n항해용선은 **\"운송 서비스\"**를 사는 것이고, 주도권이 선주에게 있습니다.\n혹시 이와 관련해서 **선박 대절 계약(Bareboat Charter)**이나 체선료 계산 방식에 대해서도 더 궁금하신가요? 구체적인 상황을 말씀해 주시면 더 자세히 설명해 드릴 수 있습니다.\n1) 정기용선계약 (time chater)\n선박의 운항에 관한 권리가 일정 기간 용선자에게 이전되어 용선자가 실제로 화물운송 행위를 담당하는 경우를 말한다. 정기용선은 일반적으로 화주가 일정기간 연속해서 대량 화물을 자체적으로 수송할 필요가 있거나 혹은 용선자가 운항 선복의 부족을 보충하기 위해 또는 용선시장을 미리 예측하여 투기목적으로 선복을 확보해 두었다가 고율의 용선료를 받고 다시 제2의 용선자에게 임대 용선해주어 그 용선요율의 차액수익을 목적으로 계약하는 방법이다.\n이 경우 선주는 선박이 안전하게 항행할 수 있는 상태, 즉 감항능력(seaworthiness)을 유지할 책임을 지고,\n선박의 감가상각비, 금리 등 자본비는 물론 선원비, 선체보험료, 수선유지비, 선용품비 등 선박의 운영비를\n부담해야 한다. 이러한 정기용선은 당초부터 항해를 제한하지 아니하고, 일정한 항행구역의 범위 내에서 일정기간 적법한 화물을 용선주의 비용으로 수송한다는 계약으로, 선장 및 선원의 임명과 지휘권은 선주에게 있으나, 화물운송 등 본선의 운항과 직접 관련해서는 용선자가 지휘와 감독을 하게 된다.", "id": 561}, {"category": "선박적화!", "question": "27. 정기용선 시 용선자와 선주가 부담하는 것은 무엇이 있는지, 용선계약의 기준이 무엇인지?", "answer": "1) 용선계약: 선박의 운항에 관한 권리가 일정 기간 용선자에게 이전되어 용선자가 실제로 화물운송을 담당하는 것. 용선계약이라고 하여 모두가 직접적인 화물운송계약을 의미하는 것은 아니다.\n2) 정기용선: 화주가 일정기간 연속해서 대량 화물을 자체적으로 수송할 필요가 있거나 혹은 용선자가 운항 선복의 부족을 보충하기 위해 또는 용선시장을 미리 예측하여 투자목적으로 선복을 확보해 두었다가 고율의 용선료를 받고 다시 제2의 용선자에게 임대 용선해주어 그 용선요율의 차액수익을 목적으로 계약하는 방법이다.\n3) 정기용선 시 선주 부담금\n선주는 선박이 안전하게 항행할 수 있는 상태, 즉 감항능력을 유지할 책임을 지고, 선박의 감가상각비, 금리 등 자본비는 물론 선원비, 선체보험료, 수선유지비, 선용품비 등 선박의 운영비를 부담해야 한다.\n4) 정기용선 시 용선주 부담금\n정기용선은 당초부터 항해를 제한하지 아니하고, 일정한 항행구역의 범위 내에서 일정기간 적법한 화물을 용선주의 비용으로 수송하는 계약으로, 선장 및 선원의 임명과 지휘권은 선주에게 있으나, 화물운송 등 본선의 운항과 직접 관련해서는 용선자가 지휘와 감독을 하게 된다.\n[추가 질문] 정기용선계약시 중요한 2가지(정기용선 시 선장이 주의해야 할 점)\n1) 용선계약 시 정해놓은 항해속도를 주의해서 항해하여 추가 비용이 들지 않게 하는 것\n2) 하루 벙커 소모량: 계약된 벙커량 이상을 사용하였다면 기상이나 기타 사유를 deck log book에 기록하여 면책이 될수 있도록 한다.\n3) 나용선(선원을 태우지 아니하고 단지 선박만을 임대)과 달리 선원을 태워둔 채로 임대를 하므로 철저한 선원관리가 필요하며 선박의 보존 정비를 위해 노력한다.\n2) 항해용선계약 (voyage charter, trip charter)\n선박소유자 또는 선박임차인이 용선자에게 선원과 항해장비를 갖춘 선박의 선복 전부 또는 일부를 일정구간의 특정항해단위로 화물운송에 차용하는 계약으로 용선자는 이에 대한 대가(용선료)를 지급할 것을 약정하는 계약.\n-항구와 어느 항구 사이의 운항에 대한 계약이다.", "id": 562}, {"category": "선박적화!", "question": "26. 항해용선계약서 상 선주의 면책조항 4가지", "answer": "용선계약서에 일정 종류의 위험, 우발사고 또는 태만에 대한 책임으로부터 선주를 면책(exception)하게 하는 약관이다. 면책조항에는 전쟁조항(war clause), 동맹파업조항(strike clause), 결빙조항(ice clause) 및 이로조항(deviation clause) 등이 있다.\n①전쟁조항(war clause): 전쟁위험이 있는 경우 선박소유자는 용선계약의 해제, 계약이행의 부분거절, 안전항구 지정요구를 할 수 있다. 선박소유자는 전쟁위험이 있는 항로의 이용을 거절하고 안전항로와 안전항구를 임의로 선택할 수 있으며, 이로 인한 추가비용을 용선자에게 청구할 수 있다. 이 경우에는 이로로 보지 아니한다.\n전쟁위험의 유무에 관한 판단은 선박소유자, 선장이 한다.\n②동맹파업조항(strike clause): 선적항과 양륙항에서의 파업시 선박소유자와 용선자의 권리의무에 관한 규정이다. 선적항 파업의 경우에 선박 소유자는 용선자에게 정상적인 정박기간계산을 요구할 수 있으며, 계약을 해제할 수도 있다. 양륙항 파업시 용선자는 체선료의 반액을 지급하고 파업종료시까지 선박을 대기시킬 수 있으며, 다른 안전항구를 양륙항으로 지정할 수도 있다.\n③결빙조항(ice clause): 선적항, 양륙항의 결빙에 대비한 규정이다. 선적항의 결빙으로 선박이 선적이전에 출항하는 경우에는 용선계약이 무효가 되며, 화물의 일부만 선적후 출항하는 경우, 선박소유자는 다른 화물을 추가 선적할 수 있고, 이 경우의 운임은 인도된 화물의 수량에 따라 결정한다. 양륙항 결빙시 용선자는 체선료를 지급하고 선박을 대기시키거나 안전항구로 회황할 것을 지시할 수 있다. 화물의 양륙도중 결빙이 되는 경우 선장은 선적된 화물을 가지고 최근접안전항구로 발항 할 수 있다.\n④이로조항(deviation clause): 이로는 원칙적으로 금지되나 인명/재산의 구조목적 등을 위하여 이로할 수 있는 자유를 가진다", "id": 563}, {"category": "선박적화!", "question": "23. 항해용선계약에서 용선주에 의해 지켜져야 할 묵시적 조건 3가지를 말하시오.", "answer": "용선자는 다른 약정이 없는 한,\n1) 선적기간 내에 운송물을 선적할 의무를 부담하고,\n2) 운임 등의 지급의무를 부담하며,\n3) 위험물 고지의무,\n4) 안전항 지정의무 등을 부담하고,\n5) 양륙항에서 운송물을 수령할 의무를 부담한다.", "id": 564}, {"category": "선박적화!", "question": "4. Lumpsum 계약 관련 설명", "answer": "3) LUMPSUM CHARTER\n정기선이 아닌 부정기선을 이용할 때의 방식으로 운임 결정시 화물의 수량이나 중량이나 용적에 관계없이 한번의 항해를 기준으로 운임을 용선자와 선박회사간에 결정하는 방식입니다\n.\n[추가 질문] Lumpsum Charter는 왜 갑판적재 화물에 가장 많이 사용되는지 설명하시오.\n항해용선 형식 중의 한 분류로서, 한 항차의 운임 총액을 포괄적으로 정하여 운송계약을 체결하는 것이다. 선복용선에서의 운임을 선복운임(Lumpsum freight)이라 하며, 운임 산출은 대상 선박 자체의 적재톤수(중량 또는\n용적)에 대하여 일정한 운임률을 곱하여 계산하는 것이 보통이다. 주로 원목운송과 같이 갑판적재가 허용되는\n화물에서 많이 이용된다. 선박 자체의 적재톤수로 운임이 결정되므로, 갑판적재를 하는 화물에 대해서는 운임이 계산되지 않기 때문에 갑판상 적재를 할 수 있는 화물을 실을수록 이득이 된다.", "id": 565}, {"category": "선박적화!", "question": "20. CLP란?", "answer": "CLP : Container Load Plan, 컨테이너 적화명세서\n각각의 컨테이너 박스에 들어 있는 화물의 명세를 기재한 서류를 말한다.\n1) 정박기간의 산정\n용선계약서에서는 하역준비완료통지서(N/R)가 통지된 후 오전 통지시 오후 1시부터, 오후 통지시 다음날 오전 6시부터 기산한다. 하역기간의 종기는 일반적으로 하역이 완료되는 때이다. 하역이 종료되면 정박일수를 기재한 정박일계산서(Laydays Statement)를 작성하여 선장 및 화주가 서명한다.", "id": 566}, {"category": "선박적화!", "question": "1. 하역 준비를 위한 '최소한의 시간' 보장", "answer": "배가 항구에 도착해서 \"준비됐다(N/R)\"고 알려도, 육지에 있는 화주나 하역업자가 즉시 크레인을 돌리고 인력을 투입하기는 어렵습니다.\n오전 통지(예: 오전 10시): 점심시간 동안 인력을 배치하고 장비를 점검하여 오후 1시부터 본격적으로 작업을 시작하라는 의미입니다.\n오후 통지(예: 오후 3시): 이미 당일 작업 계획이 끝났을 수 있으므로, 밤사이에 준비해서 다음날 아침 일찍(오전 6시) 작업을 시작하게 배려하는 것입니다.", "id": 567}, {"category": "선박적화!", "question": "2. 정박기간(Laytime)은 곧 '돈'이기 때문", "answer": "앞서 말씀드린 것처럼 정박기간을 넘기면 화주가 벌금(체선료)을 내야 합니다. 만약 N/R을 던지자마자 바로 시간을 재기 시작하면, 화주 입장에서는 준비도 안 됐는데 벌금을 내야 할 위험이 커집니다. 반대로 선주는 빨리 일을 시작하고 싶어 하죠. 이 서로 다른 이해관계를 절충한 표준 규정이 바로 작성하신 \"오전 통지-오후 기산\" 규칙입니다", "id": 568}, {"category": "선박적화!", "question": "1. Layday Statement: 정박기간협정서", "answer": "2. Statement of Facts: 작업시작시간, 일일작업사항, 작업중단사유 등 기록", "id": 569}, {"category": "선박적화!", "question": "28. 과적의 판단 기준과, 법적인 근거는 어디에 표기되어 있는가?", "answer": "쿼터민 으로 해수 기준 // 국제만재 흘수선 협약", "id": 570}, {"category": "선박적화!", "question": "26. Q/M 구하는 공식?", "answer": "(선수미 / 2 + 선박 좌우 / 2 ) /2 + (선박 좌우 /2)", "id": 571}, {"category": "선박적화!", "question": "30. 복원성 개념", "answer": "1) 복원성 정의\n- 선박이 물에 떠 있는 상태에서 외부로부터 힘을 받아 경사하려고 할 때의 저항 또는 그 경사한 상태에서 그 외력을 제거하였을 원래의 상태로 되돌아 오려고 하는 성질\n- 복원성의 물리적 크기를 나타내는 힘을 복원력이라 함\n2) 복원성 의미\n- 선박 안정성 판단의 주요 기준\n- 복원성이 부족하면 선박으로서 의미 상실\n3) 복원성 특징\n- 과대: 횡요가 심해져서 선체 및 기관 손상, 화물이동, 승조원에 불쾌감을 유발함", "id": 572}, {"category": "선박적화!", "question": "31. 복원성 기본이론 및 용어", "answer": "1) 중력과 무게중심(G)\n- 중력: 지구가 물체를 잡아 당기는 힘\n- 중량(무게): 중력의 크기\n- 무게중심(center of gravity : G): 물체의 중량이 한 점에서 작용하는 작용점\n- 선박의 중력 크기: 선박의 전체중량(배수량)\n- 중력의 방향: 지구중심으로 향하는 연직 하 방향의 힘\n2) 부력과 부심 (B)\n- 부력: 수압에 의하여 생기는 연직 상 방향의 힘\n- 부심: 부력의 작용점인 선체 잠수부분의 용적 중심. 선박이 경사하면 경사한 방향으로 이동\n- 부력의 크기 = 선체의 수면하 체적 * 물의 비중 = 중량\n3) 선박에서 중력과 부력의 관계\n- 선박이 해상에서 직립상태인 경우, 선박이 작용하는 중력과 부력은 크기가 같고 작용방향은 반대이며, 각각의 작용선은 동일 연직선상에 있음\n- 즉, 중력 = 부력 = 배수량\n- 일반적으로 선박의 무게중심은 흘수선 부근 혹은 이보다 다소 높은 곳에 위치\n- 부심은 흘수선의 절반보다 약간 높은 곳에 위치\n4) 배수량\n- 아르키메데스 원리: 물위에 떠 있는 물체는 그 물체가 배제한 물의 무게와 같은 부력을 받음(중력=부력)\n- 선박이 물을 배제한 무게가 배수량임\n- 배수량 = 수면하 용적(V) * 물의 비중(p)\n5) 모멘트 (moment - 능률)\n- 회전 효과를 나타냄\n- 힘의 크기, 힘의 작용점 및 힘의 방향에 의해 결정\n- 모멘트 양 = F(힘) * d(거리)\n- 선박에서 좌우 모멘트 량이 동일하지 않으면 경사가 발생. 선박 중앙에서 앞 뒤쪽의 모멘트 차이에 의해 트림 발생\n- 선박에서 물체의 이동 모멘트 량: w(중량) * d(이동거리)\n- 선박의 횡경사시 직립시키려는 복원력 모멘트는 배수량에 중력과 부력의 수직거리를 곱한 것과 같음\n6) 짝힘 (우력)\n- 두 개의 힘으로서, 동일한 직선상에서 작용하지 않으며, 크기는 같고 방향이 반대인 한 쌍의 평행한 힘\n- 짝힘의 모멘트는 우력을 이루는 두 힘의 작용선 사이의 수직 거리인 우력의 정과 우력의 크기를 곱한 값임\n- 짝힘 모멘트의 크기 = F * d\n오른쪽 모멘트: F * 1/2d\n왼쪽 모멘트: F * 1/2d\n7) 복원정 (GZ)\n- 선박에서 중력과 부력 사이의 수직거리를 복원정 또는 복원암(righting arm)이라 함\n8) 횡 메타센터(Transfer metacenter - 횡경심, M, TKM)\n- 선박 경사시 이동한 부심 B'에서 세운 수선과 선박의 중심선과의 교우점\n- 경심은 경사각이 10도 미만이면 거의 변화가 없음\n- TKM은 횡경사시 용골(keel)에서 경심(M)까지의 높이, GM은 횡메터센터 높이", "id": 573}, {"category": "선박적화!", "question": "17. 복원력에 영향을 미치는 요소", "answer": "1) 유동수 영향\n- 탱크내 액체가 충만되지 않고 자유표면(free surface)이 있는 경우에 발생\n- 유동수는 선박 전체의 중심을 상승시켜 복원력이 감소함\n- 중심점 상승은 유동수의 양에 관계없고 관성 모멘트와 관계가 있음\n- 자유표면 폭을 n등분하는 종격벽 설치시 무게중심의 상승량은 1/n²으로 감소함\n2) 무게중심의 상하 및 횡이동 영향\n- 고박 불량으로 화물이 한쪽으로 쏠리면 무게중심 상승으로 GM감소\n3) 건현의 영향\n- 건현은 선박 예비 부력을 형성함\n- 건현 부족 = 갑판단이 물에 잠기는 각이 작아짐 = 복원성 범위 작아짐 = 최대복원정 값이 작아져 위험함\n- 따라서, 선박은 적절한 건현을 확보하여야 하며 이를 위해서 만재흘수선 이상으로 화물을 적재하면 안됨\n4) 기타의 선박 제원의 영향\n- 선폭: 선폭증가 = 복원력곡선 기울기 급함 = 경사에 따른 저항 증가 = 복원력 증가\n- 현호: 현호는 능파성을 증가시킴, 갑판단이 일시에 잠기는 것을 방지하므로 건현을 증가시키는 효과와 같음\n- 배수량: 일반적으로 경하상태의 GZ와 GM이 크나 배수량이 작으므로 복원력이 만재상태보다 무조건 크다고 단정할 수는 없음", "id": 574}, {"category": "선박적화!", "question": "18. 복원력에 영향을 미치는 요소 중에 현호가 어떻게 영향을 미치는지 말하시오.", "answer": "선체를 측면에서 보면 상갑판의 선측선은 커브를 이루고 있는데 이것을 현호라고 한다. 즉, 옆에서 볼 때 선박의 상갑판선이 통상 선수부분이 높고 중앙으로 올 수록 점차 낮아지다가 선미부분으로 갈수록 높아지고 현호의 크기는 선체의 중앙에서 선미부분으로 갈수록 높아지는데, 이러한 곡선을 말한다.\n현호의 크기는 선체의 중앙에서 용골에 대하여 그은 평행선과 선수미단에서 상갑판과의 수직거리로 나타낸다. 현호는 능파성을 증가시킬 뿐만 아니라 갑판 끝단이 물에 잠기는 것을 방지한다. 이것은 건현의 증가와 같은 효과를 나타내어 복원력을 증가시킨다.\n선체 중앙부를 최저점으로 한 수평선과 선미수선(AP), 선수수선(FP)과의 교점에서의 수직거리를 각각 선수현호(sheer at stem, forward sheer), 선미현호(sheer at stern, aft sheer)라 한다. 일반적으로 선수현호 높이는 선미현호 높이의 2배가 표준이다.\n*표준현호: 선수현호 = 50(L/3 + 10) mm\n선미현호 = 25(L/3 + 10) mm\n단, L=선박길이(m)", "id": 575}, {"category": "선박적화!", "question": "76. 복원정 곡선도를 영어로는? (-> 종축/횡축에는 각각 무엇? -> 복원정이 무엇인가? -> 복원정은 어떤 계산에 어떻게 사용하는가? -> 곡선도를 활용하는 방법? 등 )", "answer": "X축 : 경사각\nY축 : 경사각에 따른 GZ (복원암)\n매 경사 값마다 복원암이 얼마인지를 그려 놓은 것\n복원 모멘트는 그 당시의 그 당시의 매수량을 곱하면 된다.\n1 radian에 해당하는 값이 GM 이다 // GZ = GM x 세타 값 < 10도 이하의 소각도 경사시>\n세타 값은 1 Radian // 180 / 파이\n즉 복원정 곡선도에서 10이하에서 기울기를 긋고 1 Radian에 해당되는 값을 찾으면 그게 GM이다.", "id": 576}, {"category": "선박적화!", "question": "26. 적절한 GM값", "answer": "- 기준: 선박의 크기, 종류, 형상, 흘수에 따라 다름\n- 경험치: 여객선- 선폭의 약 2%, 일반화물선- 선폭의 약 5%, 유조선-선폭의 약 8%\n- 원양 화물선의 경우, 평온한 해상에서 60-80cm, 대양에서는 90-100cm, 황천시에는 보다 큰 GM의 값.", "id": 577}, {"category": "선박적화!", "question": "54. 선박의 이상적인 GM과 그 이유는?", "answer": "◈ 이상적인 GM값\n: 오랜 경험을 통하여 통계적으로 얻은 값을 보면, 여객선에서는 선폭의 약 2%, 일반화물선에서는 약 5%, 유조선에서는 약 8% 정도가 만재시의 이상적인 GM값이다. 또, 원양 화물선에서는 일반적으로 평온한 해상에서의 GM값은 60~80 cm 정도, 대양에서는 90~100 cm 정도가 적당하다는 설도 있다.\n◈ 이유\n1) 무거운 화물을 Lower hold에 많이 적재했을 때는, 선박의 중심이 아래쪽에 있게 되어 GM값이 커진다. 즉, 하부는 무겁고 상부는 가벼운 상태가 된다. 이와 같은 상태의 선박을 Bottom heavy ship 또는 Stiff ship 이라 한다. 이런 상태는 복원력이 과대하여 횡요주기가 짮아 승조원에게 불쾌감을 주며, 선체나 화물 등에 손상을 주게 된다.\n2) 반대로, 갑판상에 화물을 적재하였을 때는, 중심이 올라가서 GM값이 작아진다. 다시 말하면 하부는 가볍고 상부는 무거운 상태가 된다. 이와 같은 상태의 선박을 Top heavy ship 또는 Tender ship(Crank ship)이라 한다. 이 경우는 복원력이 작아서 횡요주기가 길고, 경사하면 원위치로 되돌아오는 힘이 약하다. 대양상에서 이 상태로 높은 파도나 강풍을 만났을 때는, 선박을 경사시키려는 풍압력 등에 대하여 복원력이 약할 경우에 선박은 전복하는 수도 있다.\n3) 그러므로, 선박은 적당한 크기의 복원력을 가지고 있어야 한다. 상기의 두 조건을 만족하는 GM값이 어느 정도일 때 가장 적당한가는 주로 선박의 형상, 크기, 흘수에 따라서 다르다.", "id": 578}, {"category": "선박적화!", "question": "24. 선박이 안정한지 불안정한지 알려면 어떤 것을 확인하는지 설명하시오.", "answer": "메타센터 높이(GM)을 확인한다.\n1. GM > 0 : 메타센터가 무게중심보다 위쪽에 위치하면 선박은 안정하여 원위치로 되돌아 온다.\n2. GM = 0 : 메타센터와 무게중심이 같은 점이면 선박은 지금 그대로 머물러 있으려고 하는 중립 평형 상태이다.\n3. GM < 0 : 메타센터가 무게 중심보다 아래쪽에 위치하면 선박은 불안정하여 전복된다.", "id": 579}, {"category": "선박적화!", "question": "25. 선박의 안정성 판단 기준", "answer": "1) 안정상태, GM > 0\n- 중력, 부력은 크기가 같고 반대방향으로 G에 작용하는 중력과 B에 작용하는 부력이 우력이 되어 경사방향과 반대방향으로 복원력으로서 작용하여 선박을 원위치로 되돌린다.\n2) 불안정상태, GM < 0\n- 외력의 영향으로 경사하면, 점점 더 경하하려는 경우로써, G가 M보다 위쪽에 있고 중력과 부력은 우력이 되어 선박의 경사를 더욱 크게 한다.\n3) 중립상태, GM = 0\n- 외력의 영향으로 경사한 채로, 그 위치에서 머무는 경우로서 G와 M은 동일한 위치에 있고 중력과 부력이 평형 상태이다.", "id": 580}, {"category": "선박적화!", "question": "23. 선박의 너비에 따른 복원성 차이를 설명하시오.", "answer": "선폭이 증가함에 따라", "id": 581}, {"category": "선박적화!", "question": "4. 최대복원각, 복원성 범위가 작아진다.", "answer": "5. ferry boat와 같이 흘수가 얕고 중심이 높은 선박은 선폭을 넓혀서 복원성을 얻어야 한다.", "id": 582}, {"category": "선박적화!", "question": "선회시 복원력이 큰 선박이 경사가 커지는지? 아니면 복원력이 작은 선박이 경사가 커지는지? 말하고 그 이유를 설명하시오.", "answer": "복원력이 작은 선박이 경사가 커진다.\n복원력이 작을수록 최대 복원력에 도달하기 위해 복원력이 큰 선박보다 많은 경사가 필요하기 때문이다.", "id": 583}, {"category": "선박적화!", "question": "34. GZ가 0이 되는 경사각", "answer": "복원력 소실각, 최대횡요각", "id": 584}, {"category": "선박적화!", "question": "35. 복원정 GZ가 최대가 되는 경사각", "answer": "최대경사각, 최대복원각, 위험횡요각, 갑판 끝이 물에 잠기기 시작하는 각과 거의 같다.\n1) 복원성범위 : 0도에서 복원력 소실각까지\n2) 원점에서 곡선에 그은 접선과 1radian 즉, 57.3도의 점에서 세운 수선의 교점까지의 수직거리는 초기복원력의 기준이 되는 GM을 나타낸다.\n3) 위험경사각은 최대횡요각의 약 1/2 정도. 이 각은 중량물 하역시에 선체 경사를 한정하는데 중요한 각이다.\n과적의 판단 기준과 법적인 근거는?\n출항시 흘수가 선수 선미 좌우현 다 다른데 그때 과적인지 어떻게 아는가?\n동적 복원력의 면적이 의미하는 것은?\n복원성 1. 복원성 안정성 2. 항해시 GM 값 3. 복원성에 영향을 미치는 요소 4. 유동수가 복원성에 미치는 영향.", "id": 585}, {"category": "선박적화!", "question": "1. 정적 복원력과 동적 복원력 공식은? •", "answer": "인테그랄 0에서 세타까지 사인세타", "id": 586}, {"category": "선박적화!", "question": "2. KN은 어디서 찾을 수 있습니까?", "answer": "배수량등곡선도\n정적 복원력 곡선의 횡축, 종축", "id": 587}, {"category": "선박적화!", "question": "2. 초기 복원력이란?", "answer": "GZ는 어디서 찾아야 하는가?", "id": 588}, {"category": "선박적화!", "question": "20. 초기복원력, 정적복원력, 동적복원력에 대해서 설명하시오.", "answer": "1) 초기복원력\n초기 복원력이란 15°이내의 소각도 경사의 복원력으로 Metacenter의 위치는 소각경사에서는 일정하므로 GZ=GM * sinθ가 되어, 초기 복원력=W * GM * sinθ가 된다.\nGZ : 복원정(Righting arm) / GM : Metacentric height / BM : Metacentric radius\n1. 초기복원력: 선박이 기울어지기 시작하여 15도 미만의 작은 각도로 경사한 경우의 복원력", "id": 589}, {"category": "선박적화!", "question": "2. 성질: GZ = GM x sinΘ", "answer": "복원력 = W x GZ = W x GM x SinΘ (W: 선박의 배수량(톤), GM의 단위: 미터, Θ: 횡요각\n이 관계식을 살펴보면 어떤 경사각으로 기울어진 상태의 초기복원력은 그 선박의 배수량이 일정할 경우 GOM의 크기에 따라 결정되는 것을 알 수 있다. 그러므로 선박에서는 복원력을 평가하는데 GOM을 중요하게 생각하는 것이다.\n3. GOM: 선박의 무게중심(G)과 메터센터(M)사이의 거리를 메터센타의 높이라 하고 간단하게 GOM이라 표시하며 일반적으로 복원성의 평가에 사용된다.\n복원성(정적,동적복원료 의미 계산방법)\nGM과 종강력 그래프(중력,부력,하중,전단력,굽힘) 관련은 기출 빈도가 높습니다.", "id": 590}, {"category": "선박적화!", "question": "초기복원력은 몇 도 이하를 의미하는가?", "answer": "15도\n추가질문] 왜 15도를 기준으로 구분을 하는지 그 이유를 말하시오.\nGM이 큰 탱커선은 15도까지, GM이 작은 컨테이너선이나 자동차운반선은 10도 정도까지 기울어져도 경심(M, Metacenter)의 위치가 거의 같기 때문이다.", "id": 591}, {"category": "선박적화!", "question": "22. 정적복원력, 동적복원력 정의 및 공식을 말하시오.", "answer": "1) 정적복원력 (Static stability)\n- 횡경사에 따른 횡복원 Moment(복원정의 크기)\n- 대각도 경사시에는 경심의 위치가 일정하지 않기 때문에 복원력의 상태를 정적복원력 곡선도를 보고 확인이\n가능하다.\n- 최대복원력의 각도(위험횡요각)\n최대복원모멘트에 도달한 때의 각도\n소실각의 약1/2, 갑판 끝이 물에 잠기기 시작하는 시점.\n- 소실 각도: 복원 moment가 0이 될때까지의 경사각, 복원력 소실각도 이상 경사하게 되면 배는 전복한다.\n- 최대복원력 각도 = 최대 경사각, 위험횡요각\n- 배가 잔잔한 물에 떠있을 때 초기경사에 대해 제자리로 돌아가려고 하는 성질, 경사에 대하여 원위치로 되돌아 갈려는 우력", "id": 592}, {"category": "선박적화!", "question": "정적복원력 곡선에서 GZ 를 곡선으로 표시한 이유는 무엇인지 말하시오.", "answer": "선박의 복원력은 같은 선박이라도 배수량의 상태와 선내 중량의 배치에 따라 달라지므로 그때의 적하상태에\n따라 복원력을 확인해야할 필요가 있다. 그러므로 선박을 건조한 조선소에서는 선박에 화물을 적재하지 않는\n경하상태와 화물을 만재한 상태 및 그 밖의 적화상태를 가정하여 모든 경사각에 대한 GZ 를 계산하여 GZ 를\n곡선으로 표시한다", "id": 593}, {"category": "선박적화!", "question": "21. 정적복원력 곡선에 대해서 설명하시오.", "answer": "경사에 대하여 원위치로 되돌아 가려는 힘을 정적 복원력이라 한다. 대각도 경사시에는 M점의 위치가 일정하지 않으므로 복원력의 상태를 정적 복원력 곡선으로 판단한다. 정적 복원력 곡선은 횡축에 경사각을, 종축에 선박의 복원정(GZ)를 잡고, 일정한 배수량으로 횡경사 하였을 때의 복원정을 표시한다.\n복원정이 최대가 되는 경사각을 최대 복원각이라 하며, 동시에 위험 횡요각 및 최대 경사각이 된다. GZ가 0이 되는 경사각을 복원력 소실각 또는 최대 횡요각이라 하고, 0도에서 복원력 소실각 까지를 복원성 범위라고 한다.\n위험 경사각은 최대 횡요각의 약 2분의1이다. 중심의 위치를 일정하게 가정해놓고, 일정한 경사각에 있어서 각 배수량에 대한 복원정의 길이를 구하여 횡축을 배수량, 종축을 복원정으로 곡선을 만들고, 수 개의 경사각에 대한 곡선군을 그린 도표를 복원력 교차곡선이라고 하며, 대개 15도의 간격으로 90도까지 6개의 곡선을 그리는 것이 보통이다.(각 KG에 대한 곡선을 나타내는 도표이므로, KG마다 도표가 있음)", "id": 594}, {"category": "선박적화!", "question": "정적복원력 곡선도를 영어로 무엇이라 하는가?", "answer": "Curve of statical stability\n1) 선박의 복원력은 같은 선박이라도 배수량의 상태와 선내중량의 배치에 따라서 달라지므로 그 때의 적하상태에 따라 복원력을 확인해야할 필요가 있다.\n2) 그러므로 선박을 건조한 조선소에서는 선박에 화물을 적재하지 않은 경하상태와 화물을 만재한 상태 및\n그 밖의 적화상태를 가정하여 모든 경사각에 대한 복원의 팔 GZ를 계산한 정적복원력 곡선도를 작성하여 본선에 제공한다.\n3) 가로축에 경사각을 표시하고 세로축에 복원암 값GZ를 표시한 도표이다.\n4) 이 정적복원력곡선은 선박운항시에 이용\n5) 선박이 이 곡선도에 표시되지 않은 상태에 있을 때에는 이것과 비슷한 상태의 곡선도로부터 복원력을 추정하여 운항에 참고한다.\n6) 대각도 경사시에는 M점의 위치가 일정하지 않으므로 복원력의 상태를 정적복원력곡선으로 판단한다.\n2) 동적복원력 (Dynamic Stability)\n- 동적복원력이란 어느 각도까지 경사하는데 필요한 일의 양\n- 경사로 인한 위치에너지 증대량, 중심의 상승량과 부심의 하강력과의 합에 배수량을 곱한 것이다.\n- 어떠한 외력이 작용했을 때 몇 도까지 경사할 것인지 알 수 있다.\n- 선박을 경사시키는데 필요한 일의 양은 복원모멘트에 호도의 곱이다. 따라서 정적복원력을 적분하면 동적복원력을 구할 수 있다.\n- 파도중에서 배가 바람과 동요로 인해 기울어졌을 때 전복하지 않고 제자리로 돌아가려는 성질, 경사 때문에 생기는 선박의 역학적 일 양", "id": 595}, {"category": "선박적화!", "question": "19. 동적복원력은 무엇이며, 동적복원력을 구하는 방법과 공식에 대해 설명하시오.", "answer": "직립 상태에서 어느 경사각도까지 기울게 하는데 소요되는 작업량을 동적복원력이라고 한다.\n동적복원력은 선박에 어떠한 외력이 작용했을 경우에 몇 도까지 경사될 것인가, 또는 안정성이 있을 것인가를 판정하는데 중요한 요소이다.\n동적복원력은 GZ값 그래프에서 정적복원력 곡선 수치에 해당하는 면적을 말하며, 복원정과 배수량의 곱인 복원모멘트와 경사된 각의 호각(Radian)과의 곱이다.\n- 동적복원력 = (W * GZ * 경사된 각의 호각(Radian))\n- 복원정 GZ = GM * SINθ 로 구한다(θ=횡요각)", "id": 596}, {"category": "선박적화!", "question": "동적복원력의 위험기준이 무엇인지 말하시오.", "answer": "복원에너지를 나타내는 동적 복원력 면적 (b)는 전복에너지를 나타내는 동적횡요면적 (a)보다 같거나 크게하여 선박이 기울어지지 않게 하여야 한다.", "id": 597}, {"category": "선박적화!", "question": "초기복원력 곡선도에서 X, Y축은?", "answer": "X축: 복원각 / Y축: 복원정(GZ)", "id": 598}, {"category": "선박적화!", "question": "정적복원력 곡선도에서 X, Y 축은?", "answer": "X축: 복원각 / Y축: 복원정(GZ)", "id": 599}, {"category": "선박적화!", "question": "GZ를 구하는 공식을 말하시오.", "answer": "GZ=GM * sinθ", "id": 600}, {"category": "선박적화!", "question": "13. 동적복원력관련 GZ곡선 그래프에서 면적 구하는 방법", "answer": "GZ : W x GM x sin (경사각)\n정적 복원력 : W x GZ (경사각)\n동적 복원력 : 0에서 경사각 x W x GZ(경사각)", "id": 601}, {"category": "선박적화!", "question": "20. 정적 복원력 이란 동적 복원력 이란?", "answer": "정적 복원력 : 선상에서 중량물의 이동이나 바람등의 영향으로 경사짝힘이 선체에 작용할때 경사짝힘과 복원력이 같아지는 경사각에서 선박으로 정적으로 평형을 이룬다.\n동적 복원력 : 직립 상태에서 각도 경사각도까지 기울게하는데 소요되는 작업량을 동적 복원력이라고 한다.", "id": 602}, {"category": "선박적화!", "question": "47.정적 복원력의 정의.", "answer": "정적 복원력 : 선상에서 중량물의 이동이나 바람등의 영향으로 경사짝힘이 선체에 작용할때 경사짝힘과 복원력이 같아지는 경사각에서 선박으로 정적으로 평형을 이룬다.\n동적 복원력 : 직립 상태에서 각도 경사각도까지 기울게하는데 소요되는 작업량을 동적 복원력이라고 한다.", "id": 603}, {"category": "선박적화!", "question": "복원력 교차곡선이란", "answer": "중심의 위치를 일정하게 가정해놓고, 일정한 경사각에 있어서 각 배수량에 대한 복원정의 길이를 구하여 횡축을 배수량, 종축을 복원정으로 곡선을 만들고, 수개의 경사각에 대한 곡선군을 그린 도표를 복원력 교차곡선이라고 하며, 대개 15도의 간격으로 90도까지 6개의 곡선을 그리는 것이 보통이다.(각 KG에 대한 곡선을 나타내는 도표이므로, KG마다 도표가 있음)\n1) 중심의 위치를 일정하게 가정하여 놓고,\n2) 일정한 경사각에 있어서 각 배수량에 대한 복원정(GZ)의 길이를 구하여\n3) 횡축을 배수량, 종축을 복원정으로 곡선을 만든다.\n4) 이를 수개의 경사각에 개한 곡선군을 그린 도표 (15도 간격으로 90도 까지 6개의 곡선을 그리는 것이 보통이다)", "id": 604}, {"category": "선박적화!", "question": "3.gm 계산법중 KM-KG에서 km과 kg는어디서구할수있는가 대답하자 kg는 무게가중요포인트라면 km은?", "answer": "1) KM 구하는 방법\n1) Q/M을 구해서 그 값으로 hydro static table에서 KM값을 구한다.\n2) Q/M 구하는 법\nA. 선수미평균흘수를 구한다. dm\nB. 중앙부평균흘수를 구한다. dθ\nC. 평균흘수의 평균을 구한다. M/M=(dm+ dθ)/2\nD. Q/M을 구한다. Q/M=( M/M+ dθ)/2\n2) KG 구하는 방법\n1) KG=[(LIGHTSHIP 상태 모멘트) + (각각의 화물 모멘트)] / (전체 배수량)\n=[(경하배수량 x 초기KG)+(화물1 x VCG1) +(화물2 x VCG2) +(화물3 x VCG3)] / (전체 배수량)\n여기서 초기 KG값은 경하흘수 상태에서 KG값으로 hydro static table에 있다.\n*VCG: VERTICAL CENTER OF GRAVITY, 물체의 수직선상 무게중심까지의 높이를 말하며 각 선박마다 비치 되어 있는 경사시험 성적표에서 확인 할 수 있다.\n[추가 질문] KG에서 앞서 말한 식으로 구한다고 하셨는데 그건 어디서 볼 수 있나요.\n초기 경하흘수는 경사시험 결과에서 확인이 가능하며, Loading Manual Booklet에서 페이지마다 얼리징에 따라서 Displacement나 VCG, TCG, LCG등도 확인이 가능합니다.", "id": 605}, {"category": "선박적화!", "question": "57.SF(stowage factor) 의 정의", "answer": "선창안에 화물을 실었을 때, 화물 1톤이 차지하는 선창 용적을 ft3단위로 표시한 수치.", "id": 606}, {"category": "선박적화!", "question": "28.클래시 어스턴 최단정지 거리?", "answer": "선박 길이의 6L ~ 12L", "id": 607}, {"category": "선박적화!", "question": "13.BENDING MOMENT란 무엇인가? 그것을 적분하면 얻을 수 있는 것은?", "answer": "1)BENDLING MOMENT란 종방향으로 작용하는 굽힘 모멘트로 호깅과 새깅이 있음.\n2)BENDLING MOMNET를 미분하면 SHEARING FORCE를 얻을 수 있음\n3)SHEARING FORCE란 어느 거더의 특정 구회 아래 위 모두 작용하는 하중의 대수 합.", "id": 608}, {"category": "선박적화!", "question": "50.SLOSHING MOMENT :", "answer": "- 20~80프로 적재 금지. 선체의움직임으로 화물이 출렁거리는 힘.\n- “슬로싱”이란 선체의 동요에 의해 기름이나 밸러스트수 등의 유체 액면이 탱크 내에서 동요하는 현상을 의미하며, 화물탱크 운동 주기 및 진폭, 기하학적 형상, 화물 유체의 밀도 혹은 점성 및 적하율 등에 의해서 영향을 받는다. 슬로싱은 화물창 내부 구조 및 지지부에 높은 충격하중을 발생시킨다. 액체화물운반선의 경우 슬로싱 현상에 의해 화물창의 구조적 손상 사례가 증가하고 있다.\n- 일반적으로 1개 탱크용적의 15-80% 범위 이내의 부분적부는 하지 않도록 요구된다.", "id": 609}, {"category": "선박적화!", "question": "2. 종강력곡선 종류 5가지와 상세", "answer": "1) 전단력곡선 (shearing force curve): 선체의 길이 방향의 각각의 위치에 작용하는 전단력의 크기를 나타낸 곡선이다. 임의의 위치에 있어서 전단력의 크기는 그 위치에서 왼쪽에 있는 하중곡선으로 둘러싸인 면적과 같으므로 도식적분기(integrator) 혹은 면적계(planimeter)를 이용하여 곡선을 구할 수 있다. 전단력곡선은 선박의 전후단과 중앙부근에서 0(zero)이 되고 전후단에서 약 1/4L(L : 선박길이) 지점에서 최대가 된다.\n2) 굽힘모멘트곡선 (bending moment curve):\n선체에 작용하는 굽힘 모멘트의 크기를 가로 방향의 각 위치에 대해서 나타낸 곡선이다. 임의의 위치에 작용하는 굽힘 모멘트의 크기는 그 위치로부터 왼쪽의 전단력곡선으로 둘러싸인 면적과 같다. 굽힘모멘트곡선은 선체 전 · 후단에서 0(zero)이고 중앙 부근에서 최대가 된다.\n3) 부력곡선 (buoyancy curve):\n선체 부력의 길이방향 분포를 나타내는 곡선이다. 선박 전체에 대해서는 부력과 중력의 크기가 같으므로 중력곡선으로 둘러싸인 면적과 부력곡선으로 둘러싸인 면적은 동일하다.\n4) 중력곡선 (weight curve):\n선체 중량의 길이방향 분포상태를 나타낸 곡선이다. 중량곡선은 선각(船殼), 의장, 기관, 화물, 연료, 저장품, 음료수, 밸러스트, 여객 및 승무원과 그들의 소지품 등 모든 중량을 늑골(frame) 간격 등을 기준으로 선수 · 선미 방향으로 작성한다.\n5) 하중곡선 (load curve):\n선체 길이 방향의 임의의 위치에 있어서 중력과 부력의 차를 나타내는 곡선이다. 중량이 클 때는 (-)부호를, 부력이 클 때는 (+)부호를 붙인다. 이러한 상향 혹은 하향의 힘이 선박이라는 긴 물체에 작용하면 선체에는 굽힘, 전단, 비틀림 등의 힘이 작용한다.\n중량곡선 - 부력곡선 = 하중곡선하중곡선 → 적분 = 전단력곡선전단력곡선 → 적분 = 굽힘모멘트곡선\n✨ 1. “적분(積分)”은 어렵게 생각할 필요 없습니다\n적분 = 면적을 누적해서 더한다는 뜻입니다.\n즉,\n하중곡선을 적분한다 → 하중을 누적한다 → 전단력이 생긴다. 전단력곡선을 적분한다 → 전단력을 누적한다 → 굽힘모멘트가 생긴다.\n이것을 \"적분\"이라고 부르는 것뿐입니다.\n✨ 2. 하중 → 전단력 → 굽힘모멘트\n선체 종강도는 이렇게 “단계적으로 쌓이는” 힘입니다.\n✔ ① 하중(load) = 부력 – 중량\n부력이 큰 곳은 배가 위로 들리는 힘중량이 큰 곳은 배가 아래로 처지는 힘\n하중은 이렇게 위·아래 힘이 교대로 나타나는 곡선입니다.\n✔ ② 전단력(Shear Force) = 하중을 누적한 결과\n하중이 계속 누적되면 한 지점에서 잘리려는 힘이 생깁니다.\n예시로 설명할게요.\n🧠 상상해보세요\n길게 누운 판자 위에 여러 사람(중량)이 올라가 있고,물에서 받쳐주는 힘(부력)은 위치마다 다릅니다.\n어떤 지점에서?\n왼쪽에서부터 쭉 “부력 – 중량” 차이를 누적해서 더하다 보면특정 지점에서‘와! 여기서 갑자기 힘이 확 커진다!’하는 곳이 나옵니다.\n그게 바로 전단력이 최대가 되는 지점입니다.\n✨ 3. 왜 전단력곡선은 1/4L 지점에서 최대인가?\n이유는 “부력과 중량의 분포 차이 때문”입니다.\n일반 화물선·유조선 구조에서는:\n✔ 선수·선미는 가벼움 → 중량 적음\n✔ midship 근처는 단면이 큼 → 부력 큼\n✔ 엔진룸·화물창 일부는 무거움 → 중량 큼\n그래서:\n-초반(선수 쪽)에는 중량이 적고 부력이 적당\n-중간으로 갈수록 부력이 매우 증가\n-1/4L 부근에서 갑자기 “부력 증가”가 커짐\n-그 결과 하중곡선의 기울기가 가장 크게 변하는 지점이 1/4L\n→ 이 지점에서 누적된 하중값(적분)이 가장 커져서→ 전단력이 최대가 됨\n즉, 부력 분포가 급격히 변하는 지역 = 전단력 최대 지점\n✨ 4. 왜 굽힘모멘트는 중앙(Midship)에서 최대인가?\n굽힘모멘트 = 전단력을 한 번 더 누적한 값즉, “배가 휘려는 힘”입니다.\n✔ 배가 휘는 힘(Bending Moment)은 “한쪽으로 밀리는 힘의 누적”\n전단력이 +에서 –로 바뀌는 지점,즉 전단력이 0이 되는 지점이 “굽힘모멘트 최대점”입니다.\n대부분 선박의 구조에서:\n-전단력곡선은 1/4L에서 최대\n-midship(선체 중앙)에서 0이 됨\n-전단력이 0이 되는 점 → 굽힘모멘트 최고점\n즉, 1/4L 이후로 전단력이 “양 → 음”으로 바뀌면서그 사이에서 누적된 힘이 가장 큰 곳이 중앙(midship) 입니다.\n그래서:\n굽힘모멘트는 Midship 부근에서 최대전단력은 1/4L 근처에서 최대\n이것은 거의 모든 상선에서 공통 구조입니다.\n✨ 5. 극도로 쉽게 이해하는 버전\n🔵 하중곡선\n물의 힘과 배 무게의 차이\n🔵 전단력곡선\n하중이 쌓여서 “여기서 배가 잘릴 것 같다!” 느껴지는 곳→ 보통 1/4L\n🔵 굽힘모멘트곡선\n전단력이 양에서 음으로 바뀌면서 “배가 가장 크게 휘는 곳”→ midship\n✨ 6. 아주 쉬운 예로 표현하면\n배가 물에서 이렇게 생겼다고 가정할 때:\n선수 1/4L Midship 3/4L 선미 |------|--------|--------|------|\n-선수·선미는 부력·중량 모두 작음\n-1/4L 근처에서 부력이 확 증가 → 전단력 최대\n-midship에서는 전단력이 0 → 굽힘모멘트 최대\n✨ 7. 요약 (시험용 정답)\n전단력(SF) = 하중곡선의 적분 → 선박 전후단은 0, 1/4L에서 최대굽힘모멘트(BM) = 전단력곡선의 적분 → midship에서 최대\n하중 = 부력 – 중량전단력 = 하중 누적굽힘모멘트 = 전단력 누적\n1) 중량곡선 (Weight Curve)\n-의미:\n-선체 길이 방향 각 위치에서 아래로 작용하는 중량의 분포\n-포함되는 것:\n-선각, 의장, 기관, 화물, 연료, 저장품, 밸러스트, 승무원·여객 등\n-단위 (보통):\n-t/m (톤/미터) → “1m 길이당 중량”\n2) 부력곡선 (Buoyancy Curve)\n-의미:\n-선체 길이 방향 각 위치에서 위로 작용하는 부력의 분포\n-특징:\n-물에 잠긴 선체 외판 형상에 따라 정해짐\n-부력곡선 아래 면적 = 총 부력(배수톤수)\n-중량곡선 아래 면적 = 총 중량(배수톤수)\n-선박 전체에 대해서는 “총 부력 = 총 중량” 이어야 하므로,→ 두 면적은 같아야 함.\n-단위 (보통):\n-t/m\n3) 하중곡선 (Load Curve)\n-의미:\n-선체 길이 방향 각 위치에서부력과 중량의 차(순 상·하향 하중)\n-정의(관례):Load=Buoyancy−Weight\\text{Load} = \\text{Buoyancy} - \\text{Weight}Load=Buoyancy−Weight\n-부력이 더 크면 위(+),\n-중량이 더 크면 아래(–)로 나타냄.\n-역할:\n-이 곡선이 “선체에 어느 구간에서 위로 더 들고, 어느 구간에서 아래로 더 누르는가”를 나타냄.\n-이 Load를 적분하면 전단력이 나온다.\n-단위:\n-t/m", "id": 610}, {"category": "선박적화!", "question": "2. 전단력(S.F)과 굽힘모멘트(B.M)의 관계", "answer": "4) 전단력곡선 (Shearing Force Curve)\n-의미:\n-선체 길이 방향 각 단면에서 위·아래 방향으로 선체를 끊어버리려는 내부력\n-쉽게 말하면:\n-“어느 단면에서, 그 단면 왼쪽과 오른쪽의 부력–중량 불균형 때문에 생기는 미끄러지려는 힘”\n-관계:\n-전단력(S.F)은 하중곡선(Load Curve)을 적분한 값\n-즉, 어떤 위치 x에서의 S.F 값은\n→ 그 위치까지의 Load Curve 밑 면적에 해당\n-일반적인 형태(전형적인 적재 상태일 때):\n-선수·선미 단에서 S.F = 0\n-양단에서 약 0.2L~0.3L (통상 1/4L 부근)에서 최대\n-중앙부근에서 다시 0에 가까워짐\n-단위:\n-t (톤), ton-force, kN\n→ “힘” 그 자체\n5) 굽힘모멘트곡선 (Bending Moment Curve)\n-의미:\n-선체 각 단면에서 배를 위·아래로 휘게 만드는 모멘트(휨 모멘트)\n-관계:\n-Bending Moment는 Shearing Force를 적분한 값\n-즉, 어떤 위치 x에서의 B.M 값은→ 그 위치까지의 S.F Curve 밑 면적에 해당\n-일반적인 형태(전형적인 적재 상태일 때):\n-선수·선미 단에서 B.M = 0\n-선체 중앙부 근처에서 최대 호깅 또는 새깅 모멘트 발생\n-부호:\n-호깅(Hogging) : 선체 중앙이 위로, 선수·선미가 아래로 → 보통 (+) 플러스\n-새깅(Sagging) : 선체 중앙이 아래로, 선수·선미가 위로 → 보통 (–) 마이너스\n-* 호깅과 새깅이란 무엇인지 설명하고 그 방지법을 설명하시오.\n1) 호깅: 전,후단이 중력이 크고 중앙부에 부력이 큰 현상. 화물을 중앙부에 적게 적재하고 전,후단에 많이 싣을 경우 발생한다.", "id": 611}, {"category": "선박적화!", "question": "2. 새깅: 선체의 전,후단에서 부력이, 중앙부는 중력이 큰 현상. 화물을 중앙부에 과적, 전,후단에 적게 싣을 경우 발생한다.", "answer": "3. 방지법: 종강력재의 강도를 충분히 크게한다. 강판과 강판, 형강과 형강의 접속을 충분히 견고하게 결합한다.\n단위:\nt·m (톤·미터), kN·m\n→ “힘 × 거리(모멘트)” 단위\n6) Shearing Forces는 특정 구획(단면)까지 하중곡선을 적분하면 되고, Bending Moment 는 구해진 Shearing Forces를 적분하면 구해진다. 이들이 중요한 것은 가장 주된 이유가 화물 배치인데, 이외에도 load, buoyance, weight 등도 고려해야 하고, 허용 stress를 초과하지 않도록 배치 및 sequence를 수립해야 한다. 실질적으로는 본선 컴퓨터로도 계산이 되므로 그래프, 특정 프레임에 대한 값, GM을 보고 실무에 임한다", "id": 612}, {"category": "선박적화!", "question": "3. S.F가 가장 큰 부분과 줄이는 방법", "answer": "1) S.F가 가장 큰 부분\n전형적인 화물선 적재 상태에서:\n하중 분포(Weight – Buoyancy) 특성 때문에\n전단력은 보통\n선수·선미에서 0\n약 1/4L 부근에서 최대값이 나타나는 경우가 많습니다.\n시험 답변용 멘트:\n“전단력곡선은 선체 양단과 중앙부근에서 0이 되고,일반적으로 선수·선미에서 약 1/4L 지점에서 최대가 된다.”\n2) S.F를 줄이는 방법\n화물 배치를 적절히 조정\n특정 구획(특히 1/4L 부근)에 중량이 과도하게 집중되지 않도록\n선창별로 중량을 골고루 배분\n밸러스트(Ballast) 활용\n필요시 탱크 밸러스트를 이용해\n부력 분포와 중량 분포를 조정\n최댓값 S.F 및 B.M이 허용치 내에 들어오도록 트림·흘수 조정\n실제 실무:\n선박의 로딩 컴퓨터가\n각 적재 상태에서 S.F, B.M 곡선과 허용치를 자동 계산 및 표시\n그 결과를 보면서 화물·밸러스트 계획을 수정\n[추가 질문] SF와 BM의 범위와 항해 중 그리고 정박 중에 왜 다른지 설명하세요.\n핵심은 (1) 설계 하중 케이스가 다르고 (2) 규정상 허용치(허용응력/허용모멘트)를 상황별로 다르게 주기 때문입니다.\n1) SF/BM “범위 100”의 의 로딩 컴퓨터(Loading Computer)에서 SF/BM가 0~100(%)로 나오는 건 보통 현재 계산된 SF 또는 BM ÷ 해당 구간의 허용 SF/BM × 100% 입니다. 즉 “100”은 **절대값이 아니라 ‘허용한도 대비 사용률(UTILIZATION)’**입니다.\n2) 왜 항해 중과 정박 중이 “다르게” 나오나 (핵심 3가지)\n(1) 작용 하중 자체가 다르다: Still Water vs Wave (동하중)\nSF/BM은 크게 두 성분으로 나뉩니다.\nSW (Still Water) SF/BM: 정수중(잔잔한 물)에서 적재 상태(화물•연료•밸러스트) + 부력 분포로 생기는 구조 하중\nWV (Wave) SF/BM: 항해 중 파랑에 의해 선체가 hogging/sagging 하면서 추가로 생기는 하중(동하중)\n정박 중에는 파랑 성분이 거의 없으니 실질적으로 SW 성분이 지배하고,\n항해 중에는 **SW + WV가 합쳐진 “더 큰 총하중”**을 고려해야 합니다.\n그래서 항해 중이 더 빡빡하게 보이는 게 일반적입니다.\n(2) “허용치(limit)” 자체가 상황별로 다르다(Seagoing/In-port limits)\n로딩 컴퓨터는 보통 상황별로 서로 다른 limit set을 씁니다.\nSeagoing(항해) limit: 파랑으로 인한 추가 하중(WV)을 감안해야 하므로, 보통 더 보수적인(허용이 낮은) 기준을 적용하거나, 총합 기준을 적용합니다.\nIn-port(정박/항내) limit: 파랑 하중이 없거나 작다고 가정하므로 SW 기준에 맞춘 허용치를 적용하는 구조가 많습니다.\n즉, “계산값이 달라서”도 있지만, 분모(허용치)가 다르기 때문에 %가 달라지기도 합니다.\n(3) 항내는 국부하중/작업 조건이 달라서 별도 관리한다\n항내에서는 다음 같은 국부적/운용적 요소가 항해와 달라집니다.\n하역 중 탱크/홀의 부분 적재, 크레인/그랩 작업 등으로 일시적 비대칭 하중 발생\n접안(계류) 상태에서 선체 구속/변형 조건이 항해와 다름(완전 자유부유가 아님)\n어떤 선박은 항내에서 허용치가 더 “너그럽게” 보일 수도 있지만, 대신 국부강도(Deck local strength, Tank top, Shear in way of bulkhead, torsion 등) 경보가 더 중요해지는 경우가 있습니다.\n3) 시험/면접 답안형(짧게)\nSF와 BM은 선체 종강도 하중으로, 로딩컴퓨터의 100%는 허용치 대비 사용률이다. 정박 중에는 정수중 하중(Still Water)이 주가 되지만, 항해 중에는 파랑에 의한 추가 하중(Wave-induced)이 더해져 hogging/sagging이 발생하므로 총 SF/BM이 커진다. 또한 규정 및 선급 기준에서 항해(Seagoing)와 항내(In-port)를 서로 다른 설계 하중 케이스로 보아 허용 SF/BM limit set이 달라, 같은 적재 상태라도 표시되는 %가 달라질 수 있다.", "id": 613}, {"category": "선박적화!", "question": "16.Sf/ BM 설명", "answer": "전단응력: 끊어지려는 힘/ 굽힘모먼트: 구부려지려는 힘. 새깅 호깅.", "id": 614}, {"category": "선박적화!", "question": "14.항해 중 GM을 계산할 수 있는 방법에는 어떤 것들이 있는가?", "answer": "1)횡요 주기로 구하는 법 / 횡요주기= 0.8 x 선폭/ √GM\n2)배수량 등곡선도를 이용하는 방법\nGM = KM-KG / KM은 선박의 평균 흘수를 산출하여 배수량 등곡선도에서 구할수 있음.\nKG는 선박전체의 중량물의 각 중량에 용골에서 그 중량물의 중심까지의 높이를 곱한 MOMENT 나누기 선박의 현재 배수량 입니다. 쉽게 말하면 선박에 실린 화물이 가지는 토크와 선박자체가 가지는 토크가 같다고 생각했을 때를 이용한 겁니다.", "id": 615}, {"category": "선박적화!", "question": "3. gm에서 km을 구하는 방법", "answer": "-> Q/M(흘수 앞뒤 평균을 더해서 나누고 그 수치를 중간 평균이랑 더해서 나줌 그리고 다시 중간이랑 더해서 나눔) / 이 값으로 배수량 등략 곡선도에서 Km을 구한다.", "id": 616}, {"category": "선박적화!", "question": "4. gm에서 kg을 구하는 방법", "answer": "-> KG는 선박전체의 중량물의 각 중량에 용골에서 그 중량물의 중심까지의 높이를 곱한 MOMENT 나누기 선박의 현재 배수량 입니다.\n쉽게 말하면 선박에 실린 화물이 가지는 토크와 선박자체가 가지는 토크가 같다고 생각했을 때를 이용한 겁니다", "id": 617}, {"category": "선박적화!", "question": "29. 배수량 등곡선도에서 알 수 있는 것은 무엇인가?", "answer": "선박계산에 필요한 중요한 정수력학적인 자료가 모두 들어 있는 선박의 곡선도. 이 곡선도는 각 선박마다 따로 만들어진다.\n종축은 흘수로 하고 이 흘수의 값에서 모든 곡선의 값을 횡축에서 찾도록 되어 있다.\n1) 선박의 평균흘수로 각종 곡선의 값을 구한다.\n2) KB곡선, TCM곡선, 배수량곡선, KM곡선 등 선박의 배수량에서 각종 곡선의 값을 구한다. 선박의 배수량을 알면 배수량에서 흘수 값을 얻을 수 있으므로 1에서 구한 방법으로 다른 곡선치를 얻을 수 있다.\n1) 경사시험에 의한 공선상태의 중심의 위치 계산\n갑판상에서 소중량 w를 횡방향으로 d 만큼 이동시켜 일어나는 선박의 경사각 Ø 를 측정하여 GM을 구할 수 있다. KG = KM – GM, 이 식에서 KM은 선형에 의하여 정해지는 요소(배수량 등곡선도 참고)이며,\nGM을 알면 Keel에서 중심까지 높이 KG를 계산할 수 있다.\nGM은 다음식에 의하여 계산된다.\nGG’ = (w x d) / ㅿ, GG’=GM X tanØ 이고, tanØ = a/l 이므로\nGM = (w x d) / (ㅿ x tanØ)\nGM = ((w x d) / ㅿ ) X (l / a)\n*예제) 배수량 20,000ton 의 선박에서 40ton 의 소중량을 갑판위 정횡방향으로\n12m 이동하여 3° 의 경사가 일어났다. 이 선박의 GM은 얼마인가?\n풀이>> GG’ X ㅿ = w X d, GG’ = GM X tan Ø\nGM X tan 3° = 40 x 12 / 20,000\nGM = 0.46 (m)\n2) 임의 적화상태에 대한 GM의 계산\nGM = KM – KG 에서 KM은 배수량 등곡선도(Hydrostatic curves)에서 주어진\n흘수로서 굴할 수 있으므로 KG 를 산출하면 된다.\nKG = (경하상태의 배수량에 의한 Moment + 각 화물의 중량에 의한 Moment) / 현재의 배수량\n3) 횡요주기에 의한 GM의 간이 측정법\nT = 0.802 B / √ GM\n교수님이 다시 질문 KG는 어떻게 구합니까 ?\n답)경하상태의 선박 배수량에 의한 모멘트 + 화물중량의 의한 모멘트/전체 배수량입니다.\n질문) 경하상태의 선박 배수량에 의한 모멘트는 어떻게 구합니까 ?\n경하상태에 있어서 중심의 위치는 선박에 비치되니 경사시험 성적표에서 구한다.\n각 선박에 비치되어 있는 경사시험 성적표에는 각 TANK, 선창, 창고 등 각 구획의\n중심 위치가 기재되어 있으므로 균질물질을 구획에 적재할 때에는, 정확한 중심\n위치를 얻을 수 있으므로 정확한 Moment를 구할 수 있다.\nKG = Weight(ton) / Weight moment(m-ton)\nGM 구하는 법\n(1) 경사시험(Inclining Experiment)에 의한 방법\n경사 시험에 의하여 GM을 구하는 방법은 선박의 공선 상태의 중심의 위치를\n실험에 의하여 구하는 방법으로, 선박의 공선상태의 중심의 위치는 선박의\n복원성의 기초가 되기 때문이다.\n즉 선박의 공선상태의 중심의 위치를 알고 있으면, 그 후에 적재한 적재물에 대한\n중심위치의 이동량을 구하게 되면 GM을 알게 된다.\n* 시험방법\nㄱ. 갑판상에 적재된 중량(w)을 정해진 거리(d)만큼 이동시켜서, 경사각을\nPendulum 이나 Plumb Weight 을 이용하여 측정\nㄴ. 경사 시험에 의하여 갑판상의 중량 w 가 이동한 거리 d 만큼 수평이동\n함으로써 w x d = GG’ x 선박의 배수량(D)의 식이 성립\n이동거리는 평균치를 사용\nGM = w x d/D x 1/tan ø\n(2) KM과 KG 에 의한 GM을 구하는 방법\n선박의 현 상태의 평균흘수를 산출하여 배수량 등곡선도에서 KM을 구하고, 용골(Keel; K)에서 선박이 중심(G)까지의 높이 KG를 구하여 GM=KM-KG의 산식에 의하여 GM을 구한다. 단 여기에서 KG는 다음과 같은 방법에 의하여 구해진다. KG=선박전체의 중량물의 각 중량에 용골에서 그 중량물의 중심까지의 높이를 곱한 Moment/선박의 현재의 배수량이다.\n(3) 선박의 횡요주기에 의한 GM을 구하는 법\n선박이 배수중에서의 저항을 받지 않는 상태에서 횡요주기에 의한 GM을 구하는 방법이나. 항해중에 바람이나 파랑등으로 인하여 저항을 받고, 또하 이로 인하여 선체의 Side Plating 이나 Bilge Keel 등에 의해서 저항을 받기 때문에 정확한 GM을 구할 수 없으나, GM의 근사치는 구할 수 있다.\nT(횡요주기) = 0.8 X B(선폭) / √GM\n종강력을 알수있는 2가지\nb.m & s.f\n선체를 분할된 각 부분으로 나누어 생각시 그 부분의 중력과 부력은 반드시 같지않고, 각 부분에는 중력과 부력의 차이에 의하여 중력이 우세한 부분과부력이 우세한 부분이 생기게 된다. 선체를 구성하는 재료는 이 힘에 저항하여 배의 형태를 유지하고 있다\nB.M. : Bending Moment(굽힘응력) / 각 점에 작용하는 굽힘 moment\nS.F. : Shearing Force(전단응력)\n유동수 관련\n본인은 chemical tanker 1항사로서 ballast center tank 로 load , disc'시 발생할 수 있는 heeling부분을 빚대어 설명하였습니다.\n청수, 해수, 기름 등의 액체가 TANK 에 충만되지 아니하여 자유 표면(FREE SURFACE) 이 있을 경우, 선박이 동요하면 TANK 내의 액체도 유동하게 되고, TANK 의 벽 및 TANK TOP PLATE 를 충격하여 누설과 파손의 원인이 될 뿐만 아니라, 선박 전체의 중심을 상승시킨 것과 같은 복원력의 감소 효과가 생긴다. 선체의 상부에 중량물을 적재하는 것과 같이 G 가 상승하여 GM의 거리가 짧아져 복원성에 현저한 영향을 주게 된다", "id": 618}, {"category": "선박적화!", "question": "2. 트림 GM 계산된 용지를 주면서", "answer": "1) Q/M, MTC, LCF, KM, KG, GM등이 무엇이냐고 물어봄.\n(각 사람별로 종이를 나누어주면서 형광팬으로 표시된것을 설명하라함.)\nQ/M : Quarter Mean (1/4 Mean)\nMTC : Moment to Change trim\n* Mcm : Moment to change trim 1 cm\n- 매 cm trim moment 란 Trim 1cm 에 생기게 하는데 소요되는 화물의 이동 Moment (wxd = Mcm x t)\nw : 이동화물량, d : 화물이동거리, t : 선미 trim 증가시에 양(+), 단위는 cm\nLCF :\nKM :\nKG : 선박전체의 중량물의 각 중량에 용골에서 그 중량물의 중심까지의 높이를 곱한 Moment/선박의 현재의 배수량\nGM : Metacentric height, 선박의 복원성 의미 (여객선에선 선폭의 2%, 일반화물선에선 선폭의 5%, 유조선에선\n선폭의 8% 가 적당한 GM 값으로 보고 있다.)\n* 선박의 중심(Center of Gravity : G) - 선박의 전중량이 어느 한점에 있다고 생각할 수 있는 점\n* 선박의 부심(Center of Buoyance : B) - 부력이 어느 한 점에서 작용한다고 생각할 수 있는 점\n* 선박의 경심(Metercenter : M) - 선박이 직립상태에서 외력에 의하여 작은 각도로 경사되었을 경우, 선박의 부력선과 직립의 선박의 중심선과의 교점, 즉 선박이 경사되었을 때 원위치에서 이동한 부심에서 세운 수선과 선박의 중심선이 만나는 교점\n* 용골(Keel: K)", "id": 619}, {"category": "선박적화!", "question": "27. 선박의 복원성을 좋게 만드는 것과 나쁘게 만드는 것을 말하시오.", "answer": "1) 좋게 만드는 것: 무게중심을 낮추는 것 – 평형수(D.B WBT), 화물 선적시 Loading condition 고려\n2) 나쁘게 만드는 것: 무게중심을 높이는 것 – 갑판상에 적재되는 화물, 유동수의 영향, 갑판상 결빙 등", "id": 620}, {"category": "선박적화!", "question": "28. 선박이 장기항해 시 복원력이 달라지는 이유에 대해 설명하시오.", "answer": "장기 항해로 연료, 청수 등의 소모가 많아지면 다음과 같은 사항이 복원력에 영향을 미친다.\n1) 무게중심의 변화로 인해 GM값 및 복원력 변화(선박의 중심이 낮아지면 GM이 증가하여 복원성이 커진다)\n2) 배수량 감소 및 복원정(GZ) 변화로 인해 선박의 복원성 moment 변화 (선박복원성 moment=배수량*GZ)\n3) 건현이 증가하여 해수에 잠기는 각도가 커지게 되어 복원력 범위가 증가한다.\n4) 연료 및 청수 tank 내 공간이 생기면서 유동수로 인한 자유표면(free surface)효과로 인해 선체 동요 시 일시적으로 무게 중심이 변하면서 복원성 변화(경사 시 유동수의 자유표면 효과로 인해 일시적으로 무게중심(G)\n위치가 높아져 GM이 짧아지면서 복원력이 작아진다", "id": 621}, {"category": "선박적화!", "question": "45. 적화계수란?", "answer": "적화계수 [ stowage factor , 積貨係數 ]\n: 선창 안에 화물을 실었을 때, 화물 1톤이 차지하는 선창 용적을 ft3단위로 표시한 수치, 선창에 실을 수 있는 화물량은 화물의 중량 및 모양, 즉 적화 계수에 따라서 달라진다. 각각의 화물은 고유한 적화계수를 가지지만, 같은 화물이라도 싣는 방법과 장소에 따라 적화계수가 달라진다. 즉, 화물을 가지런히 잘 실으면 적화계수가 작아진다. 일반적으로 적화계획에 사용되는 적화계수는 화물틈을 포함하는 경우로, 중량 1톤의 화물이 화물틈을 포함하여 선창을 차지하는 용적(ft3)을 나타내는 것으로 다음 식에 의해서 구한다.\n적화계수(S/F)=사용한 선창 구획의 총 베일 용적(ft3)/구획 안에 만재한 화물의 중량(Long Ton)", "id": 622}, {"category": "선박적화!", "question": "47. Charter base 와 Hire base 의 의미를 설명하시오.", "answer": "1) Charter Base\n: 운임 수입액에서 선박운항에 필요한 경비를 뺀 나머지 수익액을 1개월(30일)당\n1DWT 당의 금액으로 나타내며 운항 채산을 고려할 때 사용 합니다.\nC/B = (운임-항해경비)/(D/W x 가동일수) x 30\n2) Hire Base\n: 항해 여부와 상관없이 선박을 언제나 운항할 수 있는 상태로 유지하는데 필요한\n제 경비의 합계액을 1개월(30일)당 1DWT 당의 금액으로 나타내며 선박의 코스트(원가)를\n파악할 때 사용 합니다.\nH/B = 연간선비/(D/W x 년간 가동일수 x 1/30)", "id": 623}, {"category": "선박적화!", "question": "50. 트림에 대한 배수량의 수정(제1수정과 제2수정에 대해서 설명하시오.)", "answer": "1) 제1수정 : 선박의 배수량 등곡선도는 계획트림과 평행한 Draft에 대한 배수량을 곡선으로\n그려놓았다.\n계획트림은 선박이 Even Keel 상태를 말하므로 선박이 경사가 생겨 트림이 생겼을 때 즉, 부면심이 선체중앙에 있지 아니 할 경우에 배수량을 구하기 위해 선수/미 흘수의 평균치 즉, Mean Draft로서 배수량을 구하면 계획트림 (Even Keel)상태에서 구한 배수량과 오차가 발생한다. 따라서, 이를 수정하는 것을 제1트림 수정이라 한다.\n2) 제2수정 : Trim이 큰 경우에는 수선면적의 변화로 인하여 부면심이 이동하기 때문에 제1수정만으로는 Trim에 의한 수정량이 정확하게 산출되지 아니한다. 즉, 제2수정은 Trim 때문에 일어나는 수선면적의 모양 변화로 인한 배수량의 변화량을 수정하는 것.", "id": 624}, {"category": "선박적화!", "question": "3. 화물창 환기시키는이유", "answer": "(이것은 공부를 확실하게 하지 않아 당황했지만 우드펄프선 이라는 선종과 컨테이너 선을 탔을때 경험을 바탕으로 이슬점 조절 및 컨선 DG화물 선내 선적시 환기를 시켜야한다고 말하니 다른 선박들은 안하냐고 물어봐서 케미컬이나 위험물 운반선도 화물종류를 바꾸면 환기를 시키고 선적해야하는걸로 알고있습니다 하니깐 알겠다고 하고 넘어갔습니다)\n화물창을 환기시키는 것은 단지 외부 공기가 화물창으로 들어가도록하는 것이 아닙니다. 화물창을 환기시키기 전에 여러 요소를 고려해야 합니다. 올바른 요구 사항을 준수하지 않으면 화물 손상이 발생할 수 있습니다.\n환기 결정은 다음 사항을 고려한 후에 내려져야 합니다.\n1) Charter Party 또는 Sailing Instruction에 포함된 지침\n2) 화물의 온도, 특성 및 요건\n3) 홀드 내부 및 외부 공기의 온도, 상대 습도 및 이슬점\n4) 해수 온도는 바다에 인접하거나 접하고 있는 홀드의 온도를 낮출 수 있음\n5) 통풍구가 바다 스프레이에 노출되지 않아야함.\n이러한 모든 요인을 검토하면 Sweat의 위험을 예측할 수 있으므로 환기가 필요한지 여부를 결정합니다", "id": 625}, {"category": "선박적화!", "question": "32. 전복의 유형 및 위험성", "answer": "1) 음의 복원력 (-GM)\n- 무거운 화물을 갑판상에 적재\n- 화물의 고박 불량으로 화물이 한쪽으로 쏠리면서 무게중심 상승\n- 유동수 영향으로 무게중심 상승\n- 상기의 사유로 음의 복원력이 형성되어 전복\n2) 침수에 의한 전복\n- 과적에 의한 건현 부족: 갑판상의 해수 체류 또는 해수 유입 -> 선박의 무게 중심이 높은 상태 유지 -> 조타나 동요에 의한 선체의 경사 -> 화물의 붕괴, 쏟아짐 -> 경사가 증대 -> 침수 -> 전복 혹은 침몰\n- 선저변의 개방: 선저변의 개방 -> 빌지 배출 작업 ->교체변의 폐쇄 망각 혹은 폐쇄 불충분에 의해 선저변으로부터 빌지관을 거쳐 기관실 침수 -> 침몰\n3) 황천시 파랑에 의한 전복\n- 선속과 파속이 비슷한 경우 broaching 현상(선미, 선저부의 파랑충격)이 발생하여 선회모멘트와 경사모멘트가 작용하여 선체를 선회 및 경사시킴\n- 파랑의 속력이 선속보다 빠른 경우 푸핑다운(pooping down)현상이 발생하여 선미부에 해수가 침투하여 무게중심이 상승하고 선박을 선회시켜 횡파를 받게함\n4) 대각도 조타에 의한 전복\n- 선회를 위하여 타를 사용하는 경우, 경사모멘트가 발생하여 선체가 경사함\n- 선속이 빠를수록, 타각이 클수록 경사가 커짐\n- 대양에서 선박이 고속으로 항해할 경우, 가능하면 전타 사용을 자제하고 소각으로 타를 사용하고 한번에 대각도 변침을 하지 않아야 함\n5) 조류에 의한 전복\n- 유속이 있는 장소에 선박이 진입하면 선회를 시작하고 이때 조류의 힘은 선박의 흘수선보다 아래쪽에 작용하며, 관성력은 무게중심에 작용하므로 선박을 경사시키는 전복 모멘트가 발생", "id": 626}, {"category": "선박적화!", "question": "33. 전복 방지 대책", "answer": "1) 어떠한 경우에도 화물을 만재흘수선 이상으로 과적하지 않고 충분한 건현을 확보한다.\n2) 화물 적재시 무거운 화물은 선창에 적재하여 무게중심을 낮춘다.\n3) 적하시 좌우상하의 중량 분포를 고려하여 화물을 적재한다.\n4) 선체 동요에 의해 화물이 횡 이동 하지 않도록 충분히 고박한다.\n5) 유동수 영향을 줄이기 위하여 탱크에 액체를 가득 채우거나 빈 공간으로 한다.\n6) 항해 중 소비되는 연료, 청수 등에 의한 유동수 발생으로 복원력 감소가 될 수 있다.\n7) 출항시에 각 개구부를 폐쇄하였는지 점검한다.\n8) 상갑판 배수구를 개방하여 갑판상에 해수가 고이지 않도록 한다.\n9) 황천 항해시 선속을 줄이거나 히브투 조선을 행하며 필요시 이중저에 밸러스팅한다.\n10) 갑판적화물 선적시 보통 복원력이 작게 되므로 주의하고 위험이 예상될 경우, 해상 투하도 고려하여야 한다.\n11) 조류 영역에 진입시 횡조류를 받지 않도록 조선한다.\n12) 출항전에 적절한 GM을 확보하였는지 확인한다.", "id": 627}, {"category": "선박적화!", "question": "2. 공기의 비중이 1이라 할때 프로판과 부탄의 비중을 말하시오.", "answer": "(공기 비중, 1) : (프로판 비중, 1.54) : (부탄 비중, 2.07)", "id": 628}, {"category": "선박적화!", "question": "3. 총톤수 1만톤 선박에 실을 수 있는 선적화물의 양을 말하시오. ??", "answer": "선적화물량을 알기 위해서는 순톤수를 알아야 하며, 보통 순톤수는 총톤수의 약 0.65배에 해당한다. 총톤수 1만톤의 경우 순톤수는 약6,500톤임.\n용적톤의 기준에 의거 1톤을 100ft3 로 계산하면, 선적화물량은 총 65만ft3를 선적할 수 있다.", "id": 629}, {"category": "선박적화!", "question": "4. Separation Ballast, Crude Oil Washing 작업을 영어로 설명하시오.", "answer": "1) The segregated ballast tanks(SBT)\nThe segregated ballast tanks(SBT) are dedicated tanks for the sole purpose of carrying ballast water on oil tanker ships. They are completely separated from cargo, and fuel tanks and only ballast pumps are used in the SBT.\nThe segregated ballast tanks avoid any chances of mixing oil and water which usually happens when cargo hold are used to carry ballast water.\n* 부가설명\n유조선은 화물을 양하하고 나면 밸러스트용으로 적당량의 해수를 채우지 않을 수 없다. 이 경우 대부분이\n적재물이 없는 화물 탱크에 해수를 채우게 되어 물과 기름의 혼합이 불가피하다. 따라서 배수작업을 할 경우\n오염된 해수가 배출된다. 분리 밸러스트 탱크란 바로 이러한 경우에 의해 해상오염이 발생되는 것을 근원적으로 방지하기 위해 유조선에 해수만을 저장할 수 있는 독자적인 탱크를 의미한다.\n2) Crued Oil Washing\nCrued Oil Washing is washing out the residue from the oil tanker using the crude oil cargo itself, after the cargo tanks have been emptied. Crued oil is pumped back and preheated in the slop tanks, then sprayed back via high pressure nozzles in thg cargo tanks onto the walls of the tank.", "id": 630}, {"category": "선박적화!", "question": "5. 컨테이너선의 Cargo Gear 종류를 말하시오.", "answer": "*Container의 Lashing에 사용되는 각종 장비를 Lashing Gear 혹은 Fitting이라 하며, 선체에 고정되어 있는 Fixed Gear와 이동 사용이 가능한 Loose Gear로 나누어진다.", "id": 631}, {"category": "선박적화!", "question": "1. Fixed Gear", "answer": "1) Soket (Foundation Stool)\n갑판적 Container용으로 Hatch Cover 등에 고정되어 있으며, Twist Lock을 꽂아서 Container를 Securing 시키게\n되어 있으며 Single Type과 Double Type의 두 가지가 있다.\n2) Eye Plate\nHatch Cover 등에 고정하여 Turnbuckle을 연결시키게 되며, Eye가 1개인 것과 2개, 3개, 4개 및 5개인 것도 있다.", "id": 632}, {"category": "선박적화!", "question": "2. Loose Gear", "answer": "1) Manual Twist Lock\nHatch Cover 상단 1단에 실린 Container를 갑판에 고정하는 Twist Lock. 핸들을 수동으로 돌려 체결을 한다.\n2) Mid Lock\n종방향으로 2개의 20FT Container 사이에 공간이 없어 Lashing Bar를 체결할 수 없을 때 사용하는 Twist Lock의 한 종류\n3) Semi-Auto Twist lock\n통상 2단 이상의 적재시 Container의 상하단 Lashing시 사용. Container 선적 순간 충격으로 반자동 채결이 가능\n하여 직접 채결장치를 Close 시키지 않아도 채결이 가능한 특징이 있으며, 미작동 시 수동으로도 채결\nClose/Open 가능함.\n4) Lashing Rod & Turnbuckle\nContainer를 갑판에 고정하기 위해 사용하는 Tool\n5) Hanging Stacker\nHold에 Container 선적 시 사용하는 Lock 이며 갑판에 사용하는 Container 선적 전 야드에서 간편히 끼워서\n채결시킨 후 선적하며, Twist Lock과 달리 2단의 수직 Container의 중,하단의 Container는 채결되지 않지만 Hold 내 선적이므로 문제되지 않는다.", "id": 633}, {"category": "선박적화!", "question": "6. 탱크 내부에 베이퍼가 왜 생기고 베이퍼조절은 어떻게 하는지 말하시오.", "answer": "(증발 현상 발생 원인)\n액체 표면의 분자 중에서 분자간의 인력을 극복할 수 있을 만큼 에너지가 높은 입자들이 분자간의 인력을 끊고 기체상으로 튀어나와 기화됨. 또한, 액체 내부로부터 기포가 발생하면서 생기는 기화 현상인 ‘끓음’은 끓는점에서 일어나기 시작하지만 증발은 끓는점보다 낮은 온도에서도 일어난다.\n원유(crude oil)는 많은 양의 VOCs 배출가스를 발생시킨다. 그러한 배출가스는 적하 중, 원유세정(crude oil washing) 및 가스프리(Gas free) 중에 발생하게 된다. 최초 배출가스는 에탄, 프로판 그리고 부탄이며 MARPOL\n부속서 VI에서는 메탄계열이 아닌 VOCs의 규정을 정하고 있다. 이러한 배출가스는 지구 환경에 위해를 준다.\n선박내에서 발생하는 VOCs를 대기 중으로 방출하지 않기 위하여 선박에서는 육상으로 이를 보내기 위한 관장치 및 제어장치가 필요하게 된다. 근본적으로 이 증기수집 장치는 화물탱크를 보호하며 대기 중으로 VOCs가 방출\n되지 않도록 관장치와 산소농도계측 감시장치, 압력감시장치가 필요하게 되며, 터미널에서는 이를 수집, 처리하고 제어하는 통합적인 설비가 필요하게 된다.", "id": 634}, {"category": "선박적화!", "question": "7. Stowage Factor 란", "answer": "선창안에 화물을 실었을 때, 화물 1톤이 차지하는 선창 용적을 ft3단위로 표시한 수치\n선창에 실을 수 있는 화물량은 화물의 중량 및 모양, 즉 적화계수에 따라서 달라진다. 각각의 화물은 고유한\n적화계수를 가지지만, 같은 화물이라도 싣는 방법과 장소에 따라 적화계수가 달라진다. 즉, 화물을 가지런히\n잘 실으면 적화계수가 작아진다.\n일반적으로 적화계획에 사용되는 적화계수는 화물틈을 포함하는 경우로, 중량 1톤의 화물이 화물틈을 포함하여 선창을 차지하는 용적(ft3)을 나타내는 것으로 다음 식에 의해서 구한다.\n적화계수(S/F)=사용한 선창 구획의 총 베일 용적(ft3)/구획안에 만재한 화물의 중량(Long Ton)", "id": 635}, {"category": "선박적화!", "question": "1. Dead Slow Ahead", "answer": "Dead Slow Ahead에서 Dead란 completely; absolutely를 뜻하는 것으로, 가능한한 천천히 전진하는 것을 말합니다.", "id": 636}, {"category": "선박적화!", "question": "2. Deadweight Tonnage", "answer": "재화중량톤수는 만재배수톤수에서 경화배수톤수를 제외한 톤수, 즉 선박이 적재할 수 있는 화물의 최대 중량을 의미합니다. 과거에 규정이 없었을 때 무리하게 화물을 적재하여 사고가 발생하기도 하여 Deadweight Tonnage라고 부르게 되었습니다.", "id": 637}, {"category": "선박적화!", "question": "3. Dead Reckoning", "answer": "Dead Reckoning 에서 Dead란 바람(Wind)과 해조류(Current)가 없는 상태의 바다 즉 외력(外力)이 선박의 항해에 영향을 미치지 않는 상태를 가정(假定)하는 용어이며 이를 바탕으로 수학적 계산을 통하여 선박의 예정(豫定)위치를 결정(決定)하는 계산법(計算法)을 의미한다. De·duced Reckoning으로 부르던 것을 줄여서 Dead가 되었다는 설도 있다.", "id": 638}, {"category": "선박적화!", "question": "9. 톤의 종류 4가지를 설명하시오 ( long ton, metric ton 등 4가지 설명 및 롱톤을 메트릭톤으로 환산)", "answer": "1. Metric Ton: 국제단위(SI System)로 측정된 무게 1000kg 2. Long Ton: 영국단위로 측정된 무게 2240lb = 1016kg 3. Short Ton: 미국단위로 측정된 무게 : 2000lb = 907kg\n4. Displacement Ton: 국제단위로 측정된 선박의 배수량(1ton = 1000kg) 5. Register Ton: 선박의 등록시 사용되는 선박 내부 용적(1ton = 100cbft = 2.83cbm)\n1. 국제총톤수: 국제항해에 종사하는 선박 2. 총톤수: 일반적인 선박의 크기 3. 순톤수: 여객이나 화물의 운송에 사용되는 공간의 크기", "id": 639}, {"category": "선박적화!", "question": "1. 중량 톤수 (Weight Tonnage)", "answer": "중량, 즉 무게를 기준으로 한 톤수로서 배수량을 사용하며 아래와 같다.\n1)만재배수량 또는 만재배수톤수(Full Load Displacement)\n선체가 물에 잠긴 부분의 부피와 같은 부피의 물의 중량(즉, 부력)은 선체중량과 같다’는 Archimedes 원리에 의해서 선체중량을 측정하여 톤으로 표시한 것을 배수톤수라 하며, 화물, 연료, 청수, 식량 등을 적재하여 하기만재흘수선(Summer Load Draft)으로 떠 있는 상태에서의 배수중량을 만재배수톤수 또는 만재배수량(Full Load Displacement) 이라고 한다\n2)경하배수량 또는 경하배수톤수(Lightship Displacement 또는 Lightship Weight, LWT) 법정 Spare part, Main 엔진 Starting 을 위한 각종 기기, 파이프, 탱크 내에 들어있는 최소한의 기름과 물도 경하배수량에 포함되며, 화물, 연료, 승무원과 소지품, 청수, 식량 등은 포함되지 않은 상태를 말한다.\n3)재화중량(Deadweight, DWT)\n선박에 적재할 수 있는 최대의 화물의 무게를 말하며, 만재 배수톤수에서 경하배수톤수를 뺀 것이다. 여기에는 유료화물(Payload)뿐 아니라 연료, 청수, 승무원과 소지품, 식량 등 법으로 정해지지 않은 예비품 등의 중량이 재화중량에 포함된다. 재화중량은 선박의 적재능력을 나타내기에 가장 적절한 톤수이기 때문에 선박의 건조 계약에서부터 선박의 매매, 용선에 이르기 까지 거의 모든 상거래에서 쓰이고 있다.", "id": 640}, {"category": "선박적화!", "question": "2. 용적톤수", "answer": "용적을 기준으로 나타내는 톤수 IMO 에서 정한 선박톤수측정 방법에 의해서 구함.\n1)총톤수(Gross Tonnage, GT)\n용적을 기준으로 한 톤수로서 상갑판 하부 및 상부의 모든 폐위장소(Enclosed Space)의 합계 용적에 일정한 계수를 곱하여 결정된다.\n2)순톤수 (NT, Net Tonnage) 직접 영업행위에 사용되는 화물을 적재하는 공간의 용적 및 여객의 수에 계수를 곱하여 구한다.\n3)표준화물선환산톤수(Compensated Gross Tonnage, CGT)", "id": 641}, {"category": "선박적화!", "question": "11. 광탄선 관련 trimming이 무엇인지 어떻게 하는지 말하시오.", "answer": "1. Loading sequence에 의거 Loading을 한 후 총 선적 예정량에서 trimming에 필요한 화물량(약 1000톤 정도,\n선형마다 조금씩 다름)을 남겨 두고 적재 작업을 중지한다.\n2. 광탄선의 경우 약 4000~5000톤 잔량시 1차 trimming을 한 후 약 1000톤 정도의 잔량으로 final loading을\n한다.", "id": 642}, {"category": "선박적화!", "question": "3. Draft Survey를 하여 남은 balance cargo를 계산하여 그 cargo로써 원하는 흘수를 맞추기 위한 trimming을", "answer": "행한다.\n4. 이 경우 각 trimming hold(주로 trimming moment가 큰 두개의 hold)에 balance cargo를 분배하여 원하는\n출항 draft를 만든다.", "id": 643}, {"category": "선박적화!", "question": "5. Balance cargo 분배 계산", "answer": "- trim(현상태에서 원하는 변화량)=(w1 x d1)/MTC + (w2 x d2)/MTC\n- w1 & w2: trimming에 분배되는 화물량\nw1이 (x)이면 w2는 (balance cargo – x)이다\n- MTC: 그 당시의 흘수값으로 Hydrostatic table에서 찾은 값", "id": 644}, {"category": "선박적화!", "question": "1. Stevedore측과 긴밀한 협조를 하여 출항 시 본선이 upright될 수 있도록 하여야 하며 적정의 trimming cargo를 가지고 안전한 본선의 출항 condition을 확보할 수 있도록 하여야 하고, 자주 draft survey를 실시하여", "answer":
