 "balance를 확인한다.\n2. Loading이 거의 끝나갈 무렵에는 이,삼항사를 동원하여 계속 draft를 체크하여 overdraft의 방지 및 적정한 출항 trim, heeling 등을 조정하여야 한다.\n3. 특히 trimming 1~2시간 전에는 midship draft를 자주 확인하여 정확한 trimming 시점을 알고 있어야 한다.\n간혹 weight scale의 오차로 인하여 trimming하는 시점에 이미 화물이 모두 적재되어 버리는 경우가 있으므로 주의하여 draft를 관찰하여야 한다.\n4. Trimming cargo는 loading 시작 전 foreman에게 육상 weight scale의 오차량을 반드시 문의하여 오차가 크면Trimming cargo를 많이 하여 조절하도록 한다. 만일 initial draft survey를 할 경우 surveyor는 그 부두의 사정을 잘 알고 있으므로 문의하면 본선에 적합한Trimming cargo양을 권고해 준다.\n5. 대용량 conveyor의 경우 일항사의 적재중지 신호 후에도 belt상의 화물은 계속 선적되어 over draft가 될 수\n있으므로 belt상의 화물 잔량을 문의, 그것을 고려하여 선적하도록 한다.", "id": 645}, {"category": "선박적화!", "question": "6. Trim/Heeling/Draft 조절을 위한 마지막 balance cargo량 측정을 shore측에 일임하지 말 것. 즉 shore량과 본선량과는 상당한 차이가 나서 balance cargo로는 trim/heeling의 조절이 불가능하게 되는 수가 있으므로", "answer": "balance cargo조절은 본선 midship draft를 기준으로 하여야 한다. Grain Loading 시 계획한 trim을 구할 때 기본 data차이 관계로 계산과 실제는 차이가 날 수 있으므로 마지막 2 hold 적재는Trimming moment가 큰 slack hold를 택하는 것이 좋다.", "id": 646}, {"category": "선박적화!", "question": "Trimming 해치가 무엇인지 말하시오.", "answer": "산적화물을 창내 구석까지 고르게 싣기 위하여 갑판상의 구석에 설치한 해치", "id": 647}, {"category": "선박적화!", "question": "12. 석탄선 통풍의 이유와 방법을 말하시오.", "answer": "석탄을 운송하는 경우, 통풍 및 환기는 온도상승의 억제 및 gas 배출을 목적으로 하지만, 공기의 공급에 의한 산화작용을 초래할 수 있으니 주의가 필요하다. 일반적으로 석탄의 운송중에는 자연통풍을 유지, gas를 배출하며\n표면 통풍만을 시행하여 탄층내에는 산소공급이 이루어지지 않도록 한다. 화물창에 인접한 독립된 공간에도 gas가 누적되고 있지 않은지 주기적으로 확인하고 필요시 환기시켜야 한다.", "id": 648}, {"category": "선박적화!", "question": "1. 예를 들어 석탄을 운송하는 경우, 통풍 및 환기는 온도상승의 억제 및 gas 배출을 목적으로 하지만, 공기의 공급에 의한 산화작용을 초래할 수 있으니 주의가 필요하다. 일반적으로 석탄의 운송중에는 자연통풍을 유지, gas를 배출하며 표면 통풍만을 시행하여 탄층내에는 산소공급이 이루어지지 않도록 한다. 화물창에 인접한 독립된 공간에도 gas가 누적되고 있지 않은지 주기적으로 확인하고 필요시 환기시켜야 한다.", "answer": "곡물화물을 운송하는 경우에는 화물창 내보다 고온다습한 공기가 유입되는 경우 오히려 역효과가 생기므로 통풍을 실시하지 않는 것이 좋다. 화물의 wet damage를 피하기 위하여 화물의 특성과 점검결과에 따라 통풍이 결정되어야 한다.\n2. 상대습도: 현재 대기 중에 있는 수증기의 양과 그 온도에서의 포화 수증기의 양과의 비", "id": 649}, {"category": "선박적화!", "question": "3. 이슬점(노점: dew point temperature)", "answer": "습한공기가 어느 일정 압력에서 수분의 증감없이 냉각되었을 때, 수증기가 응축하기 시작하여 이슬이 맺히는 온도이다. 즉, 공기선도에서 수증기 분압 압력 온도 곡선의 100% 부분의 커브를 일컫는다.", "id": 650}, {"category": "선박적화!", "question": "절대 습도가 무엇인지 설명하시오.", "answer": "절대습도: 1m3 의 공기 속에 함유되는 수증기의 질량을 g수로 나타낸 것", "id": 651}, {"category": "선박적화!", "question": "이슬점을 찾는 방법을 설명하시오.", "answer": "포화되지 않은 공기를 냉각시켜 포화 수증기량 곡선과 만날 때 온도를 읽는다.\nP점의 이슬점을 구하면 20도까지 냉각시켜야 포화 수증기량 곡선을 만나기 때문에 P점의 이슬점은 20도이다.", "id": 652}, {"category": "선박적화!", "question": "1. 담수 구역에서 해수 구역으로 갈 경우", "answer": "2. 만재흘수선의 대역, 구간 계절기간이 바뀌는 경우, 예) 선적항이 summer zone이고, 예정항로 도중에 winter zone을 거치는 경우 선적항에서 winter zone에 도착할 때까지 연료, 청수 등의 소모량을 더 선적할 수 있다.", "id": 653}, {"category": "선박적화!", "question": "15. 출항시 흘수가 선수, 선미, 좌우현 다 다른데 그때 과적인지 어떻게 아는지 말하시오.", "answer": "선체 중앙부 만재흘수선을 기준으로 과적 여부 판단한다.", "id": 654}, {"category": "선박적화!", "question": "1. 비중 수정", "answer": "1) 매 CM 배수톤(TPC): 화물 w톤을 적재하여 흘수가 1CM 증가할 때 그 화물의 무게를 Tcm이라고 한다.\nTcm=Aw(수선면적) / 100 * 1.025(Ton)\n2) 비중변화에 따른 흘수 변화: 일정한 배수량의 선박이 해수의 비중이 다른 곳에 가면 흘수에 변화가 생긴다.\n해수비중 p1인 곳에서 p2인 곳으로 들어갔을 경우 흘수량의 변화(k)\nk = draft / TPC (1.025/p2 – 1.025/p1)", "id": 655}, {"category": "선박적화!", "question": "17. 위험물 선적 시 본선 조치사항을 말하시오.", "answer": "1. 위험물 수납을 위한 용기포장은 미국의 CFR 및 IMO 규정에 의거하여 시행되어야 하며 수납시 손상, 누출이 발생된 용기포장에의 수납을 금지하고 소량의 위험물 선적시는 필히 door측 부근에 적부하여야 한다.", "id": 656}, {"category": "선박적화!", "question": "2. 표시 및 표찰", "answer": "컨테이너에 위험물을 수납하였을 경우에는 반드시 위험물의 품명표시를 컨테이너 사방 주위에 부착하여야 하고 이는 IMDG Code에서 정한 Size(각 변의 최소 길이 250mm 이상) 및 구분에 따라 시행되어야 한다. 또한, 해당\n위험물 반출 후에는 잔유물 제거를 시행하고 표찰을 즉시 제거하여야 한다.", "id": 657}, {"category": "선박적화!", "question": "3. CLP (Container Loading Plan)", "answer": "위험물을 컨테이너에 수납하여 운송할 경우에 Shipper는 각 컨테이너 마다 CLP를 작성하여 제출하여야 한다.\n1) 컨테이너 번호\n2) Shipper, Consignee의 성명 및 주소\n3) 위험물의 분류항목, 품목 및 용기포장의 명칭\n4) 위험물의 개수, 용적 및 중량", "id": 658}, {"category": "선박적화!", "question": "3. 그 밖의 하역장치: 제한하중", "answer": "4. 하역장치에 처음으로 사용되는 하역장구와 용접 등에 의하여 수리를 한 하역장구: 제한하중", "id": 659}, {"category": "선박적화!", "question": "20. 하역설비의 검사 기준과 각 설비를 예를 들어 설명하시오.", "answer": "항만법 및 항만시설장비관리규칙에 따라 하역설비를 검사한다.", "id": 660}, {"category": "선박적화!", "question": "1. 와이어로프 장치", "answer": "마모상태, 윤활상태, 끝단부상태(확실히 고정되고 이완이 없을 것), 외관 상태(킹크, 변형, 부식 및 손상이 없을 것)", "id": 661}, {"category": "선박적화!", "question": "2. 호이스팅 장치", "answer": "상한 속도제어 및 정지작동, 하중측정장치 및 과부하방지장치, 비상정지 장치, 스프레더 및 헤드블록장치는\n구조물에 변형, 균열 및 부식이 없고 각종 리미트스위치의 시험작동이 양호하여야 한다.", "id": 662}, {"category": "선박적화!", "question": "3. 컨베이어 장치", "answer": "풀리의 균열, 번형 및 마모가 없고 벨트의 손상, 사행, 슬립 및 간섭이 없으며 벨트 클리닝 상태가 양호할 것.\n롤러의 손상이 없을 것.", "id": 663}, {"category": "선박적화!", "question": "23. 불명하중을 계산하는 방법에 대해 설명하시오.", "answer": "선박에서 하나하나 그 중량을 계측하기 어려운 물건들의 추정 중량을 말하며, 선박의 크기나 선령에 따라 다르고 일반적으로 선령이 오래될수록 증가한다. 불명 중량은 탱크 내의 잔수 및 빌지수(bilge water), 선저 외판에 부착한 각종 해조류, 신조 후 수리 또는 변경 공사로 인하여 부가된 페인트, 시멘트, 철재 및 각종 설비, 기타 측정할 수 없는 불명 중량을 포함한다. 예정 적재량을 명확히 하기 위해서 불명중량을 명확하게 파악하도록 한다.\n*측정방법\nDraft, Density, Bunker, FW, BW 측정 후 배수량을 계산한 후, 배수량에서 Bunker, FW, BW 를 뺀 값이 불명중량이다. Dry Dock시 화물이 없는 상태에서 Floating된 Draft값을 가지고 계산한 Displacement에서 탱크 Data 등 초기 Light Ship Data보다 더 많이 가지고 있는 청수, 벙커 등의 무게를 제한 무게에서 조선소에서 제공되는 경하배수량을 빼서 구한다.", "id": 664}, {"category": "선박적화!", "question": "25. 과적의 판단 기준과 법적인 근거는 어디에 표기되어 있는지 쓰시오.", "answer": "Q/M으로 해수 기준이며 법적인 근거는 국제만재흘수선 협약에 표기되어 있다.", "id": 665}, {"category": "선박적화!", "question": "26. 잠열에 대해 설명하시오.", "answer": "어떤 물질의 온도를 변화시키지 않고 물질의 상태만을 변화시키는 열로 융해열, 증발열, 승화열이 있다.", "id": 666}, {"category": "선박적화!", "question": "27. HOG/SAG Correction 방법을 설명하시오.", "answer": "화물 선적 후의 예상 Sagging correction 양을 공제하여야 한다.\nTanker선 또는 광석전용선 등과 같이 길이가 긴 선박은 공선시와 만재시에 Hogging이나 Sagging이 10cm이상이 된다. 일반화물선도 적화 하중배치가 선수미 또는 중앙에 집중하면 상당한 bending이 생기게 된다. 이러한 경우에는 평균흘수의 배수량에 다음의 수정을 행하여야 한다.\n통상적으로 bulk선은 cargo가 만재된 상태에서는 sagging condition이 된다. 만재흘수선 혹은 제한된 draft의 항구에 입항시 sagging치를 고려하지 않고 적재한 경우에는 over draft를 초래할 있다.\n*계산 예시: 1/4 * TPC * est. Sagging = 1/4 * 43.4 * 6 = -65mt", "id": 667}, {"category": "선박적화!", "question": "28. Broken Space 란 무엇인가", "answer": "- 선창내에 화물을 만재하였을 때, 화물이 차지하는 용적 이외의 용적을 말하며,\n- Broken space(%) = (Vb-Vc)/Vb *100 (Vb=Bale capacity, Vc=화물이 차지하는 선창용적)으로 표시하고,\n1) 화물 상호간의 간격\n2) 화물과 선창내의 구조물과의 간격\n3) 통풍, 환기 및 여적으로서의 공간\n4) Dunnage, Shifting board 등이 차지하는 용적등이 포함된다.\n- Broken Space는 적화구획, 적화방법, 화물의 종류 및 포장의 형상에 따라 상당한 차이가 있고 잡화는 평균 15% 정도이다.", "id": 668}, {"category": "선박적화!", "question": "31. DRAFT SURVEY", "answer": "Draft Survey(흘수검정)는 “선박의 배수량(Displacement) 변화”로 적재/양하한 화물 중량을 역산하는 방법입니다. 아래는 현장에서 그대로 따라 할 수 있게 절차 + 계산식 + 체크포인트로 정리했습니다.\n1) 준비물과 전제\n준비물\n선박의 Hydrostatic table(흘수–배수량/TCF/MCT 등)\nSounding/Ullage table(각 탱크 용적표) + 보정(Trim/Heel correction) 표\n화물/연료/밸러스트의 밀도(Density)(가능하면 샘플링/온도 보정 포함)\n항만의 해수비중(Density of seawater) 측정(보통 hydrometer)\n핵심 전제\nDraft Survey는 두 시점(A: 적재 전/양하 전, B: 적재 후/양하 후)의\n배수량 변화(Displacement change)\n그 사이 발생한 탱크/소모품 변화(연료, 밸러스트, FW 등)\n를 모두 반영해서 “화물만의 변화량”을 뽑습니다.\n2) 전체 계산 구조(한 줄)\nCargo weight = (Disp_B − Disp_A) − (Other weights change)\n여기서 “Other weights”는 연료/밸러스트/FW/윤활유/슬롭/프로비전 등 화물이 아닌 모든 변동분입니다.\n3) 현장 절차(Step-by-step)\nStep 1) 흘수(Draft) 측정\n6점 흘수 측정:\nFwd, Mid, Aft 를 Port/Starboard로 읽어 평균\n가능한 조용한 시점, 파랑/스웰 최소화, 밧줄 장력 안정 시점\n보정 사항\nDraft mark 읽기 오차(시차/파고)\n목재 변형/페인트 두께 등은 보통 무시하되, 선박 기준이 있으면 따름\nHeel(경사) 있으면 P/S 평균으로 처리 + 필요 시 heel correction 적용\nMean draft / Trim 계산\nTrim = Aft draft − Fwd draft\nMean draft는 회사/선급/선박 절차에 따라 다르지만 보통\nMean = (Fwd + Mid + Aft)/3 또는\nHydrostatic이 Mean of F/A 기준이면 Mean = (Fwd + Aft)/2\n중요한 건: 선박 Hydrostatic table이 어떤 draft 기준인지(Mean of F/A vs Mean of 6 readings vs Midship draft 등) 그 기준에 맞춰야 합니다.\nStep 2) 해수비중(ρsw) 측정 및 배수량(Displacement) 산출\n항만에서 해수 샘플 채수 → 온도 측정 → hydrometer로 density 확인\n(예: 1.025 t/m³ 같은 형태)\nHydrostatic table에서 해당 draft의 Displacement(보통 salt water 1.025 기준)를 찾습니다.\n해수비중이 표준(1.025)과 다르면 Density correction을 적용합니다.\n실무에서는 보통 hydrostatic에 제공되는 방법/회사 서식을 그대로 씁니다.\nStep 3) Trim 보정(Trim correction)\nTrim이 있으면 Hydrostatic은 보통 “무트림” 기준이므로 보정합니다.\n대표적으로 쓰는 흐름(선박별 표/계수 있음):\nTPC/TCF: 1cm 흘수 변화에 필요한 톤수, Trim 보정용 계수\nMCT 1cm: 1cm trim 만들기 위한 모멘트\n선박마다 “Trim correction table”이 따로 있어 그걸 쓰는 게 가장 안전합니다.\n(시험은 개념만, 현장은 선박 표를 그대로 적용)\nStep 4) 탱크 조사(Sounding/Ullage) → 탱크 중량 계산\nA 시점과 B 시점 각각 다음을 전부 측정합니다.\nFO(연료유), DO/MGO, LO(윤활유)\nFW(청수)\nBallast tanks\nSlop/Residue(슬롭, 드레인, 폐유)\n기타 store/consumables(가능한 범위)\n각 탱크마다:\nSounding/Ullage 측정\nTrim/Heel correction 적용(표 있으면 적용)\n탱크 테이블로 Volume(m³) 산출\nWeight = Volume × Density (온도 보정/ API 적용은 선박 절차에 따라)\nStep 5) 최종 Cargo 중량 산출\n시점 A(전) / 시점 B(후)로 나눠 정리합니다.\nDisp_change = Disp_B − Disp_A\n“화물 외 변화” 합산:\nΔFO, ΔDO, ΔLO, ΔFW, ΔBallast, ΔSlop … (B − A)\n화물 중량:\n양하(Discharge)라면: 화물 감소량이 양수로 나오게 부호를 통일\n적재(Load)라면: 화물 증가량이 양수로 나오게 부호를 통일\n실무적으로는 이런 형태로 표를 만듭니다:\nDisp change\nLess/Add: bunkers change\nLess/Add: ballast change\nLess/Add: FW change\nLess/Add: slops change\nResult = cargo loaded/discharged\n4) 가장 흔한 실수 TOP 7 (여기서 사고 많이 납니다)\nHydrostatic이 어떤 기준 draft인지 착각(Mean of F/A vs Mean of 3 vs Midship)\nTrim correction 누락 또는 표 잘못 적용\nSeawater density 측정 오류(온도 미반영, 샘플 위치 불량)\n탱크 density를 “추정”으로 넣음(특히 ballast, FW는 큰 오차)\nSounding/Ullage trim/heel correction 누락\n양하 중 ballasting/deballasting, bunkering 등 이벤트를 기록 안 함\n“A와 B 사이”에 발생한 stores/consumables 변화를 완전히 무시(큰 선박은 무시해도 되는 경우도 있지만, 분쟁 때 약점)\nDraft Survey 예시: “적재(Loading)”로 1회 계산\n0) 상황\nA 시점(적재 전)과 B 시점(적재 후)에 Draft survey를 해서 적재된 화물 중량을 구한다.\n항만 해수 밀도 측정: ρ = 1.020 t/m³\nHydrostatic table은 표준 해수(1.025 t/m³) 기준으로 작성되어 있다고 가정.\n1) Draft 측정(예시)\n(파도 거의 없는 상태에서 6점 읽고 평균)\nA 시점 Draft (m)\nFwd: P 10.10 / S 10.12 → 10.11\nMid: P 10.22 / S 10.24 → 10.23\nAft: P 10.26 / S 10.28 → 10.27\nMean Draft(간단 평균): (10.11+10.23+10.27)/3 = 10.203 ≈ 10.20 m\nB 시점 Draft (m)\nFwd: P 10.92 / S 10.94 → 10.93\nMid: P 11.02 / S 11.04 → 11.03\nAft: P 11.04 / S 11.06 → 11.05\nMean Draft: (10.93+11.03+11.05)/3 = 11.003 ≈ 11.00 m\n현실에서는 Trim correction(TCF/MCT 등)도 적용합니다. 예시는 이해를 위해 “Trim이 작다” 가정으로 생략합니다.\n2) Hydrostatic에서 배수량(Displacement) 읽기\n(표준 밀도 1.025 기준으로 표에서 읽었다고 가정)\nA 시점(Mean 10.20 m)에서: Disp_table(A) = 52,590 t\nB 시점(Mean 11.00 m)에서: Disp_table(B) = 59,290 t\n3) 실제 해수 밀도(1.020)로 Density correction\n표가 1.025 기준이면 보통 아래처럼 보정(선박 절차서가 있으면 그걸 우선)\nA: 52,590 × (1.020/1.025) = 52,333.46 t\nB: 59,290 × (1.020/1.025) = 59,000.78 t\n따라서 배수량 변화:\nΔDisp = 59,000.78 − 52,333.46 = 6,667.32 t\n4) “화물 외” 중량 변화(탱크/소모품 변화)\nA→B 사이에 바뀐 것들을 전부 더합니다. (B − A)\n예시로 탱크 조사 결과가 다음과 같았다고 합시다(단위 t).\n(1) 소모/감소(음수)\nFO(연료유) −120 t (사용)\nDO(MGO) −30 t\nFW(청수) −20 t\n(2) 증가(양수)\nBallast +500 t (안정성 위해 밸러스트 증가)\nSlop/Residue +40 t\n합계(화물 외 변화):\nΔother = (-120) + (-30) + (-20) + 500 + 40 = +370t\n5) 최종: 적재 화물 중량 계산\nCargo Loaded = ΔDisp - ΔOther\nCargo = 6,667.32 − 370 = 6,297.32 t\n✅ 적재된 화물 ≈ 6,297 t (약 6,300톤)", "id": 669}, {"category": "선박적화!", "question": "31. Trim에 의한 배수량의 수정", "answer": "1) 제 1 수정\n- 선박의 배수량 등곡선도는 보통 계획 Trim(Initial Trim)과 평행한 Draft에 대한 배수량을 곡선으로 그려 놓았다. 그런데 일반상선의 Initial Trim상태가 바로 Even keel 상태이므로, 이 계획 Trim 이외의 Trim으로 있을 때의 배수량은 부면심이 선체 중앙에 있지 아니할 경우에는 단순히 선수미 흘수의 평균치, 즉, Mean draft로서 구한 배수량은 오차가 있다. 따라서 Trim에 의한 배수량의 수정이 필요하다.\n- 공식: (trim * TPC * LCF * 100)/LBP\n2) 제 2 수정\nTrim이 큰 경우에는 수선면적의 변화로 인하여 부면심이 이동하기 때문에 제 1수정으로 만으로는 Trim에 의한 수정량이 정확하게 산출되지 않는다. 제 2수정은 Trim 때문에 일어나는 수선면적의 모양변화로 인한 배수량의 변화량을 수정하는 것이다.\n- 공식: (trim * trim * 50 * dMTC)/LBP", "id": 670}, {"category": "선박적화!", "question": "32. API 비중 및 공식", "answer": "- 미국석유협회(American Petroleum Institute)가 석유의 비중을 나타내기 위해 1952년 제정한 비중표시법이다.\n- 석유의 비중을 물과 비교해 나타낸 것이다. API 비중이 10도인 경우 물과 같은 비중을 가지고, 10도보다 크면 물보다 가벼워 물 위에 뜨며, 10도보다 작으면 물보다 무거워 가라앉는다. 석유계 액체가 섞여 있는 경우, 더 큰 API 비중을 가진 액체가 밀도가 작으므로 위로 뜬다. API 비중은 단위가 없지만 °API(API도)로 나타내며, 액체비중계(hydrometer) 등으로 잴 수 있다.\n- API도가 높고, 황의 비율이 적을수록 고급유종이다.\n- API도 = (141.5/원유의 비중) - 131.5\n원유의 비중 = 원유의 밀도 / 물의 밀도", "id": 671}, {"category": "선박적화!", "question": "33. High Cube Container란", "answer": "보통 ISO규격 컨테이너의 높이가 8피트 6인치 인데 그보다 높이가 1피트 높은 9피트 6인치 짜리인 컨테이너를 말한다. 보통 20'형 보다는 40'형의 컨테이너에 High Cube형이 많으며 별명으로 Jumbo Container라고 부르기도 한다.", "id": 672}, {"category": "선박적화!", "question": "1. 석탄의 종류", "answer": "1) 이탄\n시간이 오래되지 않아 완전히 탄화되지 못한 석탄 종류의 하나이다. 부분적으로 분해된 식물의 집적체로 석탄이 만들어지는 첫번째 단계에서 만들어지며, 육안으로도 식물질의 구조를 확인할 수 있다. 연료로 사용은 가능하나, 열량이 낮아 연탄의 원료로 사용되며, 전체 화학성분 중 탄소성분은 70%이하, 수분은 20~30%가 함유되어 있다.\n2) 갈탄\n이탄이 더욱 탄화된 것으로 가정이나 기타 연료로 사용되는 가장 질이 낮은 석탄이다. 유연탄에 비해 탄화도가 낮으며 때때로 수분함량이 66%가 넘어갈 정도로 많은 수분을 함유하고 있으며, 재(회분)의 성분도 높다. 또한 점결성이 없으며, 대기 중에 노출되면 수분이 증발되어 작은 조각으로 파쇄된다.\n3) 아역청탄\n흑갈탄이라고도 하며, 갈탄과 유연탄 사이의 중간등급에 해당하는 적갈색 또는 흑색 석탄을 말한다. 갈탄보다는 훨씬 단단하며 비교적 낮은 발열량을 갖고 있지만, 황 함량은 매우 낮아 때로는 1% 이하이다. 따라서 미국내에서는 석탄을 연료로 하는 발전소 중에서 유연탄을 아역청탄 및 낮은 황 함량을 갖는 갈탄으로 대체하는 경우가 증가하고 있는 추세이다.\n4) 역청탄\n유연탄이라고도 한다. 무연탄에 대응되는 석탄의 분류 명칭으로 휘발성 물질의 함유량이 많으면 유연탄, 적으면 무연탄으로 구분하고, 유연탄은 연소 시 화염과 유색의 노란 연기를 발생시킨다. 즉 휘발성 물질의 함량이 14%이하이면 무연탄으로 명명하고, 14%를 초과하면 유연탄으로 구분한다. 유연탄은 5,833kcal/kg의 발열량을 가지며, 화력발전용으로 사용되나 국내에서는 생산이 되지 않아 전량 수입하고 있다. 유연탄과 관련된 주요한 환경문제는 대기 오염이다. 황 함유량이 중간 정도 또는 많은 유연탄은 연소되어 공기 중에서 이산화황을 방출하고 공기 중의 수분이 이산화황과 반응하여 황산이 되며, 이것이 물방울과 섞여서 산성비가 되어 농작물에 피해를 주고 수질오염을 일으킨다. 따라서 최근에는 석탄을 사용하는 발전소는 황이 덜 포함된 아역청탄을 사용한다.\n5) 무연탄\n식물의 석탄화 작용이 가장 오래 진행된 고체 화석 연료로 흑색의 금속광택이나는 단단한 석탄이다. 즉 유연탄보다 탄화도가 더욱 진행된 석탄으로, 휘발분이 3~7%로 적고, 고정탄소의 함량이 85~95%로 높다. 무연탄은 연소 시에 불꽃의 길이가 짧고 유기물 성분의 휘발분 함량이 많지 않기 때문에 연소 초기의 낮은 온도에서는 유색의 연기가 보이지 않는다. 또한 유황분 함량이 적고 연소 속도가 느려 주로 난방용으로 사용되고 있다. 그러나 일산화탄소 가스 발생으로 연탄가스 중독 사고의 원인이 되어, 난방용으로는 사용량이 감소하였다.\n*참고", "id": 673}, {"category": "선박적화!", "question": "1. 탄분 (炭分)의 정도에 따른 분류", "answer": "Classification by its Carbonization", "id": 674}, {"category": "선박적화!", "question": "1.1. 일반탄 : Soft Coal", "answer": "1) 니탄 (Peat) : 다량의 수분을 함유하므로 자연발화가 어렵다.\n1) Peat: It has a possibility of spontaneous combustion as it contains more moisture.\n2) 갈탄 (Brown Coal): 가루가 되기 쉬우며 자연발화성도 많음.\n2) Brown Coal: It is likely to be in powder form and has much more possibility of spontaneous\ncombustion.\n3) 아탄 (Ignite) : 수분이 많고 (50%) 건조하면 분화 (粉化)하여 자연발화를 일으키기 쉬움.\n3) Ignite: It contain high moisture. When it is dried, it tends to become powder and has much more\npossibility of spontaneous combustion.", "id": 675}, {"category": "선박적화!", "question": "1.2. 연료탄 (Black Coal/Hard Coal 이라고도 한다)", "answer": "1) 역청탄 (Bituminous Coal): 석탄이라고 하면 이것을 말하며 유연탄이라고도 함.\n70~80% 탄소를 함유, 휘발성이 많으며, 건류하면 Coal Tar 생김.\n1) Bituminous Coal: this is the black coal and usually called soft coal. It contains 70~80%\ncarbon, and has high volatility. In case of carbonization, it produces coal tar.\n2) 아역청탄 (Sub-Bituminous): 발전용, Cement 산업용.\n2) Sub-Bituminous: In general, it is used for production of Electric Power and in Cement industry.\n3) 무연탄 (Anthracite) : 괴탄은 가정연료, 가스발생용, 카바이트 연료로 사용.\n분탄은 연탄의 연료, Cokes 원료의 배합탄, 미분탄 연소에 사용\n3) Anthracite: In general, it is used in household, product of Gas and Calcium Carbide fuel.", "id": 676}, {"category": "선박적화!", "question": "2. 알맹이 정도에 따른 분류 (석탄 Coal Dressing에 의한 구별)", "answer": "Classification by its Shape\n1) 괴탄 : 직경 50mm 이상 ; Lump Coal.\n1) Lump Coal: more than dia 50 mm\n2) 중괴 (中槐) : 직경 20-50mm\n2) Mid-Lump Coal: Dia 20mm to 50mm\n3) 분탄 : 15-20mm 이하 ; Dust Coal.\n3) Dust Coal: less than 12mm to 20mm\n4) 절입탄 (Unscreened Coal) : 갱내에서 채탄된 조탄으로서 불순물을 제거한 덩어리 및 가루가 혼입되어\n있는 석탄\n4) Unscreened Coal: A Coal which is mined from the mine shaft and is mixed with lump of coal and powder\nfor removing impurities.\n5) 세소탄 (洗小炭)(Washed Nut Coal) : 분탄 알갱이를 수통에서 체로 거르고 남은 작은 알갱이 형태의\n석탄으로 Cokes의 원료가 된다.\n5) Washed Nut Coal: A Coal which is a kernel of coal, obtained by shifting dust of coal, using a conduit, and\nis made of Coke.\n6) 미분탄 : 수통에서 체로 걸러 떨어진 미세한 석탄.\n6) Powdered [pulverized] Coal: A fine Coal which is left after shifting coal by conduit.", "id": 677}, {"category": "선박적화!", "question": "3. 용도에 의한 분류 (Classification by its Usage)", "answer": "1) 일반용탄 : 연료용탄\n1) General soft coal: Coal for fuel\n2) 원료용탄 : Cokes 용탄, 점결성이 특히 강한 석탄으로 제철용 Cokes 원료에 이용\n2) Raw coal (for coke): Coke Coal. It is utilized as raw material for iron manufacturing owing to its\nspecial coking characteristic.\n3) 발생로용탄 (Gas 발생용탄) : 중괴탄\n3) Gas Coal: Mid-Lump Coal\n4) 무연탄\n4) Anthracite coal", "id": 678}, {"category": "선박적화!", "question": "4. 발열량, 회분에 의한 분류", "answer": "Classifications by its calorific value and carbon particles\n1) 제 1 종 일반탄\n1) Soft Coal\n2) 제 2 종 원료용탄\n2) Black Coal/Hard Coal\n3) 제 3 종 Gas 발생로 용탄\n3) Gas Coal\n4) 제 4 종 무연탄\n4) Anthracite\n5) 제 5 종 선석 (Natural Cokes)\n5) Natural Cokes", "id": 679}, {"category": "선박적화!", "question": "5. 수송목적에 의한 분류(IMO 23차 소위원회, 1983년)", "answer": "Classification by its transport purpose (IMO SUB-COMMITTEE, 24 February 1983 Agenda item 5 (5.5)\n1) Category A: Methane Gas 방출이나 자연발화를 야기시킨 실적이 없는 형태\n1) Category A: Coal cargoes of a type that can be identified as having a history of shipment under similar circumstances without problems arising from methane emission or spontaneous heating\n2) Category B: 위험을 초래할 정도의 Methane Gas를 방출하거나 그 가능성이 있는 형태\n2) Category B: Coal that has shown itself liable, or may be liable, to emit methane in quantities sufficient to create a hazard.\n3) Category C: 자연발화가 용이하거나 그 가능성이 있는 형태\n3) Category C: Coal that has shown itself liable, or may be liable, to spontaneous heating.\n4) Category D: 위험할 정도의 Methane Gas 방출이나 자연발화가 용이하거나 그 가능성이 있는 형태\n4) Category D: Coal that has shown itself liable, or may be liable, to emit methane in quantities sufficient to create a hazard and be subject to spontaneous heating.", "id": 680}, {"category": "해상법!", "question": "30. 화물사고 시 면책이 안되는 범위를 말하시오.", "answer": "1) 감항능력 담보 의무\n선박이 당해 항해에서 보통의 해상위험을 감당할 수 있는 능력을 갖춤에 있어서 선박회사가 상당한 주의를 하지 않는 것은 물론 적절한 주의를 했더라도 이를 입증하지 못한 경우에는 책임을 져야 한다.\n2) 화물에 관한 주의 의무\n선박회사는 화물의 선적, 적부, 보관, 운송, 양륙 등에 있어서 적당하고 신중하게 취급할 의무가 있다. 화물의\n안전운송에 대한 과실은 손해배상책임을 면치 못한다.\n3) 거증책임\n선적화물의 멸실 및 기타의 손해에 대해서 선박회사가 배상책임을 면하려면 선박회사측에서 상당한 주의를\n했으며 과실이 없었음을 입증하는 거증의무가 선박회사 측에 있다.", "id": 681}, {"category": "해상법!", "question": "42.- 헤이그규칙, : 1921 해상물품 운송인의 면책약관 규정", "answer": "-헤이그비스비 : 1968 헤이그규칙을 개정\n-함부르크룰.: 1978 채택, 개발도상국의 이익의 배려가 미약하여 재정비, 하주측의 이익을 배려, 항해과실면책 등 면책 리스트를 폐지\n-젠콘: UNIFORM GENERAL CHARTE 항해용선계약의 경우 사용되는 표준서식, 선주에게 유리.", "id": 682}, {"category": "해상법!", "question": "1. 헤이그비스비 면책요건 5가지", "answer": "헤이그-비스비 규칙 (Hague-Visby Rules)\n▶ Carrier(운송인)의 면책 요건\n헤이그-비스비 규칙에서는\n화물에 손상, 멸실, 지연 등이 발생하였더라도 특정 원인에 의해 발생한 경우 운송인은 책임을 지지 않는다고 규정하고 있습니다.\n이것을\n👉 “Carrier’s Exceptions (면책사유)”\n라고 합니다.\n✅ 면책이 인정되기 위한 전제조건\n운송인은 다음 의무를 다했을 경우에만 면책 주장 가능:\n▶ Article III Rule 1\n운송인은 항해 전 및 항해 개시 시", "id": 683}, {"category": "해상법!", "question": "3.화물창의 적합성 확보", "answer": "즉, 선박이 감항성이 없으면 어떤 면책도 주장 불가\n📌 면책 사유의 종류\n(Article IV Rule 2)\n총 17가지 주요 면책 사유\n① 항해과실 면책\n(Error in navigation or management of the ship)\n•선장의 조선 실수\n•항해사의 항로 판단 오류\n•기관사의 엔진 조작 미숙\n👉 화물관리 과실은 면책 안됨\n👉 선박관리 과실만 면책\n② 화재(Fire)\n단, 운송인의 고의나 과실이 없는 경우에만 면책\n③ 해상고유 위험(Perils of the sea)\n•폭풍\n•파랑\n•해일\n•조류 등\n④ 천재지변(Act of God)\n예: 지진, 태풍, 낙뢰 등\n⑤ 전쟁행위(Act of War)\n⑥ 공적의 행위(Act of public enemies)\n예: 해적\n⑦ 정부의 행위(Restraint of princes)\n•검역\n•입항금지\n•억류\n⑧ 사법적 압류(Arrest or restraint under legal process)\n⑨ 파업(Strikes or lock-outs)\n⑩ 폭동 또는 소요(Riots or civil commotions)\n⑪ 구조행위(Saving or attempting to save life or property at sea)\n⑫ 화물 고유의 성질(Inherent vice)\n예:\n•자연 증발\n•부패\n•산화\n⑬ 포장불량(Insufficiency of packing)\n⑭ 마킹 불량(Insufficiency of marks)\n⑮ 숨겨진 하자(Latent defects)\n→ 통상의 주의로 발견 불가한 결함\n⑯ 송하인의 과실(Act or omission of the shipper)\n⑰ 기타 운송인의 과실이 아닌 사유(Any other cause without fault of the carrier)\n단, 👉 운송인의 과실이 없음을 입증해야 함", "id": 684}, {"category": "해상법!", "question": "3. 헤이그규칙 운송인의 면책조항?", "answer": "헤이그규칙 제4조 2항에는 다음 17가지의 사유를 열거하여 놓고 이러한 사유로 발생한 운송물의 멸실 및 손상에 대해서 운송인 및 선박은 책임이 없음을 분명히 하고 있다. 여기에 따라 각 선박회사의 선하증권에는 이에 근거한 면책조항을 규정해 놓고있다.\n1) 선장, 해원 도선사 그 밖의 선박사용인의 항해 또는 선박의 관리에 관한 과실 또는 주의의무태만\n2) 운송인의 고의 또는 과실에 의하지 않은 화재\n3) 해상, 기타 가항수면에서의 특유의 위험\n4) 불가항력\n5) 전쟁행위\n6) 공적\n7) 공권에 의한 압류, 또는 재판상의 압류\n8) 검역상의 제한\n9) 송화인 또는 운송물의 소유자나 그 사용인의 행위 또는 과실\n10) 원인여하를 불문하고 일부 혹은 전면적 동맹파업, 기타의 쟁의 행위, Lockout 또는 노동의 정지 또는 장해\n11) 폭동 또는 내란\n12) 해상의 인명 또는 재산의 구조행위\n13) 운송물의 숨은 하자 또는 특수한 성질로 발생하는 용적, 중량의 감소, 기타 일체의 멸실, 손상\n14) 운송물의 포장 불충분\n15) 운송물의 기호표시의 불완전 또는 부적당\n16) 상당한 주의를 다하여도 발견할 수 없는 잠재하자\n17) 운송인의 고의나 과실 또는 운송인의 대리인 또는 사용인의 고의나 과실이 아닌 이유로 생기는 기타의 모든 원인", "id": 685}, {"category": "해상법!", "question": "28. 헤이그비스비의 해당사항은?", "answer": "1) 헤이그 비스비: 헤이그 규칙의 개정안\n2) 헤이그 비스비의 운송자의 면책항목은 동일하나, 운송인의 포장당 책임한도액을 증액하였으며 화물의 손해배상액산정을 도착지 가격기준으로 규정하였으며 운송인의 고의나 미리 알고 있는 과실이 있는 경우 책임한도액 규정의 이익을 받지 못하도록 개정함\n21.운송인의 면책사항 : 천재, 전쟁 화물고유의 하자, 포장하자, 투하, 기타 공동해손에 의한 희생도 관습법상 면책, 공동해손은 선주가 화주에게 공동해손 분담금을 청구할 수 있음. (뉴제이슨약관에 따라.)", "id": 686}, {"category": "해상법!", "question": "47.PUMPING CLAUSE,", "answer": "Owners warrant that the vessel will discharge the cargo within 1/3 of agreed laytime or maintain 100 psi. at vessel's manifold during discharge, always provided shore facilities permit. Delays due to an inability to meet the aforesaid warranty will be for Owners account and will not count as laytime or for demurrage if the vessel is on demurrage. In case the vessel fails to meet the aforesaid warranty, thereby causing delay to other vessels, Charterers may at their own discretion order the vessel to vacate the berth. Owners shall also continuously gauge the line pressure and maintain a log thereover and shall allow Charterers inspector to inspect the gauge and / or sight log.\n선박소유자는 제공된 육상시설이 허용하는 한 선박이 정해진 정박기간의 1/3이내에 화물을 하역하거나, 하역 중 선박의 매니폴드에서 100psi(pounds per square inch)을 유지할 것을 보증합니다. 상기 보증을 이행하지 못하여 생긴 지연은 선박소유자의 책임이 되며 이는 정박기간으로 산정되지 않거나 체선이 발생하면 체선료를 부담합니다. 상기 보증을 이행하지 못하여 다른 선박에 지연을 발생기키는 경우 용선자는 자신의 재량에 따라 선박을\n이안시킬 수 있습니다. 선박소유자는 계속해서 라인압력을 측정하고 기록하여야 하며, 차터러측의 관리가 압력을 측정하거나 그 기록을 검사할 수 있도록 허용하여야 한다.", "id": 687}, {"category": "해상법!", "question": "12. UNKNOWN CLAUSE", "answer": "요약 운송인이 선적된 운송품의 내용을 알지 못한다는 약관.\n컨테이너 해상운송에서, 선박회사는 내용물에 대해서는 책임이 없다는 약관이다. 선박회사에서 컨테이너에 적재된 화물의 내용물을 일일이 확인할 수가 없어 선적화물의 내용을 알지 못하므로 그에 대한 책임이 없음을 약정한 운송인 면책약관으로, 이런 약관이 있는 선하증권을 부지약관선하증권(unknown clause B/L)이라고 한다.", "id": 688}, {"category": "해상법!", "question": "39. Distance Freight 란 무엇인가", "answer": "비례운임 또는 비율운임을 말하며, 운임 후불의 경우에 선박이 항해중 불가항력, 기타 여러가지 원인에 의하여 항해를 계속할 수 없어서 운송을 완료할 수 없는 경우에 원래의 양하지와 다른 양하지에 화물을 인도하게 되고 이 경우에 이미 운송한 거리에 비례하여 지급받을 수 있는 운임을 말한다.", "id": 689}, {"category": "해상법!", "question": "41. 손해방지의무의 의미와, 손해방지비용으로 처리되기 위한 조건은?", "answer": "손해방지의무의 의미 : 손해보험에서 보험사고가 발생하였을 때 보험계약자와 피보험자가 손해 발생을 방지하는데 적극적으로 노력하여야 하는 의무.\n1)손해방지의무가 발생하여야 한다.\n2)손해방지행위가 필요하고 유익한 것이면, 반드시 그 효과가 발생하는 것은 아니다. 따라서 손해 방지 행위를 했으나 결과적으로 전손된 겨우라도 비용을 지불한다.\n3)비용은 통상적인 것으로 합리적이고 적절하게 발생한 것이어야 한다.", "id": 690}, {"category": "해상법!", "question": "16. 운송인의 묵시적의무란 ?", "answer": "감항능력유지, 이로금지, 하역작업종료후 신속히 항해", "id": 691}, {"category": "해상법!", "question": "59.해상보험법의 정의", "answer": "보험자가 피보험자에 대하여 해상손해, 즉 해상 사업에 수반되는 모든 재산상의 손해를 상호 합의된 방식과 범위까지 보상해 줄것을 약속한 손해 보험의 한 분야 이다.\n종류 : 1)선박 보험 2)적하보험 3) 운임보험 4) 선박 건조 보험 5) 선박불가동손실 보험 5)책임보험등이 있다.", "id": 692}, {"category": "해상법!", "question": "113. B/L에 대해 설명하고 누가 어느 시점에 발행하며 B/L의 종류와 지시식 선하증권이란", "answer": "무엇인지 말하시오.\n1) 선하증권이란?\n선박회사가 하주로부터 위탁받은 화물의 선적, 또는 선적을 위해 수취했다는 것을 증명함과 아울러 지정된 양륙항까지 운송하여 이 증권의 소지인에게 증권과 상환으로 선적화물의 인도를 약속하는 유가증권이며 화물이 본선에 선적되면 운송인이 발행한다.\n2) B/L 의 종류\n1) 화물의 선적 유무와 시점에 따른 분류\n가. Received B/L (수취식 B/L)\nB/L은 원래 본선에 선적시에 선사가 발행하는 증권이지만, 선적전에 운송인의 창고에 있을 때에도 발행할 수\n있는 것이 Received B/L이다. 본선에 적재전에 급하게 B/L이 필요한 경우 사용된다.\n나. On Board B/L (본선적재 B/L)\n본선 적재 후에 발행되는 B/L. B/L 자체가 본선적재(on Board)후에 선사에서 발행.\n다. Shipped B/L (선적 B/L)\nOn board B/L과 마찬가지로 선적시에 선사에서 발급하는 B/L. 화물이 선적된 후에 발급되는 것이기 때문에 B/L의\n가장 기본적인 형태이고, 유통증권과 화물의 권리를 나타낼 수 있는 서류.\n2) 화물의 이상 유무\n가. Clean B/L (무사고 B/L)\n적재 후 화물의 상태가 S/R과 이상이 없을시에 발급되는 B/L.\n나. Foul B/L (사고 B/L)\n적재 당시의 화물의 상태가 이상이 있거나, 포장의 상태가 이상해서 운송중에 화물의 상태가 영향이 받을 가능성이 있을 시에 발급되는 B/L.\n3) 발행주체\n가. Master B/L\n선사에서 포워더에게 발급하는 B/L. 선사가 발급한 원본만이 영향력을 가지며, 포워더는 Master B/L을 토대로\n화주에게 House B/L을 교부한다.\n나. House B/L\n포워더가 선사가 발급한 Master B/L이 가지고 있는 화물 소유 권리가 적혀있는 특정 수하인이 되는 B/L,.\n4) 수하인 표시 방법\n가. Straight B/L(기명식 B/L)\n특정 수하인이 기재된 B/L로서 B/L이 가지고 있는 화물 소유 권리가 적혀있는 특정 수하인이 되는 B/L.\n나. Order B/L(지시식 B/L)\n수하인란에 특정인이 기재되지 않은 B/L.", "id": 693}, {"category": "해상법!", "question": "51. B/L에 대해서 설명하시오.", "answer": ": Bill of Lading(B/L 선하증권)이란 해상운송계약에 따른 운송화물의 수령 또는 선적을 인증하고, 그 물품의 인도청구권을 문서화한 증권으로, 증권에 기재된 조건에 따라 운송하며 지정된 양륙항에서 증권의 정당한 소지인에게 그 화물을 인도할 것을 약정하는 유가증권이다.\n이는 화주의 청구에 따라 선장(실제로는 선박회사 또는 대리점)이 발행한다. 육상운송에서의 화물인환증과 같이 물권적 효력 및 채권적 효력을 가지고 있으며, 배서에 따라 양도할 수 있는 유통증권이다.", "id": 694}, {"category": "해상법!", "question": "22. 선하증권의 정의 및 누가 누구에게 발급하는 것인지 설명하시오.", "answer": "선하증권이란 해상운송인이 용선자 또는 송하인에게 발급하는 서류로 해상운송인이 운송물을 수령하고 선적하였음을 증명하는 가장 중요한 서류이다.\n1) 해상운송계약을 증명하는 증거권\n2) 선적된 운송물의 수량, 종류, 상태를 기재한 선적서류이다.\n3) 선하증권은 화물에 대한 권리증권이다.\n4) 계약 당사자가 선하증권에 서명하였거나, 운송계약을 선하증권에 포함시킬 것을 합의하였을 경우에 해상운송 계약서로 간주된다.", "id": 695}, {"category": "해상법!", "question": "21. BL의 부지약관에 대해서 설명하여라.", "answer": "부지약관(unknown clause)이란 선하증권 상 면책약관 중 하나로서, B/L면에 화물이 양호한 상태로 선적하고, 외관상 이것과 유사한 상태로 인도한다고 기재함으로써 선적화물의 내용, 중량, 용적, 내용의 수량, 품질, 종류 및 가격에 대하여는 운송인이 책임지지 아니한다는 약관이다.\n*해상운송인의 면책약관 중 하나로, 운송인이 화물을 선적 또는 수취할 때 화물의 내부를 개봉하여 검사 확인하는 것이 사실상 불가능하기 때문에 선화증권(B/L) 상에 “외관상 양호한 상태로 선적하고 이것과 유사하게 양호한 상태로 인도한다.”고 기재하여 화물의 내용, 중량, 용적, 내용물의 수량, 품질, 종류 및 가격 등에 대하여는 선사가 책임 없음을 정하는 조항이다.\n이는 특히 수출입화물의 컨테이너화로 인해 그 특성상 컨테이너 내에 적입된 화물에 대해 이를 운송할 선박회사가 일일이 그 내용물을 확인할 수 없는 상황에서 나타난 조항이다. 그리하여 운송인은 이러한 상황에 대해서는 책임을 부담하지 않는다는 특약의 문구로 ‘Said to contain’, ‘Said to quantity’, ‘Shipper's load and count’ 등과 같이 규정해 두고 있다.", "id": 696}, {"category": "해상법!", "question": "4. 선하증권의 성질", "answer": "선하증권은 개품운송과 항해용선의 경우에, 원칙적으로 송화인의 요구에 의해 발행해야 하는 중요한 서류이다.\n1) B/L은 화물의 선적 혹은 선적하기 위하여 선박회사가 인수하였다는 사실을 확인하는 인수증권이다.\n2) 지정한 양하항에서 B/L과 교환해서 선적 화물을 인도할 것을 약정하는 유가증권이다.\n3) B/L에 기재된 화물에 대한 권리를 표시하는 물권적 증권이다.\n4) 선박회사는 B/L 소지인에게 선적화물을 인도해야 하므로 채권적 증권이다.", "id": 697}, {"category": "해상법!", "question": "15. 선하증권 상 면책약관", "answer": "면책약관(Exception clause)은 운송인이 선주의 책임을 제한함으로써 후일 예상되는 선적화물의 사고에 대한 화주로부터의 손해보상 청구를 면하기 위하여 B/L에 기재되는 사항이다.\n면책조항은 보통 B/L의 표면이나 이면에 명백히 인쇄되어 있는데 이를 보통조항(General clause)이라 하고 특별히 B/L의 여백에 기입되거나 고무인으로 날인되는 것은 특별조항(Special clause) 또는 Stamp Clause라 하며 이러한 특별조항은 보통조항을 우선하여 강조되는 것이다.\n또한 간혹 지상조항(Paramount Clause)라는 것이 기재되기도 하는데, 이는 B/L이 국제통일조약과 이에 기준하여 제정된 해상물건 운송법의 규정에 따라 효력을 갖는다는 것을 의미한다.\n1) 과실약관 (negligence clause)\n항해과실에 대하여 운송인은 면책된다는 약관이다.\n대부분의 선하증권에 기재되어 있는 운송인의 면책약관으로, 특정한 자의 고의 또는 과실에 의한 손해에 대한 운송인의 보상여부를 약정한 것이다. 1893년 미국의 하터법에 의해 효력을 얻은 약관으로, 과실에는 항해과실과 상사과실이 있다.\n2) 잠재하자약관(laten defects clause)\n상당한 주의를 하여도 발견할 수 없는 하자에 의한 화물 손해에 대하여는 운송인은 책임지지 아니 한다는 약관이다.\n3) 이로약관(deviation clause)\n인명 및 재산 또는 선박의 구조, 피난, 화객의 적양, 연료, 식량 등의 필수품 공급을 위하여 항로 외를 항행하거나 예정 항구 외에 기항할 수 있다는 약관이다.\n4) 부지약관(unknown clause)\nB/L면에 화물이 양호한 상태로 선적하고, 외관상 이것과 유사한 상태로 인도한다고 기재함으로써 선적화물의 내용, 중량, 용적, 내용의 수량, 품질, 종류 및 가격에 대하여는 운송인이 책임지지 아니한다는 약관이다.\n5) 손해배상에 관한 약관(claim에 관한 약관)\n화물의 손해 배상에 관한 claim의 제기 방법, 손해배상의 시효 및 배상금 결정의 표준 및 한도에 관한 약관이다.\n6) New Jason Clause\n구조선이 운송인의 소유이거나 혹은 그의 관리에 속할 때에도 제3자의 소유에 의한 것과 같은 구조료를 지급하여야 한다는 약관이다.", "id": 698}, {"category": "해상법!", "question": "16. B/L을 분실한 경우", "answer": "B/L은 유가증권이며 권리증권이므로 소유자 또는 분실된 B/L일지라도 선의의 소지자(bona fide holder)가 발급기관인 선사에 제시하면 선사는 해당 물품을 인도해야 하므로 재발행은 극히 제한적입니다.\n선사에 재발급신청을 하기 위해서는 법원의 공시, 제권판정이 필요합니다. 즉, 법원의 게시판에 분실내용을 일정기간 공고하고, 비엘의 권리를 무효화하는(제권판정) 판정을 받은 후 재발급을 받는 것이 원칙입니다. 만일 B/L이 불타 없어져버린 경우 등에는 선사에 보증금을 예치하거나 은행에서 보증서 등을 발급받아 선사에 제출하고 재발급을 받을 수 있습니다.", "id": 699}, {"category": "해상법!", "question": "52. 용선료에 대해서 설명하시오.", "answer": ": 용선료(charter money ; charterage, 傭船料 )란, 오퍼레이터(배를 운항하는 회사)가 오너(배를 빌려 주는 것을 사업으로 하는 회사)에게 배를 빌리는 요금을 말한다. 1개월 1중량톤당으로 표시한다. 오너는 이 용선료가 하이어 베이스(배의 코스트를 1개월 1중량톤당으로 산출한 것)를 상회하면 흑자가 된다.", "id": 700}, {"category": "해상법!", "question": "22.선원의 상무와 의무의 차이", "answer": "-선원의 상무/ GOOD SEAMANSHIP :\n국제법 콜레그상 규정, 직무상 주의의무를 다 하였는가, 전통적 관습에 의해 해야할 일을 명시. 국내법상 수용하지 않음.\n-선원의 의무: 선원법 제83조(선원의 의무 등)\n① 선원은 선내 작업 시의 위험 방지와 선내 위생의 유지에 관하여 해양수산부령으로 정하는 사항을 지켜야 한다. <개정 2013.3.23>\n② 선원은 방호시설이 없거나 제대로 작동하지 아니하는 기계의 사용을 거부할 수 있다.\n③ 선원은 제82조제7항에 따라 선박소유자가 제공한 제복을 입고 근무하여야 한다. <신설 2015.1.6>\n선원법상 해원의 의무\n제21조 (해원의 의무) 해원은 다음의 각호의 사항을 지켜야 한다.", "id": 701}, {"category": "해상법!", "question": "7. 선장의 허가없이 전기나 화기를 사용하거나 금지된 장소에서 끽연하지 말 것", "answer": "8. 선장의 허가없이 일용품외의 물품을 선내에 반입하거나 선내로부터 반출 하지 말 것", "id": 702}, {"category": "해상법!", "question": "10. 항해과실을 해상운송인의 면책사유로 인정하는 이유", "answer": "첫째, 항해, 항법 및 선박의 조종에 관한 기술적 사항은 운송인이 관여할 수 없는 전문적인 부분이며,\n둘째, 선원의 사소한 부주의로도 막대한 손실을 가져올 수 있기 때문에 운송인을 보호하기 위한 것이고,\n셋째, 하주는 손해를 해상보험으로 전보 받는 것이 보통이므로 실제상 큰 불편은 없고,\n넷째, 항해 과실의 경우 운송인의 면책이 인정된다 하여도 항해를 실제로 수행한 선장 및 기타 선박사용인은\n그러한 행위에 대하여는 그에 상응하는 제제(벌금이나 자격정지 등)가 가하여지기 때문에 의도적으로\n항해과실을 저질러 손해를 증가시킬 위험이 없으며,\n다섯째, 항해과실 면책은 해상운송의 대자본성과 위험성에 비추어 해상운송업의 원활한 육성을 위하여 필요하\n때문이다.", "id": 703}, {"category": "해상법!", "question": "48. 항해과실과 상사과실에 대해 설명하시오.", "answer": "1) 항해과실 [航海過失, errors of navigation and management of ship]\n: 항해 또는 선박 자체의 취급에 대하여 선장이나 선원의 과실.\n선장이나 선원이 항해 또는 선박의 관리에서 일으킨 과실을 말한다.\n상업과실(商業過失:errors of cargo handling and custody)에 상대되는 개념으로, 해상보험에서 운송인의 면책사항이다. 이는 해상위험의 특수성에 비추어 운송인의 부담을 과중하지 않게 하기 위한 것으로, 운송인은 이 과실과 손해 사이에 인과관계가 있음을 입증해야 한다.\n1924년 헤이그규칙(Hague rule)에서는 이 과실에 의한 충돌•좌초•기관의 취급 등은 운송인의 면책약관으로 규정하였다. 1978년 함부르크규칙(Hamburg rule)에서는 화재면책과 함께 폐지된 바 있으나 국제적으로 널리 통용되며, 한국에서도 상법 제788조에 의해 운송인이 주의를 해태하지 않았다는 것을 증명하면 운송물의 멸실이나 훼손, 또는 연착으로 인한 손해에 대한 책임이 없다고 규정하고 있다. 따라서 이로 인한 손해를 보상받으려면 특별약관으로 부보해야 한다.\n2) 상사과실 [ Commercial fault, 商事過失 ]\n: 운송물의 선적, 취급, 적부, 보관, 관리 및 인도에 관하여 운송인이 주의의무를 위반을 하였을 경우의 과실 즉, 상사과실(Commercial fault)에 대해서는 이러한 책임을 면제하는 어떠한 특약이 있더라도 이를 무효로 하고 있으며 면책될 수 없다. 선위측정의 과오, 해상경계의 태만, 항행중 선박 피해후의 적절한 수선을 태만히 하는 등은\n항해과실에 속하며, 매트, 던니지(Dunnage)류의 부족, 냉장실의 냉기유지 태만, 선적 시 크레인의 조종 실수 등은 상사과실에 속한다. 그러나 실제로 선장 등의 과실이 항해과실인지 상사과실인지가 명료하지 않을 경우도 있으므로 사실문제(Question of fact)로서 판단할 수밖에 없다.\n화물의 적부나 운송은 선장이 행하는 것이므로 항해과실인가의 여부에 의문이 있을 수 있으며, 예를 들면, 적부 시에 적부장소의 선정을 잘못하여 Separation mat의 사용이 불충분함으로써 다른 화물과 접촉하여 손해를 생기게 한 때에는 상사과실이며, 적부배치가 나빠 본선의 트림이 제대로 잡히지 않아 생긴 손해는 항해과실이다. 운송에 있어서도 부당한 배선으로 운송물의 연착손해가 생기면 상사과실이며, 항행 중에 선박조종을 잘못하여 운송물이 움직여서 손상이 생기면 항해과실이다.\n* 편의치적선(Flag of convenience)\n외국선으로 하여금 자국의 깃발을 게양하게 하여 화물운송을 허용하면서 행정에 있어서는 거의 간섭을 하지 않음 it is hoisting flag of own or other country for get permission of cargo transport 선주가 진정한 연관관계가 없는 국가에 선박을 등록시킴으로써 세무, 노동, 해운정책등에 관한 각종 규제를 회피하려는 제도라고 정의할 수 있다.\n이들 국가는 대부분 국부가 취약한 나라로서, 등록 선주들에게 아무런 세금이나 규제를 가하지 않음으로써 세제상 또는 각종 행정 규제상 제약에서 벗어나고자 하는 선주를 끌어들이는 것이며 단지 소액의 등록세 등만을 징수하는 것을 국가의 수입원으로 하는 것이 목적이다.\n1970년 영국에서 발간된 롯치데일 보고서에서는 편의치적선을 다음과 같이 정의하고 있다.\n- 등록국은 등록선에 대한 외국인의 소유와 관리통제권을 허용하고 있다.\n- 등록조건이 매우 단순하고 절차도 아주 간편하다. 선박 등록업무는 통상 그 나라의 해외 주재 영사관에서 이루어지며, 또 타 국적으로의 이적절차도 아주 간단하고 특별한 제약이 없다\n- 선박의 수입에 대하여 부과되는 소득세와 같은 세금은 부과되지 않거나 부과되더라도 아주 낮은 세율이다. 등록수수료와 매년 얼마씩 내는 톤세가 공식적으로 부과되는 공과금의 전부이다. 또 장래에 대한 세제상 혜택의 지속에 대하여도 이를 보장하고 있다.\n- 편의치적국은 약소국으로서 예견가능 거래에 해운을 독자적으로 발전시키지 못할 것으로 보이며, 등록된 많은 선박으로부터 징수하는 소액의 수수료와 톤세가 그나라 세입과 국제수지의 개선에 크게 기여한다.\n- 외국인의 승선이 자유롭게 허용된다.\n- 등록국은 등록선에 적용할 국내법규를 갖추지 못하고 있으며, 국내 규칙이나 국제 조약을 효율적으로 집행할 만한 기구나 힘을 가지고 있지 못하다. 또 등록국은 선박회사를 규제할 의사나 능력도 없다.\n- Panama, Liberia, Marshall Islands, Bahamas, Malta, Cyprus, 몽골 등\n* 선체용선등록(Bareboat charter registration) 또는 이중등록(Dual registration)\n선체용선(혹은 나용선) 또는 demise(양도) charter 등록이 일부국가에서 허용되고 있다.이 경우 선주 국가에서의 등록은 일시적으로 정지되면서, 용선주의 국가에 등록되는 것을 말한다. 이 경우 선박은 용선자가 선택한 해당 국가의 국기를 게양하고 항해할 수 있게 된다. 이 경우는 특히 용선자가 선택한 국가의 법이 금융선이 안심할 만한 저당권 제도를 갖추지 못하였을 경우에 발생할 수 있다. 즉 용선자가 선택한 등록국이 A라고 하는 경우, A국은 금융제공자가 안심할 만한 저당권 제도를 갖추지 못하였을 경우에, 저당권 설정을 안전하게 할 수 있는 제도가 완비된 국가 B에 one ship company를 설립, 금융선은 그 회사로 하여금 용선자에게 A국으로 선체용선등록(Bareboat charter registration)하게 된다. 한편으로 B국의 등록부에 적당한 저당권을 유지하면서 용선자는 선박에 원하는 A국 국기를 게양하게 할 수 있다. 즉 선체용선등록과 이중등록이 같이 발생하게 된다.\n항해과실 & 상사과실 정리", "id": 704}, {"category": "해상법!", "question": "1. 항해과실 (Navigation Fault) : \"운송인 면책\"", "answer": "운송인이 고용한 사람들(선장, 해원, 도선사 등)이 배를 운항하거나 관리하는 과정에서 실수를 하여 화물에 손해가 생긴 경우입니다. 우리 상법은 이 경우 운송인의 책임을 면제해 줍니다.\n항해상의 과실: 배를 조종하거나 항로를 선택하는 등 '운행' 자체의 기술적 실수 (예: 조타 실수, 항법 위반, 충돌 등). 선박관리상의 과실: 화물이 아닌 '배 자체'의 안전과 유지를 위한 행위에서의 실수 (예: 기관 점검 소홀, 평형수(Ballast) 조절 실패, 갑판 배수 관리 소홀 등).\n핵심 요지: \"배를 잘 몰거나 관리하려다 발생한 실수로 화물이 망가졌다면, 운송인은 책임지지 않는다.\"", "id": 705}, {"category": "해상법!", "question": "2. 상사과실 (Commercial Fault) : \"운송인 책임\"", "answer": "화물을 싣고, 쌓고, 보관하고, 내리는 등 '화물 자체'에 대한 주의의무를 게을리하여 손해가 생긴 경우입니다. 이 경우 운송인은 반드시 배상 책임을 지며, 이를 면제한다는 특약이 있어도 무효입니다.\n운송물 관리 과실: 화물의 선적, 적부(Stowage), 보관, 취급, 양륙 과정에서의 부주의 (예: 냉동 화물의 온도 조절 실패, 화물을 제대로 고정하지 않아 파손됨 등).\n감항능력 주의의무 위반: 배가 항해를 견딜 수 있는 상태(물적, 인적 설비)를 갖추지 못한 상태에서 발생한 과실.\n핵심 요지: \"화물을 제대로 돌보지 않았거나, 애초에 화물을 실을 준비가 안 된 배였다면 운송인이 무조건 책임진다.\"\n적하보험(Insurance on goods)\n해상보험에서 화물 보험이라고 부르기도 한다. 이 보험은 보험의 목적인 화물이 소유자로서 갖는 피보험 이익에 관한 보험이다. 물론 이 보험도 선박 보험과 같이 보험자가 담보 위험을 담보로 하여 인수하는 보상 계약으로 피보험자인 하주는 보험료의 지급을 요건으로 한다. 화물이란 상품의 성질을 가진 물건을 의미하는 것이지 개인 휴대품이나 선상에 시린 식료품이나 선용품은 포함되지 아니한다. 일반적으로 적하보험은 항해 보험이다.\n선적한 때와 곳의 적하의 가액과 선적 및 보험에 관한 비용을 보험 가액으로 한다. 그리고 적하 보험의 보험 기간은 화물의 선적을 착수한 때에 개시한다. 그러나 출항지를 정한 경우에는 그 곳에서 운송을 착수한 때에 개히한다.\n희망 이익 보험\n화물의 소유 이익을 중심으로 적하보험이 성립하므로, 화물의 보험 가액 속에는 운임, 보험료 및 희망 이익을 포함시키는 경우가 많으며, 해상운송중 시장가액의 변동으로 발생하는 이익도 희망 이익에 포함 된다.\n증액보험(Increased value insurance)\n운송중에 화물의 시장가액이 상승하는 경우 그 상승액은 적하 보험에 포함되어 있지 않아 담보위험으로부터 보험 보호를 받을 수 없으므로, 해상 매매의 상승액을 피보험 이익으로 하는 보험\n예정보험계약(Open policy, Open contract)\n1회의 선적 또는 1개의 매매 계약에 의하여 수회의 선적 운송되는 경우 그 특정 화물을 보험에 가입하는 보험을 개별예정보험계약 이라 하는 이 경우 화물의 종류 또는 보험금액 등의 보험 조건이 확정되지 않았거나 또는 알 수 없는 때이므로 이 보험을 예정보험계약이라 한다.\n확정보험계약(Definite policy)\n화물의 내용이 정하여지면 이 대상 화물의 범위, 항로, 수송용기, 보험조건,보험요율, 개별적으로 선적할 때마다 보험가액을 결정하여 명시하는데 화물의 내용이 확정된 경우 하주는 보험자에게 확정통지(definite declation)를 하는 것을 뜻함\n* 적하 보험 약관\n(1) ICC(A) - 전 위험 담보 적하 보험 약관(All risk)\n단독 해손 불담보 및 분손 담보 조건 위외에 각종 부가 위험을 망라적으로 담보한다. 그러나 화물의 성질, 고유한 흠 또는 운송지연으로 발생한 손해는 제외한다.\n(2) ICC(B) – 분손 담보 적하 보험 약관(With Average)\n단독해손 불담보 적하 약관의 담보 위험에 추가하여 특정 분손 이외의 분손(조석, 조파, 고조, 홍수 등에 의한 손해, 유실 손해 기타 황천 손해을 담보한다. 이 조건에는 공제를 적용할 수 있다\n(3) ICC(C) – 단독 해손 불담보 적하 보험 약관(Free form particular Average)\n공동 해손 손해, 전손, 특정 분손(침몰, 좌초와 대화재의 SSB로 발생한 손해, 충돌, 폭발, 화재 및 조난 항에서 합리적으로 발생한 하역 손해, 선적, 하역, 환적 과정의 화물전손) 그리고 비용 손해로서 손해 방지 비용과 특별 비용(조난 항에서 하역, 보관, 환적과 계속 비용)을 담보한다.\n* 전손(Total loss)\n계약된 보험 목적물인 선박 또는 적화물이 형식적 또는 실질적으로 전멸하는 것을 말하고 실질적인 전손인지 실제전손은 아니면서 경제적인 의미에서 전손으로 취급되는지에 따라 현실전손과 추정전손으로 나눈다.\n(Total loss say to damaged ship or cargo as formality or substance, it's not mean total loss substanly and really.\nit's divide into actuality total loss and estimate total loss according to treatment in economic mean.)\n(1) 현실전손(Actual total loss)\n피보험 목적물이 완전 멸시되거나 동 목적물이 부보 당시의 성질을 그대로 갖지 못할 정도로 심하게 손상을 입거나, 또는 피보험자가 회복할 수 없도록 피보험 목적물을 박탈당했을 때를 의미하며, 위험에 처한 선박이 행방불명되어 상당기간 찾을 수 없을 때를 현실전손으로 간주한다. 그러므로 피보험목적물의 1)실질적인 멸실 2) 성질의 상실 3) 회복의 전망이 없는 박탈을 말한다.\n(Actual total loss say to perfection damaged or violent dameged an insured article, when deprivation and can't search missing ship. therefore it is 1) actual exterminate, 2) loss of disposition 3) can't restoration)", "id": 706}, {"category": "해상법!", "question": "5. 추정전손(Constructive total loss)", "answer": ": 보험 목적물이 현실적으로 전멸하지 않더라도 그 손해 정도가 본래의 효용을 상실하거나, 구조되어도 그 비용이 구조 후의 시장가격을 초과함으로써 전손에 준한 것으로 추정 되었을 경우, 이것을 추정전손이라 하고, 또한 보험 목적물의 수리가 불가능하거나 행방불명으로 위부에 의하여 전손으로 간주하는 경우의 손해를 말함.\n*잔존물이란?\n보험목적물 자체가 사용할 순 없지만 구조가 되었을 때", "id": 707}, {"category": "해상법!", "question": "58. 거증책임에 대해 설명하시오.", "answer": "운송인이 면책사유를 이유로 그 무책임을 주장하는 경우 그 항변을 물리치기 위하여 화주측은 운송인측의 과실을 입증할 책임이 있다. 그러나 상기 마지막 포괄적인 사유에서 운송인이 책임을 면하기 위해 운송인측에서 무과실을 입증하여야만 한다. 또한 선적화물의 손해가 이상의 주의 의무를 다하지 아니하였기 때문에 발생하였다는 화주측의 주장이 있을 경우 선박회사가 의무를 이행한 거증자료를 제시하지 못하면 배상책임을 지게 된다.\n[추가 질문] 거증책임을 할 수 있는 전제 조건 3가지를 말하시오.\n1) 감항능력 담보 의무 이행\n2) 선적화물에 관한 주의 의무 이행\n3) 선박회사 측에서 상당한 주의를 했으며 과실이 없었다는 거증의무를 입증\n[추가 질문] 해양수산부령으로 정하는 준해양사고를 설명하시오.\n*해양사고의 조사 및 심판에 관한 법률\n제2조(정의) 이 법에서 사용하는 용어의 뜻은 다음과 같다. <개정 2011. 6. 15., 2013. 3. 23.>\n1. \"해양사고\"란 해양 및 내수면(內水面)에서 발생한 다음 각 목의 어느 하나에 해당하는 사고를 말한다.\n가. 선박의 구조ㆍ설비 또는 운용과 관련하여 사람이 사망 또는 실종되거나 부상을 입은 사고\n나. 선박의 운용과 관련하여 선박이나 육상시설ㆍ해상시설이 손상된 사고\n다. 선박이 멸실ㆍ유기되거나 행방불명된 사고\n라. 선박이 충돌ㆍ좌초ㆍ전복ㆍ침몰되거나 선박을 조종할 수 없게 된 사고\n마. 선박의 운용과 관련하여 해양오염 피해가 발생한 사고\n1의2. \"준해양사고\"란 선박의 구조ㆍ설비 또는 운용과 관련하여 시정 또는 개선되지 아니하면 선박과 사람의 안전 및 해양환경 등에 위해를 끼칠 수 있는 사태로서 해양수산부령으로 정하는 사고를 말한다.\n*해양사고의 조사 및 심판에 관한 법률 시행규칙\n1의2. \"준해양사고\"란 선박의 구조ㆍ설비 또는 운용과 관련하여 시정 또는 개선되지 아니하면 선박과 사람의 안전 및 해양환경 등에 위해를 끼칠 수 있는 사태로서 해양수산부령으로 정하는 사고를 말한다.\n*해양사고의 조사 및 심판에 관한 법률 시행규칙\n제2조(준해양사고) 「해양사고의 조사 및 심판에 관한 법률」(이하 \"법\"이라 한다) 제2조제1호의2에서 \"해양수산부령으로 정하는 사고\"란 다음 각 호의 어느 하나에 해당하는 것을 말한다. <개정 2013. 3. 24.>", "id": 708}, {"category": "해상법!", "question": "1. 항해 중 운항 부주의로 다른 선박에 근접하여 충돌할 상황이 발생하였으나 가까스로 피한 사태", "answer": "2. 항로 내에서의 정박 중 다른 선박에 근접하여 충돌할 상황이 발생하였으나 가까스로 피한 사태\n3. 입ㆍ출항 중 항로를 이탈하거나 예정된 항로를 이탈하여 좌초될 상황이 발생하였으나 가까스로 안전한 수역으로 피한 사태\n4. 화물을 싣거나 묶고 고정시킨 상태가 불량한 사유 등으로 선체가 기울어져 뒤집히거나 침몰할 상황이 발생하였으나 가까스로 피한 사태", "id": 709}, {"category": "해상법!", "question": "6. 해양오염설비의 조작 부주의 등으로 오염물질이 해양에 배출될 상황이 발생하였으나 가까스로 배출되지 아니하도록 조치한 사태", "answer": "7. 그 밖에 제1호부터 제6호까지의 사태와 유사한 사태로서 해양수산부장관이 정하여 고시하는 사태\n[추가 질문] 준해양사고의 통보 절차에 대해 말하시오.\n*해양사고의 조사 및 심판에 관한 법률\n제31조의2 준해양사고의 통보\n1. 선박소유자 또는 선박운항자는 해양사고를 방지하기 위하여 선박의 운용과 관련하여 발생한 준해양사고를 해양수산부령으로 정하는 바에 따라 중앙수석조사관에게 통보하여야 한다.\n2. 중앙수석조사관은 제1항에 따라 통보받은 내용을 분석하여 선박과 사람의 안전 및 해양환경 등에 위해를 끼칠 수 있는 사항이 포함되어 있는 경우에는 선박소유자 등 관계인에게 그 내용을 알려야 한다.\n3. 중앙수석조사관은 제1항에 따라 준해양사고를 통보한 자의 의사에 반하여 통보자의 신분을 공개하여서는 아니 된다.\n제19조 준해양사고의 통보\n법 제31조의2 제1항에 따라 준해양사고를 통보할 때에는 별지 제8호 서식의 준해양사고 통보서에 따르되, 인터넷 또는 팩스 등 정보통신망을 이용하여 제출할 수 있다.", "id": 710}, {"category": "해상법!", "question": "1. 선박우선특권의 정의 및 성격", "answer": "선박우선특권은 해상법상 인정되는 특수한 법정담보물권입니다. 특정 채권을 가진 채권자가 선박 및 그부속물로부터 다른 채권자(심지어 저당권자)보다 우선하여 변제를 받을 수 있는 강력한 권리입니다.\n법적 성질: 저당권과 유사하게 부종성(채권이 없으면 권리도 없음), 불가분성(채권 일부가 남아도 목적물전부에 효력 미침)을 가지지만, 계약이 아닌 법률에 의해 당연히 발생한다는 점이 다릅니다.\n추급력: 선박의 소유권이 제3자에게 이전되더라도 이 특권은 소멸하지 않고 선박을 따라다닙니다(제785조)", "id": 711}, {"category": "해상법!", "question": "2. 우선특권의 대상(목적물) 및 종류", "answer": "선박우선특권이 행사될 수 있는 범위와 법에서 정한 채권의 종류는 다음과 같습니다.\n대상이 되는 목적물\n선박 및 그 속구\n그 채권이 발생한 항해의 운임\n선박 및 운임에 부수하여 생긴 채권\n법정채권의 종류 (상법 제777조 제1항)\n공익비용: 선박의 보존, 경매 절차 비용 등 채권자 공동의 이익을 위한 비용.\n고용관계 채권: 선원 및 기타 선내 고용인의 고용계약으로 인한 채권.\n구조료 및 분담금: 해난구조료, 공동해손의 분담금.\n손해배상채권: 충돌 등 항해 중 사고로 인한 인명 및 시설물 손해배상금.", "id": 712}, {"category": "해상법!", "question": "3. 선박우선특권 vs 선원 임금우선특권", "answer": "가장 중요한 쟁점 중 하나인 **'해상법상 선박우선특권'**과 **'근로기준법상 임금우선특권'**의 우열 관계는 다음과 같습니다.\n판례의 입장 (임금 채권 우선)\n우리 대법원 판례는 두 권리가 충돌할 경우 선원의 임금채권을 선박우선특권보다 더 우선시합니다. 그 이유는 다음과 같습니다.", "id": 713}, {"category": "해상법!", "question": "46. 해상보험이란?", "answer": "선박의 운항 및 선박에 의한 화물운송 등에 동반하는 위험에 대비하여 선박 및 화물의 손해를 보상하는 것을 목적으로 하는 손해보험을 말한다.\n해상보험은 보험의 목적에 따라 선박 보험, 적하 보험 및 운임 보험으로 구분된다.\n1) 선박보험 (Hull Insurance)\n선박을 보험 목적물로 하는 보험으로서 선박을 관리하거나 운항하던 중 선박이 멸실되거나 훼손된 경우, 또는 선박을 보존하기 위하여 지출된 경비가 있는 경우 이러한 손해를 보험 조건에 따라 보상하여 주는 보험이다.\n2) 적하보험 (Cargo Insurance)\n화물을 보험 목적물로 하는 보험으로서 화물을 운송하던 중에 화물이 멸실 또는 훼손되었거나 화물을 보존하기 위하여 경비를 지출하게 되어 화물의 소유자가 손해를 입게 되었을 때 이를 보험조건에 따라 보상하여 주는 보험이다.\n3) 운임보험 (Freight Insurance)\n운임을 대상으로 하는 보험으로서 선하 증권이나 운송 계약서에 명시된 대로 목적지에서 화물을 화주에게 인도하지 못하였을 때에는 운송인 등이 운임을 청구할 수 없게 되므로 이 때 운송인 등이 입은 손해를 보상하여 주는 보험이다.\n*해상보험의 담보대상이 되는 위험을 해상위험(maritime perils)이라 하며, 화물을 목적물로 하는 적하보험, 선체를 목적물로 하는 선박보험, 및 화물의 도착에 따른 이익 또는 보수를 목적으로 하는 희망 이익보험 등이 있다.\n1) 위험(risk) : 일반적으로 사고의 발생가능성은 있으나 구체적, 개별적 사례에 있어서는 불확실한 상황\n2) 해상위험(maritime perils) : 선박이 항행하는 데 따르는 위험 가운데 특히 해상보험에 의해 담보되는 위험. 해상고유의 위험과 해상의 위험 및 전쟁위험 등이 있음.\n3) 해상고유의 위험(perils of the sea) : 침몰, 좌초, 충돌, 황천 등 해상에서만 일어날 수 있는 위험.\n4) 해상의 위험(perils on the sea) : 화재, 투하, 선원의 악행, 해적, 등 실제 바다가 아닌 곳에서도 일어날 수 있는 위험.\n*해상보험법의 정의?", "id": 714}, {"category": "해상법!", "question": "37. SSBC란", "answer": "해상운항에 기인 또는 부수되는 위험을 해상위험이라 하고, 대표적인 해상위험으로 침몰(Sinking), 좌초(stranding), 화재(burning), 충돌(collision) 등이 있는데, 이것을 SSBC위험이라고 한다.", "id": 715}, {"category": "해상법!", "question": "49. 해상보험에서 보험자의 담보위험을 설명하시오.", "answer": "위험에 의해서 발생한 손해를 보험자가 피보험자에게 보상해주는 위험으로 ‘피보험위험’ 이라고도 부르며 보험자가 보상할 책임이 있다는 점에서 ‘보험사고’라고도 한다.\n1) 선원 인명의 상해, 질병, 사망 (방문자, 하역인부)\n2) 승선중인 선원의 가족(배우자, 부모, 자녀)의 상해, 질병, 송환비용\n3) 밀항자, 망명자, 피구조자에 대한 책임 및 인명구조 비용\n4) 선원 및 여객의 소지품 유실\n5) 본선에서의 전염병 발생에 따른 검역 또는 소독비용\n6) 충돌배상책임, 난파된 상대선 또는 화물에의 점등 또는 제거비용\n7) 부두, 크레인, 부표 등의 손상\n8) 본선의 배출물 혹은 본선이 야기한 육상, 해상 또는 대기오염\n9) 예인계약책임(선박보험에서 담보되지 않는 부분)\n10) 난파된 본선 제거비용\n11) 승인된 운송계약하의 화물 부족, 손실책임", "id": 716}, {"category": "해상법!", "question": "32. 면책위험이란 무엇인지 설명하시오.", "answer": "보험자가 보상책임을 법률상, 약관상의 이유로 면제받는 것을 면책위험이라 한다. 면책위험이라도 특약에 의하여 담보되는 전쟁, 동맹파업 위험 등은 상대적 면책위험이라하고 공서양속(공공의 질서와 선량한 풍속)의 점에서\n특약에 의해서도 담보되지 않는 것을 절대적 면책위험이라 한다.", "id": 717}, {"category": "해상법!", "question": "1. 일반면책조항(General Exclusions)", "answer": "1) 피보험자의 고의의 비행에 귀속하는 멸실, 손상 또는 비용\n2) 피보험목적물의 통상적인 누손, 통상적인 중량, 용적의 부족 또는 자연소모\n3) 피보험목적물의 포장 또는 준비의 불완전 또는 부적합으로부터 생기는 멸실, 손상 또는 비용\n4) 피보험목적물의 고유의 하자 또는 성질을 근인으로 하는 멸실, 손상 또는 비용\n5) 항해지연이 피보험위험에 의하여 생긴 경우라도 당해 항해지연에 근인하여 생긴 멸실, 손상 또는 비용\n6) 본선의 소유자, 관리자, 용선자 또는 운항자의 지급불능 또는 금전상의 채무불이행으로 생기는 멸실, 손상\n또는 비용\n7) 원자력 또는 핵의 분열, 융합 또는 기타 이와 유사한 반응 또는 방사능이나 방사선물질을 응용한 무기의\n사용으로 말미암아 발생한 멸실, 손상 또는 비용\n2. 불내항성 및 부적합성 면책조항(Unseaworthiness and unfitness Exclusion)\n1) 본선 또는 부선의 불내항\n2) 본선 또는 부선, 컨테이너 또는 지게차가 피보험목적물의 안전한 운송에 부적당한 경우\n3) 선박이 내항성이 있고 피보험목적물을 목적지까지 운송하는데 적당하지 않으면 안된다는 묵시담보를 위반한 경우는 피보험자 또는 그 사용인이 이러한 불내구성 또는 부적당한 사실을 알지 못할 경우에 한하여 보험자는 그 권리를 포기한다.", "id": 718}, {"category": "해상법!", "question": "3. 전쟁면책조항(War Exclusion)", "answer": "1) 전쟁, 내란, 혁명, 반역, 반란 또는 이로 말미암아 발생하는 국내투쟁, 또는 교전국에 의한 또는 교전국에 대하여 가해진 적대행위\n2) 포획, 나포, 강류, 억지 또는 억류와 이러한 행위의 결과 또는 이러한 행위를 하고자 기도한 결과\n3) 유기된 기뢰, 어뢰, 폭탄, 기타 유기된 전쟁무기에 의하여 발생된 것", "id": 719}, {"category": "해상법!", "question": "4. 동맹파업 면책조항(Strikes Exclusion)", "answer": "1) 동맹파업, 직장폐쇄, 노동쟁의, 폭동 또는 소요에 가담한 자에 의하여 발생된 것\n2) 동맹파업, 직장폐쇄, 노동쟁의, 폭동 또는 소요의 결과로 발생된 것\n3) 폭력주의자 또는 정치적 동기를 가지고 행동하는 자에 의하여 발생되는 것", "id": 720}, {"category": "해상법!", "question": "48. 해상보험 중 담보되지 않는 4가지를 말하시오.", "answer": "1) 피보험자의 고의적 불법행위\n2) 지연\n3) 자연소모\n4) 통상의 누손\n5) 통산의 파손\n6) 고유의 하자나 성질", "id": 721}, {"category": "해상법!", "question": "57. 선박보험에서 항해손실, 비용손실 이란?", "answer": "해상손해란 해상위험의 발생으로 인하여 피보험자가 입은 경제적 불이익을 말한다. 따라서 통상 해상손해는 물적손해(physical damage), 비용손해(expenses), 배상책임손해 (liabilities)로 구분된다.\n첫째, 물적손해는 보험목적물 자체에 직접적으로 발생된 손해로서 보험목적물의 전부가 멸실되는 전손과 보험목적물의 일부가 손상되는 분손으로 구분된다. 전손은 실질적으로 전손이 발생한 현실전손과 실질적으로 전손은 아니지만 전손이나 다름 없는 상태에 있는 경우에 전손으로 해석하는 추정전손으로 구분된다. 분손은 손해발생원인에 따라 그 손해를 피보험자가 단독으로 부담하는가 아니면 이해관계자가 공동으로 부담하는가를 기준으로 단독해손과 공동해손으로 구분된다.\n둘째, 비용손해는 보험목적물의 멸실 또는 손상과는 관계가 없고, 보험목적물이 보험증권에서 규정하고 있는 담보위험에 처해 있을 때 그로 인한 손해를 경감 혹은 방지하기 위하여 부득이하게 지출되는 비용을 의미한다. 여기에는 구조료, 손해방지비용, 특별비용이 있다.\n셋째, 배상책임손해는 해상위험으로 인하여 피보험자가 타인에 대하여 손해배상책임을 지게 되는 경우의 손해를 말한다. 선박충돌의 경우 선주는 상대선박의 선주 및 화주에 대하여 손해배상책임을 지게 되는 것이 그 예이다.", "id": 722}, {"category": "해상법!", "question": "12. G/A(General Average : 공동해손)이란?", "answer": ": 적하, 선박, 운임 등 항해단체가 공동의 위험에 처해 있을 때 공동안전을 위하여 선장 및 선주가 취하는 적절한 조치\n◈ 성립요건\n1) 선박과 적하의 공동위험을 피하기 위한 것일 것\n2) 선박 또는 적하에 대하여 선장의 고의적인 처분일 것\n3) 손해 또는 비용이 발생할 것\n◈ 공동해손행위\n1) 화재진압을 위한 주수,\n2) 고의 좌주,\n3) Jettison. 투하 [ Jettison , 投荷 ]\n: 적하, 선박의 일부, 선박의 구속품, 의장품 및 저장품 등을 일부러 바다에 버리는 것을 말한다. 비상시에 선박을 가볍게 하거나, 선박의 복원성을 확보하기 위한 목적이다. 보험목적물 고유의 성질을 원인으로 하여 보험자가 일반적으로 면책되어 있는 종류의 투하도 포함되나, 그렇지 않는 투하는 항해에 관한 사고의 하나로서 영문증권에 열거된 위험의 하나이다.", "id": 723}, {"category": "해상법!", "question": "17.공동해손 분담금 누가 부담하는가?", "answer": "피해를 입은자 뿐만 아니라 이해 관계자 전부가 공동으로 피해를 부담한다.", "id": 724}, {"category": "해상법!", "question": "18.상법상 공동해손 성립요건", "answer": "선박과 적하에 공통된 위험이, 현실적, 객관적으로 존재하고 그 위험을 면하기 위한 소극적인 목적이 있어야 한다.", "id": 725}, {"category": "해상법!", "question": "19.공동해손 종류 다섯가지", "answer": "1) 투하\n2) 임의좌초에의한 손해\n3) 선박의 소화작업시 물에 의한 손해\n4) 추진기와 기관등의 손상\n5) 연료로 사용한 선박용구 및 저장품", "id": 726}, {"category": "해상법!", "question": "5. 공동해손 사례 6가지", "answer": "①희생손해(General Average Sacrifice)\n가. 투하\n나. 투하행위로 인한 해수침\n다. 선박화재 소화에 따른 손실\n라. 임의 좌초에 의한 손해\n마. 이초를 위하여 기관을 과도하게 사용함으로써 생긴 손해\n바. 좌초된 선박을 가볍게 하기 위한 행위로 인한 손해\n사. 연료로서 사용한 선구 및 저장품\n아. 피난항에서 하역 작업 중에 발생하는 손해\n자. 운임의 손실\n②비용손해(General Average Expenditure)\n가. 구조비\n나. 선박이 좌초된 경우 선박을 가볍게 하기 위해 발생된 비용\n다. 피난항 비용\n라. 임시수리비\n마. 자금 조달비\n바. 대체비용", "id": 727}, {"category": "해상법!", "question": "63. 위부와 대위에 대하여 설명하시오", "answer": "1) 위부\n1-1. 위부의 정의\n위부란 추정전손의 경우 피보험자가 보험자에게 보험의 목적에 대한 손해를 현실전손으로 추정하도록 하기 위해 보험의 목적에 대한 소유권과 제3자에 대한 구상권을 보험자에게 양도하는 것을 말합니다. 위부는 추정전손의 형식적 요건으로서 위부에 의해 추정전손이 완전히 성립합니다.\n1-2. 위부의 조건\n위부는 추정전손의 성립요건을 만족해야 하며 무조건적으로 보험자에게 이전돼야 하고, 보험의 목적의 전부에 대해 불가분적으로 이루어져야 합니다.\n1-3. 위부의 통지\n피보험자는 추정전손으로 처리하기 위해 보험자에게 위부를 통지해야 합니다. 위부의 통지는 피보험자가\n보험자에게 재산권을 양도한다는 의사표시입니다. 위부의 통지는 서면, 구두로 해도 무방하다고 규정하고 있습니다.\n1-4. 위부의 효과\n유효한 위부가 있으면 보험자는 보험의 목적에 잔존할 수 있는 피보험자의 일체의 이익과 보험의 목적의 소유권에 속하는 일체의 권리를 양도받을 수 있는 권리가 있습니다. 또한 위부를 통하여 추정전손의 현실적 요건을 충족함에 따라 피보험자는 보험자에게 보험금액 전액을 청구할 수 있습니다.", "id": 728}, {"category": "해상법!", "question": "2. 대위", "answer": "2-1. 대위의 정의\n보험자가 보험의 목적의 전부에 대한 전손금을 지불했거나 분할된 전손금을 지불한 경우에 보험자는 전손금이 지불된 보험의 목적에 잔존할 수 있을 피보험자의 이익을 승계할 권리를 갖는데 이러한 권리 이전을 대위라고 합니다.\n2-2. 보험목적에 대한 대위\n보험자는 보험사고가 발생할 경우 보험가액과 잔존물가액을 정확하게 산정하기 어렵기 때문에 전손보험금을\n지급한 이후 잔존물에 대한 권리를 이전받습니다.\n보험자는 보험목적을 취득함에 따라 부수하는 의무를 부담해야하는 경우가 있는데 잔존의 이익보다 부담이\n클 경우에는 잔존이익의 취득을 포기할 수 있습니다.\n2-3. 제3자에 대한 보험자 대위\n제3자에 대한 보험자 대위란 보험사고가 제3자의 행위로 인해 생긴 경우 보험금을 지급한 보험자는 그 지급한 금액의 한도에서 제3자에 대한 보험계약자나 피보험자의 권리를 취득하는 것입니다.\n☞ 위부 [ Abandonment , 委付 , いふ ] ; 추정전손이 발생했을 때 그 피보험자는 그 피보험물에 대하여 갖고 있는 일체의 권리를 보험자에게 이전하여 보험금의 전액을 청구할 수 있는데 이것을 위부라고 한다. 위부를 하게 되면 피보험물에 대한 일체의 권리는 보험회사가 갖고 일반 전손과 동일한 지위에 서게 된다.\n☞ 대위 [ Subrogation ] ; 보험자가 보험목적물에 관련되는 일체의 권리를 피보험자로부터 승계 받는 것을 ‘대위’라고 한다. 보험자가 취득하는 권리는 ‘보험목적물에 대한 소유권’과 ‘제3자에 대한 손해배상청구권’으로 나누어진다. 이 권한은 보험자가 피보험자에게 전손보험금을 지급한 경우에 한하며, 분손보험금을 지급했다면 잔존물에 대한 소유권을 취득할 수 없다.", "id": 729}, {"category": "해상법!", "question": "54. 선박보험과 담보에 대해 설명하시오.", "answer": "1) 선박보험\n전형적인 손해보험의 일종으로써 일반적으로 계약 당사자의 일방(보험회사)이 보험을 의뢰한 피보험자(선박소유자)의 목적물(선박)이 일정의 우연한 사고로 인해서 발생하는 손해를 보상할 것을 약속하고 선박소유자가 그것의 대가인 보험료를 지불할 것을 약속하는 계약이라고 정의할 수 있다.\n2) 담보\n피보험자에 의해 반드시 지켜져야 할 약속으로서 이는 어떤 특정한 일이 행해지거나 또는 행하여지지 않을 것이라는 약속사항, 또는 어떠한 조건이 충족될 것이라는 약속사항, 또는 특정한 사실의 존재를 긍정하거나 부정하는 약속사항을 말한다. 담보에는 보험증권에 명확히 나타나는 명시담보와 이와는 달리 내항성담보, 적법담보와 같이 해상보험증권에는 명시되지 않으나 피보험자가 당연히 지켜야 할 약속사항인 묵시담보가 있다.\n☞ 명시담보 [明示擔保, express warranty] ; 보험증권에 의해 명시적으로 언급되는 담보.\n보험증권 내에 포함되어 있거나 증권에 의해 명시적으로 언급되는 담보이다. 해상보험에서 묵시담보(implied warranty)에 상대되는 개념으로, 항해일자와 항로•포장•선박의 종류 등에 관한 사항을 담보로 명시하며 담보의 의사가 추측할 수 있는 문구이면 무엇이든 가능하다.\n이를 위반할 경우 영국 해상보험법상 약속위반으로 해석되어 피보험자에게 비교적 큰 불이익이 부과된다. 보험증권에 상반되는 내용이 있다면 그에 우선하여 적용되는 담보로, 중립담보(warranty of neutrality)와 안전담보(warranty of good safety)•협회담보(institute warranty) 등으로 나뉜다.\n☞ 중립담보는 선박이나 적하 등의 피보험 재산이 중립재산이라고 명시되는 담보이다. 그 재산이 위험기간의 개시시점에 중립적 성질을 가져야 하고, 또 피보험자의 능력이 미치는 한 그 중립적 성질이 보험기간 중에 계속되어야 한다는 묵시조건이다.\n☞ 안전담보는 선박이 특정일에 무사 또는 안전하다는 담보이다. 보험자가 특정일 이전에 발생된 모든 손해에 대한 면책을 위하여 명시한다. 한편 협회담보는 전보험기간 또는 일정기간 동안에는 일정한 지리적 범위 내로 선박의 운행을 제한하거나, 일정한 항해 또는 해역을 제외시키는 조항을 명시하는 것이 일반적이다.\n☞ 묵시담보 [默示擔保, implied warranty] ; 보험에서 증권에 명시되어 있지 않은 담보.\n해상보험에서 보험증권에 명시하지 않고 묵시적으로 보증하는 담보를 말한다. 보험증권에 명시되는 명시담보(express warranty)에 상대되는 개념으로, 예를 들면 선박은 웬만한 항해를 견딜 수 있어야 한다는 등 묵시적으로 서로 양해하고 보증하는 것이 이에 해당된다.\n명시담보를 보완하는 것으로 법에 의해 계약에 포함된 것으로 간주된다. 따라서 이러한 담보가 충족되지 않을 경우 보험자는 보험계약을 해지할 수 있다. 감항능력담보와 적법담보 등이 있다.\n☞ 감항능력담보(내항성 담보)란 통상적으로 선박이 항해를 완수할 수 있고, 항구 내에 있을 때에도 통상적인 위험을 견딜 수 있음을 묵시적으로 담보하는 것으로 내항성 담보라고도 한다.\n☞ 적법담보란 모든 해상사업이 피보험자가 지배할 수 없는 경우를 제외하고는 합법적이어야 한다는 것을 묵시적으로 담보하는 것을 말한다. 피보험 항해사업이 밀무역이나 교전국에 대한 통상과 같은 위법이 아니어야 하고, 항해를 합법적으로 수행해야 함을 담보하고 있다.", "id": 730}, {"category": "해상법!", "question": "24. 선박 우선 특권이란 무엇인가?", "answer": "선박우선특권 [ maritimelien , 船舶優先特權 ]\n: 일정한 법정채권(상법 제777조 1항 1호～4호)의 채권자가 선박과 그 부속물(속구•운임•그 선박과 운임에 부수한 채권)로부터 다른 채권자보다 자기채권의 우선변제(優先辨濟)를 받을 수 있는\n해상법상의 특수한 담보물권(擔保物權)이다(제777조 2항). 구상법에서는 선취득권에 관한 규정이 있었으나 우리 민법에서는 일반선 취득권 제도(一般先取得權制度)가 없어졌으므로 상법은 그 성질에 반하지 않는 한 저당권에 관한 규정을 준용한다고 하였다(제777조 2항후단).\n선박우선특권을 저당권과 비교하면 전자는 특수한 채권자에게 법률상 당연히 주어지는 담보물권인데 반하여 후자는 당사자간의 저당권설정계약(抵當權設定契約)에 따라서 설정되는 점이 다르나, 목적물에 관하여 우선 변제권을 가지는 타물권(他物權)이며, 부종성(附從性) • 불가분성(不可分性)을 가지는 점 등에서 양자는 그 성격을 같이 한다.\n선박우선특권의 목적물은 선박, 그 속구, 그 채권이 생긴 항해의 운임, 그 선박과 운임에 부수한 채권이고(제777조 1항), 우선특권에 의하여 담보(擔保)되는 채권은 상법 제777조 1항의 1호 내지 4호에 열거되어 있다.\n선박우선특권은 한척의 선박에 대하여 수개가 경합하는 수도 있고, 또 다른 담보물권과 경합하는 경우도 있다. 따라서 상법은 선박우선특권 상호간의 순위와 선박우선특권과 다른 담보물권의 순위를 각각 규정하고 있다(제782조, 제783조, 제784조, 제788조).\n선박우선특권의 효력으로서는 목적물에 대한 경매권(競賣權)(제777조 2항후단)과 우선 변제권 (優先辨濟權)이 있으며, 이 우선특권은 그 선박소유권의 이전으로 인하여 영향을 받지 아니한다(제785조). 선박우선특권은 민법상의 저당권소멸원인(抵當權消滅原因)(제777조 2항후단)과 상법상의 특별소멸원인(特別消滅原因)(제786조)에 따라서 소멸된다. 이상의 선박우선특권에 관한 규정은 건조 중인 선박에 관해서도 준용된다고 규정되어 있다(제790조).\n상법\n제777조(선박우선특권 있는 채권) ①다음의 채권을 가진 자는 선박ㆍ그 속구, 그 채권이 생긴 항해의 운임, 그\n선박과 운임에 부수한 채권에 대하여 우선특권이 있다.\n1. 채권자의 공동이익을 위한 소송비용, 항해에 관하여 선박에 과한 제세금, 도선료ㆍ예선료, 최후 입항 후의\n선박과 그 속구의 보존비ㆍ검사비", "id": 731}, {"category": "해상법!", "question": "3. 해난구조로 인한 선박에 대한 구조료 채권과 공동해손의 분담에 대한 채권", "answer": "4. 선박의 충돌과 그 밖의 항해사고로 인한 손해, 항해시설ㆍ항만시설 및 항로에 대한 손해와 선원이나 여객의 생명ㆍ신체에 대한 손해의 배상채권\n②제1항의 우선특권을 가진 선박채권자는 이 법과 그 밖의 법률의 규정에 따라 제1항의 재산에 대하여 다른\n채권자보다 자기채권의 우선변제를 받을 권리가 있다. 이 경우 그 성질에 반하지 아니하는 한 「민법」의 저당권에 관한 규정을 준용한다.\n선박우선특권(Maritime Lien)은 해운업계에서 매우 강력한 법적 권리입니다. 쉽게 말해 **\"배가 빚을 지고 있다면, 그 배가 누구에게 팔리든 상관없이 채권자가 배를 압류해서 빚을 받아낼 수 있는 권리\"**입니다.\n법적으로는 '법정담보물권'이라고 부르며, 등기부등본에 기재되는 저당권보다도 우선순위가 높은 경우가 많아 매우 중요하게 다뤄집니다.\n선박우선특권의 4가지 주요 채권 (상법 제777조)\n제시해주신 법조문을 바탕으로 실무적인 의미를 더해 4가지로 분류하면 다음과 같습니다.", "id": 732}, {"category": "해상법!", "question": "1. 공익비용 및 항구 비용 (보존 채권)", "answer": "내용: 채권자 전체의 이익을 위한 소송비용, 세금(관세 등), 도선료•예선료, 마지막 입항 후 배를 유지하기 위해 쓴 비용 등.\n이유: 배를 안전하게 항구에 묶어두고 관리해야 나중에 배를 팔아서 다른 사람들도 돈을 나눠 가질 수 있기 때문에, 이 비용을 1순위로 쳐줍니다.", "id": 733}, {"category": "해상법!", "question": "2. 선원의 고용 관계 채권 (생존권 채권)", "answer": "내용: 선원 및 선박 사용인의 임금, 퇴직금, 재해보상금 등 고용 계약에서 발생한 돈.\n이유: 선원들의 노동력은 선박 운항의 핵심이며, 이들의 생존권을 최우선으로 보호하겠다는 사회정책적 목적이 강합니다.", "id": 734}, {"category": "해상법!", "question": "3. 구조료 및 공동해손 분담금 (희생 채권)", "answer": "내용: 위험에 빠진 배를 구해준 대가(구조료), 모두의 안전을 위해 화물을 버리는 등 희생을 치른 비용(공동해손).\n이유: 누군가의 희생으로 배가 살아남았기 때문에, 그 덕을 본 배가 우선적으로 빚을 갚는 것이 공정하다는 논리입니다.", "id": 735}, {"category": "해상법!", "question": "4. 불법행위로 인한 손해배상 (피해자 보호 채권)", "answer": "내용: 선박 충돌, 항만 시설 파손, 선원이나 승객의 인명 피해 등에 대한 배상금.\n이유: 사고 피해자를 신속하게 구제하기 위함입니다. 다만, 유류오염 손해배상처럼 별도의 특별법이 적용되는 경우는 제외될 수 있습니다.", "id": 736}, {"category": "해상법!", "question": "55. ITC Hull 의 면책요건 (해상보험에서 커버 안되는 4가지는?)", "answer": "1) 전쟁면책(WAR EXCLUSION)\n이 보험계약에서는 어떠한 경우에도,\n23.1 전쟁. 내란. 혁명. 모반. 반란 또는 이로 인하여 발생하는 시민투쟁 또는 교전세력에 의하거나 교전세력에 대한 적대행위.\n23.2 포획. 나포. 강류. 억지 또는 억류(악행 및 해적을 제외함)및 그 결과 또는 그 기도의 결과\n23.3 유기된 기뢰. 어뢰. 폭탄 또는 기타의 유기된 전쟁무기로 인한 멸실, 손상, 책임 또는 비용을 보상하지 아니한다.\n2) 동맹파업면책(STRIKES EXCLUSION)\n이 보험계약에서는, 어떠한 경우에도,", "id": 737}, {"category": "해상법!", "question": "24.1 노동쟁의, 폭동 혹은 시민소요에 가담한자, 동맹파업자 혹은 직장폐쇄노동자", "answer": "24.2 테러리스트 또는 정치적 동기로 행동하는 자에 의한 멸실, 손상, 책임 혹은 비용은 담보하지 아니한다.\n3) 악의가 있는 행위면책 (MALICIOUS ACTS EXCLUSION)\n이 보험계약에서는 어떠한 경우에도 악의적으로 혹은 정치적동기로 행동하는 자에 의한", "id": 738}, {"category": "해상법!", "question": "25.1 폭발물의 폭발", "answer": "25.2 여하한 전쟁무기로 기인된 멸실, 손상, 책임 또는 비용을 담보하지 아니한다.\n4) 원자력 면책 (NUCLEAR EXCLUSION)\n이 보험계약에서는, 어떠한 경우에도 방사성 또는 방사성 물질 혹은 기타 이와 유사한 반응 혹은 원자력 또는 핵분열 및/또는 핵융합을 응용한 전쟁무기로 인한 멸실, 손상, 책임 또는 비용을 담보하지 아니한다.\n◈ ITC-HULLS : 협회기간약관-선박 [ ITC-Hulls , 協會期間約款-船舶 ]\nInstitute Term Clause - Hulls\n: 세계적으로 선체보험증권의 가장 대표적인 양식으로 많이 사용하는 것은 협회기간약관-선박(ITC-Hulls)로서, 이 약관은 1888년에 영국의 런던보험자협회(ILU, Institute of London Underwriters)의 노력으로 그 동안 각 보험사들이 무질서하게 사용하고 있던 제 보험약관을 통일하여 제정한 것이다.\n이 협회가 제정한 다른 선박보험약관들은 모두 이 ITC-Hulls를 기본으로 하여 변경한 것이고, 이 약관은 가장 기본적인 약관으로 우리나라도 피보험자의 특별한 요구가 없으면 ITC-Hulls 를 그대로 사용하거나 일부 수정하여 사용하고 있다. 협회약관-선박은 1970년 구약관, 1983년 신약관, 1995년 개정신약관 등으로 개정을 하였으며, 현재까지도 1983년 신약관이 보편적으로 사용되고 있다", "id": 739}, {"category": "해상법!", "question": "60. L/I, L/G 란 무엇인가?", "answer": "1) L/I(Letter of indemnity) / 보상장\n: 사고 화물에 대해서 Remark 란에 사고 문언이 없이 Clean B/L 발행을 교부 받기 위하여 화주가 선사에 제출하는 각서이다.\n화물 적재 시 손상된 화물에 대해 화주 측이 책임진다는 내용, L/I 는 Clean B/L 의 발행을 위한 것이고 Clean B/L이란 아무런 Remark 가 달리지 아니한 B/L을 말한다.\n2) L/G(Letter of guarantee ) / 화물 선취 보증서\n: 원본 선하증권(Original B/L) 보다 화물이 먼저 도착했을 때 수화주가 원본 선하증권 대신에 선사에 제시하고 D/O(Delivery Order / 하도 지시서)를 발급받아 화물인도를 받는 보증장으로 반드시 거래은행의 배서가 있어야 효력이 있다. B/L을 소지하지 않은 채 화물 수령을 할 때 책임을 진다는 내용\n3) L/G의 발행 주체는? 수화주\n4) Clean B/L : Remark의 내용의 기록이 없는 B/L을 말한다.", "id": 740}, {"category": "해상법!", "question": "43.L/G, L/I, L/C 발행 주체 및 설명", "answer": "-L/G : LETTER OF GURANTEE지정된 항구에 선적서류가 도착하기 전에 수입품이 도착하여 물품의 인수가 이루어지지 못할 때 수입상은 나중에 선적서류를 제출할 것을 약속하고 거래은행으로부터 받은 보증을 통해 선박회사로부터 물품을 인도받는 것이 가능한데, 수입화물선취보증서는 이러한 상황이 발생한 경우 수입상이 거래은행으로 보증을 받아 선박회사에 내는 증명서를 말한다.\n-L/I: LETTER OF INDEMNITY 손상화물은 화주측 책임으로 하여 CLEAN B/L을 발행함.\n-L/C: LETTER OF CREDIT 신용장은 상품의 수입업자가 자신의 신용을 증명하기 위하여 거래처 은행으로부터 발급받는 보증서이다", "id": 741}, {"category": "해상법!", "question": "1. 신용장(L/C)의 쉬운 개념", "answer": "모르는 사람끼리 국제 거래를 할 때 발생하는 **'불안감'**을 해결해주는 도구입니다.\n수출자: \"물건 보냈는데 돈 안 주면 어떡하지?\"\n수입자: \"돈 먼저 보냈는데 물건 안 오면 어떡하지?\"\n이때 은행이 중간에 서서 **\"수출자야, 네가 서류(물건 보냈다는 증거)만 제대로 가져오면 내가 책임지고 돈 줄게!\"**라고 약속하는 보증서가 바로 신용장입니다.", "id": 742}, {"category": "해상법!", "question": "2. 주요 포인트 정리", "answer": "🔹 상업신용 → 은행신용 (가장 중요한 대목)\n수출자 입장에서는 이름도 모르는 수입업자(상업신용)는 못 믿지만, 세계적으로 유명한 **은행(은행신용)**은 믿을 수 있습니다. 결제 주체가 '수입자'에서 '은행'으로 격상되는 효과가 있습니다.\n🔹 화환어음(Documentary Bill) 관련 (어려워서 빼신 부분)\n이 부분의 핵심은 **\"서류와 돈을 맞바꾼다\"**는 것입니다.\n수출자가 배에 물건을 싣고 받는 선하증권(B/L) 등의 운송서류를 은행에 갖다주면, 은행은 그 서류를 담보로 잡고 수출자에게 돈을 줍니다.\n즉, 은행은 종이(서류)가 곧 물건이라고 생각하고 거래를 진행하는 것입니다.\nL/C(신용장): 거래를 시작할 때 \"내가 돈 줄게\"라고 약속하는 기본 보증서.\nL/G(수입화물선취보증서): L/C 거래 중 서류보다 배가 빨리 왔을 때 쓰는 비상용 보증서.", "id": 743}, {"category": "해상법!", "question": "72. 선박보험과 P&I 보험의 차이 및 P&I 보험에서 보증하는 내용은?", "answer": "1) Protection & Indemnity Club (P&I)에서 보상하는 내용\n해상운송에서 선주들이 서로의 손해를 상호간에 보호하기 위한 보험이다.\n통상의 해상보험에서 담보하지 않은\n① 인명이나 여객에 관한 선주의 손해\n② 선원의 과실에 의해서 발생한 선체 또는\n③ 적하품의 손해 등을 보상해 주는 보험으로 간략히 P&I보험이라고도 한다.\n2) P&I 보험이란?\n: 인명이나 여객에 관한 선주들의 손해 등을 일반 보험회사들이 보상하려 하지 않고 보상하더라도 보험 가입 시 높은 보험료를 요구하므로, 선박소유자들이 공제조합인 P&I클럽을 세우고 만든 일종의 상호보험(mutual insurance)이다. 영국을 위주로 발달하였으며 국제적으로 런던(London)과 뉴캐슬(New Castle) 등 17개의 대형\nP&I클럽이 구성되어 있다. 우리나라에서는 1999년 법률 제5804호로 선주상호보험조합법이 제정·공포되어 1999년 8월 5일부터 시행됨에 따라 2000년 1월 26일 결성된 한국선주상호보험조합(Korea P&I Club)에서 업무를 수행하고 있다", "id": 744}, {"category": "해상법!", "question": "7. P&I 클럽을 설명하시오.", "answer": "1) P&I 클럽이란 Protection & Indemnity Club의 약어로 우리말로는 선주 상호 보험이라고 합니다. 선박충돌 및 인명사상에 대한 보호(protection)와 배상(Indemnity)을 합쳐 P&I Club이라고 합니다.\n상업보험에서 보장해주지 않는 제3자에 대한 배상 부분을 비영리 단체를 조직하여 회원들간에 책임을 공동으로 분담하기 위해서 설립한 단체입니다. 이러한 업무를 선주들이 직접 담당할 수 없으므로 이사회에서 선정한 전문경영업체에 위탁관리 시킵니다.\n2) 선주가 선박을 가지고 운항 사업을 하는 데는 여러 가지 형태의 손해가 많이 발생할 수 있다. 그러나 그 중 선박 자체의 물적 손해와 비용손해의 일부 그리고 충돌손해 배상금 중 일부만을 선박 보험자에게서 보상받을 수 있으므로 그 외의 손해를 예로 들면,\nA. 선원의 사상, 질병으로 인한 제반 비용\nB. 선원 이외의 자의 사상에 대한 배상금\nC. 운송계약상의 화물 배상책임 손해\nD. 제반 항만시설에 가한 손상으로 인한 배상금\nE. 유류오염 손해 배상금 등\n주로 제3자에 대한 배상책임을 무보험 상태로 방치한다면 선주의 운항사업은 대단히 위태로워진다.\n☞ Protection & Indemnity Club (P&I)에서 보상하는 것 3개만 말해라\n해상운송에서 선주들이 서로의 손해를 상호간에 보호하기 위한 보험이다. 통상의 해상보험에서 담보하지 않은 ①인명이나 여객에 관한 선주의 손해, ②선원의 과실에 의해서 발생한 선체 또는 ③적하품의 손해 등을 보상해 주는 보험으로 간략히 P&I보험이라고도 한다.\n인명이나 여객에 관한 선주들의 손해 등을 일반 보험회사들이 보상하려 하지 않고 보상하더라도 보험가입시 높은 보험료를 요구하므로, 선박소유자들이 공제조합인 P&I클럽을 세우고 만든 일종의 상호보험(mutual insurance)이다.\n영국을 위주로 발달하였으며 국제적으로 런던(London)과 뉴캐슬(New Castle) 등 17개의 대형 P&I클럽이 구성되어 있다. 우리나라에서는 1999년 법률 제5804호로 선주상호보험조합법이 제정·공포되어 1999년 8월 5일부터 시행됨에 따라 2000년 1월 26일 결성된 한국선주상호보험조합(Korea P&I Club)에서 업무를 수행하고 있다", "id": 745}, {"category": "해상법!", "question": "2.P&I 보상항목", "answer": "해상보험에서 담보하지 않은,\n-인명이나 여객에 관한 선주의 손해\n-선원과실에 의한 선체손상\n-적하품의 손해 등을 보상", "id": 746}, {"category": "해상법!", "question": "1. Protection Risk", "answer": "-1. 선원의 부상, 질병, 사망\n-2. 선원을 제외한 제3자에 대한 배상책임\n-3. 선원의 송환 및 교대선원 파견비용(단, 그 송환이 계약의 종료나 선주의 계약위반 또는 선박의 매도에\n의한 것은 제외)\n-4. 난파휴업급여\n-5. 선원의 유실물 보상\n-6. 이로에 따른 비용/책임(부상자나 환자의 처리 등을 위하여 이로한 경우)\n-7. 밀항자 및 난민에 관한 보상\n-8. 인명구조\n-9. 타선과의 충돌로 인한 배상책임-1/4\n-10. 항만, 부두, 방파제 등의 고정물, 부유물에 대한 배상책임\n-11. 오염에 따른 배상책임\n-12. 난파선 제거 비용 및 배상책임", "id": 747}, {"category": "해상법!", "question": "2. Indemnity Risk", "answer": "-1. 운송화물의 멸실, 손상 또는 부족손해에 대한 배상책임\n-2. 본선에 선적된 화물에 대한 충돌배상 책임\n-3. 공동해손 분담금 중 화물 또는 선박에 대한 부분\n-4. 벌금", "id": 748}, {"category": "해상법!", "question": "3.충돌사고로 선체 및 부두 손상시 연락할 곳", "answer": "선주, 선박관리회사, 항만청, 대리점, P&I 보험회사", "id": 749}, {"category": "해상법!", "question": "11. 제이슨 약관이란?", "answer": "**제이슨 약관(Jason Clause)**은 해상 사고 시 발생하는 **'공동해손(General Average)'**의 분담 책임을 운송인(선주)에게 유리하게 보호하기 위해 만들어진 중요한 면책 조항입니다.\n요청하신 내용을 바탕으로 핵심 배경과 구조를 정리해 드립니다.", "id": 750}, {"category": "해상법!", "question": "1. 제이슨 약관의 탄생 배경", "answer": "원래 영미법 환경에서는 **\"선박 측의 과실(항해과실 등)로 사고가 발생했다면, 그로 인한 손해를 화주에게 분담하라고 요구할 수 없다\"**는 원칙이 강했습니다. 하지만 선주들은 억울함을 느꼈고, 이를 해결하기 위해 계약서에 \"과실이 있더라도 공동해손을 분담한다\"는 문구를 넣기 시작했습니다.\n사건의 발단: 1912년 'Jason호' 사건에서 미국 대심원이 이 약관의 유효성을 인정하면서 '제이슨 약관'이라는 이름이 붙었습니다.\n취지: 선장의 항해과실로 사고가 났더라도, 그것이 법적으로 면책되는 사유라면 화주도 공동해손 분담금을 내야 한다는 약속입니다.", "id": 751}, {"category": "해상법!", "question": "2. 신제이슨 약관 (New Jason Clause)", "answer": "시대가 변하며 기존 제이슨 약관에 **'구조료'**와 '자매선' 관련 내용이 추가되어 더욱 포괄적인 형태로 발전했습니다.\n구성 요소\n과실 유무와 무관한 분담: 선장이나 해원의 과실(항해과실)로 인해 사고가 발생했더라도, 운송인이 법적 면책 요건을 갖췄다면 화주는 선체 손해 및 비용을 함께 분담해야 합니다.\n자매선 조항 (Sister Ship Clause): 사고가 난 배를 구조한 배가 같은 회사 소속(자매선)일 경우, 남의 배가 구해준 것과 똑같이 구조료를 지급하고 이를 공동해손으로 처리한다는 내용입니다.\n현대 해상운송에서 **선하증권(B/L)**이나 용선계약서에 이 조항이 빠지는 경우는 거의 없습니다.\n\"비록 우리 직원이 실수해서 배가 좌초됐더라도, 법적으로 면책되는 '항해과실' 범위 안이라면 배를 살리기 위해 쓴 비용은 화주 당신도 같이 내야 합니다.\"", "id": 752}, {"category": "해상법!", "question": "1. 전손 (Total Loss)", "answer": "선박이 완전히 파손되거나(실제전손), 수리비가 선박 가액을 초과하여 경제적 가치를 상실한 경우(추정전손)를 보장합니다. 보험의 가장 기본적인 보장 범위입니다.\n2. 분손 및 단독해손 (Partial Loss / Particular Average)\n선박이 완전히 파손되지는 않았지만, 일부가 손상되어 수리가 필요한 경우를 의미합니다. 폭풍우나 화재 등으로 인해 선박의 특정 부위가 파손되었을 때 발생하는 수리비를 보상합니다.", "id": 753}, {"category": "해상법!", "question": "1. 공동해손에 대해 설명하시오.", "answer": "선박과 적하에 공동의 위험이 발생하였을 경우에 그러한 위험을 제거·경감시키기 위해 선체나 적하를 희생\n시키거나 필요한 경비를 지출하는 행위를 공동해손행위라고 하며, 그에 의한 손해와 경비를 공동해손이라고 한다(상법 제865조 내지 제867조). 이러한 공동해손을 분담하도록 하는 것은 공동의 안전을 위한 손해를 공동위험단체를 구성하는 모든 당사자들이 적정한 비율에 따라서 상호분담하는 것이 합리적이라는 데에 그\n근거가 있다.\n공동해손에 관한 국제규칙으로는 요크앤트워프규칙(York-Antwerp Rules)이 있다. 그러나 이 규칙은 법규가\n아니므로 계약서에 요크앤트워프규칙에 따른다는 내용이 삽입되어 있어야만 효력이 발생한다. 세계 각국의\n해상보험증권과 선하증권에는 대부분 그 약관이 삽입되어 있다.", "id": 754}, {"category": "해상법!", "question": "2. 공동해손의 요건", "answer": "1) 공동위험요건\n선박, 화물 및 운임 등이 공동의 위험에 놓여 있어서, 해상 사업이 공동의 위험에 빠져야 한다.\n2) 처분요건\n선장 등이 해상 사업의 공동의 안전을 위하여 고의적, 합리적으로 처분하여야 한다. 처분 행위란 투하, 좌초,\n물 넣기 및 피난 등과 같은 사실 행위와 예선 계약과 같은 법률 행위를 포함한다.\n3) 손해와 비용 요건\n선장 등의 처분 행위로써 선박과 화물 등에 실제로 손해와 비용이 발생해야 한다.\n4) 잔존요건\n이러한 처분의 결과 해상 사업의 재산 중에 일부가 남아 있어야 한다.", "id": 755}, {"category": "해상법!", "question": "3. 공동해손이 영어로 왜 general average인가?", "answer": "-General average에서 average란 해손을 뜻하며, 어원은 스페인의 아라곤 왕에 의해 집대성된 해사관습법인 Comsolato del Mare에 기록된 용어 avaries 또는 averies로부터 유래했습니다.\nAveries는 “개인들의 화물이 각각 지불해야만 하는 비용”이라는 의미로 사용되었는데, 이탈리아어의 avaria(해손), 스페인어의averia(해손)로 계승되었으며, 이를 average라고 했습니다. 결국 average는 분실 또는 소실된 물품에\n대한 ‘공동 분담금’인 셈이다.", "id": 756}, {"category": "해상법!", "question": "4. 공동해손은 누가 분담하는가?", "answer": "공동해손이 발생하게 되면 공동해손채무자들이 공동해손을 균등하게 분담하게 되는데 이러한 절차를 공동해손의 정산(精算)이라 한다. 공동해손의 정산은 공동해손채무액과 공동해손채권액의 비율인 공동해손분담률에 의한다(866조). 공동해손의 정산은 다른 특약 또는 관습이 없는 한 선장이 이를 담당하며 공동해손정산서에 의한다. 정산지는 특약이 없는 한 최후의 적하의 양륙항이다(867조, 869조). 정산은 늦어도 양륙항에서 운송물을 수하인에게 인도할 때까지는 종료되어야 한다.", "id": 757}, {"category": "해상법!", "question": "5. 공동해손 예시", "answer": "①희생손해(General Average Sacrifice)\n가. 투하\n나. 투하행위로 인한 해수침\n다. 선박화재 소화에 따른 손실\n라. 임의 좌초에 의한 손해\n마. 이초를 위하여 기관을 과도하게 사용함으로써 생긴 손해\n바. 좌초된 선박을 가볍게 하기 위한 행위로 인한 손해\n사. 연료로서 사용한 선구 및 저장품\n아. 피난항에서 하역 작업 중에 발생하는 손해\n자. 운임의 손실\n②비용손해(General Average Expenditure)\n가. 구조비\n나. 선박이 좌초된 경우 선박을 가볍게 하기 위해 발생된 비용\n다. 피난항 비용\n라. 임시수리비\n마. 자금 조달비\n바. 대체비용\n[추가 질문] 공동해손은 어떤 법에 의해 적용받는가?\n상법\n[추가 질문] 공동해손에 관련된 국제협약은 무엇인가?\n요크앤트워프규칙(York-Antwerp Rules)\n[추가 질문] 클레임 처리\n①선주는 정산인을 선임하고 화물 인도전까지 화주에게 공동해손을 선언(G.A. Declaration)\n②정산처리를 선주에게 일임할 것과 정산결과에 따라 분담금을 지급할 것을 약속케 하는 공동해손 맹약서(G.A. Bond)에 화주가 서명해 줄 것을 요청하고, 공동해손 채권보전을 위하여 공동해손 공탁금(G.A. Deposit) 또는 무제한 보증장(Unlimited Guarantee)을 징구\n③선박관련 문제 및 화물관련 문제가 모두 처리될 수 있도록 선체보험자와 P&I Club에 동시에 통지하고 선임된 해손정산인과 긴밀히 협조함\n[추가 질문] 요크앤트워프규칙에 대하여 설명하시오.\n1) 요크앤트워프규칙(York-Antwerp Rules)이란?\n해상보험에 있어 공동해손에 관한 세계 각국의 관습과 법이 상이한 경우가 많았으며, 또한 공동해손의 발생시\n각 국가별로 이해관계가 배치되는 경우가 많았기 때문에 공동해손에 관한 규칙을 세계적으로 통일하자는\n운동이 1860년에 개시되어 1864년 York에서 York규칙 11개 조항이 채택되었고, 1877년 Antwerp회의에서 12개 조의 공동해손규칙을 제정하였는데, 이것은 York규칙에 기초를 둔 것이므로 York-Antwerp Rules이라 부른다.\n2) 요크앤트워프규칙에 의한 공동해손 정산\n공동해손이 발생하면 공동해손정산인에 의해 별도의 규정이 없는 한 양륙항에서 공동해손정산이 이루어지며,\n공동해손을 정산하기 위해서는 먼저 공동해손배상액과 공동해손분담가액을 산정한 후 공동해손배상액의 총액을 공동해손 분담가액의 총액으로 나누어 공동해손분담률을 구해야 한다. 분담률을 각각의 공동해손분담가액에 곱하면 각 당사자들이 분담해야 할 공동해손분담금(general average contribution)이 결정된다.\n[추가 질문] 공동해손으로 인해 선박은 손해의 몇%를 배상해야 하나요?\n요크앤트워프규칙(York-Antwerp Rules) 제G조에서는 ‘공동해손이 되는 희생 및 비용은 각종 분담 이익에 의해\n분담되며 공동해손은 손실 및 분담액에 관하여 항해가 끝나는 때와 장소에 있어서의 가격에 따라 정산된다’라고 규정하고 있다. 따라서 공동해손이 발생하면 공동해손정산인(general average adjuster)에 의해 별도의 규정이\n없는 한 양륙항에서 공동해손정산이 이루어진다.\n공동해손을 정산하기 위해서는 먼저 공동해손배상액과 공동해손분담가액을 산정한 후 공동해손배상액의 총액을 공동해손 분담가액의 총액으로 나누어 공동해손분담률을 구해야 한다. 이 분담률을 각각의 공동해손분담가액에 곱하면 각 당사자들이 분담해야 할 공동해손분담금(general average contribution)이 결정된다.\n1) 공동해손배상액\n공동해손배상액은 공동의 위험으로부터 벗어나기 위하여 희생된 손해나 지출된 경비로서 실제로 발생한\n공동해손의 총액을 말한다. 공동해손배상액은 공동해손 희생손해와 공동해손 비용손해로 구분되는데, 후자는\n지출한 금액을 기준으로 하기 때문에 쉽게 배상금액을 결정할 수 있다. 그러나 공동해손 희생손해는 선박, 화물, 운임 등에 발생한 손해이기 때문에 그 금액을 결정하는데 많은 어려움이 따른다.\n2) 공동해손분담가액\n공동해손배상액이 결정되면 항해에 관련되는 모든 당사자들이 이 손해액을 균등하게 분담해야 하는데, 이때 적용되는 분담기준을 공동해손분담가액이라한다. 공동해손분담가액은 항해가 종료되는 시점에서의 실제 순가액(actual net value)에 따라 결정된다. 그리고 실제 순가액에 공동해손배상액이 포함되어 있지 않으면 이를 가산한다.\n3) 공동해손분담금\n공동해손이 발생했을 경우 각 당사자들이 자신의 공동해손분담가액에 따라서 실제 부과하는 금액을 공동해손분담금이라 한다. 공동해손분담금을 결정하기 위해서는 먼저 공동해손분담률를 구하여야 하는데, 이는 공동해손배상액의 총액을 공동해손분담가액의 총액으로 나눈 것이다. 공동해손분담률이 산정되면 그 분담률을 각각의 공동해손분담가액에 곱하면 각 당사자들이 분담할 공공해손분담금이 된다.\n[추가 질문] 공동해손에서 운송인과 화주의 책임은 어디까지인가?\n운송인은 손해의 원인이 된 사고를 회피하기 위하여 합리적으로 조치를 취하였다는 것을 증명할 책임이 있으며, 화주가 자신의 책임과 비용으로 화물을 적재한 경우 손해의 원인이 화물에 없었음을 증명할 책임이 있다.\n[추가 질문] 공동해손 유한책임이란 무엇인지 설명하시오.\n유한책임(선주책임제한)이란?\n선박소유자의 책임제한제도는 해상에서의 사고나 운송의 지연으로 선박소유자가 책임을 100% 다 지는 것이\n아니라 규정된 일정한도 이내로만 책임을 지는 것이다. 과거부터 해상기업은 변화무쌍한 바다에 대해 위험에\n노출되어 있고 한번 사고가 발생하면 피해가 심각하기 때문에 그에 따른 손해배상을 다 해주다가는 단 한번의 사고로 인해 파산할 수도 있기 때문이다. 책임제한제도는 해상무역을 하는 기업을 보호하기 위한 목적으로 생긴 제도이다.", "id": 758}, {"category": "해상법!", "question": "3. 공동해손 (General Average)", "answer": "선박과 화물의 공동 위험을 면하기 위해 선장이 선박이나 화물의 일부를 의도적으로 희생시킨 경우(예: 배를 가볍게 하기 위해 화물을 바다에 버림) 발생하는 손해를 말합니다. 이때 발생한 손해와 비용을 이해관계자들이 분담하게 되는데, 선주가 부담해야 할 몫을 보험에서 보상합니다.", "id": 759}, {"category": "해상법!", "question": "4. 구조비 및 충돌손해배상 (Salvage Charges & R.D.C.)", "answer": "구조비: 사고 발생 시 타인에 의해 선박이 구조되었을 때 지급해야 하는 비용입니다.\n충돌손해배상(Running Down Clause): 우리 배가 다른 배와 충돌하여 상대방 선박이나 화물에 손해를 입혔을 때, 그 배상 책임(통상 3/4 또는 4/4)을 보장합니다.", "id": 760}, {"category": "해상법!", "question": "5. 특약 위험 (War and Strike)", "answer": "일반적인 해상 사고 외에 전쟁, 내란, 파업, 소요 사태 등으로 인해 발생하는 손해를 보장합니다. 이는 보통 기본 약관에서 제외되는 경우가 많아, 별도의 담보 조건을 통해 보장받습니다.", "id": 761}, {"category": "해상법!", "question": "1. 선박 자체 손해(선체·기관의 전손/분손)", "answer": "-전손(Total Loss) 및 분손(Partial Loss) 포함(약관에 따름).\n구조료/구조비(Salvage, Salvage charges)\n-전손담보(Total Loss Only) 약관에서도 보통 “including salvage/sue and labour” 형태로 포함되는 예가 있습니다.\n손해방지비용(Sue and Labour)\n-사고 확대를 막기 위해 지출한 비용을 약관 범위 내에서 인정하는 구조(약관 문언에 따름).\n공동해손 분담금(General Average contribution)\n-공동해손은 선박/적하 보험에서 함께 중요한 영역으로 취급됩니다(약관에 따라 담보).\n충돌책임(RDC: Running Down Clause)\n-상대선박에 대한 충돌 손해배상책임을 선박보험에서 일정 비율(전통적으로 3/4, 요즘은 4/4까지도) 담보하는 구조로 설명됩니다.\n전쟁·스트라이크는 위 5가지 “기본 담보”라기보다, 보통 **별도 담보(워/스트라이크 약관)**로 추가한다고 쓰는 게 안전합니다\n① 전손담보(Total loss only): 개념 자체는 맞습니다.\n⑤ 전쟁 및 스트라이크 담보: 가능은 하나, 보통 별도 War & Strikes 약관으로 붙인다고 표현을 바꾸는 게 정확합니다.\n②~④(F.A.A.S/C, F.P.A., excess 10% P.A.): 교재에 그렇게 쓰여 있을 수는 있지만, 표준 선박약관 설명으로는 용어가 섞여 보이므로 “ITC-Hulls(1/10/83) 등 선박약관 + 필요 시 TLO / War&Strikes 추가”로 재정리해 두는 게 감점 방지에 유리합니다", "id": 762}, {"category": "해상법!", "question": "4.항해용선 관련 GROSS TERM, NET TERM 차이, FO FIO FI? 상세", "answer": "1) Berth Term\n운송인이 화물 적재항에서부터 양하항간에 발생하는 제반 비용과 위험 부담을 책임지는 하역조건을 말한다. 주로 정기선 운항에서 많이 적용하는 하역비 부담조건이다.\n2) F.O(Free Out)\n선적은 선주의 책임과 비용으로, 양륙은 화주의 책임과 비용으로 이루어지는 조건이다.\n3) F.I.(Free In)\n선적은 화주의 책임과 비용으로, 양륙은 선주의 책임과 비용으로 이루어지는 조건이다.\n4) F.I.O.(Free In and Out)\n화물의 적․양화에 필요한 거의 모든 하역비를 용선주가 부담하는 조건을 말한다. 화물의 본선적재(in)와 본선으로부터의 화물양륙(out)등의 비용은 선주의 비용부담에서 제외하고, 화주의 부담으로 하는 것을 의미한다. 이것은 주로 부정기용선에 채택된다. 정기선의 berth term과 대비되는 용어이다.\n5) Net Term\n적양하 시 적양하 하역비, 항비 및 연안부선사용비 일체를 용선자가 부담하는 조건\n6) Gross Term\n적양하 시 적양하 하역비, 항비 및 연안부선사용비 일체를 운송인이 부담하는 조건", "id": 763}, {"category": "해상법!", "question": "38. 해약일", "answer": "계약서상의 기일까지 본선이 적하지에 도착하지 아니하고 또 적하준비가 끝나지 아니하였을 때는 화주는 무상으로 계약을 해제할 수 있다. 만약 계약서에 해약일을 적하준비예정일 후 몇일씩으로 정하여 두었다면 그날이 해약일이다", "id": 764}, {"category": "해상법!", "question": "3. Off-hire 설명하시오.", "answer": "Off-hire 조항은 선주책임으로 인하여 어떠한 특정한 상황이 발생하여 운항 불가로 시간손실이 발생한 경우 그 발생한 시간손실을 용선료에서 공제하기로 약정한 조항이다. 용선 기간 중에 선주측의 책임에 귀속되는 사고\n혹은 사정에 의해 선박이 통산 24시간 이상 계속 사용 불능인 경우, Off hire가 30일 이상일 경우 계약을\n무상해제 할 수 있다.\nOff-hire 조항은 선주책임으로 인하여 어떠한 특정한 상황이 발생하여 운항 불가로 시간손실이 발생한 경우 그 발생한 시간손실을 용선료에서 공제하기로 약정한 조항이다. 용선 기간 중에 선주측의 책임에 귀속되는 사고\n혹은 사정에 의해 선박이 통산 24시간 이상 계속 사용 불능인 경우, Off hire가 30일 이상일 경우 계약을\n무상해제 할 수 있다.\n*Off-Hire의 요건으로는\n1) 미래에 요구되는 Service에 대한 Full working이 아니고 “당시에” 요구되는 Service가 방해 받는 경우임. 즉\n양하 중 엔진 손상은 본선의 working이 전혀 방해 받지 않았기 때문에(즉 실제 시간 손실이 없음) Off-Hire 처리 불가능하다.\n2) 또한 본선의 Full Working 방해 받았는지 여부는 외부 요인에 의한 방해는 해당되지 않고 본선자체의 요인(Condition of the ship itself)에 의해 결정됨. 외부의 요인(Some wholly extraneous event)에 의한 시간손실은\n기본적으로 Off-hire 되지 않음. 즉 본선 크레인이 고장으로 양하 작업이 중단된 것은 Off-Hire 가능하나 Panama 통과시 Over-draft되는 경우 외부에 의한 방해이기 때문에 Off-Hire 불가능하다.\n3) 단, “Any other cause” 다음에 “whatsoever”가 추가된 경우 Ejusdem Generis Rule 적용이 배제되어, 본선자체의 요인 뿐만 아니라 External 요인에 의한 경우도 Off-hire 가능하다.\nOff Hire에 적용되는 상황 5가지를 말하시오.\n1) 본선인원부족(Deficiency of Men):\n예외) 선원이 부족하더라도 최소 승무원 이상 승선하고 정상 운항이 가능한 경우는 Off Hire 아님\n2) 선체/기기 또는 장비의 고장 또는 손상(Breakdown or Damage to Hull, Machinery or Equipment)\n3) 선박 또는 화물에 손해를 끼친 사고로 인한 선박 억류\n4) 선박 검사 또는 선저 도장을 위한 dry dock\n5) 선박이 운용될 수 없는 다른 어떤 사유 – 화재, 좌초 등\n선박에서 OFF HIRE에 대해 설명해 주세요. Anyother cause, whatsover 이것도 관련있나요?\n선박 용선 계약(Time Charter)에서 **오프-하이어(Off-Hire)**는 선박을 사용할 수 없는 상태가 되어 용선료(Hire) 지급이 중단되는 기간을 의미합니다.\n쉽게 말해, 배를 빌린 사람(용선자)이 \"배가 고장 나거나 문제가 생겨서 제대로 못 썼으니, 그 시간만큼은 월세를 못 내겠다\"라고 선언하는 것입니다.", "id": 765}, {"category": "해상법!", "question": "1. Off-Hire의 기본 개념", "answer": "정기용선 계약에서 선주는 선박을 상시 가동 가능한 상태로 유지할 의무가 있습니다. 만약 선주의 책임 사유나 선박 자체의 결함으로 운항이 중단되면 그 기간만큼 용선료 지급 의무가 정지됩니다.\n주요 발생 사유:\n선박 고장: 엔진 결함, 크레인 고장 등\n수리 및 검사: 정기 수리(Dry-docking) 또는 선급 검사\n선원 문제: 선원의 파업, 부상으로 인한 회항(Deviating)\n해난 사고: 좌초, 충돌로 인한 수리 기간", "id": 766}, {"category": "해상법!", "question": "2. \"Any other cause whatsoever\"의 의미와 중요성", "answer": "질문하신 **\"Any other cause whatsoever\"**는 Off-Hire 조항(주로 NYPE 서식 15번 등)에서 매우 핵심적인 문구입니다.\n왜 중요한가요?\n일반적인 계약서에는 Off-Hire 사유를 나열합니다(예: 고장, 결함, 파업 등). 하지만 세상에는 예상치 못한 수만 가지 사고가 있죠. 이때 **\"Any other cause\"**라는 문구가 있으면 리스트에 없는 사유라도 \"다른 모든 원인\"에 포함될 가능성이 생깁니다.\n\"Whatsoever\"의 마법\n법적으로 **Ejusdem Generis(동종 제한의 원칙)**라는 규칙이 있습니다. \"A, B, C 및 기타 원인\"이라고 하면, 그 '기타'는 A, B, C와 비슷한 성격이어야만 한다는 규칙입니다.\nWhatsoever가 없을 때: \"엔진 고장, 선박 수리 및 기타 원인\" → 날씨 때문에 배가 못 가는 건 '기타'에 포함 안 됨 (수리와 성격이 다름).\nWhatsoever가 있을 때: 이 원칙을 무력화합니다. \"원인이 무엇이든 간에(Whatsoever)\" 선박을 못 썼다면 Off-Hire로 간주할 범위를 비약적으로 넓혀줍니다.\n결론적으로: > 이 문구는 용선자(빌리는 사람)에게 매우 유리한 문구입니다. 선박 가동 중단의 원인이 선주의 관리 영역에 있다면, 그것이 계약서에 명시되지 않은 특이한 상황이라도 Off-Hire를 주장할 강력한 근거가 됩니다.", "id": 767}, {"category": "해상법!", "question": "3. 실제 상황 예시", "answer": "전염병(코로나19 등): 선원이 감염되어 격리되느라 배가 멈췄을 때, \"Any other cause whatsoever\"가 있다면 용선자는 Off-Hire를 주장하기 훨씬 수월합니다.\n사고로 인한 경로 이탈: 해적 피랍이나 사고 조사를 위해 멈춘 경우에도 이 문구가 분쟁 해결의 핵심이 됩니다.\n💡 요약하자면\nOff-Hire는 \"배를 못 쓴 만큼 돈을 안 내는 것\"이고, **\"Any other cause whatsoever\"**는 \"그 이유가 무엇이든 간에 배를 못 썼다면 돈을 안 내겠다\"라고 범위를 확대한 용선자 보호 장치입니다.\nOff hire에서 계약무효화는 어떤 요건이 필요한가요?\n선박 용선 계약에서 Off-Hire(오프-하이어) 자체는 일시적인 용선료 지급 정지를 의미할 뿐, 그 자체로 계약이 즉시 무효화(Termination/Cancellation)되지는 않습니다.\n하지만 Off-Hire 상태가 너무 길어지거나 특정 조건을 충족하면 용선자(Charterer)는 계약을 해지할 권리를 갖게 됩니다. 이를 위해 필요한 주요 요건은 다음과 같습니다.", "id": 768}, {"category": "해상법!", "question": "1. 계약서상 '해지권(Cancellation Clause)' 행사", "answer": "가장 명확한 요건은 계약서에 명시된 특정 기간을 초과하는 것입니다.\n최대 허용 기간 초과: 많은 용선 계약서에는 \"선박이 연속으로 30일 또는 60일 이상 Off-Hire 상태일 경우, 용선자는 계약을 해지할 수 있다\"라는 조항(Breakdown Clause)을 삽입합니다.\n특정 날짜 도과: 특정일까지 선박이 수리를 마치고 복귀하지 못하면 계약을 종료할 수 있는 권한이 생깁니다.", "id": 769}, {"category": "해상법!", "question": "2. 이행 불능 (Frustration of Purpose)", "answer": "법적으로 계약의 목적을 달성할 수 없는 상태가 되었을 때 적용됩니다.\n본질적 불가능: 선박이 심각한 사고로 침몰하거나, 수리 비용이 선박 가치보다 많이 들어 전손(Total Loss) 처리될 경우 계약은 자동으로 종료됩니다.\n상업적 목적 상실: 수리 기간이 너무 길어져서 원래 계약했던 항차나 화물 운송의 상업적 가치가 완전히 사라진 경우(Frustrated)입니다. 다만, 법원에서는 이를 매우 엄격하게 판단합니다.", "id": 770}, {"category": "해상법!", "question": "3. 중대한 계약 위반 (Repudiatory Breach)", "answer": "선주(Owner)가 선박을 가동 가능한 상태로 유지해야 하는 의무를 근본적으로 저버렸을 때입니다.\n감항성(Seaworthiness) 결여: 선주가 선박 수리를 고의로 지연하거나, 선박의 결함이 너무 심각해 안전한 운항이 영구적으로 불가능하다고 판단될 때 용선자는 계약 해지를 요구할 수 있습니다.\n이행 거절: 선주가 \"더 이상 배를 고치지 않겠다\"거나 \"계약을 이행할 의사가 없다\"고 명시적/묵시적으로 드러낼 경우입니다.", "id": 771}, {"category": "해상법!", "question": "4. Off-Hire 관련 분쟁 해결 구조", "answer": "Off-Hire 상황에서 계약 해지까지 가는 과정은 보통 아래와 같은 단계로 판단됩니다.\n사건 발생: 고장, 사고 등으로 선박 가동 중단.\nOff-Hire 산정: 순수하게 \"시간적 손실(Net Loss of Time)\"을 계산하여 용선료 차감.\n임계점 도달: 계약서에 명시된 해지 가능 기간(예: 20~30일) 초과 여부 확인.\n해지 통보: 요건 충족 시 용선자가 선주에게 공식적인 계약 종료 통보.\n⚠️ 주의사항\n용선자가 정당한 사유 없이 Off-Hire를 근거로 성급하게 계약을 해지하면, 오히려 선주로부터 손해배상 청구를 당할 수 있습니다. 따라서 \"Any other cause whatsoever\" 문구만큼이나 **'계약 해지권 유보 조항'**이 계약서에 어떻게 명시되어 있는지 확인하는 것이 가장 중요합니다.\n현재 선박의 Off-Hire 기간이 어느 정도 지속되고 있나요? 구체적인 기간이나 사고 원인을 알려주시면 해당 상황이 '계약 해지' 사유에 근접한지 더 자세히 짚어드릴 수 있습니다.\n24시간 만에 해지할 수 있는 조건도 있나요?\n일반적인 정기용선 계약(Time Charter) 관례에서 단순히 24시간 동안 배가 멈췄다고 해서 계약 전체를 해지(Termination)할 수 있는 조건은 거의 없습니다. 보통 24시간은 '용선료 지급 정지(Off-Hire)'가 시작되는 최소 단위로 쓰이는 경우가 많습니다. 하지만 예외적으로 24시간 내외의 짧은 시간 안에 계약 해지가 가능해지는 '특수한 상황'은 존재합니다.", "id": 772}, {"category": "해상법!", "question": "1. 24시간과 관련된 혼동: Off-Hire vs Cancellation", "answer": "대부분의 용선 계약서(NYPE 등)에는 다음과 같은 취지의 조항이 있습니다.\n\"12시간 또는 24시간 이상 가동 중단 시, 그 시간만큼 용선료를 내지 않는다.\"\n이것은 돈을 안 내는 조건이지, 계약을 깨는 조건이 아닙니다. 계약 해지는 보통 연속 30일~60일 이상의 장기 중단이 필요합니다.", "id": 773}, {"category": "해상법!", "question": "2. 24시간 만에 '계약 해지'가 가능한 특수 요건", "answer": "만약 계약서에 별도의 **특약(Typed Clause)**을 넣었다면 가능합니다. 다음과 같은 경우입니다.\n① 특정 기간 내 수리 완료 보장 (Guaranteed Repair Period)\n계약서에 \"선박 고장 발생 시 24시간 이내에 수리가 완료되지 않으면 용선자는 즉시 계약을 해지할 권리를 갖는다\"라는 강력한 특약이 있는 경우입니다. (보통 선박 공급이 과잉일 때 용선자가 유리하게 설정합니다.)\n② 레이데이(Laycan) 위반 (Cancellation Date)\n배를 처음 빌리기로 한 날(Laycan 기간)의 마지막 날 자정까지 배가 도착하지 않았거나, 도착했더라도 24시간 이내에 검사를 통과(Ready)하지 못하면 용선자는 즉시 계약을 취소할 수 있습니다. 이는 Off-Hire와는 별개의 **'용선 개시 전 해지권'**입니다.\n③ 중대한 감항성 위반 (Fundamental Breach)\n단 1시간이라도 배가 멈췄는데, 그 원인이 **\"이 배는 도저히 수리가 불가능하고 앞으로도 운항할 수 없다\"**는 것이 명백해진 경우입니다.\n예: 엔진 폭발로 선박이 완파됨 (전손 처리)\n이 경우 24시간을 기다릴 필요 없이 계약은 **이행 불능(Frustration)**으로 즉시 종료됩니다.\n④ 전쟁 및 금수 조치 (War/Sanction Clause)\n선박이 특정 국가의 제재 명단에 오르거나 전쟁 지역에 억류되어 24시간 이상 이동이 금지될 경우, 안전상의 이유로 즉시 계약을 해지할 수 있다는 조항이 있을 수 있습니다.", "id": 774}, {"category": "해상법!", "question": "3. 실무적인 조언", "answer": "만약 24시간 정도의 짧은 Off-Hire를 이유로 계약 해지를 시도하시려는 상황이라면 매우 신중해야 합니다.\n용선료 차감: 24시간만큼의 용선료를 깎는 것은 당연한 권리입니다.\n해지 위험: 명확한 '24시간 해지 특약' 없이 계약을 깨버리면, 선주로부터 불법 해지에 따른 거액의 손해배상 청구를 받을 위험이 큽니다.\nTip: 지금 보고 계신 계약서의 **'Breakdown Clause'**나 **'Cancellation Clause'**에 구체적으로 몇 일(Days) 혹은 몇 시간(Hours)이 기재되어 있는지 확인해 보세요. 보통은 'Consecutive 30 days'(연속 30일)처럼 긴 기간이 적혀 있을 것입니다.", "id": 775}, {"category": "해상법!", "question": "29.감항성이란 무엇이며 종류 적용", "answer": "-선박,기관,속구 및 선원을 갖추고, 주부식 연료 기타 소모품을 갖춰 항해를 마칠수 있는 능력\n1) 선체 능력 : 안전 항해\n2) 감하 능력 : 안전하게 운송\n3) 인적 감항럭 : 인적 능력", "id": 776}, {"category": "해상법!", "question": "5. 선박의 감항능력에 관하여 설명하세요.", "answer": "1) 정의: 해상운송에 있어서 선박이 통상의 위험을 견디고 안전한 항해를 하기 위하여 필요한 물적, 인적 준비를 갖추어 그 항해를 성취 할 수 있는 능력이며, 감항능력을 선박회사가 담보하는 시기는 발항당시이다.\n2) 종류: 선체능력, 감하능력, 항해능력\n[추가 질문] 선체능력, 감하능력, 항해능력을 차례대로 설명하시오.\n1) 선체능력(船體能力, physical seaworthiness)\n기관(機關) · 조타장치(操舵裝置) · 배수설비(排水設備) 등의 설비를 적정하게 갖추어 통상의 위험을 견디고, 안전한 항해를 할 수 있는 선박의 물적능력(物的能力) · 협의(狹義)의 감항성이라고 한다.\n2) 감하능력(堪荷能力, cargoworthiness)\n화물을 운송하기 위한 적재시설을 갖추어 운송하기로 예정된 화물을 안전하게 운송할 수 있는 능력\n3) 항해능력(航海能力, navigability)\n선박을 안전하게 항해하는데 필요한 자격을 갖춘 선장 및 선원 등을 적정하게 갖추어 통상의 위험을 견디고, 안전한 항해를 할 수 있는 인적능력(人的能力)과 선박의장을 비롯한 필요품의 공급", "id": 777}, {"category": "해상법!", "question": "62. 해상운송계약상 묵시적 의무(Implied Obligation)", "answer": "해상운송계약상 운송인과 용선자는 계약당사자가 운송계약서에서 명시적으로 약정한 내용 이외에도 일정한 묵시적 의무를 각각 부담한다.\n첫째, 감항능력(seaworthiness)이 있는 선박을 제공할 의무이다. 이는 선박이 발항 당시에 모든 측면에서 항해에 적합한 상태에 있어야 한다는 것으로 물리적 상태 뿐만 아니라 선원의 수와 질, 보급품의 양과 질, 화물의 수령,운송,보존 능력에서 적합해야 함을 의미한다.\n둘째, 선적항으로 상당히 신속하게(with reasonable dispatch) 항해해야 할 의무이다.\n셋째, 선적항에서 양륙항으로 항해 도중에 이로(deviation)하지 아니할 의무이다. 다만, 인명을 구하기 위한 이로, 선박과 화물의 안전을 위한 이로 등은 정당한 이로로 인정된다.\n묵시적 수락 절차에 대해 말하시오.\n묵시 담보(의무 아님) 에 의미 및 설명", "id": 778}, {"category": "해상법!", "question": "44. 묵시의무란 무엇인가?", "answer": "해양운송계약에 있어서 운송인으로서 지키지 않으면 안될 묵시의 의무\n1)본선을 감항능력에 있는 상태에 둘 것\n2)선적이 완료되면 즉시 출항하여 계약된 항해를 신속히 수행할 것\n3)부당한 이로를 하지 말 것.\n용선자는 2가지 묵시적 의무를 부담한다\n첫째, 안전항구(safe port)를 지명하여야 할 의무이다.\n둘째, 위험화물(dangerous goods)을 싣지 아니할 의무이다.", "id": 779}, {"category": "해상법!", "question": "58. 거증책임에 대해 설명하시오.", "answer": "운송인이 면책사유를 이유로 그 무책임을 주장하는 경우 그 항변을 물리치기 위하여 화주측은 운송인측의\n과실을 입증할 책임이 있다. 그러나 상기 마지막 포괄적인 사유에서 운송인이 책임을 면하기 위해 운송인측에서 무과실을 입증하여야만 한다.\n또한 선적화물의 손해가 이상의 주의 의무를 다하지 아니하였기 때문에 발생하였다는 화주측의 주장이 있을\n경우 선박회사가 의무를 이행한 거증자료를 제시하지 못하면 배상책임을 지게 된다.\n[추가 질문] 거증책임을 할 수 있는 전제 조건 3가지를 말하시오.\n1) 감항능력 담보 의무 이행\n2) 선적화물에 관한 주의 의무 이행\n3) 선박회사 측에서 상당한 주의를 했으며 과실이 없었다는 거증의무를 입증", "id": 780}, {"category": "해상법!", "question": "59. 소손해 면책약관에 대해 설명하라.", "answer": "보험자가 보험계약에서 정한 담보위험에 따른 손해가 발생하여 보험금을 지급해야 할 경우에도 일정한도 이하의 손해에 대해서는 보험자가 부담하지 않고 피보험자가 부담케하는 것을 소손해면책 또는 소손해면책율이라 한다. 소손해 처리에 따른 비용과 시간을 절감하고 보험료를 절감하게 하는데 목적이 있다.", "id": 781}, {"category": "해상법!", "question": "60. 운송인이 화물의 손상에 대해서 책임을 지는 경우는 어떠한 경우인가?", "answer": "운송인은 그가 인수한 운송화물에 관한 업무(선적, 적부, 관리, 취급, 보관, 인도 등)를 수행함에 있어서 자신 또는\n그의 이행보조자가 주의의무를 게을리 하여(상사과실로) 화물이 멸실, 훼손 또는 연착되어 손해가 발생하였다면\n운송인은 이를 배상할 책임이 있다.\n(상법 제799조 1항, 제839조 1항, 헤이그규칙 제2조 8항)", "id": 782}, {"category": "해상법!", "question": "61. Neglience가 무엇인지 말하시오.", "answer": "규칙의 규정을 지키는 일의 태만 또는 선원의 상무로서 혹은 그 경우의 특수한 상황에 의하여 요구되는 주의의\n태만", "id": 783}, {"category": "해상법!", "question": "53. 갑판상 화물 소실 시 면책조건에 대해 설명하시오.", "answer": "1) 갑판적화물\n선박에서 갑판 상에 적재되어 운송되는 화물을 말한다. 컨테이너 전용선에 의한 갑판적 운송인 경우를 제외하고 화주와 합의가 있었거나 관습적으로 허용되는 경우가 아닌 한 갑판 상 화물적재는 정상적인 운송이 아니다. 선적화물은 특별한 경우를 제외하고 선창 내에 적재하는 것이 원칙이다. 따라서 갑판 상에 화물을 적재할 경우 운송인과 화주간의 권리의무가 창내적 화물의 경우와 다르다.\n2) 면책 요건\n갑판적 화물은 위험발생의 가능성이 높기 때문에 선주는 그 위험에서 면책되고 있다. 통상 해상보험에서도 이것을 담보하지 않아 이 위험을 담보하려면 특약을 하고 할증보험료를 지급하여야 한다. 갑판적 화물에 대해서는\n미리 선박회사의 양해를 얻어야 하고 경우에 따라 추가운임도 지급해야 하며 모두 수출자의 부담이다.\n*당사자들이 최대의 주의를 기울이더라도 통제할 수 없는 사유 즉, 태풍, 홍수와 같은 천재 및 파업, 전쟁, 혁명과 같은 인재에 의해 종종 운송계약의 이행이 곤란 또는 불가능하게 된다. 이처럼 선의의 계약위반에 의한 억울한 피해를 방지하기 위해 모든 교역국들은 선주 및 그 사용인의 과실이 없는 화물의 멸실 또는 손상에 대해 책임을 면하게 하는 면책약관을 가지고 있다. Hague-Visby Rules 및 Hamburg Rules이 있다.", "id": 784}, {"category": "해사 법규", "question": "75. EEDI란? (Green Ship 관련하여, SEEMP, MBM 등 같이 알아둘 필요 있음)", "answer": "EEDI(ENERGY Efficiency Design Index)\nEEDI란 선박의연비 효율을 나타내는 지수로 1톤의 화물을 1해상 마일을 운반할 때 나오는 이산화 탄소 배출량\nSEEMP(SHIP ENERGY EFFICIENCY MANAGEMENT PLAN)\n선박에너지효율 관리 계획서", "id": 785}, {"category": "해사 법규", "question": "65. SEEMP, EEDI, EEOI, MBM에 대하여 설명하시오.", "answer": "UN산하 IMO(국제해사기구)는 향후 아무런 조치도 취하지 않을 경우 해운산업의 이산화탄소 배출 비중이 현재 3.3%에서 2050년 최대 18%까지 증가할 것으로 예상하였다. 이에 따라 IMO는 선박 배출 온실가스를 감축하는 3가지 방안으로 SEEMP, EEDI, MBM을 고안해, 이산화탄소 배출량을 2025년부터 30% 줄이는 것을 목표로 설정했다.\n1) SEEMP (Ship Energy Efficiency Management Plan, 선박에너지효율 관리계획)\nIMO에서 온실가스규제 방법 중 하나로 선박별 최적화된 SEEMP 수립 및 선내 비치를 요구하며 선박에서의 자원절약과 에너지 이용 효율화를 요구하고 있다. SEEMP는 현재 운항되고 있는 모든 선박(400gt 급 이상)에 강제 적용 된다. SEEMP는 ‘계획→실행→검사→개선’ 이라는 4단계를 반복적으로 운용함으로써 선대운항에 관한 연료 효율성을 높이는 것이 목적이다. SEEMP는 2013년부터 반드시 선박에 비치해야 한다.\n2) EEDI (Energy Efficiency Design Index, 에너지효율 설계지수)\nEEDI는 선박의 연비효율을 나타내는 지수로 1톤의 화물을 1해상 마일(1해상 마일=1.852km)을 운반할 때 나오는 이산화탄소의 배출량을 말합니다. EEDI 관련 규제는 2013년 이후 건조되는 선박에 적용되는데, 2015년부터 10%, 2020년부터 20%, 2025년부터 30%의 온실가스를 감축해야 한다.\nEEDI는 두 단계의 검증 절차를 갖는다. 첫번째 단계는 설계단계에서 요구되는 연비 수준에 적합한지 검증하고 두번째는 선박의 인도 시 해상테스트를 통해 다시 한번 EEDI를 검증하게 된다. 해상테스트에서 EEDI가 부적합판정을 받게 되면 선박의 인도 및 운항이 금지된다.\n3) EEOI (Energy Efficiency Operational Indicator, 에너지 효율지표)\n운항 중인 선박으로부터 실제로 배출되는 CO2발생량을 계산. EEOI는 SEEMP를 검증하는 지표로써 활용된다. 즉, EEOI는 다른 선종, 다른 사이즈의 선박간 에너지효율성을 비교하는 벤치마크의 역할을 하는 것이다. EEOI 데이터는 IMO중앙데이터인 GISIS로 수집된다. IMO회원국들과 해운산업은 GISIS에 수집된 EEOI를 쉽게 활용할 수 있다. 운항거리와 적재량, 연료 소모량을 기입하면 이산화탄소 배출량과 운항지수가 자동적으로 산출된다.\n4) MBM (Market Based Mechanism, 시장 기반 규제)\nMBM의 경우 온실가스 배출량에 부담금을 부과하는 제도, 배출권 거래제 등을 논의하고 있는 가운데, 국제항만협회가 환경 선박 지수ESI를 도입해 친환경 선박에게 인센티브를 제공하는 조치를 시행했다.", "id": 786}, {"category": "해사 법규", "question": "1. SEEMP (선박에너지효율 관리계획)", "answer": "성격: 소프트웨어적/운영적 규제\n핵심: 선박이 운항 중에 어떻게 에너지를 아낄지 계획을 세우고 실천하는 '매뉴얼'입니다.\n특징: 단순히 서류 비치에 그치지 않고, 최근에는 SEEMP Part III가 도입되어 선박의 탄소집약도지수(CII) 등급을 개선하기 위한 구체적인 이행 계획을 포함해야 합니다.", "id": 787}, {"category": "해사 법규", "question": "2. EEDI (에너지효율 설계지수)", "answer": "성격: 하드웨어적/기술적 규제\n핵심: \"이 배는 태생적으로 얼마나 효율적인가?\"를 측정합니다.\n보완 사항: EEDI는 **신조선(새로 짓는 배)**에만 적용됩니다. 이에 따라 기존에 떠다니는 배들을 규제하기 위해 **EEXI(현존선 에너지효율지수)**라는 개념이 2023년부터 함께 시행되고 있습니다.", "id": 788}, {"category": "해사 법규", "question": "3. EEOI (에너지 효율지표)", "answer": "성격: 모니터링 도구\n핵심: 실제 운항 데이터를 기반으로 \"이번 항차에서 화물 1톤을 옮길 때 이산화탄소를 얼마나 뿜었는가?\"를 계산합니다.\n역할: 작성하신 대로 SEEMP의 실효성을 검증하는 척도이며, 최근에는 이를 더욱 체계화한 CII(탄소집약도지수) 등급 산정의 기초 데이터가 됩니다.", "id": 789}, {"category": "해사 법규", "question": "4. MBM (시장 기반 규제)", "answer": "성격: 경제적 유인책 및 제재\n핵심: \"탄소를 배출하는 만큼 돈을 내라\"는 원칙입니다.\n동향: 현재 IMO에서는 탄소세(Carbon Levy)나 배출권 거래제(ETS) 도입을 치열하게 논의 중입니다. 유럽연합(EU)은 이미 2024년부터 해운 분야를 EU-ETS에 포함시켜 실질적인 비용 부담을 지우기 시작했습니다.\n51. 해사노동협약 (Maritime Labour Convention, 2006) 에 대하여,\n1) 채택배경\n- 기존 ILO 해사노동기준은 중복되어 일관성이 결여되었으며, 무엇보다도 협약 비준율이 낮아 국제 협약의 기능이 미약하여 강제 이행수단이 결여 되어 성실한 근로제공자에게 불공정한 영향을 미친다는 점을 공동인식하고 이의 개선을 위하여 새로운 통합노동협약 채택\n2) 본문\n1) 선박 크기에 관계없이 선박정의에 해당하는 모든 선박에 적용(군함, 어선 제외)\n2) 총톤수 200톤 미만 내항선에 대해서는 노사협의를 거쳐 일부 규정 적용 완화 가능\n협약 구조 (Convention Structure)\n협약은 크게 본문, 규정, 코드(Code), 그리고 부록으로 구성되어 있습니다.\n본문(Articles): 총 16개 조문으로 이루어져 있으며, 선원의 기본권 일반규정, 용어 정의, 개정 절차 및 발효 요건 등을 담고 있습니다.\n규정(Regulations): 원리 및 권리에 해당하는 사항을 다루며, 이는 강행규정에 해당합니다.\nCode A: 세부 요건을 분야별로 그룹화하여 규정한 강행규정입니다.\nCode B: 세부 요건을 분야별로 그룹화한 권고규정입니다.\n부록 (Appendices):\nA5-I: 해사노동적합증서 발급 전, 기국(Flag State)이 점검 및 승인해야 할 선원의 작업·생활 조건 항목을 나열합니다.\nA5-II: 국제해사노동적합증서와 해사노동협약 준수선언서의 모델 양식을 제시합니다.\nA5-III: 항만국 통제관(PSC)이 실시하는 세부 점검 항목들을 나열합니다.\nB5-I: 해사노동적합선언서의 견본을 제시합니다.", "id": 790}, {"category": "해사 법규", "question": "45. MLC 탄생 배경", "answer": "해사 노동 협약(MLC // Marine Labout Convention)\n국제 노동 기구 ILO에서 양호한 선원의 근로 및 생활기준을 제공하기 위하여\n제 1장 선내 근로를 위한 최저 요건\n제 2장 근로 조건\n제 3장 거주설비, 오락시설,식량과 조달\n제 4장 건강,의료관리,복지 및 사회 보장\n제 5장 준수 및 집행", "id": 791}, {"category": "해사 법규", "question": "46. 근로시간 및 휴식", "answer": "1) 통상 근로 1일 8시간 , 주 40시간\n2) 시간외 근로 : 고정급 시간외 근로\n3) 최대 근로 시간\nA) 일 최대 근로 시간 // 14시간\nB) 일주일로 할 때 최대 근로 시간 // 72 시간\n휴식 시간\n1)임의의 24시간 중 최소 10시간, 임의의 7일중 77시간 이상의 휴식 시간\n2)임의의 24시간 중 최소 10시간의휴식 시간은 2회까지 분할 가능하며, 그 중 한번은 연속된 6시간 이상이어야 한다.\n3)연속적인 휴식시간 사이의 간격은 14시간을 초과하여서는 안된다.\n제60조(근로시간 및 휴식시간)\n① 근로시간은 1일 8시간, 1주간 40시간으로 한다. 다만, 선박소유자와 선원 간에 합의하여 1주간 16시간을\n한도로 근로시간을 연장(이하 \"시간외근로\"라 한다)할 수 있다.\n② 선박소유자는 제1항에도 불구하고 항해당직근무를 하는 선원에게 1주간에 16시간의 범위에서, 그 밖의\n선원에게는 1주간에 4시간의 범위에서 시간외근로를 명할 수 있다.\n③ 선박소유자는 제1항 및 제2항에도 불구하고 선원에게 임의의 24시간에 10시간 이상의 휴식시간과 임의의\n1주간에 77시간 이상의 휴식시간을 주어야 한다. 이 경우 임의의 24시간에 대한 10시간 이상의 휴식시간은 한 차례만 분할할 수 있으며, 분할된 휴식시간 중 하나는 최소 6시간 이상 연속되어야 하고 연속적인 휴식시간\n사이의 간격은 14시간을 초과하여서는 아니 된다.\n④ 제2항 및 제3항에도 불구하고 해양항만관청은 입항·출항 빈도, 선원의 업무특성 등을 고려하여 불가피하다고 인정할 경우에는 당직선원이나 단기 항해에 종사하는 선박에 승무하는 선원에 대하여 근로시간의 기준,\n휴식시간의 분할과 부여 간격에 관한 기준을 달리 정하는 단체협약을 승인할 수 있다. 이 경우 해양항만청장은 해당 단체협약이 해양수산부령으로 정하는 휴식시간의 완화에 관한 기준에 적합한 것에 한하여 승인하여야 한다.\n⑤ 제4항의 단체협약에는 제69조 1항에 따른 유급휴가의 부여 간격보다 더 빈번하거나 제70조 제1항에 따른\n유급휴가일수보다 더 긴 기간의 유급휴가를 부여하는 내용이 포함되어야 한다.\n⑥ 선박소유자는 인명, 선박 또는 화물의 안전을 도모하거나, 해양 오염 또는 해상보안을 확보하거나, 인명이나 다른 선박을 구조하기 위하여 긴급한 경우 등 부득이한 사유가 있을 때에는 제1항 및 제2항에 따른 근로시간을 초과하여 선원에게 시간외근로를 명하거나 제3항에 따른 휴식시간에도 불구하고 필요한 작업을 하게 할 수 있다.\n⑦ 선박소유자는 제6항에 따라 휴식시간에도 불구하고 필요한 작업을 한 선원 또는 휴식시간 중에 작업에 호출되어 정상적인 휴식을 취하지 못한 선원에게 작업시간에 상응한 보상휴식을 주어야 한다.\n⑧ 선박소유자는 선박이 정박 중일 때에는 선원에게 1주간에 1일 이상의 휴일을 주어야 한다.", "id": 792}, {"category": "개정 2013.3.23.", "question": "1.퇴선신호", "answer": "장음 30초\n선원법 제9장 소년선원과 여성선원\n제91조(사용제한) ① 선박소유자는 16세 미만인 사람을 선원으로 사용
