<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>기출문제 주관식 학습 앱</title>
<style>
  :root { --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; --good:#16a34a; --bad:#dc2626; }
  * { box-sizing:border-box; } body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
  header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.95); border-bottom:1px solid var(--line); padding:14px 18px; }
  h1 { margin:0; font-size:20px; } .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  main { max-width:1100px; margin:0 auto; padding:18px; }
  .grid { display:grid; grid-template-columns:320px 1fr; gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  input, select, textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:11px; font-size:15px; background:white; }
  textarea { min-height:180px; line-height:1.55; resize:vertical; }
  button { border:0; border-radius:12px; padding:10px 13px; font-weight:700; cursor:pointer; background:var(--accent); color:white; }
  button.secondary { background:#374151; } button.light { background:#eef2ff; color:#1e40af; } button.good { background:var(--good); } button.bad { background:var(--bad); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; } .row > * { flex:1; }
  .small { font-size:13px; color:var(--muted); } .stat { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
  .stat div { background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center; }
  .stat b { display:block; font-size:20px; }
  #qList { max-height:62vh; overflow:auto; margin-top:12px; }
  .qitem { padding:10px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; cursor:pointer; background:#fff; }
  .qitem.active { border-color:var(--accent); background:#eff6ff; } .qitem.done { opacity:.72; }
  .question { font-size:22px; font-weight:800; line-height:1.4; margin:8px 0 12px; }
  .meta { color:var(--muted); font-size:13px; }
  .answer { white-space:pre-wrap; background:#f9fafb; border:1px solid var(--line); border-radius:14px; padding:14px; line-height:1.65; margin-top:12px; display:none; }
  .answer.show { display:block; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; } .toolbar button { flex:1; min-width:110px; }
  .addbox { display:none; margin-top:12px; border-top:1px solid var(--line); padding-top:12px; }
  @media(max-width:860px) { .grid { grid-template-columns:1fr; } #qList { max-height:260px; } .question { font-size:19px; } }
</style>
</head>
<body>
<header><h1>기출문제 주관식 학습 앱</h1><div class="sub">업로드 문서에서 추출한 질문·답안 기반 / index.html 단일 파일</div></header>
<main>
  <div class="grid">
    <section class="card">
      <input id="search" placeholder="검색: 질문 또는 답안" />
      <div class="row" style="margin-top:8px"><select id="category"></select><button class="light" onclick="shuffleQuestions()">섞기</button></div>
      <div class="stat"><div><b id="total">0</b><span class="small">전체</span></div><div><b id="done">0</b><span class="small">암기</span></div><div><b id="left">0</b><span class="small">남음</span></div></div>
      <div id="qList"></div>
    </section>
    <section class="card">
      <div class="meta" id="meta"></div>
      <div class="question" id="question">문제를 선택하세요.</div>
      <textarea id="userAnswer" placeholder="여기에 주관식 답안을 직접 작성하세요."></textarea>
      <div class="toolbar">
        <button onclick="toggleAnswer()">정답 보기/숨기기</button>
        <button class="good" onclick="mark(true)">암기 완료</button>
        <button class="bad" onclick="mark(false)">다시 공부</button>
        <button class="secondary" onclick="nextQuestion()">다음 문제</button>
      </div>
      <div class="answer" id="answer"></div>
      <div class="toolbar">
        <button class="light" onclick="toggleAdd()">문항 추가</button>
        <button class="light" onclick="resetProgress()">진도 초기화</button>
        <button class="light" onclick="exportData()">내보내기</button>
      </div>
      <div class="addbox" id="addbox">
        <input id="newQ" placeholder="새 질문" style="margin-bottom:8px" />
        <textarea id="newA" placeholder="새 정답" style="min-height:100px"></textarea>
        <button style="margin-top:8px" onclick="addQuestion()">추가 저장</button>
      </div>
    </section>
  </div>
</main>
<script>
const BASE_QUESTIONS = [{"category": "선박조종!", "question": "1. 선박조종에 대해서 설명하시오", "answer": "1) 어떠한 주어진 조건 속에서도 선박을 의도한대로 안전하고 효율적으로 이동하거나 정선시키는 행위이다.\n2) 배의 운동방향과 그 속도를 원하는 대로 변화시키거나 유지시키는 행위이다.\n3) 항해기술과 밀접한 관련이 있다.\n4) 능숙한 선박조종을 위해서는 선박에 작용하는 선체 저항의 이해, 추진기 및 타의 이해, 선박의 조종성과 내항성능의 이해가 중요하다.", "id": 1}, {"category": "선박조종!", "question": "2. 조종성능의 우선순위를 말하시오", "answer": "1) 대양항해: 보침조선\n2) 연안항해: 피항조선\n3) 항내조선: 저속조선, 예인조선", "id": 2}, {"category": "선박조종!", "question": "4. Squatting(천수영향침하)", "answer": ": 수심과 흘수의 차이가 별로 없으면(수심이 옅어지면) 선저부와 해저부 사이의 유속이 증가되어\n물의 압력이 감소됨으로 흘수가 늘고(증가) 물의 점성 때문에 마찰 저항이 커지게 되며 속력과\n타효가 떨어지고 선체가 진동을 하게 된다.\n1) 속력감소\n2) 선수의 침하\n3) 침로안전성불안\n4) 타효 불량(타효 감소)\n천수 항주 중인 선박의 조종성은 일반적으로 선회성은 저하하고 침로안정성 또는 추종성은 향상된다.\n수심이 옅어지면 부가 관성 모멘트, 선회저항 모멘트, 타압 모멘트 모두가 증가한다.\n다만 선회 저항모멘트의 증가율이 관성모멘트나 타압 모멘트 증가율보다 일층 크게 되는 것이다.\n◈ 천수 영향에 대한 대안 대책\n① 선체의 침하를 고려하여 저속항행을 할 것\n② 불확실하면 고조시를 택하여 항해할 것\n③ 배수량 3만톤 이상이고 여유수심이 1.5m 이하면 충분한 예선을 준비토록 할 것\n④ swell, heeling 및 선체동요로 인한 흘수증가를 고려할 것", "id": 3}, {"category": "선박조종!", "question": "18.SQUAT 구하는 공식", "answer": "CB= 배수량/ L X B X D X 1.025\n2 X CB X V제곱 / 100 (20프로 여유)\n선회성능: 배가 조타에 의해 얼마나 쉽게 선회할 수 있는지 (민첩성)\n침로안정성 (추종성): 배가 본래의 직진 침로를 유지하려는 성질\n천수 항주: 얕은 수심에서 항해 → 수면·해저와의 상호작용이 커짐\nT = Iₚ / N\n추종성 지수 T는 선체의 관성모멘트와 선회저항 모멘트의 비율\n수심이 얕아지면:\nIp​도 증가하지만, N이 더 크게 증가\n비율은 “감소” → “추종성(항상성)”은 상대적으로 향상\n📌 K = M / N\n선회성 지수 K는 타압 모멘트와 선회저항 모멘트의 비율\n얕은 수심에서:\nM도 증가하지만, N이 훨씬 더 크게 증가\n비율은 “감소” → “선회성능”은 저하\n-------------------------------------------------------------------------------------------------------------------------\nT값의 의미\nT = Iₚ / N→ Iₚ: 선체의 부가관성모멘트 (선체가 방향을 바꾸려는 순간의 \"관성\")→ N: 선체의 선회저항모멘트 비례상수 (방향이 변하는 데 저항하는 힘)\nT값은 침로 안정성(추종성)과 밀접한 관련이 있습니다.\n📌 T값이 크면\n선체가 **직진하려는 경향(침로 안정성)**이 약해짐\n외부 힘(타압, 파랑 등)에 의해 진로가 쉽게 바뀜\n민감하게 반응하지만, 지나치게 반응해 진로가 흔들릴 수 있음\n📌 T값이 작으면\n선체가 자기 침로를 유지하려는 성질이 강해짐\n직진 항해(항상성)가 안정적으로 유지\n외부 힘에 대한 반응이 둔해져, 조타 효과도 다소 감소할 수 있음\n✅ 따라서:\n직진성이 중요한 항해(예: 대양 항해, 긴 직선항해)는 T값이 작을수록 유리\n민첩한 선회가 필요한 항해(예: 좁은 수로, 조선소 주변 작업)는 T값이 너무 작으면 조종이 불편할 수 있음\n💡 요약\nT값이 작아지면 침로 유지능력(항상성)이 향상\n“좋다”는 것은 선박의 운항 목적(직진성 vs 민첩성)에 따라 결정됩니다.\n타압 모멘트 비례상수 = M\n선회저항 모멘트 비례상수 = N\n선회성 지수 = K\n추종성 지수 = T\n위의 값을 보면, T, K는 공히 감소하고 따라서 T는 향상되고 K는 악화된 것이 된다.\n즉, T가 적게 되는 것은 침로안정성 및 추종성이 양호하여지고 K가 적게 되는 것은 선회성이 저하하고\n선회경이 커지는 것을 의미한다.", "id": 4}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. 조종성 지수의 이해 (T, K)", "answer": "1) 타각에 대한 응답 정도를 추종성 지수(T)로 나타낸다.\n2) 타각에 대한 선회 각속도의 크기를 선회성 지수(K)로 나타낸다.\n3) K/T값이 큰 선박이 조종성이 좋고 반대가 조종성이 나쁘다.\n4) K값이 크고 T값이 적은 선박이 조종성이 양호하다.", "id": 5}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "27. 선회성지수하고 추종성지수가 무엇인가?", "answer": ": 선체운동에서 타압이 유발하는 moment는 타각에 비례하고, 선회저항 moment는 각속도에 비례\n한다고 가정하면 아래와 같은 수식이 형성된다.\n타압 모멘트 비례상수 = M\n선회저항 모멘트 비례상수 = N\n선회성 지수 = K\n추종성 지수 = T\n이 가정은 엄격한 의미에서는 성립하지 않으나 대략적인 선체운동을 계산하는 데는 상당한 실용성이 있다.\n위의 수식에서 K는 선회성을 나타내는 지표수로 선회성지수라 부르고, T는 침로안정성 및 조타에 대한 선체의 추종을 나타내는 지표수로 이것을 추종성지수라고 부른다. 이들 두 지수를 통칭하여 조종성지수라고 한다.\nK가 크면 큰 각속도가 나오고, T가 적으면 선체는 조타 운동에 빨리 응하고 타각을 없애면 빨리 정침한다. 선체의 선회운동방정식에 관하여 관찰하여 보면 K 및 T 지수는 하나를 양호한 방향으로 택하면 다른 하나는 반드시 좋지 않은 방향이 되는 서로 상반된 성질을 갖는다.", "id": 6}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 키(Rudder)의 역할", "answer": "1) 주된 역할은 선박의 양호한 조종성을 확보하는 데 있다.\n2) 조종성의 3요소는 추종성, 침로 안정성 및 선회성으로 구분된다.", "id": 7}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "7. 이상적인 타의 조건", "answer": "1) 저항이 적을 것\n2) 타효가 좋을 것\n3) 전타에 필요한 동력이 최소일 것\n4) 구조가 간단하고 견고할 것\n5) Propeller의 효율을 증대시킬 것\n6) 선회효과가 최대일 것", "id": 8}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "8. 타판에 작용하는 압력", "answer": "1) 타각을 주었을 때 수류가 타판에 부딪쳐서 타판을 미는 힘\n2) 압력의 종류: 전체 압력, 직압력(PN), 항력(PD), 양력(PL), 접선력/마찰력(PT)\n3) 표면마찰이 적은 타에서는 접선력/직압력(PT)이 작으므로 타압과 직압력은 거의 같다고 볼 수 있다.\n4) 직압력(PN): 타면에 직각인 압력 / Beaufoy의 식 ( PN = 58.8 A V 2 sinδ )\n5) 양력(PL): 유향에 직각인 힘으로 선체를 선회시키는 힘으로 작용한다.\n6) 항력(PD): 유향과 같은 방향의 힘으로 선속을 줄이는 작용을 한다.\n7) 양항비(양력/항력)가 클수록 타효와 조타성능이 크다.\n8) 타의 성능에 영향을 미치는 요소\n- 타의 크기 ( FL(양력) = ½ CL x 밀도 x 타면적 x 속력2 )\n- 종횡비: 종횡비가 1.4 ~1.9 사이의 타가 많이 사용되며 이는 종으로 긴 형태의 타가 모서리 영향이 적어\n유리함을 보여준다.\n{종횡비/aspect ration = 타의 높이(H) / 타의 폭(B)}\n- 타의 단면 형상: 항력은 두께가 얇을수록 크고 양력은 두께가 두꺼울수록 크므로 (너무 두꺼우면 오히려\n감소) 두께와 폭의 비를 0.12 ~0.18 정도로 하는 것이 보통이다.\n- 타의 기하학적 형상: 장방형이 타의 단독성능에 영향이 적음", "id": 9}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "9. Kick 이란", "answer": "전타초기에 있어서 선수는 선회궤적의 안쪽으로 또 선미는 바깥쪽으로 향하는 운동을 하는데 이 선미를 바깥쪽으로 밀어내는 양을 Kick 이라 한다.\n이는 1)타효가 좋은 선박일수록 커지고 2)Kick이 없어질때까지의 Advance(종거)는 선체길이의 1.5-3배 정도이고\n3)원침로에서 외측에 이탈하는 양은 자선길이의 1/4~1/7(선폭의 4-6배)에 이른다.", "id": 10}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "10. Stall 현상이란", "answer": "- 실속현상이란 타를 사용할 때 처음에는 타각이 증가함에 따라 압력이 증가하나 어떤 각도가 되면 타 주위의 유선이 타 후면의 끝에서 떨어지면서 와를 만드는 관계로 양력을 감소시키고 항력을 증가시키기 때문에 압력의 값이 불안정하게 되어 타효를 저하시키는 현상.\n- 타의 경우에는 Burbling 이라 하고 이때의 각도를 실속각 또는 위험각이라고 한다.\n- 항력(Drag) : 타의 저항력으로 타각이 커지면 증가하고 조타중 선체 저항 증가의 원인이 된다.\n- 양력(Lift) : 선체에 작용하는 횡추력으로 선체를 회두시키는 우력의 성분이 된다.", "id": 11}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "19. 고속과 저속에서 Slamming 영향이 적은 경우는 ? 저속", "answer": "만재와 경하시 Slamming 영향이심한 경우는 ? 경하", "id": 12}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. Slamming", "answer": "(선체 동요에 의하여 선수부가 하방으로 떨어질 때(dipping) 선수저부에 대한 파랑의 충격)\n: 선체가 파를 선수에서 받으면서 항주할 때에 주로 선수 전부선저에 강한 파의 충격을 받고 선체는 매우 짧은 주기(1초 정도 이하)의 급격한 진동을 하게 된다. 그 때문에 선체는 과도한 응력을 받아서 때에 따라서는 선수부선저에 손상을 받는 수가 있다. 이러한 현상을 Slamming 이라 한다.\n1) 피칭 시 선체의 전부선저에 손상을 받는 현상을 말한다.\n2) 이로 인한 응력은 주로 1/4~1/10L에 미치며 선속이 클수록 후방으로 미친다.\n3) 최대응력이 33kg/m2 이상이면 선체에 손상을 미친다.\n4) 길이 80~140m의 선박에서 집중적으로 일어난다.\n5) 경하상태에서 심하다.\n고속과 저속에서 Slamming 영향이 적은 경우는? 저속\n만재와 경하 시 Slamming 영향이 심한 경우는? 경하", "id": 13}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "43. Slamming 이란?", "answer": "선체가 파를 선수에서 받으면서 항주할 때 종요 및 상하동이 격심하여져서 선수가 내습파의 경사전면을 향하여 돌진할 때 발생한다. 즉, 선수가 수면에서 떨어져 올라갔다가 하향으로 떨어질 때에 파의 상향운동에 부딪쳐\n일어나는 것으로 keel line이 수평에 달할때에 최대가속도가 일어나므로 이때 제일 격심한 slamming현상이\n발생한다. 대형선의 경우에는 선수에서 선체 길이의 1/8~1/5 정도 뒤쪽 선저가 평평하여 큰 충격을 받을 수\n있으며 고속선 및 선미기관선은 밸러스트 항해 시 슬래밍이 가장 심하다. 슬래밍을 줄이기 위해서는 배의 속력을\n낮추거나 선미에서 파도를 받으면서 항해하여야 한다.", "id": 14}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. Broaching 과 Panting", "answer": "① Broaching\n: 선체가 갑자기 파도 위에서 90도로 선회해 버리는 현상으로서 선체와 파도가 만나는 주기가 아주 길어지는 경우, 즉 파도의 진행과 선박의 속력이 거의 같아지는 경우에는 타효가 없어지기 때문에 Broaching 현상이 일어날 염려가 있다.\n② Panting\n: 선박이 대양을 항행 중 황천에 조우하게 되면 심한 Rolling 이나 Pitching 으로 선수부와 선미부는 파랑의 심한 충격을 받게 되는데 이런 현상을 Panting 이라 한다.\n선박이 거친 해상에서 운항할 때 선수부(Bow)와 선미부(Stern)가 받는 대표적인 국부 응력(Local Stress)인 Panting(팬팅)과 Slamming(슬래밍)은 힘이 작용하는 방향과 물리적인 현상에서 큰 차이가 있습니다.\n쉽게 요약하면 Panting은 외판이 '들숨날숨'하듯 밀고 당겨지는 현상이고, Slamming은 바닥을 '쾅'하고 내리치는 충격 현상입니다.\n현상 설명: 선박이 파도를 헤치고 나갈 때, 선수 외판이 받는 수압이 주기적으로 변하면서 외판이 안팎으로 들어갔다 나왔다 하며 찌그러지는 현상입니다. 사람이 숨을 헐떡일 때 가슴이 오르내리는 것(Panting)과 비슷하다고 해서 붙여진 이름입니다.\n주요 작용 부위: 주로 선수부 외판(Bow Shell Plating)과 선미부 외판에 발생합니다.\n하중의 성격: 지속적이고 주기적인 변동 수압 (동수압).\n보강 구조: 이를 막기 위해 선수 탱크 내부에 Panting Stringer(팬팅 스트링거), Panting Beam(팬팅 빔), 그리고 촘촘한 늑골(Frame)을 배치하여 측면 지지력을 높입니다.", "id": 15}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. heave to", "answer": "거친 해상을 항해하는 선박에서 사용하는 황천조선법 중 많이 사용되는 조선 방법 중 하나이다. 선수를 풍랑 쪽으로 향하게 하여 조타가 가능한 최소의 속력으로 전진하는 방법을 히브 투라고 한다. 일반적으로 풍랑을 선수로부터 좌우 현으로 25~35° 방향에서 받도록 하는 것이 좋다. 이 방법은 선체의 동요를 줄이고, 파도에 대하여 자세를 취하기 쉽고, 풍하측으로의 표류가 적다. 그러나 파에 의한 선수부의 충격 작용과 해수의 갑판상 침입이 심하며, 너무 감속하면 보침이 어렵고, 정횡으로 파를 받는 형태가 되기 쉽다.", "id": 16}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. scudding", "answer": "황천(rough sea)에서 사용할 수 있는 조선법 중의 하나이다. 풍랑을 선미사면(quarter) 방향에서 받으며 파에 쫓기는 자세로 항주하는 방법이다. 선체가 받는 파의 충격작용이 현저히 줄어든다. 따라서 heave to를 하더라도 선수충격작용이 심하면 이 방법을 취한다. 상당한 속력을 유지하여도 괜찮으므로, 적극적으로 태풍권에서 탈출하는데 유리한 방법이다. 반면, pooping down에 의한 위험을 초래할 수도 있고 보침성이 저하되고 broaching이 유발될 수 있어 유의해야 한다.", "id": 17}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. lie to", "answer": "황천시의 조선법 중 하나로, 황천속에서 기관을 정지하고 선체를 풍랑하(lee side)로 그대로 표류시키며 풍랑에 거슬리지 않는 방법이다. 그러나 lie to는 옛날 소형선에서 storm oil 및 sea anchor를 이용하면서 황천을 피한 방법이었으나 오늘날 이 방법을 채용하는 선박은 거의 없다.", "id": 18}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. Rolling 시", "answer": "1) LURCHING: 대각도 경사를 일으킴. 대량의 해수가 갑판상을 덮음. 적하의 이동 및 선체 손상", "id": 19}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. Pitching 시", "answer": "1) SLAMMING: 선수에서 파를 받으며 항주할 때 강한 파의 충격을 받고 짧은 주기의 급격한 진동을 하는 현상\n2) 횡불안정: GM크기가 주기적으로 변하여 복원력의 손실을 가져온다.\n3) Pooping Down: 추종파를 받을 때, 선미 추종파가 선미를 크게 덮치는 현상\n4) Screw Propeller의 공회전: 종요가 심할 때 선미부가 공기중에 노출되어 Propeller가 진동을 일으키며 급회전을 한다.", "id": 20}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "42. Broaching 이란?", "answer": "선박이 파도를 선미로부터 받으며 항주할 때에, 선체 중앙이 파도의 마루나 파도의 오르막 파면에 위치함으로써 급격한 선수 동요가 발생하여 선체가 파도와 평행하게 놓이는 현상. 브로칭 현상이 발생하면 파도가 갑판을 덮치고 대각도의 선체 횡경사가 유발되어 선박이 전복될 위험이 있다. 그러므로 배의 길이가 파장과 거의 같고, 비교적 속력이 빠른 소형 선박이나 컨테이너선은 선미파를 받지 않도록 침로를 유지하고, 속력을 감속하여 조종해야 한다. 이러한 현상은 상대적으로 파장이 거의 선체의 길이에 가깝게 될 때 매우 극심하여 진다.", "id": 21}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "Panting 이란?", "answer": "선수미부에 파도의 충격에 의한 선체 Frame과 외판의 진동성 응력(Stress)을 받는 현상으로 이를 방지하기 위한 선체 구조를 panting 구조(종횡혼합식 구조)라고 한다.", "id": 22}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 황천 조산법: Lie to (라이 투)", "answer": "태풍이나 폭풍우 같은 극한의 황천 상황에서 더 이상 정상적인 항해가 불가능할 때 취하는 최후의 수단 중 하나입니다.\n정의: 기관(엔진)을 정지하고 선체를 바람과 파도에 맡겨 자연스럽게 표류시키는 방법입니다.\n특징: 선박이 파도를 옆으로 받게 되어 횡동요(Rolling)가 심해질 위험이 있지만, 무리하게 파도에 맞서다 선체가 파손되는 것을 방지하기 위해 선택합니다.", "id": 23}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 파랑에 의한 선체 충격 현상", "answer": "선체가 파도의 힘을 견디지 못하고 구조적으로 변형되는 현상들입니다.\n래킹 (Racking)\n원인: 선체의 **옆면(횡방향)**에서 파도를 직접 받거나, 심한 **횡동요(Rolling)**를 할 때 발생합니다.\n현상: 좌우 양현의 흘수(잠기는 깊이)가 달라지면서 한쪽 측면에만 거대한 수압이 가해집니다.\n비유: 마치 성냥갑을 옆에서 눌러 찌그러뜨리는 것과 같은 평행사변형 형태의 변형이 일어납니다.\n비틀림 (Twist / Torsion)\n원인: 파도가 선체와 비스듬하게 만나는 **사파(Oblique sea)**를 받을 때 발생합니다.\n현상: 선체의 앞부분(선수)과 뒷부분(선미), 그리고 좌우 양현의 흘수가 각각 달라지면서 선체 전체가 꽈배기처럼 뒤틀립니다.\n결과: 이 응력으로 인해 갑판(Deck)에 주름이 생기거나 균열이 발생할 수 있습니다.", "id": 24}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 선체의 6가지 운동은 무엇이 있는가?", "answer": "선체의 3가지 회전운동 - X축 : PITCHING, Y축 : ROLLING, Z축 : YAWING\n선체의 3가지 이동운동 - X축 : SURGING, Y축 : SWAYING, Z축 : HEAVING\n1. 3가지 직선 운동 (Translation)선체의 무게 중심이 세 가지 축(x, y, z)을 따라 전후, 좌우, 상하로 직접 이동하는 운동입니다.\n전후동요 (Surge): 배가 앞뒤(x축)로 왔다 갔다 하는 운동입니다. 추진력이나 파도에 의해 전진하거나 후퇴하는 움직임을 말합니다.\n좌우동요 (Sway): 배가 원래 가려던 방향에서 좌우(y축)로 밀려나는 운동입니다. 주로 바람이나 조류에 의해 옆으로 밀릴 때 발생합니다.\n상하동요 (Heave): 배 전체가 수직(z축)으로 위아래로 들썩이는 운동입니다.\n높은 파도를 넘을 때 선체 전체가 솟구쳤다 가라앉는 현상입니다.\n2. 3가지 회전(왕복) 운동 (Rotation)선체의 중심축을 기준으로 원을 그리듯 회전하거나 기울어지는 운동입니다.\n횡동요 (Roll): 배가 좌우로 오뚝이처럼 흔들리는 운동입니다. 선박의 선수-선미를 잇는 축(x축)을 중심으로 회전하며, 복원력과 가장 밀접한 관련이 있습니다.\n종동요 (Pitch): 배의 앞(선수)과 뒤(선미)가 시소처럼 위아래로 번갈아 가며 흔들리는 운동입니다. 좌우를 잇는 축(y축)을 중심으로 회전합니다.\n선회동요 (Yaw): 배의 머리(선수)가 좌우로 돌아가며 방향을 바꾸는 운동입니다. 수직축(z축)을 중심으로 회전하며, 조타(Steering)와 직접적인 관련이 있습니다.", "id": 25}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 항내 속력을 결정할 때의 고려할 사항은?", "answer": "1) 자선의 투묘로써 타력을 감소시킬 수 있는 정도\n2) 자선의 반전타력여하\n3) 외력의 영향 여하\n4) 선적상태(흘수)\n5) 항역 내의 넓이. 수심. 장애물의여부\n6) 정박중인 선박의 교통량\n7) 시계 정도", "id": 26}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "8. IAMSAR의 정의 및 구성", "answer": "◈ 정의 : International Aeronautical and Maritime Search and Rescue(국제 항공/해사 공동 수색 구조)\nIAMSAR Manual Volume 3개의 가장 중요한 목적은 기국이 그들 스스로 수색/구조가 필요할 시, 수색/구조 서비스를 접할 수 있도록 하고 국제 민간 항공 협약(Convention on International Civil Aviation) 과 국제 해사 수색/구조 협약(the International Convention on Maritime Search and Rescue), 그리고 국제 해상 안전 협약(the International Convention for the Safety of Life at Sea : SOLAS) 하에 그 책무를 받아들이도록 보조하는데 있다.\n범 세계적 기반을 둔 ICAO(국제 민간 항공 기구 : International Civil Aeronautical Organization) 및 IMO(국제 해사 기구 : International Maritime Organization) 기국 멤버들은 수색/구조 서비스를 제공하기 위해 노력하는데, 요약하자면, ICAO 와 IMO 의 목표는 사람들이 항해 또는 비행을 하는 어떤 곳에서든지 간에 수색/구조를 필요로 하는 곳에 효과적인 범 세계적 SYSTEM 을 제공하는데 있다.\n◈ 구성\n1) Volume I : The Organization and Management (조직과 관리)\n2) Volume II : Mission Co-ordination (협력 수행)\n3) Volume III : Mobile Facilities (유기적 시설)", "id": 27}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 확대 정방향 수색 (Expanding Square Search: SS)", "answer": "수색 목표물의 위치가 비교적 정확히 알려져 있지만, 약간의 오차가 있을 때 사용합니다.\n가) 특징: 수색 개시점(CSP)은 항상 사고 발생 **기준위치(Datum)**입니다.\n나) 장점: 좁은 지역을 집중적으로 수색할 때 가장 효과적입니다.\n다) 요건: 매우 정확한 항해(Dead Reckoning) 능력이 요구됩니다.\n라) 방법: * 첫 번째 침로로 **수색 간격(S)**만큼 진행합니다.\n**90도 우전(또는 좌전)**하여 다시 S만큼 진행합니다.\n그다음 다시 90도 회전하여 2S만큼 진행하고, 또 90도 회전하여 2S만큼 진행합니다.\n즉, 두 번의 변침마다 거리를 S만큼 늘려가며 소용돌이 모양으로 확대해 나갑니다. (S → S → 2S → 2S → 3S → 3S ...)", "id": 28}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 부채꼴 수색 (Sector Search: VS)", "answer": "사람이 물에 빠진 직후(Man Overboard)와 같이 위치가 아주 정확할 때 사용합니다.\n가) 특징: 기준위치(Datum)를 중심으로 한 원형 구역을 수색합니다.\n나) 장점: 수색선이 기준위치를 반복해서 통과하므로 유효성이 높습니다.\n다) 방법:\nDan Buoy나 발연부신호를 투하하여 기준점(Datum)을 표시합니다.\n기준점에서 **수색 반지름(R)**만큼 전진 후, 120도 우전하여 다시 원주를 따라 진행합니다.\n이 과정을 반복하면 총 9회(3개 부채꼴 * 3회 반복)의 변침을 통해 제자리로 돌아오며, 각 수색선 사이의 각도는 60도가 됩니다.", "id": 29}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 평행선 수색 (Parallel Sweep Search: PS)", "answer": "생존자의 위치가 불확실하여 광범위한 지역을 체계적으로 수색해야 할 때 사용합니다.\n가) 특징: 수색 구역의 한쪽 끝에서 시작하여 일정한 간격을 두고 평행하게 왕복합니다.\n나) 장점: 넓은 해역을 빠짐없이 훑을 수 있어 다수의 수색선이 투입될 때 유리합니다.\n다) 방법: 수색 구역의 장변(긴 쪽)에 평행하게 침로를 잡고, 각 수색선 사이의 간격(S)을 유지하며 진행합니다.\n4. 선박·항공기 합동 수색 (Ship-to-Aircraft Coordinated Search)\n선박의 항해 능력과 항공기의 넓은 시야를 결합한 방식입니다.\n가) 협동 수색 (Creeping Line Search: CSC): 항공기가 선박의 진행 방향 앞쪽에서 좌우로 지그재그 비행하며 수색하는 방식입니다. 항공기는 선박보다 속도가 빠르므로 선박의 침로를 가로지르며 촘촘하게 수색합니다.\n나) 통신: 선박은 항공기와 직접 통신(VHF Ch.16 또는 전용 SAR 주파수)을 유지하며 정보를 교환합니다.", "id": 30}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 선체의 6가지 운동은 무엇이 있는가?", "answer": "선체의 3가지 회전운동 - X축 : PITCHING, Y축 : ROLLING, Z축 : YAWING\n선체의 3가지 이동운동 - X축 : SURGING, Y축 : SWAYING, Z축 : HEAVING", "id": 31}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "6. 선박이 선회 시 일어나는 현상에 대하여 설명하시오 (어떤 요소가 선회 시 많은 영향을 끼치는가?)", "answer": "선회 중의 선체 경사\n선회시 타의 직압력이 타각을 준 반대쪽으로 선체의 하부를 밀어내고, 수면상부의 선체는 타각 방향의 선회권의 안쪽으로 경사. 즉, 내방경사가 일어나며, 선회를 계속하면서 원심력이 바깥쪽으로 작용하여 수면 상부의 선체는 타각 반대쪽으로 외방경사 하게 된다. 내방경사는 외방경사보다 약하게 나타나며, 복원력이 작은 선박에서는\n선체의 경사가 더욱 크다.", "id": 32}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "변침할 때 경사가 생기는데 왜 생기며 어떤 현상이 일어나는지 말하시오.", "answer": "회두 초기에는 내방 경사가 일어나고 이후 외방경사가 일어난다. 회두를 위해 전타 시에 수면하에 위치한 타에\n큰 힘이 가해져 선체가 순간적으로 회두하려는 방향으로 기울게 되는 현상이 내방경사이다. 이후 회두를\n시작하면 원심력에 의해 회두하는 방향 반대쪽으로 기우는 외방경사가 일어난다. 타를 많이 쓸수록 내방경사는\n커지며, 일반적으로 내방경사 보다 외방경사가 크다.", "id": 33}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "선박의 선회권의 영향을 주는 요소에 대하여 설명하세요.", "answer": "선박이 타각없이 직진하는 상태에서 상당한 타각을 주고 그 상태를 유지하면 선박은 선회하면서 원운동을 한다. 이렇게 360도를 회전하면서 선박의 무게중심이 그리는 궤적을 선회권이라고 한다. 이러한 선회권의 크기는 선박의 조선에 중요한 요소이며 선회권에 크기에 영향을 주는 요소는 다음과 같다.\n1) 방형비척계수\n방형비척계수 Cb가 작은 날씬한 고속형의 선박(Cb가 0.6)은 Cb가 큰 비대형선(Cb가 약 0.8)에 비하여 선회성이 떨어진다. 따라서 선폭에 비하여 그 길이가 짧은 뚱뚱한 선형 즉 Cb가 큰 선형은 선회경이 작아진다. 그리고 길이가 긴 선체는 연직축주위의 관성모멘트가 크고 회두에 의한 물의 저항이 크기 때문에 선회성이 나쁘고 선회경이 커진다. 여기서 방형비척계수(Cb)는 배수용적과 Block용적(LxBxD)과의 비율이다. 즉, Cb=배수용적 / LxBxD\n2. Cb가 큰 선박(뚱뚱한 배)의 선회성이 좋은 이유선폭에 비해 길이가 짧고 뚱뚱한 선박은 물속에서 회전 방향으로 틀 때, 물을 밀어내며 회전하기가 더 수월합니다.\n구조적으로 직진하려는 성향(침로안정성)보다 회전하려는 성향(선회성)이 더 강하기 때문입니다.\n따라서 타(Rudder)를 썼을 때 배가 쉽게 돌아가므로 선회경(Turning Circle)이 작아집니다.\n3. 길이가 긴 선박의 선회성이 나쁜 이유 (관성모멘트와 저항)적어주신 원리가 정확합니다.\n연직축 주위의 관성모멘트(I)가 큼: 배의 중심을 기준으로 앞뒤로 길게 뻗어 있기 때문에, 회전하기 시작할 때나 멈추려 할 때 필요한 힘이 훨씬 큽니다. (회전 운동에 대한 저항이 큽니다.)\n-회두 시 측면 저항: 배가 돌기 시작하면 길쭉한 선체 측면 전체가 물을 밀어내야 하므로 막대한 저항을 받습니다. 이 때문에 배가 쉽게 돌지 못해 선회경이 커지게 됩니다.\n2) 흘수\n동일한 선박이라도 흘수가 변화하면 배수량이 바뀌고 이러한 배수량이 선회성능에 영향을 준다고 할 수 있다. 일반적으로 타면적이 일정하게 그대로 있고 흘수가 증가하면 타면적비는 감소하고 또한 선회저항이 증가하기 때문에 선회경은 크게 된다고 생각되나 실험에 의하면 배수량이 약 35% 증가하여도 선회경의 변화는 그리 크지 않다. 이것은 흘수의 증가에 따라 측압면적이 크게 됨으로 인하여 상대적으로 크게 되는 것이 한 원인이다.\n배가 선회할 때 선체 측면이 물을 밀어내면서 양력(유체역학적 횡력)이 발생하는데, 흘수가 깊어지면 이 양력도 함께 커져서 배를 돌리는 힘을 보태주기 때문에 선회경이 생각보다 커지지 않는 것입니다.", "id": 34}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 메커니즘 상세 분석 (왜 선회경 변화가 크지 않을까?)", "answer": "흘수가 증가(만재 상태)하면 선회경이 커질 것 같은 요인과 작아질 것 같은 요인이 동시에 발생하여 서로를 상쇄합니다.\n선회경을 크게 만드는 요인 (선회성 저하):\n배수량(무게)이 증가하여 회전하려는 관성이 커집니다.\n물이 차오른 만큼 타(Rudder) 면적 자체는 그대로인데 비해 배가 커졌으므로, 상대적인 타면적비(타면적/선체 종단면적)가 감소합니다.\n물에 잠긴 면적이 넓어져 선회 저항이 증가합니다.\n선회경을 일정하게 유지해 주는 요인 (선회성 유지):\n측압면적(수중 측면적)의 증가: 흘수가 깊어지면 배의 측면이 물에 더 많이 잠깁니다. 배가 선회할 때 선체가 비스듬히 밀리면서(편각 발생) 이 측면 공간이 거대한 날개 역할을 하게 됩니다.\n이로 인해 선체 자체에서 발생하는 유체역학적 양력(Turning Force)이 커지게 되며, 이것이 위에서 감소한 타 효율과 증가한 저항을 상당 부분 상쇄합니다.\n요약\n\"흘수가 증가하면 타 효율이 떨어지고 저항이 늘어나 선회경이 커질 것 같지만, 선체 측면이 넓어지면서 발생하는 유체역학적 양력 역시 함께 증가하기 때문에, 실제 배수량이 35% 가까이 늘어나도 선회경(Turning Circle)의 크기는 공선(Ballast) 상태와 비교했을 때 그리 큰 차이가 나지 않는다.\"\n3) 트림\n배수량을 일정하게 두고 선미트림으로 하면 그대로 있으나 선회저항의 작용적이 후방으로 이동하고 저항 모멘트가 커지기 때문에 선회경이 크게 된다. 즉, 선회시 수저항 중심이 선수쪽으로 이동할수록 선회하기 쉬워지며 트림이 선체길이의 1% by the stern 증가하면 선회경은 10%증가한다. 같은 이유로 선수 트림은 선회경을 작게 한다.\n4) 선체의 중량분포\n배수량 및 트림을 일정하게 두고 선체중량이 전후부에 널리 분포한 경우 연직축 주위의 관성능률이 크기 때문에 회전각 가속도가 작아지고 따라서 선회성이 저하하며, 선체중앙부에 모인 경우 관성능률이 작아져 선회선이 좋아진다. 공선항해 시에는 관성능률도 작아지고 흘수도 감소하므로 선회권이 작이질 것 같지만 타의 상부가 노출되고 프로펠러의 효율도 나빠져 타압이 감소하기 때문에 선회성능이 저하되는 수가 있다. 또한 공선시에는 선미트림이 크기 때문에 선회경이 작아지지 않는다.\n5) 수면하선체측면형상\n선체의 수면 하 측면형상에 있어서 그 면적의 일부를 절제한 부분을 cut up이라고 하고 반대로 면적을 증가시킨 것과 같은 부분을 역재라고 한다. 선체침하부에 cut up을 실시하는 것은 측면적을 감소시켜 주는 것으로 선회권에 영향을 미치는데 선미 cut up은 선수 트림과 같이 선회성을 돕게 되므로 기동성을 요하는 군함, 표경선 등에 이러한 형을 채용하나 이러한 선형은 침로안정성이 좋지 아니하다. 따라서 선회성보다 침로안정성이 중요한 화물선 등에서는 선미에 역재를 붙여 후부측면적을 증가시키는 방법을 취하고 있다.\n6) Screw Propeller의 회전방향\n가) 단추진기선의 선회권\n일반적으로 단추진기선에서는 타판이 추진기의 직후에 설치되어 있기 때문에 이상적인 흐름을\n받는 단독타와는 달리 screw current, wake current의 영향을 받아서 타중앙으로 하고 항주하더라도 좌우에서 타에 미치는 압력이 달라지고 좌우 어느 한쪽으로 선수가 편향한다.\n또한 좌우 같은 타각으로 선회를 하더라고 그 선회권의 크기는 약간씩 다르게 나타난다. 그 이유는 횡압력의 관계로 propeller 회전쪽의 선회권이 커진다고 본다. 우선회단추진기선의 경우 일반적으로 우선회권이 크게 된다.\n나) 쌍추진기의 선회권\n쌍추진기선에서는 일반적으로 한 개의 타가 선체중심선에 설치되는 수가 많고 타판이 추진기의 배출류를\n직접 받지 아니하므로 단추진기선에 비하여 타압은 약간 떨어진다. 그러나 각현의 추진기의 회전방향이 대개\n외선식이고 좌우대칭이므로 단추진기선에서와 같은 편향력은 나타나지 아니한다. 양현 프로펠러의 직후에\n설치한 쌍타의 경우에는 타의 성능은 좋아지나 선회권에 대한 종합 영향은 좌우가 같고 편향력은 일어나지\n않는다.\n가) 단추진기선 (Single Screw)의 선회권기술하신 대로 단추진기선은 프로펠러가 만들어내는\n복잡한 수류 때문에 타를 중앙(Midship)에 두어도 한쪽으로 치우치는 측벽 효과(Lateral Effect)가 발생하고, 좌우 선회권의 크기도 달라집니다.\n\"우선회 단추진기선은 일반적으로 우선회권이 더 크다\" 정답입니다.이유: 전진 시 프로펠러가 시계 방향(우선회)으로 돌면,\n프로펠러가 물을 뒤로 밀어낼 때 발생하는 횡압력(Side Force)과 선미가 물을 끌고 가는 추종류(Wake)의 비대칭성 때문에 선미는 우현으로 밀리고,\n선수는 좌현으로 돌아가려는 성향(좌회두 성향)을 기본적으로 가집니다.따라서 기본적으로 좌현으로 돌려는 성향이 있기 때문에,\n좌선회(Port Turn)를 하면 배가 아주 잘 돌아서 선회권이 작아집니다.\n반대로 우선회(Starboard Turn)를 하려면 이 좌회두 성향을 이겨내면서 돌아야 하므로 배가 덜 돌아가게 되고, 결과적으로 우선회권이 더 커지게 됩니다.\n나) 쌍추진기선 (Twin Screw)의 선회권\n쌍추진기선에 대한 기술 역시 완벽합니다. 추진기가 2개인 선박은 좌우 대칭 구조를 활용해 단추진기선의 단점을 상쇄합니다.\n1. 중심선에 1개의 타를 설치한 경우 (Twin Screw, Single Rudder)\n타압 저하: 프로펠러가 좌우에 찢어져 있고 타가 가운데 있으면,\n프로펠러가 뒤로 뿜어내는 강한 제트 기류(Screw Current)를 타판이 직접 받지 못하므로 타효(Rudder Effect)가 상대적으로 떨어집니다.\n(최근 선박들은 이를 보완하기 위해 프로펠러 직후에 각각 타를 두는 쌍타(Twin Rudder)를 많이 채택합니다.)", "id": 35}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 외선식(Outward Turning) 배치의 이점", "answer": "편향력 상쇄: 쌍추진기선은 전진할 때 좌현 프로펠러는 반시계 방향, 우현 프로펠러는 시계 방향으로 도는 외선식(Outward)을 주로 씁니다.\n좌우 프로펠러가 서로 반대로 돌면서 각자 발생하는 횡압력과 수류의 비대칭성을 완벽하게 상쇄하기 때문에, 직진할 때 한쪽으로 쏠리는 편향력이 사라집니다.\n종합 영향: 쌍타를 설치하든 단타를 설치하든, 프로펠러가 좌우 대칭으로 작동하므로 좌선회권과 우선회권의 크기는 이론적으로 완벽히 동일하게 나타납니다.\n7) 타의 제요소\n가) 타각\n선박의 선회를 일으키는 기본적인 힘은 타압에 의한 선회우력이다. 이론상 최대 유효타각은 45도이지만 critical angle의 영향, 조타기의 마력, 선체선미부의 강도 등을 고려하여 최대타각을 35도 정도의 범위에서 제한하고 있다.\n나) 타면적\n상기한 선회우력의 공식에서 타압은 타면적에 비례하므로 타면적을 크게하면 선회권은 작아져야 한다. 그러나 타면적비가 선체의 크기, 종류에 따라 일정 정도 이상이 되면 조타기의 마력, 선체의 강도 등의 견지에서 불리할 뿐 아니라 타 자체의 선회운동에 대한 저항이 커져서 선회권이 오히려 커지는 경향이 있다.\n8) 속력\n결론적으로 속력은 선회권의 크기에 관계하지 않는다.\n9) 수심\n흘수에 비하여 충분한 수심이 있지 아니하면 천수의 영향으로 선회권이 커진다. 수심이 옅어지면 부가관성\n모멘트, 선회저항 모멘트, 타압 모멘트가 모두 증가한다. 다만 선회저항 모멘트 증가율이 관성 모멘트나 타압\n모멘트보다 일층 크게 되어 선회경이 커진다. 실험에 의하면 선회경의 증가는 전제적인 것이 아니고 측방으로\n증가하는데 이는 선박이 선회를 시작함에 따라 상대적으로 타압 모멘트는 감소하는데 비하여 선회저항 모멘트는\n증가하기 때문이다.", "id": 36}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 선형 및 배수량 관련 (방형비척계수, 흘수, 트림)", "answer": "방형비척계수(Cb): 말씀하신 대로 Cb가 큰 비대형선(유조선 등)은 직진하려는 성질(침로 안정성)보다 회전하려는 성질(선회성)이 강해 선회권이 작습니다. 반면 날씬한 고속선은 선회권이 큽니다.트림(Trim): **\"선미 트림은 선회권 확대, 선수 트림은 선회권 축소\"**라는 원칙은 시험이나 실무에서 매우 중요한 공식입니다. 수저항의 중심이 어디로 이동하느냐가 핵심입니다.", "id": 37}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 중량 분포와 관성 모멘트질량 관성 모멘트:", "answer": "중량이 선수미로 분산되면 회전하기 시작하기 어렵고(추진 시), 일단 회전이 시작되면 멈추기도 어렵습니다. 따라서 선회 초기 반응이 늦어져 선회권이 커지는 경향이 있습니다.", "id": 38}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 선체 형상 (Cut-up)선미 Cut-up:", "answer": "선미 하단부를 깎아내면 선미 측면 저항이 줄어들어 선회성이 좋아집니다. 하지만 지적하신 대로 **침로 안정성(Straight-line stability)**은 반비례하여 나빠집니다.", "id": 39}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 추진기(Propeller) 및 타(Rudder)의 영향단추진기선:", "answer": "우선회 프로펠러(Right-handed) 기준, 횡압력과 배출류의 영향으로 좌우 선회권이 비대칭하게 나타나는 점이 정확합니다.타각: 최대 타각을 보통 35도로 제한하는 이유는 그 이상일 경우 실속(Stall) 현상으로 인해 타압은 늘지 않고 저항만 급격히 커지기 때문입니다.", "id": 40}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. 외적 요인 (속력, 수심)속력:", "answer": "이론적으로 일정한 타각에서 속력은 선회권의 '크기' 자체에는 큰 영향을 주지 않지만, 선회하는 데 걸리는 **'시간'**에는 영향을 줍니다. (단, 아주 고속일 경우 경사 등의 영향으로 약간 변할 수 있습니다.)수심(浅水, Shallow Water Effect): 수심이 얕으면 선체 주위의 물 흐름이 원활하지 못해 저항이 급증하므로 선회권이 현저히 커집니다. 이는 협수로 통과 시 매우 주의해야 할 사항입니다.", "id": 41}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "9. Close quarters situation(근접상황) 설명 및 quarter의 의미", "answer": "충돌위험을 절실하게 느끼면서도 그 위험에서 빨리 빠져나올 수 없는 접근상태를 말한다.\n여기서 quarter 의 의미는 “바싹 접근하여” 라는 의미로 쓰인다.", "id": 42}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "11. 악천후 상황에서 히브 투(Heave to) 후에 발생하는 현상(Heave to 때문에 생기는 현상)은?", "answer": ": 청파 [ green water , 靑波 ]\n- 선박이 악천후 중을 항해할 때 파도가 갑판상에 올라와서 갑판 위를 휩쓸고 지나다닐 때가 많다. 이 때 갑판에 올라와서 자유롭게 이동하는 바닷물을 그린 워터(Green water, 청파)라고 말한다. 선박이 대양을 항행 중에 황천에 조우하게 되면 갑판 상에는 많은 파도가 올라와서 갑판상의 많은 장비들을 손상시키고, 또한 선박의 복원력을 감소시켜서 전복의 위험을 초래하기도 한다. 그러므로 선박에서는 이러한 상황에 조우하게 되면 선박의 침로를 유지할 수 있을 정도로 선속을 감속하고, 침로도 조정하여 자선(自船)의 선수미선을 기준으로 좌우현 약 30도 전후의 상대방위로 파도를 받으며 항해하게 되며, 이렇게 항해하는 것을 전문용어로 히브 투(Heave to)라고 한다.", "id": 43}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "19. DOVE의 법칙과 황천 시 조치사항과 피항 방법(태풍 피항 조종법의 종류와 그 방법)", "answer": "1) DOVE 의 법칙\n① 3R(R.R.R.) 법칙\n: 북반구에서 태풍이 접근할 때에 풍향이 우전 변화(right)를 하면, 자선은 태풍 진로의 우반원(right)에 있으므로, 풍랑을 우현 선수(right)에서 받으면서(예 : Heave to 조선법) 조선하여 태풍중심에서 멀어진다. 이것을 3R 법칙이라고 한다. 단, 남반구에서는 위험반원이 좌측반원이므로 풍랑을 좌현 선수 비스듬히 받으면서 피항하여야\n한다.\n② L.L.S. 법칙\n: 북반구에서 풍향이 좌전 변화(left, 반전, 반시계 방향)를 하면, 선박은 태풍 진로의 좌반원(left)에 있으므로, 풍랑을 우현 선미(Starboard quarter)에서 받으면서 (예 : Scudding 조선법) 선박을 조종하여 태풍의 중심에서 벗어난다. 이것을 L.L.S. 법칙 이라고 한다. 풍향에 변화가 없이 일정하고 풍력이 강해지며, 기압이 더욱 하강하면 자선은\n태풍의 진로상에 있다. 이 때에는 풍랑을 우현 선미에 받으며, 안전 반원으로 항주하는 피항 침로를 취해야 한다.\n단, 남반구에서는 우측반원이 가항반원이므로 좌현 선미로 비스듬히 풍랑을 받아 항행하도록 한다.\n③ 태풍중심의 진로 상에 선박이 있는 경우의 조선법\n: 풍향이 변하지 않으면서 폭풍우가 점점 심하게 되고 기압이 하강하면 선박은 태풍중심의 진로 상에 있을 확률이 높다. 북반구의 경우, 이 때는 풍랑을 우현선미로 받으면서 (예 : Scudding 조선법) 가항반원으로 옮기도록 한다. 만약, 태풍의 눈에 들어갔을 때에는 방향이 다른 바람이 불고 삼각파가 심하다. 곧 불어올 심한 바람에 주의하고 강한 바람을 정횡으로 받지 않도록 조선한다.\n2) 태풍 피항 조종법의 종류와 그 방법\n① Heave to\n: Heave to 라는 것은 선수를 풍랑에 향하게 하여 타효를 가질 수 있는 최소의 속력을 가지고 전진하는 방법이다. 풍랑을 정선수로부터 2~3점 정도의 사방향으로 받는 자세가 좋다. 황천 조치로서 Heave to 의 방식은;\n- 파랑에 대한 자세를 취하기 쉬운 것\n- 풍하측으로 표류가 적고, 파에 의한 선수의 충격이 덜어진다.\n- 파를 향하여 항주하므로, 선수의 파에 의한 충격작용을 완전히 피할 수 없고, 해수의 갑판상 침입을 막을 수 없다. Heave to 는 선체의 길이가 길고 선수류가 높은 선박에서 유리한 방식이다.\n- 또, 너무 감속하면 보침이 곤란하고 beam sea(정횡으로 파를 받는 상태)가 될 위험이 있다.\n② Scudding\n: Scudding 이라 함은 풍랑을 선미 quarter 방향에서 받으며 파에 쫓기는 자세로 항주하는 방법이다. 황천 중에 이 항법을 채용할 때에는;\n- 선체가 받는 파의 충격작용이 현저히 줄어진다. 따라서 Heave to 를 하더라도 선수충격 작용이 심하면 이 방법을 취한다.\n- 상당한 속력을 유지하여도 좋으므로, 적극적으로 태풍권에서 탈출하는데 유리할 수가 있다.\n- 반면, Pooping down(파가 선미부를 덮어 씌우는 현상)에 의한 위험을 초래할 수 있다.\n- 보침성이 저하되고 Broaching 이 유발된다.\n추종파를 받을 때에는 보침성이 저하되고 Yawing 이 심하여져서 broaching to 로 되어 Beam sea 가 되기 쉬우므로 조심하여야 한다. 어선 등에서는 어구를 예인하면 좋을 것이다.\n③ Lie to\n: Lie to 라 함은 황천 속에서 기관을 정지하고, 선체를 풍랑 하로 그대로 표류시키며, 풍랑에 거슬리지 않는 방법이다. 그러나 오늘날 이러한 방법을 채용하는 대형선박은 없다. 이상에서 설명한 바와 같이 Heave to, Scudding 은 주로 대형선에서 대양항해 시 사용하게 되고 Lie to 는 옛날에 소형선에서 Storm oil 및 Sea anchor를 이용하면서 황천을 피한 방법이었으나 오늘날 Lie to를 하는 선박은 없다.\n④ 래킹 (Racking)\n원인: 선체의 **옆면(횡방향)**에서 파도를 직접 받거나, 심한 **횡동요(Rolling)**를 할 때 발생합니다.\n현상: 좌우 양현의 흘수(잠기는 깊이)가 달라지면서 한쪽 측면에만 거대한 수압이 가해집니다.\n비유: 마치 성냥갑을 옆에서 눌러 찌그러뜨리는 것과 같은 평행사변형 형태의 변형이 일어납니다.", "id": 44}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "23. Green water flooding 이란?", "answer": ": 황천 항해 때 대량적인 파도가 상갑판에 올라오는 것\n◈ White water flooding : 물보라를 일으키는 침입수", "id": 45}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "65. Green Water Flooding 이란 무엇인지 설명하시오.", "answer": "선박이 악천후 중을 항해할 때 파도가 갑판상에 올라와서 갑판 위를 휩쓸고 지나 다닐때가 많다. 이때 갑판에\n올라와서 자유롭게 이동하는 바닷물을 그린워터(청파)라고 한다.", "id": 46}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. Tide way (유압차)", "answer": "해류나 조류에 떠밀려 항적과 선수미선 사이에 교각이 생기게 되는데, 이 교각을 유압차라고 한다. 일반적으로 선박에서는 풍압차와 유압차를 구별하지 않고 이들을 합쳐서 풍압차라고 하는 경우가 많다.", "id": 47}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. Lee way (풍압차)", "answer": "선박이 항행할 때 어느 한쪽 현에서 바람을 받아 풍하 쪽으로 떠밀려 실제 선박이 지나온 항적이 선수미선과\n이루게 되는 교각. 일반적으로 선박에서는 풍압차와 유압차를 구별하지 않고 이들을 합쳐서 풍압차라고 하는\n경우가 많다.", "id": 48}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "61. 정박시의 선수 요잉 방지 대책", "answer": "1) Anti-yawing anchor사용\n2) 2묘박시에 교각을 적절히 사용\n3) 특히 공선시에는 필요하면 Lower Hold에 주수\n4) 가능한 Trim by the stern으로\n5) Bow thruster로 Yawing moment를 조정", "id": 49}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 윈드라스 브레이크 Lining 및 Pad의 마모를 계측한다.", "answer": "2. 윈드라스 브레이크 Pad와 Lining의 간극을 계측하여 간극이 클 경우 간극을 줄여 브레이크 파워가 약해지지 않도록 한다.", "id": 50}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "12. DRAGGING ANCHOR와 DREDGING ANCHOR를 영어로 설명하시오.", "answer": "1. DRAGGING ANCHOR: Moving of an anchor over the sea bottom involuntary because it is no longer preventing of the vessel\n주묘: 앵커가 선체의 이동을 더 이상 저지하지 못하여 어쩔 수 없이 해저를 따라 끌리고 있는 상태\n2. DREDGING ANCHOR: Moving of an anchor over the sea bottom to control the movement of the vessel\n드레징: 선체의 운동을 제어하기 위하여 해저를 따라 앵커를 이동시키는 상태", "id": 51}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "13. 선박이 좌초시 안전하게 좌주하기 위해 파주력을 얻는데 사용하는 앵커법은?", "answer": "손상 확대를 막기 위한 조치:", "id": 52}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 자력으로 이초가 불가능할 때 선체를 현재 위치에 고정시킨다.", "answer": "2. 선체의 움직임을 방지하기 위해 선저탱크에 해수를 주입하여 선저를 해저에 밀착시킨다.", "id": 53}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 묘박지 선정 (수심, 저질, 안전거리, 기상상태, 정박기간 등)", "answer": "2. 앵커를 cock bill stand by(윈드라스 기어를 넣어서 앵커를 수면위까지 내리고 브레이크를 홀딩한 후 기어를\n빼서 투묘준비)", "id": 54}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 단묘박 후진 투묘법: 단묘박에서 가장 보편적으로 행하는 방법으로 후진기관 사용으로 배수류가 선체길이의", "answer": "2/3정도에 왔을 때 기관을 정지하고 투묘하면 4-5샤클 신출되고 정지된다. 이 투묘법은 선체 및 묘쇄에 무리가 가지 않고 투묘 직후에 닻이 해저에 잘 박힌다는 장점이 있으나 강한 풍조를 옆에서 받으면 정확한 투묘가\n어렵다는 단점이 있다.\n15. Slipping anchor, Sight anchor, Sweeping anchor에 대해서\n1) Slipping anchor(사묘): 어떤 사정에 의하여 양묘 불능 또는 양묘를 할 여유가 없을 때 묘쇄를 절단하여 묘를 버리는 것\n2) Sighting anchor(검묘): 장기간 묘박할 때 묘 및 묘쇄가 뻘속에 매몰되거나 선박의 선회로 묘쇄가 꼬이는 것을 방지하기 위하여 조용한 날씨에 묘를 한번 올렸다가 재투묘하거나 타 묘와 바꾸어 투묘하는 것\n3) Sweeping anchor: Slipping anchor나 해난사고로 인하여 anchor를 잃었을 때 갈고리나 Kedge anchor로써 anchor를 건져 올리는 것.", "id": 55}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "16. Anchoring 할 수 있는 최대 수심 결정은 어떻게 하는가?", "answer": "일반적으로 80-100미터가 최대 투묘 가능수심이다. 이를 결정하는 근거는 윈드라스의 heaving capacity이다.", "id": 56}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "9. 앵커를 놓을 수 있는 최대 수심은 얼마인가?", "answer": "1. 투묘의 최대수심은 선박의 windlass capacity load(W)에 의해 결정된다.\n2. 충분한 파주력을 위해서 신출 chain은 수심의 3배정도가 필요하므로, 수심이 너무 깊으면 해저의 파주부 chain이 적어 holding power가 부족하다. 예를 들어 chain이 10 shackle 인 경우, 최대 안전수심은 90~100m 정도이다.", "id": 57}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 계산 예", "answer": "1) 조건\nA. 앵카 무게: 16.125MT\nB. Diameter of Chain: 114mm\nC. Grade of Chain: Grade 3\n2) 계산\nA. Weight/mtr of grade 3 chain: 0.18478MT/mtr\nB. Windlass working capacity: 60MT\nC. 80% of working capacity: 48MT\nD. Weight of anchor + weight of chain: 48MT\nE. Weight of chain: 48-16.125MT = 31.8MT\nF. Mtr of chain: 31.8 ÷ 0.18478 = 108.65 ÷ 27.5 = 3.94 shackle\n즉, Max. Safe anchoring Depth는 3.94 shackle, 108.65미터 이다.", "id": 58}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 투묘지 선정시 고려사항을 설명하시오.", "answer": "고려사항으로 투묘지의 수심, 저질, 수면적, 기상 및 해상상태, 조석 및 조류, 해저 케이블 유무, 주변 선박량 및\n거리, 주변 위험물 및 장애물, 해도상 투묘 불가 구역 여부, Windlass의 성능, 정박기간 등을 확인한다.", "id": 59}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 선박이 항내에서 엔진, 러더 모두 사용 불가시 선속 제어방법 -> 비상투묘", "answer": "1) 선속이 6kts로 감속 되었을 때 양현 닻을 동시에 투하한다\n2) 묘쇄가 3 shackle 반출 후 잠시 hold on 하였다가 바로 내어주고\n3) 5 shackle mark가 보일 때 또 잠깐 hold on 하였고\n4) 6 shackle mark가 나올 때 좀 더 오래 hold on 하였고\n5) 7 shackle mark가 나왔을 때 장시간 brake를 걸어서\n6) 8 shackle에서 완전 hold on 하여 묘쇄의 stopper를 건다\n*이때 양현 닻을 각각 따로 투묘하면 각 개 경우에 묘쇄가 절단 된다.", "id": 60}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 심해투묘시 주의사항 (심해투묘법를 할 경우 워크백을 하는 이유를 설명하시오)", "answer": "수심이 깊은 장소에 투묘할 때에 통상의 투묘방식으로 cock bill 상태에서 닻을 직접 투하하면 닻이 해저에\n도달하기까지의 거리가 크므로 닻 및 닻줄은 대단한 힘으로 낙하할 것이고 다음의 문제점이 있다.\n1) 닻은 해저에 큰 충격을 가지고 충돌할 것이며 변형 및 손상을 일으킬 것이다. 특히 해저의 저질이 단단하면 위험하다.\n2) 신출되는 닻은 그것이 나가면 나갈수록 가속되어 억제가 곤란하게 된다. 그 때문에 windlass brake에 손상을 가져올 수 있다.\n3) 내려 떨어진 닻줄은 한점에 포개어져서 해저에 일직선으로 되기 힘들다.\n이러한 심해투묘가 요구되는 장소는 일반적으로 해저가 육안에서 급경사를 이루는 곳이 많고 저질도 좋지 않다. 그러므로 이러한 심해해역에서는 다음과 같은 요령으로 투묘를 실시한다.\n가. 수심이 30m 정도를 넘을 때\n여러 가지 방법에 의하여 반드시 수심을 확인한다. 약 1 shackle 정도 walk back(windlass drum에 lock을 넣은 채 반전하여 물밑으로 cable을 밀어내림)한 후 lock pin을 빼고 극히 약한 타력으로 brake wheel을 이용하여 투묘 한다.\n나. 수심이 50m 정도가 넘을 때\n반드시 수심을 확인한 후에 windlass로 walk back 하여 anchor가 해저에 닿도록 한 뒤 미소타력으로 묘쇄를\n신출한다.\n다. 수심이 80m 정도가 될 때\n반드시 수심을 확인한 연후에 windlass로 예정신출전량을 walk back하고 나서, 묘쇄를 해저에 뻗히도록한다.\n라. 육안에 가깝게 해저가 급경사가 되어 있을 때처음부터 예정 수심정도의 묘쇄를 walk back하여 서서히 미속으로 육안을 향하여 접근하다가 해저에 닻이 접하면 예정신출량을 walk back하고 묘박한다.", "id": 61}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 후진 투묘방법 (anchor놓을시 배수류가 어느정도 왔을때 let go anchor 하는가)", "answer": "예정 berth의 좀 전방에서 후진을 걸고 후진을 시작하여 투묘 예정점에 다시 come back하였을 시 투묘하는 방법으로 보통, 반전 screw의 discharging current의 흰 거품이 선수부근에 이르면 stop engine하고 anchor let go 하면 3~4 shackle이 신출된 후 선박이 멈추고 서게 된다.\n1) 투묘 직후 곧 닻이 해저에 잘 박힐 수 있고,\n2) 투묘지점에서 bring up될 때까지의 닻의 주행거리가 짧고,\n3) 후진타력의 제어가 용이하여 선체와 닻줄에 무리한 힘이 가하여지지 않는 이점이 있으나, 강한 풍조를 옆에서 받으면 정확한 투묘가 안되는 결점이 있다. 상선이나 군함 등에서 single anchoring 시 통상적으로 행하여지는 방법이다.", "id": 62}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. 파주력 계산하는 법? 앵카의 파주계수와 체인의 파주계수는 같은가?", "answer": "묘가 해저에 파고 들어가 떨어지지 않으려는 힘으로 선체에 작용하는 외력에 대항하여 선체를 안전하게 정박\n시켜주는 힘을 말하고 묘에 의한 것과 묘쇄에 의한 것으로 분류한다.\n->파주력=묘의 수중중량 * 묘의 파주계수 + 단위묘쇄의 수중중량 * 해저에 깔린 묘쇄의 길이* 묘쇄의 파주계수\n앵커의 파주계수와 체인의 파주계수는 다르다.", "id": 63}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. mooring 시의 전진투묘", "answer": "전진타력에 의하여 제1묘를 투하하고 전진타력이 없어질 때에 제2묘를 투하하는데 이런 방법을 running moor 또는 flying moor라 한다.\n1) 예정 berth의 전방 대략 한쪽 묘쇄의 예정 신출길이 전방에서 제1묘를 투하하고 계속하여 묘쇄를 신출하며 끌고 필요하면 기관 및 타를 사용하여 똑바로 진행하면서 단일묘 예정 신출길이의 배 정도 나가면 남은 타력이 전부 없어질 때까지 chain cable을 hold on 하여 묘쇄가 해저에 일직선으로 깔리도록 하고 난 다음 제2묘를 투하한다.\n2) 제1묘쇄를 감으면서 제2묘쇄를 내어주고 중간쯤의 위치에서 양현 묘쇄를 거의 등량으로 tight 시킨다. 이 방법에서는 holding power는 단묘박에 비하여 크지 않으나, 1) 풍조가 있더라도 조선하기 쉽고, 2) 정확한 위치에\n투묘할 수 있으며, 3) 정박수면이 좁아도 된다는 이점이 있다. 일반적으로 mooring 시 많이 채용하는 방법이다. 기타 2묘박시 투묘법도 준하여 생각하면 쉽게 알 수 있을 것이다.", "id": 64}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. mooring 시의 후진투묘", "answer": "1) 예정 berth를 지나서 그 전방으로 약 제1묘쇄의 예정 신출길이만큼의 지점에 왔을 때 선박이 정지하고 후진타력을 갖기 시작하도록 조선하여 여기서 제1묘를 투하하고,\n2) 제1묘쇄를 신출하면서 기관 및 타를 사용하여 가능하면 똑바로 후진한다. 제1묘쇄가 신출 예정 길이의 약 2배가 되면 제2묘를 투하하고,\n3) 제1묘쇄를 감아들이면서 제2묘쇄를 내어준다. 양현묘쇄의 신출량이 등량으로 되었을 떄 tight 시키고 끝맺는다. 기타 2묘투묘시는 이에 준하여 생각하면 쉽게 행할 수 있을 것이다.\n이 투묘법은 선체 및 묘쇄에 무리한 힘을 가하지 아니하고 할 수 있는 이점이 있으나, single screw선은 직후진이 곤란하므로 풍조를 옆에서 받으면 양호한 묘박자세가 잘 이루어지지 않는 결점이 있다.", "id": 65}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "7. 위험물 주변 투묘시 주의사항을 말하시오.", "answer": "1. 위험물과의 거리 확인 후 묘박법, 앵커 신출량 결정 및 선박 Swing Distance를 확인한다.\n2. 기상 및 해상 상태를 확인하여 Anchor Dragging 가능성에 대비한다. (필요시 Engine Stand by 유지)", "id": 66}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "8. 투묘법에 대하여 설명하시오.", "answer": "투묘법에는 전진투묘법, 후진투묘법 및 심해투묘법 등이 있다. 1. Single Anchor의 전진투묘법 예정 Berth에 진입하여서도 상당한 타력으로 진행하면서 투묘하고 묘쇄를 내어주면서 묘박태세를 취하는 방식으로 보통 좁은 수역에서 강한 풍조를 옆에서 받고 투묘할 때 사용한다.", "id": 67}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. Single Anchor의 후진투묘법", "answer": "상선에서 통상 사용하는 방법으로 예정 Berth의 조금 전방에서 후진을 걸고 후진을 시작하여 투묘 예정점에 다시 come back 하였을 때 투묘하는 방법으로 보통 반전 screw의 discharging current가 선수에 채 미치지 못하였을 때 투묘하여 3~4 shackle이 신출될 때 멈추게 된다.", "id": 68}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 단묘박 (Lying at Single anchor): 선박이 선수 양현묘 중 하나를 던지고 묘박하는 방법. 넑은 수역을 필요로", "answer": "하고 swing이 심하면 주묘의 우려가 있으나 투묘 조작이 비교적 간단하고 황천 등에 응급조치를 취하기 쉽다.\n2. 쌍묘박(mooring): 선박에 장착되어 있는 좌,우현의 앵커를 모두 놓은 묘박법 중에서 양현 앵커의 사이각이\n120도 이상이 되게 놓는 방법을 말한다. 쌍묘박은 선체의 회전반경을 줄일 수 있는 장점이 있는 반면에 투묘\n조작이 복잡하고 장기간 묘박시 foul cable이 되기 쉽고, 황천 등에 대한 응급조치를 취하는데 어려움이 있다.\n3. 이묘박(riding at two anchor): 폭풍 또는 강풍을 동반한 파랑이 심한 수역 또는 current가 있는 곳에서 강력한 파주력을 얻거나 선체의 동요를 막으면서 강한 파주력을 얻고자 할 때 사용하는 묘박법.\n4. 선수미묘박(mooring by the head and stern): 선수미에서 각각 1개의 묘를 투하하여 선수방향을 일정하게\n유지하는 방법.", "id": 69}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "18. 이묘박과 쌍묘박 중 파주력이 더 큰 것은?", "answer": ": 이묘박", "id": 70}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "19. 쌍묘박과 2묘박의 차이점은 무엇인가?", "answer": "똑같이 2개의 묘를 사용하지만 쌍묘박은 정박수역을 좁게하고자 할 때, 2묘박은 강력한 파주력을 얻고자 할 때 사용한다. 쌍묘박은 양현 앵커의 사이각이 120도 이상이 되게 놓는 방법을 말한다.", "id": 71}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "9. 전진투묘, 후진투묘법의 장단점", "answer": "1) 전진 투묘법 :\n선박이 좁은 수역에서 강한 바람이나 조류를 옆에서 받고 투묘할 때 많이 사용하는 방법 // 앵커체인과 선체와의 마찰에 의한 손상이 일어나기 쉽고, 전진 타력이 너무 크면 앵커 체인이 묘쇄공의 끝에서 급각도로 꺽여서 절단될 위험이 있다.\n2) 후진 투묘법 :\n예정 정박지를 향하여 저속의 전진타력으로 접근하다가, 예정 투하지점을 지날 때 후진기관을 사용하여 후진 타력이 생기면 앵커를 투묘하는 방법, 이 방법은 투묘 직후 곧바로 앵커 체인이 선수 방향으로 나가게 되어 선체에 무리가 없고 확실하게 투하할수 있으며, 또 후진 타력의 제어가 쉬워서 일반 선박에서 가장 많이 사용하는 방법이다. // 조종과 보침이 다소 어렵고, 옆에서 바람이나 조류를 받게 되면 정확한 위치에서 투묘하기 어려운 단점이 있다.", "id": 72}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "20. Brought up의 중요성 및 판단근거를 설명하시오.", "answer": "1) 정의\nLet Go Anchor 후 Anchor Fluke가 해저에 파고들어 안정된 파주력을 얻게 된 상태. Brought up이 되어야 선박이\nDragging 되지 않고 파주력을 가져서 안전하게 묘박되었다는 것이다.\n2) 판단근거\n선박이 Let go anchor 후 전진 또는 후진 타력으로 인해 Chain이 최대로 뻗게 되는 순간 anchor의 파주력과\n움직이려는 선체의 힘싸움이 최대가 되며, 이후 선체의 운동 에너지가 파주력 이하로 줄어들면서 선체가 anchor\n쪽으로 끌려가게 되고 Chain의 장력이 사라진다.\n즉, 선수에서 보기엔 처음엔 Chain의 장력이 최대가 되었다가 이후 장력이 사라지면 brought up이 되었다고 판단한다. 단, 장력이 사라진 직후 Chain에 다시 장력이 걸렸다 줄어들기를 반복할 경우 anchor가 해저에 안착되지 못하고 선체를 따라 끌려가는 상황이므로 재투묘를 해야 한다.", "id": 73}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "57. 화재시 선박 조종", "answer": "- 화재시에는 선속을 줄이거나 필요시 정선하여 바람의 영향을 덜 받도록 하고, 바람을 등지도록 침로를 유지\n하여 유독가스를 피하도록 조선한다.\n*In case of E/R fire ,closing the Quick closing valves, Stopping Fuel pumps and Purifiers", "id": 74}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "25. 조정 성능 시험이란 무엇인가?", "answer": "대형선박의 출현에 따라 그 조종성이 중요시 되면서 선박의 조종 성능을 TEST하게 되었는데 이것을 선박의 조정 성능 시험이라 할 수 있다.\n1) ZIG ZAG 시험(Z 시험) : 추종 성능을 알아내는 시험(실제 반대 타효에 대한 성능 시험)\n2) SPIRAL 시험 : 침로 안정성의 정도를 알아내는 시험\n3) 선회권 시험", "id": 75}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "26. 지그재그 테스트란 무엇인가?", "answer": ": ZIG ZAG TEST 란 실제 반대 타효에 대한 본선 조종성능(추종성능)을 알기 위해 하는 TEST로서 선수를 일정 각도만큼 ZIG ZAG 로 회두시켜 실제 반대 타효가 얼마만큼의 Overshoot angle을 갖는가를 측정하는 것을 말한다.\n◈ ZIG ZAG test 시 Overshoot angle은 무엇을 뜻하며 어디에 사용하는가?\nZIG ZAG 20/20 Test라면 선박이 전속항해로 초기 침로를 000도라고 했을 때,\n① 타를 Port 20하여 침로가 340도가 되는 순간에 반대로 Stbd 20를 한다. 우전타를 해도 선박은어느 정도 좌현으로 돌다가 회두를 멈추고 우현으로 돌게 된다. 가령 333도까지 더 돌아간 각도 즉, 7도가 제1 Overshoot angle이고,\n② 계속 우현으로 돌고 있는 상태에서 침로가 020도가 되면 다시 타를 Port 20한다. 이때도 선박은 우현으로 어느 만큼 더 돌다가 회두가 멈추고 좌현으로 돌게 된다. 가령 028도까지 갔다가 좌현으로 돌기 시작했다면 020도에서 028도까지 더 돌아간 각도 즉, 8도가 제 2 Overshoot angle이 된다.\n③ 선박이 좌현으로 회두하여 340도까지 이르면 다시 Stbd20를 한다. 여기에서도 334도까지 좌회두를 하다가 우회두로 바뀌었다면 6도가 제3 Overshoot angle이 된다.\n④ 이제 원침로 000도에 정침을 하면 된다. 우현으로 돌때 더 돌아간 만큼 즉, 제2 Overshoot angle인 8도만큼 전에, 원침로가 000도니까 352도에서 타를 Port 20하면 거의 000도에서 회두가 멈출 때 Steady한다. 본선 조종성능을 알고 조선하면 굴곡이 많은 협수로에서 자신 있게 조선할 수 있다.\n제가 1월말에 1급 면접을 처음 봤는데그 질문중 하나가 심해투묘시 주의사항이었습니다당연히 선체와 윈드라스 앵커에 손상이.가지않도록 워크백해서 앵커를 놓는다고대답했습니다근데 하나 더 있다고 하더라구요....뭘까요.................☆정확히 기억이 나진 않지만 그 때 교수님중에 한분이윈드라스 파워 관련이라고 넌지시 얘기한것 같습니다얼떨결에 본선 윈드라스 파워 capa에 의해 적당한 수심에앵커를 놓아야한다고 대답했고 그럼 그 capa는어디서 확인하냐고 하길래 windlass manual에 있다고했더니 비웃더라구요......사실 본적이 없습니다...어디있을까요...나와있기는한걸까요???그리고 그 capa가 어디 메뉴얼에 나온다고 가정하겠습니다그리고 본선 capa상 100미터 이상에는 놓기 힘들다고가정합니다...그리고 경험상 노후 벌크선들은 100미터 이상에 앵커 놓으면 안올라오긴 하더라구요아랍에미레이트 후자이라 포트에서 벙커를 받는경우일반 벙커 수급을 위한 에어리어는 다 수심 100미터 이상입니다....그럼 용선주가 이 포트에서 벙커를 하겠다라고 하면 본선에서 아 우리 거기 앵커 못놓는다라고 거절할 수 있는건가요.....솔직히 심해투묘 관련해서 워크백 말고는 뭔지 이해가잘 안됩니다...특히 그 교수님이 얘기하셨건것으로기억되는 윈드라스 파워같은경우는.좀 억지라고 생각되는데요...아 물론 이론적으로는.맞는말이지만실무적으로 ....흠....\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n정확하게는 기억 안나지만앵커2개+체인90m의 무게 인가까지 감을수있는걸로알고있습니다\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n앵커2개의 무게와 체인90미터의 무게의 합이라는말씀이시죠...??감사합니다\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n윈드라스 capa보다 끌어올려야할 앵카+체인의 무게가 크면 당연히 안올라옵니다. 심해투묘시 반드시 주의해야 할 사항이고, 워크백으로 투묘한다고 해도 capa보다 큰 무게의 앵카+체인이 사출되면 윈드라스 기어 풀리면서 체인 그대로 전부 다 나갑니다. 윈드라스의 capa는 iacs에서 규정한 의장수 공식에 따라 정해지고, 이 의장수에 따라 앵카 크기,무게,체인무게 등 모든 것이 결정됩니다\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n그러면 윈드라스 capa보다 앵카+체인의 무게가 더 크게건조하는 이유는 뭔가요예를들어 스타보드 앵카가 13schacle이면당연히 윈드라스는 앵카+13schacle의 무게를다 올려야되는거 아닌가요\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n해저면에 닿은 앵카+체인과 체인락커에 보관된 체인은 윈드라스에 아무런 무게영향을 주지 않습니다;; 윈드라스에 영향을 주는건 수중에 떠있는 앵카/체인의 무게죠;;;\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n음...그럼 예를들어 수심이 100미터면 거의 3~4샤클이니까 앵커+3~4샤클의 무게겠군요\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero\n저도 한마디 거들자면, 질문자님이 알고 싶어하는 본선의 WINDLASS HAULING CAPACITY는 보통은 BRIDGE에 붙어 있습니다.본선 ANCHOR&CHAIN제원에 따른 최대 묘박 가능 깊이에 대한 주의문이 이미 계산되어져 나와 있습니다. 만약 없으면 회사에 요청해 보시기 바랍니다\n[출처] 질문투척2 심해투묘에 관해서 (해기사공부방) |작성자 lovenovazero", "id": 76}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "28. 워크백(Walk back) 과 워크아웃(Walk out) 의 차이", "answer": "1) 워크백(Walk back) : 수심이 깊은 묘지에서 투묘할 때 윈드라스(WINDLASS)의 기어를 넣은 상태로 해저 근처까지 앵커를 내리고 브레이크를 홀딩(HOLDING)한 후 기어를 빼서 투묘 준비를 한 상태를 말한다. 이와 같은 방법을 이용한 투묘법은 가속도에 의해 윈드라스나 브레이크에 무리가 가는 것을 방지하기 위한 것이라고 할 수 있다.\n2) 워크아웃(Walk out) : 윈드라스 기어를 넣어서 앵커를 수면 위까지 내리고 브레이크를 홀딩한 후 기어를 빼서 투묘 준비를 한 상태를 말하며, 코크 빌(COCK BILL) 이라고도 한다. 이와 같은 방법을 이용한 투묘법은 묘지의 수심이 15패덤(약 27미터) 이하일 때의 투묘법으로 비교적 심해가 아닌 수심에서 사용되는 방법이라 할 수 있다.\n◈ 심해 anchoring 가능 묘쇄 기준은 몇 미터?\n: 15 패덤 (약 27 미터, 약 30 미터로 사용되고 있음)\n3) 워크아웃이라는 용어는 선상실무에서 잘 사용하지 않으며, 투묘 준비 할 때 \"XX SHACKLE WALK BACK 하라\" 고 하지 않으면 그냥 워크아웃으로 준비를 하면 되겠다.", "id": 77}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 윈드라스 브레이크 Lining 및 Pad의 마모를 계측한다.", "answer": "2. 윈드라스 브레이크 Pad와 Lining의 간극을 계측하여 간극이 클 경우 간극을 줄여 브레이크 파워가 약해지지 않도록 한다.\n4) IMO 표준해사영어에서의 용어 설명\n▶ Walk back : To reverse the action of a windlass to ease the cable of anchor.\n▶ Walk out : To reverse the action of a windlass to lower the anchor until it is clear of the hawse pipe and ready for dropping.", "id": 78}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "30.심해투묘시 주의할 사항", "answer": ": 묘쇄의 길이를 고려, 투하시 윈드라스 손상의 위험이 있으므로 수심에 따라 적절한 길이를 워크백하여 시행하여야 함.\n(3) 심해투묘법\n선박의 크기에 따라서 차이가 있지만 일반적으로 수심이 30m이상의 수역에서는 반드시 앵커 및 앵커 체인케이블의 적당한 길이를 워크백(Walk back)하여 투묘하도록 한다.\n2) 심해투묘시 주의사항 (심해투묘법를 할 경우 워크백을 하는 이유를 설명하시오)\n수심이 깊은 장소에 투묘할 때에 통상의 투묘방식으로 cock bill 상태에서 닻을 직접 투하하면 닻이 해저에\n도달하기까지의 거리가 크므로 닻 및 닻줄은 대단한 힘으로 낙하할 것이고 다음의 문제점이 있다.\n1) 닻은 해저에 큰 충격을 가지고 충돌할 것이며 변형 및 손상을 일으킬 것이다. 특히 해저의 저질이 단단하면 위험하다.\n2) 신출되는 닻은 그것이 나가면 나갈수록 가속되어 억제가 곤란하게 된다. 그 때문에 windlass brake에 손상을 가져올 수 있다.\n3) 내려 떨어진 닻줄은 한점에 포개어져서 해저에 일직선으로 되기 힘들다. 이러한 심해투묘가 요구되는 장소는 일반적으로 해저가 육안에서 급경사를 이루는 곳이 많고 저질도 좋지 않다. 그러므로 이러한 심해해역에서는 다음과 같은 요령으로 투묘를 실시한다.\n가. 수심이 30m 정도를 넘을 때\n여러 가지 방법에 의하여 반드시 수심을 확인한다. 약 1 shackle 정도 walk back(windlass drum에 lock을 넣은 채 반전하여 물밑으로 cable을 밀어내림)한 후 lock pin을 빼고 극히 약한 타력으로 brake wheel을 이용하여 투묘 한다.\n나. 수심이 50m 정도가 넘을 때\n반드시 수심을 확인한 후에 windlass로 walk back 하여 anchor가 해저에 닿도록 한 뒤 미소타력으로 묘쇄를\n신출한다.\n다. 수심이 80m 정도가 될 때\n1) 투묘지 선정시 고려사항을 설명하시오.\n고려사항으로 투묘지의 수심, 저질, 수면적, 기상 및 해상상태, 조석 및 조류, 해저 케이블 유무, 주변 선박량 및\n거리, 주변 위험물 및 장애물, 해도상 투묘 불가 구역 여부, Windlass의 성능, 정박기간 등을 확인한다.", "id": 79}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "33. 계선시설의 종류를 열거하시오", "answer": "1) 안벽(quay) : 배를 접안시킬 목적으로 해안이나 강가를 따라서 콘크리트로 쌓아 올린 시설물을 안벽이라고 하며, 그 하부로는 물이 유통하지 않는다.\n2) 부두(wharf) : 안벽이나 잔교를 포함한 하역 및 창고 등의 육상의 설비를 갖춘 모든 구조물을 총칭하여 부두라고 부른다.\n3) 잔교(pier) : 비교적 수심이 깊은 곳에서 수중에 기둥을 세우고, 그 위를 연결하여 시멘트 또는 목판으로 덮은 구조물이다.\n4) 돌핀(dolphin) : 수심이 아주 깊은 바다 가운데에 몇 개의 기둥을 조합하여 세운 계선 시설을 특별히 돌핀이라고 부르며, 주로 대형 유조선이나 광석선 등에 많이 이용된다.\n5) 싱글 부이 무어링, 싱글 포인트 무어링(single buoy mooring; SBM, single point mooring; SPM) :\n대형 유조선의 경우에 부두에 직접 접안하기가 어려운 곳에서는 바다 가운데에 대형 계류 부표를 설치하고, 육상으로부터 계류 부표까지 송유관을 설치하여 화물의 적•양하 작업을 할 수 있도록 한 설비를 말한다.", "id": 80}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "40. 항해중 UKC은 어느 정도 입니까?", "answer": ": under keel clearance(선저여유수심)으로 외해항로에서는 최대흘수의 약 20% 협수로 및 항내에서는 최대흘수의 약 10%정도를 확보해야 한다.", "id": 81}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "42. 앵커 투묘 시에 고려해야 할 것은?", "answer": "1) 수심\n2) 저질\n3) 타 선박과의 안전거리\n4) 다가올 기상상태\n5) Windlass의 성능\n6) 정박기간 등", "id": 82}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "53. 선박의 조종 성능(선회성, 보침성, 추종성)에 대하여 설명하시오.", "answer": "선박의 조종성능을 세분하면 다음과 같이 나눌 수 있다.\n1) 침로안정성능(針路安定性能, Course Keeping Ability) :보침성\n: 침로안정성능(보침성)은 선박이 원하는 방향으로 똑바로 갈 수 있는 능력을 말한다. 침로안정성능과 관련 있는 것으로 동적안정성(動的安定性, Dynamic Stability)이 있다. 똑바로 가고 있는 선박이 외부로부터 일시적인 교란(예를 들어 바람이나 파도)을 받게 되면 선회하게 된다.\n이 교란이 잠시 후 사라졌을 때 선박이 더 이상 선회하지 않고 직진한다면 이 선박은 동적으로 안정한 선박이라고 한다. 만일 교란이 사라진 후에도 선박이 계속 선회한다면 이 선박은 동적으로 불안정한 선박이다.\n2) 변침성능(變針性能, Course Changing Ability) : 추종성\n: 변침성능(추종성)은 선박이 충돌이나 좌초 등이 일어날 수 있는 상황에서 방향을 바꾸어 위험을 회피할 수 있는 능력을 나타내는 척도이다. 변침성능은 직진 상태에서 정해진 방향으로 바꾸는데 필요한 시간으로 판정할 수 있다. 한 쪽 방향으로 돌고 있는 선박의 방향을 반대 방향으로 바꾸는 능력도 변침성능에 포함된다.\n3) 선회성능(旋回性能, Turning Ability)\n: 선회성능은 선박의 진행 방향을 180도 바꿀 때 필요한 공간의 크기로 판단한다. 선박이 진행 중에 앞에 장애물이 있는 경우 방향을 바꾸어 옆으로 비껴 가는 것이 첫 번째 생각할 수 있는 선택이다. 만약 옆으로 피할 공간이 없는 경우에는 정지하여야 할 것이다. 그러나 선박은 관성력이 커서 프로펠러를 역전시켜 정지를 시도한 후 멈추기까지의 정지거리가 매우 길다.\n통상 선박의 정지거리는 배 길이의 10배에서 15배에 이르므로, 200m 길이의 선박은 장애물을 발견하고 정지 명령을 내리더라도 2∼3km 앞으로 더 나아간 후 정지하게 된다. 따라서 선박 앞의 장애물이 가까운 거리에 있는 경우에 최후의 선택은 방향을 바꾸는 것이다. 이 때 선박이 방향을 바꾸기까지 나아가는 거리는 통상 배 길이의 5배 이하이므로 효과적인 회피 수단이 된다. 이러한 의미에서 선박을 360도 회전시켰을 때 차지하는 공간의 크기가 작을수록 선회성능이 우수한 선박이다.\n4) 정지성능(停止性能, Stopping Ability)\n: 정지성능은 앞에 설명한 바와 같이 정지할 때까지 필요한 거리가 판단 지표이다.\n정지성능을 향상시키려면 큰 후진력을 낼 수 있는 프로펠러와 엔진이 필요하다.", "id": 83}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 조종성의 3요소 이해", "answer": "1) 추종성(Yaw quick responsibility): 회두의 추종능력.\n2) 침로안정성(Course stability): 정해진 침로를 따라 직진하는 성질\n3) 선회성(Turning ability): 일정 타각이 주어졌을 때 선박이 어떠한 각속도로 움직이는지를 나타내는 능력\n4) 방형계수가 큰 비대선은 선회성이 양호하고 방형계수가 적은 선박은 추종성 및 침로안정성이 뛰어나다.\ncf) 일반화물선의 경우 일정한 침로의 유지가 중요하기 때문에 추종성과 침로안정성을 바탕으로 한 보침성이\n중요한 반면 군함이나 어선, 예선 등은 빠른 기동력을 필요로 하기 때문에 보침성보다는 선회성이 요구된다.\n☞ 선박의 조종 성능- 선회성, 보침성, 추종성\n선박의 조종성능을 세분하면 다음과 같이 나눌 수 있다.\n1) 침로안정성능(針路安定性能, Course Keeping Ability) :보침성\n2) 변침성능(變針性能, Course Changing Ability) : 추종성\n3) 선회성능(旋回性能, Turning Ability)\n4) 정지성능(停止性能, Stopping Ability)\n침로안정성능(보침성)은 선박이 원하는 방향으로 똑바로 갈 수 있는 능력을 말한다.\n침로안정성능과 관련 있는 것으로 동적안정성(動的安定性, Dynamic Stability)이 있다. 똑바로 가고 있는 선박이 외부로부터 일시적인 교란(예를 들어 바람이나 파도)을 받게 되면 선회하게 된다. 이 교란이 잠시 후 사라졌을 때 선박이 더 이상 선회하지 않고 직진한다면 이 선박은 동적으로 안정한 선박이라고 한다. 만일 교란이 사라진 후에도 선박이 계속 선회한다면 이 선박은 동적으로 불안정한 선박이다.\n선회성능은 선박의 진행 방향을 180도 바꿀 때 필요한 공간의 크기로 판단한다. 선박이 진행 중에 앞에 장애물이 있는 경우 방향을 바꾸어 옆으로 비껴 가는 것이 첫 번째 생각할 수 있는 선택이다. 만약 옆으로 피할 공간이 없는 경우에는 정지하여야 할 것이다. 그러나 선박은 관성력이 커서 프로펠러를 역전시켜 정지를 시도한 후 멈추기까지의 정지거리가 매우 길다. 통상 선박의 정지거리는 배 길이의 10배에서 15배에 이르므로, 200m 길이의 선박은 장애물을 발견하고 정지 명령을 내리더라도 2∼3km 앞으로 더 나아간 후 정지하게 된다.\n따라서 선박 앞의 장애물이 가까운 거리에 있는 경우에 최후의 선택은 방향을 바꾸는 것이다. 이 때 선박이 방향을 바꾸기까지 나아가는 거리는 통상 배 길이의 5배 이하이므로 효과적인 회피 수단이 된다. 이러한 의미에서 선박을 360도 회전시켰을 때 차지하는 공간의 크기가 작을수록 선회성능이 우수한 선박이다.\n변침성능(추종성)은 선박이 충돌이나 좌초 등이 일어날 수 있는 상황에서 방향을 바꾸어 위험을 회피할 수 있는 능력을 나타내는 척도이다. 변침성능은 직진 상태에서 정해진 방향으로 바꾸는데 필요한 시간으로 판정할 수 있다. 한 쪽 방향으로 돌고 있는 선박의 방향을 반대 방향으로 바꾸는 능력도 변침성능에 포함된다.\n정지성능은 앞에 설명한 바와 같이 정지할 때까지 필요한 거리가 판단 지표이다. 정지성능을 향상시키려면 큰 후진력을 낼 수 있는 프로펠러와 엔진이 필요하다.", "id": 84}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. IMO 조종성능시험 대상 선박", "answer": "* 이 기준은 1994년 7월 1일 이후 건조된 타와 추진기를 갖춘 길이 100미터 이상의 선박과 선체의 길이에 관계\n없이 Chemical tanker와 Gas Carrier에 적용한다. 기준조종시험(Standard Manoeuvres)은 정상 항해시에는 계속적 또는 즉각적으로 사용되지 않는 어떠한 보조수단의 사용 없이 행하여져야 한다.\n* 기준이 적용되는 조건\n- 심해이고 제한되지 않은 수역\n- 조용한 해상상태\n- 만선, Even keel 상태\n- Test speed에서 정침 상태: 엔진 최대출력의 85%에서 내는 출력에서의 Speed의 최소 90%", "id": 85}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "28. IMO 조종성능 시험은 무엇을 확인하기 위한 테스트이며 그 방법을 설명하시오.", "answer": "* 이 기준은 1994년 7월 1일 이후 건조된 타와 추진기를 갖춘 길이 100미터 이상의 선박과 선체의 길이에 관계\n없이 Chemical tanker와 Gas Carrier에 적용한다. 기준조종시험(Standard Manoeuvres)은 정상 항해시에는 계속적 또는 즉각적으로 사용되지 않는 어떠한 보조수단의 사용 없이 행하여져야 한다.\n* 기준이 적용되는 조건\n- 심해이고 제한되지 않은 수역\n- 조용한 해상상태\n- 만선, Even keel 상태\n- Test speed에서 정침 상태: 엔진 최대출력의 85%에서 내는 출력에서의 Speed의 최소 90%\n1) 선회성능 기준\n①선박의 선회성능 기준은 사용타각 10도에 의한 초기선회성능 및 전타의 최대타각에 의한 정상선회성능으로\n구분한다.\n②초기선회성능: 초기선회성능 시험은 좌,우현의 10도의 타각을 발령하여 초기침로에서 선수방위가 10도 변위\n될 때까지의 전진 이동거리가 선체 길이(L)의 2.5배 이하로 규정하고 있다.\n③정상선회성능: 정상선회성능은 좌우현의 전타각 35도를 발령하여 선수방위가 360도 변위 될 때까지의 90도\n선회지점의 종거(Advance distance)는 4.5L 이하, 그리고 180도 선회지점의 최대 선회경의 전술직경(Tactical diameter)은 5L 이하로 규정하고 있다.", "id": 86}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "11.시운전 시 테스트하는 IMO 조종성 시험에는 어떤 종류가 있는가?", "answer": "1) 선회성능 시험 : 선회 성능을 알아보기 위한 시험\n2) 지그재그 시험 : 변침 성능(추종성능?)을 알아보기 위한 시험\n3) 나선 시험 : 침로안정성(보침성능?)의 정도를 알아보기 위한 시험\n4) 정지 시험(후진 성능 시험)", "id": 87}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "12.무엇을 확인하기 위한 테스트이며 그 방법은?", "answer": "1)선회 성능 시험\n초기선회성능 시험\n좌/우현의 10도의 타각을 발령하여 초기침로에서 선수방위가 10도 변위될때까지의 전진이동거리가 길이(L)의 2.5배 이하로 규정하고 있다.\n정상선회성능\n정상선회성능 기준은 아래 좌/우현의 전타각 35도를 발령하여 90도 선회지점의 종거는 4.5L 이하 그리고 180도 선회지점의 최대선회경의 전술직경은 5L 이하로 규정하고 있다.\n2)지그재그시험(선수요 저지성능 시험) : 변침성능을 알아보기 위한 시험\n선수요저지성능 기준은 지그재그 선수요저지성능시험의 오버슈트각으로 규정하고 있으며 타각 10도에 의한 지그재그 10도/10도 조타(선)법 및 타각 20도에 의한 지그재그 20도/20도 조타법에 의한 과도선수각인 오버슈트각으로 평가한다.\n3)나선 시험\n-각 선회시험에서 측정된 선박의 선회각속도를 타각에 대하여 그린 곡선인 나선 곡선곡선부터 선박 침로 안정성 여부를 판단한다.\n4)정지 시험(후진 성능 시험)\n후진성능 기준은 만재 상태의 항해전속전진에서 긴급후진 전속을 발령하여 전진타력이 ZERO가 되면서, 선체가 완전히 정선할때까지의 최단정지거리(TRACK REACH)가 15L 이하가 되어야 한다..\n[추가 질문] 나선시험을 하는 이유를 말하시오.\n각 선회시험에서 측정된 선박의 선회각속도를 타각에 대하여 그린 곡선인 나선 곡선으로부터 선박 침로 안정성 여부를 판단한다.\n[추가 질문] 정지성능기준을 ‘정지할 때까지의 전 항주거리가 선박의 길이의 15배를 넘지 않을 것’ 이라고 하였는데 무조건 선박의 길이의 15배가 넘으면 안되는지 말하시오.\nIMO 선박 조종성능 기준에 따라 선박의 길이의 15배가 넘지 않아야 한다. 단, 해사국으로부터 \"Low Powered Large Displacement vessels\"으로 분류받은 선박인 경우에는 20L이하가 되면 된다.\n[추가 질문] 대답 중 선박의 길이의 5배를 넘지 않아야 한다고 하였는데 이때 ‘선박의 길이’ LOA인가 LBP인가?\nLBP 입니다.\n[추가 질문] EMCY steering gear test에서 비상수동조타시 타기를 움직이기 위해서 무엇을 움직여야 타가 움직이는가?\n비상수동 제어레버를 움직이면 타가 움직이게 된다. 명령된 타각을 수행한 후 중립위치로 되돌린다", "id": 88}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 선회권중, 종거, 횡거, 심거, 가 무엇인지", "answer": "- 횡거(Transfer) : 전타점에서 각변위량이 90도 되는 점까지의 원침로상에서 직각 방향으로 잰 거리\n- 종거(Advance) : 전타점에서 각변위량이 90도 되는 점까지의 원침로상에서의 전진 거리로 전속 전진상태에서 선체 길이의 약 3배 정도\n- 리치(Reach) : 전타개시 위치에서 정상선회권의 중심까지의 원침로상에서 잰거리, 이것은 조타에 대한 추종성을 나타내며, 타효가 좋은 선박일수록 짧다. 통상 선체길이의 1~2배\n키 중앙 상태로 직진 항진하는 상태에서 일정한 타각을 주면 선체는 키에 작용하는 압력에 의하여 선회운동을 하게 되는데 이러한 선회운동에서 무게 중심이 그리는 항적을 선회권이라고 한다.\n-선회 종거 (Advance): 전타를 처음 시작한 위치에서 선수가 원침로로부터 90도 회두했을 때까지의 원침로 선상에서 전진 이동 거리로 전속전진 상태에서 선체 길이의 3~4배이다. ( 4.5L 이하)\n-선회 횡거 (transfer): 선체 회두가 90도 된 곳까지 원침로에서 직각 방향으로 잰 거리로 선회경의 0.55배정도가 된다.\n-선회경 (Tactical diameter): 회두가 원침로로부터 180도 된 곳까지 원침로에서 직각 방향으로 잰 거리로 선회지름이라고도 한다. (5.0L 이하)", "id": 89}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. IMO 조종 성능 테스트 설명하라", "answer": "* 이 기준은 1994년 7월 1일 이후 건조된 타와 추진기를 갖춘 길이 100미터 이상의 선박과 선체의 길이에 관계\n없이 Chemical tanker와 Gas Carrier에 적용한다. 기준조종시험(Standard Manoeuvres)은 정상 항해시에는 계속적 또는 즉각적으로 사용되지 않는 어떠한 보조수단의 사용 없이 행하여져야 한다.\n* 기준이 적용되는 조건\n1) 심해이고 제한되지 않은 수역\n2) 조용한 해상상태\n3) 만선, Even keel 상태\n4) Test speed에서 정침 상태: 엔진 최대출력의 85%에서 내는 출력에서의 Speed의 최소 90%\n1) 선회성능 기준\n①선박의 선회성능 기준은 사용타각 10도에 의한 초기선회성능 및 전타의 최대타각에 의한 정상선회성능으로\n구분한다.\n②초기선회성능: 초기선회성능 시험은 좌,우현의 10도의 타각을 발령하여 초기침로에서 선수방위가 10도 변위\n될 때까지의 전진 이동거리가 선체 길이(L)의 2.5배 이하로 규정하고 있다.\n③정상선회성능: 정상선회성능은 좌우현의 전타각 35도를 발령하여 선수방위가 360도 변위 될 때까지의 90도\n선회지점의 종거(Advance distance)는 4.5L 이하, 그리고 180도 선회지점의 최대 선회경의 전술직경(Tactical diameter)은 5L 이하로 규정하고 있다.\n[추가 질문] 오버슈트앵글을 설명하시오.\nOvershoot angle은 zig-zag test로 측정이 가능하며 측정요령은 rudder로 일정 타각을 주었을 때 heading이 주어진 타각에 도달하면 같은 양의 반대 타각을 준다. 이때 heading(yaw angle)이 회두타력에 의하여 주어진\n타각 이상으로 선회하다가 정지한 후 반대현쪽으로 회두타력이 발생하는데 이때 최대의 yaw angle과 반대\n타각을 주었을 때의 yaw angle과의 차이각을 말한다.\n타각 10도에 의한 Zigzag 10도/10도 조타법 및 타각 20도에 의한 Zigzag 20도/20도 조타법에 의한 고도선수각인 오버슈트각으로 평가한다.\n②선회하고 있는 선박에 반대 방향의 타각을 가하여도 선박은 바로 반대 방향으로 움직이지 않고 얼마간 더\n선회 방향으로 돌게 된다. 타 작동 후에도 더 돌아가는 각도를 overshoot angle이라고 하여 첫번째 overshoot angle과 두번째 overshoot angle을 변침성능의 정도를 판단하는 자료로 사용한다.\n③성능기준\n③-1.Zigzag 10도 시험\n-첫번째 overshoot angle:\n1) 10도 - 속장비 값이 10초 미만일 때),\n2) (5+1/2(L/V))도 - 속장비 값이 10초 이상 30초 미만일 때),\n3) 20도 - 속장비 값이 30초 이상일 때)\n(단, 수선간장(Lpp)는 m, 속력(V)의 단위는 m/s이다.)\n-두번째 overshoot angle: 은 첫번째 overshoot angle 값에서 15도를 넘지 않아야 한다\n*속장비란? 선박의 길이/전속도를 m/s로 변환한 값\n𝑉√𝐿 (v: 선속, L:선박의 길이)\n예) L=200M, V=15kts(7.7m/s)이면 L/V=200/7.7=26sec로서 {5+½(L/V)}° Lpp/V가 10초 이상 30초 미만을 적용하면 5+13=18°로서 1OA가 18도를 넘지 않으면 조종성 양호\n③-2.Zigzag 20도 시험\n-첫번째 overshoot angle이 25를 넘기지 말것\n4) 침로안정성 기준\n①기본적으로 IMO 표준 선박 조종성 시험은 위에서 기술한 선회성능, 선수요저지성능 및 후진성능 시험이다. 그러나 위의 기준에서 만약 선수요저지성능 시험 결과가 기준을 초과하거나 동력학적으로 불안정한 결과로 나타나면 선박의 안전을 위하여 추가로 침로안전정성 시험(나선시험/Spiral)을 하여야 한다.\n②표준 Spiral 시험조선법\n선교팀은 시험을 위해 특정의 침로로 정침한다.\n-좌현/우현타각 15도를 발령하여 그대로 유지하면서 일정한 선회율이 되면 그 선회율(도/분)을 측정한다.\n-좌현/우현 타각 10도를 발령하여 그대로 유지하면서 일정한 선회율이 되면 그것을 측정한다.\n-좌현/우현 타각 5도를 발령하여 발령타각을 그대로 유지하면서 일정한 선회율이 되면 그것을 측정한다.\n-타각 0도(midship)를 발령하여 그대로 유지하면서 최종단계의 잔류선회율을 측정한다.\n-만약 잔류선회율이 계속 있으면 루프폭을 측정하기 위하여 반대현 타각 우현/좌현 타각을 1도씩 증가시키면서 반대현으로 선회가 발생할 때까지 계속한다.\n-한쪽현의 시험이 완료되면, 다시 특정의 침로로 정침하면서 동일한 순서로 반대현의 시험을 시행한다. 각 선회시험에서 측정된 선박의 선회각속도를 타각에 대하여 그린 곡선을 나선(螺線, Spiral) 곡선이라 하는데 이 곡선으로부터 선박의 침로안정성 여부를 판단할 수 있다. 침로안정성이 있는 선박은 그림10의 윗 그림과 같이 단일 곡선으로 나타나나 침로 불안정한 선박의 경우는 아래 그림과 같이 이중 곡선(Hysteresis Loop) 형태를 보인다.\n안정한 선박은 한 타각에 대하여 한가지 선회 각속도만 나타난다. 반면에 불안정한 선박은 Spiral 루프 내의 타각에 대하여는 선회 각속도가 Spiral 루프의 높이 범위에서 어떤 값을 가질 지 알 수 없다. 즉, Spiral 루프를 갖는 선박은 Spiral 루프의 폭보다 작은 타각으로는 조타를 하면 상황에 따라 우현 선회할 수도 있고 좌현 선회할 수도 있기 때문에 제어할 수 없다. 따라서 이 루프의 크기가 크면 클수록 불안정한 선박이라고 할 수 있다.\n③Simplified Spiral 시험기준\n위에서 기술한 나선형의 표준 스파이럴 시험법은 많은 시간을 요구하면서 기상 및 해상상태에도 매우 민감한\n단점이 있어 이런 복잡한 문제점들을 개선하여 실선박에서 간단하게 사용할수 있도록 개선한 것이 simplified spiral 시험 조선법이다.\n본 조선법은 원래의 표준 스파이럴 시험 조선법의 취지와 다르게 단지 한번의 좌,우현의 최대타각 35도를 발령하여 선수방위가 약 90도 정도 선회하여 정상선회에 이르면 타각 0도를 발령하여 선회율을 측정하는 것이다. 만약 선회율이 감쇠되어 0도/min이 되면 안정한 선박으로 판정하고 시험을 종료한다. 그러나 선회속도가 0도/min가 되지 않고 계속 선회를 할 경우에는 허용루프폭의 반의 반대현의 반허용루프폭 타각을 발령한다.\n이 경우 반대현 반허용루프폭 타각을 사용하여 선회를 제어할 수 없으면 `허용한계치를 넘은 불안정한 선박`으로 판정한다. 지금까지는 선형과 크기에 관계없이 시험에서 무조건 루프폭이 20도 이상이면 조종이 불안정한 선박으로 판정하였다.\n④성능기준\n1) 0도: (L/V) < 9초\n2) (-3 + 1/3*(L/V))도: 9초 < (L/V) < 45초\n3) 12도: 45초 < (L/V)", "id": 90}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "55. 발라스트(Ballast) 항해 시 알맞은 트림은?", "answer": "◈ 알맞은 Trim\n: Ballast 항해에는 선미흘수가 깊으면 추진효율 면에서는 향상되지만, 상대적으로는 선수흘수가 얕아지기 때문에 Trim 의 한계를 고려해야 한다. 많은 선박의 실적으로 미루어 볼 때, 선미흘수를 Screw propeller가 그 위 가장자리까지 수면 하에 잠길 정도로 필요한 흘수까지 침하시키고서 Trim 과 배의 길이 비율 t/L 를 2.5%(Trim 각 1°30’) 이하로 하는 것이 좋다. (선체 길이의 2.5% 이하의 Trim)\n◈ 선미흘수\n선미흘수는 직접 타면과 추진기의 심도에 따라 타효\n및 추진효율에 영향을 미치나 최근의 선박은 거의\n평형타에 가까운 타형을 많이 쓰고 있으므로, 흘수가\n작아서 타효에 미치는 영향은 적어졌다. 따라서 선미 흘수의\n한계는 주로 Screw propeller 의 심도를 기준으로 하여 정하는\n것이 좋다.\nScrew propeller 는 그 윗 가장자리까지 수면 하에 잠기는 것이\n좋다. 그림 2ㆍ8ㆍ3에서 보는 바와 같이\n대양항해를 할 경우에는, 심도율 I/D 는 40%를\n최소한도로 하고, 심한 풍랑이 예상되면 50~60%\n정도로 하는 것이 바람직하다.\n◈ 선수흘수\nBallast 항해는 경흘수 상태로 하게 되고, 일반적으로 선수가 들려진 trim by the stern 상태로 항해하게 된다. 선수가 과도하게 들려지면 선수부의 풍압이 증대되며, 파랑의 충격을 받아 전진력이 떨어지고, 또 선수미 풍압면적의 불균형으로 보침성이 나빠진다. 특히 Slamming 의 영향으로 인하여 선수 외관에 손상을 입을 위험이 있다.\n이와 같이 선수가 과도하게 부상하는 것은, Ballast 항해에 위험이 야기될 수 있는 원인 중의 하나이다. 그러나 어느 정도의 선수흘수를 가져야 하는지는 일괄하여 정할 수는 없고, 다만 그 때의 본선 사정과 해상의 상황에 따라서 경험으로 결정하는 도리 밖에 없다.", "id": 91}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "61. 인명 수색 구조 방법 중 구조를 위한 접근 조선법에 대하여 설명하시오.", "answer": "1) Williamson Turn\nWilliamson`s turn은 1942년 미해군 예비역 중령 Williamson이 고안한 방법으로 익수자 발생시간 및 위치가 불명확하거나 야간, 저시정, 황천등의 이유로 익수자를 시각으로 식별할 수 없는 경우를 대비하여 원침로(Base Course)의 항적(Wake)을 정확히 찾아 역침로로 항해하면서 익수자를 발견하기 위한 방법이다.\n외력(Wind & Current)이 없을 경우에는 거의 정확히 익수자를 향해서 가게 되지만 선박에 외력(Wind & Current)이 작용할 경우에는 지나온 항적(Wake)으로의 진입 및 유지가 어렵다는 단점이 있으며 익수자 또한 해조류(Current)의 영향으로 시간이 경과함에 따라 항적(Wake)에서 점점 더 벗어나기 때문에 익수자 발생초기에 신속한 대응이 요구된다.\n① 익수자가 발생한 것으로 예상되는 현측으로 전타(Hard Starboard)하여 회두한다.\n② 원침로에서 선수 상대 방위가 60° 회두하면 \"키 반대(Hard Port)\" 하여 반대쪽으로 회두한다.\n③ 선회를 계속하여 원침로(Base course)의 역침로(Reverse course)를 유지하면 원침로의 항적을 거꾸로 따라 가게 되는데 이때 타는 대각도를 사용하여 침로를 유지(Steady course)해야 한다.\n* 윌리암즈 턴 방법 설명 : 야간에 물에 빠졌을 때와 같이 시간을 모를 때의 구조법이다. 먼저 익수자가 빠진 쪽으로 전타하여 원침로에서 60°정도 벗어난 후에 반대방향으로 전타한다. 선수가 침로 반대방향 20° 전이 되면 Midship하여 선박을 침로 반대방향으로 회전시킨다.\n* 장단점 : 원래의 항적선으로 양호하게 되돌아 온다. 시계가 불량할 때 또는 야간에 빠진 시간을 모를 때 유익하다. 간단하다 절차가 느리다\nHard Starboard : Ship's heading 270° --> Hard Port : Ship's heading 330° -->\nReverse course : 090° --> Steady course : 090°\n②신윌리암슨 턴\n-윌리암슨턴을 상선에서 사용하기에는 장폭비와 방형비척계수 값이 군함의 것과는 크게 차이가 있으므로 실무 회황조선에는 바람직하지 않았다. 따라서 여러 요소 중 비중이 가장 큰 장폭비 값을 고려한 신윌리암슨턴 방법이 제시되었다. 군함의 장폭비 값이 약 9정도, 표준 윌리암슨각 60도를 일반상선의 장폭비=(L/B)값에 비례하여 수정한 값을 수정 윌리암슨각으로 하고 이를 구하는 약산수식은 [MWA=(L/B)/9*60도] 이다. 이는 약 35-60도 정도로 본선에 맞게 미리 계산하여 알고 있으면 큰 도움이 될 것이다.\n-낙수자 발생시 정침중인 선수침로로부터 낙수자 현측으로긴급 전타하여 35-60도 선회후 반대현측으로 전타하여 원침로에서 overshooting angle이 되었을 때 정침하면 180° 회두하여 원래 오던 항적으로 들어가게 된다.\n2) Two 180° turn(반원 2회 선회법)\n선박에서 익수자 발생시 180°씩 두 번 선회하여 익수자를 구조하는 방법으로 원침로에 복귀하면 선수는 익수자가 발생한 위치선상과 일치하게 된다. 이 방법은 익수자를 계속하여 볼 수 있고 풍향(Wind)이 침로와 직각방향일 때 유리하며 시간적으로는 Williamson`s turn 보다 빠르나 Single turn 보다는 늦게 된다.\n① 익수자 발생 즉시 기관을 정지(Engine stop)하여 익수자 발생 현측으로 전타(Right fullrudder)하고 익수자가 선미를 벗어나면 기관을 전속 전진(Change Speed to maximum)한다.\n② 선수가 원침로(090°)에서 180° 회두한 역침로(270°)를 유지하고 400yds(12kts 속력으로 약 1분간) 전진할 동안 항주한다.\n③ 익수자가 상대방위 120°(정횡 후 30°) 위치에 보일 때 익수자 현측으로 전타(Right full rudder)하여 원침로(090°)를 유지하면서 감속한다. 이때 선수를 풍상측으로 유지하면서 익수자를 정선수에 오도록 조선한다.\n* ORIGINAL COURSE : 090° --> Stop Engine 과 동시에 익수자 현측으로 전타 --> REVERSE OF ORIGINAL COURSE : 270° --> 약 400 yrds (12kts로 1분 거리) 전진 --> 익수자 상대방위 120도에서 다시 익수자 현측으로 전타하며 감속(선수를 풍상측으로 유지하며 익수자를 정선수에 오도록)\n* 1) 물에 빠진 사람이 보일 때의 익수자 구조법이다. 2) 전타 및 기관을 정지하여 사람이 선미에서 벗어나면 다시 전속 전진하다 180° 선회가 되면 정침하여 전진하다가, 사람이 정횡 후방 약 30° 근방에 보일 때 다시 최대 타각을 주면서 선회시키고 원침로에 왔을 때 정침하여 전진하면 선수 부근에 사람이 보이게 된다. 3) 빠진 사람을 늘 한쪽 위치에서 볼 수 있고 풍향이 침로와 직각일 때 유리하다\n3) 현측 인명구조법(지연선회법) - Delayed turn method = 싱글턴 (Single Turn) = Aderson Turn\n전장이 긴 선박이나 선회권이 큰 선박은 익수자 발생시 한번의 선회(Single turn)로 익수자에게 접근할 수 없다. Delayed turn은 이러한 단점을 보완하기 위하여 Williamson's Turn과 Two 180° Turn의 장점을 혼합하여 만든 방법이며 대형선박이나 상황전파 또는 초기 조치 지연으로 익수자가 이미 선미를 벗어났을 때 익수자에게 가장 신속하게 접근하기 위해 사용된다.\n이 방법은 최소한의 선회각으로 익수자에게 접근하는 가장 신속한 방법이지만 Williamson's Turn과 Two 180° Turn 처럼 선박의 조선만으로 익수자 발생위치로 진입할 수 없기 때문에 익수자를 시각으로 계속 확인하고 있어야하는 단점이 있다.\n① 익수자 발생시 원침로(Base course)로 400yds(12kts 속력으로 약 1분간) 전진한다.\n② 400yds 지점에서 즉시 익수자 발생현측으로 전타(Right full rudder)한다.\n③ 원 침로(Base course)에서 230° 정도 회두하면 익수자가 선수 전방에 위치하게 되며 이때\n익수자를 향해 Steady한다.\n④ 최종접근 단계에서의 기동은 Single turn method 기동 절차와 동일한 방법으로 실시한다.\n* 가장 빠른 구출법이다. 다루기 어려운 선회특성을 가진 선박에 유용하다. 상당한 출력을 가진 선박에서 주로 많이 사용된다. 단추진기를 가진 선박에서는 어렵다. 사람에 대한 접근이 일직선이 아니므로 어렵다\n4) 샤르노브 턴 (Scharnow Turn)\n①3-1. 낙수자 발생 시 정침중인 선수침로로부터 낙수자 현측으로 긴급 전타하여 원래의 침로로부터 240도 선회 후 반대방향으로 전타한다. 원침로에서 160° 회두하였을 때 정침하면 180° 회두하여 원래 오던 항적으로 들어가게 된다.\n②3-2. 윌리암슨턴 보다 항주거리가 짧아 시간이 적게 걸리는 장점이 있다.\n5) 신샤르노브 턴\n①신윌리암슨턴과 같은 개념이며, 초기침로에서 전타 후 선수침로가 반대침로로 180도 통과한 지점에서 수정\n윌리암슨각만큼 더 선회한 후 다시 반대현으로 전타하여 원침로에서 overshooting angle이 되었을 때 정침하면 180° 회두하여 원래 오던 항적으로 들어가게 된다.\n5) 표류 중인 다수의 조난자 구조법\n① 부표 이용법 : 길이 약 200m 정도의 로프에 구명동의, 구명부환 등을 달고 끝에 구명뗏목 또는 드럼통을 달아 구조선은 이 로프를 달고 조난자의 풍하쪽에서 풍상쪽으로 한바퀴 돌아 죄면서 끌어당겨 구조\n② 구조선을 표류시키는 법 : 구조선의 풍하현 쪽에 또는 그물을 여러 군데 설치하고 조난자의 풍상쪽에서 구조선을 표류시켜 접근하는 표류자를 끌어올려 구조한다. 선박의 표류속도는 사람의 표류속도보다 크므로 시간이 지나면 자연스럽게 접근될 수 있다", "id": 92}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "85. 신윌리엄스턴과 윌리엄스턴차이?", "answer": "기존 월리엄스 턴은 군함을 위주로 만든것이라 실무에서 맞지 않음.\n따라서 여러요소 중 장폭비 값을 고려하여 신 윌리암스턴 을 계산함.\nL/B/9 X 60 // 기존에 전타후 MWA 값을 고려하여 턴함.//???", "id": 93}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 익수자 구조방법 (정확한 각도 언급)", "answer": "1) MOB 시 조치, 사람이 물에 빠진 경우의 조치\n○1 현장발견자는 “사람이 물에 빠졌다”고 외치는 등 선교에 사실을 알리고 왕래가 빈번한 곳이면 국제신호기 “O”기를 올리며 필요한 경우 긴급통보를 발하여 타선에 수색 및 구조를 요청한다.\n○2 구명부환과 자기발연신호, 자기점화등을 던진다.\n○3 윌리암슨턴 등의 방법에 의해 물에 빠진 사람의 풍상쪽으로 접근한다.\n○4 태양이 수평선 부근에 있을 때에는 전타시 가능한 태양쪽으로 먼저 전타하여 선회한다.\n*조난자를 구조하는 방법 선택 시 고려할 점을 말하시오.", "id": 94}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 조난자의 위치: 물에 빠진 사람의 풍상쪽으로 접근한다.", "answer": "2. 조난 시간: 태양이 수평선 부근에 있을 때에는 전타시 가능한 태양쪽으로 먼저 전타하여 선회한다.", "id": 95}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 해상 상태 등을 고려하여 구조방법 중 가장 좋은 방법으로 구조한다.", "answer": "*빠진 시각을 모를 때: 윌리암슨 턴, 샤르노부 턴\n*익수자가 보일 때: 싱글턴, 반원2회선회법\n[추가 질문] 해상 시운전에서 IMO 조종성능 시험을 제외하고 갑판부와 기관부에서 시행하는\nTEST를 말하시오?\n1) 갑판부\nA. 정수압테스트\nB. Vibration measurement\nC. Anchor Windlass test\nD. Steering gear & EMCY Steering Gear test\nE. Bow Thruster test\nF. Operation test of navigation equipment\nG. Gyro compass Confirmation\nH. Magnetic compass Adjusting.\nI. Echo sounder test\nJ. Speed log Adjusting\n2) 기관부\nA. Main Engine Speed Test(50%, 75%, 90%, 100%)\nB. Main Engine endurance test\nC. Main Engine performance test\nD. Black out test\nE. Dead ship recovery test\nF. F.O. consumption measurement\nG. F.W. Generator – Capacity test\nH. Noise measurement\nI. Electric Load measurement\nJ. Vibration measurement\nK. Exhaust Gas Economizer – capacity & Safety valve test", "id": 96}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "62. 선박이 해수에서 청수로 들어갈 때의 변화에 대해 설명하시오.", "answer": "1) 흘수증가, 선수트림발생\n: 일정한 배수량의 선박이 해수의 비중이 다른 곳에 가면, 흘수에 변화가 생긴다. 즉, 해상에서 하항으로 들어가게 되면 흘수는 증가하고, 반대로 하항에서 해상으로 나오면 흘수는 감소하게 된다. 이 경우에 부심이 변하여 Trim 의 변화가 일어난다.\n2) 선수 트림이 발생하는 이유는?\n: 비중이 감소하게 되면 선박의 무게중심 G는 상대적으로 일반적인 상선의 선형에 따른 거주구역 위치에 따라 선미로 이동하여 G’로 변하게 되고 이에 따라 부심 B는 LCB(Longitudinal Center of Buoyancy) 가 선미로 이동함에 따라 부심 B’로 변하게 된다. 이처럼 부심과 무게중심이 모두 선미쪽으로 이동하면서 자연스럽게 선수 변화량이 선미 변화량보다 커짐에 따라 선수 침하현상이 일어나게 된다.", "id": 97}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "69. CAVITATION에 대하여 설명하시오.", "answer": "◈ 공동 현상(Cavitation)\n: 유체 속에서 압력이 낮은 곳이 생기면 물속에 포함되어 있는 기체가 물에서 빠져 나와 (수류의 기화화) 압력이 낮은 곳에 모이는데, 이로 인해 물이 없는 빈 공간이 생기는 것을 가리킨다. (수류가 기화한 곳에는 공간 또는 간격이 생기는데 극히 짧은 순간에 파멸하는 기포 때문에 수립자가 그 공간에 사방으로부터 고속으로 돌진하게 됨)\n위와 같은 Cavitation 현상이 Propeller 와 같은 회전체의 접속부에서 생기면 계속하여 Blade 의 뒤를 따라 Vapor pocket을 만들고 이 Vapor pocket이 사라질 때 내폭되는 수립자비말의 충격압력이 금속의 인장강도보다 커질 수 있기에 금속입자는 떨어져 나가고 곰보가 된다. 장기간이 지나면 Blade에 구멍이 뚫리고 Propeller를 약화시킬 것이다. 결과적으로 공동 현상은 선박의 프로펠러나 터빈 등의 효율이 떨어지고 침식당하는 원인이 되므로 선박 선미부 설계 시 주의해야 한다.\n공동현상을 방지하려면 Blade 접속부에 압력변화를 주는 것이겠고 그러하기 위하여 Propeller 의 형태를 바꾸던지 회전수를 바꾸던지 그렇지 않으면 선미의 형태를 바꾸어야 할 것이다. 사실상 모두 실행하기 곤란한 일들로서 Propeller 의 모양이나 면적, 선미부의 모양을 주의하여 설계하는 수 밖에 없다.", "id": 98}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 공동현상 정의", "answer": "펌프 Impeller의 회전이 빨라지면 날개 배면이 진공상태가 된다. 그러면 그 부분을 지나가는 물이 빠른 속도로 운동할 때 액체의 압력이 증기압 이하로 낮아져서 액체 내에 기포가 발생하는 현상을 공동현상이라 한다.\n또 수증기포가 사라질 때 기포 주위의 물이 서로 부딪혀 국부적으로 현저한 고압이 생겨 그 기계적 충격으로 스크류를 침식시키는 원인이 된다.", "id": 99}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 공동현상 발생에 따르는 현상", "answer": "1) 소음, 진동\n2) 양정 저하, 펌프 효율 감소\n3) 깃의 부식, 침식\n4) 심한 충격을 수반한다.", "id": 100}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 방지법", "answer": "1) 펌프의 설치 높이를 낮추어 흡입양정을 짧게 한다.\n2) 배관을 완만하고 짧게 한다.\n3) 임펠러를 수중에 완전히 잠기게 한다.\n4) 펌프의 회전수를 낮춘다.\n5) 마찰저항이 적은 흡입관 사용한다.\n6) 양흡입펌프를 사용한다.", "id": 101}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 원심 펌프 병렬 작동 시 주의사항", "answer": "- 병렬운전을 하는 이유는 토출량을 늘리기 위해 병렬 운전을 한다.\n- 주의사항으로 펌프로 인해 빠져나가는 유량 때문에 파이프 라인의 압력이 오버되는지 확인하여야 한다.\n- 육상에서 받을 수 있는 Max. Rate를 초과하진 않는지 확인하여야 한다(탱커)", "id": 102}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 선박의 이동 및 조종", "answer": "☞ 접안 후진 기관 사용 시 우회두 하는데 왜 그런지 2가지 작용을 말해라.\n-. 배수류 측압작용 (간단하게 \"선미 회두시키는 힘\")\n-. 측벽영향(Bank effect)으로 나타나는 현상\n. 선박은 전체적으로 가까운 측벽쪽으로 흡인력이 생긴다.\n. 선미는 가까운 측벽쪽으로 선수는 가까운 측벽 반대쪽으로 회두한다.\n. 측벽영향은 해저가 경사되어 있는 경우에도 볼 수 있다.\n배수류 / DISCHARGIFN CURRENT : 기관 후진 중에는 스크루 프로펠러가 물을 반시계방향으로 회전시켜서 앞쪽으로 배출시킨다. 좌현 쪽으로 흘러가는 배출류는 좌현 선미 측면을 따라 앞으로 빠져나간다. 그러나 우현쪽으로 흘러가는 배출류는 우현의 선미 측벽에 부딪치면서 측압을 형성한다.\n횡압력 / SIDE WISE PRESSURE: 선박의 스크류가 회전할 때 스크류 중심으로 상부와 하부 중 하부의 힘이 커서 선미를 한쪽방향으로 편향시키려는 힘을 말하며, 전진시에는 선수를 좌편향, 후진시에는 우편향 시키는 작용.\n측압작용 : 후진시 프로펠러가 반시계방향으로 회전하여 우현으로 흘러가는 배출류는 우현의 선미벽에 부딪혀 측압을 형성하여 선미를 좌현측으로 회두시키는 작용.", "id": 103}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "27. 우현추진기 프로펠러에서 선회권이 어느 현이 더 큰지 말하고 이유를 설명하시오.", "answer": "좌선회가 그리는 선회권이 우선회보다 크다. 배출류의 영향으로 선박 전진, 후진시 선수를 우회두 시키기 때문이다.", "id": 104}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 배출류의 영향", "answer": "1) 전진시: 물을 시계방향으로 뒤쪽으로 배출, 타의 상부보다 하부에 작용하는 수류의 힘이 강하므로 선미를 좌현쪽으로(선수 우회두) 밀게 된다.\n2) 후진시: 프로펠러가 반시계방향으로 회전하여 우현으로 흘러들어가는 배출류는 우현의 선미벽에 부딪혀 측압을 형성(배출류의 측압 작용)하여 선미를 좌현쪽으로 (선수우회두) 회두시킨다.", "id": 105}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 횡압력(측압)의 영향", "answer": "프로펠러에 작용하는 힘이 위쪽과 아래쪽이 다르기 때문에 생기는 영향이다. 전진시 선수를 좌편향, 후진시\n선수를 우편향 시킨다.", "id": 106}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. IMO에서 규정한 조종성능테스트는 무엇인가?", "answer": "1960년대 이후 대형선박의 출현에 따라 그 조종성이 중요시되어 선박이 조종성에 관한 연구가 진행됨에 따라 선박의 조종성에 관한 시험법도 전술의 선회권 시험 뿐만 아니라 침로 안정성(보침)능 또는 추총성능(변침) 등을 알기 위하여 시험 방법이 추가됨\n(1) Z 시험(+ 20° Z 에 대해 설명 / port 20 부터 시행시 -20° Z TEST 라 칭함)\n- 소정의 속력으로 된 후 선박을 직진시킴\n- starb’d 20 을 발령하고 통상의 조타속도로 전타하되, 발령순간은 타각 0 도 로서 직진할 필요가 있다\n- 선수가 원침로로부터 우측으로 20도 돌았을 때 port 20 발령\n- 선수가 우측으로 회두를 멈추고 좌측으로 회두를 시작하여 원침로를 지나\n좌측으로 20도 돌았을 때 stbd 20 발령\n- 선수가 원침로로부터 우측으로 20 도 되었을 때 port 20 발령\n- 선수가 원침로에 돌아오면 시험 종료(타각은 20도로 한정하지 않고, ±10°Z 가 일반적)\n(2) Sprial 시험\n- 소정이 속력으로 직전중 우타 10도를 발령하여 그 타각을 유지한다.\n- 선회운동이 일정하게 되면 그 각속도 및 선속을 측정한다.\n- 다음에 우타 5도를 발령하고 이와 같은 계측을 한다.\n- 우타 1도를 발령하고 같은 계측을 한다.\n- 타 중앙을 발령하고 계속 완만한 선회를 하면 계측을 한다.\n- 좌타 1도를 발령하고 그래도 우선회를 하면 같은 계측을 하고 이후 좌타각 1도씩 증가시키면서 반대 선회가 일어날 까지 같은 계측을 한다.\n- 좌선회가 일어나면 선회운동의 정정을 기다렸다가 그 각속도 및 타각을 기록한다.\n- 좌타 10도를 발령하고 위와 같은 계측을 한다. 우선회가 시작되면 운동의 정정을 기다렸다가 각속도 및 타각을 기록하고 시험을 종료한다.", "id": 107}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "43.공동현상이랑 이거 막으려면 어떻게?", "answer": "추진기 등 뒤에 생기는 진공 현상\n-빠른 속도로 액체가 운동할 때 액체의 압력이 증기압 이하로 낮아져서 액체 내의 증기 기포가 발생하는 현상.\n-유체 속에서 압력이 낮은 곳에 생기면 물 속에 포함되어 있는 기체가 물에서 빠져나와 압력이 낮은 곳으로 모이는, 이로 인해 물이 없는 빈공간이 생긴다.\n예방법 :\nA. 프로 펠러의 잠김률의 크게 한다.\nB. 프로펠러의 지름을 최적으로 한다.\nC. 프로펠러의 날개단면의 형상을 최적으로 한다.\nD. 선박의 선미형상의 모양을 최적으로 한다.", "id": 108}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 선박이 even keel에서 출항하여 항해시 by the head가 되는데 이유는?", "answer": "-> 방형 비척 계수 0.7을 기준으로 이상인 선박은 by the Head 이하인 선박은 by the stern\n-> 선박이 항해할 때 선박은 앞쪽으로 물을 밀어낸다. 수중의 공백을 만들지 않기 위하여 밀려난 물의 부피만큼 선측과 선저로부터 물이 유입되어야 한다. 흡입류의 유선은 선저에서 가속된다. 이 현상이 수압의 감소를 가져오고 선박이 수직으로 침하하는 결과로 나타난다", "id": 109}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "33. 신침로 거리 계산법?(의미 아님) 예를들어 30도 변침하려고 하면 얼마전에 변침하여야 하는가?", "answer": "Reach + R(선회 반경) x 변침각 / 120\nReach+ R(선회 반경) x Tan(변침각 /2)", "id": 110}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "34. 고층기상도를 사용하는 이유?", "answer": "천기 변화나 고,저기압 특히 태풍의 진행을 예상하는데 중요한 자료임.", "id": 111}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "35. dead slow ahead에서 dead의 의미는?", "answer": "타효속도를 잃지 않을 정도로 가능한 천천히.", "id": 112}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 본인이 선장이라면 수심 25m 일 때 어떤 방식으로 투묘 할 것인가?", "answer": "Q1. 출항 시 선장으로서 안전 항해에 대해 고려할 상황에 대해 말해보시오. => 중복", "id": 113}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 본인이 선장이라고 생각하고 출항을 어떻게 할 것인지 말해보세요.", "answer": "-> 피험선 관련하여 대답하기 요구하심.", "id": 114}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "60. 선체가 받는 저항", "answer": "1) 마찰저항\n선체가 수중을 진행할 때에는 선체와 접하여 있는 모든 면에서 이 부착력이 작용하고 이것이 선체의 진행을 방해하는 힘으로 나타나는것이다. 이것을 마찰저항이라 부르며 전체저항의 80%정도 차지한다.\n2) 와저항\n선체와 물분자와의 부착력에 의하여 선체에 접근하여 있는 물분자와 떨어져 있는 물분자간에는 속도차이가 생기고 선미에 이르게 되면 멀리 떨어져 있는 물분자는 와동(소용돌이치다)을 하게 된다. 이 부분의 압력은 선수부의 압력보다 낮고 이 압력 감소로 인해 전방으로부터 후방으로 힘을 받게 된다. 이를 와 저항이라고 부른다. 다른말로 수립자를 와동시키는데 소모되는 에너지를 와저항이라고 한다. 전체저항의 약 2~10% 정도이다.\n3) 조파저항\n선체가 공기와 물 두가지 유체사이에서 운동하기에 발생하는 저항. 즉, 파를 형성하는데 생기는 저항 전체저항의 약 10~15%. 고속선에 가장 영향이 크다.\n4) 공기저항\n선체가 수면상의 노출된 부분은 공기의 흐름을 받게 되고 이 흐름에 의해서 선체가 받는 저항을 공기저항이라고 한다. 다른 저항들에 비해 작용하는 힘이 작기때문에 생략되기도 하나 황천시에나 입출항시 중요하게\n고려되어야한다. 전체 저항의 약 1% 이다.\n선체 저항\n1. 선체 저항의 기본 분류선박이 받는 전체 저항(전저항)은 크게 수면 아래의 물저항과 수면 위 구조이 받는 공기저항으로 나뉩니다.\n물저항 : 마찰저항 + 와저항 + 조파저항\n점성저항 : 마찰저항 + 와저항 (물체의 끈적임과 형태에 의한 저항)\n잉여저항 : 와저항 + 조파저항 (마찰을 제외한 나머지 저항)", "id": 115}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 주요 저항의 특징과 공식", "answer": "① 마찰저항 (Frictional Resistance)물의 점성 때문에 선체 표면과 물이 스치며 발생하는 저항입니다.\n특징: 저속선에서 영향이 가장 크며, 선박이 빠를수록, 선체의 침수표면적(S)이 넓을수록, 선체 표면이 거칠수록 증가합니다.계산식 (Froude):\n② 조파저항 (Wave-making Resistance)\n선박이 진행하면서 수면에 파도를 만듦으로써 발생하는 에너지 손실입니다.\n특징: 고속선에서 매우 중요하며(전체의 40~50%), **구형 선수(Bulbous Bow)**를 설치하여 이 저항을 줄일 수 있습니다. 다만, 대형선이나 특정 속도비에서는 오히려 역효과가 날 수도 있습니다.\n③ 조와저항/와저항 (Eddy-making Resistance)\n선체 주위의 물 흐름이 급격히 변할 때 소용돌이(와류)가 생기며 발생하는 저항입니다.\n특징: 선체의 형상이 비유선형이거나 급격하게 변할 때 발생하며, 이를 줄이기 위해 선체를 유선형으로 설계하는 것이 중요합니다. '형상저항'이라고도 불립니다.\n④ 공기저항 (Air Resistance)\n수면 위 선체 구조물이 공기의 흐름과 부딪혀 생기는 저항입니다.\n특징: 보통 물저항의 1~3% 수준으로 작지만, 바람이 강하게 부는 황천 시에는 매우 커집니다. 공기의 밀도는 물의 약 1/800 수준입니다", "id": 116}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 저항에 영향을 미치는 외부 요소", "answer": "선체의 오손: 해조류나 패각류가 달라붙어 선체 표면이 거칠어지면 마찰저항이 급증합니다.\n부속물: 타(Rudder), 프로펠러 샤프트, 빌지 킬(Bilge keel) 등 선체 밖으로 튀어나온 구조물들이 추가 저항을 만듭니다.\n제한수역: 수심이 얕거나 폭이 좁은 운하 등에서는 유체 작용이 달라져 저항이 증가합니다", "id": 117}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 경제속력이 뭔가?", "answer": "연료의 소비와 속력에 있어 그 연료 소비를 될 수 있는 한 절약하고 속력을 크게 하는 경우의 속력을 말한다.\n선박은 신조할 때 그 취항항로나 용도에 맞추어 가장 알맞은 속력이 계획되고 그 속력으로 항해하여야 가장 효율이 좋고 또한 경제적이도록 설계되며 선박이 완성되면 주로 이 속력으로 취항하게 되는데 일반적으로 “몇 노트의 선박”이라고 하면 그와 같은 계획 또는 경제항해속력(經濟航海速力)을 뜻하는 것이라 할 수 있다.\n정상속력(normal speed)은 기관의 효율유지와 보수유지라는 면에서 본 경제속력으로, 대양에서 만재흘수 때 통상적으로 항해하는 속력이다. 따라서 정상속력과 경제속력은 같다고 볼 수 있으며, 이는 주기관 상용출력(연속최대출력의 80~90%) 시 나타나는 속력이다.", "id": 118}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "14. 협수로 통과시 나타나는 현상?", "answer": "Bank Effect // 협수도 통항시 우측 수도에 가깝게 통항을 하여야 하는데 이때 선수는 수도 반대쪽으로 미는 쿠션 선미는 수도쪽으로 붙은 석션에 의해 선수가 좌 회두 모멘트를 받는 Bank Effect 측벽 영향을 받을수 있다.", "id": 119}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "12. 거대형선 협수로 통과시 나타나는 현상", "answer": ": 천수침하현상/ SQUATTING, 타효, 속력이 떨어지고, 선저 유속이 증가하여, 흘수가 증가하고 마찰저항이 커진다. 협수로에서 항해시 BANK EFFECT 현상으로 인해 선수가 좌현하기도 함. 수로폭이 선박의 길이 16L 이하일 경우에 협수로로 판단.", "id": 120}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "22. 협수로 항해 시 선박에 나타나는 현상을 설명하시오.", "answer": "선박이 운하 또는 협수로에서 수로의 중앙을 따라 항주할 때는 양측으로부터 대칭적인 유체력이 작용하지만\n한쪽 벽에 접근하여 통항시에는 비대칭적인 유체력의 작용을 받아 회두운동을 일으키게 된다. 또한 선박이 수로폭이 좁은 협수로의 중앙을 고속으로 항주하게 되면 다음과 같은 이유로 저항이 증대되어 선속이 감소된다.\n1) 수로가 좁으면 수류의 단면적이 적어지므로 베르누이의 법칙에 따라 유속이 커진다. 이로 인하여 마찰저항이 증대된다.\n2) 유속이 커지면 해저 및 양안과 선체간에 흡인력이 작용하여 선박속력을 제한하게끔 작용한다.\n3) 선박이 항주함으로 인하여 생기는 파가 양안에 부딪혀 되돌아오는 파와 상호작용을 일으켜 큰 파로 되어 조파저항이 커진다.\n4) 선측과 선저를 흐르는 수류는 유속이 커져서 선미부에 큰 와류를 형성, 조와저항을 증가시킨다.\n5) 타에 부딪히는 와류로 인해 타압이 저하되어 타효가 나빠진다.\n6) 횡저항 모멘트가 커진다. 선체가 협수로의 한쪽 측벽에 가깝게 하여 항주하는 때에는 선수는 가까운 육안으로부터 반발하고 선미가 안벽으로 흡인된다. 이와 같은 현상을 통칭하여 측벽영향(Bank Effect 또는 Wall Effect)라고 한다.", "id": 121}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "23. 대형선이 제한수로에 진입했을 때 겪는 현상을 설명하시오.", "answer": "1) 정의: 제한수로란 선박의 흘수, 선폭에 비해 수심이 얕고 좁은 수역을 말한다.\n2) 안벽영향: 선박이 부두에 접근할 때 한쪽 현이 안벽에 가까워질 때, 선속이 강할 시 선수는 안벽 반대쪽으로 반발하고 선미가 안벽으로 붙으려는 현상.\n3) 측벽영향: 수로의 폭이 제약될 때 선체 주의의 유선변화가 격심하고 불안정 moment가 커져서 선박의 침로 안정성이 매우 저하된다.\n4) 해저경사의 영향: 전진 중 선수가 깊은 쪽으로 편향, 후진 중 선미가 깊은 쪽으로 편향\n5) 두 척간의 흡입 배척 작용: 선수미는 고압, 중앙부는 저압\n6) SQUAT: 수심이 얕아지면 선저부와 해저부 사이의 유속이 증가되어 물의 압력이 감소되므로 흘수가 늘고 마찰저항이 커지며 속력과 타효가 떨어지고 선체가 진동하는 천수효과로 인해 선체가 침하하는 현상이다.\n[추가 질문] 천수효과(shallow Effect)가 나타나면 어떤 현상이 일어나는가.\n1) 속력이 감소한다\n선수미로부터 생성되는 조파의 상호간섭이 커져서 조파저항이 증대되며 또한 가속된 선저류 때문에 마찰저항이 커져서 속력이 감소한다.\n2) 선체가 침하하여 흘수가 커진다\n수심이 불충분할 때는 선저와 해저간을 유통하는 수류의 단면적이 적기 때문에 베르누이 법칙에 의해 유속이 커지며, 이에 따라 압력이 감소하여 선체가 침하, 흘수가 증대한다.\n3) 트림이 변한다\n보통 상선의 속력범위 하에서는 선수트림이 된다. 단, F/N이 0.25가 넘게 되면 선미트림이 생긴다. 이것은 다음과 같은 이유 때문이다.\nA. 심해를 항주할 때에는 파의 수립자는 완전히 원운동을 하게 되지만 수심이 충분치 못하면 파의 수립자는 타원운동을 하게 되며, 이에 따라 선속이 장파의 파속에 가까워지면서 선수는 앞쪽의 장파에 타오르고 선미는 뒤쪽 파가 후방으로 밀려난 상태가 되어 현저히 Trim by the Stern이 된다.\nB. 선저류는 그의 통로를 제한 받기 때문에 선수 선저부의 수압은 증대되지만 선미 선저부의 수압은 추진기의 흡인작용에 의하여 감소되어 선미 흘수는 더욱 깊게 주저앉아 선미트림이 증가한다.\n4) 타효가 둔해진다\n천수의 영향으로 타 주위에 와류가 증가하며, 이 때문에 타효가 저하된다.\n5) 천수영향으로 주위의 물의 자유로운 통항이 방해되어, 접안 시 횡압력이 증가한다.\n6) 선체가 진동한다\n물은 점성유체이므로 흐름이 다르고 압력분포가 달라지면 와가 형성된다. 그러므로 선체하부 흐름의 가속에 따른 비정상적인 와류가 생기며 이로 인해 유선이 교란되고 진동이 발생한다.\n이 천수영향의 대책은 다음과 같다.\n1) 선체 침하를 고려하여 저속항행을 할 것 (중요)\n2) 불확실하면 고조시를 택하여 항해할 것\n3) Swell 및 heeling 및 선체 동요로 인한 흘수증가를 고려할 것\n4) 충분한 용골하여유수심(Under Keel Clearance)을 확보할것", "id": 122}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "66. 협수로 통과에 적합한 시기를 말하시오.", "answer": "-통과시기: 주로 낮에 통과, 역조의 말기나 게류시 통과\n1. 역조의 말기에 진입하게 되면 곧 게류시점을 지나 순조에 진입하게 되어 빠른 시간 내에 협수로를 통과할 수 있음. 이미 순조가 된 이후에 진입할 경우 협수로의 길이에 따라서 역조를 맞게 될 확률이 크다.\n2. 게류는 역조와 순조 또는 고조와 저조 사이에 조류나 해면의 승강 움직임이 멈추었을 때 이다.\n* 협수로 통항 시 주의사항\n1) 가능한 한 주간에 조류가 약한 시기에 통과하도록 한다.\n2) 조류가 있는경우, 역조의 말기 또는 게류 시에 통항토록 한다.\n3) 대지속력 5노트 이상, 통과 속력의 1/2이상 되는 강한 역조가 있을 경우에는 통항을 중지한다. 즉, 타선박이나 위험물 등을 피하는데 반속전진으로 조선하기 곤란을 느끼는 유속을 피한다.\n4) 하시라도 기관을 사용할 수 있도록 조치한다.\n5) 상황에 따라 비상 투묘를 고려한다.\n6) 조타장치 및 항통장비의 사전 점검을 실행한다.\n7) 항로 부근의 수심, 암초 등 위험물을 미리 조사하여 피험선을 설정하고, 선위를 보다 자주 확인한다.", "id": 123}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "67. 천소, 협수로에서 Radar에 의한 항행계획 및 방법을 설명하시오.", "answer": "1. 레이더의 커서를 사용하여 정횡거리로서 침로를 유지하고 변침은 고정물표(섬 등)의 방위와 거리에 의하여\n행한다\n2. 대지본선운동의 레이더화면상에서 목표의 방위와 거리를 취하거나 깃점을 하지 않고도 변침 및 항행이 가능한 평행방위선(Parallel Index Line)을 이용한다.", "id": 124}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 후진시 배수류의 측압작용을 이용하기 이해 우선회를 선택한다.", "answer": "2. 효과적인 회두 모멘트 발생을 위해 전진 기관을 먼저 선택한다. // 만약 시간이 촉박하지 않고 수역에 장애물이 존재한다면 후진기관을 먼저 사용한다. 선박을 움직임을 제어하기 쉬운 것은 전진 추력이다.\n3. 후진기관 사용시, 타는 미드 쉽에 눈다. 이때는 전후진 선속이 2ktrs 이하여야 함\n4. 앞 뒤로의 수역을 똑같이 사용하는 것이 수역을 적게 차지하는 지름길이며, 기관 추력은 디젤 엔진에서는 전진과 후진의 비율은 대략 2:1이므로 동일한 slow engine 이라면 사용시간은 1:2로 하는 것이 합리적인다.", "id": 125}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 피항시", "answer": "1) 추월당하는 경우를 제외하고 자선의 정횡보다 전방에 있는 선박을 피하기 위하여 좌현측으로 변침하는 것을 금한다.\n2) 정횡에 있는 선박 또는 정횡보다 후방에 있는 선박쪽으로 변침 금지", "id": 126}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 타선의 음향 신호를 들었을 경우", "answer": "1) 침로를 유지 가능한 최소의 속력을 낮춘다.\n2) 필요하다면 전진 타력을 완전히 없애고 극도로 주의하며 항해한다.", "id": 127}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. 시계제한 시 주의사항", "answer": "1) 즉시 선장에게 보고한다.\n2) 하시라도 기관을 사용할 수 있도록 조치한다. 안전한 속력으로 항행해야 한다.\n3) 무중신호를 실행한다.\n4) 레이다를 작동하여야 하며, 충돌의 위험성이 존재하는지의 여부를 부단히 감시하여야 한다.\n5) 적절히 견시원을 배치한다.\n6) 타선박의 무중신호 청취를 위해 선교 및 선내를 정숙하게 유지한다.\n7) 등화관제를 실행한다.\n8) 상황에 따라 비상 투묘를 고려한다.", "id": 128}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. 악천 후 항해 시 주의사항", "answer": "1) 해치커버의 수밀상태를 재확인하고, 수밀문을 폐쇄한다.\n2) Hold Ventilator 등 각종 통풍통을 폐쇄한다.\n3) 배수구가 막혀있지 않도록 한다.\n4) 선체동요에 의해 이동 가능한 모든 물체를 고박한다.\n5) 수동조타 시 타는 서서히 사용하고 대각도 사용은 피해야 한다.", "id": 129}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "3. 협수로 통항 시 주의사항", "answer": "1) 가능한 한 주간에 조류가 약한 시기에 통과하도록 한다.\n2) 조류가 있는경우, 역조의 말기 또는 게류 시에 통항토록 한다.\n3) 대지속력 5노트 이상, 통과 속력의 1/2이상 되는 강한 역조가 있을 경우에는 통항을 중지한다. 즉, 타선박이나 위험물 등을 피하는데 반속전진으로 조선하기 곤란을 느끼는 유속을 피한다.\n4) 하시라도 기관을 사용할 수 있도록 조치한다.\n5) 상황에 따라 비상 투묘를 고려한다.\n6) 조타장치 및 항통장비릐 사전 점검을 실행한다.\n7) 항로 부근의 수심, 암초 등 위험물을 미리 조사하여 피험선을 설정하고, 선위를 보다 자주 확인한다.", "id": 130}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "4. 유빙 및 결빙 시 주의사항", "answer": "1) 유빙해역 항해 시, 선교당직자는 견시를 더욱 철저히 하고 레이다를 통한 유빙의 탐지에 만전을 기하는 한편, 항시 기관을 사용할 수 있도록 준비하여야 한다.\n2) 빙산을 조우하면 필히 대각도 우회하되 풍상측으로 피항토록 한다.\n3) 얼음 등에 관한 위험통보를 계속적으로 확인하여야 한다.\n4) 갑판상 라인의 드레인을 완전히 배출하여 파이프 내의 결빙을 방지한다.", "id": 131}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "5. 연안항해 시 주의사항", "answer": "1) 연안항해 시는 항로를 단축하고 항로표지나 자연 목표물을 충분히 이용할 수 있도록 육지에 접근한 항로를 선정하는 것이 원칙이지만, 지나치게 접근하는 것은 피해야 한다.\n2) 360도 전방위에 대한 육안 및 쌍안경 견시를 한다.\n3) 변침하기 전에 자주 선위를 측정하여 해도상 예정항로 위를 항행하고 있는지, 침로가 정확한 지를 검토한다.", "id": 132}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "87. 황천항해 조선법 종류와 단점?", "answer": "DOVE의 법칙 : 태풍 진로 우측에서는 풍향이 순전하고, 좌측에서는 반전한다.\nHeave to : 선수를 풍랑쪽으로 향하게 하여 조타가 가능한 최소 속력으로 전진하는 방법 파에 의한 선수부의 충격 작용과 해수의 갑판상 침입이 심하다.\nScudding\n풍랑을 선미사면(Quarter)방향에서 받으며 파에 쫒기는 자세로 항주하는 방법\nPooping Down에 의한 위험을 초래할수 있고 보침성이 저하 된다.", "id": 133}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "1. Heave to에서 생기는 현상", "answer": "1) 그린 워터 플루딩: 파도가 올라와 갑판상에 고여있는 현상이다.\n2) 너무 감속하면 보침이 곤란하고 beam sea가 될 위험이 있다.", "id": 134}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다!", "question": "2. Scudding에서 생기는 현상", "answer": "Broaching: 선박이 추파를 받으면서 Scudding할 때 선체가 갑자기 파도위에서 90도로 선회해버리는 현상으로서 선체와 파도가 만나는 주기가 아주 길어지는 경우 즉, 파도의 진행과 선박의 속력이 거의 같아지는 경우에는 타효가 없어지기 때문에 Broaching 현상이 일어날 우려가 있다..", "id": 135}, {"category": "✅ 결론: \"T값이 작을수록 좋은가?\"는 상대적입니다
