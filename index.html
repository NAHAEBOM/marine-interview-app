모르는 것!", "question": "1. 검역조사 서류 제출 및 제시", "answer": "선장과 승객·승무원은 도착 즉시 다음 서류를 검역소장에게 제출하거나 제시해야 합니다.\n제출 서류: 선박 보건상태신고서, 승무원 및 승객 명부, 건강상태질문서(선의가 없는 경우 필수).\n제시 서류: 항해일지, 선박위생관리(면제)증명서 등.\n기록 사항: 검역소장은 보건·위생 상태, 발열 감시 결과, 검체 채취 여부 등을 신고서에 기재합니다.", "id": 1246}, {"category": "모르는 것!", "question": "2. 선박에 대한 위생 점검", "answer": "선박 자체의 위생 상태를 확인하기 위해 주로 관능검사(육안 검사) 위주로 실시합니다.\n매개체 및 화물: 감염병 매개체(모기, 쥐 등) 서식 여부와 적재 화물의 오염 상태를 점검합니다.\n시설 위생: 식품 보관 상태(온도, 유효기간), 조리실 및 화장실의 청결도를 확인하고 위생 지도를 실시합니다.\n환경 검체 채취: 콜레라 오염지역 출항 선박이나 위생 불량 선박 등을 대상으로 분기 1회 이상 변기·주방 오수 등을 채취하여 콜레라균, 식중독균 등을 검사합니다.", "id": 1247}, {"category": "모르는 것!", "question": "3. 승무원 및 승객 검역조사", "answer": "인적 대상에 대해서는 증상 유무를 확인하고 필요한 경우 정밀 검사를 시행합니다.\n발열 감시: 열감지카메라 등을 통해 38℃ 이상의 발열자를 색출합니다.\n검체 채취 대상: * 건강상태질문서에 설사 등 증상을 표시한 자.\n38℃ 이상의 발열자 중 검사가 필요하다고 판단되는 자.\n검사 항목:\n세균: 콜레라, 장티푸스, 세균성 이질 등.\n바이러스: 조류인플루엔자(AI), 사스(SARS), 신종인플루엔자 등.\n절차: 검체(직장도말, 인후도말 등) 채취 후 지역거점 검사센터에 의뢰하여 결과를 확인합니다.", "id": 1248}, {"category": "모르는 것!", "question": "40. 도선사 승선 중 충돌시 선체 손상과 부두 파손이 일어났다. 선장이 통보해야 할 곳은 어디인가?>> 확실치 않음.", "answer": "1) 회사 2) 항만국 3)\n도선사 승선시 본선 항해사와 선장의 책임, 본선 선장이 도선사를 따르지 않아야 할 상황은?", "id": 1249}, {"category": "모르는 것!", "question": "49. 천수지역, 작은 섬 사이를 항해시 레이더로 본선위치가 경로에서 이탈된거 확인방법", "answer": "PI", "id": 1250}, {"category": "모르는 것!", "question": "50. 프로펠러 회전 방향을 왜 알아야 하나?", "answer": "후진시 배수류의 측압 작용으로 인한 선수의 회두 방향을 알기 위해???", "id": 1251}, {"category": "모르는 것!", "question": "32. 선박입출항법중(개항 질서법) 항계내에서 속력이란?", "answer": "-> 선박이 개항의 항계안등이나 개항의 항계 부근을 항행할 때에는 다른 선박에 위험을 미치지 아니할 정도의 속력으로 항행하여야 한다.\n고속선의 경우", "id": 1252}, {"category": "모르는 것!", "question": "49. 살베이지의 관련 주요 사항?", "answer": "노 큐어 , 노 페이", "id": 1253}, {"category": "모르는 것!", "question": "89. 화물 통풍관련 목적이라든지?", "answer": "곡물의 호흡 작용???", "id": 1254}, {"category": "모르는 것!", "question": "7. 영해와 영해기선의 차이", "answer": "영해는 한나라의 주권이 영향력을 미치는 바다의 범위. 영해기선내 한나라 바다의 범위\n영해기선은 영토 관할권 확정에 기본이 되는 기선으로서, 통상기선과 직선기선으로 구분됨\n다국적선원이승선중인데 이들을인사관리하는데중요한2가지", "id": 1255}, {"category": "모르는 것!", "question": "10. 수심 100m 이상의 심해지역에서 심해투묘시 무엇을 근거로 투묘 결정을 고려해야하는지?본선 제원(諸元)에서 WINDLASS의 POWER용량을 검토하여 투묘를 결정한다.", "answer": "파주력에 대해서 설명하시오.\n2. Anchor를 놓을 수 있는 최대 수심: 약 100m라고 답하니 82.5m라고 알려주심\nWindlass가 선령이 증가함에 따라 Barke power등이 약해지는데 본선에서 Test하는 방법", "id": 1256}, {"category": "모르는 것!", "question": "8.낙하자 발생시 조치사항.", "answer": "낙하자측으로 전타하여 낙하자를 프로펠러로부터 클리어시키고 라이프부이를 던져주고 낙하자의\n위치표시를 위해 드럼이나 스모크 시그널을 던지고 Emergency alarm을 울려 비상부서를 배치하고\n샤노우/윌리엄슨/싱글턴 조선을 하여 구조한다고 하였고 깃발 게양을 잘못 말했습니다. 깃발은 'O'기입니다", "id": 1257}];
let questions = JSON.parse(localStorage.getItem('customQuestions') || 'null') || BASE_QUESTIONS;
let doneMap = JSON.parse(localStorage.getItem('doneMap') || '{}');
let filtered = []; let currentIndex = 0;
const $ = id => document.getElementById(id);
function save() { localStorage.setItem('customQuestions', JSON.stringify(questions)); localStorage.setItem('doneMap', JSON.stringify(doneMap)); }
function init() {
  const cats=['전체', ...Array.from(new Set(questions.map(q=>q.category||'전체'))).filter(c=>c!=='전체')];
  $('category').innerHTML=cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  $('search').addEventListener('input', renderList); $('category').addEventListener('change', renderList); renderList(); selectQuestion(0);
}
function renderList() {
  const s=$('search').value.trim().toLowerCase(), cat=$('category').value;
  filtered=questions.filter(q=>(cat==='전체'||q.category===cat) && (!s || (q.question+' '+q.answer).toLowerCase().includes(s)));
  $('total').textContent=questions.length; $('done').textContent=Object.values(doneMap).filter(Boolean).length; $('left').textContent=questions.length-Object.values(doneMap).filter(Boolean).length;
  $('qList').innerHTML=filtered.map((q,i)=>`<div class="qitem ${i===currentIndex?'active':''} ${doneMap[q.id]?'done':''}" onclick="selectQuestion(${i})"><b>${q.id}.</b> ${escapeHtml(q.question)}</div>`).join('') || '<p class="small">검색 결과가 없습니다.</p>';
}
function selectQuestion(i) { if(!filtered.length) filtered=questions; currentIndex=Math.max(0, Math.min(i, filtered.length-1)); const q=filtered[currentIndex]; if(!q) return; $('meta').textContent=`${q.category||'전체'} · ${currentIndex+1} / ${filtered.length}`; $('question').textContent=q.question; $('answer').textContent=q.answer; $('answer').classList.remove('show'); $('userAnswer').value=''; renderList(); }
function toggleAnswer() { $('answer').classList.toggle('show'); }
function mark(v) { const q=filtered[currentIndex]; if(q) { doneMap[q.id]=v; save(); renderList(); } }
function nextQuestion() { selectQuestion((currentIndex+1)%filtered.length); }
function shuffleQuestions() { for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];} renderList(); selectQuestion(0); }
function resetProgress() { if(confirm('암기 진도를 초기화할까요?')) { doneMap={}; save(); renderList(); } }
function toggleAdd() { $('addbox').style.display = $('addbox').style.display==='block'?'none':'block'; }
function addQuestion() { const q=$('newQ').value.trim(), a=$('newA').value.trim(); if(!q||!a) return alert('질문과 정답을 모두 입력하세요.'); questions.push({id:Math.max(...questions.map(x=>x.id))+1, category:'직접 추가', question:q, answer:a}); $('newQ').value=''; $('newA').value=''; save(); init(); }
function exportData() { const blob=new Blob([JSON.stringify(questions,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='questions.json'; a.click(); }
function escapeHtml(s) { return String(s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
init();
</script>
</body>
