자석으로 자차 수정 시 4방위에서 10도 이상 차이가 나는 방위에서는 또 다른 오차 발생 소지가 있으므로 수정을 금지한다 (ex. 349도에서 C자석에 의한 자차수정 금지, 또는 080도에서 B자석에 의한 자차수정금지 등)\n3) 자차 수정시 장소에 따라 자력의 영향이 달라지므로 가능한 자력의 영향이 없는 곳에서 시행 (특히 광석 원료부두에서는 자력의 영향이 크므로 수정 금지)\n4) 수정 작업시 몸에 자성체를 소지하지 않도록 주의한다.", "id": 325}, {"category": "항해!", "question": "42.도등과 섹터등 ?", "answer": "1)도등 : 통행이 곤란한 수로나 항만, 좁은 만의 입구 등의 항로를 표시하기 위하여 항로의 연장선상의 육지에 설치하는 2기 이상의 1조로 하는 구조물로서 등광을 발하는것.\n2)섹터등 : 여거산 도등 설치가 곤란한 협수로,항만, 만 입구 등에서 선박에게 안전한 항로를 알려 주기 위하여 항로 연장선의 육지에 설치 한 것으로 녹광,백광,적광, 지향등용 등기를 갖춘 탑 모양의 구조물\n백광 구역 : 안전항로\n백광은 항로 중심을 표시하고, 좌현에는 녹색, 후현에는 적색광을 표시함.", "id": 326}, {"category": "항해!", "question": "33.평행방위선법 어떻게 사용하는지 ?", "answer": "본선에 침로와 평행한 선을 레이더 상에 작도하고, 그 평행선을 섬이나 등대, 육상 물표등에 대입을 합니다. 그러면 굳이 위치를 내지 않고, 그 평행선과 본선의 거리 유지 확인막으로 본선이 안전하게 침로 상을 항해 하고 있는 알 수 있습니다.", "id": 327}, {"category": "항해!", "question": "7.상선이 항해 중 자차를 구할 수 있는 조건은?", "answer": "1)천제 관측에 의한 방법\n2)육상 물표에 의한 방법\n3)Deflector에 의한 방법\n4)Gyro Compass와의 비교", "id": 328}, {"category": "항해!", "question": "6. 오차삼각형(시오삼각형)이 생기는 원인(발생 원인)", "answer": "1) 자차나 편차에 오차가 있을 때2) 해도에 기재된 물표의 위치가 부정확할 때3) 방위를 동시에 측정하지 못하여 그 시간 동안 선박이 이동하였을 때4) 물표의 측정이 부정확하였을 때5) 해도에 위치선을 기점할 때 오차가 도입되었을 때", "id": 329}, {"category": "항해!", "question": "20.피험선 설정시 물표들을 산정하는 방법", "answer": ": 뚜렷한 목표의 방위, 거리 , 수평협각 등에 의하여 항로부근에 있는 위험물을 피하기위함. 간단하면서 명확한 위치선이용이 필요\n-두물표의 중시선에 의한 것\n-선수 방향에 있는 목표의 방위선에 의한 것\n-침로 전방에 있는 목표의 방위선에 의한 것\n-측면에 있는 목표의 거리에 의한 것\n-두물표의 수평협각에 의한 것\n-높이를 알고있는 목표의 앙각에 의한 것", "id": 330}, {"category": "항해!", "question": "49. 위치종류ㅡ", "answer": "-실측위치: 실제로 관측한 선위\n-추측위치: 실측위치를 기준으로 하여 진침로와 선속계 /기관항정에 의해 구한 선위\n-추정위치(estimated position, EP)는 추측위치에 대하여 조류(tidal current 또는 tidal stream), 해류(current) 및 풍압차(leeway) 등의 외력의 영향을 고려하여 구한 위치", "id": 331}, {"category": "항해!", "question": "56.위치선에대해 설명", "answer": "-방위에 의한 위치선: compass로 구한 물표의 방위선\n-수평협각에 의한 위치선: 두 물표 사이의 수평협각을 육분의로 측정한다음 해도 위에서 두 물표를 지나고 측정한 각을 품는 원으로 작도\n-중시선에 의한 위치선: 두 물표가 일직선상에 겹쳐 보일 때, 관측자와 가까운 물표 사이의 거리가 두 물표 사이의 거리의 3배 이내이면 매우 정확한 위치선이 된다. 선위, 피험선, 컴파스 오차의 측정, 변침점, 선속측정등에 사용.\n-수평거리에 의한 위치선: 물표까지의 거리를 반지름으로 원을 그리면 선박은 그 원주 위에 존재함.\n-격시관측법 : 동시에 두개이상의 위치선을 구할수 없을 때 시간차를 두고 위치선을 구하며, 전위선과 위치선을 이용하여 선위를 구하는 방법\n-양측배각법: 물표의 시간차를 두고 두번이상 측정하여 선위를 구하는 방법\n주의사항: 본선의 정확한 침로와 항정을 알아야 함., 관측시 침로 유지, 방위변화는 20도이상을 두어 측정해야한다.\n-선수배각법 : 첫번째 관측, 두번째관측이 두배라서. 항주거리랑 두번째관측시 물표까지거리가 같음.\n-4점 방위법 : 물표의 전측시 선수각을 45도, 4점로 측정하고 후측시 선수각을 90도, 8점으로 관측하여 선위를 측정하는 방법./정횡거리는 항정과 같고, 또한 물표까지의 거리또한 같다.\n-8점 방위법 : 전측시의 선수각에 관계없이 후측시의 선수각을 90도. 8점으로 관측하여 선위를 측정하는 방법\n-정횡거리예측법 : 어느물표의 정횡거리를 사전에 아는 방법.", "id": 332}, {"category": "항해!", "question": "2. pi개념과활용방법", "answer": "이것은 p.i에 대해 개념, 작도법, 사용하는 이유, 그리고 실무에서 어떻게 사용하고 그게 왜 안전을 보장하는건지 설명하라했는데 이건 확실하게 말했습니다.\n평행방위선을 위한 이격거리 (Parallel Index)\n1) 개요\n항해의 안전은 선박의 위치가 얼마나 정확하게 확인되었는지에 달려 있습니다. 넓은 바다 또는 연안 해역, 좁은 운하, 강 통로 또는 항구 및 항구 접근로를 통과하는 동안 항해의 기본 토대는 위치 확인에 있습니다. 이 위치확인은 레이더 사용, 천체 관측, GPS 사용 등 다양한 방법을 사용할 수 있습니다. 이러한 각 방법은 단독으로 또는 조합하여 사용하여 서로를 확인하고 선박의 위치를 확인할 수 있습니다.\nParallel Index는 항로에서 선박의 진행 상황을 모니터링하고 해안선이나 암초 등에서 안전한 거리를 유지하기 위하여 사용되는 기술입니다. 이 방법의 기본 원리는 특정 코스를 유지하고 따르기 위해 두 선 사이에 알려진 고정 된 수직 거리로 원래 코스에 평행하게 그려진 방위선이 참조로 사용된다는 것 입니다. 항로 선에 평행하게 그려진 방위선과 선박의 위치 사이의 수직 거리의 증가 또는 감소는 언제라도 초기 계획된 항로에서 교차 선로 이탈을 나타냅니다 .\n코스 선에 평행 한 방위선이 그려지는 기준점은 고정 부표, 등대, 곶, 부두, 고정 플랫폼 등입니다. 선박이 코스를 따라가는 동안PI은 항상 위험 요소로부터 고정 된 거리를 유지하도록합니다. 따라서 병렬 인덱싱은 항해 위험에 가까워 졌다는 것을 선원에게 경고하는 방법입니다.\n2) 사용법\n1) 고정 부표, 등대, 곶, 부두, 고정 플랫폼 등 명확하게 식별할 수 있는 물표를 선정한다.\n2) 그 물표에 대하여 본선 코스와 평행하게 선을 그리고 그 선과 코스라인과의 수직거리를 표시한다.\n3) 레이더에 PI선을 나타나게 하고 그 수직거리 만큼 셋팅하여 둔다.\n4) 그렇게하면 항해 할 때 레이더 PI선이 그 수직거리 만큼 유지되로록 항해하면 본선이 침로를 따라서 잘\n항해하고 있다는 의미가 되며 늘어나거나 감소하거나 하면 계획한 코스로 항해하고 있지 않다는 것을 의미한다.", "id": 333}, {"category": "항해!", "question": "4. 피험선의 정의와 설정 방법에 대하여", "answer": "1) 정의: 피험선이란 Clearing line으로 입,출항시 암초, 위험물 등을 피하기 위해 미리 설정해 놓은 위험 예방선\n뜻한다.\n2) 목적: 뚜렷한 목표의 방위, 거리, 수평협각 등에 의하여 항로부근에 있는 위험물을 피하는 것으로 선박이 위험\n구역에 들어있는지 안전구역에 들어있는지를 판단\n3) 설정방법\nA. 두 목표의 중시선에 의한 것(가장 확실하고 적절한 피험선의 선정 방법)\nB. 선수방향에 있는 목표의 방위선에 의한 것\nC. 침로의 전방에 있는 한 목표의 방위선에 의한 것\nD. 두 물표의 수평협각에 의한 것\nE. 높이를 알고 있는 목표의 앙각에 의한 것\nF. 수심에 의한 것\n4) 횡방향 피험선 설정: 측면에 있는 목표로부터의 안전 거리로 설정, 측면의 안전수심을 고려하여 횡방향 피험선 설정", "id": 334}, {"category": "항해!", "question": "14. 피험선의 종류와 방법을 설명하시오.", "answer": "◈ 피험선 (Clearing Line)의 정의 : 협수도를 통과할 때 또는 출/입항 할 때에는 자주 변침하여야 하며 마주치는 선박에 대비하기 위하여 선위측정에 전념하거나 예정침로를 계속 유지하기가 어려운 경우가 많다. 이런 장소에 접근할 때에는 미리 해도를 보고 충분히 연구하여 뚜렷한 목표의 방위, 거리, 수평협각 등에 의하여 항로 부근에 있는 위험물을 피할 목적으로 준비된 위험 예방선을 피험선이라고 한다.\n◈ 피험선의 종류\n1) 두 목표의 중시선(Range Line or Transit Line)에 의한 것.\n: 가장 확실하고 적절한 피험선의 선정방법이다. (<그림 5.51>의 LA)\n2) 선수방향에 있는 목표의 방위선에 의한 것.\n: <그림 5.51>에서 B목표의 방위를 280°보다 크게 보는 곳을 항행하면 위험물 C를 피할 수 있고, 310°보다 작게 보는 곳을 항행하면 위험물 D에 대하여 안전하다. 그러므로 이들을 모두 안전하게 피하려면 B목표의 방위를 280°내지 310°로 측정하게 되는 구역을 항행하면 된다.\n3) 침로의 전방에 있는 한 목표의 방위선에 의한 것.\n: <그림 5.52>에서 침로를 000°로 취하려고 할 때 침로 부근에 위험물 D가 있으면 침로의 전방에 있는 목표에서 적당한 여유를 두고 방위선 LC를 긋는다. 그 방위가 020°라면 선박에서 목표 L의 바위를 020°이상으로 측정하는 경우에는 안전권에 있고 그 이하로 측정하게 되면 위험권에 들어 있음을 알 수 있다.\n4) 측면에 있는 목표로부터의 거리에 의한 것.(<그림 5.53> 참조)\n5) 높이를 알고 있는 목표의 앙각에 의한 것.(연직위험각법 참조)\n6) 두 목표의 수평협각에 의한 것.(수평위험각법 참조)\n7) 수심에 의한 것.\n: 해도를 잘 조사하여 항로 부근에 간출암, 세암, 암암 등 장해물의 유무와 자기선박의 흘수 등을 참작하여 적당한 등심선을 택하고 이를 위험계로 보아 그 이내에는 들어가지 않도록 한다. 이런 목적으로 선정된 등심선은 수심에 의한 피험선이다.", "id": 335}, {"category": "항해!", "question": "22. 해도에서 EL 과 DL 의 의미는?", "answer": "1) EL(Elevation Level) : 높이의 기준면(평균해수면)으로부터의 높이\n2) DL(Datum Level) : 기본수준면(약최저저조면)으로부터의 높이", "id": 336}, {"category": "항해!", "question": "46. 격시 관측 방법을 설명하시오.", "answer": "▶ 격시관측위치 [ Running fix ]\n: 선박이 야간에 연안을 항행할 때 관측이 가능한 등광이 1개뿐인 경우와 같이 물표가 1개뿐 이거나, 방위와 거리 중 어느 한 가지 밖에 구할 수 없을 경우에 개략적인 선위를 구하기 위하여 사용하는 방법이다. 이 방법은 시간차를 두고 두 번 이상 같은 물표나 또는 다른 물표를 관측하여 그들의 전위선과 위치선을 이용하여 구한 선위를 격시관측위치(Running fix)라고 한다.\n이러한 격시관측 위치결정에 있어서는 여러 가지 방법을 이용할 수 있으나, 특히 격시 관측 사이에 변침과 속력의 변화가 있었을 경우나, 외력의 영향을 많이 받았을 경우에는 복잡한 계산과 작도를 통하여 선위를 결정할 수 있다.", "id": 337}, {"category": "항해!", "question": "59. 편차와 자차에 대해서 설명하시오.", "answer": "1) 편차 [ Variation, var, v , 偏差 ]\n어느 지점을 지나는 진자오선과 자기 자오선이 이루는 교각을 그 지점의 편차(偏差, Variation, var 또는 v)라 한다. 이 편차는 지구상의 장소에 따라 그 양이 다르며, 같은 장소일지라도 시일이 경과하면 달라지는데, 이것은 지구의 자극이 주기적으로 이동하기 때문이다. 어떤 지점에서 편차가 1년동안 변화하는 양을 연차라 하고, 1일동안 변화하는 양을 일차라고 한다.\n어느 지점에서의 편차의 크기는 진북을 기준으로 동, 서로 나타내며, 자침이 가리키는 북(자북)이 진자오선(진북)의 오른쪽에 있을 때를 편동편차(Easterly variation), 왼쪽에 있을 때를 편서편차(Westerly variation)로 구별하며, 각각 E 또는 W를 붙여 표시한다.편차를 구하려면 해도에 그려져 있는 나침도에서 그 중앙에 기재된 편차에 연차를 가감하여 구한다. 이 방법은 주로 연안항해 시에 이용하고, 대양항해 시에는 자침 편차도(Variation chart)를 이용한다.\n2) 자차 [ Deviation, Dev., D , 自差 ]\n마그네틱 컴퍼스는 원래 자기 자오선의 방향을 가리켜야 되지만, 선체, 선내 철기류 등의 영향을 받아 지자극의 방향을 가리키지 않고 자기 자오선과 약간의 교각을 이루는 방향을 가리키게 된다. 이 교각을 자차(自差, Deviation, Dev. 또는 D)라 한다. 즉, 자차는 선내 컴퍼스가 선체나 선내 철기류의 영향을 받아서 생기는 오차이다.\n자차도 편차의 경우와 같이 컴퍼스의 북(나북)이 지자기의 북(자북)의 오른쪽에 있으면 편동자차(Easterly deviation), 나북이 자북의 왼쪽에 있으면 편서자차(Westerly deviation)로 구별하며, 각각 E 또는 W를 붙여 표시한다. 자차는 선박마다 다를 뿐만 아니라 선수의 방향, 지구상의 위치, 시일의 경과 등에 따라서도 변화하므로, 천체를 관측하거나 지상의 목표를 이용하여 항상 최신의 자차를 측정하고, 이것으로 자차표 또는 자차 실용공식을 만들어 임의의 선수 방향에 대한 자차를 구하는 데 편리하도록 해 두어야 한다.", "id": 338}, {"category": "항해!", "question": "5. 지문항법", "answer": "☞ 평행 방위선법 ;\n대양 항로에서 연안에 접근할 때 시계가 점점 나빠지면서 항로 선정이 어려울 경우, 해안선에 평행한 항로를 취하거나 경우에 따라서는 해안에서 멀어지는 항로를 취한다.\n☞ 교차방위법 [ Cross bearing , 交叉方位法 ]\n이 방법은 항행 중에 등대, 산봉우리, 섬 등 해도 상에 기재되어 있는 2개 이상의 뚜렷한 물표를 선정하여 거의 동시에 각각의 방위를 재어 해도상에서 각 물표를 지나는 방위선을 그어 이들의 교점을 선위로 정하는 방법이다.\n이 방법은 연안 항행 중에 가장 많이 이용되는 방법으로, 측정법이 쉽고 또 위치의 정밀도가 높다. 이러한 교차방위법을 위한 물표선정에 있어서의 주의사항은 다음과 같다.\n① 해도상의 위치가 명확하고, 뚜렷한 목표를 선정한다.\n② 먼 물표보다는 적당히 가까운 물표를 선택한다.\n③ 물표 상호간의 각도는 가능한 한 30°～150°인 것을 선정해야 하며, 두 물표일 때에는 90°, 세 물표일 때에는 60° 정도가 가장 좋다.\n④ 물표가 많을 때에는 2개보다 3개 이상을 선정하는 것이 선위의 정확도를 위해 좋다.\n또한 방위측정 시에 주의해야 할 사항은 다음과 같다.\n① 방위 변화가 빠른 물표는 나중에 측정해야 한다. 즉, 선수미 방향이나 먼 물표를 먼저 재고, 정횡 방향이나 가까운 물표는 나중에 측정한다.\n② 물표가 선수미선의 어느 한쪽에만 있을 경우, 앞에서부터 뒤로 또는 뒤에서부터 앞으로 차례로 측정하는 경우가 많은데, 이 때 선박의 선속이 빠르고 방위측정에 비교적 많은 시간이 지체되었을 경우에는 선위가 예정침로의 오른쪽 또는 왼쪽으로 편위될 수 있으므로 주의하여야 한다.\n③ 방위 측정은 빠르고 정확하게 해야 하며, 또 해도 상에 방위선을 작도할 때에도 신속히 해야 한다.\n④ 위치선을 기입할 때에는 전위할 때를 고려하여 관측 시각과 방위를 기입해 두도록 하며, 선위에도 그 관측시각을 항상 기입하여야 한다.\n☞ 격시관측위치 [ Running fix ] ; 선박이 야간에 연안을 항행할 때 관측이 가능한 등광이 1개뿐인 경우와 같이 물표가 1개뿐이거나, 방위와 거리 중 어느 한 가지 밖에 구할 수 없을 경우에 개략적인 선위를 구하기 위하여 사용하는 방법이다. 이 방법은 시간차를 두고 두 번 이상 같은 물표나 또는 다른 물표를 관측하여 그들의 전위선과 위치선을 이용하여 구한 선위를 격시관측위치(Running fix)라고 한다.\n이러한 격시관측 위치결정에 있어서는 여러 가지 방법을 이용할 수 있으나, 특히 격시관측 사이에 변침과 속력의 변화가 있었을 경우나, 외력의 영향을 많이 받았을 경우에는 복잡한 계산과 작도를 통하여 선위를 결정할 수 있다.", "id": 339}, {"category": "항해!", "question": "3. 피험선 설정하는 방법을 말해보시오?", "answer": "- Clearing line : 뚜렷한 목표의 방위, 거리, 수평협각 등에 의하여 항로 부근에 있는 위험물을 피하는 것으로 선박이 위험구역에 들어있는지 안전구역에 들어있는지를 판단할 수 있는 것이기 때문에 선위 측정원리를 기초로 한 간단하면서도 명확한 위치선 이용 필요\n1) 두 목표의 중시선에 의한 것 / 가장 확실하고 적절한 피험선의 선정 방법\n2) 선수방향에 있는 목표의 방위선에 의한 것\nA 목표의 방위를 280도 보다 크게 보는 곳을 항해하면 위험물 C 를 피할 수 있고, 310도 보다 작게 보는 곳을 항행하면 위험물 D에 대하여 안전하다. 그러므로 이들을 모두 안전하게 피하려면 A 목표의 방위를 280도 내지 310도로 측정하게 되는 구역을 항행하면 된다.\n310°280°290°CDA\n3) 침로의 전방에 있는 한 목표의 방위선에 의한 것\n침로를 000°로 취하려고 할 때 침로 부근에 위험물이 존재하면 침로의 전방에 있는 목표에서 적당한 여유를 두고 방위선 LC 를 긋는다. 그 방위가 020° 로 라면 선박에서 목표 L의 방위를 020° 이상으로 측정하는 경우에는 안전권에 있고 그 이하로 측정하게 되면 위험권에 들어 있음을 알 수 있다.\n* 위험방위(Danger bearing : DB)\n협수도를 통과하거나 육안에 접근하여 항해할 때 연안에 개재하고 있는 위험물을 피하기 위하여 뚜렷한 목표를 지나 위험계에 접선을 그으면 앞에서의 피험선이 되는데 이 방위를 위험 방위라 한다.\n4) 측면에 있는 목표로 부터의 거리에 의한 것\ndBCO 350\n5) 두 물표의 수평협각에 의한 것\n6) 높이를 알고 있는 목표의 앙각에 의한 것\n7) 수심에 의한 것", "id": 340}, {"category": "항해!", "question": "4. RADAR 대수 대지 속력의 차이 및 충방에서는 무슨 모드 및 왜 그렇게 쓰는지", "answer": "IMO Resolution A422 3.11에 보면 ARPA에는 대수속력을 제공할 능력이 있는 LOG와 그 선속지시계를 제공해야만 한다라고 규정되어 있습니다. ARPA기능을 사용할 때는 대수속력 모드를 사용함으로써 충돌의 위험을 직관적으로 알 수 있도록 한다. 그렇다면 왜 대수속력을 사용해야 하는가.충돌예방규칙차원에서 보면 선박끼리 서로 어떤 상태로 보고 있는가가 중요합니다. 대지속력으로 계산을 하면 조류가 심한 곳에서는 횡단하는 상대선의 실제 선수방향과 ARPA의 계산 결과가 상대선의 Course와 상당한 차이를 보일 수 있습니다.", "id": 341}, {"category": "항해!", "question": "3.11 Equipment used with ARPA", "answer": "3.11.1 Log and speed indicators providing inputs to ARPA equipment should be capable of providing the ship's speed through the water.", "id": 342}, {"category": "항해!", "question": "항해 시 Radar에 속력을 표시하는 방법에 있어 대지속력과 대수속력으로 나누어 지는데 일반적인 항해에서 어떤 속력을 사용하며 그 이유는 무엇인지 말하시오.", "answer": "일반적인 항해에서 대수속력으로 표시를 한다.그 이유로 ARPA Radar에서 대지속력으로 설정하여 계산을 하면 조류가 심한 곳에서는 횡단하는 상대선의실제 선수방향, 대지속력과 ARPA의 계산결과 상대선박의 course, 대수속력과 상당한 차이가 있을 수 있다.\n예를 들어 본선이 선수에서 5kts 유속의 조류에 5kts로 항해중인 경우 대지속력은 0으로 표시되어, 상대선박이 본선을 정지하고 있는 선박으로 오인할 가능성이 있다. 따라서 IMO에서도 ARPA RADAR의 속력 설정을 대수속력으로 하는 것을 권고하고 있다.", "id": 343}, {"category": "항해!", "question": "1. 집성대권항법을 설명하시오.", "answer": "두 지점을 지나는 대권의 정점이 실제로 항해하기에 너무 높은 위도에 있거나 바람, 해류 등의 외력 또는 육지나 섬의 존재 등 다양한 이유로 대권 위를 항해할 수 없는 경우가 있다. 이 경우 제한위도를 설정하고 대권을 따라 항해하다 제한위도에 도달하면 090도 또는 270도로 변침하고 그 거등권을 따라 항해한다. 그러다 다시\n제한위도와 대권과의 교점이 나오면 다시 대권을 따라 도착하도록 가는 방법이다.", "id": 344}, {"category": "항해!", "question": "1. 평면항법 (Plane Sailing)", "answer": "①개요:\n침로, 항정을 알고 변위 및 동서거를 구하거나 또는 동서거, 변위를 알고 침로 및 항정을 구하는 계산법\n②요건:\n항정이 짧을 때(200-300nm), 침로가 000도 또는 180도에 가까울 때, 적도 부근에 있을 때.", "id": 345}, {"category": "항해!", "question": "2. 거등권항법 (Parallel Sailing)", "answer": "①개요:\n선박이 정동 또는 정서로 항해하는 항법(동서거 = 항정)", "id": 346}, {"category": "항해!", "question": "3. 중분위도 항법 (Middle Lastitude Sailing)", "answer": "①개요:\n출발지에서 도착지 간의 동서거는 중분위도에 해당하는 지점을 통과하는 2개의 자오선 사이의 거등권의 길이와 같다는 가정에서 선위를 계산하는 항법\n②요건:\n항정이 600nm 이내, 중분위도가 60도 이내, 침로는 동서에 가까울 때, 출발지와 도착지가 동일반구내에 있을 때", "id": 347}, {"category": "항해!", "question": "4. 점장위도 항법 (Mercator's Sailing)", "answer": "①개요:\n점장도의 구성이론에 입각하여 창안한 항법으로 중분위도항법과 다른점은 변경을 계산하는데 있어 동서거를 이용하지 않고 점장변위를 이용하여 침로 항정 및 변위의 계산은 평면항법의 공식을 이용한다.\n②장점:\n항법자체가 오차가 없으므로 항정선으로 항해하는 어떠한 경우라도 이용할 수 있는 가장 정확한 항법이다. 먼거리를 항해할 때나 정확한 결과를 필요로 할 때 이용할 수 있다., 출발지와 도착지가 적도 양쪽에 있어도 이용할 수 있다.\n③단점:\n침로가 동 또는 서에 가까울 수록 변위에 약간의 오차만 있어도 변경의 오차는 커진다., 위도가 높을 수록 점장위도의 변화도 커지므로 위도에 약간의 오차가 있어도 변경의 오차는 커진다.", "id": 348}, {"category": "항해!", "question": "3. 자차측정법의 종류", "answer": "1) 원표 방위법\n- 정박지 등에서 명료하게 원표를 볼수 있는 경우에 사용하는 방법이다.\n- 선박을 선회하여 컴퍼스침로에 대한 선수 8주요점마다 멀리에 있는 저명한 물표의 컴퍼스 방위를 측정한 후 그 8개의 나침방위를 평균내서 나오는 방위를 그 물표의 자침방위로 간주하는 자차의 측정방법이다.\n- 시차가 작아야 하기 때문에 선박의 선회권에 비해 물표가 충분히 멀리 있을 필요가 있다.\n2) 천체 방위법\n- 천체의 진방위를 계산에 의해 구하고 측정한 컴퍼스방위에 편차를 가감하여 자차를 구하는 방법이다.\n- 선회면에 의해 시차각이 없으므로 선박위치, 측정시각, 편차등이 정확하면 극히 정확한 자차를 구할 수 있다.\n- 이 방법에는 태양출몰방위각법, 시진방위각법, 고도방위각법, 극성방위각법 등이 있다.\n- 주로 태양출몰방위각법과 시진방위각법이 많이 사용된다.\n3) 물표의 자침방위에 의한 방법\n- 정박지나 연안항해중 해도에 의해 자침방위를 알고 있는 저명한 물표가 있을 때\n- 항해중으로서 선위가 확실하게 결정되는 경우는 협수로를 항해하는중 전방에 현저한 물표가 있을 때\n- 2 물표의 방위를 일직선으로 측정할 수 있을 때\n- 방파제의 입구를 통과시 그 방파제의 방위를 관측할 수 있을 때 이다.\n4) 상호방위법\n- 천체의 방위측정을 할 수 없거나 또는 적당한 원표를 발견할 수 없을 때 이용하는 방법으로서 지방자기의\n영향을 받지 않은 육상의 컴퍼스와 선내의 컴퍼스의 상호방위에 의해 각선수방향에 대한 자차를 구하는\n방법이다.\n5) 자이로컴퍼스에 의한 방법\n- 자이로컴퍼스를 장비한 선박에서 자이로컴퍼스와 비교하면 극히 간단한 방법으로 자차를 측정할 수 있다.\n- 자차를 측정하려는 컴퍼스의 선수나침방위를 차례로 향하게 하여 자이로컴퍼스가 가르키는 침로와 비교한다.\n- 이 자이로컴퍼스의 침로에서 편차를 가감하면 자침로가 되므로 손쉽게 자차를 구할수가 있다.", "id": 349}, {"category": "항해!", "question": "4. 시진방위각법을 설명하시오.", "answer": "Wing bridge에 있는 자이로 리피터기에 Azimuth circle을 설치하고 거울로 태양을 비춰서 반사되는 빛이 숫자를\n가리키면 그 값을 읽는다. 초시계를 이용하여 나가고 들어오면서 걸린 시간만큼 현재 시각에서 빼주어야 한다.\n시진방위각법은 계산하여 구한 방위(진방위)와 Azimuth circle(실측방위)과의 값을 비교해서 Gyro Error를 구하는\n것이다.\n[추가 질문] 시진방위각법으로 Gyro Error 구하는 방법을 설명하시오.\n준비물: Azimuth Circle, 초시계\n1) Wing Bridge에 있는 Gyro repeater에 Azimuth Circle을 설치하고, 거울로 태양을 비추어 반사되는 빛이\n가리키는 방위를 체크함. 초시계를 들고 가서 관측하는데 걸린 시각만큼 현 시각에서 제함.(시각, 방위, 경위도\n기록)\n2) Nautical Almanac에서 GMT 에서 GHA, Dec 를 구해줌\n3) 분과 초는 책 뒷부분 증분위표를 참고하여\n4) GHA와 Dec를 구한 후 경도를 가감해 LHA를 구함.\n5) PUB. 249에서 해당 LHA 페이지를 찾은 후 위도와 적위에 맞는 기준값을 찾고, 위도 적위에 대한 개정을\n해주면 진방위가 계산됨\n6) 진방위와 관측방위 값을 비교하여 error를 구하는 방법임.", "id": 350}, {"category": "항해!", "question": "5. 자이로에러 구하는 방법을 설명하시오.", "answer": "1) 부두 방위에 의한 방법: 부두 접안 후 선박과 해도에 나와 있는 부두 방위와의 비교\n2) 중시선에 의한 방법: 육지에 설치된 중시선을 이용하여 측정하는 방법\n3) 시진방위각법: 천체의 방위를 관측하여 오차를 측정하는 방법", "id": 351}, {"category": "항해!", "question": "63. 레이콘(Radar responder beacon : Racon)과 레이마크(Ramark)는 무엇입니까?", "answer": "1) Racon\n: Radar 응답용 표지, 선박의 Radar에서 전파를 받은 때에만 응답신호를 낸다. 그 신호는 PPI 에 특별한 모양으로 나타나기 때문에 표지의 판별은 어렵지 않다.\n2) Ramark\n: 가장 신뢰성이 높은 것이며 육안 또는 일정한 지점에서 Radar파를 계속 발사하고 있는 것이다.\nPPI에 발사점으로부터 한 줄의 방위선(1° ~ 3° 폭의 선형휘선으로 나타나고 일정주기로 명멸)으로 나타나므로 방위와 거리를 알 수 있어 대단히 편리하다.", "id": 352}, {"category": "항해!", "question": "1. RAMARK", "answer": "1) 본선 레이더와 무관하게 일정한 지점에서 계속 전파 발사\n2) RAMARK 신호는 레이더에 탐지되어 레이더 화면에 한줄 방위선이나 좁은 폭의 점선으로 나타나며 방위와\n거리를 알 수 있다.", "id": 353}, {"category": "항해!", "question": "2. RACON", "answer": "1) 본선의 레이더 신호에 응답하여 전파를 발사하는 장치\n2) 기상악화 시 광파표지 식별이 불가할 때 전파를 이용하여 선박의 위치를 알 수 있다.", "id": 354}, {"category": "항해!", "question": "레이콘에 대해서 설명하시오. 사용하는 이유는?", "answer": "선박의 레이더에서 발사하는 전파 신호를 받을 때 자동으로 응답하여 식별 가능한 신호를 발사하는 해상무선항행 업무용 장치이다. 레이콘은 해양에서 사용되는 레이더의 주파수 대역에서 작동한다. 특정 물표의 식별을 향상\n시키기 위한 송수신겸용 RACON은 수신된 레이더 펄스에 의해 촉발되었을 때 독특한 펄스를 송신함으로써 응답한다. 촉발파를 발사하는 레이더의 화면상에 거리, 방위 및 식별정보 등을 제공하기도 한다. 화면상에 나타난 응답은 화면상 수 마일에 해당하는 길이를 가지고 있으며, 때로는 식별을 위해 모스(morse)부호로 나타내기도 한다. 특히 안개 등 기상악화로 인하여 광파표지 식별이 불가능할 때 전파의 특성을 이용하여 선박의 위치를 확인할 수 있는 것이 특징이다.\n*광파표지(visual aids)\n빛을 이용해 그 위치를 표시하는 신호장치를 말한다. 항로표지의 하나로서, 항로표지법에서는 야간에 등화(燈火)를 이용하여 그 위치를 표시하며, 주간에는 형상표지로도 이용하는 항로표지로 규정하고 있다.", "id": 355}, {"category": "항해!", "question": "27.RACON 사용이유", "answer": ": RADAR BEACON, 전파신호를 받아 자동으로 응답하여 식별가능한 모르스신호로 발사, 기상악화로 인해 시계가 불량할시 등광을 확인랄수 없을 때 위치확인이 용이", "id": 356}, {"category": "항해!", "question": "2. racon과 ramark에 대해 비교서술 하시오. (2008)", "answer": ": racon이 본선의 레이더 신호에 응답하여 전파를 발사하는 장치임에 반해, ramark는 본선의 레이더와 무관하게 일정한 지점에서 계속하여 전파를 발사한다.\nracon은 기상악화시 광파표지 식별이 불가할 때 전파의 특성을 이용하여 선박의 위치를 확인할 수 있게 해주며,\nramark 신호는 레이더에 탐지되어 레이더 화면에 한 줄의 방위선이나 좁은 폭의 점선으로 나타나므로 방위와 거리를 알 수 있어 대단히 편리하다.\n[추가 질문] 해도상에서 Racon (D) 3cm 는 무엇을 뜻하는가?\n파장 3cm인 X-band Radar의 전파를 수신하면 응답하는 Radar beacon으로 레이다 스코프상에 모르스 부호 D(- ··)로 표시된다.\n[추가 질문] Racon 중 X, S-band 레이더 모두에 반응하는 것은 해도상에 어떻게 표시되어 있는가?", "id": 357}, {"category": "항해!", "question": "9. Parallel Index 의 정의와 어떻게 사용하는지 설명하시오.", "answer": "1) 정의 : RADAR화면 상에 EBL(Electric Bearing Line)으로 평행한 선을 나타내는 것\n2) 사용법 : 본선에 침로와 평행한 선을 레이더 상에 작도하고 그 평행선을 섬이나 등대, 육상 물표등에 대입한다. 그러면 굳이 위치를 내지 않고 그 평행선과 본선의 거리 유지 확인만으로 본선이 안전하게 침로 상을 항해하고 있는지 알 수 있다.", "id": 358}, {"category": "항해!", "question": "11. 항해계획을 수립할 때 동서로 대권항법을 이용하여 침로를 정할 때 두가지 유의사항을 설명하시오.", "answer": "1) 자주 변침을 해야 한다.\n2) 위도가 높은 지역을 통과해야 하므로 기상상태가 불량할 수 있다.", "id": 359}, {"category": "항해!", "question": "1. 개요", "answer": "항해거리를 단축하고 연료를 절약할 목적으로 지구표면의 2지점을 지나는 대권을 따라 항해하는 항법. 대권도를 이용하여 변침점을 결정. 변침점 사이를 항정선 항법이나 중분위도 항법을 이용하여 항해한다. 점장도 상에서는 극으로 불룩한 곡선으로 표시된다.", "id": 360}, {"category": "항해!", "question": "2. 장점", "answer": "① 항정이 짧아진다.\n② 고위도 일수록 좋다.\n③ 침로가 동서에 가까울 수록 좋다.\n④ 거리가 멀수록 좋다.(두 지점 사이의 거리가 멀수록 대권거리와 항정선거리의 차가 커진다)", "id": 361}, {"category": "항해!", "question": "3. 단점", "answer": "① 자주 변침해야하고, 비교적 항법자체가 복잡하다.\n② 고위도를 통과해야하므로 기상상태가 나쁠 확률이 높다.", "id": 362}, {"category": "항해!", "question": "15. 수평협각법에 대해 설명하시오.", "answer": "수평협각에 의한 위치선은 두 물표 사이의 수평협각을 육분의로 측정한 다음 해도위에서 두 물표를 지나고 측정한 각을 품는 원으로 작도. 그렇게 되면 관측자는 반드시 그 원둘레 위의 어딘가에 있게 된다. 그러므로 이 원은 위치선이다.", "id": 363}, {"category": "항해!", "question": "20. 위치선에 대해 설명하시오.(구하는 방법)", "answer": "1) 방위에 의한 위치선\n: Compass로 구한 물표의 방위선 2) 수평 협각에 의한 위치선\n2) 수평 협각에 의한 위치선\n: 두 물표 사이의 수평 협각을 육분의(Sextant)로 측정한 다음 해도 위에서 두 물표를 지나고 측정한 각을 품는 원으로 작도함\n3) 중시선에 의한 위치선\n: 두 물표가 일직선 상에 겹쳐보일때, 관측자와 가까운 물표 사이의 거리가 두 물표 사이의 거리의 3배 이내이면 매우 정확한 위치선이 된다. 중시선은 선위, 피험선, 컴퍼스 오차의 측정, 변침점, 선속측정 등에 이용\n4) 수평거리에 의한 위치선\n: 물표까지의 거리를 반지름으로 원을 그리면 선박은 그 원 주위에 존재", "id": 364}, {"category": "항해!", "question": "23. 나침도에 대해서,", "answer": "편차란 진자오선과 자기자오선이 이루는 각을 말하며, 지구상의 위치에 따라 다르다. 지자기 편차는 사용하는 해도의 나침도에 기입되어 있으며, 또한 지자기 편차는 매년 수분씩 변동하고 있기 때문에 이와 같은 지자기 편차의 연 변화율(annual change)도 나침도에 기입되어 있다.", "id": 365}, {"category": "항해!", "question": "24. 통항계획서를 해도에 표시할 사항", "answer": "1) 항해불가해역(No go Area)\n2) 전타점 (wheel over position)\n3) 회황불가지점 (No return point)\n4) 가항수역한계(예정침로와 구별위해 통상 점선으로 표시)\n5) 평행방위선을 위한 이격거리 (Parallel Index)\n6) 유도선(Leading line)\n7) 선수목표(Head Mark)\n8) 피험방위선(Not Less Than, Not More Than)", "id": 366}, {"category": "항해!", "question": "27. FIX와 Running Fix를 비교 설명하시오.", "answer": "격시관측(Running Fix)란 관측이 가능한 목표가 한 개거나 방위와 거리 중 하나 밖에 구할 수 없는 경우에 대략적인 선위를 구하기 위하여 시간차를 두고 두 번 이상 측정하여 위치선을 결합시켜 선위를 구하는 방법으로 그들 가운데 하나인 전위선과 위치선을 이용하여 결정한 선위이다.\n*전위선: 목표를 관측하여 얻은 위치선을 진침로 방향으로 항주한 항정만큼 평행 이동한 선\n*실측위치란 실제로 관측하여 구한 선위이다.", "id": 367}, {"category": "항해!", "question": "2. 항로표지", "answer": "☞ IALA해상부표식 [ IALA maritime buoyage system , 海上浮漂式 ]\n국제항로표지협회(IALA, International Association of Lighthouse Authorities)에서는 각국 항로표지의 해상부표식의 형식과 적용 방법을 통일하여 적용하도록 하였으며, 우리나라도 이에 따라서 설치하여 운용하고 있다. IALA 해상 부표식은 세계수역을 유럽을 중심으로 하는 A방식과 미국을 중심으로 하는 B방식으로 구분하여 측방표지가 다르게 표시하도록 하고 있으며, 아시아권에 있는 우리나라는 그림에 표시한 것과 같이 미국의 영향을 받은 일부 국가들과 함께 B방식을 따르고 있다.\n우리나라에서 적용하고 있는 B방식의 경우를 보면, 항구의 입․출항 항로에서 우현쪽의 측방표지인 등부표는 짝수번호에 홍색(赤, Red)으로 하고, 좌현의 측방표지인 등부표는 홀수번호에 녹색(綠, Green)으로 배치하도록 하여, 항만에 입항하는 선박을 기준으로는 항해등의 현등색깔과 반대색깔의 배치를 하고 있다. 이러한 B방식을 사용하고 있는 국가로는 미국을 위시하여 북미, 남미국가들과 한국, 일본, 필리핀, 타이완 등이 있고, A방식은 유럽, 중동, 아프리카, 오세아니아, 동남아시아 등 세계 대부분의 나라에서 적용하고 있다.", "id": 368}, {"category": "항해!", "question": "3. 해도(수로도지)", "answer": "☞ 해도에서 수심의 기준 ; 기본수준면 [ datum level, datum water level, standard sea level, datum plane, hydrographic datum , 基本水準面 ] 해도의 수심과 조석표의 조고(潮高)의 기준면으로서 각 지점의 조석관측에서 얻은 연평균 해면으로부터 4대 주요 분조(M2, S2, K1, O1)의 반조차의 합만큼 내려간 면이다. 이 면은 약최저저조위라고도 불리며 항만시설의 계획, 설계 및 공사용 수심, 표고 등 항만공사의 수심의 기준이 되는 수면이다. 기본 수준면은 국제 수로 회의에서 「수심의 기준면은 조위(潮位)가 그 이하로는 거의 떨어지지 않는 낮은 면이어야 한다」라고 규정하고 있다. 우리 나라에서는 해도의 수심 또는 조위의 기준면으로서 해당지역의 약최저저조위(Approx LLW (±)0.00m)를 채택하고 있다.", "id": 369}, {"category": "항해!", "question": "10. 소조승, 대조승의 정의 및 정확한 음력 날짜. (선장이 대조승/소조승을 확인해야 하는 경우를 예를 들어보시오 그리고 정확한 월령 날짜는?)", "answer": "- 대조승 (Spring Rise): 기본수준면에서 대조의 평균고조면까지의 높이\n- 소조승 (Neap Rise): 기본수준면에서 소조의 평균고조면까지의 높이", "id": 370}, {"category": "항해!", "question": "1. 용어정의", "answer": "▶ 조석 (Tide): 달과 태양의 인력에 의해 해수면이 주기적으로 승강운동을 하는 현상\n▶ 조류 (Tidal Current): 조석에 의한 해수의 수평방향의 운동. 왕복성을 가지고 있으며 knot로 표시함.\n▶ 해류 (Ocean Current): 바닷물이 한쪽방향으로 흐르는 반영구적인 거대한 물의 흐름\n▶ 고조 (High Water): 조석으로 인하여 해면이 가장 높아진 상태\n▶ 저조 (Low Water): 조석으로 인하여 해면이 가장 낮아진 상태\n▶ 정조 (Stand of Tide): 고조나 저조시 승강운동이 순간적으로 거의 정지한것과 같이 보이는 상태\n▶ 창조 (Flood Tide): 저조에서 고조로 되기까지 해면이 차츰 높아지는 상태\n▶ 낙조 (Edd Tide): 고조에서 저조로 되기까지 해면이 점차 낮아지는 상태\n▶ 조차 (Tidal Range): 고조와 저조때의 해면 높이의 차\n▶ 평균조차 (Mean Range): 조차를 오랫동안 측정한 평균치\n▶ 조승(Rise): 기본수준면으로부터의 고조의 높이의 차\n▶ 월조간격 (Lunitidal Interval): 달이 자오선(meridian)을 통과한 후 고조(high water)나 저조(low water)가 될 때까지의 시간을 말한다.\n▶ 고조간격 (High Water Interval): 달이 자오선을 경과하여 고조가 될 때까지의 시간을 고조간격\n▶ 저조간격 (Low Water Interval): 달이 자오선을 경과하여 저조가 될 때까지의 시간을 저조간격\n▶ 평균고조간격 (Mean High Water Interval): 오랫동안 고조간격을 평균한 것\n▶ 평균저조간격 (Mean Low Water Interval): 오랫동안 저조간격을 평균한 것\n▶ 조후시: 삭이나 망에서의 고조간격의 평균값\n▶ 월령: 삭과 망으로부터 경과한 시간을 일수로 표기, 달은 합삭에서는 보이지 않다가, 음력 초사흘경 해가 진 직후 서쪽 하늘에 초승달이 되어 나타난다. 이리하여 초 7일경 초저녁 중천에 떠 있는 반달이 되는데 이 때가 상현(上弦)이다. 15일경 망(望)이 되어 일몰시에 동천에 떠오르고, 22일경 또 반달이 되어 일출시에 중천에 남게 된다. 그 후 달이 점점 줄어들어 약 1주일 후에는 다시 합삭이 되어 깜깜한 밤을 이룬다.\n▶ 조령: 삭과 망이된때부터 대조가 되기까지의 시간을 날짜로 표시한 것(1~2일)\n▶ 대조 (Spring Tide): 삭과 망후 1~2일만에 생긴 조차가 극대인 조석\n▶ 소조 (Neap Tide): 상/하현후 1~2일만에 생긴 조차가 극소인 조석\n▶ 대조차 (Spring Range): 대조시 고조와 저조의 높이차\n▶ 대조승 (Spring Rise): 기본수준면에서 대조의 평균고조면까지의 높이\n▶ 소조승 (Neap Rise): 기본수준면에서 소조의 평균고조면까지의 높이\n▶ 부진동 (Secondary Undulations): 육지로 깊이 들어온 만에서 조석이외에 짧은 주기로 승강하는 현상\n▶ 일조부등 (Daily Inequality): 하루에 두번 일어나는 조석현상이 시간과 높이가 서로 같지 않은 현상\n▶ 분점조: 달이 적도에 있을때의 조석 - 달의 힘이 균등하게 작용하므로 규칙적인 일조부등 발생\n▶ 회귀조: 달이 남북회귀선부근에 왔을때의 조석 - 달의 힘이 균등하지 못해 불규칙적인 일조부등 발생\n▶ 창조류: 창조시 흐르는 흐름\n▶ 낙조류: 낙조시 흐르는 흐름\n▶ 게류: 정조시 정지한 흐름\n▶ 전류: 흐름이 잠시 정지한 후 방향이 바뀌는 것\n▶ 와류: 조류가 빠른 곳에서 생기는 소용돌이\n▶ 삭 (New moon) : 달이 보이지 않는 때 (음력 1일)\n▶ 상현 (first quarter) : 오른쪽 반달 (음력 7~8일)\n▶ 망 (full moon) : 보름달 (음력 15일)\n▶ 하현 (last quarter) : 왼쪽 반달 (음력 22~23일)\n달의 모양에 대한 각각 영어명칭, 대조승과 소조승 차이 달과 인력관계\n- 대조승(大潮升), Spring rise : Sp.R.\n삭(New moon) 및 망(Full moon) 이 지난 뒤 1 내지 2일 만에 조차가 극대로 되는데 그때의 조석을 대조, 그 때의 조차를 대조차(Spring range)라고 한다. 대조될 대 고조의 평균조고를 대조승이라 한다.\n- 소조승(小潮升), Neap rise : Np.R.\n상현(First quarter) 및 하현(Last quarter) 이 지난 뒤 1 내지 2일만에 조차가 극소로 되며 그 때의 조석을 소조, 그 때의 조차를 소조차(Neap range)라고 한다. 소조될 때 고조의 평균 조고를 소조승이라 한다.\n* 고조(High water) : 조석 때문에 해면이 가장 높아진 상태(보통 만조 또는 밀물이라고 한다)\n* 저조(Low water) : 조석 때문에 해면이 가장 낮아진 상태 (보통 간조 또는 썰물이라고 한다)\n- 사리 : 음력 보름과 그믐 무렵에 밀물이 가장 높은때 = 대고조, 大潮\n- 그믐 : 음력으로 그 달의 마지막 날\n- 조금 : 조수가 가장 낮을 때를 이르는 말, 대개 매월 음력 7,8일 과 22,23 일에. = 소조(小潮)\n달과 해의 인력작용으로 인해 해면은 하루에 두번 상승과 하강을 되풀이하고 있는데 이를 조석(潮汐, tide)이라고 한다. 달의 기조력(起潮力, tide generating force)은 해의 그것보다 2배 이상이므로 주로 달의 기조력이 조석에 영향을 준다. 이는 조석주기 (약 12시간 25분) 의 2배가 달의 공전주기(24시간 50분) 와 거의 일치하는 것으로 부터도 알수 있다. 달 이외에도 태양의 위치, 수심, 해안의 지형, 해수의 운동 등의 영향도 받으므로 실제로 관측되는 조석은 장소와 계절에 따라 다르게 나타난다.\n해면이 최고 높이에 이르렀을 때를 밀물(만조, 고조라고도 함, high water)이라고 하고 그 때의 해면의 높이를 고수위(高水位, high water) 라고 한다. 그리고 해면이 최저높이에 이르렀을 때를 썰물(간조, 저조, low tide)라고 한다. 고수위와 저수위의 차를 조차(潮差, tidal range) 라고 한다\n해, 달과 지구가 일직선상에 놓이는 삭(朔, 음력 초하루)과 망(望, 음력보름)의 달을 각각 초승달(삭월, 신월, new moon), 보름달(만월, 망월, full moon)이라고 한다. 이 때는 달과 해의 기조력이 합쳐지므로 조석은 커지는데 이를 사리(대조, spring tide) 라고 하고 그 때의 조차를 대조차(大潮差, spring rande)라고 한다.\n이와는 반대로 상현(first quarter)과 하현(last quarter)경에는 달과 해의 기조력이 상쇄되므로 조석은 가장 작아지는데 이를 조금(소조, neap tide)이라 하고 그 때의 조차를 소조차(小潮差, Neap range)라고 한다.\n물론, 대조차가 가장 크고 소조차가 가장 작다. 장기간의 조차의 평균을 평균조차(平均潮差, mean range)라고 한다. 1일 중에는 보통 밀물과 썰물이 2회씩 일어나지만(1일 2회조, double day tide),그 2회의 밀물이나 썰물의 높이는 같지 않다. 또, 연속된 밀물이나 썰물 사이의 시간에 대해서도 같다.\n이것을 일조부등(日潮不等)이라 하며, 이것은 반일조(半日潮)와 1일조 (1日潮)가 동시에 존해하기 때문이다. 고조(밀물) 중에서 높은 쪽을 고고조(高高潮), 낮은 쪽을 저고조(低高潮), 저조(썰물) 중에서 높은 쪽을 고저조(高低潮), 낮은 쪽을 저저조(低低潮)라고 한다.", "id": 371}, {"category": "항해!", "question": "2. 월조간격의 발생원인", "answer": "월조간격이란 고조간격과 저조간격을 합쳐서 이르는 말로서 그 발생원인을 살펴보자면 지구의 대륙은 불규칙한 상태로 존재하며 또 바다의 깊이도 동일하지 않고 해수의 유동에 따른 타성/점성 및 마찰 등의 물리적 성질이 서로 다르기 때문에 월조간격은 시간과 장소에 따라 그 차가 달라짐.", "id": 372}, {"category": "항해!", "question": "3. 월령과 조령의 차이점", "answer": "월령은 삭과 망 즉 보름달과 달이 빛나지 않는 상태 이후 경과한 시간을 일수로 나타낸 것을 말하고, 조령은 삭과 망 후 대조가 되기까지 걸리는 시간을 말하며 우리나라는 통상 1~2일 걸림.", "id": 373}, {"category": "항해!", "question": "4. 일조부등이란, 발생원인은", "answer": "하루에 두 번 일어나는 조석현상이 시간과 높이가 서로 같지 않은 현상을 말하는데, 발생원인은 지구의 자전축은 약 23.5도 기울어져 있으므로 달이 지구를 공전할 때 시간이 지남에 따라 위치가 달라지게 됨으로 이때 생기는 인력의 세기, 즉 기조력이 달라지게 된다. 기조력의 적용범위가 달라짐으로 해서 두 번의 조석현상 시 조시와 고조가 달라지게 되는 것이다.", "id": 374}, {"category": "항해!", "question": "1. IALA 방위표지법(실무적인 내용 질문): 북방위표지 의미, 동방위표지 몇시 방향?, 북방위표지와 동방위표지가 겹치는 지역이 있는지?", "answer": ": 면접관 칠판에 그림 그리면서 질문, 면접인 칠판에 그리면서 설명\n동방위 표지의 형상, 표체 색깔 및 등질에 대해 설명하시오.\n자차수정공식 및 수정방법등 전반적 사항", "id": 375}, {"category": "항해!", "question": "1.측방 표지 2. 방위표지 3.고립장애표지 4. 안전수역 표지 5. 특수 표지", "answer": "삭(New moon), 상현(first quarter), 망(full moon), 하현(last quarter)의 영어 이름은?\n- 대조: 태양, 지구, 달이 일직선이 된 경우 인력의 영향이 가장 강할 때로서 삭과 망이 지나고 1~2일이 지나서 조차가 가장 클때.\n- 소조: 상현과 하현이 지나고 1~2일이 지나고나서 조차가 가장 작을때.\n- 대조승(spring rise): 기본수준면에서 대조때 평균 고조까지의 높이.\n- 소조승(neap tide rise): 기본수준면에서 소조때 평균 고조까지의 높이.", "id": 376}, {"category": "항해!", "question": "92. 대조승 소조승 정의 월령으로 영어로?", "answer": "삭(New moon), 상현(first quarter), 망(full moon), 하현(last quarter)의 영어 이름은?\n대조: 태양, 지구, 달이 일직선이 된 경우 인력의 영향이 가장 강할 때로서 삭과 망이 지나고 1~2일이 지나서 조차가 가장 클때.\n소조: 상현과 하현이 지나고 1~2일이 지나고나서 조차가 가장 작을때.\n대조승(spring rise): 기본수준면에서 대조때 평균 고조까지의 높이.\n소조승(neap tide rise): 기본수준면에서 소조때 평균 고조까지의 높이.", "id": 377}, {"category": "항해!", "question": "54.해안선의 기준", "answer": "깊이의 기준 : 기본 수준면(약최저저조면)\n높이의 기준 : 평균 수면\n해안선의 기준 : 약 최고고조면", "id": 378}, {"category": "항해!", "question": "13. 해도에 기재되어 있는 수심은 무엇을 기준으로 하는가?", "answer": ": 기본수준면 [ datum level, datum water level, standard sea level, datum plane, hydrographic\ndatum , 基本水準面 ] 해도의 수심과 조석표의 조고(潮高)의 기준면으로서 각 지점의 조석관측에서 얻은 연평균 해면으로부터 4대 주요 분조(M2, S2, K1, O1)의 반조차의 합만큼 내려간 면이다. 이 면은 약최저저조위라고도 불리며 항만시설의 계획, 설계 및 공사용 수심, 표고 등 항만공사의 수심의 기준이 되는 수면이다.\n기본 수준면은 국제 수로 회의에서 「수심의 기준면은 조위(潮位)가 그 이하로는 거의 떨어지지 않는 낮은 면이어야 한다」라고 규정하고 있다. 우리 나라에서는 해도의 수심 또는 조위의 기준면으로서 해당지역의 약최저저조위(Approx LLW (±)0.00m)를 채택하고 있다.\n1) EL(Elevation Level)\n: 표고로써 한 국가 또는 특정지역에서 규정한 높이의 기준면으로 부터의 높이를 말합니다. 즉, 높이의 기준면을 0m로 하여 이 기준면으로 부터의 수직높이를 말하는데 이 높이의 기준은 대부분의 국가들이 평균해수면으로 규정하고 있음.\n2) DL(Datum Level)\n: 기본수준면으로 부터의 높이로써 국제협약에 의해서 약 최저 저조면을 기본수준면으로 하고 있음.", "id": 379}, {"category": "항해!", "question": "27. 해도의 기준 수심의 기준", "answer": "해도의 수심 : 기본 수준면\n물표의 높이 : 평균수면\n조고와 간출암 : 기본 수준면\n해안선 : 약 최고 고조면", "id": 380}, {"category": "항해!", "question": "1. 대조승(Spring Rise)", "answer": "대조시 기본수준면으로부터의 고조의 평균고조면 까지의 높이이다. 삭(New moon)/망(Full moon)이 지난 뒤 1~2일만에 생긴 조차가 극대인 시기", "id": 381}, {"category": "항해!", "question": "2. 소조승(Neap Rise)", "answer": "소조시 기본수준면으로부터의 저조의 평균고조면 까지의 높이이다. 상현/하현 후 1~2일만에 조차가 극소인 시기", "id": 382}, {"category": "항해!", "question": "6. 피험선이 무엇인지, 횡방향으로 피험선 설정할 때 어떻게 해야 하는지 말하시오.", "answer": "1) 정의: 피험선이란 Clearing line으로 입,출항시 암초, 위험물 등을 피하기 위해 미리 설정해 놓은 위험 예방선\n뜻한다.\n2) 목적: 뚜렷한 목표의 방위, 거리, 수평협각 등에 의하여 항로부근에 있는 위험물을 피하는 것으로 선박이 위험\n구역에 들어있는지 안전구역에 들어있는지를 판단\n3) 설정방법\nA. 두 목표의 중시선에 의한 것(가장 확실하고 적절한 피험선의 선정 방법)\nB. 선수방향에 있는 목표의 방위선에 의한 것\nC. 침로의 전방에 있는 한 목표의 방위선에 의한 것\nD. 두 물표의 수평협각에 의한 것\nE. 높이를 알고 있는 목표의 앙각에 의한 것\nF. 수심에 의한 것\n4) 횡방향 피험선 설정: 측면에 있는 목표로부터의 안전 거리로 설정, 측면의 안전수심을 고려하여 횡방향 피험선 설정", "id": 383}, {"category": "항해!", "question": "7. 해도상 저질 Sn, Sc가 무엇인지 말하시오.", "answer": "S_Sand_모래 M_Mud_뻘 Sc_Scoriae_화산암재 G_Gravel_자갈 Sn_Shingle_조약돌\nP_Pebbles_자갈 Cy;Cl_찰흙 Sh_Shells_조개껍질 St_Stones_큰돌 Cb_Cobbles_조각돌\nR_Rock_암반 Co_Coral_산호 S/M_이층저질(모래 아래 뻘)\n[추가 질문] 해도상 성질에 대하여 말하시오.\nf_fine_가는 m_medium_중간의 c_coarse_거친 bk_broken_부서진 sy_sticky_끈적끈적한\nso_soft_부드러운 st_stiff_굳은,딱딱한 h_hard_단단한", "id": 384}, {"category": "항해!", "question": "64. 해도상 해안선 높이의 기준수심은?", "answer": ": 약최고고조면\n◈ 안선 : 일반적으로는 해안선이라고 하지만 수로용어로는 안선(Coastline)이라고 한다. 안선은 약최고고조면에서 수륙의 경계선으로 표시한다.", "id": 385}, {"category": "항해!", "question": "5. 해도의 기준면에 대한 설명, 왜 기준면이 다 다른것인가", "answer": "- 해도의 수심기준면은 나라마다 상이하나 우리나라는 기본수준면을 기준으로 하고 있으며, 조고, 조승, 간출암의 높이 또한 기본수준면을 기준으로 한다.\n해안선의 기준은 약 최고고조면을 기준으로 하며 산이나 등대 높이, 노출암의 기준은 평균수면을 기준으로 한다.\n- 먼저 산이나 등대 노출암의 경우 대조시나 소조시 바꿔말해 바닷물이 많든 적든간에 항상 육안으로 확인이 가능하므로 조석이 없다고 가정하였을 때의 해면인 평균수면을 기준으로 하는 것이고, 해안선의 경우 바닷가와 인접한 곳이므로 해수침수에 의한 피해를 조기에 방지하기 위해 제일 높은 높이인 약최고고조면을 기준으로 삼으며,\n- 수심, 조고, 조승, 간출암은 선박이 해상을 통항할 시 수심이 낮게 산정하여 해저나 지형물에 충돌 할 가능성을 줄이기 위해 기본수준면은 기준으로 채택하고 있는 것이다.\n*수준원점\n우리나라의 수준원점은 인천광역시 남구 용현동 253번지(인하공업전문대학 구내)에 설치되어 있으며, 그 높이는 인천항 평균 해수면으로부터 26.6871m이고, 수정판(水晶板)에 눈금으로 표시되어 있다.\n13. IALA해상부표식 [ IALA maritime buoyage system , 海上浮漂式 ]\n국제항로표지협회(IALA, International Association of Lighthouse Authorities)에서는 각국 항로표지의 해상부표식의 형식과 적용 방법을 통일하여 적용하도록 하였으며, 우리나라도 이에 따라서 설치하여 운용하고 있다. IALA 해상부표식은 세계수역을 유럽을 중심으로 하는 A방식과 미국을 중심으로 하는 B방식으로 구분하여 측방표지가 다르게 표시하도록 하고 있으며, 아시아권에 있는 우리나라는 미국의 영향을 받은 일부 국가들과 함께 B방식을 따르고 있다.\n우리나라에서 적용하고 있는 B방식의 경우를 보면, 항구의 입․출항 항로에서 우현쪽의 측방표지인 등부표는 짝수번호에 홍색(赤, Red)으로 하고, 좌현의 측방표지인 등부표는 홀수번호에 녹색(綠, Green)으로 배치하도록 하여, 항만에 입항하는 선박을 기준으로는 항해등의 현등색깔과 반대색깔의 배치를 하고 있다. 이러한 B방식을 사용하고 있는 국가로는 미국을 위시하여 북미, 남미국가들과 한국, 일본, 필리핀, 타이완 등이 있고, A방식은 유럽, 중동, 아프리카, 오세아니아, 동남아시아 등 세계 대부분의 나라에서 적용하고 있다.", "id": 386}, {"category": "항해!", "question": "14. IALA 방위표지법(실무적인 내용 질문): 북방위표지 의미, 동방위표지 몇시 방향? 북방위 표지와 동방위표지가 겹치는 지역이 있는지?", "answer": "(Cardinal Buoy(방위표지)가 무엇인지? 동방위표지는 어디로 항해하라는 뜻인지? 야간에는 어떻게 구별하는지? 면접관 칠판에 그림 그리면서 질문, 면접자 칠판에 그리면서 설명)\n- 방위표지는 장애물을 중심으로 하여 주위를 4개 상한으로 나누고 그들 상한에 각각 북,동,남,서라는 이름을 붙이고, 이 각각의 상한에 설치된 표지를 북방위, 동방위, 남방위 및 서방위 표지라 부른다. 이러한 방위표지가 있을 때 항해자는 이 표지를 기준으로 하여 북방위표지의 북쪽, 남방위표지의 남쪽, 서방위표지의 서쪽, 동방위 표지의 동쪽으로 항행하면 안전한다.\n- 방위표지에 부착하는 두표(top mark)는 반드시 2개의 원추형을 사용하는데, 각 방위에 따라 서로 연관이 있는 모양으로 부착한다. 방위표지의 색상은 흑색과 황색 밴드를 사용하고, 이 표지에 부설되는 등화의 색상은 백색이며, 그 등질 역시 각 방위에 따라 서로 다르게 하고 있다. 동방위표지는 3시 방향에 있으니 3번깜박이고, 서방위표지는 9시 방향에 있느니 9번 깜빡입니다. 북방위의 경우 계속 깜박입니다.", "id": 387}, {"category": "항해!", "question": "동방위 표지의 형상, 색깔 및 등질에 대해 설명하시오.", "answer": "동방위표지는 표지의 동쪽에 가항수역 또는 항로가 있음을 의미한다. 두표는 삼각형 2개가 아랫부분이 서로 맞닿아 있는 두표로 구성되며 색은 위에서부터 흑, 황, 흑으로 구성되어 있고 등화는 3회의 흰색 급섬광등이다.", "id": 388}, {"category": "항해!", "question": "5. 등광(설치시): 백색", "answer": "6. 등질: 매 10초 초급섬광(6섬광)에 이은 장섬광(1섬광) 도는 매 15초 급성광(6섬광)에 이어 장섬광(1섬광)", "id": 389}, {"category": "항해!", "question": "방위표지와 측방표지를 영어로 간단하게 설명하시오.", "answer": "1. Cardinal Marks is indicating navigable water to the named side of the mark.\n2. Lateral Marks is generally marking the limit of well defined channel.", "id": 390}, {"category": "항해!", "question": "29. Beacon에 대해 설명하시오.", "answer": "항로표지로 사용되는 것으로 전파표지의 일종이다. 선박 및 항공기는 비콘에서 일정 시간마다 발신된 전파를\n포착하여 자선의 위치를 알 수 있다. Course beacon, Directional beacon, Rotating beacon 등의 종류가 있다.", "id": 391}, {"category": "항해!", "question": "28. 도등과 섹터등", "answer": "1) 도등 (leading light)\n통항이 곤란한 협수로나 운하, 좁은 만구, 항구 등에서 항해하는 선박의 항로를 지시하기 위한 것이며 대부분 항로의 연장선 위에 높고 낮은 2~3개의 표지를 앞뒤로 설치하여 그 중시선에 의해서 선박을 인도하도록 되어 있다.\n2) 섹터등\n지향등(Sector Light)이란 여건상 도등 설치가 곤란한 협수로, 항만, 만, 입구 등에서 선박에게 안전한 항로를 알려주기 위하여 항로 연장선상의 육지에 설치한 것으로서 녹광, 백광, 적광, 지향등용 등기를 갖춘 탑 모양의 구조물로서 백광구역이 안전항로이다. 백광은 항로 중심을 표시하고 좌현에는 녹색광, 우현에는 적색광을 표시한다.", "id": 392}, {"category": "항해!", "question": "30. 수로서지란?", "answer": "해도와 더불어 선박의 해상교통에 필수적인 안내 책자들을 말한다. 수로서지는 국립해양조사원에서 간행하며 수로지, 항로지, 국제신호서, 해상거리표, 속력환산표, 천측력, 색성판, 태양방위각표, 천측계산표, 등대표, 조석표, 조류도, 해양환경도 등이 있다. 해양조사원에서는 1996년부터 수로서지를 항해서지로 명칭을 변경하였다.", "id": 393}, {"category": "항해!", "question": "25. 안전수역표지의 정의를 설명하시오.", "answer": "안전수역표지는 수로 중앙표지와 같이 전 주변이 가항수역임을 표시하는 것이다.\n도색: 홍백종선, 두표: 홍색구형 1개", "id": 394}, {"category": "항해!", "question": "21. 해도상에서 D/L과 E/L은 무엇을 의미하는가?", "answer": "- EL(Elevation Level): 표고로써 한 국가 또는 특정지역에서 규정한 높이의 기준면. 즉, 높이의 기준면을 0m로 하여 이 기준면으로부터의 수직높이를 말하는데 이 높이의 기준은 대부분의 국가들이 평균해수면으로 규정하고 있음.\n- DL(Datum Level): 기본수준면(datum level, D.L), 조석표의 조고 및 해도에 있어서 수심을 표시하는 기준면으로 사용", "id": 395}, {"category": "항해!", "question": "65. 수심 20meter 해도에 error는 어느 정도 입니까?", "answer": ": 약 0.1 m\n◈ 수심은 기본수준면(Datum level for sounding)하의 수심을 미터(m)로 표시할 때 20.9m 까지는 소수점 이하 한 자리를 붙이고, 21m 이상 31m 미만은 0.5m마다 표시한다. (소수 0.1m-0.4m 까지는 절사하고 0.5m-0.9m 수심은 0.5m 로)", "id": 396}, {"category": "항해!", "question": "22. 약최저저조면 의미를 말하시오.", "answer": "기본수준면(약최저저조면, datum level, D.L)\n조석표의 조고 및 해도에 있어서 수심을 표시하는 기준면으로 사용한다.", "id": 397}, {"category": "항해!", "question": "1. 실측위치(AP. Fix): 실제로 관측하여 구한 선위", "answer": "2. 추측위치(Dead Reckoning Position): 최근의 실측위치를 기준으로 하여 진침로와 항정으로 구한 위치를\n말하며 항정은 선속계 또는 기관의 회전수로 구한다.", "id": 398}, {"category": "항해!", "question": "3. 추정위치(Estimated Position): 추측위치에 외력의 영향을 가감하여 구한 선위. 외력은 선박의 크기, 흘수,", "answer": "트림, 해역, 계절 등에 따라 변하며 수로지, 항로지, 조석표, 해류도, 조류도, 파일럿차트 등을 참고한다.", "id": 399}, {"category": "항해기기!", "question": "9.EPIRB 테스트주기 & 베터리 유효기간?", "answer": "한달마다 테스트 진행\n베터리 유효기간은 5년인데\n아무래도 on상태로 몇시간 작동가능한가 물어보신거같은데...48시간 연속동작가능", "id": 400}, {"category": "항해기기!", "question": "1. ECDIS의 FULL NAME", "answer": "-> Electronic Chart Display and Information System", "id": 401}, {"category": "항해기기!", "question": "2. ECDIS의 5가지 기능", "answer": "1. Position Indicating (선박의 GPS 위치가 지속적으로 표시됨)", "id": 402}, {"category": "항해기기!", "question": "4. 엑디스의 기능", "answer": "1) Positioning\n: 차트 상에 실시간 선위와 항적을 표시\n2) Route Monitoring\n: 본선에서 설정한 안전등심선과 위험물 자동 감지, 항로에서 벗어나는 것을 감시\n3) Route Planning\n: 항로 작도 기능, 작성된 항로의 백업, Way Point 편집, Way Point간 침로, 속력, 변침 시점 표시,\n항로 안전성 점검 (Safety Check)\n4) Recording\n: 본선 항적을 저장/재생, 표적의 항적을 저장/재생, 연동센서로부터 입력된 정보의 저장, Alarm 및 Indication\n내역 저장\n5) Alarming\n: 해도상의 위험지역 접근시 Alarm 발생, 연동장비 이상시 Indication 발생, Dragging 시 또는 예정항로에서\n이탈시 Alarm\n6) Electronic Chart\n: 주관청인 수로당국의 권한으로 ECDIS와 함께 사용하기 위하여 발행한 내용, 구조, 포맷 등에 관한 표준\n데이터베이스이다. ENC는 안전 항해에 필요한 모든 해도 정보를 내용으로하고 이 해도 정보 이외에 항해 정보,\n예를 들어 수로지의 정보를 포함할 수 있다.", "id": 403}, {"category": "항해기기!", "question": "42. ECDIS 루트 플랜하는 방법, 순서를 말하시오.", "answer": "*항해계획 수립절차: 검토(APPRAISAL) → 계획(PLANNING) → 실행(EXECUTION) → 확인(MONITORING)\n1) 검토\n1) 예상항로 및 항구에 관한 모든 정보를 수집한다.\n2) 예정항로 및 항구에 필요한 해도의 준비 및 최근까지의 소개정 여부를 확인한다.\n3) 고려해야 할 필요정보는 다음과 같다.\nA. 조석/조류\nB. 항로 및 항구의 허용흘수\nC. Sailing Direction상에 나타난 조언/권고\nD. 등대(특징, 광달거리, arc of visibility), 항로표지, 통항분리대\nE. 항해계기를 이용할 수 있는지 여부\nF. 그 지역에 영향을 미치는 항행경보, 기후정보 및 기상 정보\nG. 본선의 조종성능 자료\nH. 선박의 상태, 감항성, 설비 및 장비\nI. 화물의 특성(특히 위험화물) 및 적재상태\nJ. Ocean Passage of the world\nK. routing chart\nL. 기상서비스업체의 권고사항(필요시)\nM. Ship Reporting System, VTS 및 해양환경보호 사항\nN. 해상교통량, 도선사 승하선 관련 정보, 본선보유 각종 증서 및 서류\n4) 예정항로 결정은 당해 항차 관련정보를 검토 후 선장이 결정한다.\n2) 계획\n1) 예정항로에 관련된 모든 정보를 충분히 검토 후 선장의 지시에 따라 2항사가 세부 항해계획(berth to berth)을 양식에 의거 작성한다.\n2) 항해계획 확정을 위해 다음 사항을 완비하여야 한다.\nA. 적당한 축척의 해도에 작도, 위험지역 표시, 예정항로상의 허용오차에 대한 여유\nB. 해도상의 항로는 360도 표시법으로 기입\nC. 해도상에 위치를 구하기 위한 radar 목표물 표시(명확한 목표물, RACON등)\nD. 해도상 항로 목표물의 방위와 거리 표시\nE. 암초, 저수심 등 피험선 설정\nF. 조석표, 조류도, 수로지 및 항로지 등의 해조류에 관한 기사를 참조\nG. VTS 및 Ship Reporting 지침 표시\nH. 해양환경보호 특별해역 표시\n3) 항해계획의 주요 요소를 결정하기 위해 다음 사항을 포함하여야 한다.\nA. 안전속력 및 흘수제한선의 경우 선회시 선체경사로 인한 여유수심 감소 허용치\nB. 야간 통항이나 조류로 인한 제한지역에서 요구되는 ETA를 맞추기 위한 선속변경 필요성\nC. 기관을 사용하여야 할 지점\nD. 변침점에서의 변침시 본선 선회권 및 조류 등의 외력 영향 고려\nE. 제한지역에서 최저 용골하 여유수심\nF. 정확한 위치를 구하기 어려운 지점에서의 위치를 구하는 방법 및 주기\nG. 비상시 묘박지로의 진행 계획\n4) 도선사 승선지점 부근의 진입 금지구역 및 주의사항을 사전 표시하여야 한다.\n3) 실행\n선장은 2항사가 작성한 항해계획을 검토, 승인한 후 계획을 실행하여야 한다.\n1) 계획실행 결정시 다음 요소를 고려하여야 한다.\nA. 본선 항해장비의 신뢰도 및 상태\nB. 조석 및 조류\nC. 지정학적 조건: 자주 시계제한을 받는 지역 등\nD. 위험지점 통과시간\nE. 통항이 집중되는 지점에서의 통항 상황\n2) 육안으로 위치확인을 해야 하는 지역에서 시계가 제한되는 경우 등 특수상황의 발생을 고려하여야 한다.\n3) 선장은 예상항로 중 추가 당직자가 필요한 지역을 고려하여야 한다.\n4) 확인\nA. 확정된 항해계획은 선교에 비치하여 당직사관이 항상 활용할 수 있도록 하여야 한다.\nB. 사전 계획된 항로를 따라 선박이 진행하고 있는지를 계속적으로 확인한다.\nC. 출항전, 제한수역 또는 위험수역 진입전, 항해계기의 작동상태를 필히 점검하고 항해 중 규칙적으로 자주\n점검하여야 한다.\nD. 선위 확인을 위해서는 사용 가능한 모든 항해계기를 이용해야 하며 연안항해시는 상황이 허용하면 언제나 선위의 확인은 두가지 이상의 방법으로 이루어져야 한다.\nE. 선위는 적절한 간격으로 해도상에 표시를 하여야 하며, 특히 연안항해나 입출항시 또는 도선구역 진입시에는 빈번한 간격으로 선위를 확인하여야 한다.\nF. Radar의 평행방위선 기술(Parallel Indexing)이 어떤 목표물에 대하여 계속적으로 선위를 확인하는데 가장\n간편하고 효과적인 위치확인 방법임.\nG. 확정된 또는 실행중인 항해계획의 변경은 본 지침에 의거 수립되고 기록한다.\n*참고\n1. ECDIS를 이용한 항해계획은 표에 변침점의 경위도를 입력하는 방식과 전자해도 위에 그림 그리듯 변침점을\n클릭하여 입력하는 방식이 있음.", "id": 404}, {"category": "항해기기!", "question": "2. 침로와 거리의 계산은 항정선항법, 대권항법 모두 가능함.", "answer": "3. 초기 설정: 안전등심선 설정, 항로폭(항로이탈범위, XTL), 평균속력, 선회반경 등의 안전요소 설정", "id": 405}, {"category": "항해기기!", "question": "4. 항로 상 안정성 체크를 통해 항로 상 위험요소를 감지하고 필요시 항로 수정", "answer": "5. 항로상 모든 Layer 및 물표가 검토되어야 하므로 display category는 ALL(Ohter) Display에서 Planning할 것.\n조석의 변화, 예정항로로부터의 이탈, 비상계획까지 고려되어야 함.", "id": 406}, {"category": "항해기기!", "question": "6. 이전항로를 불러와 다시 사용하는 경우, 중간에 업데이트 된 내용이 현 항로상에 위험한 영향이 없는지 확인", "answer": "하여야 함.\n7. Route Planning 후 항로상의 위험요소 식별을 위하여 반드시 Safety Check를 실시하여야 함.", "id": 407}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "11.5 Voyage Recording", "answer": "11.5.1 ECDIS should store and be able to reproduce certain minimum elements require to reconstruct the navigation and verify the official database used during the previous 12hours. The following data should be recorded at one minute intervals;\n.1 to ensure a record of own ship’s past track; time, position, heading, and speed; and\n.2 to ensure a record of official data used; ENC source, date, cell and update history;\n11.5.2 In addition, ECDIS should record the complete track for the entire voyage, with time marks at intervals not exceeding 4 hours.\n11.5.3 It should not be possible to manipulate or change the recorded information.\n11.5.4 ECDIS should have a capability to preserve the record of the previous 12 hours and of the voyage track.\n항적 기록 기준은 똑같습니다: 옛날 규정이든 지금 최신 규정이든 ECDIS의 항적 기록은 \"최근 12시간 정밀 기록 + Voyage 전체 기록\"이 국제 표준입니다.\n제시하신 규정(MSC.232)은 현재 표준입니다: 지금 타고 계신(혹은 심사하시는) 대부분의 선박은 MSC.232(82)로 승인받은 장비이므로 완벽히 유효한 기준입니다. 최신 규정(MSC.530)은 과도기입니다: 2029년 강제화를 목표로 이제 막 현장에 도입되기 시작한 차세대 기준이지만, 항적 기록 법적 요구사항은 동일합니다. MSC.530(106)는 국제해사기구(IMO)가 채택한 '차세대 ECDIS 성능 기준(Performance Standards for ECDIS)' 규정입니다.\n기존에 사용하던 MSC.232(82) 규정이 만들어진 지 15년 이상 지나면서, 기술 발전을 반영하고 더 안전한 항해를 지원하기 위해 2022년 11월에 새롭게 제정되었습니다. (최근에는 표준 루트 플랜 교환 기능 등을 보완한 MSC.530(106)/Rev.1 개정판이 배포되어 적용 중입니다.)\n실무 관점에서 이 규정의 핵심 요점을 3가지로 압축해 드리겠습니다.", "id": 408}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 왜 만들었는가? (핵심 목적: S-100 표준 도입)", "answer": "기존 ECDIS는 옛날 표준인 S-57 기반의 해도만 쓸 수 있었습니다. 하지만 MSC.530 규정이 도입되면서 앞으로의 ECDIS는 S-100(차세대 수로 데이터 모델) 표준을 반드시 지원해야 합니다.\nS-100이 도입되면 해도 위에 실시간 조류 정보, 고정밀 수심 데이터(해저 지형), 기상 정보 등을 스마트폰 앱처럼 레이어로 겹쳐서 볼 수 있어 항해 안전성이 크게 올라갑니다.", "id": 409}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 루트 플랜(Route Plan)의 디지털 교환 표준화", "answer": "선박과 선박, 또는 선박과 육상(VTS 등) 간에 항로 계획(Route Plan)을 디지털 데이터로 표준화하여 실시간으로 주고받을 수 있는 기능(S-421 표준)이 강화되었습니다. 항해사의 항로 입력 오차나 업무 부하를 줄이기 위함입니다.", "id": 410}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "항적기록은 법적 강제사항인지 말하시오.", "answer": "ECDIS가 법적으로 설치되어야 하는 선박의 경우에는 반드시 항적기록 관련 성능기준을 만족하여야 한다.\n11.5.2 In addition, ECDIS should record the complete track for the entire voyage, with time marks at intervals not exceeding 4 hours.", "id": 411}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "43. ECDIS의 Display 모드에 따른 설명과 변화에 대해 말하시오.", "answer": "1) 표준지시화면모드 (Standard Mode)\n항로계획 및 모니터링 시 사용해야 하는 최소 디스플레이\nBase mode에 추가하여 Buoy, Light house, Beacon 과 같은 항로표지, TSS, ITZ, Ferry route 및 Channel 과 같은\n통항로 항행금지구역 또는 제한수역, 해도 축척경계, 군도 해상교통로 등 표시\n2) Base mode\n화면에서 지울 수 없는 가장 기본적인 chart data로 안전항해를 위해 base mode 디스플레이 설정은 적합하지\n않음. Base mode에서 표시되는 정보는 해안선, 안전등심선(safety contour), 고립장해위험물 등\n3) Other mode\nECDIS가 가지고 있는 모든 정보를 표시, 경우에 따라서 일부 chart data를 선택하여 표시할 수 있음.\n표시되는 정보: 수심, 해저케이블, 해저 파이프라인, 항로표지 상세정보, 경고문 내용, ENC 갱신일자, 편차, 경위도\n선, 지명 등", "id": 412}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "44. ECDIS와 ECS의 차이를 설명하시오.", "answer": "ECS(Electronic Chart System)란 민간업체에서 상업용으로 개발된 디지털해도를 총칭해서 일컫는 말로 해도데이터를 표시하지만 IMO의 ECDIS 성능 기준을 만족하지 아니하는 전자해도 장비들의 일반 명칭이다.\nECDIS (Electronic Chart Display and Information System)란 전자 해도를 보여주는 장비로서 국제해사기구(IMO)와\nIHO에 의해 정해진 표준 사양에 따라 제작된 것이다.", "id": 413}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "45. ECDIS의 백업 요건에 대해 설명하시오.", "answer": "(선박설비기준) 제93조 항해용해도 등\n1) 연해구역 이상을 항해구역으로 하는 선박에는 항해하여야 할 해역 및 항만의 해도 기타 항해용간행물을 비치하여야 한다. 이 경우 항해용간행물은 『선박안전법 시행규칙』 제75조에 따라 최신의 것을 비치하여야 한다. 다만, 한정된 해역만 운항하는 선박에 대한 조석표는 해당 항만의 조석표만을 비치할 수 있다.\n2) 국제항해에 종사하는 총톤수 500톤 이상의 여객선 및 총톤수 3,000톤 이상의 화물선에는 『선박안전법 시행규칙』 제75조 1항에 따른 전자해도(ECDIS: Electronic Chart Display and Information System)를 설치하여야 한다. 이 경우 전자해도는 백업장치를 갖추어야 하며, 제1항에 따른 최신화된 해도를 백업장치로 활용할 수 있다.\n3) 제1항에도 불구하고 제2항에 따른 선박 이외의 선박은 해도에 대신하여 『선박안전법 시행규칙』제75조 1항에 따른 전자해도를 설치할 수 있다. 이 경우 전자해도는 백업장치를 갖추어야 하며, 예비의 최신화된 해도를 백업장치로 활용할 수 있다.", "id": 414}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "46. ECDIS의 Safety contour와 safety depth를 어떻게 하는지 말하시오.", "answer": "1) Safety Depth\nMax. Draft + 최대속도에서의 Squat + 최소 UKC – TIDE\n2) Safety Contour\nSafety Depth보다 깊은 가장 가까운 등심선에 해당하는 수심\n(예) Safety Depth가 12m일 경우, Safety Contour는 15m\nSafety Depth가 16m일 경우, Safety Contour는 20m\nSafety Depth가 9m일 경우, Safety Contour는 10m\n3) 부가 설명\nA. contour란, 등심선 = ENC상에서는 5m, 10m, 15m, 20m, 30m 등등\nB. 위에 언급된 수심 외 다른 수심은 차트에서 등심선이 될 수 없다.(예) 8m, 13m, 24m 등은 contour가 될수 없다.\n[추가 질문] Safety contour와 safety depth가 어떻게 표현되는지 말하시오.\n1) Safety Depth\nA. 차트 상 설정된 SAFETY DEPTH 미만의 수심(숫자)을 굵게 표시한다.\nB. SAFETY DEPTH가 8m이면, 1~7m는 굵은 숫자로 표시, 8m 이상의 수심은 기본 설정인 회색의 엹은 숫자로\n표시\n2) Safety Contour\nA. 설정된 Safety Contour에 해당하는 등심선을 굵게 표시하고 해당 등심선보다 수심이 낮은 수역을 파란색\n음영으로 표시한다.\n[추가 질문] 회사규정은 어떻게 되어 있는지 말하시오.\n1) Safety Depth: Max. Draft + 최대속도에서의 Squat + 최소 UKC\n2) Safety Contour: Safety Depth\n3) Shallow Contour: Max. Draft\n4) Deep Contour: Max. Draft x 2\n[추가 질문] Safety contour와 safety depth를 동일하게 할 경우 장점을 말하시오.\n시(청)각적으로 선박의 안전수심보다 낮은 지역에 접근하거나 진입하는 것을 즉시 인지할 수 있다.", "id": 415}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "47. ENC safety check를 하는 이유를 말하시오.", "answer": "Route Planning 후 항로상의 위험요소를 식별하여 WPT를 조정하고 저장하였다고 하더라도, 반드시 XTL 안쪽의 항로상 위험요소를 점검하여야 한다.\n1) 사용자가 식별하지 못한 항로상 위험요소 파악\n2) 이전 항로를 불러와 다시 사용할 경우, 중간에 업데이트된 항로상 위험요소 식별\n3) 이전 항로를 다시 불러와 사용하더라도, 변경된 본선 컨디션에 따라 안전등심선과 같은 설정값이 달라지게\n되므로 현재 항로와 관련한 위험요소 재차 확인 필요", "id": 416}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 계산 공식", "answer": "1) Safety Depth: Max. Draft + 최대속도에서의 Squat + 최소 UKC\n2) Safety Contour: Safety Depth\n3) Shallow Contour: Max. Draft\n4) Deep Contour: Max. Draft x 2", "id": 417}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. Safety Contour의 표시", "answer": "Safety Depth보다 깊은 가장 가까운 등심선에 해당하는 수심\n(예) Safety Depth가 12m일 경우, Safety Contour는 15m\nSafety Depth가 16m일 경우, Safety Contour는 20m\nSafety Depth가 9m일 경우, Safety Contour는 10m\n* 부가 설명\nA. contour란, 등심선 = ENC상에서는 5m, 10m, 15m, 20m, 30m 등등\nB. 위에 언급된 수심 외 다른 수심은 차트에서 등심선이 될 수 없다.(예) 8m, 13m, 24m 등은 contour가 될수 없다.\n[추가 질문] Safety contour와 safety depth가 어떻게 표현되는지 말하시오.\n1) Safety Depth\nA. 차트 상 설정된 SAFETY DEPTH 미만의 수심(숫자)을 굵게 표시한다.\nB. SAFETY DEPTH가 8m이면, 1~7m는 굵은 숫자로 표시, 8m 이상의 수심은 기본 설정인 회색의 엹은 숫자로\n표시\n2) Safety Contour\nA. 설정된 Safety Contour에 해당하는 등심선을 굵게 표시하고 해당 등심선보다 수심이 낮은 수역을 파란색\n음영으로 표시한다.\n[추가 질문] Safety contour와 safety depth를 동일하게 할 경우 장점을 말하시오.\n시(청)각적으로 선박의 안전수심보다 낮은 지역에 접근하거나 진입하는 것을 즉시 인지할 수 있다.", "id": 418}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. Recording (기록)28.가우신오차와 해결책", "answer": ": 일정한 침로로 장기간 항해하던 선박이 변침을 하면 일시적인 반영구자기와 선체연철의 자기점성에 의하여, 선체자기가 정상상태로 될때까지 약 5분동안 생기는 오차. 동서에서 남북 침로로 대각도 변침했을시 가장 큼. / 5분이 지나면 없어짐.", "id": 419}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "91. 선박의slip의정의와 계산법", "answer": "프로펠러가 만약 너트에 대한 볼트의 경우와 같이 고체 내에서 회전하고 있다면 1회전 중 1 피치 p 만큼 나아갈 것이다. 프로펠러는 물 과 같은 미끄러지기 쉬운곳에서 회전하고 선박에는 저항이 있으므로 P만큼 진행할수 없다 이것을 slip이라 한다.\n(기관 마일 – 항해마일) / 기관마을 x 100", "id": 420}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "52. 도플로 로그와 EM로그의 장단점", "answer": "1) 도플러 로그 : 수심 200미터 미만에서는 대지 속력을 측정하지만 200미터 이상에서는 대수 속력으로 인식함.\n2) EM LOG : 대수속력을 나타내줌 // 선박이 정지되어 있더라고 유속이 있다면 선속있는 것으로 인식하는 단점이 있음.", "id": 421}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "4. 2차소인선에 의한 거짓상 (2006, 2008)", "answer": ": 도관현상의 영향으로 최대탐지거리가 늘어나, 멀리 떨어진 물표의 반사파가 다음 소인시간에 되돌아와 훨씬 가까운 위치에 거짓상을 만드는 현상이다. 대부분 맑은 날씨에 생긴다.", "id": 422}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. 간접반사에 대해 서술하시오. (2013)", "answer": ": 레이더 전파가 장애물에 반사되어 물표쪽으로 빗나가서 생기는 현상이다. 장애물의 방향에 진상과 같은거리의 거짓상을 만든다.\n(안테나와 장애물까지의 거리는 무시할만큼 짧음)\n​\n6. ARPA 에서 추적하는 물표에서 알 수 있는것 -> ARPA가표시하는요소 (2006, 2008)- 물표의 거리와 방위- 물표의 과거항적- 진벡터, 상대벡터, CPA", "id": 423}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "6. CPA,TCPA의 개념과 Alarm setting시의 요건은?", "answer": "CPA와 TCPA가 and의 요건이라는게 Point였으나 제가 사용했던 Radar는 JRC 최신 모델이었는데 요즘은 CPA든 TCPA든 알람 세팅을 해놓고 둘중 하나만 걸려도 알람이 울리게 되어있었습니다. 면접관이 원하는 답은 둘다 충족해야 알람이 울린다 였습니다.", "id": 424}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "8. ARPA에서 경보를 울리는 경우, 종류, 설명.", "answer": "- 경계지역 경보 : 물표가 레이더 화면의 지정한 지역에 가까이 오면 경고- CPA 경보 : 지정한 CPA와 TCPA 이하가 되는 물표가 있으면 경고- 물표의 소실 경보 : 추적중인 물표가 소실되면 확실하게 표시, 마지막위치를 지시기상에 나타내주어야 한다.- 성능시험과 경보 : ARPA에 오작동이 일어면 경보.- 추가 경보장치 : 센서입력상실, 항적변화경보, 정박당직경보, 추적채널 찼을 때 경보, 잘못된 데이터입력 경보, 조선시간 경보, 벡터길이 억제경보.", "id": 425}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "9. 아굴절에 대해 서술하시오. (2006, 2008)", "answer": "레이더 빔이 표준대기상태에서 약간 위쪽으로 굽는 현상으로, 물표의 탐지거리가 줄어든다.다음과 같은 상태에서 발생하는 경향이 있다.- 높이에 따라 상대습도가 증가- 높이에 따라 온도 저하율이 급격하게 감소- 악천후", "id": 426}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "10. 맹목구간(and 차영구간)에 대해 서술하시오. (2006, 2013)", "answer": ": 맹목구간과 차영구간은 레이더 전파가 선체구조물에 의해 차단되기 때문에 발생. 맹목구간은 전파가 전혀 도착하지 않는 부분, 차영구간은 전파에너지가 줄어든 부분, 안테나와 장애물의 크기와 거리가 맹목구간과 차영구간의 각도 폭을 결정한다.\n​", "id": 427}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "12. STC: 소인의 중심에서부터 이득을 줄이고 시간에 따라 원상태로 회복시킴으로써 해면반사를 억제한다.해면반사를 자동으로 억제하고자 최근 개발된 적응이득 기술은 평균 해면반사만큼 억제신호를 주는 방식이다.", "answer": "13. PAD(예상위험구역): 안전항과를 위하여 피해야 하는 구역이다.설정한 안전항과거리, 오차 허용 한도, 배의 크기 등을 고려하여 충돌점 주위에 PAD 작도한다.", "id": 428}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "15. 레이더방정식: 물표가 탐지될 수 있는 최대탐지거리와 그 거리에 영향을 미치는 요소들과의 관계를 나타내는 식.", "answer": "Rmax :\nPt : 송신첨두전력\nPr : 탐지가능한 최소수신전력\nG : 안테나 이득\nA : 안테나 유효면적\nㅇ : 물표의 유효반사 면적", "id": 429}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "32. ALPA에 ALARM와 관한 것", "answer": "CPA/ TCPA\n- 경계지역 경보 : 물표가 레이더 화면의 지정한 지역에 가까이 오면 경고- CPA 경보 : 지정한 CPA와 TCPA 이하가 되는 물표가 있으면 경고- 물표의 소실 경보 : 추적중인 물표가 소실되면 확실하게 표시, 마지막위치를 지시기상에 나타내주어야 한다.- 성능시험과 경보 : ARPA에 오작동이 일어면 경보.- 추가 경보장치 : 센서입력상실, 항적변화경보, 정박당직경보, 추적채널 찼을 때 경보, 잘못된 데이터입력 경보, 조선시간 경보, 벡터길이 억제경보.", "id": 430}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 물표의 특성에 대해 쓰시오 (2008, 2013)", "answer": ": 물표에 부딪힌 펄스에너지가 안테나로 되돌아오는 에너지의 양은 다음 5가지 물표의 성질에 따라 달라진다.\n- Aspect : 레이더 전파의 입사와 거울면이 이루는 각, 90도일 때 반사가 좋다.\n- 표면의 결 : 물질 표면의 울퉁불퉁한 정도가 파장보다 작으면 매끄럽게 반사하고, 파장보다 크면 산란한다.\n- 물질(material) : 일반적으로 양도체로 된 물질이 레이더 전파를 잘 반사한다.\n- 모양 : 모양은 물표의 여러 가지 에스펙트로 고려된다.\n- 크기 : 레이더 빔은 수평방향보다 수직방향으로 더 넓으므로 물표가 높으면 그만큼 강한 반사파를 만든다.", "id": 431}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "58. Auto Pilot에서 PID란,", "answer": "- 선박이 정해 놓은 침로로 가고 싶어도 외력(바람, 조류)의 영향을 받아 원래의 침로에서 벗어나게 됩니다. 이 벗어난 각도를 편각이라 합니다. 벗어난 각도에서 원침로로 돌아 오기 위해서 오토파일럿은 복원타를 사용합니다. 선박은 원래의 침로대로 돌아가게 될 것이고 그 상태를 놓아두면 오히려 원침로 반대쪽으로 계속 돌아갈 것입니다. 이것을 억제하기 위하여 반대쪽으로 넘어가기 전에 미리 타를 쓰는데 이를 제동타라 합니다. 이는 PID 제어의 일종입니다.\n- 복원타 (Propertional: 비례동작) P - Control\n선박이 설정침로에서 벗어난 각도를 편각이라 하는데 이 편각이 클수록 복원타가 커집니다. 즉 편각을 제거하기 위함입니다.\n- 제동타 (Differential: 미분타) D - Control\n설정된 침로에 진입하기 전 각속도를 감안하여 미리 타각을 줄이기 시작하여 복원타의 반대로 쓰는 타 입니다.\n- 적분타 (Intergral) I\n외력에 의해 편각이 발생했을 경우, 일반적으로 편각은 한 쪽 방향으로만 일정시간 지속되는데 P,D Control만\n시행하게 되면 설정침로에서 일정한 값으로 계속 벗어나게 되므로 이 값을 제어하기 위해 일정 시각 편각을\n적분하여 그 값의 평균값을 구하여 해당 편각을 수정하기 위해 타각을 주는 것입니다.", "id": 432}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "59. Auto Pilot에서 PID 설정방법", "answer": "1) ADPT (Adaptive): Weather 천후 조정 메뉴입니다.\n*연료비가 급증하게 되면서 보침성 뿐만 아니라 경제성도 중요하게 인식되어 타를 많이 사용함으로써 발생하는 연료 소비량을 줄이기 위해 개발되었으며 대양에서는 다소의 요잉을 허용하더라도 연료의 소비가 적도록\n제어하고 연안에 접근할 때에는 정확하게 보침이 되도록 제어하는 방식이다.\n2) Rudder: 위에서 말한 복원타 입니다. 값이 커질 수록 선수가 확확 돌아갑니다.\n3) Rate: 위에서 말한 제동타의 개념입니다.\n4) Pilot Watch: 설정침로에서 벗어 날 경우 알람이 울립니다. 만약 10으로 해놓았다면 설정 침로에서 10도 벗어난 경우 알람이 울립니다.\n5) Rudder Limit: 타각을 제한해 두는 것 입니다. 오토파일럿이 이 이상 타를 쓰지 못하게 합니다.", "id": 433}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "69. 전세계 해상조난 및 안전제도(GMDSS) (항해기기)", "answer": "(Global Maritime Distress and Safety System)\n*질문: A4 해역운항 선박의 gmdss장비 충족 요건\n1) 기본개념\n해사위성 통신 및 텔렉스, 디지털 선택호출 등 최신 통신기술을 해상 조난 및 안전분야에 도입하여 선박 조난시 조난신호의 자동송수신으로 선박의 위치에 관계없이 가장 짧은 시간 내에 수색 및 구조 활동이 가능하고 항해 및 기상정보 등을 포함한 해상안전 정보를 제공하여 선박 안전운항을 도모하는 제도임\n2) 적용선박\n국제항해에 종사하는 여객선 및 총톤수 300톤 이상의 선박, 원양어선\n※ EPIRB 탑재대상: 연해구역이상 운항선박 및 길이 24미터 이상 어선\n3) 해역구분\n- A1 해역: 해안국의 초단파대 무선전화 통신권의 해역(30마일 이내)\n- A2 해역: 해안국의 중단파대 무선전화 통신권의 해역(150마일 이내)\n- A3 해역: A1, A2 해역을 제외한 북위 70도와 남위70도 사이 해역\n- A4 해역: A1, A2, A3 해역을 제외한 해역(남극, 북극)\n4) 해역별 GMDSS 장비 설치\n5) GMDSS 통신설비의 요건\n(1) DSC (디지탈 선택호출) 장치\nDSC장치는 초단파대, 중파대 및 단파대의 무선설비에 부가된 것으로 일정한 형태의 디지털 신호로 처리된\n호출부호를 사용하여 각종(선박별, 선단별, 국가별, 해역별 또는 전 선박)의 선택호출을 자동적으로 하며\n통신자체는 그 후 적당한 채널(주파수)을 이용하여 무선전화, 직접 인쇄전신등에 의하여 행한다.\nDSC를 이용한 조난통보는 정해진 형식에 따라 자기 식별, 조난위치, 조난시각, 원인, 조난 및 안전통신수단\n등을 나타내는 통신문을 송신(긴급시는 몇 개의 정보는 누락되지만 하나의 버튼으로 송신) 하지만, 이 작업을\n자연스럽게 행해지도록 하기 위하여 선상의 조치로서의 DSC장치와 선위 측정장치를 연결하여 위치나 시각정보\n등이 항상 새롭게 입력 되도록 하는 등의 고려가 이루어지고 있다.\nDSC용 주파수로는 각 주파수대 별로 2187.5KHz, 4027.5KHz, 6312.0KHz, 8414.5KHz, 12577.0KHz, 16804.5KHz,", "id": 434}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "156.525MHz가 지정되어 있다.", "answer": "(2) NBDP (협대역 직접 인쇄전신)\nNBDP는 MF 및 HF대를 사용하는 무선텔렉스이다. 이 시스템은 종래의 모르스 전신에 대신하는 통신수단으로서,\n키보드를 조작하여 송신하며 수신자가 없어도 통보는 자동적으로 수신한다.\nNBDP장치는 선박국간이나 육상국간의 텔렉스 및 전신 업무에 사용됩니다. 조난, 안전 및 기타 업무를 위하여\n사용됩니다. NBDP는 보통 MF/HF에 내장되어 텔렉스 기능을 합니다. INM-C도 텔렉스 기능이 있습니다. INM-C는 위성을 사용하기 때문에 극지방을 제외하고는 언제든 사용할 수 있는 반면, MF/HF에 내장된 NBDP는 전파의\n한계로 일정거리 이상 사용하지 못합니다. 정리하면 MF,HF대를 사용하는 무선 텔렉스로 종래의 모르스 전신을 대신하는 통신수단으로서 키보드를 조작하여 송신하며 수신자가 없어도 자동적으로 수신되어 기록,보관하는 장치입니다.\n(3) VHF 설비\nVHF 채널 70(156.525MHz)에 의한 DSC와 채널 6, 13 및 16에 의한 무선 전화 송수신 이 가능하고, 선박의\n통상조선위치에서 조난 경보신호를 발신할 수 있어야 한다. 또한, 채널 70에 이한 DSC청수당직을 계속 유지할\n수 있는 장치가 필요하며, 이는 하나의 설비로 통합할수 있다.\n(4) MF 설비\nDSC 및 무선전화를 사용하며, 2187.5KHz, 2182KHz로 송수신이 가능하고, 선박의 통상 조선위치에서 조난\n경보신호를 발신할 수 있어야 한다. 또한, 2187.5KHz로 DSC청수당직을 계속 유지할 수 있는 장치가 필요하며,\n이는 하나의 설비로 통합할 수 있다.\n(5) MF/HF 설비\nDSC, 무선전화 및 NBDP을 사용하여 중단파(1,605 - 4,000KHz)의 모든 조난안전 주파수로 송수신이 가능하고,\n선박의 통상조선위치에서 조난 경보 신호를 발신할 수 있어야 한다. 또한, 위의 주파수대에서 무선전화 및\nNBDP를 사용하여 일반무선통신의 송수신도 가능해야한다. 그리고, 2187.5KHz 및 8414.5KHz의 DSC청수당직을\n유지할 수 있는 설비가 있어야하며 조난 및 안전 목적을 위하여 지정된 HF DSC주파수 중 어느 1개를 항시\n선택할 수 있어야 한다. 이러한 주파수는 계속하여 직접 청취하거나 스캐닝 수신기로 청취 하여야 한다.\nMF/HF대의 무선전화 조난 및 안전 주파수로는 2182KHz, 4125KHz, 6215KHz, 8291KHz, 12290KHz, 및 16420KHz가 지정되어 있고 NBDP 주파수로는 2174.5KHz, 4177.5KHz, 6268KHz, 8376.5KHz, 12520KHz, 및 16695KHz가 지정되어 있다.\n(6) INMARSAT 선박 지구국(SES)\nINMARSAT(국제해사위성기구)에서 승인된 선박 지구국은 INMARSAT해사 위성을 사용하여 통신을 행하는 위성\n통신 설비로, NBDP에 의한 조난 및 안전통신의 송수신, 조난 우선 호출의 송수신이 가능해야 하고, 실행 가능하다면 육상 대 선박의 조난경보 청취를 계속 유지할 수 있어야 하며 선박의 통상조선위치에서 조난경보신호를 발신할 수 있어야 한다. 또한 무선전화나 직접 인쇄전신으로 일반무선통신의 송수신이 가능해야 한다.\n(7) NAVTEX 수신기\nNAVTEX 수신기는 518KHz로 운용되는 수신전용의 NBDP로서, 연안항행 선박에 대하여 필요한 해상 안전정보의\n수신에 사용된다. 특징은 일정한 형식에 따라 정보를 선택 수신 할수 있으며 자동수신이 가능하다는 것이다.\n원양해역 및 NAVTEX서비스가 제공되지 않는 연안해역을 항행하는 선박에 위해서는 HF와 INMARSAT가\n제공하는 고기능 집단호출 시스템을 이용한다. HF에 의한 해상안전정보의 송수신용의 NBDP주파스는 4209.5KHz,\n4202KHz, 6314KHz, 8416.5KHz, 12579KHz, 16806.5KHz, 16980.5KHz, 22376KHz, 26100.5KHz가 지정되어 있다.\n(8) EGC 수신기\nINMARSAT가 시행하는 EGC는 독특한 전세계 자동업무 제도로서 전 해역, 구역 또는 지역의 항행경보 기상경보와 기상예보 및 육상 대 선박의 조난 경보를 송수신하는 장치이다. EGC시스템은 대양의 중앙부분은 물론이고NAVTEX서비스를 할 수 없거나 선박밀도가 너무 낮아서 시행하기 곤란한 연안수역에서도 자동업무를 제공할 수 있다. EGC메시지는 세계 모든 곳의 인정된 정보 수집자료부터 제공되며 해안지구국을 통하여 해당 대양구역에 방송되며, 선박에서는 INMARSAT 표준형 선박지구국의 내장형 EGC수신 기로서 EGC메시지를 수신하게 된다.\n(9) 비상위치 지시용 무선표지설비(EPIRB)\nEPIRB는 선박이나 항공기가 조난상태에 있고 수신시설을 이용할 수 없음을 표시하는 것으로 수색과 구조작업시\n생존자의 위치결정을 용이하게 하도록 무선표지신호를 발신하는 무선설비로서, GMDSS에서는 다음의 3가지\n형식이 사용된다.\n1) VHF EPIRB\nVHF 채널 70의 DSC로 조난경보의 송신을 행하는 것으로, VHF해안국의 통신권내(A1해역)에서만 사용이\n가능하다.\n2) COSPAS-SARSAT SYSTEM EPIRB\n극궤도 통과 위성을 이용하여 조난경보를 전달하는 것으로 지구 전지역에서 사용이 가능하지만 위성이 고도가\n낮게(약1000Km)돌고 있으므로 비콘의 송신으로부터 육상에의 수신까지 약간의 시간(최대지연시간3시간)이\n소요될 수 있다.\nEPIRB는 COSPAS-SARSAT계 장비입니다. COSPAS-SARSAT 시스템은 위성을 이용해 수색 및 구조하는 시스템으로서 121.5MHZ 및 406MHZ로 송신하는 조난 beacon의 위치를 확인합니다.\nEPIRB의 조난 신호 발사 방법은 크게 수동과 자동 방법으로 나눌 수 있습니다. 자동으로는 침몰시 수심 2-4m\n에서 EPIRB의 격납대가 수압에 의해 Hydrostatic Release Unit가 작동하여 자동으로 선박과 분리되고 부상합니다. 그 후 EPIRB가 전해질인 해수에 닿으면 자동적으로 신호를 발사합니다. 이렇게 발사된 구조 신호는 COSPAS-SARSAT 위성을 통해 LUT(위성조난통신소)와 육상의 CES(해안지구국) 및 RCC(구조국)으로 조난 선박의 조난 사실을 알린다.\n3) INMARSAT SYSTEM EPIRB\nINMARSAT 정지위성을 이용하여 조난경보를 전달하는 것으로 시간 지체없이(약10분) 항상 육상으로의 정보전달이 가능한 특징이 있지만, INMARSAT 정지위성의 가청범위내(남 북위 70°이내)에서만 사용이 가능하며 위치 측정기능이 없기 때문에 위치 정보를 통신문으로 송신할 필요가 있다.\n이들 EPIRB는 용이하게 접근할 수 있는 장소에 설치하여야하고 용이하게 수동으로 풀 수 있고 한 사람이\n생존정으로 쉽게 운반할 수 있어야 하며, 선박이 침몰하거나 전복되는 경우에는 자유로이 부양할 수 있고 또\n부양된 때에는 자동적으로 작동할 수 있어야 하며 수동으로도 작동할 수 있어야 한다. 더욱이 이들 EPIRB는 그\n선박을 통상 조선하는 장소에 가까이 비치하거나 또한 그 장소에서 원격조작을 할 수 있어야 한다.\n(10) 9MHz용 레이다 트랜스폰더\n수색 및 구조용 레이다 트랜스폰더는 선박의 조난시에 수동 및 자동으로 작동된다. 이 경우 선박 및 항공기의\n9,200 - 9,500MHZ의 레이다의 의문신호에 대하여 20회 스위프되면서 응답신호를 발신하게 되는데 이 신호는\n레이다 스크린상에서 방위선을 따라 SART의 위치로부터 외부쪽으로 8마일까지 연장되어 20개의 점선으로\n나타난다. 이같은 독특한 레이다 신호는 쉽게 인식할 수 있다. GMDSS에서는 여객선 및 총톤수 500톤 이상의\n화물선에 최소한 양현에 1대씩, 총톤수 300톤이상 500톤미만의 화물선에는 최소한 1대의 SART를 비치하도록\n규정하고 있다.\n(11) 양방향 VHF 무선전화장치\n조난현장에서 생존정과 구조정 상호간에 또한 생존정과 구조항공기 상호간에 조난자에 대한 구조에 관한\n무선전화통신에 사용되는 것으로 모든 여객선 및 총톤수 500톤 이상의 화물선에는 최소한 3대, 총톤수 300톤\n이상 500톤 미만의 화물선에는 최소한 2대의 휴대용 VHF 무선전화 장치를 비치하도록 규정하고 있다.\n(12) 2182KHz 무선전화 통보신호 발생장치 및 수신장치\nGMDSS 장비를 설치하지 아니한 선박 앞으로 조난통보를 보내기 위하여 통신사의 주의를 환기시키기 위한\n무선전화경보신호를 무선전화 조난주파수인 2182KHz로 송신하기 위한 장치 및 다른 선박에서 보낸 경보신호를\n수신하기 위한 장치로서, GMDSS의 이행완료 예정인 1999년 2월 1일까지 모든 여객선과 총톤수 300톤 이상의\n화물선의 선교에 비치해야 한다.", "id": 435}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "9.GMDSS 장비 중 DSC 발송 가능한 장비,오발송 시의 취소 방법을 기기별로 설명하시오.", "answer": "1)VHF : 16본 채널을 이용하여 선명,호출부호, DSC번호 등을 통보한 다음 본선에서 몇시 몇분에 발신된 조난 경보를 취소한다고 통보한다.\n2)MF : 2,182 KHZ 맞춘 후, VHF 동일\n3)H/F : 4,6,8,12,16 MHZ를 차례로 맞춘후 , VHF 동일\n4)INMARSAT 장비 : 조난경보가 발신된 동일한 해안지구국을 경유하여 조난경보를 취소하는 내용의 메시지를 RCC에 알려야 한다.\n본선의 선명,호출부호,INAMRSAT ID 번호, 본선의 위치\n5)EPIRB에 의한 경우 : 가장 적절한 통신수단을 사용하여 가장 가까운 해안국, 해안 지구국 또는 RCC를 연결하여 그 사실을 알리고 조난경보를 취소하여야 한다.", "id": 436}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. VHF DSC 조난 신호 오발신 수정법", "answer": "1) VHF\n1) switch off transmitter immediately**;\n2) switch equipment on and set to Channel 16; and\n3) make broadcast to \"All Stations\" giving the ship's name, call sign and DSC number, and cancel the false distress alert.\n4) And then, Fax or email above contents to the nearest RCC and confirm by telephone call whether it is cancel or not. (You can see all contact information of RCCs', If you use the Admiralty List of Radio Signal Vol.V)\nExample;\nAll Stations, All Stations, All Stations\nThis is NAME, CALL SIGN,\nDSC NUMBER, POSITION.\nCancel my distress alert of\nDATE, TIME UTC,\n=Master +\n2) MF\n1) switch off equipment immediately**;\n2) switch equipment on and tune for radiotelephony transmission on 2,182 kHz; and\n3) make broadcast to \"All Stations\" giving the ship's name, call sign and DSC number, and cancel the false distress alert.\n4) And then, Fax or email above contents to the nearest RCC and confirm by telephone call whether it is cancel or not. (You can see all contact information of RCCs', If you use the Admiralty List of Radio Signal Vol.V)\nExample;\nAll Stations, All Stations, All Stations\nThis is NAME, CALL SIGN,\nDSC NUMBER, POSITION.\nCancel my distress alert of\nDATE, TIME UTC,\n=Master +\n3) HF\n1) As for MF, but the alert must be cancelled on all the frequency bands on which it was transmitted. Hence, in stage 2.2 the transmitter should be tuned consecutively to the radiotelephony distress frequencies in the 4, 6, 8, 12 and 16 MHz bands, as necessary.\n2) And then, Fax or email above contents to the nearest RCC and confirm by telephone call whether it is cancel or\nnot. (You can see all contact information of RCCs', If you use the Admiralty List of Radio Signal Vol.V)\nOther Distress Systems\n4) Inmarsat-C\nNotify the appropriate RCC to cancel the alert by sending a distress priority message via the same CES through which the false distress alert was sent.\nExample of message\nNAME, CALL SIGN, IDENTITY NUMBER,\nPOSITION,\nCancel my Inmarsat-C distress\nalert of DATE, TIME UTC\n= Master +\n5) EPIRBs\n1) If for any reason an EPIRB is activated accidentally, the ship should contact the nearest coast station or an appropriate coast earth station or RCC and cancel the distress alert.\n2) And then, Fax or email above contents to the nearest RCC and confirm by telephone call whether it is cancel or not. (You can see all contact information of RCCs', If you use the Admiralty List of Radio Signal Vol.V)\n6) General\nNotwithstanding the above, ships may use any means available to them to inform the appropriate authorities that a false distress alert has been transmitted and should be cancelled.\nNo action will normally be taken against any ship or mariner for reporting and canceling a false distress alert. However, in view of the serious consequences of false alerts, and the strict ban on their transmission, Governments may prosecute in cases of repeated violations.", "id": 437}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "71. 조난신호를 보내는 방법 중 전파를 사용하는 방법을 말하시오.", "answer": "1) 무선전신 또는 기타의 신호 방법에 의한 모스부호(SOS)\n2) 무선전화에 의한 '메이데이'라는 말의 신호\n3) 무선전신 경보 신호\n4) 무선전화 경보 신호\n5) 비상위치지시를 하는 RADAR BEACON에서 발사하는 신호", "id": 438}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "72. 조난 신호 수신 시, 구조선이 취해야 할 조치", "answer": "1) 조난통보를 수신했음을 알리고, 상황에 따라 조난통보를 재송신함.\n2) 조난선에 자선의 선명, call sign, 위치, 속력, eta를 통보\n3) 조난주파수의 지속적 청취\n4) 레이더를 지속적으로 작동\n5) 조난 장소 부근 접근 시 경계원 추가 배치\n6) 조난 현장으로 항진하면서 다른 구조선의 위치, 침로, 속력, eta, 조난현장의 상황파악\n7) 빠른 구조 작업을 위하여, 그물, 사다리, 로프, 들것 등을 준비한다.", "id": 439}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "73. 협대역직접인쇄전신(NBDP)의 운용", "answer": "1) 개요\nNBDP(Narrow Band Direct Printing Telegraphy)는 MF대 및 HF대를 사용하는 무선텔렉스이다. 이 시스템은 종래의\n모르스 전신에 대신하는 통신수단으로서 키보드를 조작하여 송신하며 통보는 수신자가 없어도 자동적으로 수신\n되어 기록, 보관된다.\nNBDP는 인마사트 장비를 설치하기 어려운 소형선박에서 편리하게 이용할 수 있도록 개발된 해상통신 시스템으\n로서 선박국과 해안국, 또는 선박국간에서 중파나 단파대의 주파수를 이용하여 조난, 안전 및 일반 텔렉스\n통신을 할 수 있는 송신 및 수신장치이다. GMDSS에서 이 시스템이 요구되고 있는 것은 NAVTEX시스템이 없는\n해역에서 단파 NBDP 시스템으로 NAVTEX와 같은 형식의 해상안전방송이 행해지고 있는 해역을 항해하는\n선박과 A4수역 선박이다.\n옛날 모스 통신 다음 단계의 설비이며 간단히 얘기하면 배에서 text 형식의 문자를 보낼 수 있고, 그것을\n수신하는 쪽에서 오퍼레이터가 조작을 하지 않아도 자동으로 받을 수 있는 장치이다.\n2) 특징\n1) 선박국과 해안국간의 전송 품질을 육상 텔렉스의 품질 레벨까지 향상시킬 수 있다.\n2) 고속도 통신을 할 수 있다.\n3) 국내방식을 국제방식으로도 사용할 수 있다.\n4) 해안국을 경유하여 일반 가입자의 텔렉스 단말기로부터 선박국으로, 또는 그 역의 송신도 가능하다.\n5) 통신 소요 시간이 짧다.\n6) 선택호출의 기능이 있어, 특정국만 호출하여 메시지를 전달할 수 있다.\n7) 메시지 전송의 신뢰성이 높다.\n8) 무인 운용이 가능하다. 수신자가 없어도 자동적으로 수신된다.\n9) 조작이 용이하다. 키보드를 조작하여 송신한다.\n10) 통신료가 싸다.", "id": 440}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "NBDP, NAVTEX, SART로 조난통신을 할 수 있습니까?", "answer": "1) NAVTEX는 해사 안전정보를 수신만 할 수 있는 장치이며 선박에서 위치나 조난 내용 등을 보낼 수는 없다.\n2) SART는 선박이 조난 상황에서 그 주변을 항행하는 선박의 레이더에 본선의 위치를 표시할 수 있게 하는\n장비이기 때문에 통신이라고 할 수는 없고, 위치 정도를 알려주는 장비이다.", "id": 441}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "74. EPIRB 테스트 주기 및 배터리로 연속 작동 가능한 시간, 배터리 교환주기를 설명하시오.", "answer": "1) EPIRB의 SELF-TEST 의 경우 메이커의 기준에 따라 한달에 한번 정기적으로 TEST 한다.\n2) BATTERY 교환주기는 5년이며, 배터리로 최소 48시간 이상 작동되어야 한다.\n3) 점검업자에 의한 점검을 12개월을 넘지 않는 간격으로 작동성능, 특히 주파수 안정성, 신호 강도 및 부호입력상태에 중점을 두어 점검을 실시하여야 한다.", "id": 442}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "75. LRIT가 무엇인지 설명하시오.", "answer": "Long Range Identification and Tracking\n장거리 선박 위치 추적장치로서 해상인공위성 통신망을 통해 전 세계 해상을 운항하는 자국 선박의 위치를\n수신하고 자국에 입항하거나 연안을 통항하는 외국적선박의 위치정보를 기국 정부에 요구하여 수신할 수 있는\n장치이다.", "id": 443}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "76. 양방향 무선전화장치 (TWO WAY VHF)", "answer": "1) 개요\nTWO WAY VHF는 비상시 Life Boat 또는 Life Raft에서 사용할 목적으로 SOLAS에 의거 3 set가 요구됩니다.\n단거리 통신용이며 구조선과 유일한 통신 수단입니다.\n2) 관리\nSOLAS 규정에 의한 성능 기준은 방수, 충격, 야간에도 채널 및 조작판을 용이하게 사용할 수 있어야하며, 비상용 리튬 배터리를 각각 비치하도록 규정하고 있습니다. 이 비상용 배터리에는 유효기간이 표시되어 있고 밀봉되어\n있으므로 이를 개방했을 경우 선급 및 PSC검사시 인정하지 아니하므로 주의해야 합니다.", "id": 444}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "77. 규정상 충돌의 위험이 있을시 VHF 사용은 해야한다? 하지 말아야한다?", "answer": "하지 말아야 합니다. 국제충돌방지규칙에 우선하여야 하며, 이유로는 VHF 사용에 의한 상호간의 착오로 인한\n사고들이 많습니다. 하여 VHF 사용은 충분한 시간과 여유가 있을 때는 괜찮지만, 충돌의 위험이 있을 때 VHF\n사용은 법적으로 효력이 없습니다. 사고 시에도 VHF로 상호 협의하에 행한 조치도 효력이 없습니다.", "id": 445}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "78. 퇴선시 Life Boat에 가지고 가야할 GMDSS장비 3가지를 설명하시오.", "answer": "1) Two-way VHF\n2) SART\n3) EPIRB", "id": 446}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "10.GPS 오차의 원인 4가지를 설명하시오", "answer": "1)구조적 오차 A) 위치 오차와 시간 오차 B) 전리층과 대류의 굴절 C) 잡음 D)다중경로\n2)기하학적 오차 (측위시 이용되는 위성들의 배치 상황에 따른 오차)\n3)SA(허가되지 않은 일반 사용자들이 일정한 정확도를 얻지 못하기 하기 위해 인공위성 시간마다 오차를 집어 넣음 / 2005년 5월 해제)", "id": 447}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "31. GPS와 DGPS의 차이 및 원리?", "answer": "GPS의 측위 정도를 높이기 위하여, 이미 위치를 알고 있는 지점의 측위에서 얻어진 오차의 크기와 밯양을 측위해야 할 지점의 결과에 보정하면 정확한 위치를 구 할 수 있다. 고정국과 측위해야 할 장소가 멀리 떨어지지 않은 경우에, 이렇게 하면 위성의 궤도나 시계의오차, 전리층이나 대류권의 영향 등이 거의 제거되어 S/A 를 피할수 있고 정확도는 2-5미터 개선된다.’", "id": 448}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "48. GPS와 DGPS에 대하여 설명하시오.", "answer": "1) GPS (Global Position System)\n수신기 하나만으로 다른 아무런 도움 없이 위치를 측정하는 방법이며 위성에서 보내주는 항법 메시지를 받아\n수신기에서 위치를 계산함으로써 위치를 파악하는 시스템이다.\n2) DGPS(Differential Global Positioning System)\nGPS수신기가 받는 오차에는 위성의 시계 오차, 위성의 궤도 오차, 대기권 통과시 전파의 지연 등이 있다. 이와 같은 오차의 요인은 GPS수신기 내부에서는 예측할 수 없다. 따라서 이들 오차를 계측하여 보정할 필요가 있다. 이 때문에 실제로 측위를 하는 GPS수신기 이외에 또 1대의 GPS수신기를 사용한다.\n이들 GPS수신기 중에서 적어도 1대는 위치가 정확하게 알려진 고정된 장소에 설치하여 위성으로부터 보내져 온 신호로부터 자신의 위치를 계산하여 사전에 알고 있는 위치와 비교한다. 이 차가 GPS신호의 오차이며 GPS의 오차는 시간과 더불어 시시각각 변하고 있으므로 한번 계측한 오차를 간단히 처리할 수는 없다. 이들 2대 이상의 GPS수신기는 항상 동시에 동작하고 있어야 된다.\n이 오차를 계측하는 수신기를 기준국이라 부르며 기준국은 항상 오차를 계측하여 이동하는 GPS 수신기에 이 계측한 오차 정보를 보낸다. 이동하고 있는 GPS 수신기는 기준국과 동일한 오차를 받고 있다고 생각하고, 실제로 수신한 관측값으로부터 그 오차분을 차감한다. 이 차를 취한다는 뜻에서, 이 방식을 DGPS라 부르고 있다. 이 오차 정보는 기준국에서 이동국으로 일방적으로 보내지는 정보이기 때문에 기준국이 1국이면 상당히 넓은 범위의 이동국에 서비스할 수 있다.\nDGPS 기준국 시스템은 기준국(Reference Station, RS), 감시국(Integrity Monitor, IM), 그리고 제어국(Control Station, CS)으로 구성되고, 사용자에게 보정정보를 송신하기 위한 변조기와 송신기 시스템으로 구성되어 있다. 먼저 기준국 시스템은 의사거리 보정정보(PseudoRange Correction, PRC)를 계산하여 RTCM 국제표준 포맷에 맞게 변환한 다음, MSK(Minimun Shift Keying, 최소 편이 방식) 변조기 및 송신기를 통해 사용자에게 방송한다.\n현재 우리나라 DGPS 기준국은 해양기준국 11개소, 내륙 기준국 6개소, 감시국 17개소로 구성되어 운영되고 있으며, 국제항로표지협회(IALA)의 권고에 따라 사용자에게 실시간 보정서비스를 하고 있다.\n이렇게 하면 위성의 궤도나 시계의 오차, 전리층이나 대류권의 영향 등이 거의 제거되어 정확도는 2-5m 정도로 개선된다.", "id": 449}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "DGPS의 오차범위와 수신가능 범위를 말하시오.", "answer": "1) DGPS 수신가능 범위\n우리나라 기준으로 DGPS는 중파(283.5~325KHz)를 사용하여 약 180km 범위의 해상에 위치 보정 정보를 제공할\n수 있음.\n2) DGPS 오차범위\n기준국 기준에서 100km 거리 당 평균 0.7~1.0m 의 오차가 발생하고 있음\n기준국과 수신점의 거리가 길어질수록 오차는 늘어나게 됨", "id": 450}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "DGPS가 제거하는 GPS 오차는 무엇인지 말하시오.", "answer": "1)위성의 궤도나\n2)시계의 오차,\n3)전리층이나 대류권의 영향 등이 거의 제거되어 정확도는 2-5m 정도로 개선된다.", "id": 451}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "시간오차가 발생하는 원인을 말하시오.", "answer": "시간 오차는 인공위성이 본궤도에서 이탈해 있거나 시간보정이 되어있지 않을 경우 발생하고 계속 감시하여\n매 시간 보정하여 오차를 줄인다.", "id": 452}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "GPS의 기하학적 오차는 무엇인가?", "answer": "GPS 위성이 찾고자 하는 물체가 위성으로부터 거리a와 거리b 사이에 존재한다면 위성으로부터 반지름이 a인\n원과 b인 원을 그려 두 원 사이에 물체가 존재한다. 만약 위성이 2개라면 각각의 위성에 대해 위치를 나타내는 원이 생기게 되는데 물체의 위치는 두 원이 겹치는 곳에 존재할 수 있다. 물체가 두 위성의 관측 경계에 존재\n하는 경우, 두 위성의 각도와 거리에 따라 불확실성이 커질 수 있다.", "id": 453}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "49. GPS 오차의 종류", "answer": "①위성시계 오차: GPS 위성에 내장된 시계의 부정확성으로 인해 발생한다.\n②위성궤도 오차: 위성 위치를 구하는데 필요한 위성궤도와 실제궤도 사이의 차이로 인한 오차\n③전리층의 오차: 약 350km 고도상에 집중적으로 분포되어 있는 자유전자와 GPS 위성 신호와의 간섭현상에\n의해 발생한다.\n④다중경로 오차: GPS 위성으로부터 직접 수신된 전파 이외에 부가적으로 주위의 지형 지물에 의해 반사된\n전파로 인해 발생한다.\n⑤수신기에서 발생하는 오차: 수신기에서 발생하는 전자파적 잡음에서 생기는 오차\n⑥고의 오차: 과거에 GPS 위성 제조국이 타 국가가 GPS 신호를 군사목적으로 사용할 수 없도록 고의적으로\n인공위성의 시간에 집어넣어서 95% 확률로 최대 100m까지 오차가 나게 만든 것\n(2000.05.01부터는 고의 오차 신호를 제거하여 운영되고 있어 현재는 해당 없음)\n+○7사이클 슬립: GPS반송파 위성 추적 회로에서 반송파 위상치의 값을 순간적으로 놓침으로 인해 발생한다.", "id": 454}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "50. 수정 불가능한 GPS오차", "answer": "1) 수신기 잡음\n2) 다중경로 오차\n건물 따위의 벽면 등에 부딪혀 반사되어 수신되는 부정확한 전파로 의한 오차. 최근의 수신기는 진보된 신호\n처리 기술과 특수한 안테나를 사용하여 이 문제를 최소로 줄이고 있으나, 상황이 나쁜 경우에는 측정 위치에 큰 오차가 발생하기도 한다. 대개 1.2~2.7m 정도이다. 다른 요인에 의한 오차는 경감시킬 수 있으므로 측위의 정확도를 관리할 수 있으나 이 다중경로에 의한 문제는 발생을 예측하기가 곤란하며 예기치 못한 오차가 되어 버리는 수가 있다. 일반적으로, 위성으로부터의 신호가 물체에 반사된 후 수신 안테나에 도래하는 것은 위성의 양각이 낮은 경우가 많기 때문에 안테나의 수평방향 감도를 낮게 하여 저고도의 위성으로부터는 신호를 수신하지 않게 하는 것이 유일한 대책이 된다.", "id": 455}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "GPS 설치시 선박에서 GPS 오차를 줄이기 취하여야 할 조치사항을 설명하시오.", "answer": "다중 경로의 오차를 줄이기 위하여 Compass Deck의 구조물이 없는 곳에 설치한다.", "id": 456}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "GPS의 HDOP에 관하여 설명하시오.", "answer": "HDOP란 Horizontal(수평의, 가로의) Dilution(희석, 가치 저하) of Precision(정확성, 정밀성)의 약어로서 위치의 정확도를 나타내는 값 입니다. 이 값이 작아질수록 위치 정확도가 높아집니다. 이 값은 GPS위성들이 서로 모여 있을 경우 커지며 흩어져 있을 수록 작아집니다.\nHDOP값이 4를 넘을 경우, HDOP 표시등이 깜박이며 위치가 부정확 할 수 있음을 알려줍니다.\nThe term is an acronym that represents the Horizontal Dilution of Precision, which reflects the position fixing accuracy. The accuracy increases as the value decreases. The value increases when the satellites are gathered close to each other, and it reduces when the satellites are spattered, which in turn means increased accuracy.\nWhen the HDOP value exceeds 4, the HDOP indicator flashes to notify that the positioning accuracy is poor.", "id": 457}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "51. GPS의 위치를 결정하는 원리, 위치 결정에 필요한 위성 수, 오차의 종류", "answer": "GPS, 전세계가 사용하는 위성위치확인시스템\n1) GPS란\nGPS(Global Positioning System)는 GPS 위성에서 보내는 신호를 수신해 사용자의 현재 위치를 계산하는 위성항법시스템이다. 항공기, 선박, 자동차 등의 내비게이션장치에 주로 쓰이고 있으며, 최근에는 스마트폰, 태블릿 PC등에서도 많이 활용되는 추세다.\n2) GPS의 구성\nGPS는 1)위성 부문, 2)지상관제 부문, 3)사용자 부문으로 구성된다. 여기서 위성 부문은 GPS 위성을, 지상관제 부문은 지상에 위치한 제어국을, 사용자 부문은 GPS 수신기를 말한다.\n지구 위에는 30개의 GPS 위성이 돌고 있다. 이중 24개의 위성이 지구를 공전하는 6개의 궤도면에 분포해 전세계 어디에서도 최소 6개의 GPS 위성을 관측할 수 있도록 한다. 나머지 6개의 위성은 24개의 위성에 문제가 생겼을 경우 백업 역할을 수행한다. GPS 위성은 태양 에너지로 작동되며, 수명은 약 8~10년 정도다. 제어국은 미국 콜로라도 스프링스(Colorado Springs)에 있는 주 제어국과, 세계 곳곳에 분포된 5개의 부 제어국으로 나뉜다. 각 부 제어국은 상공을 지나는 GPS 위성을 추적하고 거리와 변화율을 측정해 주 제어국으로 보낸다.\n주 제어국은 정보를 취합해 위성이 제 궤도를 유지하도록 처리한다. GPS 수신기는 GPS 위성의 신호를 수신하는 안테나, 시계, 신호를 처리하는 소프트웨어, 이를 출력하는 출력장치 등으로 이루어져 있다.\n3) GPS의 원리 – 위치를 알려면 4개의 GPS 위성이 필요\nGPS는 GPS 위성과 GPS 수신기의 거리를 계산해 좌표값을 구한다. 만일 우리가 GPS 위성의 위치와 거리를 정확하게 알 수 있다면 3개의 GPS 위성만 있어도 정확한 위치를 알 수 있다.\n우리가 대략 3차원의 구형인 지표면에 살고 있기 때문이다. 만일 직선과 같은 1차원이라면 2개의 기준점과 각각의 거리값을 알면 쉽게 위치를 결정할 수 있다. 2차원 세상에서는 3개의 기준점과 각각의 거리값을 알아야 한다. 각 기준점을 원의 중심으로 잡고, 거리값을 반지름으로 했을 때 세 원이 만나는 지점이 해당 위치가 되기 때문이다. 마찬가지로 3차원에서는 4개의 구(球)가 겹치는 부분에서 위치를 찾을 수 있다. 그러나 지구 표면 자체가 1개의 구의 역할을 하기 때문에, 3개의 GPS 위성이면 원리적으로는 위치를 결정할 수 있다.\n하지만 이것만으로는 실제로는 거리를 정확하게 계산할 수 없다. GPS 위성과 GPS 수신기의 거리는 위성에서 보내는 전파의 도달 시간을 바탕으로 계산하게 되는데, 위성에 장착된 시계와 수신기에 장착된 시계가 일치하지\n않아 오차가 발생하기 때문이다. 따라서 4개 이상의 GPS 위성에서 전파를 수신해야 정확한 위치를 파악할 수 있게 된다. 최근 나오고 있는 GPS 수신기는 20개의 위성으로부터 신호를 받을 수 있어 정확하게 위치를 계산한다.\n정확한 위치를 파악하려면, 4개 이상의 GPS 위성에서 전파를 수신해야 한다\n그렇다면 일시적으로 GPS 신호를 받을 수 없는 터널과 같은 곳에서는 어떻게 위치값을 구할 수 있을까. 이럴 때는 추측항법장치(dead reckoning)를 이용한다. 이는 GPS 신호가 끊기기 전의 위치값과 수신기의 방향, 속도 등을 연관시켜 현재 수신기의 위치를 추산하는 방식이다.", "id": 458}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "52. GLONASS 란", "answer": "- 인공위성네트워크를 이용해 지상에 있는 목표물의 위치를 정확히 추적해내는 위성항법시스템(GNSS: Global Navigation Satellite System)으로, 구소련이 미국의 GPS에 맞서 쏘아올린 것이다.\n- GLONASS는 FDMA, GPS는 CDMA로서 통신방식이 다르다.\n- 현재 GPS/GLONASS dual receiver(Hybrid 수신기)가 개발 보급되고 있다.", "id": 459}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "82. GPS 설치 시 선박에서 GPS 오차를 줄이기 위하여 취하여야 할 조치사항", "answer": "다중 경로의 오차를 줄이기 위하여, COMPASS DECK 의 구조물이 없는 곳에 설치한다.", "id": 460}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "3. 항해 Radar 작동법, 기능에 대해 설명", "answer": "1) RADAR 허상 (간접반사가 무엇이고 생기는 이유를 말하시오)\n①간접반사\n스캐너에서 발사된 전파가 자선구조물(연돌, 마스트 등)에 부딪히고 반사하여 들어온 경우 탐지해야 할 물체의\n방향이 아닌 선체구조물이 있는 방향에 위상이 나타남. 레이더 스캐너에서부터 자선 구조물까지 거리가\n가까우므로 보통 거짓상과 실제상의 거리가 같음.\n②다중반사\n대형선, 부두 등 반사성이 좋은 물질에 반사되어 같은 방향에 같은 간격으로 여러개의 위상이 나타남.\n③경면반사(거울면반사)\n스캐너에서 발사된 전파가 부두 등 육상구조물에 부딪히고 반사하여 들어온 경우에 발생함.\n④측엽반사\n물체를 탐지하기 위해서 레이더 마이크로파가 주엽(Main Lobe)로 뻗어나가야 한다. 하지만 주엽말고도 측엽(Side Lobe)으로도 전파가 세어 나간다. 이 측엽에 물체가 탐지되면 호를 그리며 레이더상에 위상이 나타난다. 주로\n물체가 가까이에서 탐지되었을 때 발생함\n⑤2차소인반사\n2차 소인에 의한 반사파로 최대 탐지거리보다 더 먼거리의 물체로부터 수신된 전파를 받고 탐지한다. 레이더에 거리는 잘못 되었지만 방위는 맞게 나타난다. 기온의 역전층이 있을 때 초굴절 현상이 일어나서 전파가 멀리\n전달된 경우 발생함", "id": 461}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "31. X-band와 S-band Radar 차이점에 대하여 설명하시오. GNSS/GPS/DGPS/LORAN 등 항해기기 관련하여 설명", "answer": "1) 엑스 밴드(X-Band) 레이더(Radar) : 파장 3.2cm, 주파수 9375 MHz로서 화면이 선명하고 물체의\n방위와 거리를 정확하게 측정할 수 있고, 레이더 리플렉터와 같은 조그만 물체를 탐지하기\n유리하다.\n2) 에스 밴드(S-Band) 레이더(Radar) : 파장 10cm, 주파수 3000 MHz로서 먼 거리 물체의 탐지와\n눈, 비, 스콜, 안개가 있을 때 유리하고 맹목 구간도 좁다.\n2) S-Band, X-band\n선박에는 보통 S-Band레이더와 X-band레이더가 탑재됩니다. 그 이유는 레이더 마다 특색이 다르기 때문입니다. 또 레이더끼리 주파수가 같으므로 발생하는 간섭이 나오지 않기 위함입니다. 이렇게 서로 다른 특색이 있게 된 이유는 주파수와 파장이 다르기 때문입니다. X-Band Radar는 9GHz대의 주파수와 3.2cm 파장을 가집니다. S-Band Radar의 경우 3GHz 주파수 10cm의 파장을 가집니다. 주파수가 높을수록 전파의 감쇠가 더 커집니다. 그렇기\n때문에 주파수가 상대적으로 낮은 S-Band Radar가 원거리 탐지에 더 적합한 것입니다. X-Band Radar는 파장이 짧고 주파수가 높기 때문에 근거리 물체를 선명하게 탐지 할 수 있습니다. 펄스폭이 좁기 때문에 방위분해능이 뛰어나 같은 방위에 근거리로 붙어 있는 물체를 잘 탐지합니다. 정리하면 S-Band Radar의 경우 원거리 조기\n탐지용으로 쓰고, X-Band Radar의 경우 근거리 물체 탐지용으로 씁니다.\n3) Radar 운용\n근거리 탐지에 있어서는 1)거리분해능을 높이고 최소탐지거리를 줄이기 위해 펄스폭을 좁게하고, 2)정보의 빈도를 높이기 위해 펄스반복주기를 짧게하며,\n원거리 탐지의 경우는 1)평균 출력을 높여 탐지거리를 증가시키고 2)펄스폭을 넓게하고, 3)2차 소인에 의한\n거짓상을 방지하기 위해 펄스반복주기를 길게 한다.\n4) Radar 설정", "id": 462}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 동도 조정기 (Tuning)", "answer": "레이더의 국부 발진기의 발진 주파수를 조정하는 것으로, 국부 발진기의 주파수가 적절히 조정되면 목표물의\n반사에 의한 지시기의 화면이 선명하게 됩니다. 이 조정기는 많이 돌린다고 해서 화면의 선명도가 좋아지는 것이 아니라, 주파수를 동조시킴으로써 최대의 효과를 얻어야 합니다. 돌리다 보면 Tuning Bar가 가득 차는 것을 보게 되는데 그 값에 맞춰 놓으면 됩니다. 이것은 Auto 모드로 놓아도 크게 문제가 없습니다.", "id": 463}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 수신기 감도 조정기 (Gain)", "answer": "감도를 높게 하면 영상이 밝아지고 탐지능력도 좋아지지만 동시에 영상에 잡음도 많이 잡히게 됩니다. 그로\n인하여 원하는 목표물에 대한 식별이 어렵게 됨으로 적당한 값으로 조정해야 합니다. 감도는 지시기의 중심\n부근에서 잡음이 조금 나타날 정도로 조정하면 좋습니다.", "id": 464}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "3. 해면반사 억제기 (STC) (sensitivity time control)", "answer": "해면 반사에 의해 화면의 중심 부근이 밝게 나타나 근거리에 있는 소형 물체의 식별이 어렵습니다. 이 조정기를 조절하여 본선 주위의 근거리 반사파 수신 감도를 떨어뜨려 방해 현상을 줄입니다. 하지만 너무 과도하게 높이면 해면 반사뿐만 아니라 소형물체의 반사파까지 억제할 수 있으니 적당한 값으로 조정합니다.", "id": 465}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "4. 비, 눈 반사 억제기 (FTC) (fast time constant)", "answer": "이 조정기는 전체화면에 영향을 끼치며, 수신기의 감도를 떨어뜨리기 때문에 소형 물체의 탐지를 어렵게 할 수도 있습니다. 스콜이나 태풍속에는 이 값을 높여 그 속에 눈으로 보이지 않는 물체들을 탐지해야 합니다. 반면 비나 눈, 구름을 탐지하는 것도 중요합니다. 앞으로 시정이 악화될 것을 예상할 수 있으므로 적절히 기능을 사용합니다.", "id": 466}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. 펄스폭 변경 (Pulse width)", "answer": "펄스폭이 커지면 상이 확대 됨으로 원거리 물체나 작은 물체를 식별하기 좋습니다. 반대로 펄스폭이 크면\n근거리에 있는 물체들은 두 개의 물체가 하나로 나오게 겹쳐 나오게 되는 경우가 있으므로 펄스폭을 낮춰\n분해능을 높입니다.\n11. RADAR 방위분해능, 거리분해능, 펄스폭, 수신기의 감도, 영상 휘점의 크기\n①방위분해능\n자선으로부터 같은 거리에 있는 서로 가까운 2개의 물체를 지시기상에 2개의 영상으로 분리하여 나타낼 수 있는 능력을 방위분해능이라 한다. 이 방위분해능에 영향을 주는 요소로는 레이더파의 수평 빔 폭, 두 물체사이의\n거리 및 휘점 크기 등이다.\n①-1. 정확도를 높이는 방법\n가. 수평빔폭\n목표물의 영상은 수평 빔 폭에 의하여 확대되어 나타나므로 작은 목표물에 대해서는 영상의 중심 방위를 측정\n해야 하며, 섬 등의 목표물의 양 끝에 대한 방위 측정시에는 수평 빔 폭의 절반만큼 안쪽으로 측정하는 것이\n정확한 방법이다. 또 1)수신기의 감도를 약간 떨어뜨리면 목표물에 대한 최대 탐지거리는 줄어들지만 영상의\n크기를 줄일 수 있어 목표물의 방위를 더 정확하게 측정할 수가 있게 된다. 따라서, 2)가능하면 근거리를 선택\n하도록 거리 선택 스위치를 조정하여 폭이 좁은 빔의 앞부분이 목표물을 통과하게 하여 방위를 측정하는 것이 좋으며, 가까운 거리에 있는 목표물에 대한 방위 측정에 있어서는 보다 3)작은 수평 빔 폭을 가지는 X밴드\n레이더가 S밴드 레이더보다 더 정확하다.\n나. 화면의 안정성\n안정된 지시기의 화면은 불안정한 화면보다 더 높은 방위 정확도를 가진다. 그러므로 지시기상의 영상이 수시로 움직이는 상대 방위 지시방식에 비하여 진방위 지시 방식의 화면에서 더 정확한 방위 측정이 가능하다. 그\n이유는 진방위 지시 방식의 화면에서는 자선의 움직임에 의한 영향은 다만 지시기상의 선수 회선만을 움직이게 할 뿐이고, 그 밖의 모든 영상은 안정되어 있기 때문이다.\n②거리분해능\n거리 분해능이란 같은 방위선상에 서로 가까이 있는 두 목표물로부터 반사파가 수신되었을 때, 이 두 목표물을 지시기상에 분리된 2개의 영상으로 나타나게 하는 레이다의 능력을 말한다. 이것은 펄스 폭, 수신기의 감도,\n지시기 화면의 크기 및 영상 휘점의 크기 등에 의하여 결정된다.\n②-1. 정확도를 높이는 방법\n가. 펄스폭을 짧게한다. 단, 펄스폭을 짧게하면 최대탐지거리가 줄어듬.\n나. 거리선택스위치를 적절히 낮게 조절한다.\n다. 지시기(CRT)가 클수록 거리분해능이 좋아진다.\n○3펄스폭\n1. 같은 방위에 있는 물표는 펄스폭의 1/2이상의 거리만큼 떨여져 있어야 지시기 상에 2개의 분리된 휘점으로\n나타낼 수 있다.", "id": 467}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. 거리분해능을 좋게 하기 위해서는 펄스폭을 짧게 한다.", "answer": "3. 펄스폭을 짧게하면 최대탐지거리가 줄어들며 현재의 레이더는 펄스폭과 펄스 반복 주파수가 동시에 바뀌도록 하고 있다.\n○4수신기의 감도\nGain을 적절히 낮게 조절하면 물표가 서로 분리되어 표시될 수 있다.\n○5영상 휘점의 크기\nCRT가 크고 Range scale을 근거리로 할수록 거리분해능은 좋다.", "id": 468}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "12. S-Band, X-band", "answer": "선박에는 보통 S-Band레이더와 X-band레이더가 탑재됩니다. 그 이유는 레이더 마다 특색이 다르기 때문입니다. 또 레이더끼리 주파수가 같으므로 발생하는 간섭이 나오지 않기 위함입니다. 이렇게 서로 다른 특색이 있게 된 이유는 주파수와 파장이 다르기 때문입니다. X-Band Radar는 9GHz대의 주파수와 3.2cm 파장을 가집니다. S-Band Radar의 경우 3GHz 주파수 10cm의 파장을 가집니다. 주파수가 높을수록 전파의 감쇠가 더 커집니다. 그렇기\n때문에 주파수가 상대적으로 낮은 S-Band Radar가 원거리 탐지에 더 적합한 것입니다. X-Band Radar는 파장이 짧고 주파수가 높기 때문에 근거리 물체를 선명하게 탐지 할 수 있습니다. 펄스폭이 좁기 때문에 방위분해능이 뛰어나 같은 방위에 근거리로 붙어 있는 물체를 잘 탐지합니다. 정리하면 S-Band Radar의 경우 원거리 조기\n탐지용으로 쓰고, X-Band Radar의 경우 근거리 물체 탐지용으로 씁니다.", "id": 469}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "13. Radar 운용", "answer": "근거리 탐지에 있어서는 1)거리분해능을 높이고 최소탐지거리를 줄이기 위해 펄스폭을 좁게하고, 2)정보의 빈도를 높이기 위해 펄스반복주기를 짧게하며,\n원거리 탐지의 경우는 1)평균 출력을 높여 탐지거리를 증가시키고 2)펄스폭을 넓게하고, 3)2차 소인에 의한\n거짓상을 방지하기 위해 펄스반복주기를 길게 한다.", "id": 470}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "14. 최대 탐지거리, 최소 탐지거리", "answer": "①최대 탐지거리는 다음 요소에 의해 결정된다;", "id": 471}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "6. 안테나의 높이", "answer": "②최소 탐지거리는 다음 요소에 의해 결정된다;", "id": 472}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "5. T.R관의 전환시간", "answer": "15. ARPA radar의 경우 어느어느 장비들이 연결되어 있습니까. radar상의 속력값은 대수속력 입니까 대지속력 입니까\nIMO Resolution A422 3.11에 보면 ARPA에는 대수속력을 제공할 능력이 있는 LOG와 그 선속지시계를 제공해야만 한다라고 규정되어 있습니다.\nARPA기능을 사용할 때는 대수속력 모드를 사용함으로써 충돌의 위험을 직관적으로 알 수 있도록 한다. 그렇다면 왜 대수속력을 사용해야 하는가.\n충돌예방규칙차원에서 보면 선박끼리 서로 어떤 상태로 보고 있는가가 중요합니다. 대지속력으로 계산을 하면\n조류가 심한 곳에서는 횡단하는 상대선의 실제 선수방향과 ARPA의 계산 결과가 상대선의 Course와 상당한\n차이를 보일 수 있습니다.", "id": 473}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "3.11 Equipment used with ARPA", "answer": "3.11.1 Log and speed indicators providing inputs to ARPA equipment should be capable of providing the ship's speed through the water.", "id": 474}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "항해 시 Radar에 속력을 표시하는 방법에 있어 대지속력과 대수속력으로 나누어 지는데 일반적인 항해에서 어떤 속력을 사용하며 그 이유는 무엇인지 말하시오.", "answer": "일반적인 항해에서 대수속력으로 표시를 한다. 그 이유로 ARPA Radar에서 대지속력으로 설정하여 계산을 하면 조류가 심한 곳에서는 횡단하는 상대선의 실제 선수방향, 대지속력과 ARPA의 계산결과 상대선박의 course, 대수속력과 상당한 차이가 있을 수 있다. 예를 들어 본선이 선수에서 5kts 유속의 조류에 5kts로 항해중인 경우 대지속력은 0으로 표시되어, 상대선박이 본선을 정지하고 있는 선박으로 오인할 가능성이 있다. 따라서 IMO에서도 ARPA RADAR의 속력 설정을 대수속력으로 하는 것을 권고하고 있다.", "id": 475}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. Gyro compass", "answer": "교정오차 (Calibration error) 0.5°.\n정규분포 (Normal distribution about this with o) = 0.12°.", "id": 476}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "2. Log", "answer": "교정오차 Calibration error 0.5 kt.\n정규분포 Normal distribution about this, 3 o = 0.2 kt.", "id": 477}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 충방 제6조, 안전속력에서 말하는 고려사항", "answer": "(b) Radar 사용가능선박이 추가하여 고려할 사항;\n(ⅰ) Radar 장비의 특성, 능력 및 한계;\n(ⅱ) 활용되는 Radar 거리 눈금에서 오는 제약;\n(ⅲ) 해면상태, 기상 및 기타의 장애요인이 Radar 탐색에 미치는 영향;\n(ⅳ) 소형선, 유빙, 기타의 부유물은 적당한 거리 내에서 Radar에 의하여 탐지되지 아니할 수 도 있다는 사실;\n(ⅴ) Radar에 의하여 탐지된 선박의 척수, 위치 및 이동상태;\n(ⅵ) 부근의 선박이나 기타의 목표물의 거리를 측정하기 위하여 Radar을 사용할 때 할 수 있는 보다 정확한\n시정의 추정;\n1) Radar 장비의 특성, 능력 및 한계\nA. 레이다의 장비의 특성이라 함은 레이다의 크기, 레이다를 구성하고 있는 안테나, 송수신기, 브라운관 등의\n기기, 사용되고 있는 전파의 주파수(3cm파, 10cm파), 영상의 표시방식(상대방위지시 인지 진방위지시 인지 여부),\n자선의 연돌이나 마스트에 의한 음영대(shadow sectors) 또는 맹목구간(blind sector) 등에 기인하는 특유의 성질\n을 말한다.\nB. 레이다 장비의 능력이라 함은 레이다로 물체를 탐지할 수 있는 최대의 거리와 최소 거리, 정밀도 및 근접\n물체의 분해능력을 말한다.\nC. 한계라 함은 탐지할 물표에 따라 가장 적절히 조정하였을 때 얼마나 확실히 탐지할 수 있는가 하는 능력의\n한계를 말한다.\n2) 사용하고 있는 Range scale\n수역의 넓이와 교통의 밀도에 따라 레인지 스케일의 선택이 달라진다. 장거리 레인지를 사용하면 물표의 조기\n탐지가 가능하며 필요한 경우에는 레이다 플로팅을 할 수 있다. 그러나 선명도와 식별도가 떨어지며 소형물표는\n잘 나타나지 않는 단점이 있다.\n이와 반면에 근거리 레인지에서는 소형 물표가 잘 나타나지만 물표의 조기 발견이 어렵고 또한 부근 수역의\n전반적인 상황을 파악할 수 없다. 레이다 레인지를 규칙적인 간격으로 바꾸어 확인 해 보아야 하며, 2대가 설치\n된 선박은 1대는 장거리, 다른 1대는 근거리 레인지로 사용하면 좋다. 레인지 스케일을 바꾸면 순간적으로 물표\n를 탐지할 수 없게 되므로 위험한 물표가 가까이 있을 때에는 레인지 스케일을 변경해서는 안 된다.\n3) 해면상태 기상조건 및 기타 장애요인\n높은 파도나 비, 눈 등이 심한 경우에는 감도가 떨어지고 이들의 반사파로 인해 물표를 탐지하기 곤란해지므로\n반사파 제어 장치를 적절히 조정하여 물표를 놓치지 않도록 하여야 한다. 기타 레이다 간섭이라든가 위상 등이\n생겨 장애요인이 될 수 있다. 안전 속력 결정시 이러한 요인들을 참조하여야 한다.\n4) 소형선박, 얼음 및 기타 물체\n소형 어선, 요트, 범선이나 부표 등 소형 물체는 레이다에 잘 나타나지 않으므로 이러한 물체가 나타나기 쉬운\n곳에서는 레이다에 너무 의존하지 말고 경계를 철저히 하면서 속력을 감속하여야 한다.\n5) 탐지된 선박의 척수, 위치 및 움직임\n탐지된 선박의 척수가 많을수록 상대적 움직임을 파악하기 곤란함으로 자선과 가까이 있는 선박과의 관계부터 파악해 가면서 대처하여야 한다. 충돌의 위험성 여부의 파악에 자신이 없을 겨우 감속을 하여 시간적 여유를\n얻도록 하여야 한다. 그러나 시계가 제한된 상태에서는 갑자기 감속을 하면 근접해 뒤따라오는 선박과 위험이 발생할 수도 있으므로 주의하여야 한다.", "id": 478}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "19. Radar plotting 의 목적을 서술하시오.", "answer": "순간 순간의 타선의 영상을 추적하여 타선의 침로와 속력을 구하고 최근접점(CPA: Closest Point of Approach)의\n거리와 시간을 계산하는 것이며 빠른 시간 내에 피항 조치를 강구하기 위함이다.", "id": 479}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "20. Radar plotting 에서 CPA, DCPA, TCPA를 설명하시오.", "answer": "1. CPA(Closest Point of Approach, 최근접점): 본선과 물표가 가장 가깝게 접근할 때의 타선 위치\n2. DCPA(Distance to Closest Point of Approach, 최근접 거리): 최근접시의 타선과 본선 사이의 거리\n3. TCPA(Time to Closest Point of Approach, 최근접 시간): 타선이 CPA에 도착하는 시간\n4. Aspect: 타선의 위치와 자세에서 본선을 어떻게 보는가 하는 것으로 타선의 침로를 기준으로한 본선의\n상대방위로 표시한다. 본선이 타선의 좌현에 있으면 R, 우현에 있으면 G를 붙여서 0도에서 180도의 값으로\n나타낸다.", "id": 480}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "21. 레이더 시행항법이 무엇인지 설명하시오.", "answer": "레이더로 입수한 정보를 이용하여 선박이나 항공기 등을 안전하게 목적지까지 유도하는 자립 항법이다. 레이더\n항법의 중요 목적은 스스로의 위치를 구하는 것과 목표물과의 충돌을 피하는 것이다.\n1) 선박의 위치 측정\n레이더스코프상 영상에서 반사체의 방위와 거리를 인지할 수 있다. 따라서 연안항법에서 방위와 거리로부터의\n위치선을 조합시켜 선박의 위치를 구하는 측정법이 사용된다. 그러나 레이더 영상으로는 등대나 산꼭대기 등\n연안항법에서의 목표물을 직접 식별할 수 없다. 그래서 보통 작은섬, 입표 및 부표와 같은 작은 목표물을 택한다.\n2) 충돌회피\n선박의 항해중에는 스코프상의 영상은 자선의 침로와 속력에 따라 육지 또는 부표 등과 다른 이동 상태를\n보인다. 다른 선박의 영상의 이동을 레이더 플로팅함으로써 그 침로나 속력, 자선과의 접근 거리 방위 및 시간\n측정할 수 있다.", "id": 481}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "22. TM과 RM의 차이는 무엇인지 설명하시오.", "answer": "1. 상대운동 지시방식(RM): 자선의 위치가 화면상의 중심 또는 레이다 화면상 어느 한 점에 고정되어 있다.\n2. 진운동 지시방식(TM): 자선의 위치가 화면의 어느 한 점에 고정되어 있지 않고 모든 물체가 그 진침로 및\n진속력에 비례하여 나타난다.", "id": 482}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "1. 레이더(RADAR: Radio Detecting and Ranging)란?", "answer": "전파의 직진성, 정속도성 및 반사성을 이용하여 물표를 탐지하고 그 물표와의 방위와 거리를 측정하는 장치로서 전파를 발사하는 안테나 및 송신부와 반사된 전파가 반사되어 오는 것을 수신하기 위한 수신부 및 물체의\n방위와 거리를 지시하는 지시기로 구성되어 있다.", "id": 483}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "24. 레이더 RM에서 물표가 움직이지 않는다면 이는 왜 그러한지 설명하시오.", "answer": "본선과 동일한 Course와 Speed로 움직이고 있기 때문이다.", "id": 484}, {"category": "MSC 82/84 ECDIS Aneex 24 성능기준항목 중 항정기록 부분", "question": "25. 레이다 알파 타켓팅 성능 규정에 대해 말하시오.", "answer": "1) 거리 분해능 기준\n: 같은 방위에 있는 2개의 물표는 최소 40m 거리에서 분리되어 탐지되어야 한다.\n2) 방위 분해능 기준\n: 같은 거리에 있는 2개의 물표는 최소 2.5도
